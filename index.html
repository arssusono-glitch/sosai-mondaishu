// --- 仏教宗派詳細 ---
{ chapter:2, type:'4', text:'「浄土真宗大谷派（東本願寺）」の焼香作法として正しいものはどれか。', choices:['額に押しいただいて1回','額に押しいただかずに1回','額に押しいただかずに2回','額に押しいただいて3回'], answer:2, explanation:'真宗大谷派（東本願寺）の焼香は「押しいただかず（額に当てず）に2回」が正式な作法です。浄土真宗本願寺派（西本願寺）は「押しいただかずに1回」です。この違いは覚えておく必要があります。' },
{ chapter:2, type:'4', text:'「一向宗（いっこうしゅう）」とは何の別称か。', choices:['曹洞宗','日蓮宗','浄土真宗','時宗'], answer:2, explanation:'一向宗は浄土真宗（本願寺）の俗称で、「ひたすら（一向に）阿弥陀仏を念じる」という意味から付いた呼び名です。戦国時代に各地で起きた「一向一揆」は浄土真宗（一向宗）の門徒が起こした武装蜂起でした。' },
{ chapter:2, type:'4', text:'「修験道（しゅげんどう）」の特徴として正しいものはどれか。', choices:['純粋な仏教の宗派','山岳での厳しい修行を通じて呪力を得ようとする、仏教・神道・道教などが融合した宗教実践','キリスト教の影響を受けた日本固有の宗教','武士道を宗教化した日本独自の精神形式'], answer:1, explanation:'修験道は山岳に神仏が宿るという信仰のもと、峰入り（山中での修行）を通じて霊力・呪力（験力）を得ようとする宗教実践で、仏教（特に密教）・神道・道教・山岳信仰などが融合しています。役小角（えんのおづぬ）を開祖とします。' },
{ chapter:2, type:'4', text:'「高野山（こうやさん）」について正しい説明はどれか。', choices:['天台宗の総本山がある山','真言宗の総本山・金剛峯寺がある霊場で、世界遺産にも登録されている','日蓮宗の創始者・日蓮が晩年を過ごした山','禅宗の修行道場が集まる山'], answer:1, explanation:'高野山（和歌山県伊都郡高野町）は真言宗の総本山・金剛峯寺がある霊場で、2004年に「紀伊山地の霊場と参詣道」としてユネスコ世界遺産に登録されました。奥之院には空海の御廟所があり、今も生きて定を続けていると信じられています。' },
{ chapter:2, type:'4', text:'「比叡山（ひえいざん）」延暦寺の説明として正しいものはどれか。', choices:['真言宗の総本山','浄土宗の開祖・法然が開いた寺','天台宗の総本山で、多くの鎌倉仏教の開祖を輩出した日本仏教の母山','日蓮宗の総本山'], answer:2, explanation:'比叡山延暦寺（滋賀県大津市）は天台宗の総本山で、最澄（伝教大師）が開きました。法然・親鸞・道元・日蓮・栄西など鎌倉時代の多くの宗祖が修行した場所であり「日本仏教の母山」と呼ばれます。2004年に世界遺産登録。' },
{ chapter:2, type:'4', text:'「永平寺（えいへいじ）」について正しい説明はどれか。', choices:['臨済宗の総本山','曹洞宗の大本山のひとつで、道元が開いた寺','浄土真宗の本山','真言宗の別院'], answer:1, explanation:'永平寺（福井県吉田郡永平寺町）は曹洞宗の大本山のひとつで、道元が1244年に開きました。現在も多くの雲水（修行僧）が修行する「参禅道場」として知られます。もう一つの大本山は横浜の總持寺です。' },
{ chapter:2, type:'4', text:'「知恩院（ちおんいん）」の説明として正しいものはどれか。', choices:['曹洞宗の総本山','浄土宗の総本山で、法然上人が念仏を広めた地に建てられた','日蓮宗の大本山','浄土真宗の別院'], answer:1, explanation:'知恩院（京都市東山区）は浄土宗の総本山で、法然上人が念仏の教えを広め、入定（死去）した地に建てられました。三門（国宝）は木造建築として日本最大級の規模を誇ります。除夜の鐘でも有名です。' },
{ chapter:2, type:'4', text:'「宗祖（しゅうそ）」と「中興の祖（ちゅうこうのそ）」の違いとして正しいものはどれか。', choices:['宗祖は現在の宗派のトップ、中興の祖は歴史上の人物','宗祖はその宗派を開いた人物、中興の祖は後に宗派を再興・発展させた人物','まったく同じ意味','宗祖は仏教用語、中興の祖は神道用語'], answer:1, explanation:'宗祖はその宗派の開祖を指します。中興の祖は宗派が衰えた時期にそれを再び盛んにした功績ある人物のことです。例えば曹洞宗では道元が宗祖、瑩山紹瑾が中興の祖とされます。' },

// --- 神式詳細 ---
{ chapter:2, type:'4', text:'神式葬儀の「発柩祭（はっきゅうさい）」とは何か。', choices:['火葬場で行う最後の儀式','棺を斎場・自宅から出棺する際の儀式','骨上げの際の儀式','帰宅後の清めの儀式'], answer:1, explanation:'発柩祭は棺を安置場所（自宅・斎場）から出棺する際に行う神式の儀式です。仏式の「出棺」に相当します。出棺の際に神職が祝詞を奏上し、一同が玉串を奉奠して故人の旅立ちを送ります。' },
{ chapter:2, type:'4', text:'神式葬儀における香典の正しい表書きはどれか。', choices:['御仏前','御花料','御玉串料または御榊料','御霊前のみ'], answer:2, explanation:'神式葬儀への香典は「御玉串料（おたまぐしりょう）」または「御榊料（おさかきりょう）」が最も適切です。「御神前（ごしんぜん）」「御霊前」も使えます。「御仏前」は仏式専用です。' },
{ chapter:2, type:'4', text:'神道における「祓詞（はらえことば）」とはどういうものか。', choices:['葬儀の際に奏上する弔いの言葉','穢れや罪を祓い清めるために唱える祝詞（のりと）','神社への参拝時に述べる感謝の言葉','神職の身分を証明する言葉'], answer:1, explanation:'祓詞は穢れ・罪・災いを祓い清めるために唱える祝詞で、「払へ給ひ清め給へと申す事を聞こし召せと白す」という内容が含まれます。神葬祭でも各種の儀礼で祓詞が奏上されます。' },

// --- 諸宗教・比較 ---
{ chapter:2, type:'4', text:'「イスラム教」の葬儀の特徴として正しいものはどれか。', choices:['火葬が原則で、できるだけ早く行う','土葬が原則で、死後できるだけ早く（24時間以内が理想）行う','散骨が推奨される','遺体は7日間安置してから埋葬する'], answer:1, explanation:'イスラム教では遺体を土に還すことが教義上の原則のため土葬です。また「早い埋葬が故人への敬意」とされ、死後できるだけ早く（24時間以内が理想）に行います。日本では土葬できる墓地が少なく課題となっています。' },
{ chapter:2, type:'4', text:'ユダヤ教の葬儀の特徴として正しいものはどれか。', choices:['豪華な棺を使い、長期間かけて行う','シンプルな木製の棺を使い、死後できるだけ早く土葬する','火葬を推奨する','僧侶が読経する'], answer:1, explanation:'ユダヤ教では「人間は土から生まれ土に返る」という考えから、土葬が原則です。棺はシンプルな木製（木釘使用・金具不使用）が伝統で、土に早く還るようにします。死後24時間以内の埋葬が理想とされます。' },
{ chapter:2, type:'4', text:'ヒンドゥー教の葬儀の特徴として正しいものはどれか。', choices:['土葬が原則','火葬が原則で、ガンジス川での水葬も行われる','遺体は保存処理して長期間安置する','読経を3日間続ける'], answer:1, explanation:'ヒンドゥー教では輪廻転生の思想から「肉体はただの入れ物」と考え、火葬（荼毘・だび）が一般的です。インドではガンジス川沿いの火葬場（ガート）で火葬し、遺灰を川に流す慣習があります。仏教の「荼毘に付す」という言葉もヒンドゥー教由来です。' },
{ chapter:2, type:'4', text:'「神道」「仏教」「キリスト教」「イスラム教」の中で、日本人の葬儀で最も多く行われているのはどれか。', choices:['神道（神葬祭）','仏教式（仏式）','キリスト教式','イスラム教式'], answer:1, explanation:'日本の葬儀は仏教式が最も多く、約90%前後とされています（調査機関・時期によって異なります）。神式は数%程度、キリスト教式は1〜2%程度です。ただし近年は無宗教・家族葬の増加により、宗教色のない葬儀も増えています。' },
{ chapter:2, type:'4', text:'次のうち「教派神道」として明治政府が公認した13派に含まれないものはどれか。', choices:['天理教','黒住教','金光教','創価学会'], answer:3, explanation:'教派神道（神道十三派）は明治政府が公認した神道系宗教で、黒住教・神道修成派・出雲大社教・扶桑教・実行教・大成教・神習教・御嶽教・神道大社教・禊教・金光教・天理教・神道本局の13派です。創価学会は日蓮宗系の新宗教であり含まれません。' },

// --- 法要・文化 ---
{ chapter:2, type:'4', text:'「お彼岸（おひがん）」に行う主な供養として一般的なものはどれか。', choices:['神社への参拝と玉串奉奠','墓参り・仏壇への供養・法要','教会での礼拝と献花','散骨と海洋供養'], answer:1, explanation:'お彼岸（春分・秋分の前後各3日間）には先祖の墓参り・仏壇への供物・法要などが行われます。「ぼたもち（牡丹餅）」「おはぎ（御萩）」を供える慣習も有名です（春はぼたもち、秋はおはぎ）。神式・キリスト教式では一般的な行事ではありません。' },
{ chapter:2, type:'4', text:'「四十九日」に行う一般的な作法として誤っているものはどれか。', choices:['仮の白木位牌から本位牌へ切り替える','香典の表書きを「御霊前」から「御仏前」に変更する','納骨を行う','喪中はがきを送る'], answer:3, explanation:'喪中はがき（年賀欠礼状）は11〜12月に送るもので、四十九日のタイミングで送るものではありません。四十九日では①白木位牌から本位牌への切り替え②納骨③忌明けのお礼④「御霊前」→「御仏前」への表書き変更、などが一般的に行われます。' },
{ chapter:2, type:'4', text:'「回向（えこう）」とはどういう意味か。', choices:['お墓の向きを変えること','自分の功徳（善行・読経など）を故人や他の人のために振り向けること','葬儀場の方向を確認すること','仏壇の向きを直すこと'], answer:1, explanation:'回向（廻向）とは自分が積んだ善根・功徳を他の者（故人や生きている人）のために振り向けることです。法要での読経・布施などが回向の代表的な実践で、「追善回向」は故人の冥福のために行う追善供養を指します。' },
{ chapter:2, type:'4', text:'「施餓鬼（せがき）」法要とは何か。', choices:['葬儀の費用を計算する儀礼','餓鬼道に苦しむ霊や無縁仏に食物を施す供養法要','お盆に行う盆踊りの起源となった儀式','彼岸に行う先祖供養の特別法要'], answer:1, explanation:'施餓鬼法要は、餓鬼道（飢えに苦しむ世界）に堕ちた霊や無縁仏（供養する人のない霊）に食物を施して供養する法要です。お盆の時期や彼岸に合わせて行われることが多く、お寺が主催する合同の施餓鬼法要も各地で行われます。' },
{ chapter:2, type:'4', text:'「位牌（いはい）」の説明として正しいものはどれか。', choices:['神式で使用する霊魂の依代','仏式で戒名・没年月日・俗名などを記した木製の牌で、故人の霊の依代とされる','キリスト教式で聖書を置く台','葬儀場の案内表示板'], answer:1, explanation:'位牌は仏式で使用する木製の牌で、戒名・没年月日・俗名・享年などが記されます。故人の霊の依代（よりしろ）として仏壇に安置し、日々の供養の対象となります。葬儀直後は白木の「仮位牌（白木位牌）」を使い、四十九日後に塗位牌・本位牌に変えます。' },
{ chapter:2, type:'4', text:'「通夜振舞い（つやぶるまい）」とは何か。', choices:['通夜の式次第の進行のこと','通夜終了後に参列者を接待する会食のこと','通夜の際に喪主が挨拶すること','通夜の翌朝に行う朝食のこと'], answer:1, explanation:'通夜振舞いは通夜の式が終わった後、参列者に飲食でもてなす会食のことです。故人との思い出を語り合い、遺族が参列へのお礼をする場でもあります。料理は寿司・オードブル・精進料理などが多く、地域によって内容が異なります。' },
{ chapter:2, type:'4', text:'「中陰（ちゅういん）」とは何を指すか。', choices:['仏壇のある部屋のこと','死後に次の生を受けるまでの49日間の状態','仏教の瞑想修行の一種','葬儀と告別式の間の休憩時間'], answer:1, explanation:'中陰（中有）とは仏教において、死後に次の生（転生）を受けるまでの過渡的な状態・期間を指します。この期間は49日間（七七日）とされ、7日ごとに裁きを受けると考えられています。これが四十九日法要を重視する根拠となっています。' },
{ chapter:2, type:'4', text:'「引導（いんどう）」を渡す主な目的として正しいものはどれか。', choices:['遺体を火葬場まで運ぶ','故人の霊を迷いから解放し、仏の世界へ導く','遺族に葬儀の費用を説明する','参列者に式の進行を案内する'], answer:1, explanation:'引導は導師（僧侶）が故人に向けて引導文（いんどうぶん）を読み上げ、この世への執着を断ち切って迷わず仏の世界へ向かうよう導く儀式です。仏式葬儀（特に禅宗）の中核をなす重要な儀礼のひとつです。' },
{ chapter:2, type:'4', text:'「導師（どうし）」が複数の僧侶で行う葬儀の場合、最も位の高い僧侶はどの役割を担うか。', choices:['受付・案内','導師（引導を渡す主役の僧侶）','斎主（神職の役割）','葬儀社の担当者'], answer:1, explanation:'複数の僧侶が参列する葬儀では、最も地位の高い（または住職・故人と最も縁の深い）僧侶が「導師」として引導・読経の中心的役割を務めます。他の僧侶は「伴僧（ばんそう）・脇僧（わきそう）」として導師を補佐します。' },
{ chapter:2, type:'4', text:'「焼香」の「抹香（まっこう）」とはどういうものか。', choices:['線香を細かく粉末にしたもの，または香木・香料を粉末にしたもの','ロウソクに火をつける道具','仏壇に供える果物や菓子','焼香台の炭火のこと'], answer:0, explanation:'抹香（まっこう）は香木・香料などを細かく粉末状にしたもので、焼香の際に指でつまんで炭火の上に落として焚きます。「沈香（じんこう）」「白檀（びゃくだん）」など香木が主原料です。' },
{ chapter:2, type:'4', text:'「般若心経（はんにゃしんぎょう）」はどの宗派でも広く読まれているか。', choices:['浄土真宗でも必ず読まれる','浄土真宗では読まれないが、他の多くの宗派で広く読まれている','日蓮宗でのみ読まれる','キリスト教でも取り入れている'], answer:1, explanation:'般若心経は真言宗・天台宗・禅宗（曹洞宗・臨済宗）・浄土宗など多くの宗派で読まれる経典です。しかし浄土真宗では「阿弥陀経・正信偈」など浄土三部経が中心で、般若心経は読みません。日蓮宗も法華経が中心です。' },
{ chapter:2, type:'4', text:'「過去帳（かこちょう）」を毎日めくる習慣について正しいものはどれか。', choices:['浄土真宗では毎日めくり、その日の命日の故人に手を合わせる習慣がある','すべての宗派で必ず毎日めくる','過去帳はめくらずに保管するだけのもの','過去帳は寺院だけが持つもの'], answer:0, explanation:'浄土真宗では過去帳を命日帳として毎日めくり（日付のある「日めくり型過去帳」）、その日に命日を迎える先祖に手を合わせる習慣があります。位牌を使わない浄土真宗において過去帳は重要な供養の道具です。' },
{ chapter:2, type:'4', text:'「檀家（だんか）」制度の説明として正しいものはどれか。', choices:['江戸幕府が設けた制度で、すべての人が特定の寺院に所属することを義務付けた','平安時代に始まった貴族と寺院の関係','神社と氏子の関係を指す','葬儀社が顧客を管理するシステム'], answer:0, explanation:'檀家制度は江戸幕府がキリシタン禁制のために設けた「寺請制度（てらうけせいど）」に基づくもので、すべての民衆が特定の寺院の檀家となり、宗教証明を受けることを義務付けました。これが現代の「菩提寺（ぼだいじ）」制度の起源です。' },

// --- 追加30問（○×15・4択15）---
{ chapter:2, type:'ox', text:'「お布施（おふせ）」は葬儀サービスへの対価（報酬）であり、消費税の課税対象となる。', answer:false, explanation:'お布施は僧侶・寺院への感謝として渡すものであり、法的には「寄付金（布施）」の性格を持ちます。対価性のない寄付のため消費税は不課税です。金額の明示義務もなく、「お気持ち」として遺族が決める形が多いです。' },
{ chapter:2, type:'ox', text:'「初七日法要」は現代では葬儀当日に「繰り込み初七日」として行われることが多い。', answer:true, explanation:'本来は死後7日目に行う初七日法要ですが、遠方からの参列者の都合・日程の効率化のため、現代では葬儀・告別式当日に続けて行う「繰り込み初七日（式中初七日）」が主流になっています。' },
{ chapter:2, type:'ox', text:'「精霊馬（しょうりょううま）」はお盆に作るきゅうりとなすの飾りで、きゅうりが馬、なすが牛を表す。', answer:true, explanation:'精霊馬（精霊牛）はお盆に先祖の霊を迎え送るための乗り物として作ります。きゅうりは足の速い「馬」（あの世から早く帰ってくるよう）、なすはゆっくりした「牛」（この世をゆっくり去っていくよう）を表します。' },
{ chapter:2, type:'ox', text:'「寺請制度（てらうけせいど）」は明治時代に廃止され、現代日本には存在しない。', answer:true, explanation:'寺請制度は明治政府の政教分離政策により1871年（明治4年）に廃止されました。しかし「菩提寺」への依存や仏教式葬儀の慣行は現在も続いており、制度としては廃止されても文化・慣習として根付いています。' },
{ chapter:2, type:'ox', text:'「禅語」で有名な「不立文字（ふりゅうもんじ）」とは「文字に頼らず直接体験で悟りを得る」という禅の立場を示す。', answer:true, explanation:'「不立文字」は禅の基本姿勢を示す言葉で、「経典の文字・言葉に頼らず、師から弟子への心から心への直接伝達（以心伝心）によって悟りを伝える」という意味です。「教外別伝（きょうげべつでん）」「直指人心（じきしにんしん）」「見性成仏（けんしょうじょうぶつ）」とともに禅の四句とされます。' },
{ chapter:2, type:'ox', text:'「念仏（ねんぶつ）」とは仏の名前を唱えることだけを指す。', answer:false, explanation:'念仏とは本来「仏を念じる（心に思い浮かべる）」という意味で、①口称念仏（くしょうねんぶつ：声に出して仏名を称える）②観想念仏（かんそうねんぶつ：仏の姿を心に観想する）③実相念仏などがあります。日本の浄土宗系では主に口称念仏（「南無阿弥陀仏」を称える）を指します。' },
{ chapter:2, type:'ox', text:'「神道」では「死穢（しえ）」を最大の穢れとするため、神社の境内に墓地を設けることは原則ない。', answer:true, explanation:'神道において死は最大の穢れ（死穢）とされるため、神社の境内に墓地を設けることは原則ありません。これは寺院が境内に墓地（寺院墓地）を持つ仏教の慣習と対照的です。神道系の墓地は神社とは別の場所に設けられます。' },
{ chapter:2, type:'ox', text:'「連名（れんめい）」の香典は、複数人が連名で一つの香典袋に入れて渡すことができる。', answer:true, explanation:'同僚・グループ・部署など複数人でまとめて香典を出す場合、連名で一つの香典袋に入れることができます。表書きには代表者名を書き「外一同」などと添えます。別紙に全員の名前と金額を書いて同封するのが丁寧な作法です。' },
{ chapter:2, type:'ox', text:'「浄土（じょうど）」とは仏が清らかにした世界のことで、「極楽浄土」は阿弥陀仏の浄土を指す。', answer:true, explanation:'浄土は仏・菩薩が衆生を救うために設けた清浄な世界のことです。阿弥陀仏の浄土は「極楽浄土（西方極楽世界）」、薬師仏の浄土は「東方浄瑠璃世界」などがあります。浄土宗・浄土真宗は阿弥陀仏の極楽浄土への往生を目指します。' },
{ chapter:2, type:'ox', text:'「密教（みっきょう）」は公開された教えであり、誰でも自由に学ぶことができる。', answer:false, explanation:'密教の「密」は「秘密」を意味し、師から弟子への秘密の伝授（口伝・灌頂）によって伝えられる教えです。「顕教（けんきょう）」が経典として公開された教えなのに対し、密教は師資相承（師弟間の秘密の伝達）を重視します。' },
{ chapter:2, type:'ox', text:'「真言宗」の「護摩（ごま）」とは、火を使った密教の儀式で、煩悩を焼き尽くす意味がある。', answer:true, explanation:'護摩（梵語：ホーマ）は密教の重要な修法で、炉に火を焚き、木・米・胡麻などの供物を投入して燃やすことで煩悩を焼き尽くし、願いを成就させるとされます。不動明王を本尊として行う「不動護摩」が代表的です。' },
{ chapter:2, type:'ox', text:'「日蓮正宗（にちれんしょうしゅう）」は日蓮宗から派生した宗派で、創価学会はかつてこの宗派の信徒団体だった。', answer:true, explanation:'日蓮正宗は1290年頃に日興（にっこう）が日蓮の本弟子として開いた宗派で、総本山は富士山麓の大石寺（静岡県富士宮市）です。創価学会は元々日蓮正宗の信徒団体でしたが、1991年に対立が深まり破門されて独立しました。' },
{ chapter:2, type:'ox', text:'「おくり火（送り火）」はお盆の最終日（8月16日）に先祖の霊を送り出すために焚く火である。', answer:true, explanation:'送り火はお盆の終わり（8月16日）に先祖の霊があの世へ帰るのを見送るために焚く火です。迎え火（8月13日）の対となる慣習です。京都の「大文字焼き（五山の送り火）」は全国的に有名な送り火の行事です。' },
{ chapter:2, type:'ox', text:'「施主（せしゅ）」は仏教用語で、もともとは「布施（ふせ）をする人＝僧侶・寺院に財物を施す人」を意味する。', answer:true, explanation:'施主は梵語「ダーパティ」の訳で、本来は「布施をする在家信者（お金・食物などを僧侶に施す人）」という意味です。現代では葬儀・法要の費用を負担し手配する人（多くの場合、喪主と同一人物）を指す意味でも使われています。' },
{ chapter:2, type:'ox', text:'「開眼供養（かいげんくよう）」とは、新しく作った仏像・位牌・墓石などに魂（霊）を入れる儀式である。', answer:true, explanation:'開眼供養（開眼法要・魂入れ）は新しく仏像・位牌・墓石などを作った際に、僧侶が読経して「目を開く（魂・霊を入れる）」儀式です。これにより単なる物体が礼拝の対象となります。墓石を建てた際にも行われます。' },
{ chapter:2, type:'4', text:'「両祖（りょうそ）」という言葉で知られる曹洞宗の二人の宗祖は誰か。', choices:['道元と栄西','道元と瑩山紹瑾','最澄と空海','法然と親鸞'], answer:1, explanation:'曹洞宗では「両祖（りょうそ）」として道元（承陽大師）と瑩山紹瑾（常済大師）を崇敬します。道元が宗祖として曹洞宗を開き、瑩山が総持寺を開いて宗勢を大きく拡大したことから「中興の祖」と呼ばれます。' },
{ chapter:2, type:'4', text:'「禅宗」の葬儀における焼香の回数として一般的なものはどれか。', choices:['1回','2回','3回','5回'], answer:2, explanation:'曹洞宗・臨済宗などの禅宗では焼香を3回行うのが一般的な作法です。ただし地域・寺院・状況によって異なる場合もあります。浄土真宗（1〜2回）や浄土宗（1〜3回）などと比較して覚えましょう。' },
{ chapter:2, type:'4', text:'「五山（ごさん）」制度とは何か。', choices:['天台宗の五つの本山','鎌倉・室町幕府が定めた禅宗寺院の格付け制度','真言宗の重要寺院五か所','浄土宗の五つの大本山'], answer:1, explanation:'五山制度は鎌倉・室町幕府が臨済宗の重要寺院を格付けした制度で、京都五山（天龍寺・相国寺・建仁寺・東福寺・万寿寺）と鎌倉五山（建長寺・円覚寺・寿福寺・浄智寺・浄妙寺）があります。幕府の保護下で禅文化が発展しました。' },
{ chapter:2, type:'4', text:'「本山（ほんざん）」と「末寺（まつじ）」の関係として正しいものはどれか。', choices:['本山は古い寺院、末寺は新しい寺院','本山は宗派の中心となる寺院、末寺はその宗派に属する一般の寺院','本山は大きな寺院、末寺は小さな寺院','本山は東京の寺院、末寺は地方の寺院'], answer:1, explanation:'本山は宗派の中心・統括機関となる寺院（総本山・大本山など）で、宗祖ゆかりの地に建てられることが多いです。末寺はその宗派に属する一般の寺院で、本山の管轄下にあります。「本末関係（ほんまつかんけい）」と呼ばれます。' },
{ chapter:2, type:'4', text:'「無宗教葬（自由葬）」で避けるべき配慮として正しいものはどれか。', choices:['音楽を流すこと','特定の宗教の儀礼（読経・祝詞・讃美歌など）を押しつけないこと','献花を行うこと','司会者を設けること'], answer:1, explanation:'無宗教葬では参列者の宗教的背景が様々であることを考慮し、特定宗教の儀礼を強制しないことが重要です。音楽・献花・司会・映像などは宗教色のない演出として広く使われます。故人・遺族の意向を最大限尊重した式づくりが求められます。' },
{ chapter:2, type:'4', text:'「葬場祭（そうじょうさい）」とはどの宗教の葬儀用語か。', choices:['仏式','神式（神葬祭）','キリスト教式','無宗教葬'], answer:1, explanation:'葬場祭は神葬祭（神式葬儀）の中心的な儀式で、仏式の「葬儀・告別式」に相当します。斎主が祭詞を奏上し、参列者が玉串奉奠を行います。神葬祭の式次第は遷霊祭→発柩祭→葬場祭→火葬祭→帰家祭の順です。' },
{ chapter:2, type:'4', text:'「戒名料（かいみょうりょう）」についての正しい説明はどれか。', choices:['法律で定められた一定の金額がある','一般的に院号＞道号・戒名＞位号の順に高くなる傾向があり、金額は寺院・宗派によって大きく異なる','戒名料は仏教どの宗派でも同じ料金体系','戒名料は葬儀社が設定する'], answer:1, explanation:'戒名料は法律で定められた金額はなく、院号の有無・文字数・寺院との関係などによって大きく異なります。院号付きは数十万〜数百万円、一般的な戒名は数万〜数十万円程度が相場とされますが、寺院・地域・宗派によって様々です。' },
{ chapter:2, type:'4', text:'「神棚封じ（かみだなふうじ）」とはどういうものか。', choices:['神棚を撤去すること','死の穢れが神棚に及ばないよう、白い紙を貼って神棚を封じること','神棚に新しい神札を入れること','神棚の掃除をすること'], answer:1, explanation:'神棚封じは家人が亡くなった際に、死の穢れが神様に及ばないよう神棚の扉または正面に白紙（半紙）を貼って封じる慣習です。神道の「死穢（しえ）」の概念から来ており、忌明け（五十日祭後）に紙を取り外します。' },
{ chapter:2, type:'4', text:'「菩提寺（ぼだいじ）」の意味として正しいものはどれか。', choices:['悟りを開いた場所にある寺','その家の先祖代々の葬儀・法事を行い、遺骨・位牌を管理する縁の深い寺院','全国で最も格式の高い寺院','葬儀社が指定する提携寺院'], answer:1, explanation:'菩提寺とは、その家の先祖代々の葬儀・年忌法要を行い、墓地・位牌を管理する縁の深い寺院のことです。江戸時代の寺請制度に起源を持ち、現代でも「家の宗教」として続いています。菩提寺のある家では葬儀の際に菩提寺の住職に依頼するのが一般的です。' },
{ chapter:2, type:'4', text:'「三途の川（さんずのかわ）」について正しい説明はどれか。', choices:['神道の死後の世界に存在する川','仏教の死後の世界観で、死者がこの世からあの世へ渡る際に越えるとされる川','キリスト教の天国への道にある川','実在する河川の別名'], answer:1, explanation:'三途の川は仏教の死後の世界観で、死者が冥土へ向かう途中に渡るとされる川です。生前の行いによって渡り方が異なり（橋・浅瀬・深み）、川の番人「奪衣婆（だつえば）」と「懸衣翁（けんえおう）」が衣服を奪って罪の重さを量るとされます。' },
{ chapter:2, type:'4', text:'「冥土（めいど）」「黄泉（よみ）」「地獄（じごく）」の説明として正しいものはどれか。', choices:['すべて同じ場所を指す別の言葉','冥土は仏教の死後の世界、黄泉は日本神話の死者の国、地獄は冥土の中でも罪人が苦しむ場所','冥土はキリスト教用語、黄泉は仏教用語','地獄は現世の苦しい状態を表すだけで死後の世界ではない'], answer:1, explanation:'「冥土（冥途）」は仏教における死後の世界の総称、「黄泉（よもつひらさか）」は日本神話（古事記）に登場する死者が行く国、「地獄」は冥土の中で最も厳しい罰を受ける場所です。それぞれ由来する宗教・文化が異なります。' },
{ chapter:2, type:'4', text:'「仏壇（ぶつだん）」の本来の意味として正しいものはどれか。', choices:['先祖の位牌を飾る棚','家庭内に本尊（仏像）を安置し礼拝するための壇','葬儀場に設置する祭壇','お盆に精霊棚として使う棚'], answer:1, explanation:'仏壇は本来、家庭内に本尊（仏像・曼荼羅など）を安置して礼拝するための壇です。先祖の位牌を置く機能は後から加わったもので、「先祖を祀る場所」というイメージが強くなっていますが、本来は「本尊を礼拝する家庭の小さなお寺」です。' },
{ chapter:2, type:'4', text:'「宗派（しゅうは）」を確認することが葬儀準備で重要な理由として最も適切なものはどれか。', choices:['葬儀費用の計算のため','祭壇形式・焼香回数・経典・作法など式全体に関わるため','参列者へのご案内文作成のため','火葬場の予約のため'], answer:1, explanation:'宗旨宗派によって祭壇の形（白木/花）・焼香回数（1〜3回）・読む経典・引導の有無・数珠の形式・位牌の使用有無・戒名の呼称（戒名/法名）など、式全体に関わる多くの要素が異なります。葬儀施行の最重要確認事項のひとつです。' },
{ chapter:2, type:'4', text:'「檀那（だんな）」の語源として正しいものはどれか。', choices:['中国語で「主人」を意味する言葉','梵語（サンスクリット語）の「ダーナ（布施・施し）」に由来する','日本語の「旦那」から来た言葉','英語の「donor（寄付者）」から来た言葉'], answer:1, explanation:'「檀那（だんな）」は梵語のダーナ（dāna・布施・施し）が由来で、「寺院に布施をする在家信者（檀家）」を意味します。これが転じて「主人・旦那様」という意味でも使われるようになりました。「檀家（だんか）」も同じ語源です。' },
{ chapter:2, type:'4', text:'次の「宗派別・焼香回数」の組み合わせとして正しいものはどれか。', choices:['浄土真宗本願寺派：2回、真宗大谷派：1回','浄土真宗本願寺派：1回、真宗大谷派：2回','曹洞宗：1回、日蓮宗：3回','浄土宗：2回、天台宗：1回'], answer:1, explanation:'浄土真宗の焼香回数は本願寺派（西）が1回、大谷派（東）が2回です（いずれも額に押しいただかない）。曹洞宗・臨済宗は3回が一般的、浄土宗・天台宗・真言宗は1〜3回（宗派の指定あり）、日蓮宗は1回または3回が多いです。' },
// ===== ○× 問題（55問）=====
{chapter:3, type:'ox',text:'「枕経（まくらきょう）」とは、臨終後すぐに故人の枕元で僧侶が読む経のことである。',answer:true,explanation:'枕経は故人が亡くなった直後、枕元で行われる最初の読経です。故人の霊を安らかに導くために行われます。現代では省略されることもありますが、仏式葬儀の伝統的な最初の儀礼です。'},
{chapter:3, type:'ox',text:'「死亡診断書」は、故人を診療していなかった医師でも作成できる。',answer:false,explanation:'死亡診断書は死亡した患者を診療していた医師が作成します。診療していなかった医師が作成する場合は「死体検案書」となります。どちらも死亡届に添付する必要があります。'},
{chapter:3, type:'ox',text:'「搬送（はんそう）」とは、遺体を病院・施設などから安置場所へ移すことを指す。',answer:true,explanation:'搬送は遺体を病院・施設・事故現場などから自宅・斎場・安置施設などへ移すことです。霊柩車・寝台車（搬送専用車）を使って行われます。'},
{chapter:3, type:'ox',text:'遺体の法律上の安置期間は、死後24時間以内に火葬してはならないと定められている。',answer:true,explanation:'墓地埋葬法第3条により、死後24時間以内の火葬・埋葬は原則として禁止されています。感染症法に基づく特例（感染症による死亡）を除き、最低24時間は安置が必要です。'},
{chapter:3, type:'ox',text:'「納棺（のうかん）」とは、遺体を棺に納める儀式で、家族や納棺師が行う。',answer:true,explanation:'納棺は遺体を棺に納める儀式で、故人のお気に入りの着物・洋服・副葬品なども一緒に入れます。近年は「納棺師（おくりびと）」などの専門家が関わることも増えています。'},
{chapter:3, type:'ox',text:'「湯灌（ゆかん）」は必ず行わなければならない法律上の義務である。',answer:false,explanation:'湯灌は遺体をお湯で清める儀式ですが、法律上の義務ではありません。故人・遺族の希望・状況に応じて選択できます。病院でエンゼルケア（清拭・処置）が行われている場合は省略されることもあります。'},
{chapter:3, type:'ox',text:'「エンゼルケア」とは、病院の看護師などが行う死後の遺体処置（清拭・整容）のことである。',answer:true,explanation:'エンゼルケア（エンゼルメイク・死後処置）は、病院の看護師・看護補助者などが亡くなった患者に行う処置で、清拭・体位の整え・目・口の閉じ方・整容（ひげ剃り・化粧など）を含みます。'},
{chapter:3, type:'ox',text:'「通夜（つや）」は必ず前夜（葬儀の前日）に行わなければならない。',answer:false,explanation:'通夜は伝統的には葬儀前夜に行われますが、法律上の規定はありません。現代では「半通夜」（2〜3時間で終わる形式）が主流で、日程・状況によっては省略（一日葬）する場合もあります。'},
{chapter:3, type:'ox',text:'「半通夜（はんつや）」とは、夜通し（徹夜で）行う本来の通夜と区別した、現代の一般的な2〜3時間程度の通夜のことである。',answer:true,explanation:'本来の通夜は文字通り夜を徹して行うものでしたが、現代では参列者の利便性・体力的な負担を考慮し、夕方から夜にかけて2〜3時間程度で終わる「半通夜」が一般的になっています。'},
{chapter:3, type:'ox',text:'「告別式（こくべつしき）」は宗教的な儀式であり、葬儀と同じものである。',answer:false,explanation:'葬儀は宗教的な儀式（成仏祈願・引導など）であり、告別式は参列者が故人に最後の別れを告げる社会的な儀式です。本来は別々のものですが、現代では「葬儀・告別式」として一体で行われることが多いです。'},
{chapter:3, type:'ox',text:'「出棺（しゅっかん）」とは、棺を葬儀会場・斎場から火葬場へ向けて出発させることである。',answer:true,explanation:'出棺は棺（故人）を安置場所・式場から火葬場へ向けて移動させることです。霊柩車に棺を乗せ、喪主・遺族・参列者が見送ります。出棺の際に喪主挨拶が行われることが多いです。'},
{chapter:3, type:'ox',text:'「火葬（かそう）」の際、棺とともに金属製品・ガラス製品・爆発物などを副葬品として入れてはならない。',answer:true,explanation:'金属（ペースメーカー等）・ガラス・爆発物・大量の紙・プラスチックなどは火葬時に危険であったり炉を傷めたりするため、火葬場のルールで禁止されています。副葬品は紙・木・布・花など燃えやすいものに限られます。'},
{chapter:3, type:'ox',text:'「骨上げ（こつあげ）」で最後に拾うのは、喉仏（第二頸椎）とされる。',answer:true,explanation:'骨上げ（収骨）では足元の骨から順に拾い、最後に「喉仏（のどぼとけ）」と呼ばれる第二頸椎を骨壺に収めます。この形が座禅を組む仏様の姿に見えることから、最後に収めます。'},
{chapter:3, type:'ox',text:'東日本と西日本では骨上げの方法に違いがあり、東日本は全収骨、西日本は部分収骨が一般的である。',answer:true,explanation:'東日本（北海道・東北・関東など）では遺骨をほぼすべて骨壺に収める「全収骨（全骨）」が一般的です。西日本（関西・中国・四国・九州など）では一部の骨のみを収める「部分収骨」が一般的で、残った骨は火葬場に委ねます。'},
{chapter:3, type:'ox',text:'「精進落とし（しょうじんおとし）」は現代では火葬後・骨上げ後に行うことが多い。',answer:true,explanation:'精進落としは本来、四十九日の忌明けに行うものでしたが、現代では葬儀当日の火葬・骨上げ終了後（または火葬中の待機時間）に行うことが多くなっています。'},
{chapter:3, type:'ox',text:'「喪主挨拶」は必ず通夜・葬儀の両方で行わなければならない。',answer:false,explanation:'喪主挨拶の実施・タイミングは義務ではなく、葬儀の流れや規模によって異なります。一般的には通夜の終わり・出棺前・精進落としの席などで行われますが、すべての場面で必須というわけではありません。'},
{chapter:3, type:'ox',text:'「会葬御礼（かいそうおれい）」は参列者全員に当日渡す返礼品であり、香典の有無に関わらず渡す。',answer:true,explanation:'会葬御礼は葬儀・告別式に参列してくれた方全員に感謝の気持ちとして渡す品（会葬礼状・お茶・お菓子など）で、香典をいただいたかどうかに関わらず全員に渡します。香典返しとは別のものです。'},
{chapter:3, type:'ox',text:'「霊柩車（れいきゅうしゃ）」は棺を運ぶ専用車で、宮型・洋型などの種類がある。',answer:true,explanation:'霊柩車には、豪華な神社・仏閣建築様式の装飾がついた「宮型（みやがた）」と、リムジン・ワゴン型などシンプルな「洋型（ようがた）」があります。近年は洋型が増加傾向にあります。'},
{chapter:3, type:'ox',text:'「寝台車（しんだいしゃ）」と「霊柩車（れいきゅうしゃ）」は同じ車両を指す。',answer:false,explanation:'寝台車は遺体を病院などから安置場所・斎場へ搬送するための車両で、主に布団・寝台状の設備を持ちます。霊柩車は棺に納めた遺体を式場から火葬場へ運ぶ車両です。役割・使用タイミングが異なります。'},
{chapter:3, type:'ox',text:'「死亡届」は死亡を知った日から7日以内に市区町村役場に提出しなければならない。',answer:true,explanation:'戸籍法により、死亡の事実を知った日から7日以内（国外死亡の場合は3か月以内）に死亡届を提出する義務があります。死亡届に添付する「死亡診断書または死体検案書」の提出も同時に必要です。'},
{chapter:3, type:'ox',text:'「火葬許可証」がなくても火葬を行うことができる。',answer:false,explanation:'火葬許可証は火葬を行うために必須の書類で、市区町村長が交付します。死亡届を提出し火葬許可証を受け取らなければ火葬はできません。火葬場では火葬許可証を確認・回収（または証印して返却）します。'},
{chapter:3, type:'ox',text:'「埋葬許可証」は火葬後に火葬場から返却（証印されて）受け取り、納骨の際に必要となる。',answer:true,explanation:'火葬許可証は火葬場に提出し、火葬終了後に「火葬済み」の証印がされて返却されます（これが埋葬許可証を兼ねます）。この証明書は納骨の際に霊園・寺院などに提出するため、大切に保管する必要があります。'},
{chapter:3, type:'ox',text:'「葬儀式場（葬祭ホール）」は葬儀社が運営するもの以外に、寺院・公営の施設もある。',answer:true,explanation:'葬儀式場には葬儀社が運営する「葬祭ホール（セレモニーホール）」のほか、寺院が提供する境内の集会施設、市区町村が運営する「公営斎場」などがあります。公営斎場は費用が比較的安価なことが多いです。'},
{chapter:3, type:'ox',text:'「返礼品（香典返し）」は必ず郵送しなければならない。',answer:false,explanation:'香典返しは葬儀当日に渡す「即日返し（当日返し）」と、忌明け後（四十九日後）に郵送または持参する「後返し（後日返し）」の二通りあります。どちらの形式でも問題なく、地域・家族の方針によって異なります。'},
{chapter:3, type:'ox',text:'「白装束（しろしょうぞく）」は遺体の旅支度として着せるもので、「左前」に着せるのが慣習である。',answer:true,explanation:'白装束（経帷子・きょうかたびら）は仏式で遺体に着せる死装束で、生きている人の着方（右前）と逆の「左前」に着せます。あの世とこの世を区別するためとされています。足袋・脚絆・手甲・頭陀袋なども旅支度として準備します。'},
{chapter:3, type:'ox',text:'「手甲（てっこう）・脚絆（きゃはん）」は現代の葬儀では使用されない。',answer:false,explanation:'手甲・脚絆は白装束の一部で、三途の川の旅に備えた旅支度として現代でも仏式葬儀で使用されます。ただし地域・宗派・遺族の意向によって省略されることもあります。'},
{chapter:3, type:'ox',text:'「六文銭（ろくもんせん）」を棺に入れる慣習は、三途の川の渡し賃とされる。',answer:true,explanation:'六文銭は三途の川の渡し賃（船賃）として棺に入れる慣習で、現代では本物の硬貨の代わりに紙に印刷された六文銭（印刷銭）を使うことが多いです（本物の硬貨は火葬できないため）。'},
{chapter:3, type:'ox',text:'「枕飾り（まくらかざり）」は遺体の枕元に設ける簡易祭壇で、仏式では線香・ろうそくを絶やさないようにするのが本来の慣習だった。',answer:true,explanation:'枕飾りは安置した遺体の枕元に設ける小さな祭壇で、香炉・燭台・花立などが置かれます。本来は線香・ろうそくの火を絶やさないように夜通し交代で見守る慣習がありましたが、安全上の理由から現代では火を消すことが多くなっています。'},
{chapter:3, type:'ox',text:'「ドライアイス」は遺体の腐敗を防ぐために葬儀の安置期間中に使用される。',answer:true,explanation:'ドライアイス（固体の二酸化炭素、約マイナス79度）は遺体の冷却・腐敗防止のために安置期間中に使用されます。腹部・背部に当て、定期的に交換します。エンバーミングと併用する場合もあります。'},
{chapter:3, type:'ox',text:'「焼香台（しょうこうだい）」は必ず祭壇の真正面に設置する。',answer:false,explanation:'焼香台の設置位置は葬儀会場の広さ・動線・式次第によって異なります。必ずしも祭壇の真正面とは限らず、参列者が焼香しやすい位置（祭壇前・斜め前など）に設置されます。'},
{chapter:3, type:'ox',text:'「献花（けんか）」はキリスト教式・無宗教葬でよく行われるが、仏式では行わない。',answer:false,explanation:'献花はキリスト教式・無宗教葬で一般的ですが、仏式でも「花祭壇」の普及とともに献花を取り入れる葬儀が増えています。厳密に仏式で禁止されているわけではなく、遺族の意向・地域の慣習によって行われることがあります。'},
{chapter:3, type:'ox',text:'「位牌（いはい）」は葬儀中、「野位牌（仮位牌・白木位牌）」を使い、四十九日後に本位牌に替えるのが一般的である。',answer:true,explanation:'葬儀から四十九日までの間は白木（未塗装の木）で作られた「仮位牌（白木位牌・野位牌）」を使います。四十九日法要のタイミングで、漆塗りなどの「本位牌」に替えるのが一般的です。'},
{chapter:3, type:'ox',text:'「忌引き（きびき）」とは、身内の不幸があった際に学校・職場を休む制度のことである。',answer:true,explanation:'忌引きは身内（親族）が亡くなった際、葬儀参列等のために学校・会社を休む制度です。日数は故人との続柄によって異なり（配偶者：最大10日、両親：5〜7日、祖父母・兄弟：3〜5日程度が目安）、会社・学校の規定によります。'},
{chapter:3, type:'ox',text:'「弔辞（ちょうじ）」は参列者全員が述べるものである。',answer:false,explanation:'弔辞は故人と特に親しかった人（友人・同僚・恩師など）が代表して述べる別れの言葉です。参列者全員が述べるものではなく、遺族から依頼された方が担当します。一般的に1〜3名程度です。'},
{chapter:3, type:'ox',text:'「喪主（もしゅ）」は必ず故人の配偶者が務めなければならない。',answer:false,explanation:'喪主は一般的に配偶者・長子など最も近い遺族が務めますが、法律上の規定はありません。事情によっては兄弟・甥姪・友人が務めることもあります。また喪主と施主（費用負担者）が異なることもあります。'},
{chapter:3, type:'ox',text:'「葬儀委員長」は主に社葬・合同葬など大規模な葬儀で置かれる役職である。',answer:true,explanation:'葬儀委員長は社葬・合同葬・大規模葬儀において、葬儀全体を取り仕切る責任者として置かれます。会社の役員・上司など故人と縁の深い人が務めることが多く、弔辞を述べる役割も担います。'},
{chapter:3, type:'ox',text:'「焼香順（しょうこうじゅん）」は一般的に喪主→遺族→親族→一般参列者の順で行う。',answer:true,explanation:'焼香の順番は一般的に①喪主②遺族（配偶者・子など）③親族（近い順）④故人の友人・知人などの一般参列者の順で行います。社葬では葬儀委員長が最初に焼香することもあります。'},
{chapter:3, type:'ox',text:'「出棺（しゅっかん）」の際、棺の周囲を遺族・親族が囲んで「釘打ち（くぎうち）」を行う慣習がある。',answer:true,explanation:'棺の蓋を閉める際に石（または釘打ち用の道具）で釘を打つ「釘打ちの儀」は、仏式葬儀の伝統的な儀礼です。遺族・親族が順番に石で棺の釘を打ちます。ただし近年は省略される場合も増えています。'},
{chapter:3, type:'ox',text:'「末期の水（まつごのみず）」とは、臨終の際または直後に故人の唇を水で湿らせる儀式である。',answer:true,explanation:'末期の水（水取り・死に水）は臨終の際または直後に、脱脂綿や筆などに水を含ませて故人の唇を湿らせる儀式です。「のどが渇かないように」「あの世への旅路で水に困らないように」という意味があります。'},
{chapter:3, type:'ox',text:'「逆さ屏風（さかさびょうぶ）」とは、臨終直後に遺体の頭近くに屏風を逆さ（上下逆）にして立てる慣習である。',answer:true,explanation:'逆さ屏風は枕元に屏風を通常と逆さに立てる慣習です。「日常と異なる状態にする＝非日常・あの世」を表すとされます。地域・宗派によっては行わない場合もあります。'},
{chapter:3, type:'ox',text:'「北枕（きたまくら）」は縁起が悪いとされるが、安置の際に遺体を北枕にするのは仏教の慣習による。',answer:true,explanation:'釈迦が入滅した際に頭を北に向けていたとされることから、安置の際に遺体の頭を北（または西）に向けます。日常では「北枕は縁起が悪い」とされますが、これは遺体の安置法（北枕）と混同された結果と言われています。'},
{chapter:3, type:'ox',text:'「死に装束（しにしょうぞく）」は現代では故人が生前に愛用した洋服を着せることもできる。',answer:true,explanation:'伝統的には白装束（経帷子）ですが、現代では故人が生前に好んだ洋服・スーツ・着物などを着せることが増えています。遺族の意向と宗派・葬儀社の方針によって柔軟に対応できます。'},
{chapter:3, type:'ox',text:'「副葬品（ふくそうひん）」として、故人の眼鏡やプラスチック製品は問題なく棺に入れられる。',answer:false,explanation:'プラスチック・金属・ガラス製品は火葬の際に有害ガス発生・炉の損傷・遺骨への影響などの恐れがあるため、多くの火葬場で禁止されています。眼鏡（金属・ガラス）も原則入れられません。紙・木・布・生花が適切です。'},
{chapter:3, type:'ox',text:'「故人の写真」は副葬品として棺に入れることができる。',answer:true,explanation:'故人の思い出の写真（紙焼きのもの）は副葬品として棺に入れることができます。ただし大量の紙は火葬に影響することがあるため枚数は適度にします。また生きている人が写った写真を入れることを嫌がる方もいるため確認が必要です。'},
{chapter:3, type:'ox',text:'「葬儀証明書（そうぎしょうめいしょ）」は葬儀社が発行する書類で、忌引き休暇の申請などに使用できる。',answer:true,explanation:'葬儀証明書は葬儀社が発行する証明書で、葬儀が行われたことを証明します。会社・学校への忌引き申請の際に提出を求められることがあります。死亡診断書のコピーで代用する場合もあります。'},
{chapter:3, type:'ox',text:'「祭壇（さいだん）」は葬儀社が設置するもので、遺族が自分で飾ることはできない。',answer:false,explanation:'祭壇は通常葬儀社が設営しますが、手作りの祭壇を飾ったり、遺族が追加の供物・写真・故人の愛用品を飾ったりすることは自由です。自宅葬や無宗教葬では遺族が主体となって飾る場合もあります。'},
{chapter:3, type:'ox',text:'「火葬場（かそうば）」は日本では公営・民営どちらも存在する。',answer:true,explanation:'日本の火葬場は市区町村が運営する公営（公設）火葬場が多数を占めますが、民間企業が運営する民営火葬場も存在します。地域によって設備・待ち時間・料金が大きく異なります。'},
{chapter:3, type:'ox',text:'「収骨（しゅうこつ）」と「骨上げ（こつあげ）」は同じ行為を指す。',answer:true,explanation:'収骨（拾骨・しゅうこつ・じゅうこつ）と骨上げ（こつあげ）はどちらも火葬後の遺骨を骨壺に収める儀式を指す言葉で、同義です。「お骨拾い」とも言われます。'},
{chapter:3, type:'ox',text:'「法要（ほうよう）」は葬儀当日にのみ行うもので、以後は行わない。',answer:false,explanation:'法要は葬儀当日のほか、初七日・四十九日・一周忌・三回忌など節目ごとに行います。葬儀後も継続して故人を供養するために行われる重要な仏事です。'},
{chapter:3, type:'ox',text:'「生花（せいか）祭壇」は本物の花を使った祭壇で、葬儀終了後に参列者へ分けることができる。',answer:true,explanation:'生花祭壇に使われた花は葬儀終了後、参列者や遺族が持ち帰ることができます。「お清めの花」「形見の花」として持ち帰る慣習がある地域もあります。'},
{chapter:3, type:'ox',text:'「密葬（みっそう）」とは、近親者のみで行う内輪の葬儀のことで、後日「お別れ会」を開催することもある。',answer:true,explanation:'密葬は近親者・家族のみで内々に行う葬儀です。著名人・企業経営者などが亡くなった際に、まず密葬を行い、後日改めて多くの関係者を招いた「お別れ会・偲ぶ会」を開催するケースが多くあります。'},
{chapter:3, type:'ox',text:'「生前整理（せいぜんせいり）」は死後に遺族が行う遺品整理のことである。',answer:false,explanation:'生前整理は本人が生きているうちに身の回りの物を整理しておく活動です。死後に遺族が行うのは「遺品整理（いひんせいり）」です。終活の一環として生前整理を行う人が増えています。'},

// ===== 4択 問題（55問）=====
{chapter:3, type:'4',text:'臨終から葬儀までの一般的な流れとして正しい順序はどれか。',choices:['臨終→枕経→湯灌→納棺→通夜→葬儀→出棺→火葬→骨上げ','臨終→納棺→通夜→湯灌→葬儀→骨上げ→出棺→火葬','臨終→火葬→通夜→葬儀→骨上げ→枕経','臨終→通夜→葬儀→湯灌→納棺→火葬→骨上げ'],answer:0,explanation:'一般的な流れは①臨終→②枕経（搬送・安置・枕飾り）→③湯灌→④納棺→⑤通夜→⑥葬儀・告別式→⑦出棺→⑧火葬→⑨骨上げ（収骨）→⑩精進落とし→⑪初七日法要（現代は繰り込みが多い）です。'},
{chapter:3, type:'4',text:'「死亡診断書」を作成できるのは誰か。',choices:['葬儀社の担当者','故人を診療していた医師','市区町村の職員','家族の代表者'],answer:1,explanation:'死亡診断書は故人を診療（治療）していた医師のみが作成できます。診療していない医師が検案（遺体を検査）して作成するのは「死体検案書」です。いずれも死亡届への添付が必要です。'},
{chapter:3, type:'4',text:'「搬送」で使用する車両として正しいものはどれか。',choices:['霊柩車（宮型）','寝台車（搬送車）','救急車','タクシー'],answer:1,explanation:'病院などから安置場所への遺体搬送には「寝台車（搬送車）」を使用します。寝台車は遺体を横たえた状態で搬送できる専用の車両です。霊柩車（宮型・洋型）は棺に納めた後に火葬場へ運ぶ際に使用します。'},
{chapter:3, type:'4',text:'「湯灌（ゆかん）」の手順として最も適切なものはどれか。',choices:['遺体を火葬場で洗浄する','遺体をお湯で洗い清め、整容・着替えを行う','遺体を防腐処理するエンバーミングのこと','骨上げ後に遺骨を洗い清める'],answer:1,explanation:'湯灌とは遺体をお湯で洗い清める儀式で、清拭・洗髪・整容（化粧・ひげ剃りなど）・白装束への着替えまでを含めて行います。専門の湯灌師または納棺師が行うことも多く、家族が立ち会える形で実施されます。'},
{chapter:3, type:'4',text:'「枕飾り（まくらかざり）」に用意するものとして一般的でないものはどれか。',choices:['線香・ろうそく','枕飯（一膳飯）・枕団子','位牌（本位牌）','花立・花'],answer:2,explanation:'枕飾りには香炉・線香・ろうそく（燭台）・花立・花・枕飯（茶碗に山盛りにした飯）・枕団子などを用意します。「本位牌」は四十九日後に使うもので、枕飾りの段階では「白木位牌（仮位牌）」または「位牌なし」です。'},
{chapter:3, type:'4',text:'「納棺」の際に棺に入れるものとして適切でないものはどれか。',choices:['故人の好きだった花（生花）','故人の思い出の手紙（紙）','ペースメーカー（金属製電池内蔵）','故人の好きだった本（紙）'],answer:2,explanation:'ペースメーカーは金属製で電池を内蔵しており、火葬中に爆発・破裂する危険があります。火葬前に必ず医師や火葬場に申告し、除去が必要な場合があります。多くの場合、ペースメーカーは棺に入れられません。'},
{chapter:3, type:'4',text:'通夜における「焼香（しょうこう）」の一般的な手順として正しいものはどれか。',choices:['焼香台に進む→合掌→抹香をつまむ→焼香→引き下がる','焼香台に進む→抹香をつまむ→焼香（宗派により1〜3回）→合掌礼拝→引き下がる','焼香台に進む→献花→合掌→引き下がる','焼香台に進む→玉串を受け取る→奉奠→引き下がる'],answer:1,explanation:'仏式焼香の一般的な手順は①焼香台の前に進み一礼②抹香を右手の指でつまみ③香炉にくべる（宗派により1〜3回。浄土真宗は額に押しいただかない）④合掌・礼拝⑤下がって一礼です。'},
{chapter:3, type:'4',text:'「出棺（しゅっかん）」の際に一般的に行われることとして誤っているものはどれか。',choices:['喪主による挨拶','棺を霊柩車に乗せる','花（花びら）を棺の中に入れる','骨上げ（遺骨を骨壺に収める）'],answer:3,explanation:'骨上げは火葬終了後に行うものです。出棺の際には①棺の中に花（花びら）・副葬品を入れ②棺の蓋を閉め③霊柩車に乗せ④喪主挨拶⑤参列者による見送り、という流れが一般的です。'},
{chapter:3, type:'4',text:'「告別式（こくべつしき）」における「弔辞（ちょうじ）」の一般的な説明として正しいものはどれか。',choices:['全参列者が順番に述べる','故人と特に縁のあった方が代表して述べる別れの言葉','僧侶が読む経文の一種','喪主が必ず冒頭に行う挨拶'],answer:1,explanation:'弔辞は故人と特に縁の深かった方（友人・同僚・恩師など）が遺族から依頼を受けて代表して述べる別れの言葉です。巻紙・奉書紙に書いて読み上げるのが正式な形式で、3〜5分程度が目安です。'},
{chapter:3, type:'4',text:'「火葬（かそう）」にかかる時間として一般的なものはどれか。',choices:['約15〜30分','約1〜2時間','約3〜4時間','約5〜6時間'],answer:1,explanation:'火葬にかかる時間は炉の種類・遺体の状態などによって異なりますが、一般的には約1〜2時間（成人の場合）です。この間、遺族・参列者は控室で待機し、終了後に骨上げを行います。'},
{chapter:3, type:'4',text:'「骨上げ（こつあげ）」の作法として正しいものはどれか。',choices:['一人で一本の箸を使って骨を拾う','二人一組で二本の箸を使い、足元から頭に向けて順に骨を拾う','骨はすべて素手で拾う','骨はスプーンで収める'],answer:1,explanation:'骨上げは二人一組で長い箸（または竹と木など素材の違う箸）を使い、遺骨を拾って骨壺に収めます。足元の骨から頭に向けて順番に拾い、最後に喉仏を収めます。「箸渡し」とも呼ばれます。'},
{chapter:3, type:'4',text:'「精進落とし（しょうじんおとし）」の説明として正しいものはどれか。',choices:['四十九日法要後の会食','葬儀当日（現代では火葬・骨上げ後）に行う会食で、遺族が参列者をもてなす場','毎月の月命日に行う法事','通夜の前夜に行う食事'],answer:1,explanation:'精進落としは本来四十九日の忌明けに行う会食ですが、現代では葬儀当日の火葬・骨上げ終了後に行うことが一般的です。遺族が参列者・僧侶へのお礼を兼ねてもてなす会食で、遺族・親族・僧侶が同席します。'},
{chapter:3, type:'4',text:'「返礼品（香典返し）」の一般的な金額の目安はどれか。',choices:['いただいた香典額の全額','いただいた香典額の半額〜3分の1程度（半返し）','一律1000円','金額に関わらず同じ品物'],answer:1,explanation:'香典返しの相場は「半返し（いただいた香典の半額程度）」が一般的ですが、「3分の1返し」の地域もあります。即日返しの場合は一律2000〜3000円程度の品を全員に渡すことが多く、高額の香典には後日追加で返礼することもあります。'},
{chapter:3, type:'4',text:'「死装束（しにしょうぞく）」の「手甲（てっこう）・脚絆（きゃはん）・頭陀袋（ずだぶくろ）」はそれぞれ何を意味するか。',choices:['戦国時代の武将の装束','三途の川への旅に備えた旅支度','故人の職業を表す服装','宗派によって異なる礼服'],answer:1,explanation:'死装束の各部は三途の川の旅（あの世への旅）に備えた旅支度です。手甲は手の甲の覆い、脚絆は脛（すね）の覆い、頭陀袋は六文銭などを入れる袋です。笠・杖（あるいは代わりのもの）も含まれます。'},
{chapter:3, type:'4',text:'「火葬場」での骨上げ後の流れとして正しいものはどれか。',choices:['骨壺を火葬場に預ける','骨壺を自宅・斎場に持ち帰り、精進落とし・初七日法要へ','骨壺をすぐに墓地に埋葬する','骨上げ後は何も行わない'],answer:1,explanation:'骨上げで骨壺に収骨した後、埋葬許可証（火葬済み証明）を受け取り、骨壺を自宅または式場に持ち帰ります。その後、精進落とし・初七日法要（繰り込み）などを行い、最終的に四十九日前後に納骨します。'},
{chapter:3, type:'4',text:'「葬儀式場」の選び方として考慮すべき点として誤っているものはどれか。',choices:['収容人数・規模','アクセス（交通の便・駐車場）','式場の宗派（宗教）への対応','式場の外壁の色'],answer:3,explanation:'葬儀式場選びの主な考慮点は①規模・収容人数②交通アクセス③宗教・宗派への対応④設備（安置室・控室・駐車場）⑤費用などです。外壁の色は一般的な選定基準にはなりません。'},
{chapter:3, type:'4',text:'「喪主（もしゅ）」の役割として最も適切なものはどれか。',choices:['葬儀の費用を支払う人','葬儀全体を主宰し、弔問客への応対・挨拶を行う代表者','棺を担ぐ役割','司会進行を担当する役割'],answer:1,explanation:'喪主は葬儀を主宰し、弔問客への応対・挨拶（通夜・出棺・精進落とし）を行う故人遺族の代表者です。葬儀の費用負担は「施主」の役割で、多くの場合は同一人物ですが別の場合もあります。'},
{chapter:3, type:'4',text:'「葬儀の見積もり」において「基本セット」以外に追加費用が発生しやすい項目はどれか。',choices:['火葬許可証の取得','霊柩車の手配','飲食費（精進落とし・通夜振舞い）・返礼品・宗教者への謝礼（お布施）','棺の用意'],answer:2,explanation:'葬儀の費用は基本セット（棺・祭壇・霊柩車・式場など）のほかに、飲食費（通夜振舞い・精進落とし）・返礼品費・お布施・火葬料など「実費」が別途かかるケースが多いです。見積もり確認時に注意が必要です。'},
{chapter:3, type:'4',text:'「エンバーミング（遺体衛生保全）」を行う資格を持つ専門家を何というか。',choices:['納棺師','エンバーマー','湯灌師','葬祭ディレクター'],answer:1,explanation:'エンバーミング（遺体の防腐処置・消毒・修復）を行う専門家を「エンバーマー（Embalmer）」といいます。日本では「IFSA（一般社団法人日本遺体衛生保全協会）」が認定する資格があります。'},
{chapter:3, type:'4',text:'「霊柩車（れいきゅうしゃ）」の種類として誤っているものはどれか。',choices:['宮型霊柩車','洋型霊柩車','バス型霊柩車（マイクロバス型）','寝台型救急車'],answer:3,explanation:'霊柩車の主な種類は①宮型（神社仏閣様の装飾付き）②洋型（リムジン・ワゴン型）③バス型（マイクロバス型・棺と遺族が同乗）④バン型（シンプルな箱型）などです。「寝台型救急車」は遺体搬送に使用される場合もありますが、霊柩車の種類ではありません。'},
{chapter:3, type:'4',text:'「家族葬」の一般的な特徴として正しいものはどれか。',choices:['必ず宗教儀式を省略する','近親者・家族を中心とした小規模な葬儀で、参列者数は限定される','一般葬と費用は変わらない','通夜は行わない'],answer:1,explanation:'家族葬は近親者・家族を中心に行う小規模な葬儀で、参列者を限定します。宗教儀式（読経・焼香など）を行うこともあり、通夜・葬儀の式次第は一般葬と基本的に同じです。費用は規模次第で変わります。'},
{chapter:3, type:'4',text:'「直葬（ちょくそう）」の特徴として正しいものはどれか。',choices:['通夜のみで告別式は行わない','通夜・葬儀・告別式をすべて省略し、火葬のみを行う','家族だけで通夜・告別式を行う','自宅で行う葬儀'],answer:1,explanation:'直葬（直接葬・火葬式）は通夜・葬儀・告別式などの式を一切省略し、火葬のみを行う最もシンプルな葬儀形態です。費用を抑えられる・故人の意思・会葬者が少ないなどの理由から近年増加しています。'},
{chapter:3, type:'4',text:'「一日葬（いちにちそう）」の特徴として正しいものはどれか。',choices:['通夜のみで告別式は行わない','通夜を行わず、葬儀・告別式と火葬を1日でまとめて行う','家族のみで24時間以内に完了する葬儀','参列者なしで行う葬儀'],answer:1,explanation:'一日葬は通夜を省略し、葬儀・告別式と火葬を1日（当日）でまとめて行う葬儀形態です。2日間を1日に短縮するため日程・費用・参列者の負担を軽減できます。宗教儀式（読経など）は行います。'},
{chapter:3, type:'4',text:'「社葬（しゃそう）」の説明として正しいものはどれか。',choices:['社員全員が参列する葬儀','企業・法人が主体となり費用を負担して行う葬儀','神社で行われる葬儀','社会人全員に案内を出す葬儀'],answer:1,explanation:'社葬は企業・法人が葬儀の主体となり費用を負担して行う葬儀で、会社に多大な貢献をした役員・創業者などが対象となることが多いです。会社側が「葬儀委員長」を置いて運営します。遺族葬と合わせた「合同葬」の形式もあります。'},
{chapter:3, type:'4',text:'「お別れ会・偲ぶ会」はどのような場合に行われることが多いか。',choices:['通夜の代わりに行う','密葬・家族葬後に改めて関係者・友人を招いて行う社会的な別れの場','初七日法要の代わりに行う','葬儀費用が払えない場合の代替'],answer:1,explanation:'お別れ会・偲ぶ会は密葬・家族葬で内々に葬儀を終えた後に、会社関係者・友人・ファンなど広い範囲の方々を招いて改めて行う社会的な別れの場です。宗教色を排し、故人の功績を讃える自由な形式が多いです。'},
{chapter:3, type:'4',text:'「死亡届」に必要な書類として正しいものはどれか。',choices:['死亡診断書または死体検案書（医師作成）','葬儀社が発行した証明書','遺言書（公正証書）','健康保険証のコピー'],answer:0,explanation:'死亡届（戸籍法所定の用紙）の提出には医師が作成した「死亡診断書または死体検案書」の添付が必要です。死亡届と死亡診断書は同一用紙の場合が多く、左側が死亡届・右側が死亡診断書となっています。'},
{chapter:3, type:'4',text:'「火葬許可証」を交付するのは誰か。',choices:['都道府県知事','市区町村長','警察署長','葬儀社'],answer:1,explanation:'火葬許可証は死亡届を受理した市区町村長が交付します。遺族（または葬儀社が代行）が死亡届と死亡診断書を市区町村役場に提出し、火葬許可証を受け取ります。これがないと火葬できません。'},
{chapter:3, type:'4',text:'「葬儀の事前相談」を行うメリットとして正しいものはどれか。',choices:['事前相談した葬儀社を必ず利用しなければならない','冷静な状態で費用・内容を比較・検討でき、いざという時に慌てず対応できる','事前相談料が高額になる','家族に知られないようにする必要がある'],answer:1,explanation:'葬儀の事前相談（生前相談）は、身内を亡くしていない冷静な状態で複数社を比較・検討できる点が最大のメリットです。費用・内容・担当者の対応を事前に把握でき、急な訃報時でも慌てず対応できます。相談しても利用義務はありません。'},
{chapter:3, type:'4',text:'「グリーフケア（Grief Care）」の「グリーフ」とは何を意味するか。',choices:['感謝','悲嘆・深い悲しみ','回復','記憶'],answer:1,explanation:'グリーフ（Grief）は英語で「深い悲嘆・悲しみ」を意味し、特に死別など大切な人を失った後の心の痛みを指します。グリーフケアとはこの悲嘆から回復する過程を支援するケアで、葬祭業界でも近年注目されています。'},
{chapter:3, type:'4',text:'「納体袋（のうたいぶくろ）」が使用される主な場面はどれか。',choices:['通常の搬送時','感染症・腐敗・損傷が激しい遺体の搬送・安置時','骨上げの際に遺骨を収める際','エンバーミング後の保管時'],answer:1,explanation:'納体袋（ボディバッグ）は主に感染症による死亡・腐敗が進んだ遺体・損傷の激しい遺体の搬送・安置に使用します。感染拡大防止・遺体保護のために用いられ、使用後は適切に処理されます。'},
{chapter:3, type:'4',text:'「音楽葬」で使用できる音楽として考慮すべき点はどれか。',choices:['クラシック音楽のみ使用できる','著作権のある楽曲を使用する場合、使用許諾・著作権料の支払いが必要な場合がある','葬儀では音楽を流してはいけない','宗教音楽のみ使用できる'],answer:1,explanation:'著作権の存在する楽曲を葬儀・式場で演奏・再生する場合、JASRACなどへの届出・使用料が必要になる場合があります。著作権が切れたパブリックドメインの音楽や、著作権者から許諾を得た音楽は問題ありません。'},
{chapter:3, type:'4',text:'「通夜振舞い（つやぶるまい）」で一般的に用意される料理として最も適切なものはどれか。',choices:['豪華なコース料理','寿司・サンドイッチ・煮物など、立食または着席で食べられる料理','精進料理のみ','ケーキ・デザートのみ'],answer:1,explanation:'通夜振舞いでは寿司・オードブル・煮物・揚げ物など、立食または着席で手軽に食べられる料理が一般的です。かつては精進料理（肉魚なし）が基本でしたが、現代では通常の料理が多くなっています。'},
{chapter:3, type:'4',text:'「骨壺（こつつぼ）」のサイズが東日本と西日本で異なる主な理由はどれか。',choices:['東日本と西日本では火葬の温度が異なるから','東日本は全収骨・西日本は部分収骨のため、必要なサイズが異なる','東日本の方が人口が多いから','法律で地域ごとにサイズが定められているから'],answer:1,explanation:'東日本では遺骨をほぼすべて収骨する「全収骨」が一般的なため骨壺が大きく（7〜8寸）、西日本では一部の骨のみ収骨する「部分収骨」が一般的なため骨壺が小さい（3〜5寸）傾向があります。'},
{chapter:3, type:'4',text:'「喪中（もちゅう）」の期間中に控えることとして一般的でないものはどれか。',choices:['年賀状の送付','慶事（結婚式・お祝いの宴席）への参加','仕事への出勤','神社への参拝（忌中期間は特に）'],answer:2,explanation:'喪中は一年間が一般的で、①年賀状送付の代わりに喪中はがき②慶事参加を控える③神社参拝を忌中期間は控える（神道の死穢の考え方）などが習慣です。仕事への出勤は忌引き期間（通常数日〜1週間程度）後は通常通り行います。'},
{chapter:3, type:'4',text:'「逆さ水（さかさみず）」とはどういうものか。',choices:['通夜の際に出す特別な飲み物','末期の水（故人の唇を湿らせる水）を作る際、通常と逆に水にお湯を注いで作るもの','骨上げ後に手を清める水','枕飾りの水立てに供える水'],answer:1,explanation:'逆さ水は末期の水（まつごのみず）を作る際の作法で、通常の「お湯に水を注ぐ（差し湯する）」順を逆にして「水にお湯を注ぐ」形で作ります。日常の逆（非日常）を表す慣習で、「逆さごと（逆さ屏風・左前の着付けなど）」の一つです。'},
{chapter:3, type:'4',text:'「葬儀後（アフターフォロー）」として葬儀社が行うサービスとして一般的でないものはどれか。',choices:['遺品整理のアドバイス・業者紹介','墓地・納骨についての相談','相続税の計算・申告代行','グリーフケアの案内'],answer:2,explanation:'相続税の計算・申告代行は税理士の業務であり、葬儀社が行うことは法律上できません。葬儀社のアフターフォローとしては遺品整理・墓地相談・グリーフケア・各種行政手続きのアドバイスなどが一般的です。'},
{chapter:3, type:'4',text:'「弔電（ちょうでん）」を送るタイミングとして最も適切なものはどれか。',choices:['葬儀終了後','通夜・葬儀の前日まで（葬儀式場着を確認して）','四十九日法要の際に','一周忌の際に'],answer:1,explanation:'弔電は通夜・葬儀の前日までに送るのが最も適切です。葬儀当日に届くよう手配しても、式が終わってからでは間に合わない場合があります。式場名・喪主名・届け先を確認して早めに手配します。'},
{chapter:3, type:'4',text:'「訃報（ふほう）」の連絡を受けた際の基本的なマナーとして正しいものはどれか。',choices:['すぐに自宅へ押しかけて様子を見に行く','お悔やみの言葉を簡潔に述べ、不必要に長電話しない。通夜・葬儀の日程を確認する','葬儀の費用はいくらかと質問する','故人の死因を詳しく聞く'],answer:1,explanation:'訃報を受けた際は①まずお悔やみの言葉を述べ②長話を避け③通夜・葬儀の日程・場所を確認するのが基本マナーです。死因・年齢・費用などの踏み込んだ質問は避け、遺族の負担に配慮します。'},
{chapter:3, type:'4',text:'「会葬御礼（かいそうおれい）」と「香典返し」の違いとして正しいものはどれか。',choices:['まったく同じもの','会葬御礼は当日全参列者に渡す礼品、香典返しは香典をいただいた方に後日または当日返す返礼品','会葬御礼は仏式のみ、香典返しは神式のみ','会葬御礼は遺族から参列者へ、香典返しは参列者から遺族へ渡すもの'],answer:1,explanation:'会葬御礼は葬儀に参列した全員に当日渡す礼品（会葬礼状・記念品など）で、香典の有無は関係ありません。香典返しは香典をいただいた方への返礼品で、忌明け後（後返し）または当日（即日返し）に渡します。'},
{chapter:3, type:'4',text:'「葬儀の費用（葬儀費用）」のうち、相続税の計算上「債務控除」として認められるものはどれか。',choices:['香典返しの費用','墓地の購入費用','葬儀・通夜・火葬などにかかった費用（お布施・通夜振舞いを含む）','仏壇・仏具の購入費用'],answer:2,explanation:'相続税の計算上、葬式にかかった費用（通夜・葬儀・火葬・骨上げ・お布施・通夜振舞いなど）は債務控除の対象になります。ただし香典返し・墓地購入費・仏壇購入費は対象外です。'},
{chapter:3, type:'4',text:'「枕飯（まくらめし）」とはどういうものか。',choices:['通夜振舞いで出す特別な料理','茶碗に白飯を山盛りにして箸を垂直に立てたもので、枕飾りに供える','骨上げ後に食べる最初の食事','精進落としで出す御飯'],answer:1,explanation:'枕飯は茶碗に白飯を山盛り（蓋が盛り上がるくらい）にして箸を垂直に立てたもので、枕飾り（枕元の小祭壇）に供えます。「日常とは逆（逆さごと）」の表れとして、普段は箸を立てることは縁起が悪いとされますが、この場合は例外です。'},
{chapter:3, type:'4',text:'「葬儀施行報告書」の目的として正しいものはどれか。',choices:['葬儀の費用を遺族に請求するための書類','施行した葬儀の内容・経過を記録し、社内管理・改善に活用する書類','火葬場への届け出書類','市区町村への報告書類'],answer:1,explanation:'葬儀施行報告書は葬儀社が施行した葬儀の内容・経過・担当者・費用などを記録する社内管理書類です。サービス品質の管理・改善・スタッフ教育・顧客フォローなどに活用されます。'},
{chapter:3, type:'4',text:'「葬儀の打ち合わせ（事前打合せ）」で確認すべき最重要事項はどれか。',choices:['遺族の好きな食べ物','宗旨宗派・葬儀規模・日程・費用・式次第・参列者数','式場の駐車場台数','喪主の年齢'],answer:1,explanation:'葬儀の事前打合せで確認すべき最重要事項は①宗旨宗派（式の内容に直結）②規模（参列者数の目安）③日程（通夜・葬儀の日時）④費用の概算（見積もり）⑤式次第（通夜振舞い・弔辞・音楽など）です。'},
{chapter:3, type:'4',text:'「遺影写真（いえいしゃしん）」の選び方として適切なものはどれか。',choices:['必ずスーツ・礼服を着た写真を選ぶ','故人の表情がよく分かる、できるだけ近年撮影された写真を選ぶ','白黒写真でなければならない','プロのカメラマンが撮影した写真のみ使用できる'],answer:1,explanation:'遺影は故人らしさが伝わる、表情のよく分かる写真を選ぶのが基本です。できるだけ近年撮影されたもの（顔が大きく写っているもの）が適切です。服装・背景・撮影者は問わず、デジタル写真から加工・拡大することもできます。'},
{chapter:3, type:'4',text:'「喪章（もしょう）」とはどういうものか。',choices:['喪服の一種で、特別な礼服','葬儀に参列したことを示す黒いリボン・腕章などで、喪に服していることを示すもの','葬儀の案内状','喪主の名札'],answer:1,explanation:'喪章は喪（もがり・葬儀）に関係した人が着用する印で、黒いリボン・腕章・バッジなどの形があります。喪主・遺族・葬儀関係者・社葬の参列者などが付けることで、喪に服していることを示します。'},
{chapter:3, type:'4',text:'「ご遺体（ご遺体）の移動」に関して必要な書類として正しいものはどれか。',choices:['特に書類は不要','死亡診断書または死体検案書が必要（移動前に医師に作成してもらう）','住民票が必要','健康保険証が必要'],answer:1,explanation:'遺体の移動（搬送）には、医師が作成した「死亡診断書または死体検案書」が必要です。この書類なしに遺体を移動させることは法律上問題となります。葬儀社は搬送の際に書類確認を行います。'},
{chapter:3, type:'4',text:'「葬儀の見積書」の確認ポイントとして最も重要なものはどれか。',choices:['葬儀社の社歴','基本セットに何が含まれ何が含まれないか（別途実費が何か）を明確にすること','式場の建物の古さ','担当者の年齢'],answer:1,explanation:'葬儀の見積書で最重要なのは①基本セット（パック）に含まれる項目の詳細②含まれない別途実費（飲食費・お布施・返礼品・火葬料など）の明示③追加費用が発生する条件です。総額がいくらになるかを事前に把握することが大切です。'},
{chapter:3, type:'4',text:'「訃報（ふほう）の連絡」を行うタイミングとして最も一般的なものはどれか。',choices:['葬儀終了後にまとめて連絡する','臨終直後または臨終当日に、まず親族・近親者へ連絡し、その後関係者に通夜・葬儀の日程を連絡する','四十九日が終わってから連絡する','一周忌に合わせて連絡する'],answer:1,explanation:'訃報の連絡は①臨終直後にまず配偶者・子・兄弟など近親者②その後祖父母・叔父叔母などの親族③故人の友人・知人④会社・職場関係者の順で連絡します。通夜・葬儀の日程が決まったら改めて詳細を連絡します。'}
,

// --- 仏教各宗派・深掘り ---
{ chapter:3, type:'ox', text:'「禅（ぜん）」とはサンスクリット語の「ディヤーナ（瞑想）」に由来する言葉である。', answer:true, explanation:'「禅」は梵語（サンスクリット語）の「ディヤーナ（dhyāna）」が中国語で「禅那（ぜんな）」と音写され、「禅」と略されたものです。「瞑想・禅定」という意味で、坐禅（坐った瞑想）の実践を通じて悟りを目指す修行法を指します。' },
{ chapter:3, type:'ox', text:'「臨済宗妙心寺派」は日本最大の臨済宗の派で、全国に約3500か寺の末寺を持つ。', answer:true, explanation:'臨済宗は現在14の派に分かれており、その中で最大勢力を持つのが妙心寺派（総本山：妙心寺、京都市右京区）です。臨済宗は室町幕府の保護を受け、五山制度のもとで文化的にも大きな役割を果たしました。' },
{ chapter:3, type:'ox', text:'「道元」は永平寺を開いた後、一度も比叡山に戻ることなく越前（福井県）で一生を終えた。', answer:false, explanation:'道元は永平寺開山後、1247年に鎌倉幕府の執権・北条時頼に招かれて鎌倉に下向しましたが、約半年で帰山しました。また1253年に病を得て京都に上り、在京中に53歳で入寂（死去）しました。' },
{ chapter:3, type:'ox', text:'「法然」の弟子である「親鸞」は、師の教えをより徹底させ「他力本願」の思想を発展させた。', answer:true, explanation:'法然が「専修念仏」（ひたすら念仏を称えること）を説いたのに対し、親鸞はさらにそれを深め、自己の力（自力）を完全に捨て阿弥陀仏の働き（他力）にすべてを委ねる「絶対他力」の思想を確立しました。主著は「教行信証」です。' },
{ chapter:3, type:'ox', text:'浄土真宗の「歎異抄（たんにしょう）」は親鸞自身が書いた著作である。', answer:false, explanation:'歎異抄は親鸞の弟子・唯円（ゆいえん）が書いたとされる書物で、師・親鸞の言葉を記録しその教えの歪みを嘆いた内容です。「善人なほもて往生をとぐ、いはんや悪人をや」という言葉（悪人正機）が有名で、親鸞の著作ではありません。' },
{ chapter:3, type:'ox', text:'「日蓮宗」では、日蓮の遺骨が納められた身延山が聖地とされ、多くの信者が参詣に訪れる。', answer:true, explanation:'日蓮上人は身延山（山梨県）で晩年の約9年を過ごし、1282年に入滅しました。身延山久遠寺には日蓮の御廟所（お墓）があり、日蓮宗の総本山として多くの参詣者が訪れます。「身延詣り」は日蓮宗信者の重要な巡礼です。' },
{ chapter:3, type:'ox', text:'「真言宗」の「真言（マントラ）」は、意味を理解して唱えることが重要とされる。', answer:false, explanation:'真言（マントラ）は密教において「秘密の言葉」とされ、意味を論理的に理解して唱えることより、音（声）そのものに神聖な力があると考えられています。梵語のまま唱えることが重視され、翻訳しないことが原則です。' },
{ chapter:3, type:'ox', text:'「四弘誓願（しぐせいがん）」は、菩薩（悟りを求める者）が立てる四つの誓いで、多くの宗派の葬儀でも唱えられる。', answer:true, explanation:'四弘誓願とは①衆生無辺誓願度（すべての衆生を救う）②煩悩無尽誓願断（すべての煩悩を断つ）③法門無量誓願学（すべての法門を学ぶ）④仏道無上誓願成（最高の仏道を成就する）の四つです。多くの宗派の法要で唱えられます。' },
{ chapter:3, type:'ox', text:'「浄土宗」の増上寺（東京）は、徳川将軍家の菩提寺として知られる。', answer:true, explanation:'増上寺（東京都港区）は浄土宗の大本山で、徳川家康が江戸入府後に菩提寺と定めました。2代秀忠・6代家宣・7代家継・9代家重・12代家慶・14代家茂の将軍とその家族が埋葬されています。' },
{ chapter:3, type:'ox', text:'「臨済宗」の「公案（こうあん）」は、論理的な思考で解くことができる哲学的な問いかけである。', answer:false, explanation:'公案は「隻手の声を聞け」「父母未生以前の本来の面目とは何か」など、論理的・概念的思考では解けない問いです。これに取り組むことで思考の限界を超え、直接的な悟りの体験（見性）を目指すのが臨済宗の修行法です。' },

// --- 神式深掘り ---
{ chapter:3, type:'ox', text:'神道の「八百万（やおよろず）の神」とは、自然・万物すべてに神が宿るという考え方を表す。', answer:true, explanation:'「八百万の神」は日本神道の多神教的・アニミズム的な世界観を象徴する表現で、山・川・海・木・動物・人間など自然界のすべてに神が宿ると考えます。「八百万」は無数に多いという意味の表現です。' },
{ chapter:3, type:'ox', text:'神式葬儀では「御神酒（おみき）」を供えるのが一般的であるが、火葬後は供えない。', answer:false, explanation:'神式葬儀では故人への供え物（神饌・しんせん）として御神酒・米・塩・水・野菜・魚などを供えます。火葬後（火葬祭・帰家祭）でも御神酒を含む供え物を捧げます。供え物を控える特定の場面はありますが「火葬後は供えない」というルールはありません。' },
{ chapter:3, type:'ox', text:'「伊勢神宮（内宮）」の御祭神は、天照大御神（あまてらすおおみかみ）である。', answer:true, explanation:'伊勢神宮の内宮（皇大神宮）の御祭神は天照大御神で、太陽の神・皇室の祖先神として日本神道の最高位に位置づけられます。外宮（豊受大神宮）の御祭神は豊受大御神（食物・農業の神）です。' },
{ chapter:3, type:'ox', text:'神葬祭における「斎主（さいしゅ）」は仏式の「導師（僧侶）」に相当する役割を担う。', answer:true, explanation:'斎主は神葬祭を主宰する神職のことで、仏式の導師（葬儀を主宰する僧侶）に相当します。祝詞（のりと）の奏上・各種の儀礼の執行など、式全体を取り仕切ります。' },
{ chapter:3, type:'ox', text:'神道では「穢れ（けがれ）」を払うために「禊（みそぎ）」を行う。', answer:true, explanation:'禊（みそぎ）は水で身体を洗い清めることで穢れを祓う神道の浄化儀礼です。伊邪那岐命が黄泉の国から戻った際に禊を行ったという神話が起源とされます。現代の神式葬儀後の「清祓」も穢れを払う儀礼のひとつです。' },

// --- キリスト教深掘り ---
{ chapter:3, type:'ox', text:'「カトリック」とはギリシャ語で「普遍的な」という意味である。', answer:true, explanation:'「カトリック（Catholic）」はギリシャ語「カトリコス（katholikos）」に由来し、「普遍的な・全体にわたる」という意味です。「普遍教会（普遍的なキリストの教会）」という意味でカトリックと呼ばれます。' },
{ chapter:3, type:'ox', text:'「プロテスタント」という名称は、16世紀の宗教改革において改革派が旧体制に「抗議（プロテスト）」したことに由来する。', answer:true, explanation:'「プロテスタント」は1529年のシュパイヤー帝国議会でカトリック側の決定に対してルター派諸侯が「抗議（Protestatio）」したことに由来します。現在は「プロテスト（抗議）」という意味よりも、宗教改革から生まれたキリスト教各派の総称として使われています。' },
{ chapter:3, type:'ox', text:'日本のキリスト教人口は総人口の約30%を占める。', answer:false, explanation:'日本のキリスト教人口は総人口の約1〜2%程度とされており、非常に少数派です（カトリック・プロテスタント・正教会などを合わせて）。仏教徒（約67〜70%）・神道（約70〜80%、重複含む）と比べて大幅に少ない数字です。' },
{ chapter:3, type:'ox', text:'「正教会（せいきょうかい）」は東方キリスト教の一派で、ロシア正教・ギリシャ正教などがある。', answer:true, explanation:'正教会（Eastern Orthodox Church）は1054年のキリスト教大分裂でカトリックと分かれた東方キリスト教の流れで、ロシア正教会・ギリシャ正教会・日本正教会（ハリストス正教会）などがあります。日本では幕末に伝来しました。' },
{ chapter:3, type:'ox', text:'キリスト教の「臨終の秘跡（病者の塗油）」は、死が迫った時に司祭が行う儀礼でカトリックのみの慣行である。', answer:true, explanation:'病者の塗油（かつての「終油の秘跡」）はカトリックの七つの秘跡（サクラメント）のひとつで、重篤な患者や臨終の際に司祭が聖油を塗り祈る儀礼です。プロテスタントは一般的にこのような秘跡の制度を持ちません。' },

// --- 新宗教・諸派深掘り ---
{ chapter:3, type:'ox', text:'「天理教」では死を「出直し（でなおし）」と表現し、現世での修行を終えて神のもとへ帰ると考える。', answer:true, explanation:'天理教では人の死を否定的に捉えず、「神から借りていた体を返し、魂が生まれ直す（出直す）」という積極的な意味を持たせています。このため葬儀の場でも「死」「亡くなる」などの言葉を使わず「出直す」と言います。' },
{ chapter:3, type:'ox', text:'「霊友会（れいゆうかい）」は仏教系の新宗教で、現在も多くの派生宗教を生み出している。', answer:true, explanation:'霊友会（1919年創設）は法華経と先祖供養を基本とする新宗教で、立正佼成会・仏所護念会・妙智会など多くの派生宗教（分派）を生み出しました。これらをまとめて「霊友会系」と呼ぶこともあります。' },
{ chapter:3, type:'ox', text:'「世界救世教（せかいきゅうせいきょう）」は岡田茂吉が開いた新宗教で、「浄霊（じょうれい）」と呼ばれる手かざし療法が特徴である。', answer:true, explanation:'世界救世教は1935年に岡田茂吉（もきち）が開いた新宗教で、「光」を手から放射して病気を治す「浄霊」が特徴的な実践です。MOA美術館（静岡・東京）の運営でも知られます。' },
{ chapter:3, type:'ox', text:'「生長の家（せいちょうのいえ）」は谷口雅春が開いた新宗教で、「神の子」として人間の完全性を説く。', answer:true, explanation:'生長の家は1930年に谷口雅春が開いた新宗教で、「人間は神の子であり本来完全・善・美である」という「神人不二」の思想を説きます。雑誌「生長の家」の出版・「聖使命」誌などを通じて広まりました。' },
{ chapter:3, type:'ox', text:'「神社神道」と「教派神道」は同じものである。', answer:false, explanation:'神社神道は全国の神社・神宮で行われる伝統的な神道です。教派神道は明治時代に政府が公認した天理教・金光教・黒住教など13の宗教団体を指します。神社神道は国家管理下に置かれ（戦前）、教派神道は民間宗教として別扱いされました。' },
{ chapter:3, type:'ox', text:'「黒住教（くろずみきょう）」は江戸時代後期に岡山で成立した神道系の新宗教で、太陽神・天照大御神への信仰が中心である。', answer:true, explanation:'黒住教は1814年に岡山の神官・黒住宗忠が「天命直授（てんめいじきじゅ）」の神秘体験を経て開いた神道系新宗教です。太陽（天照大御神）への信仰と感謝を中心に、明るく積極的な生き方を説きます。教派神道の一つです。' },

// --- 法要・忌日深掘り ---
{ chapter:3, type:'ox', text:'「三十三回忌」は多くの宗派で「弔い上げ（とむらいあげ）」とされ、以後の個別の年忌法要を終了することが多い。', answer:true, explanation:'三十三回忌（満32年後）は多くの仏教宗派で年忌法要の締めくくり（弔い上げ）とされます。この後は個人として祀るのをやめ、先祖代々の霊として合祀する場合が多いです。地域・宗派によっては五十回忌を弔い上げとすることもあります。' },
{ chapter:3, type:'ox', text:'「月命日（つきめいにち）」とは、毎月その人が亡くなった日と同じ日付のことである。', answer:true, explanation:'月命日は毎月巡ってくる命日で、例えば3月15日に亡くなった場合、毎月15日が月命日です。年に一度の「命日（祥月命日・しょうつきめいにち）」と区別して「月命日」と呼びます。月命日に墓参りや仏前での手を合わせを行う習慣があります。' },
{ chapter:3, type:'ox', text:'「祥月命日（しょうつきめいにち）」とは、故人が亡くなった月日（月と日）が一致する、年に一度の命日のことである。', answer:true, explanation:'祥月命日（正忌・しょうき）は故人が亡くなった月と日が同じ、年に一度の本来の命日です。毎月の「月命日」と区別します。一周忌・三回忌などの年忌法要は原則としてこの祥月命日に行います。' },
{ chapter:3, type:'ox', text:'「涅槃会（ねはんえ）」は釈迦の誕生を祝う仏教行事である。', answer:false, explanation:'涅槃会は2月15日に釈迦の入滅（死去）を偲ぶ仏教行事です。釈迦の誕生を祝う行事は「花まつり（灌仏会・かんぶつえ）」で4月8日に行われます。「成道会（じょうどうえ）」は12月8日に釈迦の悟りを祝う行事です。' },
{ chapter:3, type:'ox', text:'「お盆（盂蘭盆会）」は仏教行事であり、先祖の霊が年に一度この世に戻ってくると信じられている。', answer:true, explanation:'お盆（盂蘭盆会・うらぼんえ）はインドの仏教行事が日本の祖先信仰・神道と融合した行事です。8月13日に迎え火で先祖の霊を迎え、16日に送り火で送り出す慣習があります（地域によっては7月）。精霊棚・盆踊りなど日本独自の文化も生まれました。' },

// --- 葬儀マナー・実務 ---
{ chapter:3, type:'ox', text:'葬儀に参列する際の数珠は、宗派の違う葬儀でも自分の宗派の数珠を使って構わない。', answer:true, explanation:'数珠は本来その宗派専用のものがありますが、葬儀に参列する際は自分の宗派の数珠（または「略式数珠」）を持参することが一般的で、他宗派の葬儀でも使用して問題ありません。数珠を持参すること自体が礼儀とされます。' },
{ chapter:3, type:'ox', text:'「喪中はがき」は一般的に故人が亡くなった翌年の年賀状シーズンに合わせて11〜12月に送る。', answer:true, explanation:'喪中はがき（年賀欠礼状）は、相手が年賀状を書く前に届くよう11月〜12月初旬に送るのが一般的なマナーです。年賀状が届いた後に喪中の事を知った場合は「寒中見舞い」で返答します。' },
{ chapter:3, type:'ox', text:'「香典（こうでん）」の語源は、線香・焼香など香を供えることへのお礼が金銭に変化したものとされる。', answer:true, explanation:'香典はもともと「香料（こうりょう）」とも呼ばれ、線香・香などを供えることへの代わりとして金銭を包むようになったものです。「典」は「典礼・儀式」という意味で、「香を供える儀礼への志」という意味合いがあります。' },
{ chapter:3, type:'ox', text:'「弔電（ちょうでん）」は葬儀に参列できない場合に喪家に送る電報で、現代でもNTTなどを通じて送ることができる。', answer:true, explanation:'弔電は葬儀に参列できない際に喪主宛てに送る電報形式のお悔やみで、現代でもNTT・KDDI・電報各社のサービスを通じて送ることができます。葬儀式場に届くよう、通夜・葬儀の前日までに手配するのが一般的です。' },
{ chapter:3, type:'ox', text:'葬儀の「受付」は遺族が担当するのが正式なマナーである。', answer:false, explanation:'葬儀の受付は故人の友人・知人・会社の同僚など「世話人（てつだい人）」が担当するのが一般的です。遺族は弔問客への挨拶・接待・式の進行に専念するため、受付は他の人に委ねるのが通例です。' },

// --- 葬儀形式・現代的変化 ---
{ chapter:3, type:'ox', text:'「音楽葬（おんがくそう）」とは、故人が好んだ音楽を式中に流したり演奏したりする葬儀形式で、無宗教葬の一種である。', answer:true, explanation:'音楽葬は宗教的な儀礼の代わりに、または組み合わせて、故人が愛した音楽を中心に構成する葬儀形式です。無宗教葬（自由葬）の中でも増加しており、生演奏・録音再生・合唱など様々な形があります。' },
{ chapter:3, type:'ox', text:'「グリーフケア」は遺族支援のためのケアであり、葬儀社が提供するアフターフォローとしても注目されている。', answer:true, explanation:'グリーフケアは死別などによる悲嘆（グリーフ）を抱えた遺族を心理的・社会的に支援するケアです。近年、葬儀社が葬儀後の遺族を訪問したり、グリーフケアの場を提供したりするアフターフォローの一環として提供するケースが増えています。' },
{ chapter:3, type:'ox', text:'「手元供養（てもとくよう）」とは、遺骨の一部を小さな骨壺や専用のアクセサリーに入れて手元に置いて供養する方法である。', answer:true, explanation:'手元供養は墓への納骨に加えて（または代わりに）遺骨の一部を手元に置いて供養する方法です。ミニ骨壺・メモリアルジュエリー（遺骨を入れたアクセサリー）・ぬいぐるみ型など様々な形があり、近年増加しています。' },
