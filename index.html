// --- 仏教宗派詳細 ---
{ chapter:3, type:'4', text:'「浄土真宗大谷派（東本願寺）」の焼香作法として正しいものはどれか。', choices:['額に押しいただいて1回','額に押しいただかずに1回','額に押しいただかずに2回','額に押しいただいて3回'], answer:2, explanation:'真宗大谷派（東本願寺）の焼香は「押しいただかず（額に当てず）に2回」が正式な作法です。浄土真宗本願寺派（西本願寺）は「押しいただかずに1回」です。この違いは覚えておく必要があります。' },
{ chapter:3, type:'4', text:'「一向宗（いっこうしゅう）」とは何の別称か。', choices:['曹洞宗','日蓮宗','浄土真宗','時宗'], answer:2, explanation:'一向宗は浄土真宗（本願寺）の俗称で、「ひたすら（一向に）阿弥陀仏を念じる」という意味から付いた呼び名です。戦国時代に各地で起きた「一向一揆」は浄土真宗（一向宗）の門徒が起こした武装蜂起でした。' },
{ chapter:3, type:'4', text:'「修験道（しゅげんどう）」の特徴として正しいものはどれか。', choices:['純粋な仏教の宗派','山岳での厳しい修行を通じて呪力を得ようとする、仏教・神道・道教などが融合した宗教実践','キリスト教の影響を受けた日本固有の宗教','武士道を宗教化した日本独自の精神形式'], answer:1, explanation:'修験道は山岳に神仏が宿るという信仰のもと、峰入り（山中での修行）を通じて霊力・呪力（験力）を得ようとする宗教実践で、仏教（特に密教）・神道・道教・山岳信仰などが融合しています。役小角（えんのおづぬ）を開祖とします。' },
{ chapter:3, type:'4', text:'「高野山（こうやさん）」について正しい説明はどれか。', choices:['天台宗の総本山がある山','真言宗の総本山・金剛峯寺がある霊場で、世界遺産にも登録されている','日蓮宗の創始者・日蓮が晩年を過ごした山','禅宗の修行道場が集まる山'], answer:1, explanation:'高野山（和歌山県伊都郡高野町）は真言宗の総本山・金剛峯寺がある霊場で、2004年に「紀伊山地の霊場と参詣道」としてユネスコ世界遺産に登録されました。奥之院には空海の御廟所があり、今も生きて定を続けていると信じられています。' },
{ chapter:3, type:'4', text:'「比叡山（ひえいざん）」延暦寺の説明として正しいものはどれか。', choices:['真言宗の総本山','浄土宗の開祖・法然が開いた寺','天台宗の総本山で、多くの鎌倉仏教の開祖を輩出した日本仏教の母山','日蓮宗の総本山'], answer:2, explanation:'比叡山延暦寺（滋賀県大津市）は天台宗の総本山で、最澄（伝教大師）が開きました。法然・親鸞・道元・日蓮・栄西など鎌倉時代の多くの宗祖が修行した場所であり「日本仏教の母山」と呼ばれます。2004年に世界遺産登録。' },
{ chapter:3, type:'4', text:'「永平寺（えいへいじ）」について正しい説明はどれか。', choices:['臨済宗の総本山','曹洞宗の大本山のひとつで、道元が開いた寺','浄土真宗の本山','真言宗の別院'], answer:1, explanation:'永平寺（福井県吉田郡永平寺町）は曹洞宗の大本山のひとつで、道元が1244年に開きました。現在も多くの雲水（修行僧）が修行する「参禅道場」として知られます。もう一つの大本山は横浜の總持寺です。' },
{ chapter:3, type:'4', text:'「知恩院（ちおんいん）」の説明として正しいものはどれか。', choices:['曹洞宗の総本山','浄土宗の総本山で、法然上人が念仏を広めた地に建てられた','日蓮宗の大本山','浄土真宗の別院'], answer:1, explanation:'知恩院（京都市東山区）は浄土宗の総本山で、法然上人が念仏の教えを広め、入定（死去）した地に建てられました。三門（国宝）は木造建築として日本最大級の規模を誇ります。除夜の鐘でも有名です。' },
{ chapter:3, type:'4', text:'「宗祖（しゅうそ）」と「中興の祖（ちゅうこうのそ）」の違いとして正しいものはどれか。', choices:['宗祖は現在の宗派のトップ、中興の祖は歴史上の人物','宗祖はその宗派を開いた人物、中興の祖は後に宗派を再興・発展させた人物','まったく同じ意味','宗祖は仏教用語、中興の祖は神道用語'], answer:1, explanation:'宗祖はその宗派の開祖を指します。中興の祖は宗派が衰えた時期にそれを再び盛んにした功績ある人物のことです。例えば曹洞宗では道元が宗祖、瑩山紹瑾が中興の祖とされます。' },

// --- 神式詳細 ---
{ chapter:3, type:'4', text:'神式葬儀の「発柩祭（はっきゅうさい）」とは何か。', choices:['火葬場で行う最後の儀式','棺を斎場・自宅から出棺する際の儀式','骨上げの際の儀式','帰宅後の清めの儀式'], answer:1, explanation:'発柩祭は棺を安置場所（自宅・斎場）から出棺する際に行う神式の儀式です。仏式の「出棺」に相当します。出棺の際に神職が祝詞を奏上し、一同が玉串を奉奠して故人の旅立ちを送ります。' },
{ chapter:3, type:'4', text:'神式葬儀における香典の正しい表書きはどれか。', choices:['御仏前','御花料','御玉串料または御榊料','御霊前のみ'], answer:2, explanation:'神式葬儀への香典は「御玉串料（おたまぐしりょう）」または「御榊料（おさかきりょう）」が最も適切です。「御神前（ごしんぜん）」「御霊前」も使えます。「御仏前」は仏式専用です。' },
{ chapter:3, type:'4', text:'神道における「祓詞（はらえことば）」とはどういうものか。', choices:['葬儀の際に奏上する弔いの言葉','穢れや罪を祓い清めるために唱える祝詞（のりと）','神社への参拝時に述べる感謝の言葉','神職の身分を証明する言葉'], answer:1, explanation:'祓詞は穢れ・罪・災いを祓い清めるために唱える祝詞で、「払へ給ひ清め給へと申す事を聞こし召せと白す」という内容が含まれます。神葬祭でも各種の儀礼で祓詞が奏上されます。' },

// --- 諸宗教・比較 ---
{ chapter:3, type:'4', text:'「イスラム教」の葬儀の特徴として正しいものはどれか。', choices:['火葬が原則で、できるだけ早く行う','土葬が原則で、死後できるだけ早く（24時間以内が理想）行う','散骨が推奨される','遺体は7日間安置してから埋葬する'], answer:1, explanation:'イスラム教では遺体を土に還すことが教義上の原則のため土葬です。また「早い埋葬が故人への敬意」とされ、死後できるだけ早く（24時間以内が理想）に行います。日本では土葬できる墓地が少なく課題となっています。' },
{ chapter:3, type:'4', text:'ユダヤ教の葬儀の特徴として正しいものはどれか。', choices:['豪華な棺を使い、長期間かけて行う','シンプルな木製の棺を使い、死後できるだけ早く土葬する','火葬を推奨する','僧侶が読経する'], answer:1, explanation:'ユダヤ教では「人間は土から生まれ土に返る」という考えから、土葬が原則です。棺はシンプルな木製（木釘使用・金具不使用）が伝統で、土に早く還るようにします。死後24時間以内の埋葬が理想とされます。' },
{ chapter:3, type:'4', text:'ヒンドゥー教の葬儀の特徴として正しいものはどれか。', choices:['土葬が原則','火葬が原則で、ガンジス川での水葬も行われる','遺体は保存処理して長期間安置する','読経を3日間続ける'], answer:1, explanation:'ヒンドゥー教では輪廻転生の思想から「肉体はただの入れ物」と考え、火葬（荼毘・だび）が一般的です。インドではガンジス川沿いの火葬場（ガート）で火葬し、遺灰を川に流す慣習があります。仏教の「荼毘に付す」という言葉もヒンドゥー教由来です。' },
{ chapter:3, type:'4', text:'「神道」「仏教」「キリスト教」「イスラム教」の中で、日本人の葬儀で最も多く行われているのはどれか。', choices:['神道（神葬祭）','仏教式（仏式）','キリスト教式','イスラム教式'], answer:1, explanation:'日本の葬儀は仏教式が最も多く、約90%前後とされています（調査機関・時期によって異なります）。神式は数%程度、キリスト教式は1〜2%程度です。ただし近年は無宗教・家族葬の増加により、宗教色のない葬儀も増えています。' },
{ chapter:3, type:'4', text:'次のうち「教派神道」として明治政府が公認した13派に含まれないものはどれか。', choices:['天理教','黒住教','金光教','創価学会'], answer:3, explanation:'教派神道（神道十三派）は明治政府が公認した神道系宗教で、黒住教・神道修成派・出雲大社教・扶桑教・実行教・大成教・神習教・御嶽教・神道大社教・禊教・金光教・天理教・神道本局の13派です。創価学会は日蓮宗系の新宗教であり含まれません。' },

// --- 法要・文化 ---
{ chapter:3, type:'4', text:'「お彼岸（おひがん）」に行う主な供養として一般的なものはどれか。', choices:['神社への参拝と玉串奉奠','墓参り・仏壇への供養・法要','教会での礼拝と献花','散骨と海洋供養'], answer:1, explanation:'お彼岸（春分・秋分の前後各3日間）には先祖の墓参り・仏壇への供物・法要などが行われます。「ぼたもち（牡丹餅）」「おはぎ（御萩）」を供える慣習も有名です（春はぼたもち、秋はおはぎ）。神式・キリスト教式では一般的な行事ではありません。' },
{ chapter:3, type:'4', text:'「四十九日」に行う一般的な作法として誤っているものはどれか。', choices:['仮の白木位牌から本位牌へ切り替える','香典の表書きを「御霊前」から「御仏前」に変更する','納骨を行う','喪中はがきを送る'], answer:3, explanation:'喪中はがき（年賀欠礼状）は11〜12月に送るもので、四十九日のタイミングで送るものではありません。四十九日では①白木位牌から本位牌への切り替え②納骨③忌明けのお礼④「御霊前」→「御仏前」への表書き変更、などが一般的に行われます。' },
{ chapter:3, type:'4', text:'「回向（えこう）」とはどういう意味か。', choices:['お墓の向きを変えること','自分の功徳（善行・読経など）を故人や他の人のために振り向けること','葬儀場の方向を確認すること','仏壇の向きを直すこと'], answer:1, explanation:'回向（廻向）とは自分が積んだ善根・功徳を他の者（故人や生きている人）のために振り向けることです。法要での読経・布施などが回向の代表的な実践で、「追善回向」は故人の冥福のために行う追善供養を指します。' },
{ chapter:3, type:'4', text:'「施餓鬼（せがき）」法要とは何か。', choices:['葬儀の費用を計算する儀礼','餓鬼道に苦しむ霊や無縁仏に食物を施す供養法要','お盆に行う盆踊りの起源となった儀式','彼岸に行う先祖供養の特別法要'], answer:1, explanation:'施餓鬼法要は、餓鬼道（飢えに苦しむ世界）に堕ちた霊や無縁仏（供養する人のない霊）に食物を施して供養する法要です。お盆の時期や彼岸に合わせて行われることが多く、お寺が主催する合同の施餓鬼法要も各地で行われます。' },
{ chapter:3, type:'4', text:'「位牌（いはい）」の説明として正しいものはどれか。', choices:['神式で使用する霊魂の依代','仏式で戒名・没年月日・俗名などを記した木製の牌で、故人の霊の依代とされる','キリスト教式で聖書を置く台','葬儀場の案内表示板'], answer:1, explanation:'位牌は仏式で使用する木製の牌で、戒名・没年月日・俗名・享年などが記されます。故人の霊の依代（よりしろ）として仏壇に安置し、日々の供養の対象となります。葬儀直後は白木の「仮位牌（白木位牌）」を使い、四十九日後に塗位牌・本位牌に変えます。' },
{ chapter:3, type:'4', text:'「通夜振舞い（つやぶるまい）」とは何か。', choices:['通夜の式次第の進行のこと','通夜終了後に参列者を接待する会食のこと','通夜の際に喪主が挨拶すること','通夜の翌朝に行う朝食のこと'], answer:1, explanation:'通夜振舞いは通夜の式が終わった後、参列者に飲食でもてなす会食のことです。故人との思い出を語り合い、遺族が参列へのお礼をする場でもあります。料理は寿司・オードブル・精進料理などが多く、地域によって内容が異なります。' },
{ chapter:3, type:'4', text:'「中陰（ちゅういん）」とは何を指すか。', choices:['仏壇のある部屋のこと','死後に次の生を受けるまでの49日間の状態','仏教の瞑想修行の一種','葬儀と告別式の間の休憩時間'], answer:1, explanation:'中陰（中有）とは仏教において、死後に次の生（転生）を受けるまでの過渡的な状態・期間を指します。この期間は49日間（七七日）とされ、7日ごとに裁きを受けると考えられています。これが四十九日法要を重視する根拠となっています。' },
{ chapter:3, type:'4', text:'「引導（いんどう）」を渡す主な目的として正しいものはどれか。', choices:['遺体を火葬場まで運ぶ','故人の霊を迷いから解放し、仏の世界へ導く','遺族に葬儀の費用を説明する','参列者に式の進行を案内する'], answer:1, explanation:'引導は導師（僧侶）が故人に向けて引導文（いんどうぶん）を読み上げ、この世への執着を断ち切って迷わず仏の世界へ向かうよう導く儀式です。仏式葬儀（特に禅宗）の中核をなす重要な儀礼のひとつです。' },
{ chapter:3, type:'4', text:'「導師（どうし）」が複数の僧侶で行う葬儀の場合、最も位の高い僧侶はどの役割を担うか。', choices:['受付・案内','導師（引導を渡す主役の僧侶）','斎主（神職の役割）','葬儀社の担当者'], answer:1, explanation:'複数の僧侶が参列する葬儀では、最も地位の高い（または住職・故人と最も縁の深い）僧侶が「導師」として引導・読経の中心的役割を務めます。他の僧侶は「伴僧（ばんそう）・脇僧（わきそう）」として導師を補佐します。' },
{ chapter:3, type:'4', text:'「焼香」の「抹香（まっこう）」とはどういうものか。', choices:['線香を細かく粉末にしたもの，または香木・香料を粉末にしたもの','ロウソクに火をつける道具','仏壇に供える果物や菓子','焼香台の炭火のこと'], answer:0, explanation:'抹香（まっこう）は香木・香料などを細かく粉末状にしたもので、焼香の際に指でつまんで炭火の上に落として焚きます。「沈香（じんこう）」「白檀（びゃくだん）」など香木が主原料です。' },
{ chapter:3, type:'4', text:'「般若心経（はんにゃしんぎょう）」はどの宗派でも広く読まれているか。', choices:['浄土真宗でも必ず読まれる','浄土真宗では読まれないが、他の多くの宗派で広く読まれている','日蓮宗でのみ読まれる','キリスト教でも取り入れている'], answer:1, explanation:'般若心経は真言宗・天台宗・禅宗（曹洞宗・臨済宗）・浄土宗など多くの宗派で読まれる経典です。しかし浄土真宗では「阿弥陀経・正信偈」など浄土三部経が中心で、般若心経は読みません。日蓮宗も法華経が中心です。' },
{ chapter:3, type:'4', text:'「過去帳（かこちょう）」を毎日めくる習慣について正しいものはどれか。', choices:['浄土真宗では毎日めくり、その日の命日の故人に手を合わせる習慣がある','すべての宗派で必ず毎日めくる','過去帳はめくらずに保管するだけのもの','過去帳は寺院だけが持つもの'], answer:0, explanation:'浄土真宗では過去帳を命日帳として毎日めくり（日付のある「日めくり型過去帳」）、その日に命日を迎える先祖に手を合わせる習慣があります。位牌を使わない浄土真宗において過去帳は重要な供養の道具です。' },
{ chapter:3, type:'4', text:'「檀家（だんか）」制度の説明として正しいものはどれか。', choices:['江戸幕府が設けた制度で、すべての人が特定の寺院に所属することを義務付けた','平安時代に始まった貴族と寺院の関係','神社と氏子の関係を指す','葬儀社が顧客を管理するシステム'], answer:0, explanation:'檀家制度は江戸幕府がキリシタン禁制のために設けた「寺請制度（てらうけせいど）」に基づくもので、すべての民衆が特定の寺院の檀家となり、宗教証明を受けることを義務付けました。これが現代の「菩提寺（ぼだいじ）」制度の起源です。' },

// --- 追加30問（○×15・4択15）---
{ chapter:3, type:'ox', text:'「お布施（おふせ）」は葬儀サービスへの対価（報酬）であり、消費税の課税対象となる。', answer:false, explanation:'お布施は僧侶・寺院への感謝として渡すものであり、法的には「寄付金（布施）」の性格を持ちます。対価性のない寄付のため消費税は不課税です。金額の明示義務もなく、「お気持ち」として遺族が決める形が多いです。' },
{ chapter:3, type:'ox', text:'「初七日法要」は現代では葬儀当日に「繰り込み初七日」として行われることが多い。', answer:true, explanation:'本来は死後7日目に行う初七日法要ですが、遠方からの参列者の都合・日程の効率化のため、現代では葬儀・告別式当日に続けて行う「繰り込み初七日（式中初七日）」が主流になっています。' },
{ chapter:3, type:'ox', text:'「精霊馬（しょうりょううま）」はお盆に作るきゅうりとなすの飾りで、きゅうりが馬、なすが牛を表す。', answer:true, explanation:'精霊馬（精霊牛）はお盆に先祖の霊を迎え送るための乗り物として作ります。きゅうりは足の速い「馬」（あの世から早く帰ってくるよう）、なすはゆっくりした「牛」（この世をゆっくり去っていくよう）を表します。' },
{ chapter:3, type:'ox', text:'「寺請制度（てらうけせいど）」は明治時代に廃止され、現代日本には存在しない。', answer:true, explanation:'寺請制度は明治政府の政教分離政策により1871年（明治4年）に廃止されました。しかし「菩提寺」への依存や仏教式葬儀の慣行は現在も続いており、制度としては廃止されても文化・慣習として根付いています。' },
{ chapter:3, type:'ox', text:'「禅語」で有名な「不立文字（ふりゅうもんじ）」とは「文字に頼らず直接体験で悟りを得る」という禅の立場を示す。', answer:true, explanation:'「不立文字」は禅の基本姿勢を示す言葉で、「経典の文字・言葉に頼らず、師から弟子への心から心への直接伝達（以心伝心）によって悟りを伝える」という意味です。「教外別伝（きょうげべつでん）」「直指人心（じきしにんしん）」「見性成仏（けんしょうじょうぶつ）」とともに禅の四句とされます。' },
{ chapter:3, type:'ox', text:'「念仏（ねんぶつ）」とは仏の名前を唱えることだけを指す。', answer:false, explanation:'念仏とは本来「仏を念じる（心に思い浮かべる）」という意味で、①口称念仏（くしょうねんぶつ：声に出して仏名を称える）②観想念仏（かんそうねんぶつ：仏の姿を心に観想する）③実相念仏などがあります。日本の浄土宗系では主に口称念仏（「南無阿弥陀仏」を称える）を指します。' },
{ chapter:3, type:'ox', text:'「神道」では「死穢（しえ）」を最大の穢れとするため、神社の境内に墓地を設けることは原則ない。', answer:true, explanation:'神道において死は最大の穢れ（死穢）とされるため、神社の境内に墓地を設けることは原則ありません。これは寺院が境内に墓地（寺院墓地）を持つ仏教の慣習と対照的です。神道系の墓地は神社とは別の場所に設けられます。' },
{ chapter:3, type:'ox', text:'「連名（れんめい）」の香典は、複数人が連名で一つの香典袋に入れて渡すことができる。', answer:true, explanation:'同僚・グループ・部署など複数人でまとめて香典を出す場合、連名で一つの香典袋に入れることができます。表書きには代表者名を書き「外一同」などと添えます。別紙に全員の名前と金額を書いて同封するのが丁寧な作法です。' },
{ chapter:3, type:'ox', text:'「浄土（じょうど）」とは仏が清らかにした世界のことで、「極楽浄土」は阿弥陀仏の浄土を指す。', answer:true, explanation:'浄土は仏・菩薩が衆生を救うために設けた清浄な世界のことです。阿弥陀仏の浄土は「極楽浄土（西方極楽世界）」、薬師仏の浄土は「東方浄瑠璃世界」などがあります。浄土宗・浄土真宗は阿弥陀仏の極楽浄土への往生を目指します。' },
{ chapter:3, type:'ox', text:'「密教（みっきょう）」は公開された教えであり、誰でも自由に学ぶことができる。', answer:false, explanation:'密教の「密」は「秘密」を意味し、師から弟子への秘密の伝授（口伝・灌頂）によって伝えられる教えです。「顕教（けんきょう）」が経典として公開された教えなのに対し、密教は師資相承（師弟間の秘密の伝達）を重視します。' },
{ chapter:3, type:'ox', text:'「真言宗」の「護摩（ごま）」とは、火を使った密教の儀式で、煩悩を焼き尽くす意味がある。', answer:true, explanation:'護摩（梵語：ホーマ）は密教の重要な修法で、炉に火を焚き、木・米・胡麻などの供物を投入して燃やすことで煩悩を焼き尽くし、願いを成就させるとされます。不動明王を本尊として行う「不動護摩」が代表的です。' },
{ chapter:3, type:'ox', text:'「日蓮正宗（にちれんしょうしゅう）」は日蓮宗から派生した宗派で、創価学会はかつてこの宗派の信徒団体だった。', answer:true, explanation:'日蓮正宗は1290年頃に日興（にっこう）が日蓮の本弟子として開いた宗派で、総本山は富士山麓の大石寺（静岡県富士宮市）です。創価学会は元々日蓮正宗の信徒団体でしたが、1991年に対立が深まり破門されて独立しました。' },
{ chapter:3, type:'ox', text:'「おくり火（送り火）」はお盆の最終日（8月16日）に先祖の霊を送り出すために焚く火である。', answer:true, explanation:'送り火はお盆の終わり（8月16日）に先祖の霊があの世へ帰るのを見送るために焚く火です。迎え火（8月13日）の対となる慣習です。京都の「大文字焼き（五山の送り火）」は全国的に有名な送り火の行事です。' },
{ chapter:3, type:'ox', text:'「施主（せしゅ）」は仏教用語で、もともとは「布施（ふせ）をする人＝僧侶・寺院に財物を施す人」を意味する。', answer:true, explanation:'施主は梵語「ダーパティ」の訳で、本来は「布施をする在家信者（お金・食物などを僧侶に施す人）」という意味です。現代では葬儀・法要の費用を負担し手配する人（多くの場合、喪主と同一人物）を指す意味でも使われています。' },
{ chapter:3, type:'ox', text:'「開眼供養（かいげんくよう）」とは、新しく作った仏像・位牌・墓石などに魂（霊）を入れる儀式である。', answer:true, explanation:'開眼供養（開眼法要・魂入れ）は新しく仏像・位牌・墓石などを作った際に、僧侶が読経して「目を開く（魂・霊を入れる）」儀式です。これにより単なる物体が礼拝の対象となります。墓石を建てた際にも行われます。' },
{ chapter:3, type:'4', text:'「両祖（りょうそ）」という言葉で知られる曹洞宗の二人の宗祖は誰か。', choices:['道元と栄西','道元と瑩山紹瑾','最澄と空海','法然と親鸞'], answer:1, explanation:'曹洞宗では「両祖（りょうそ）」として道元（承陽大師）と瑩山紹瑾（常済大師）を崇敬します。道元が宗祖として曹洞宗を開き、瑩山が総持寺を開いて宗勢を大きく拡大したことから「中興の祖」と呼ばれます。' },
{ chapter:3, type:'4', text:'「禅宗」の葬儀における焼香の回数として一般的なものはどれか。', choices:['1回','2回','3回','5回'], answer:2, explanation:'曹洞宗・臨済宗などの禅宗では焼香を3回行うのが一般的な作法です。ただし地域・寺院・状況によって異なる場合もあります。浄土真宗（1〜2回）や浄土宗（1〜3回）などと比較して覚えましょう。' },
{ chapter:3, type:'4', text:'「五山（ごさん）」制度とは何か。', choices:['天台宗の五つの本山','鎌倉・室町幕府が定めた禅宗寺院の格付け制度','真言宗の重要寺院五か所','浄土宗の五つの大本山'], answer:1, explanation:'五山制度は鎌倉・室町幕府が臨済宗の重要寺院を格付けした制度で、京都五山（天龍寺・相国寺・建仁寺・東福寺・万寿寺）と鎌倉五山（建長寺・円覚寺・寿福寺・浄智寺・浄妙寺）があります。幕府の保護下で禅文化が発展しました。' },
{ chapter:3, type:'4', text:'「本山（ほんざん）」と「末寺（まつじ）」の関係として正しいものはどれか。', choices:['本山は古い寺院、末寺は新しい寺院','本山は宗派の中心となる寺院、末寺はその宗派に属する一般の寺院','本山は大きな寺院、末寺は小さな寺院','本山は東京の寺院、末寺は地方の寺院'], answer:1, explanation:'本山は宗派の中心・統括機関となる寺院（総本山・大本山など）で、宗祖ゆかりの地に建てられることが多いです。末寺はその宗派に属する一般の寺院で、本山の管轄下にあります。「本末関係（ほんまつかんけい）」と呼ばれます。' },
{ chapter:3, type:'4', text:'「無宗教葬（自由葬）」で避けるべき配慮として正しいものはどれか。', choices:['音楽を流すこと','特定の宗教の儀礼（読経・祝詞・讃美歌など）を押しつけないこと','献花を行うこと','司会者を設けること'], answer:1, explanation:'無宗教葬では参列者の宗教的背景が様々であることを考慮し、特定宗教の儀礼を強制しないことが重要です。音楽・献花・司会・映像などは宗教色のない演出として広く使われます。故人・遺族の意向を最大限尊重した式づくりが求められます。' },
{ chapter:3, type:'4', text:'「葬場祭（そうじょうさい）」とはどの宗教の葬儀用語か。', choices:['仏式','神式（神葬祭）','キリスト教式','無宗教葬'], answer:1, explanation:'葬場祭は神葬祭（神式葬儀）の中心的な儀式で、仏式の「葬儀・告別式」に相当します。斎主が祭詞を奏上し、参列者が玉串奉奠を行います。神葬祭の式次第は遷霊祭→発柩祭→葬場祭→火葬祭→帰家祭の順です。' },
{ chapter:3, type:'4', text:'「戒名料（かいみょうりょう）」についての正しい説明はどれか。', choices:['法律で定められた一定の金額がある','一般的に院号＞道号・戒名＞位号の順に高くなる傾向があり、金額は寺院・宗派によって大きく異なる','戒名料は仏教どの宗派でも同じ料金体系','戒名料は葬儀社が設定する'], answer:1, explanation:'戒名料は法律で定められた金額はなく、院号の有無・文字数・寺院との関係などによって大きく異なります。院号付きは数十万〜数百万円、一般的な戒名は数万〜数十万円程度が相場とされますが、寺院・地域・宗派によって様々です。' },
{ chapter:3, type:'4', text:'「神棚封じ（かみだなふうじ）」とはどういうものか。', choices:['神棚を撤去すること','死の穢れが神棚に及ばないよう、白い紙を貼って神棚を封じること','神棚に新しい神札を入れること','神棚の掃除をすること'], answer:1, explanation:'神棚封じは家人が亡くなった際に、死の穢れが神様に及ばないよう神棚の扉または正面に白紙（半紙）を貼って封じる慣習です。神道の「死穢（しえ）」の概念から来ており、忌明け（五十日祭後）に紙を取り外します。' },
{ chapter:3, type:'4', text:'「菩提寺（ぼだいじ）」の意味として正しいものはどれか。', choices:['悟りを開いた場所にある寺','その家の先祖代々の葬儀・法事を行い、遺骨・位牌を管理する縁の深い寺院','全国で最も格式の高い寺院','葬儀社が指定する提携寺院'], answer:1, explanation:'菩提寺とは、その家の先祖代々の葬儀・年忌法要を行い、墓地・位牌を管理する縁の深い寺院のことです。江戸時代の寺請制度に起源を持ち、現代でも「家の宗教」として続いています。菩提寺のある家では葬儀の際に菩提寺の住職に依頼するのが一般的です。' },
{ chapter:3, type:'4', text:'「三途の川（さんずのかわ）」について正しい説明はどれか。', choices:['神道の死後の世界に存在する川','仏教の死後の世界観で、死者がこの世からあの世へ渡る際に越えるとされる川','キリスト教の天国への道にある川','実在する河川の別名'], answer:1, explanation:'三途の川は仏教の死後の世界観で、死者が冥土へ向かう途中に渡るとされる川です。生前の行いによって渡り方が異なり（橋・浅瀬・深み）、川の番人「奪衣婆（だつえば）」と「懸衣翁（けんえおう）」が衣服を奪って罪の重さを量るとされます。' },
{ chapter:3, type:'4', text:'「冥土（めいど）」「黄泉（よみ）」「地獄（じごく）」の説明として正しいものはどれか。', choices:['すべて同じ場所を指す別の言葉','冥土は仏教の死後の世界、黄泉は日本神話の死者の国、地獄は冥土の中でも罪人が苦しむ場所','冥土はキリスト教用語、黄泉は仏教用語','地獄は現世の苦しい状態を表すだけで死後の世界ではない'], answer:1, explanation:'「冥土（冥途）」は仏教における死後の世界の総称、「黄泉（よもつひらさか）」は日本神話（古事記）に登場する死者が行く国、「地獄」は冥土の中で最も厳しい罰を受ける場所です。それぞれ由来する宗教・文化が異なります。' },
{ chapter:3, type:'4', text:'「仏壇（ぶつだん）」の本来の意味として正しいものはどれか。', choices:['先祖の位牌を飾る棚','家庭内に本尊（仏像）を安置し礼拝するための壇','葬儀場に設置する祭壇','お盆に精霊棚として使う棚'], answer:1, explanation:'仏壇は本来、家庭内に本尊（仏像・曼荼羅など）を安置して礼拝するための壇です。先祖の位牌を置く機能は後から加わったもので、「先祖を祀る場所」というイメージが強くなっていますが、本来は「本尊を礼拝する家庭の小さなお寺」です。' },
{ chapter:3, type:'4', text:'「宗派（しゅうは）」を確認することが葬儀準備で重要な理由として最も適切なものはどれか。', choices:['葬儀費用の計算のため','祭壇形式・焼香回数・経典・作法など式全体に関わるため','参列者へのご案内文作成のため','火葬場の予約のため'], answer:1, explanation:'宗旨宗派によって祭壇の形（白木/花）・焼香回数（1〜3回）・読む経典・引導の有無・数珠の形式・位牌の使用有無・戒名の呼称（戒名/法名）など、式全体に関わる多くの要素が異なります。葬儀施行の最重要確認事項のひとつです。' },
{ chapter:3, type:'4', text:'「檀那（だんな）」の語源として正しいものはどれか。', choices:['中国語で「主人」を意味する言葉','梵語（サンスクリット語）の「ダーナ（布施・施し）」に由来する','日本語の「旦那」から来た言葉','英語の「donor（寄付者）」から来た言葉'], answer:1, explanation:'「檀那（だんな）」は梵語のダーナ（dāna・布施・施し）が由来で、「寺院に布施をする在家信者（檀家）」を意味します。これが転じて「主人・旦那様」という意味でも使われるようになりました。「檀家（だんか）」も同じ語源です。' },
{ chapter:3, type:'4', text:'次の「宗派別・焼香回数」の組み合わせとして正しいものはどれか。', choices:['浄土真宗本願寺派：2回、真宗大谷派：1回','浄土真宗本願寺派：1回、真宗大谷派：2回','曹洞宗：1回、日蓮宗：3回','浄土宗：2回、天台宗：1回'], answer:1, explanation:'浄土真宗の焼香回数は本願寺派（西）が1回、大谷派（東）が2回です（いずれも額に押しいただかない）。曹洞宗・臨済宗は3回が一般的、浄土宗・天台宗・真言宗は1〜3回（宗派の指定あり）、日蓮宗は1回または3回が多いです。' },
// ===== ○× 問題（50問）=====
{chapter:4, type:'ox',text:'「エンバーミング（遺体衛生保全）」は日本では法律上禁止されている。',answer:false,explanation:'エンバーミングは日本でも合法的に行われており、「一般社団法人日本遺体衛生保全協会（IFSA）」がエンバーマーの認定を行っています。海外からの遺体輸送・長距離搬送・長期安置が必要な場合などに活用されます。'},
{chapter:4, type:'ox',text:'「エンバーミング」の主な目的は遺体を永久保存することである。',answer:false,explanation:'エンバーミングの主な目的は①防腐・腐敗防止②消毒（感染症対策）③外観の修復・整容であり、一時的な保全が目的です。永久保存を目的とした「ミイラ化」とは異なります。通常は数週間〜数か月の保全が限度です。'},
{chapter:4, type:'ox',text:'エンバーミングを施した遺体は火葬することができる。',answer:true,explanation:'エンバーミング後の遺体は火葬可能です。使用する薬剤（ホルムアルデヒド系など）は火葬に影響しますが、法律上の制限はありません。エンバーミング後に通常の葬儀を行い、火葬するケースが多いです。'},
{chapter:4, type:'ox',text:'「湯灌（ゆかん）」と「エンバーミング」は同じ処置である。',answer:false,explanation:'湯灌はお湯で遺体を洗い清める日本の伝統的な儀式で、宗教的・文化的な意味を持ちます。エンバーミングは防腐・消毒・修復を目的とした近代的な科学的処置です。目的・方法・専門性がまったく異なります。'},
{chapter:4, type:'ox',text:'「死後硬直（しごこうちょく）」は死後約1〜2時間から始まり、12〜24時間後に最大となる。',answer:true,explanation:'死後硬直は死後1〜2時間ほどで始まり（まず顎・首から）、12〜24時間で全身に及びます。その後24〜48時間で硬直が緩み、遺体は軟化します。温度・体格・死因などによって変化します。'},
{chapter:4, type:'ox',text:'「腐敗（ふはい）」は気温が高いほど進行が遅くなる。',answer:false,explanation:'腐敗は細菌の活動によって進むため、気温が高いほど進行が速くなります。夏場は冬場に比べて腐敗が数倍速く進みます。そのためドライアイスによる冷却や、夏場の早期納棺が重要です。'},
{chapter:4, type:'ox',text:'「ドライアイス」は遺体の腹部・背部に当て、定期的に交換する必要がある。',answer:true,explanation:'ドライアイス（固体二酸化炭素、約−79℃）は昇華（固体→気体）して消耗するため定期的な交換が必要です。腹部・背部（腐敗が進みやすい臓器のある部位）に重点的に当てます。12〜24時間程度で要交換です。'},
{chapter:4, type:'ox',text:'「遺体の腐敗」は体の内部（内臓）から始まる。',answer:true,explanation:'腐敗は腸内細菌が活動を始める腸管（内臓）から始まります。腸内の細菌が死後も活動を続け、ガスを発生させながら周辺組織を分解します。その後体表に変化が現れてきます。'},
{chapter:4, type:'ox',text:'「エンゼルケア（死後処置）」は必ず医師が行わなければならない。',answer:false,explanation:'エンゼルケア（死後処置・清拭・整容）は主に看護師・看護補助者が行います。医師が行う必要はなく、近年は納棺師・専門業者が行う場合も増えています。家族が行うことも可能です。'},
{chapter:4, type:'ox',text:'「清拭（せいしき）」とは遺体を温かいタオルなどで拭き清めることである。',answer:true,explanation:'清拭は温かい湯に浸したタオル・スポンジなどで遺体の全身を丁寧に拭き清める行為です。エンゼルケアの中心的な処置で、遺体の清潔を保ち、家族が最後のお世話をする機会でもあります。'},
{chapter:4, type:'ox',text:'「エンゼルメイク（グリーフメイク）」は遺族に代わって専門家が行うもので、遺族は立ち会えない。',answer:false,explanation:'エンゼルメイク（死後化粧・グリーフメイク）は遺族が立ち会いながら行うことができます。近年は遺族が一緒に故人に化粧を施すことで、悲嘆（グリーフ）の緩和につながるとして積極的に遺族参加を促す葬儀社も増えています。'},
{chapter:4, type:'ox',text:'「納棺師（のうかんし）」は国家資格である。',answer:false,explanation:'納棺師は法律で定められた国家資格ではありません。民間の認定資格（NPO法人おくりびとアカデミー認定など）はありますが、資格なしでも業務自体は法律上禁止されていません。2008年の映画「おくりびと」で広く知られるようになりました。'},
{chapter:4, type:'ox',text:'「遺体の移送（国際間搬送）」に必要な書類として、相手国の公的機関が発行した許可書が必要な場合がある。',answer:true,explanation:'遺体を国外へ移送する際は、日本の市区町村が発行した「埋葬・火葬証明書」の翻訳・認証、相手国の入国許可・検疫証明などが必要です。エンバーミングを義務付けている国も多く、手続きは複雑です。'},
{chapter:4, type:'ox',text:'「遺体の冷凍保存」は日本の法律上、長期間行うことが認められている。',answer:false,explanation:'日本の墓地埋葬法では、火葬・埋葬の義務があります。長期間の遺体冷凍保存は法律上認められておらず、死後一定期間内（通常数日〜1〜2週間以内）に葬儀・火葬を行う必要があります。'},
{chapter:4, type:'ox',text:'「病院での死後処置（エンゼルケア）」は無料で提供されることが多い。',answer:false,explanation:'病院でのエンゼルケア（死後処置）は一般的に有料で、処置内容・病院によって費用が異なります。近年は「グリーフケア」の観点から充実したサービスを有料で提供する病院も増えています。'},
{chapter:4, type:'ox',text:'「衛生保全」としてのエンバーミングは、感染症による死亡の場合に特に有効である。',answer:true,explanation:'感染症（結核・肝炎・エイズなど）による死亡の場合、遺体から感染する可能性があります。エンバーミングでは消毒処置も行われるため、遺族・葬儀関係者への感染リスク軽減に有効です。ただし感染症の種類によっては別の対応が必要です。'},
{chapter:4, type:'ox',text:'「腐敗臭」は主に腸内細菌が産生するガス（アンモニア・硫化水素など）によるものである。',answer:true,explanation:'腐敗臭の主な原因は腸内細菌が有機物を分解する際に発生するガス（アンモニア・硫化水素・インドールなど）です。これらが体外に漏れ出すことで独特の腐敗臭が発生します。'},
{chapter:4, type:'ox',text:'「遺体の搬送中」は棺に安置して搬送しなければならない。',answer:false,explanation:'病院から安置場所への初期搬送（遺体搬送）では、棺に入れず「寝台車（搬送車）」の専用のストレッチャーに布をかけた状態で搬送することが一般的です。棺への納棺は安置場所での湯灌・納棺の後に行います。'},
{chapter:4, type:'ox',text:'「口腔ケア（こうくうけあ）」は死後処置（エンゼルケア）の一部として行われる。',answer:true,explanation:'死後処置では口腔ケア（口・歯の清潔保持・整え）も行われます。口が開いたまま固まった場合のケアや、義歯の装着なども含まれます。故人の顔を生前に近い状態に整える重要な処置です。'},
{chapter:4, type:'ox',text:'「エンバーミングの費用」は一般的に数千円程度で実施できる。',answer:false,explanation:'エンバーミングは高度な技術・専用の設備・薬剤を要する処置で、費用は一般的に10万〜20万円程度（内容・業者によって異なる）とされています。決して安価なサービスではありません。'},
{chapter:4, type:'ox',text:'「遺体の整容（化粧・ひげ剃りなど）」は遺族が行うことも可能である。',answer:true,explanation:'遺体の整容（化粧・ひげ剃り・髪のセットなど）は遺族が行っても問題ありません。専門家（納棺師・エンゼルケアの看護師など）が行う場合もあります。遺族が「最後のお世話」として行うことには、グリーフケアの効果もあります。'},
{chapter:4, type:'ox',text:'「体液の漏出（たいえきのろうしゅつ）」は遺体の状態を悪化させる要因の一つである。',answer:true,explanation:'死後は括約筋が弛緩するため、口・鼻・その他の開口部から体液が漏出することがあります。これは腐敗の促進・衛生上の問題・遺族の精神的苦痛につながります。エンゼルケアや湯灌ではこれへの対処も行います。'},
{chapter:4, type:'ox',text:'「冷所安置（れいしょあんち）」とは、遺体を専用の冷蔵施設に保管することである。',answer:true,explanation:'冷所安置は葬儀社・斎場が保有する専用の冷蔵保管庫（霊安室）に遺体を安置することです。自宅での安置が難しい場合や、葬儀まで日数がかかる場合などに活用されます。温度管理（2〜4℃程度）で腐敗を遅らせます。'},
{chapter:4, type:'ox',text:'「旅支度（たびじたく）」を整える際、故人に手甲を着ける場合、右手・左手どちらから着けるかに決まりはない。',answer:false,explanation:'旅支度の着用には仏教・地域の慣習によって作法があります。一般的に死装束は「逆さごと」の作法（日常と逆）で行うことが多く、着物は左前（左を上に）など慣習があります。手甲・脚絆も作法がある場合があります。'},
{chapter:4, type:'ox',text:'「告別（こくべつ）」の意味は、故人と最後の別れを告げることである。',answer:true,explanation:'告別は「告（つげ）て別（わか）れる」という意味で、故人に最後の別れを告げる行為を指します。「告別式」はこの告別を行う式の名称です。'},
{chapter:4, type:'ox',text:'「御霊前（ごれいぜん）」という言葉は仏式・神式・キリスト教カトリックに使えるが、浄土真宗には使わない。',answer:true,explanation:'浄土真宗では往生即成仏の教えにより「霊」という概念を使いません。そのため「御霊前」は浄土真宗では適切でなく、「御仏前」「御香典」「御香料」などを使います。'},
{chapter:4, type:'ox',text:'「感染症で亡くなった遺体」の取り扱いは通常の遺体と同じ方法で行える。',answer:false,explanation:'感染症予防法で定める1類・2類感染症（エボラ・結核・コレラなど）で亡くなった場合は、特別な対応（納体袋の使用・防護具着用・消毒など）が必要で、一般的な遺体取り扱いとは異なります。'},
{chapter:4, type:'ox',text:'「遺体の損傷修復」はエンバーミングの技術を用いて行うことができる。',answer:true,explanation:'エンバーミングには防腐・消毒だけでなく「修復（リストレーション）」の技術も含まれます。事故・疾患などで損傷した遺体の外観を修復し、生前に近い状態に整えることで、遺族が故人と対面しやすくなります。'},
{chapter:4, type:'ox',text:'「生前の医療処置（カテーテル・ドレーンなど）」は死後も遺体に取り付けたままにしておく必要がある。',answer:false,explanation:'カテーテル・点滴針・ドレーンなどの医療器具は死後に医療スタッフが除去します（ペースメーカーは除去手術が必要な場合あり）。エンゼルケアでは傷・穿刺部位の処置も行われます。'},
{chapter:4, type:'ox',text:'「防腐処置（エンバーミング）」を行うことで、葬儀までの期間を延ばすことができる。',answer:true,explanation:'エンバーミングにより遺体の腐敗を抑え、安置期間を延長できます。通常ドライアイスのみでは数日程度が限界ですが、エンバーミングにより1〜2週間以上の保全が可能になります。海外からの移送・日程調整が必要な場合に有効です。'},
{chapter:4, type:'ox',text:'「湯灌」は自宅でも行うことができる。',answer:true,explanation:'湯灌は葬儀社・湯灌業者が移動式の専用浴槽（湯灌セット）を持参して自宅で行うことができます。自宅葬・自宅安置の場合でも湯灌サービスを利用可能です。'},
{chapter:4, type:'ox',text:'「死後の処置を何も行わない」という選択は日本の法律上禁止されている。',answer:false,explanation:'日本の法律（墓地埋葬法）は遺体の処置方法を詳細に定めておらず、何らかの処置をしなければならないという規定はありません（火葬・埋葬は義務）。ただし衛生上・道義上の観点から何らかのケアを行うのが一般的です。'},
{chapter:4, type:'ox',text:'「エンバーミング」に使用する薬剤の主成分はホルムアルデヒドである。',answer:true,explanation:'エンバーミングに使用する防腐処置液（エンバーミングフルード）の主な成分はホルムアルデヒド（ホルマリン）です。タンパク質を変性・固定することで腐敗細菌の活動を抑制します。'},
{chapter:4, type:'ox',text:'「IFSAエンバーマー資格」は厚生労働省が認定する国家資格である。',answer:false,explanation:'IFSAエンバーマー資格は一般社団法人日本遺体衛生保全協会（IFSA）が認定する民間資格であり、国家資格ではありません。約2年間の実技研修を経て取得できます。'},
{chapter:4, type:'ox',text:'「エンゼルケア」の「エンゼル（Angel）」は天使を意味し、旅立つ故人を天使のように清めるという意味が込められている。',answer:true,explanation:'エンゼルケアの名称は「Angel（天使）」に由来し、旅立つ故人を天使のように美しく送り出すという意味が込められています。日本では1990年代後半から普及した概念で、看護師が中心となって発展させました。'},
{chapter:4, type:'ox',text:'「義歯（入れ歯）」は火葬の際に遺体と一緒に火葬できる。',answer:true,explanation:'義歯（入れ歯）の素材によりますが、樹脂製のものは一般的に火葬できます。ただし金属製（金属床義歯）の義歯は残ることがあります。納棺前に義歯を装着して故人の顔を整えることが多いです。'},
{chapter:4, type:'ox',text:'「エンゼルケア」を遺族が行う場合、特別な資格が必要である。',answer:false,explanation:'エンゼルケア（清拭・整容など）を遺族が行うことに資格は必要ありません。近年はグリーフケアの観点から、遺族が積極的に関わること（最後のお世話・お別れの時間）を支援する取り組みが広がっています。'},
{chapter:4, type:'ox',text:'「遺体の凍結保存（クライオニクス）」は日本でも合法的なサービスとして普及している。',answer:false,explanation:'クライオニクス（遺体・脳の液体窒素凍結保存）は将来の蘇生を目的とするもので、日本では法律（墓地埋葬法上の火葬・埋葬義務）との整合性から合法的なサービスとして存在していません。米国などに施設があります。'},
{chapter:4, type:'ox',text:'「感染症予防法」に基づき、特定の感染症で死亡した場合は24時間以内に火葬することが義務付けられる場合がある。',answer:true,explanation:'感染症予防法により、エボラ出血熱・ペスト・コレラなど特定感染症（1・2類など）による死亡の場合は、感染拡大防止のために24時間以内の火葬が義務付けられます。これは通常の「死後24時間は火葬不可」の規定の例外です。'},
{chapter:4, type:'ox',text:'「遺体の運搬（搬送）」は誰でも自由に行うことができる。',answer:false,explanation:'遺体搬送は事業として行う場合、各都道府県の条例による規制・医師の死亡証明（死亡診断書）の確認が必要です。また「死体損壊罪」「死体遺棄罪」など刑法上の制限もあります。'},
{chapter:4, type:'ox',text:'「遺体の衛生保全（エンバーミング）」により、開棺（棺の蓋を開けて対面）での葬儀が可能になる。',answer:true,explanation:'エンバーミングにより遺体の外観が保全され、腐敗・変色を抑えることができるため、棺の蓋を開けた状態（開棺）で葬儀を行い、参列者が直接故人に対面できます。これは「オープンカスケット」と呼ばれ、欧米では一般的な慣習です。'},
{chapter:4, type:'ox',text:'「遺体の保管温度」は2〜4℃が適切とされる。',answer:true,explanation:'遺体の腐敗を抑えるための保管温度は、一般的に2〜4℃程度が適切とされています。これは細菌の活動を抑制するための温度帯で、冷蔵安置施設（霊安室）ではこの温度帯で管理します。'},
{chapter:4, type:'ox',text:'「死化粧（しにげしょう）」は女性にのみ施すものである。',answer:false,explanation:'死化粧（グリーフメイク）は女性だけでなく男性にも施すことができます。男性の場合はひげ剃り・肌の色の整え・白粉などを施すこともあります。故人が生前に近い表情・容貌になるよう整えます。'},
{chapter:4, type:'ox',text:'「納棺の儀（のうかんのぎ）」において、家族が故人に触れる最後の機会となることが多い。',answer:true,explanation:'納棺は棺の蓋を閉める前の最後の段階で、家族が故人に直接触れ・顔を見て・副葬品を入れる最後の機会となります。その後は通夜・葬儀・出棺と棺が開かれることはほぼないため、納棺の儀は非常に重要な場面です。'},
{chapter:4, type:'ox',text:'「副葬品（ふくそうひん）」は棺に入れる前に必ず家族全員の合意が必要という法律がある。',answer:false,explanation:'副葬品に関して家族全員の合意を義務付ける法律はありません。ただし火葬場の規定（金属・ガラス・爆発物などの禁止品）を守る必要があり、喪主・施主の判断で副葬品を決めることが一般的です。'},
{chapter:4, type:'ox',text:'「遺体の腐敗」は気温10℃以下では大幅に遅くなる。',answer:true,explanation:'腐敗は細菌の活動によるもので、低温では細菌活動が著しく抑制されます。10℃以下では腐敗の進行が大幅に遅くなり、冷蔵保管（2〜4℃）では常温の数倍〜数十倍の時間をかけて進行します。'},
{chapter:4, type:'ox',text:'「旅立ちの衣装」として故人が生前に「自分の葬儀ではこの洋服を着てほしい」と希望していた場合、その希望に従うことができる。',answer:true,explanation:'死装束は白装束が伝統ですが、故人の生前の希望（スーツ・ドレス・お気に入りの着物など）に従うことが優先されます。遺族の合意のもと、故人らしい旅立ちの衣装を選ぶことは現代では一般的に受け入れられています。'},

// ===== 4択 問題（50問）=====
{chapter:4, type:'4',text:'「エンバーミング（遺体衛生保全）」の主な目的として正しいものはどれか。',choices:['遺体を永久に保存する','防腐・消毒・修復を行い、遺体を衛生的かつ生前に近い状態に保つ','遺体を冷凍保存する','遺体をミイラ化させる'],answer:1,explanation:'エンバーミングは①防腐（腐敗を防ぐ）②消毒（感染症のリスクを低減）③修復（外観を生前に近い状態に整える）の3つが主な目的です。永久保存やミイラ化とは全く異なる処置です。'},
{chapter:4, type:'4',text:'「エンバーマー」の資格について正しいものはどれか。',choices:['厚生労働省認定の国家資格','IFSAが認定する民間資格で、実技研修を必要とする','誰でも取得できる民間資格','葬祭ディレクター資格と同一'],answer:1,explanation:'エンバーマーは一般社団法人日本遺体衛生保全協会（IFSA）が認定する民間資格です。理論・実技の教育課程（約2年間）を経て取得します。国家資格ではありませんが、専門性の高い資格として業界で認知されています。'},
{chapter:4, type:'4',text:'「湯灌（ゆかん）」の正しい説明はどれか。',choices:['遺体を火葬炉に入れること','遺体をお湯で洗い清め、整容・着替えを行う日本の伝統的な儀式','遺骨を洗浄して骨壺に納めること','エンバーミングの別称'],answer:1,explanation:'湯灌は遺体をお湯で洗い清める日本の伝統的な儀式で、死後の清浄化・旅支度の一環として行われます。清拭・洗髪・整容・着替え（白装束への更衣）を含みます。'},
{chapter:4, type:'4',text:'「エンゼルケア（死後処置）」を主に行うのは誰か。',choices:['葬祭ディレクター','看護師・看護補助者（病院内での処置）または納棺師・葬儀社（その後）','医師','法律に基づき警察官'],answer:1,explanation:'病院での死後処置（エンゼルケア）は主に看護師・看護補助者が行います。その後、自宅・安置施設への移動後は湯灌師・納棺師・葬儀社スタッフが整容・着替えなどを行います。'},
{chapter:4, type:'4',text:'「死後硬直（死体硬直）」が始まる時間として最も正確なものはどれか。',choices:['死後直後（0〜30分）','死後約1〜2時間後（顎・首から始まる）','死後12時間以降','死後3日以降'],answer:1,explanation:'死後硬直は死後1〜2時間で顎・首の筋肉から始まり、12〜24時間後に全身に広がって最大となります。その後24〜48時間で軟化・弛緩します。気温・体格・死因によって異なります。'},
{chapter:4, type:'4',text:'「ドライアイスの交換」が必要な理由として正しいものはどれか。',choices:['ドライアイスは吸湿して融けるため','ドライアイスは昇華（固体→気体）して消耗するため','ドライアイスは腐敗させてしまうため','法律で定期交換が義務付けられているため'],answer:1,explanation:'ドライアイス（固体二酸化炭素）は常温・常圧では液体を経ずに昇華して気体（CO₂）になります。消耗するため12〜24時間程度で交換が必要です。消耗した状態では冷却効果がなくなるため定期確認が重要です。'},
{chapter:4, type:'4',text:'「遺体の腐敗」の進行を最も遅らせる方法として正しいものはどれか。',choices:['高温の場所に置く','低温（冷蔵）管理とエンバーミングの組み合わせ','乾燥した場所に置く','遺体を動かさない'],answer:1,explanation:'腐敗の進行を最も効果的に抑えるのは低温管理（冷蔵）とエンバーミング（防腐処置）の組み合わせです。低温は細菌活動を抑制し、エンバーミングは薬剤で腐敗菌の活動を化学的に阻害します。'},
{chapter:4, type:'4',text:'「感染症による死亡」の場合の遺体取り扱いとして正しいものはどれか。',choices:['通常の遺体と同じ処置でよい','感染症の種類に応じた防護措置（防護服・手袋・マスクなど）を講じ、必要に応じて納体袋を使用する','家族のみが処置できる','必ず火葬場スタッフが処置する'],answer:1,explanation:'感染症（特に感染症予防法上の特定感染症）による死亡の場合は、感染拡大防止のため防護具（手袋・マスク・ゴーグル・防護服）を着用し、遺体は「納体袋（ボディバッグ）」に密封するなど、通常とは異なる対応が必要です。'},
{chapter:4, type:'4',text:'「グリーフメイク（死後化粧）」の目的として正しいものはどれか。',choices:['遺体を長期保存するため','故人の顔を生前に近い状態に整え、遺族が穏やかにお別れできるようにするため','法律で義務付けられているため','宗教的な儀式として必須のため'],answer:1,explanation:'グリーフメイク（死後化粧・エンゼルメイク）の目的は故人の顔を生前に近い美しい状態に整え、遺族が穏やかに別れを告げられるようにすることです。遺族の悲嘆（グリーフ）を和らげる効果もあります。'},
{chapter:4, type:'4',text:'「納棺師（おくりびと）」が行う主な業務として正しいものはどれか。',choices:['死亡診断書の作成','遺体の洗浄・整容・納棺の儀式を行い、故人を美しく送り出す','葬儀の司会','相続手続きの代行'],answer:1,explanation:'納棺師は遺体の洗浄（湯灌）・整容（化粧・ひげ剃り）・着替え（死装束への更衣）・副葬品の確認・棺への納棺などを行います。遺族とともに行う「納棺の儀」として感謝と愛情を込めた最後のお世話をします。'},
{chapter:4, type:'4',text:'「エンバーミングに使用するホルムアルデヒド」について正しいものはどれか。',choices:['食品添加物として使われる安全な成分','タンパク質を固定・変性させることで腐敗細菌の活動を抑制する防腐成分','香り付けのための芳香剤','遺体を消臭するための成分'],answer:1,explanation:'ホルムアルデヒドは遺体組織のタンパク質と結合して固定・変性させることで、腐敗細菌が有機物を分解できなくなる環境を作ります。強い防腐効果がありますが、刺激臭・毒性があるため専門家（エンバーマー）が安全に取り扱います。'},
{chapter:4, type:'4',text:'「冷凍安置」と「冷蔵安置」の違いとして正しいものはどれか。',choices:['まったく同じ','冷蔵安置（2〜4℃）は腐敗を遅らせ、冷凍安置（−18℃以下）はさらに長期の保全が可能だが解凍後の状態に問題が生じることがある','冷凍安置は法律上禁止されている','冷蔵安置の方が費用が高い'],answer:1,explanation:'冷蔵安置（2〜4℃）は一般的な遺体安置方法で、数日〜1週間程度の保全が可能です。冷凍安置（−18℃以下）はより長期の保全が可能ですが、解凍後に細胞破壊による外観の悪化・液体漏出などの問題が生じます。'},
{chapter:4, type:'4',text:'「旅支度」に含まれるものとして正しい組み合わせはどれか。',choices:['白装束（経帷子）・手甲・脚絆・頭陀袋・足袋・六文銭','礼服・ネクタイ・革靴・ベルト','浴衣・下駄・手ぬぐい','僧侶の法衣一式'],answer:0,explanation:'仏式の旅支度一式は白装束（経帷子）・手甲（手の甲の覆い）・脚絆（脛の覆い）・頭陀袋（三途の川の渡し賃などを入れる袋）・足袋・笠（または代替品）・六文銭（印刷）などが含まれます。'},
{chapter:4, type:'4',text:'「副葬品として棺に入れてはいけないもの」として正しいものはどれか。',choices:['故人への手紙（紙製）','故人の好きだった花（生花）','ペースメーカー（金属製・電池内蔵）','故人が愛読した文庫本'],answer:2,explanation:'ペースメーカーは金属製でリチウム電池を内蔵しており、火葬中に爆発・破裂して炉や骨を損傷するリスクがあります。必ず事前に申告し、除去の必要性を確認します。紙・花・本など燃えるものは一般的に許可されています。'},
{chapter:4, type:'4',text:'「死装束の左前」の意味として正しいものはどれか。',choices:['仏教の戒律で定められた方向','日常（右前）とは逆にすることで、あの世とこの世を区別する「逆さごと」の慣習','西洋の服の着方に合わせたもの','冬用の衣装の着方'],answer:1,explanation:'死装束を「左前（ひだりまえ）」に着せるのは、日常生活では「右前」が正しい着方とされているため、その逆にすることで「非日常・あの世のもの」を示す「逆さごと」の慣習です。'},
{chapter:4, type:'4',text:'「遺体の搬送（病院→安置場所）」の際に必要なものはどれか。',choices:['火葬許可証','死亡診断書または死体検案書（医師の作成したもの）','戸籍謄本','印鑑証明書'],answer:1,explanation:'遺体の搬送前に医師から「死亡診断書または死体検案書」を受け取る必要があります。この書類が死亡届・火葬許可証申請に必要であり、書類のない遺体搬送は法律上問題が生じる可能性があります。'},
{chapter:4, type:'4',text:'「清拭（せいしき）」に使用するものとして適切なものはどれか。',choices:['消毒用アルコールのみ','温かいお湯に浸した清潔なタオル・スポンジなど','冷水と石鹸','エンバーミング液'],answer:1,explanation:'清拭には温かいお湯（37〜40℃程度）に浸した清潔なタオル・ガーゼ・スポンジなどを使用します。全身を丁寧に拭き清め、故人の尊厳を大切にしながら行います。'},
{chapter:4, type:'4',text:'「エンゼルケアの「逝去後の処置」で行うこととして誤っているものはどれか。',choices:['目・口を閉じる','体位を整え手足を伸ばす','遺体を解剖する','清拭・整容'],answer:2,explanation:'解剖は司法解剖（事件性がある場合・警察の依頼）または病理解剖（医学的研究・死因確認）として別途行われるものです。エンゼルケアの内容は①目・口を閉じる②体位・手足の整え③清拭④整容（化粧・ひげ剃り）⑤衣服の整えなどです。'},
{chapter:4, type:'4',text:'「遺体の搬送先」として一般的でないものはどれか。',choices:['自宅','葬儀社の安置施設','式場（葬儀場）の安置室','裁判所'],answer:3,explanation:'遺体の搬送先は自宅・葬儀社の安置施設・式場の安置室・病院の霊安室（一時的に）などが一般的です。裁判所は遺体の搬送先ではありません（司法解剖は監察医・大学病院などで行われます）。'},
{chapter:4, type:'4',text:'「エンバーミングが特に活用される場面」として適切なものはどれか。',choices:['通常の国内葬儀','海外での死亡・長距離搬送・葬儀まで日数がかかる場合・感染症対策','即日の火葬','自宅での安置が1日以内の場合'],answer:1,explanation:'エンバーミングが特に有効な場面は①海外での死亡（国際搬送）②長距離搬送③葬儀まで日数がかかる場合（遠方親族の到着待ちなど）④感染症による死亡（感染防護）⑤遺体が損傷している場合の修復などです。'},
{chapter:4, type:'4',text:'「湯灌師・納棺師が行う「手合わせ」とはどういう意味か。',choices:['手を握手すること','家族と湯灌師が一緒に故人に手を合わせ、感謝と敬意を示すこと','指紋を採取すること','遺体の手を洗うこと'],answer:1,explanation:'湯灌・納棺の最後に、湯灌師・納棺師と遺族が揃って故人に手を合わせ（合掌し）感謝と敬意を表す儀礼です。故人が安らかに旅立てるよう、最後のお別れと感謝を込めた行為です。'},
{chapter:4, type:'4',text:'「遺体の整容」において「リストレーション（修復）」が特に必要な場面はどれか。',choices:['自然死・老衰','交通事故・外傷・変形が著しい場合','病死（一般的な病気）','水死'],answer:1,explanation:'リストレーション（遺体修復技術）が特に活用されるのは交通事故・転落・暴力などによる外傷・変形が著しい場合です。専門技術（パテ・特殊化粧・補綴など）を使って生前に近い状態に整えます。'},
{chapter:4, type:'4',text:'「遺体の保全（衛生管理）」に関係する職種として最も直接的なものはどれか。',choices:['葬祭ディレクター、納棺師、エンバーマー','弁護士、司法書士','医師（外科医）のみ','消防士'],answer:0,explanation:'遺体の保全・衛生管理に直接関わる職種は葬祭ディレクター（総合管理）・納棺師（整容・納棺）・エンバーマー（遺体衛生保全）などです。それぞれ専門的な知識・技術を持ちます。'},
{chapter:4, type:'4',text:'「遺族が「最後のお別れ」として故人に行えること」として正しいものはどれか。',choices:['死亡診断書の作成','清拭・化粧・好きだった服を着せる・副葬品を入れるなど、ケアへの参加','エンバーミングの実施','死亡届の代理提出のみ'],answer:1,explanation:'遺族は故人への清拭・化粧・着替え（旅支度）・副葬品を入れるなど、最後のケアに参加することができます。これらはグリーフケアの観点からも重要で、「最後のお世話」として大切な意味を持ちます。'},
{chapter:4, type:'4',text:'「エンゼルケアとエンバーミングの大きな違い」として正しいものはどれか。',choices:['エンゼルケアはプロのみが行え、エンバーミングは遺族が行える','エンゼルケアは清拭・整容など外側からのケア、エンバーミングは防腐薬剤を体内に注入する医学的処置','エンゼルケアは有料、エンバーミングは無料','エンゼルケアは仏式のみ、エンバーミングは神式のみ'],answer:1,explanation:'エンゼルケアは外側からの清拭・整容・着替えなど、遺族も参加できる「お世話」的なケアです。エンバーミングは体内（血管・体腔）に防腐薬剤を注入・循環させる医学的・科学的な処置で、専門資格（エンバーマー）が必要です。'},
{chapter:4, type:'4',text:'「六文銭（ろくもんせん）」を棺に入れる際、現代では本物の硬貨の代わりに何が使われることが多いか。',choices:['金箔','紙に印刷した六文銭（印刷銭・冥途銭）','プラスチック製のコイン','ガラス玉'],answer:1,explanation:'本物の硬貨（金属）は火葬場での使用が原則禁止されているため、現代では紙に六文銭の絵を印刷した「印刷銭（冥途銭・紙銭）」を使用します。燃えるものであれば副葬品として問題ありません。'},
{chapter:4, type:'4',text:'「遺体の衛生保全（エンバーミング）」が日本で普及しにくい理由として誤っているものはどれか。',choices:['費用が比較的高額','仏教的・文化的な観点からの抵抗感','法律上完全に禁止されている','葬儀から火葬までの期間が短い傾向にある'],answer:2,explanation:'エンバーミングは日本で法律上禁止されていません（合法）。普及が進まない理由としては①費用の高さ②仏教・文化的な観点（「遺体に手を加えることへの抵抗感」）③日本は死後数日で火葬するため必要性が低い、などが挙げられます。'},
{chapter:4, type:'4',text:'「遺体の「変色（へんしょく）」」が起こる主な原因として正しいものはどれか。',choices:['照明の影響','死後の血液の沈降（死斑）・腐敗・病変などによる変化','気候の変化','棺の色移り'],answer:1,explanation:'遺体の変色は主に①死後の血液沈降による「死斑（しはん）」（皮膚の下の暗赤色の斑点）②腐敗に伴うガス発生と組織変化③疾患（黄疸・出血など）による変色などが原因です。エンバーミングや化粧で修復できる場合があります。'},
{chapter:4, type:'4',text:'「葬儀社における遺体取り扱い」の基本的な心構えとして最も適切なものはどれか。',choices:['効率優先でスピーディーに処置する','故人の尊厳を大切にし、敬意と丁寧さをもって取り扱う','遺族に見せないよう迅速に処置を終える','費用を最小限に抑えることを最優先にする'],answer:1,explanation:'遺体取り扱いの根本は故人への敬意と尊厳の尊重です。遺体は「物」ではなく、かつて生きていた人の体として敬意をもって丁寧に扱うことが葬祭従事者の基本的な姿勢です。'},
{chapter:4, type:'4',text:'「死後変化」の正しい順序として最も一般的なものはどれか。',choices:['死後硬直→死斑→腐敗→白骨化','死斑→死後硬直→腐敗→白骨化','腐敗→死後硬直→死斑→白骨化','白骨化→腐敗→死後硬直→死斑'],answer:0,explanation:'死後変化の一般的な順序は①死斑（死後30分〜数時間）と死後硬直（死後1〜2時間）がほぼ同時期に始まり、②腐敗（腸内細菌から数日後に顕著）、③乾燥・骨化・白骨化（数週間〜数年後）となります。'},
{chapter:4, type:'4',text:'「遺体衛生保全士（エンバーマー）」の業務として正しいものはどれか。',choices:['葬儀全体の運営管理','遺体の防腐処置・消毒・修復（リストレーション）を専門に行う','戒名を授ける','火葬の操作'],answer:1,explanation:'エンバーマーは遺体の防腐処置（血液を防腐液に置換など）・消毒・外観修復（リストレーション）を専門に行う技術者です。葬儀の運営・宗教儀礼・火葬操作などは担当しません。'},
{chapter:4, type:'4',text:'「死後24時間以内の火葬を禁じる」法律の根拠として正しいものはどれか。',choices:['消防法','墓地、埋葬等に関する法律（墓地埋葬法）第3条','民法','刑法'],answer:1,explanation:'墓地、埋葬等に関する法律（昭和23年制定）第3条に「死亡後24時間を経過した後でなければ、埋葬又は火葬を行ってはならない」と規定されています。ただし感染症予防法に基づく特例があります。'},
{chapter:4, type:'4',text:'「納棺」において棺の種類を選ぶ際に考慮しないのはどれか。',choices:['火葬炉のサイズへの適合','故人・遺族の好みや予算','素材（木の種類・仕上げ）','棺の製造年月日'],answer:3,explanation:'棺を選ぶ際は①火葬炉サイズへの適合②故人・遺族の好み③素材・デザイン④予算などを考慮します。製造年月日は一般的な選定基準にはなりません。'},
{chapter:4, type:'4',text:'「湯灌の作法」として、遺体を洗う際の湯（お湯）の温度として適切なものはどれか。',choices:['10℃以下（冷水）','37〜42℃程度（体温〜入浴に近い温度）','60℃以上（高温）','温度は問わない'],answer:1,explanation:'湯灌では体温に近い37〜42℃程度のお湯を使います。生前の入浴に近い温度帯で故人を清めることで、「最後のお風呂」として敬意を込めたケアが可能です。熱すぎると遺体にダメージを与える場合があります。'},
{chapter:4, type:'4',text:'「国際輸送（海外から日本への遺体搬送）」で必要なものとして一般的に含まれないものはどれか。',choices:['エンバーミング証明書（多くの国で義務）','相手国の「死亡・埋葬許可書」','日本の「火葬許可証」（到着後に取得）','故人のパスポート（有効期限内のもの）'],answer:3,explanation:'亡くなった方のパスポートは通常、現地で回収・無効化されます。国際遺体搬送に必要なのは①エンバーミング証明書②現地の死亡証明書・埋葬許可書③日本の領事館の認証④航空会社の搬送許可などです。'},
{chapter:4, type:'4',text:'「冷凍安置」ではなく「冷蔵安置（2〜4℃）」が一般的な理由として正しいものはどれか。',choices:['冷蔵の方が費用が安いため','冷凍では解凍時に組織破壊・液体漏出が起こり外観が著しく悪化するため','法律で冷凍が禁止されているため','冷蔵の方が腐敗防止効果が高いため'],answer:1,explanation:'冷凍保存（−18℃以下）は組織内の水分が凍結・膨張して細胞を破壊し、解凍時に組織が崩壊・液体漏出が起こるため外観が著しく悪化します。遺族と対面できる状態を維持するために冷蔵安置（2〜4℃）が一般的です。'},
{chapter:4, type:'4',text:'「北枕（きたまくら）」に遺体を安置する理由として最も適切なものはどれか。',choices:['北向きが最も涼しいため','釈迦の入滅時に頭を北に向けていたとされる仏教の慣習による','法律で北枕が定められているため','風水上の理由'],answer:1,explanation:'北枕の慣習は、釈迦が入滅した際に頭を北に向け（あるいは右脇を下にして）いたとされる記述（仏伝）に基づきます。日常では「北枕は縁起が悪い」とされますが、これは遺体の安置法に由来する逆説的な慣習です。'},
{chapter:4, type:'4',text:'「エンバーミングの施術手順」として正しい順序はどれか。',choices:['修復→消毒→防腐処置','外部処置（清潔・整容）→動脈注入（防腐液循環）→体腔処置→修復（リストレーション）','先に火葬してから遺体を処置する','医師の診察→薬剤選定→手術'],answer:1,explanation:'エンバーミングの一般的な手順は①外部処置（清潔・整容）②動脈への防腐液注入と血液の置換③腹腔・胸腔への処置（トロカー使用）④修復・化粧（リストレーション）⑤着装となります。'},
{chapter:4, type:'4',text:'「死斑（しはん）」について正しい説明はどれか。',choices:['生前の皮膚病によるもの','死後に血液が重力で下方に沈降し、皮膚の下に現れる暗赤色の斑点','腐敗によって皮膚が変色したもの','外傷による内出血のあと'],answer:1,explanation:'死斑（死体斑紋）は死後の血液循環停止により、重力に従って血液が下方（接地面）に沈降し、皮膚の下（真皮・皮下組織）に現れる暗赤色の斑点です。死後30分〜数時間で現れ始め、12時間前後で固定されます。'},
{chapter:4, type:'4',text:'「遺体衛生保全」の「保全」という言葉の意味として最も適切なものはどれか。',choices:['警察が遺体を保管すること','遺体を一定期間、衛生的かつ外観を保った状態に維持すること','遺体を自然に還すこと','遺体を凍結保存すること'],answer:1,explanation:'遺体衛生保全の「保全」は遺体を衛生的に管理しながら、外観・状態を一定期間維持することを指します。腐敗防止・感染防止・外観修復が三本柱です。永久保存や冷凍保存とは異なります。'}
,

{ chapter:4, type:'ox', text:'「禅（ぜん）」とはサンスクリット語の「ディヤーナ（瞑想）」に由来する言葉である。', answer:true, explanation:'「禅」は梵語（サンスクリット語）の「ディヤーナ（dhyāna）」が中国語で「禅那（ぜんな）」と音写され、「禅」と略されたものです。「瞑想・禅定」という意味で、坐禅（坐った瞑想）の実践を通じて悟りを目指す修行法を指します。' },
{ chapter:4, type:'ox', text:'「臨済宗妙心寺派」は日本最大の臨済宗の派で、全国に約3500か寺の末寺を持つ。', answer:true, explanation:'臨済宗は現在14の派に分かれており、その中で最大勢力を持つのが妙心寺派（総本山：妙心寺、京都市右京区）です。臨済宗は室町幕府の保護を受け、五山制度のもとで文化的にも大きな役割を果たしました。' },
{ chapter:4, type:'ox', text:'「道元」は永平寺を開いた後、一度も比叡山に戻ることなく越前（福井県）で一生を終えた。', answer:false, explanation:'道元は永平寺開山後、1247年に鎌倉幕府の執権・北条時頼に招かれて鎌倉に下向しましたが、約半年で帰山しました。また1253年に病を得て京都に上り、在京中に53歳で入寂（死去）しました。' },
{ chapter:4, type:'ox', text:'「法然」の弟子である「親鸞」は、師の教えをより徹底させ「他力本願」の思想を発展させた。', answer:true, explanation:'法然が「専修念仏」（ひたすら念仏を称えること）を説いたのに対し、親鸞はさらにそれを深め、自己の力（自力）を完全に捨て阿弥陀仏の働き（他力）にすべてを委ねる「絶対他力」の思想を確立しました。主著は「教行信証」です。' },
{ chapter:4, type:'ox', text:'浄土真宗の「歎異抄（たんにしょう）」は親鸞自身が書いた著作である。', answer:false, explanation:'歎異抄は親鸞の弟子・唯円（ゆいえん）が書いたとされる書物で、師・親鸞の言葉を記録しその教えの歪みを嘆いた内容です。「善人なほもて往生をとぐ、いはんや悪人をや」という言葉（悪人正機）が有名で、親鸞の著作ではありません。' },
{ chapter:4, type:'ox', text:'「日蓮宗」では、日蓮の遺骨が納められた身延山が聖地とされ、多くの信者が参詣に訪れる。', answer:true, explanation:'日蓮上人は身延山（山梨県）で晩年の約9年を過ごし、1282年に入滅しました。身延山久遠寺には日蓮の御廟所（お墓）があり、日蓮宗の総本山として多くの参詣者が訪れます。「身延詣り」は日蓮宗信者の重要な巡礼です。' },
{ chapter:4, type:'ox', text:'「真言宗」の「真言（マントラ）」は、意味を理解して唱えることが重要とされる。', answer:false, explanation:'真言（マントラ）は密教において「秘密の言葉」とされ、意味を論理的に理解して唱えることより、音（声）そのものに神聖な力があると考えられています。梵語のまま唱えることが重視され、翻訳しないことが原則です。' },
{ chapter:4, type:'ox', text:'「四弘誓願（しぐせいがん）」は、菩薩（悟りを求める者）が立てる四つの誓いで、多くの宗派の葬儀でも唱えられる。', answer:true, explanation:'四弘誓願とは①衆生無辺誓願度（すべての衆生を救う）②煩悩無尽誓願断（すべての煩悩を断つ）③法門無量誓願学（すべての法門を学ぶ）④仏道無上誓願成（最高の仏道を成就する）の四つです。多くの宗派の法要で唱えられます。' },
{ chapter:4, type:'ox', text:'「浄土宗」の増上寺（東京）は、徳川将軍家の菩提寺として知られる。', answer:true, explanation:'増上寺（東京都港区）は浄土宗の大本山で、徳川家康が江戸入府後に菩提寺と定めました。2代秀忠・6代家宣・7代家継・9代家重・12代家慶・14代家茂の将軍とその家族が埋葬されています。' },
{ chapter:4, type:'ox', text:'「臨済宗」の「公案（こうあん）」は、論理的な思考で解くことができる哲学的な問いかけである。', answer:false, explanation:'公案は「隻手の声を聞け」「父母未生以前の本来の面目とは何か」など、論理的・概念的思考では解けない問いです。これに取り組むことで思考の限界を超え、直接的な悟りの体験（見性）を目指すのが臨済宗の修行法です。' },

// --- 神式深掘り ---
{ chapter:4, type:'ox', text:'神道の「八百万（やおよろず）の神」とは、自然・万物すべてに神が宿るという考え方を表す。', answer:true, explanation:'「八百万の神」は日本神道の多神教的・アニミズム的な世界観を象徴する表現で、山・川・海・木・動物・人間など自然界のすべてに神が宿ると考えます。「八百万」は無数に多いという意味の表現です。' },
{ chapter:4, type:'ox', text:'神式葬儀では「御神酒（おみき）」を供えるのが一般的であるが、火葬後は供えない。', answer:false, explanation:'神式葬儀では故人への供え物（神饌・しんせん）として御神酒・米・塩・水・野菜・魚などを供えます。火葬後（火葬祭・帰家祭）でも御神酒を含む供え物を捧げます。供え物を控える特定の場面はありますが「火葬後は供えない」というルールはありません。' },
{ chapter:4, type:'ox', text:'「伊勢神宮（内宮）」の御祭神は、天照大御神（あまてらすおおみかみ）である。', answer:true, explanation:'伊勢神宮の内宮（皇大神宮）の御祭神は天照大御神で、太陽の神・皇室の祖先神として日本神道の最高位に位置づけられます。外宮（豊受大神宮）の御祭神は豊受大御神（食物・農業の神）です。' },
{ chapter:4, type:'ox', text:'神葬祭における「斎主（さいしゅ）」は仏式の「導師（僧侶）」に相当する役割を担う。', answer:true, explanation:'斎主は神葬祭を主宰する神職のことで、仏式の導師（葬儀を主宰する僧侶）に相当します。祝詞（のりと）の奏上・各種の儀礼の執行など、式全体を取り仕切ります。' },
{ chapter:4, type:'ox', text:'神道では「穢れ（けがれ）」を払うために「禊（みそぎ）」を行う。', answer:true, explanation:'禊（みそぎ）は水で身体を洗い清めることで穢れを祓う神道の浄化儀礼です。伊邪那岐命が黄泉の国から戻った際に禊を行ったという神話が起源とされます。現代の神式葬儀後の「清祓」も穢れを払う儀礼のひとつです。' },

// --- キリスト教深掘り ---
{ chapter:4, type:'ox', text:'「カトリック」とはギリシャ語で「普遍的な」という意味である。', answer:true, explanation:'「カトリック（Catholic）」はギリシャ語「カトリコス（katholikos）」に由来し、「普遍的な・全体にわたる」という意味です。「普遍教会（普遍的なキリストの教会）」という意味でカトリックと呼ばれます。' },
{ chapter:4, type:'ox', text:'「プロテスタント」という名称は、16世紀の宗教改革において改革派が旧体制に「抗議（プロテスト）」したことに由来する。', answer:true, explanation:'「プロテスタント」は1529年のシュパイヤー帝国議会でカトリック側の決定に対してルター派諸侯が「抗議（Protestatio）」したことに由来します。現在は「プロテスト（抗議）」という意味よりも、宗教改革から生まれたキリスト教各派の総称として使われています。' },
{ chapter:4, type:'ox', text:'日本のキリスト教人口は総人口の約30%を占める。', answer:false, explanation:'日本のキリスト教人口は総人口の約1〜2%程度とされており、非常に少数派です（カトリック・プロテスタント・正教会などを合わせて）。仏教徒（約67〜70%）・神道（約70〜80%、重複含む）と比べて大幅に少ない数字です。' },
{ chapter:4, type:'ox', text:'「正教会（せいきょうかい）」は東方キリスト教の一派で、ロシア正教・ギリシャ正教などがある。', answer:true, explanation:'正教会（Eastern Orthodox Church）は1054年のキリスト教大分裂でカトリックと分かれた東方キリスト教の流れで、ロシア正教会・ギリシャ正教会・日本正教会（ハリストス正教会）などがあります。日本では幕末に伝来しました。' },
{ chapter:4, type:'ox', text:'キリスト教の「臨終の秘跡（病者の塗油）」は、死が迫った時に司祭が行う儀礼でカトリックのみの慣行である。', answer:true, explanation:'病者の塗油（かつての「終油の秘跡」）はカトリックの七つの秘跡（サクラメント）のひとつで、重篤な患者や臨終の際に司祭が聖油を塗り祈る儀礼です。プロテスタントは一般的にこのような秘跡の制度を持ちません。' },

// --- 新宗教・諸派深掘り ---
{ chapter:4, type:'ox', text:'「天理教」では死を「出直し（でなおし）」と表現し、現世での修行を終えて神のもとへ帰ると考える。', answer:true, explanation:'天理教では人の死を否定的に捉えず、「神から借りていた体を返し、魂が生まれ直す（出直す）」という積極的な意味を持たせています。このため葬儀の場でも「死」「亡くなる」などの言葉を使わず「出直す」と言います。' },
{ chapter:4, type:'ox', text:'「霊友会（れいゆうかい）」は仏教系の新宗教で、現在も多くの派生宗教を生み出している。', answer:true, explanation:'霊友会（1919年創設）は法華経と先祖供養を基本とする新宗教で、立正佼成会・仏所護念会・妙智会など多くの派生宗教（分派）を生み出しました。これらをまとめて「霊友会系」と呼ぶこともあります。' },
{ chapter:4, type:'ox', text:'「世界救世教（せかいきゅうせいきょう）」は岡田茂吉が開いた新宗教で、「浄霊（じょうれい）」と呼ばれる手かざし療法が特徴である。', answer:true, explanation:'世界救世教は1935年に岡田茂吉（もきち）が開いた新宗教で、「光」を手から放射して病気を治す「浄霊」が特徴的な実践です。MOA美術館（静岡・東京）の運営でも知られます。' },
{ chapter:4, type:'ox', text:'「生長の家（せいちょうのいえ）」は谷口雅春が開いた新宗教で、「神の子」として人間の完全性を説く。', answer:true, explanation:'生長の家は1930年に谷口雅春が開いた新宗教で、「人間は神の子であり本来完全・善・美である」という「神人不二」の思想を説きます。雑誌「生長の家」の出版・「聖使命」誌などを通じて広まりました。' },
{ chapter:4, type:'ox', text:'「神社神道」と「教派神道」は同じものである。', answer:false, explanation:'神社神道は全国の神社・神宮で行われる伝統的な神道です。教派神道は明治時代に政府が公認した天理教・金光教・黒住教など13の宗教団体を指します。神社神道は国家管理下に置かれ（戦前）、教派神道は民間宗教として別扱いされました。' },
{ chapter:4, type:'ox', text:'「黒住教（くろずみきょう）」は江戸時代後期に岡山で成立した神道系の新宗教で、太陽神・天照大御神への信仰が中心である。', answer:true, explanation:'黒住教は1814年に岡山の神官・黒住宗忠が「天命直授（てんめいじきじゅ）」の神秘体験を経て開いた神道系新宗教です。太陽（天照大御神）への信仰と感謝を中心に、明るく積極的な生き方を説きます。教派神道の一つです。' },

// --- 法要・忌日深掘り ---
{ chapter:4, type:'ox', text:'「三十三回忌」は多くの宗派で「弔い上げ（とむらいあげ）」とされ、以後の個別の年忌法要を終了することが多い。', answer:true, explanation:'三十三回忌（満32年後）は多くの仏教宗派で年忌法要の締めくくり（弔い上げ）とされます。この後は個人として祀るのをやめ、先祖代々の霊として合祀する場合が多いです。地域・宗派によっては五十回忌を弔い上げとすることもあります。' },
{ chapter:4, type:'ox', text:'「月命日（つきめいにち）」とは、毎月その人が亡くなった日と同じ日付のことである。', answer:true, explanation:'月命日は毎月巡ってくる命日で、例えば3月15日に亡くなった場合、毎月15日が月命日です。年に一度の「命日（祥月命日・しょうつきめいにち）」と区別して「月命日」と呼びます。月命日に墓参りや仏前での手を合わせを行う習慣があります。' },
{ chapter:4, type:'ox', text:'「祥月命日（しょうつきめいにち）」とは、故人が亡くなった月日（月と日）が一致する、年に一度の命日のことである。', answer:true, explanation:'祥月命日（正忌・しょうき）は故人が亡くなった月と日が同じ、年に一度の本来の命日です。毎月の「月命日」と区別します。一周忌・三回忌などの年忌法要は原則としてこの祥月命日に行います。' },
{ chapter:4, type:'ox', text:'「涅槃会（ねはんえ）」は釈迦の誕生を祝う仏教行事である。', answer:false, explanation:'涅槃会は2月15日に釈迦の入滅（死去）を偲ぶ仏教行事です。釈迦の誕生を祝う行事は「花まつり（灌仏会・かんぶつえ）」で4月8日に行われます。「成道会（じょうどうえ）」は12月8日に釈迦の悟りを祝う行事です。' },
{ chapter:4, type:'ox', text:'「お盆（盂蘭盆会）」は仏教行事であり、先祖の霊が年に一度この世に戻ってくると信じられている。', answer:true, explanation:'お盆（盂蘭盆会・うらぼんえ）はインドの仏教行事が日本の祖先信仰・神道と融合した行事です。8月13日に迎え火で先祖の霊を迎え、16日に送り火で送り出す慣習があります（地域によっては7月）。精霊棚・盆踊りなど日本独自の文化も生まれました。' },

// --- 葬儀マナー・実務 ---
{ chapter:4, type:'ox', text:'葬儀に参列する際の数珠は、宗派の違う葬儀でも自分の宗派の数珠を使って構わない。', answer:true, explanation:'数珠は本来その宗派専用のものがありますが、葬儀に参列する際は自分の宗派の数珠（または「略式数珠」）を持参することが一般的で、他宗派の葬儀でも使用して問題ありません。数珠を持参すること自体が礼儀とされます。' },
{ chapter:4, type:'ox', text:'「喪中はがき」は一般的に故人が亡くなった翌年の年賀状シーズンに合わせて11〜12月に送る。', answer:true, explanation:'喪中はがき（年賀欠礼状）は、相手が年賀状を書く前に届くよう11月〜12月初旬に送るのが一般的なマナーです。年賀状が届いた後に喪中の事を知った場合は「寒中見舞い」で返答します。' },
{ chapter:4, type:'ox', text:'「香典（こうでん）」の語源は、線香・焼香など香を供えることへのお礼が金銭に変化したものとされる。', answer:true, explanation:'香典はもともと「香料（こうりょう）」とも呼ばれ、線香・香などを供えることへの代わりとして金銭を包むようになったものです。「典」は「典礼・儀式」という意味で、「香を供える儀礼への志」という意味合いがあります。' },
{ chapter:4, type:'ox', text:'「弔電（ちょうでん）」は葬儀に参列できない場合に喪家に送る電報で、現代でもNTTなどを通じて送ることができる。', answer:true, explanation:'弔電は葬儀に参列できない際に喪主宛てに送る電報形式のお悔やみで、現代でもNTT・KDDI・電報各社のサービスを通じて送ることができます。葬儀式場に届くよう、通夜・葬儀の前日までに手配するのが一般的です。' },
{ chapter:4, type:'ox', text:'葬儀の「受付」は遺族が担当するのが正式なマナーである。', answer:false, explanation:'葬儀の受付は故人の友人・知人・会社の同僚など「世話人（てつだい人）」が担当するのが一般的です。遺族は弔問客への挨拶・接待・式の進行に専念するため、受付は他の人に委ねるのが通例です。' },

// --- 葬儀形式・現代的変化 ---
{ chapter:4, type:'ox', text:'「音楽葬（おんがくそう）」とは、故人が好んだ音楽を式中に流したり演奏したりする葬儀形式で、無宗教葬の一種である。', answer:true, explanation:'音楽葬は宗教的な儀礼の代わりに、または組み合わせて、故人が愛した音楽を中心に構成する葬儀形式です。無宗教葬（自由葬）の中でも増加しており、生演奏・録音再生・合唱など様々な形があります。' },
{ chapter:4, type:'ox', text:'「グリーフケア」は遺族支援のためのケアであり、葬儀社が提供するアフターフォローとしても注目されている。', answer:true, explanation:'グリーフケアは死別などによる悲嘆（グリーフ）を抱えた遺族を心理的・社会的に支援するケアです。近年、葬儀社が葬儀後の遺族を訪問したり、グリーフケアの場を提供したりするアフターフォローの一環として提供するケースが増えています。' },
{ chapter:4, type:'ox', text:'「手元供養（てもとくよう）」とは、遺骨の一部を小さな骨壺や専用のアクセサリーに入れて手元に置いて供養する方法である。', answer:true, explanation:'手元供養は墓への納骨に加えて（または代わりに）遺骨の一部を手元に置いて供養する方法です。ミニ骨壺・メモリアルジュエリー（遺骨を入れたアクセサリー）・ぬいぐるみ型など様々な形があり、近年増加しています。' },

// --- 仏教宗派詳細 ---
{ chapter:4, type:'4', text:'「浄土真宗大谷派（東本願寺）」の焼香作法として正しいものはどれか。', choices:['額に押しいただいて1回','額に押しいただかずに1回','額に押しいただかずに2回','額に押しいただいて3回'], answer:2, explanation:'真宗大谷派（東本願寺）の焼香は「押しいただかず（額に当てず）に2回」が正式な作法です。浄土真宗本願寺派（西本願寺）は「押しいただかずに1回」です。この違いは覚えておく必要があります。' },
{ chapter:4, type:'4', text:'「一向宗（いっこうしゅう）」とは何の別称か。', choices:['曹洞宗','日蓮宗','浄土真宗','時宗'], answer:2, explanation:'一向宗は浄土真宗（本願寺）の俗称で、「ひたすら（一向に）阿弥陀仏を念じる」という意味から付いた呼び名です。戦国時代に各地で起きた「一向一揆」は浄土真宗（一向宗）の門徒が起こした武装蜂起でした。' },
{ chapter:4, type:'4', text:'「修験道（しゅげんどう）」の特徴として正しいものはどれか。', choices:['純粋な仏教の宗派','山岳での厳しい修行を通じて呪力を得ようとする、仏教・神道・道教などが融合した宗教実践','キリスト教の影響を受けた日本固有の宗教','武士道を宗教化した日本独自の精神形式'], answer:1, explanation:'修験道は山岳に神仏が宿るという信仰のもと、峰入り（山中での修行）を通じて霊力・呪力（験力）を得ようとする宗教実践で、仏教（特に密教）・神道・道教・山岳信仰などが融合しています。役小角（えんのおづぬ）を開祖とします。' },
{ chapter:4, type:'4', text:'「高野山（こうやさん）」について正しい説明はどれか。', choices:['天台宗の総本山がある山','真言宗の総本山・金剛峯寺がある霊場で、世界遺産にも登録されている','日蓮宗の創始者・日蓮が晩年を過ごした山','禅宗の修行道場が集まる山'], answer:1, explanation:'高野山（和歌山県伊都郡高野町）は真言宗の総本山・金剛峯寺がある霊場で、2004年に「紀伊山地の霊場と参詣道」としてユネスコ世界遺産に登録されました。奥之院には空海の御廟所があり、今も生きて定を続けていると信じられています。' },
{ chapter:4, type:'4', text:'「比叡山（ひえいざん）」延暦寺の説明として正しいものはどれか。', choices:['真言宗の総本山','浄土宗の開祖・法然が開いた寺','天台宗の総本山で、多くの鎌倉仏教の開祖を輩出した日本仏教の母山','日蓮宗の総本山'], answer:2, explanation:'比叡山延暦寺（滋賀県大津市）は天台宗の総本山で、最澄（伝教大師）が開きました。法然・親鸞・道元・日蓮・栄西など鎌倉時代の多くの宗祖が修行した場所であり「日本仏教の母山」と呼ばれます。2004年に世界遺産登録。' },
{ chapter:4, type:'4', text:'「永平寺（えいへいじ）」について正しい説明はどれか。', choices:['臨済宗の総本山','曹洞宗の大本山のひとつで、道元が開いた寺','浄土真宗の本山','真言宗の別院'], answer:1, explanation:'永平寺（福井県吉田郡永平寺町）は曹洞宗の大本山のひとつで、道元が1244年に開きました。現在も多くの雲水（修行僧）が修行する「参禅道場」として知られます。もう一つの大本山は横浜の總持寺です。' },
{ chapter:4, type:'4', text:'「知恩院（ちおんいん）」の説明として正しいものはどれか。', choices:['曹洞宗の総本山','浄土宗の総本山で、法然上人が念仏を広めた地に建てられた','日蓮宗の大本山','浄土真宗の別院'], answer:1, explanation:'知恩院（京都市東山区）は浄土宗の総本山で、法然上人が念仏の教えを広め、入定（死去）した地に建てられました。三門（国宝）は木造建築として日本最大級の規模を誇ります。除夜の鐘でも有名です。' },
{ chapter:4, type:'4', text:'「宗祖（しゅうそ）」と「中興の祖（ちゅうこうのそ）」の違いとして正しいものはどれか。', choices:['宗祖は現在の宗派のトップ、中興の祖は歴史上の人物','宗祖はその宗派を開いた人物、中興の祖は後に宗派を再興・発展させた人物','まったく同じ意味','宗祖は仏教用語、中興の祖は神道用語'], answer:1, explanation:'宗祖はその宗派の開祖を指します。中興の祖は宗派が衰えた時期にそれを再び盛んにした功績ある人物のことです。例えば曹洞宗では道元が宗祖、瑩山紹瑾が中興の祖とされます。' },

// --- 神式詳細 ---
{ chapter:4, type:'4', text:'神式葬儀の「発柩祭（はっきゅうさい）」とは何か。', choices:['火葬場で行う最後の儀式','棺を斎場・自宅から出棺する際の儀式','骨上げの際の儀式','帰宅後の清めの儀式'], answer:1, explanation:'発柩祭は棺を安置場所（自宅・斎場）から出棺する際に行う神式の儀式です。仏式の「出棺」に相当します。出棺の際に神職が祝詞を奏上し、一同が玉串を奉奠して故人の旅立ちを送ります。' },
{ chapter:4, type:'4', text:'神式葬儀における香典の正しい表書きはどれか。', choices:['御仏前','御花料','御玉串料または御榊料','御霊前のみ'], answer:2, explanation:'神式葬儀への香典は「御玉串料（おたまぐしりょう）」または「御榊料（おさかきりょう）」が最も適切です。「御神前（ごしんぜん）」「御霊前」も使えます。「御仏前」は仏式専用です。' },
{ chapter:4, type:'4', text:'神道における「祓詞（はらえことば）」とはどういうものか。', choices:['葬儀の際に奏上する弔いの言葉','穢れや罪を祓い清めるために唱える祝詞（のりと）','神社への参拝時に述べる感謝の言葉','神職の身分を証明する言葉'], answer:1, explanation:'祓詞は穢れ・罪・災いを祓い清めるために唱える祝詞で、「払へ給ひ清め給へと申す事を聞こし召せと白す」という内容が含まれます。神葬祭でも各種の儀礼で祓詞が奏上されます。' },

// --- 諸宗教・比較 ---
{ chapter:4, type:'4', text:'「イスラム教」の葬儀の特徴として正しいものはどれか。', choices:['火葬が原則で、できるだけ早く行う','土葬が原則で、死後できるだけ早く（24時間以内が理想）行う','散骨が推奨される','遺体は7日間安置してから埋葬する'], answer:1, explanation:'イスラム教では遺体を土に還すことが教義上の原則のため土葬です。また「早い埋葬が故人への敬意」とされ、死後できるだけ早く（24時間以内が理想）に行います。日本では土葬できる墓地が少なく課題となっています。' },
{ chapter:4, type:'4', text:'ユダヤ教の葬儀の特徴として正しいものはどれか。', choices:['豪華な棺を使い、長期間かけて行う','シンプルな木製の棺を使い、死後できるだけ早く土葬する','火葬を推奨する','僧侶が読経する'], answer:1, explanation:'ユダヤ教では「人間は土から生まれ土に返る」という考えから、土葬が原則です。棺はシンプルな木製（木釘使用・金具不使用）が伝統で、土に早く還るようにします。死後24時間以内の埋葬が理想とされます。' },
{ chapter:4, type:'4', text:'ヒンドゥー教の葬儀の特徴として正しいものはどれか。', choices:['土葬が原則','火葬が原則で、ガンジス川での水葬も行われる','遺体は保存処理して長期間安置する','読経を3日間続ける'], answer:1, explanation:'ヒンドゥー教では輪廻転生の思想から「肉体はただの入れ物」と考え、火葬（荼毘・だび）が一般的です。インドではガンジス川沿いの火葬場（ガート）で火葬し、遺灰を川に流す慣習があります。仏教の「荼毘に付す」という言葉もヒンドゥー教由来です。' },
{ chapter:4, type:'4', text:'「神道」「仏教」「キリスト教」「イスラム教」の中で、日本人の葬儀で最も多く行われているのはどれか。', choices:['神道（神葬祭）','仏教式（仏式）','キリスト教式','イスラム教式'], answer:1, explanation:'日本の葬儀は仏教式が最も多く、約90%前後とされています（調査機関・時期によって異なります）。神式は数%程度、キリスト教式は1〜2%程度です。ただし近年は無宗教・家族葬の増加により、宗教色のない葬儀も増えています。' },
{ chapter:4, type:'4', text:'次のうち「教派神道」として明治政府が公認した13派に含まれないものはどれか。', choices:['天理教','黒住教','金光教','創価学会'], answer:3, explanation:'教派神道（神道十三派）は明治政府が公認した神道系宗教で、黒住教・神道修成派・出雲大社教・扶桑教・実行教・大成教・神習教・御嶽教・神道大社教・禊教・金光教・天理教・神道本局の13派です。創価学会は日蓮宗系の新宗教であり含まれません。' },

// --- 法要・文化 ---
{ chapter:4, type:'4', text:'「お彼岸（おひがん）」に行う主な供養として一般的なものはどれか。', choices:['神社への参拝と玉串奉奠','墓参り・仏壇への供養・法要','教会での礼拝と献花','散骨と海洋供養'], answer:1, explanation:'お彼岸（春分・秋分の前後各3日間）には先祖の墓参り・仏壇への供物・法要などが行われます。「ぼたもち（牡丹餅）」「おはぎ（御萩）」を供える慣習も有名です（春はぼたもち、秋はおはぎ）。神式・キリスト教式では一般的な行事ではありません。' },
{ chapter:4, type:'4', text:'「四十九日」に行う一般的な作法として誤っているものはどれか。', choices:['仮の白木位牌から本位牌へ切り替える','香典の表書きを「御霊前」から「御仏前」に変更する','納骨を行う','喪中はがきを送る'], answer:3, explanation:'喪中はがき（年賀欠礼状）は11〜12月に送るもので、四十九日のタイミングで送るものではありません。四十九日では①白木位牌から本位牌への切り替え②納骨③忌明けのお礼④「御霊前」→「御仏前」への表書き変更、などが一般的に行われます。' },
{ chapter:4, type:'4', text:'「回向（えこう）」とはどういう意味か。', choices:['お墓の向きを変えること','自分の功徳（善行・読経など）を故人や他の人のために振り向けること','葬儀場の方向を確認すること','仏壇の向きを直すこと'], answer:1, explanation:'回向（廻向）とは自分が積んだ善根・功徳を他の者（故人や生きている人）のために振り向けることです。法要での読経・布施などが回向の代表的な実践で、「追善回向」は故人の冥福のために行う追善供養を指します。' },
{ chapter:4, type:'4', text:'「施餓鬼（せがき）」法要とは何か。', choices:['葬儀の費用を計算する儀礼','餓鬼道に苦しむ霊や無縁仏に食物を施す供養法要','お盆に行う盆踊りの起源となった儀式','彼岸に行う先祖供養の特別法要'], answer:1, explanation:'施餓鬼法要は、餓鬼道（飢えに苦しむ世界）に堕ちた霊や無縁仏（供養する人のない霊）に食物を施して供養する法要です。お盆の時期や彼岸に合わせて行われることが多く、お寺が主催する合同の施餓鬼法要も各地で行われます。' },
{ chapter:4, type:'4', text:'「位牌（いはい）」の説明として正しいものはどれか。', choices:['神式で使用する霊魂の依代','仏式で戒名・没年月日・俗名などを記した木製の牌で、故人の霊の依代とされる','キリスト教式で聖書を置く台','葬儀場の案内表示板'], answer:1, explanation:'位牌は仏式で使用する木製の牌で、戒名・没年月日・俗名・享年などが記されます。故人の霊の依代（よりしろ）として仏壇に安置し、日々の供養の対象となります。葬儀直後は白木の「仮位牌（白木位牌）」を使い、四十九日後に塗位牌・本位牌に変えます。' },
{ chapter:4, type:'4', text:'「通夜振舞い（つやぶるまい）」とは何か。', choices:['通夜の式次第の進行のこと','通夜終了後に参列者を接待する会食のこと','通夜の際に喪主が挨拶すること','通夜の翌朝に行う朝食のこと'], answer:1, explanation:'通夜振舞いは通夜の式が終わった後、参列者に飲食でもてなす会食のことです。故人との思い出を語り合い、遺族が参列へのお礼をする場でもあります。料理は寿司・オードブル・精進料理などが多く、地域によって内容が異なります。' },
{ chapter:4, type:'4', text:'「中陰（ちゅういん）」とは何を指すか。', choices:['仏壇のある部屋のこと','死後に次の生を受けるまでの49日間の状態','仏教の瞑想修行の一種','葬儀と告別式の間の休憩時間'], answer:1, explanation:'中陰（中有）とは仏教において、死後に次の生（転生）を受けるまでの過渡的な状態・期間を指します。この期間は49日間（七七日）とされ、7日ごとに裁きを受けると考えられています。これが四十九日法要を重視する根拠となっています。' },
{ chapter:4, type:'4', text:'「引導（いんどう）」を渡す主な目的として正しいものはどれか。', choices:['遺体を火葬場まで運ぶ','故人の霊を迷いから解放し、仏の世界へ導く','遺族に葬儀の費用を説明する','参列者に式の進行を案内する'], answer:1, explanation:'引導は導師（僧侶）が故人に向けて引導文（いんどうぶん）を読み上げ、この世への執着を断ち切って迷わず仏の世界へ向かうよう導く儀式です。仏式葬儀（特に禅宗）の中核をなす重要な儀礼のひとつです。' },
{ chapter:4, type:'4', text:'「導師（どうし）」が複数の僧侶で行う葬儀の場合、最も位の高い僧侶はどの役割を担うか。', choices:['受付・案内','導師（引導を渡す主役の僧侶）','斎主（神職の役割）','葬儀社の担当者'], answer:1, explanation:'複数の僧侶が参列する葬儀では、最も地位の高い（または住職・故人と最も縁の深い）僧侶が「導師」として引導・読経の中心的役割を務めます。他の僧侶は「伴僧（ばんそう）・脇僧（わきそう）」として導師を補佐します。' },
{ chapter:4, type:'4', text:'「焼香」の「抹香（まっこう）」とはどういうものか。', choices:['線香を細かく粉末にしたもの，または香木・香料を粉末にしたもの','ロウソクに火をつける道具','仏壇に供える果物や菓子','焼香台の炭火のこと'], answer:0, explanation:'抹香（まっこう）は香木・香料などを細かく粉末状にしたもので、焼香の際に指でつまんで炭火の上に落として焚きます。「沈香（じんこう）」「白檀（びゃくだん）」など香木が主原料です。' },
{ chapter:4, type:'4', text:'「般若心経（はんにゃしんぎょう）」はどの宗派でも広く読まれているか。', choices:['浄土真宗でも必ず読まれる','浄土真宗では読まれないが、他の多くの宗派で広く読まれている','日蓮宗でのみ読まれる','キリスト教でも取り入れている'], answer:1, explanation:'般若心経は真言宗・天台宗・禅宗（曹洞宗・臨済宗）・浄土宗など多くの宗派で読まれる経典です。しかし浄土真宗では「阿弥陀経・正信偈」など浄土三部経が中心で、般若心経は読みません。日蓮宗も法華経が中心です。' },
{ chapter:4, type:'4', text:'「過去帳（かこちょう）」を毎日めくる習慣について正しいものはどれか。', choices:['浄土真宗では毎日めくり、その日の命日の故人に手を合わせる習慣がある','すべての宗派で必ず毎日めくる','過去帳はめくらずに保管するだけのもの','過去帳は寺院だけが持つもの'], answer:0, explanation:'浄土真宗では過去帳を命日帳として毎日めくり（日付のある「日めくり型過去帳」）、その日に命日を迎える先祖に手を合わせる習慣があります。位牌を使わない浄土真宗において過去帳は重要な供養の道具です。' },
{ chapter:4, type:'4', text:'「檀家（だんか）」制度の説明として正しいものはどれか。', choices:['江戸幕府が設けた制度で、すべての人が特定の寺院に所属することを義務付けた','平安時代に始まった貴族と寺院の関係','神社と氏子の関係を指す','葬儀社が顧客を管理するシステム'], answer:0, explanation:'檀家制度は江戸幕府がキリシタン禁制のために設けた「寺請制度（てらうけせいど）」に基づくもので、すべての民衆が特定の寺院の檀家となり、宗教証明を受けることを義務付けました。これが現代の「菩提寺（ぼだいじ）」制度の起源です。' },

// --- 追加30問（○×15・4択15）---
{ chapter:4, type:'ox', text:'「お布施（おふせ）」は葬儀サービスへの対価（報酬）であり、消費税の課税対象となる。', answer:false, explanation:'お布施は僧侶・寺院への感謝として渡すものであり、法的には「寄付金（布施）」の性格を持ちます。対価性のない寄付のため消費税は不課税です。金額の明示義務もなく、「お気持ち」として遺族が決める形が多いです。' },
{ chapter:4, type:'ox', text:'「初七日法要」は現代では葬儀当日に「繰り込み初七日」として行われることが多い。', answer:true, explanation:'本来は死後7日目に行う初七日法要ですが、遠方からの参列者の都合・日程の効率化のため、現代では葬儀・告別式当日に続けて行う「繰り込み初七日（式中初七日）」が主流になっています。' },
{ chapter:4, type:'ox', text:'「精霊馬（しょうりょううま）」はお盆に作るきゅうりとなすの飾りで、きゅうりが馬、なすが牛を表す。', answer:true, explanation:'精霊馬（精霊牛）はお盆に先祖の霊を迎え送るための乗り物として作ります。きゅうりは足の速い「馬」（あの世から早く帰ってくるよう）、なすはゆっくりした「牛」（この世をゆっくり去っていくよう）を表します。' },
{ chapter:4, type:'ox', text:'「寺請制度（てらうけせいど）」は明治時代に廃止され、現代日本には存在しない。', answer:true, explanation:'寺請制度は明治政府の政教分離政策により1871年（明治4年）に廃止されました。しかし「菩提寺」への依存や仏教式葬儀の慣行は現在も続いており、制度としては廃止されても文化・慣習として根付いています。' },
{ chapter:4, type:'ox', text:'「禅語」で有名な「不立文字（ふりゅうもんじ）」とは「文字に頼らず直接体験で悟りを得る」という禅の立場を示す。', answer:true, explanation:'「不立文字」は禅の基本姿勢を示す言葉で、「経典の文字・言葉に頼らず、師から弟子への心から心への直接伝達（以心伝心）によって悟りを伝える」という意味です。「教外別伝（きょうげべつでん）」「直指人心（じきしにんしん）」「見性成仏（けんしょうじょうぶつ）」とともに禅の四句とされます。' },
{ chapter:4, type:'ox', text:'「念仏（ねんぶつ）」とは仏の名前を唱えることだけを指す。', answer:false, explanation:'念仏とは本来「仏を念じる（心に思い浮かべる）」という意味で、①口称念仏（くしょうねんぶつ：声に出して仏名を称える）②観想念仏（かんそうねんぶつ：仏の姿を心に観想する）③実相念仏などがあります。日本の浄土宗系では主に口称念仏（「南無阿弥陀仏」を称える）を指します。' },
{ chapter:4, type:'ox', text:'「神道」では「死穢（しえ）」を最大の穢れとするため、神社の境内に墓地を設けることは原則ない。', answer:true, explanation:'神道において死は最大の穢れ（死穢）とされるため、神社の境内に墓地を設けることは原則ありません。これは寺院が境内に墓地（寺院墓地）を持つ仏教の慣習と対照的です。神道系の墓地は神社とは別の場所に設けられます。' },
{ chapter:4, type:'ox', text:'「連名（れんめい）」の香典は、複数人が連名で一つの香典袋に入れて渡すことができる。', answer:true, explanation:'同僚・グループ・部署など複数人でまとめて香典を出す場合、連名で一つの香典袋に入れることができます。表書きには代表者名を書き「外一同」などと添えます。別紙に全員の名前と金額を書いて同封するのが丁寧な作法です。' },
{ chapter:4, type:'ox', text:'「浄土（じょうど）」とは仏が清らかにした世界のことで、「極楽浄土」は阿弥陀仏の浄土を指す。', answer:true, explanation:'浄土は仏・菩薩が衆生を救うために設けた清浄な世界のことです。阿弥陀仏の浄土は「極楽浄土（西方極楽世界）」、薬師仏の浄土は「東方浄瑠璃世界」などがあります。浄土宗・浄土真宗は阿弥陀仏の極楽浄土への往生を目指します。' },
{ chapter:4, type:'ox', text:'「密教（みっきょう）」は公開された教えであり、誰でも自由に学ぶことができる。', answer:false, explanation:'密教の「密」は「秘密」を意味し、師から弟子への秘密の伝授（口伝・灌頂）によって伝えられる教えです。「顕教（けんきょう）」が経典として公開された教えなのに対し、密教は師資相承（師弟間の秘密の伝達）を重視します。' },
{ chapter:4, type:'ox', text:'「真言宗」の「護摩（ごま）」とは、火を使った密教の儀式で、煩悩を焼き尽くす意味がある。', answer:true, explanation:'護摩（梵語：ホーマ）は密教の重要な修法で、炉に火を焚き、木・米・胡麻などの供物を投入して燃やすことで煩悩を焼き尽くし、願いを成就させるとされます。不動明王を本尊として行う「不動護摩」が代表的です。' },
{ chapter:4, type:'ox', text:'「日蓮正宗（にちれんしょうしゅう）」は日蓮宗から派生した宗派で、創価学会はかつてこの宗派の信徒団体だった。', answer:true, explanation:'日蓮正宗は1290年頃に日興（にっこう）が日蓮の本弟子として開いた宗派で、総本山は富士山麓の大石寺（静岡県富士宮市）です。創価学会は元々日蓮正宗の信徒団体でしたが、1991年に対立が深まり破門されて独立しました。' },
{ chapter:4, type:'ox', text:'「おくり火（送り火）」はお盆の最終日（8月16日）に先祖の霊を送り出すために焚く火である。', answer:true, explanation:'送り火はお盆の終わり（8月16日）に先祖の霊があの世へ帰るのを見送るために焚く火です。迎え火（8月13日）の対となる慣習です。京都の「大文字焼き（五山の送り火）」は全国的に有名な送り火の行事です。' },
{ chapter:4, type:'ox', text:'「施主（せしゅ）」は仏教用語で、もともとは「布施（ふせ）をする人＝僧侶・寺院に財物を施す人」を意味する。', answer:true, explanation:'施主は梵語「ダーパティ」の訳で、本来は「布施をする在家信者（お金・食物などを僧侶に施す人）」という意味です。現代では葬儀・法要の費用を負担し手配する人（多くの場合、喪主と同一人物）を指す意味でも使われています。' },
{ chapter:4, type:'ox', text:'「開眼供養（かいげんくよう）」とは、新しく作った仏像・位牌・墓石などに魂（霊）を入れる儀式である。', answer:true, explanation:'開眼供養（開眼法要・魂入れ）は新しく仏像・位牌・墓石などを作った際に、僧侶が読経して「目を開く（魂・霊を入れる）」儀式です。これにより単なる物体が礼拝の対象となります。墓石を建てた際にも行われます。' },
{ chapter:4, type:'4', text:'「両祖（りょうそ）」という言葉で知られる曹洞宗の二人の宗祖は誰か。', choices:['道元と栄西','道元と瑩山紹瑾','最澄と空海','法然と親鸞'], answer:1, explanation:'曹洞宗では「両祖（りょうそ）」として道元（承陽大師）と瑩山紹瑾（常済大師）を崇敬します。道元が宗祖として曹洞宗を開き、瑩山が総持寺を開いて宗勢を大きく拡大したことから「中興の祖」と呼ばれます。' },
{ chapter:4, type:'4', text:'「禅宗」の葬儀における焼香の回数として一般的なものはどれか。', choices:['1回','2回','3回','5回'], answer:2, explanation:'曹洞宗・臨済宗などの禅宗では焼香を3回行うのが一般的な作法です。ただし地域・寺院・状況によって異なる場合もあります。浄土真宗（1〜2回）や浄土宗（1〜3回）などと比較して覚えましょう。' },
{ chapter:4, type:'4', text:'「五山（ごさん）」制度とは何か。', choices:['天台宗の五つの本山','鎌倉・室町幕府が定めた禅宗寺院の格付け制度','真言宗の重要寺院五か所','浄土宗の五つの大本山'], answer:1, explanation:'五山制度は鎌倉・室町幕府が臨済宗の重要寺院を格付けした制度で、京都五山（天龍寺・相国寺・建仁寺・東福寺・万寿寺）と鎌倉五山（建長寺・円覚寺・寿福寺・浄智寺・浄妙寺）があります。幕府の保護下で禅文化が発展しました。' },
{ chapter:4, type:'4', text:'「本山（ほんざん）」と「末寺（まつじ）」の関係として正しいものはどれか。', choices:['本山は古い寺院、末寺は新しい寺院','本山は宗派の中心となる寺院、末寺はその宗派に属する一般の寺院','本山は大きな寺院、末寺は小さな寺院','本山は東京の寺院、末寺は地方の寺院'], answer:1, explanation:'本山は宗派の中心・統括機関となる寺院（総本山・大本山など）で、宗祖ゆかりの地に建てられることが多いです。末寺はその宗派に属する一般の寺院で、本山の管轄下にあります。「本末関係（ほんまつかんけい）」と呼ばれます。' },
{ chapter:4, type:'4', text:'「無宗教葬（自由葬）」で避けるべき配慮として正しいものはどれか。', choices:['音楽を流すこと','特定の宗教の儀礼（読経・祝詞・讃美歌など）を押しつけないこと','献花を行うこと','司会者を設けること'], answer:1, explanation:'無宗教葬では参列者の宗教的背景が様々であることを考慮し、特定宗教の儀礼を強制しないことが重要です。音楽・献花・司会・映像などは宗教色のない演出として広く使われます。故人・遺族の意向を最大限尊重した式づくりが求められます。' },
{ chapter:4, type:'4', text:'「葬場祭（そうじょうさい）」とはどの宗教の葬儀用語か。', choices:['仏式','神式（神葬祭）','キリスト教式','無宗教葬'], answer:1, explanation:'葬場祭は神葬祭（神式葬儀）の中心的な儀式で、仏式の「葬儀・告別式」に相当します。斎主が祭詞を奏上し、参列者が玉串奉奠を行います。神葬祭の式次第は遷霊祭→発柩祭→葬場祭→火葬祭→帰家祭の順です。' },
{ chapter:4, type:'4', text:'「戒名料（かいみょうりょう）」についての正しい説明はどれか。', choices:['法律で定められた一定の金額がある','一般的に院号＞道号・戒名＞位号の順に高くなる傾向があり、金額は寺院・宗派によって大きく異なる','戒名料は仏教どの宗派でも同じ料金体系','戒名料は葬儀社が設定する'], answer:1, explanation:'戒名料は法律で定められた金額はなく、院号の有無・文字数・寺院との関係などによって大きく異なります。院号付きは数十万〜数百万円、一般的な戒名は数万〜数十万円程度が相場とされますが、寺院・地域・宗派によって様々です。' },
{ chapter:4, type:'4', text:'「神棚封じ（かみだなふうじ）」とはどういうものか。', choices:['神棚を撤去すること','死の穢れが神棚に及ばないよう、白い紙を貼って神棚を封じること','神棚に新しい神札を入れること','神棚の掃除をすること'], answer:1, explanation:'神棚封じは家人が亡くなった際に、死の穢れが神様に及ばないよう神棚の扉または正面に白紙（半紙）を貼って封じる慣習です。神道の「死穢（しえ）」の概念から来ており、忌明け（五十日祭後）に紙を取り外します。' },
{ chapter:4, type:'4', text:'「菩提寺（ぼだいじ）」の意味として正しいものはどれか。', choices:['悟りを開いた場所にある寺','その家の先祖代々の葬儀・法事を行い、遺骨・位牌を管理する縁の深い寺院','全国で最も格式の高い寺院','葬儀社が指定する提携寺院'], answer:1, explanation:'菩提寺とは、その家の先祖代々の葬儀・年忌法要を行い、墓地・位牌を管理する縁の深い寺院のことです。江戸時代の寺請制度に起源を持ち、現代でも「家の宗教」として続いています。菩提寺のある家では葬儀の際に菩提寺の住職に依頼するのが一般的です。' },
{ chapter:4, type:'4', text:'「三途の川（さんずのかわ）」について正しい説明はどれか。', choices:['神道の死後の世界に存在する川','仏教の死後の世界観で、死者がこの世からあの世へ渡る際に越えるとされる川','キリスト教の天国への道にある川','実在する河川の別名'], answer:1, explanation:'三途の川は仏教の死後の世界観で、死者が冥土へ向かう途中に渡るとされる川です。生前の行いによって渡り方が異なり（橋・浅瀬・深み）、川の番人「奪衣婆（だつえば）」と「懸衣翁（けんえおう）」が衣服を奪って罪の重さを量るとされます。' },
{ chapter:4, type:'4', text:'「冥土（めいど）」「黄泉（よみ）」「地獄（じごく）」の説明として正しいものはどれか。', choices:['すべて同じ場所を指す別の言葉','冥土は仏教の死後の世界、黄泉は日本神話の死者の国、地獄は冥土の中でも罪人が苦しむ場所','冥土はキリスト教用語、黄泉は仏教用語','地獄は現世の苦しい状態を表すだけで死後の世界ではない'], answer:1, explanation:'「冥土（冥途）」は仏教における死後の世界の総称、「黄泉（よもつひらさか）」は日本神話（古事記）に登場する死者が行く国、「地獄」は冥土の中で最も厳しい罰を受ける場所です。それぞれ由来する宗教・文化が異なります。' },
{ chapter:4, type:'4', text:'「仏壇（ぶつだん）」の本来の意味として正しいものはどれか。', choices:['先祖の位牌を飾る棚','家庭内に本尊（仏像）を安置し礼拝するための壇','葬儀場に設置する祭壇','お盆に精霊棚として使う棚'], answer:1, explanation:'仏壇は本来、家庭内に本尊（仏像・曼荼羅など）を安置して礼拝するための壇です。先祖の位牌を置く機能は後から加わったもので、「先祖を祀る場所」というイメージが強くなっていますが、本来は「本尊を礼拝する家庭の小さなお寺」です。' },
{ chapter:4, type:'4', text:'「宗派（しゅうは）」を確認することが葬儀準備で重要な理由として最も適切なものはどれか。', choices:['葬儀費用の計算のため','祭壇形式・焼香回数・経典・作法など式全体に関わるため','参列者へのご案内文作成のため','火葬場の予約のため'], answer:1, explanation:'宗旨宗派によって祭壇の形（白木/花）・焼香回数（1〜3回）・読む経典・引導の有無・数珠の形式・位牌の使用有無・戒名の呼称（戒名/法名）など、式全体に関わる多くの要素が異なります。葬儀施行の最重要確認事項のひとつです。' },
{ chapter:4, type:'4', text:'「檀那（だんな）」の語源として正しいものはどれか。', choices:['中国語で「主人」を意味する言葉','梵語（サンスクリット語）の「ダーナ（布施・施し）」に由来する','日本語の「旦那」から来た言葉','英語の「donor（寄付者）」から来た言葉'], answer:1, explanation:'「檀那（だんな）」は梵語のダーナ（dāna・布施・施し）が由来で、「寺院に布施をする在家信者（檀家）」を意味します。これが転じて「主人・旦那様」という意味でも使われるようになりました。「檀家（だんか）」も同じ語源です。' },
{ chapter:4, type:'4', text:'次の「宗派別・焼香回数」の組み合わせとして正しいものはどれか。', choices:['浄土真宗本願寺派：2回、真宗大谷派：1回','浄土真宗本願寺派：1回、真宗大谷派：2回','曹洞宗：1回、日蓮宗：3回','浄土宗：2回、天台宗：1回'], answer:1, explanation:'浄土真宗の焼香回数は本願寺派（西）が1回、大谷派（東）が2回です（いずれも額に押しいただかない）。曹洞宗・臨済宗は3回が一般的、浄土宗・天台宗・真言宗は1〜3回（宗派の指定あり）、日蓮宗は1回または3回が多いです。' },
// ===== ○× 問題（50問）=====
{chapter:5, type:'ox',text:'「墓地、埋葬等に関する法律（墓地埋葬法）」は昭和23年（1948年）に制定された。',answer:true,explanation:'墓地埋葬法（正式名称：墓地、埋葬等に関する法律）は昭和23年（1948年）に制定され、現在も改正を繰り返しながら施行されています。遺体の埋葬・火葬・改葬、墓地・納骨堂・火葬場の経営などを規定しています。'},
{chapter:5, type:'ox',text:'墓地埋葬法では、死後24時間以内の火葬・埋葬は原則として禁止されている。',answer:true,explanation:'墓地埋葬法第3条に「死亡または死産後24時間を経過した後でなければ、埋葬または火葬を行ってはならない」と規定されています。感染症法に基づく特例を除き、24時間の安置が必要です。'},
{chapter:5, type:'ox',text:'「改葬（かいそう）」とは、埋葬・埋蔵された遺骨を他の場所に移すことで、市区町村長の許可が必要である。',answer:true,explanation:'改葬は一度埋葬・納骨した遺骨を掘り起こして別の場所に移すことです。墓地埋葬法により、改葬するには市区町村長の「改葬許可証」の交付を受ける必要があります。'},
{chapter:5, type:'ox',text:'「死亡届」は死亡を知った日から14日以内に提出しなければならない。',answer:false,explanation:'死亡届は死亡の事実を知った日から7日以内（国外死亡の場合は3か月以内）に提出しなければなりません（戸籍法第86条）。14日ではなく7日です。'},
{chapter:5, type:'ox',text:'「火葬場（火葬場）」の経営は都道府県知事の許可が必要である。',answer:false,explanation:'火葬場の経営（新設・変更・廃止）は「市区町村長の許可」が必要です（墓地埋葬法第10条）。都道府県知事ではありません。'},
{chapter:5, type:'ox',text:'「墓地の経営」は宗教法人・地方公共団体（市区町村）・財団法人などが行える。',answer:true,explanation:'墓地の経営主体として認められているのは原則として宗教法人・地方公共団体（公営墓地）・公益財団法人などです。営利目的の株式会社による墓地経営は原則認められていません。'},
{chapter:5, type:'ox',text:'「散骨」は日本の法律で明確に禁止されている。',answer:false,explanation:'散骨は墓地埋葬法で明示的に禁止されていません。1991年の法務省通達で「節度をもって行う限り違法ではない」とされています。ただし条例で規制している自治体があります。'},
{chapter:5, type:'ox',text:'「死体解剖保存法」は、医学教育・研究のための解剖や献体に関して定めた法律である。',answer:true,explanation:'死体解剖保存法（昭和24年制定）は、医学の教育・研究のための遺体解剖（献体・病理解剖）および遺体・臓器の保存に関して定めた法律です。司法解剖は刑事訴訟法に基づきます。'},
{chapter:5, type:'ox',text:'「司法解剖（しほうかいぼう）」は遺族の同意がなくても行うことができる。',answer:true,explanation:'司法解剖は犯罪捜査のために行われるもので、裁判官の令状に基づき実施されます。医学的・研究目的の「病理解剖・行政解剖」と異なり、遺族の同意は必要ありません。'},
{chapter:5, type:'ox',text:'「感染症予防法」により、1類感染症（エボラ出血熱など）で死亡した場合は即時火葬が義務付けられる。',answer:true,explanation:'感染症予防法（感染症の予防及び感染症の患者に対する医療に関する法律）により、エボラ出血熱などの1類感染症で死亡した場合は、感染拡大防止のために速やかな（24時間以内）火葬が義務付けられます。'},
{chapter:5, type:'ox',text:'「火葬許可証」は市区町村長が交付し、これなしに火葬を行うと罰則がある。',answer:true,explanation:'火葬許可証なしに火葬を行うことは墓地埋葬法違反となり、罰則（6か月以下の懲役または5000円以下の罰金）が科される場合があります（法第21条）。'},
{chapter:5, type:'ox',text:'「死亡診断書」は医師以外（例えば看護師）でも作成できる。',answer:false,explanation:'死亡診断書を作成できるのは医師（医師法に基づく医師免許保有者）のみです。看護師・薬剤師・その他の医療従事者は作成できません。死体検案書も医師が作成します。'},
{chapter:5, type:'ox',text:'「特定商取引法」は葬儀サービスにも適用される場合がある。',answer:true,explanation:'葬儀サービスは特定商取引法の「訪問販売」や「役務提供契約」に該当する場合があります。特に互助会（冠婚葬祭互助会）は「前払式割賦販売」として割賦販売法の規制も受けます。'},
{chapter:5, type:'ox',text:'「互助会（冠婚葬祭互助会）」は割賦販売法の前払式割賦販売として規制される。',answer:true,explanation:'冠婚葬祭互助会は毎月一定額を積み立てて将来の葬儀・結婚式費用に充てる仕組みで、割賦販売法（前払式割賦販売）の規制対象です。経済産業省への登録・前受金の2分の1以上の保全義務などがあります。'},
{chapter:5, type:'ox',text:'「臓器の移植に関する法律（臓器移植法）」では、本人の意思表示がない場合は臓器提供できない。',answer:false,explanation:'2009年の改正臓器移植法により、本人の意思表示がない場合でも家族の同意があれば臓器提供が可能になりました（改正前は本人の書面での意思表示が必須でした）。'},
{chapter:5, type:'ox',text:'「エンゼルプラン（介護保険の計画）」と「エンゼルケア（死後処置）」は同じものである。',answer:false,explanation:'エンゼルプランは1994年に策定された国の「今後の子育て支援のための施策の基本的方向について」という少子化対策計画です。エンゼルケアは死後の遺体処置のことで、全くの別物です。'},
{chapter:5, type:'ox',text:'「死体遺棄罪（したいいきざい）」は刑法に定められており、遺体を遺棄すると罰せられる。',answer:true,explanation:'刑法第190条は遺体・遺骨・遺髪または棺に納めてある物を損壊・遺棄・領得した者に、3年以下の懲役を科すと定めています。葬儀を行わずに遺体を放置・遺棄することも該当します。'},
{chapter:5, type:'ox',text:'「死体損壊罪（したいそんかいざい）」は遺体を物理的に傷つける行為に対して適用される。',answer:true,explanation:'死体損壊罪（刑法第190条）は遺体・遺骨を傷つけたり破壊する行為を罰します。医学的な解剖（正当な手続きによるもの）はこれに該当しませんが、不法な遺体への行為は罰則対象となります。'},
{chapter:5, type:'ox',text:'「葬祭ディレクター技能審査」は国家資格である。',answer:false,explanation:'葬祭ディレクター技能審査は厚生労働省が認定した技能審査ですが、資格を付与しているのは業界団体（全日本葬祭業協同組合連合会・一般社団法人全国葬儀業者相互組合連合会）であり、民間資格です。'},
{chapter:5, type:'ox',text:'「死亡保険金（生命保険）」の受け取りには、死亡診断書の原本が必要なことが多い。',answer:true,explanation:'生命保険の死亡保険金を請求する際は、保険会社から「死亡診断書（または死体検案書）の原本または写し」の提出が求められます。死亡届に使用した原本が必要な場合があるため、複数部コピーしておくことが大切です。'},
{chapter:5, type:'ox',text:'「個人情報保護法」は、葬儀会社が保有する顧客情報（故人情報・遺族情報）にも適用される。',answer:true,explanation:'個人情報保護法はすべての事業者（葬儀社含む）が保有する個人情報に適用されます。故人の情報・遺族の連絡先・香典情報・葬儀の詳細など、適切な管理と目的外使用の禁止が求められます。'},
{chapter:5, type:'ox',text:'「景品表示法」は葬儀サービスの広告・表示にも適用される。',answer:true,explanation:'景品表示法は葬儀サービスの広告・チラシ・ウェブサイトにも適用されます。「最安値」「業界最高品質」などの優良誤認・有利誤認にあたる表示は規制対象です。葬儀費用の明確な表示も求められます。'},
{chapter:5, type:'ox',text:'「医師法」では、医師は正当な理由なく診察した患者の死亡証明を拒んではならないと定められている。',answer:true,explanation:'医師法第19条（応召義務）の関連として、診療した患者が死亡した場合、医師は死亡診断書の作成を拒否することは原則できないとされています。ただし診療していない場合は死体検案書となります。'},
{chapter:5, type:'ox',text:'「道路運送法」は霊柩車・寝台車の運行にも適用される。',answer:true,explanation:'霊柩車・寝台車は道路運送法（自動車運送事業）の規制対象です。遺体（ご遺体）の運送は「貨物自動車運送事業」または「一般旅客自動車運送事業（霊柩）」として許可を受ける必要があります。'},
{chapter:5, type:'ox',text:'「消費者契約法」は葬儀契約（葬儀サービス契約）にも適用される。',answer:true,explanation:'消費者契約法は事業者と消費者（個人）の間の契約に広く適用されます。葬儀サービスの契約も対象で、不当勧誘・不当条項（不合理な解約禁止など）は取り消し・無効となる場合があります。'},
{chapter:5, type:'ox',text:'「民法」の相続規定では、配偶者は常に相続人となる。',answer:true,explanation:'民法（第890条）により、配偶者は常に（第1〜3順位の相続人と並んで）相続人となります。子がいれば子と共同相続、子がなければ直系尊属（父母等）と共同、それもなければ兄弟姉妹と共同相続となります。'},
{chapter:5, type:'ox',text:'「遺産分割協議（いさんぶんかつきょうぎ）」は相続人全員の合意が必要である。',answer:true,explanation:'遺産分割協議は相続人全員の合意（署名・捺印）が必要です。一人でも欠けた場合は成立しません。ただし家庭裁判所の調停・審判で解決できる場合があります。'},
{chapter:5, type:'ox',text:'「相続放棄（そうぞくほうき）」は死亡を知った日から3か月以内に申述しなければならない。',answer:true,explanation:'相続放棄（家庭裁判所への申述）は相続の開始（被相続人の死亡を知った日）から3か月以内（熟慮期間）に行わなければなりません。期間内に行わないと相続を承認したとみなされます。'},
{chapter:5, type:'ox',text:'「限定承認（げんていしょうにん）」は相続人全員が共同で行わなければならない。',answer:true,explanation:'限定承認（相続で得た財産の範囲内でのみ被相続人の債務を負う選択）は相続人全員が共同して家庭裁判所に申述しなければなりません。一部の相続人のみでは行えません。'},
{chapter:5, type:'ox',text:'「遺言書（いごんしょ・ゆいごんしょ）」は必ず公正証書で作成しなければならない。',answer:false,explanation:'遺言書の方式は①自筆証書遺言（本人が手書き）②公正証書遺言（公証人が作成）③秘密証書遺言の三種類があり、自筆証書遺言でも有効です。公正証書でなければならないという規定はありません。'},
{chapter:5, type:'ox',text:'「特別受益（とくべつじゅえき）」とは、相続人が生前に被相続人から受けた特別な利益（贈与など）で、遺産分割の際に考慮される。',answer:true,explanation:'特別受益は相続人が被相続人から生前に受けた贈与・遺贈などで、相続分の算定（みなし相続財産）に含めて計算されます。遺産分割の公平を保つための制度です。'},
{chapter:5, type:'ox',text:'「香典（こうでん）」は相続税の課税対象となる。',answer:false,explanation:'香典は一般的に社会通念上の範囲内であれば、贈与税・相続税の課税対象とはなりません。香典は被相続人への弔意として贈られるもので、喪主等が受け取ります。ただし社会通念を超える高額の場合は贈与税の対象となることがあります。'},
{chapter:5, type:'ox',text:'「葬儀費用」は相続税の計算において債務控除として差し引くことができる。',answer:true,explanation:'相続税の申告において、葬式・葬儀にかかった費用（お布施・通夜振舞い・葬儀費用など）は相続財産から控除（債務控除）できます。ただし香典返し・墓地・仏壇購入費は控除対象外です。'},
{chapter:5, type:'ox',text:'「死亡届」の提出は、故人の住所地の市区町村にしか提出できない。',answer:false,explanation:'死亡届は①死亡地②本籍地③届出人の住所地のいずれかの市区町村役場に提出できます（戸籍法第88条）。故人の住所地に限定されません。'},
{chapter:5, type:'ox',text:'「献体（けんたい）」とは、医学教育・研究のために遺体を大学医学部などに提供することである。',answer:true,explanation:'献体は生前に本人が「死後に遺体を医学教育・研究のために提供する」意思を示した場合に行われます。「死体解剖保存法」に基づき、各大学医学部・歯学部の「解剖体交流会」などに提供されます。'},
{chapter:5, type:'ox',text:'「臓器提供」の意思表示は、免許証・マイナンバーカードの裏面に記載できる。',answer:true,explanation:'臓器提供の意思表示は運転免許証・マイナンバーカード・健康保険証の裏面（意思表示欄）への記載が法律上有効です。また「臓器提供意思表示カード（ドナーカード）」への記載も有効です。'},
{chapter:5, type:'ox',text:'「後見制度（こうけんせいど）」は生前のみに適用され、死後には関係しない。',answer:false,explanation:'後見制度（成年後見・任意後見）は生存中の本人を保護するための制度で、死亡時点で終了します。ただし後見人は被後見人の死後に「死後事務」（葬儀・遺体保全・医療費支払いなど）を行う権限が一定程度認められています。'},
{chapter:5, type:'ox',text:'「特定死因（監察医制度）」は日本全国に設置されている。',answer:false,explanation:'監察医制度（死因不明の遺体を解剖して死因を明らかにする行政解剖の制度）は東京・大阪・名古屋・神戸など特定の都市にしか設置されていません。全国一律ではなく、地域によっては制度が整備されていない場合があります。'},
{chapter:5, type:'ox',text:'「労働安全衛生法」は葬儀業における従業員の安全管理にも適用される。',answer:true,explanation:'労働安全衛生法はすべての事業所の従業員の安全・健康確保を目的とした法律で、葬儀業にも適用されます。遺体取り扱いにおける感染防止・腰痛対策・有害物質管理なども対象です。'},
{chapter:5, type:'ox',text:'「廃棄物処理法」は葬儀業で使用・発生する廃棄物（花・食品など）の処理にも適用される。',answer:true,explanation:'廃棄物処理法は葬儀業で発生する廃棄物（副葬品の残骸・飲食廃棄物・包装材など）にも適用されます。遺体（ご遺体）は「廃棄物」ではありませんが、火葬後の廃材・包装などは適切に処理する必要があります。'},
{chapter:5, type:'ox',text:'「墓地の永代使用料（えいたいしようりょう）」は墓地の所有権を購入する費用である。',answer:false,explanation:'永代使用料は墓地の土地の所有権ではなく「永代使用権（使用する権利）」の対価です。墓地の土地は寺院・霊園・地方自治体が所有しており、使用者は使用権を購入します。使用権の譲渡・転売は原則できません。'},
{chapter:5, type:'ox',text:'「公正証書遺言（こうせいしょうしょいごん）」は家庭裁判所による検認が不要である。',answer:true,explanation:'公正証書遺言は公証役場で公証人が作成するため、正式な法的文書として認められており、家庭裁判所での「検認」手続きは不要です。自筆証書遺言は検認が必要です（法務局保管の場合は不要）。'},
{chapter:5, type:'ox',text:'「法定相続人（ほうていそうぞくにん）」に内縁の配偶者は含まれない。',answer:true,explanation:'法律上の婚姻関係がない内縁の配偶者は、民法上の法定相続人には含まれません。相続を受けるには遺言書による指定（遺贈）または養子縁組が必要です。'},
{chapter:5, type:'ox',text:'「自筆証書遺言（じひつしょうしょいごん）」はパソコンで作成したものでも有効である。',answer:false,explanation:'自筆証書遺言は遺言者が全文・日付・氏名を自書（手書き）し、押印したものでなければ有効になりません（民法第968条）。パソコン等での作成は無効です（ただし財産目録のみパソコン可）。'},
{chapter:5, type:'ox',text:'「法定相続分（ほうていそうぞくぶん）」は遺言によって変更することができる。',answer:true,explanation:'法定相続分は民法で定められた相続割合のデフォルト値ですが、有効な遺言書があれば遺言によって相続分・財産の分配を変えることができます（遺留分の範囲内で）。'},
{chapter:5, type:'ox',text:'「遺留分（いりゅうぶん）」は兄弟姉妹にも認められる。',answer:false,explanation:'遺留分（相続人が遺言によっても侵害されない最低限の相続分）は配偶者・子・直系尊属（父母等）には認められますが、兄弟姉妹には遺留分がありません。'},
{chapter:5, type:'ox',text:'「準確定申告（じゅんかくていしんこく）」は被相続人（故人）の死亡した年の所得税確定申告を相続人が行う手続きである。',answer:true,explanation:'準確定申告は被相続人が死亡した年の1月1日から死亡日までの所得を、相続人が代わって確定申告するものです。相続の開始を知った日から4か月以内に申告・納税が必要です。'},

// ===== 4択 問題（50問）=====
{chapter:5, type:'4',text:'「墓地埋葬法」で定める火葬・埋葬ができない期間はいつか。',choices:['死亡後6時間以内','死亡後12時間以内','死亡後24時間以内','死亡後48時間以内'],answer:2,explanation:'墓地埋葬法第3条により、死後24時間以内の埋葬・火葬は原則禁止されています。これは死亡の確認・仮死状態との鑑別・手続き上の必要性から定められています。'},
{chapter:5, type:'4',text:'「改葬」に必要な手続きとして正しいものはどれか。',choices:['警察署への届出','市区町村長への「改葬許可申請」と改葬許可証の取得','都道府県への申請','不要（自由に行える）'],answer:1,explanation:'改葬（埋蔵した遺骨を別の場所に移すこと）は墓地埋葬法第5条により、市区町村長の「改葬許可証」が必要です。申請には現在の墓地管理者の証明・改葬先の受入証明が必要です。'},
{chapter:5, type:'4',text:'「葬祭ディレクター1級」の受験資格として正しいものはどれか。',choices:['誰でも受験できる','葬祭業の実務経験が概ね5年以上','葬祭業の実務経験が概ね2年以上','葬祭に関係する学校卒業者のみ'],answer:1,explanation:'葬祭ディレクター1級の受験資格は、葬祭業に従事した実務経験が概ね5年以上が目安です。2級は実務経験2年以上が目安です。学科試験と実技試験（ディスプレイ・接遇等）があります。'},
{chapter:5, type:'4',text:'「葬祭ディレクター技能審査」を主催・運営している団体はどれか。',choices:['厚生労働省','全葬連・全互連（業界団体）','消費者庁','都道府県'],answer:1,explanation:'葬祭ディレクター技能審査は、一般社団法人全国葬儀業者相互組合連合会（全互連）と一般社団法人全日本葬祭業協同組合連合会（全葬連）が運営しています。厚生労働省の認定を受けた民間の技能審査です。'},
{chapter:5, type:'4',text:'「互助会」の法的規制として正しいものはどれか。',choices:['保険業法の規制を受ける','割賦販売法（前払式割賦販売）の規制を受ける','金融商品取引法の規制を受ける','特に法律の規制はない'],answer:1,explanation:'冠婚葬祭互助会は毎月積み立てで将来のサービスを契約する「前払式割賦販売」として割賦販売法の規制を受けます。経済産業省への登録・前受金の2分の1以上の保全・標準約款の整備などが義務付けられています。'},
{chapter:5, type:'4',text:'「臓器移植法」における臓器提供の意思表示方法として認められないものはどれか。',choices:['運転免許証裏面への記載','マイナンバーカード裏面への記載','口頭による申し出（書面なし）','臓器提供意思表示カード'],answer:2,explanation:'臓器提供の意思表示は、①運転免許証裏②マイナンバーカード裏③健康保険証裏④臓器提供意思表示カード（ドナーカード）への書面による記載が必要です。口頭のみでの意思表示は法律上の効力がありません。'},
{chapter:5, type:'4',text:'「法定相続人の範囲」として正しいものはどれか。',choices:['配偶者・子・父母・兄弟姉妹（優先順位あり）が法定相続人','配偶者のみが法定相続人','子のみが法定相続人','血族のみが法定相続人で配偶者は含まない'],answer:0,explanation:'配偶者は常に相続人、血族相続人は①子（養子含む）②直系尊属（父母・祖父母等）③兄弟姉妹の順で優先されます。先順位の相続人がいると後順位の者は相続人になれません。'},
{chapter:5, type:'4',text:'「相続税の申告・納税期限」として正しいものはどれか。',choices:['死亡から3か月以内','死亡から6か月以内','相続の開始を知った日の翌日から10か月以内','死亡から1年以内'],answer:2,explanation:'相続税の申告・納税は「相続の開始を知った日（通常は死亡を知った日）の翌日から10か月以内」に行わなければなりません。期限内に申告・納税がない場合はペナルティが課されます。'},
{chapter:5, type:'4',text:'「遺言の種類」として誤っているものはどれか。',choices:['自筆証書遺言','公正証書遺言','秘密証書遺言','電子証書遺言'],answer:3,explanation:'民法で認められる遺言の方式は①自筆証書遺言②公正証書遺言③秘密証書遺言の三種類のみです。「電子証書遺言」という制度は現在の日本法では認められていません。'},
{chapter:5, type:'4',text:'「遺留分（いりゅうぶん）」について正しいものはどれか。',choices:['相続人全員に認められる最低限の相続権','配偶者・子・直系尊属に認められる最低限の相続分で、兄弟姉妹には認められない','遺言によっても変更できない権利','相続放棄をした者にも認められる'],answer:1,explanation:'遺留分は被相続人の遺言によっても奪えない最低限の相続分で、配偶者・子（代襲相続人含む）・直系尊属に認められます。兄弟姉妹には遺留分がなく、相続放棄をした者も遺留分を主張できません。'},
{chapter:5, type:'4',text:'「死亡届」の届出義務者として正しいものはどれか。',choices:['医師のみ','同居の親族・その他の同居者・家主等・後見人など','葬儀社のみ','市区町村職員'],answer:1,explanation:'戸籍法第87条により、死亡届の届出義務者は①同居の親族②その他の同居者③家主・地主・家屋・土地の管理人等です。親族が届出できない場合は後見人・保佐人なども届出できます。'},
{chapter:5, type:'4',text:'「火葬場の建設」に際して必要な許可はどれか。',choices:['都道府県知事の許可','市区町村長の許可','警察署長の許可','法務省の許可'],answer:1,explanation:'火葬場の経営（新設・変更・廃止）には市区町村長の許可が必要です（墓地埋葬法第10条）。なお近隣住民との関係・環境への影響から、事実上は困難な場合も多く、新規建設には地域の理解が不可欠です。'},
{chapter:5, type:'4',text:'「行旅死亡人（こうりょしぼうにん）」とはどういう人のことか。',choices:['旅行中に死亡した人','身元不明で行き倒れになって死亡した人','外国人で死亡した人','水難で死亡した人'],answer:1,explanation:'行旅死亡人とは、身元不明または引き取り手のない状態で路上・公共の場所などで死亡した人のことです。「行旅病人及行旅死亡人取扱法」により、市区町村が死体を収容・処置し、費用を国・相続人に求償します。'},
{chapter:5, type:'4',text:'「監察医（かんさつい）」の主な役割として正しいものはどれか。',choices:['生前の患者の診療','死因不明の遺体を行政解剖して死因を判定する行政機関の医師','葬儀の宗教儀式を監督する','火葬場で遺体を確認する'],answer:1,explanation:'監察医は東京23区・大阪市・名古屋市・神戸市などに設置された行政機関（監察医務院）の医師で、変死・急死・死因不明など異常死体を解剖（行政解剖）して死因を判定します。警察の依頼で行う司法解剖とは異なります。'},
{chapter:5, type:'4',text:'「自殺（自死）」による死亡の場合の取り扱いとして正しいものはどれか。',choices:['必ず司法解剖が行われる','警察が調査（検視）を行い、他殺の疑いがなければ家族に引き渡される','葬儀は行えない','すべての葬儀会社が受け付けることを義務付けられている'],answer:1,explanation:'自殺による死亡の場合、警察が「検視（けんし）」を行い、事件性（他殺の疑い）がないかを確認します。事件性がなければ遺族に引き渡され、通常の葬儀が行われます。必ずしも解剖が行われるわけではありません。'},
{chapter:5, type:'4',text:'「孤独死・孤立死」の発見後の対応として正しいものはどれか。',choices:['発見者がすぐに棺に納める','警察・救急へ通報し、医師・警察による死亡確認・検視が行われる','葬儀社を呼んですぐに搬送する','遺族にのみ連絡する'],answer:1,explanation:'孤独死（孤立死）を発見した場合は①まず警察・救急（110番・119番）に通報②医師による死亡確認③警察による検視（事件性の確認）が行われます。事件性がなければその後葬儀の手配が可能になります。'},
{chapter:5, type:'4',text:'「死産（しざん）」の場合の届出として正しいものはどれか。',choices:['死亡届と同じ用紙を使う','「死産届」を7日以内に届け出る','届出の必要はない','出生届と死亡届を両方提出する'],answer:1,explanation:'死産（妊娠12週以降の死んで生まれた子）の場合は、死産の日から7日以内に「死産届」を提出しなければなりません（死産の届出に関する規程）。死亡届・出生届とは別の届出です。'},
{chapter:5, type:'4',text:'「遺骨の海への散骨（海洋散骨）」に関して正しいものはどれか。',choices:['墓地埋葬法で禁止されている','法律上の明示的な禁止はなく、節度ある方法で行う限り違法ではないとされる','国土交通省への届出が必要','火葬場の許可が必要'],answer:1,explanation:'海洋散骨は墓地埋葬法では明示的に禁止されていません。1991年の法務省見解で「節度をもって行われる限り問題ない」とされています。ただし自治体条例による制限地域や、漁業・観光への配慮が必要です。'},
{chapter:5, type:'4',text:'「特定商取引法における葬儀業者への規制」として正しいものはどれか。',choices:['葬儀業者は特定商取引法の対象外','訪問販売・電話勧誘販売・通信販売等の場合は適用される可能性がある','すべての葬儀取引に適用される','互助会は特定商取引法の対象'],answer:1,explanation:'葬儀業者が訪問販売・電話勧誘販売などの方法で契約を締結した場合は特定商取引法が適用される可能性があります。ただし葬儀サービスはその性質上「現場での急ぎの判断」が多く、法の適用関係が複雑な場合があります。'},
{chapter:5, type:'4',text:'「相続放棄（そうぞくほうき）」の申述先として正しいものはどれか。',choices:['市区町村役場','家庭裁判所','法務局','公証役場'],answer:1,explanation:'相続放棄は家庭裁判所への「相続放棄申述書」の提出によって行います。相続開始（死亡を知った日）から3か月以内に被相続人の最後の住所地を管轄する家庭裁判所に申述します。'},
{chapter:5, type:'4',text:'「法定後見制度（ほうていこうけんせいど）」の申立先として正しいものはどれか。',choices:['市区町村役場','家庭裁判所','公証役場','法務局'],answer:1,explanation:'成年後見・保佐・補助の申立ては家庭裁判所に行います。本人・配偶者・四親等内の親族・市区町村長などが申立人となれます。'},
{chapter:5, type:'4',text:'「独居老人（おひとりさま）の死後の対応」として、公的な制度として正しいものはどれか。',choices:['何の制度もない','行旅死亡人取扱法・地域の見守り活動・死後事務委任契約などが関係する','警察がすべて対応する','葬儀社が無償で対応する義務がある'],answer:1,explanation:'独居死（おひとりさまの死）への対応として、行旅死亡人取扱法（身元不明の場合）・地域包括支援センターの見守り・「死後事務委任契約」（生前に第三者に死後の事務を委任）などが関係する制度・仕組みです。'},
{chapter:5, type:'4',text:'「墓地埋葬法」の正式名称として正しいものはどれか。',choices:['墓地および埋葬に関する法律','墓地、埋葬等に関する法律','墓地管理法','埋葬法'],answer:1,explanation:'正式名称は「墓地、埋葬等に関する法律」（昭和23年法律第48号）です。通称「墓埋法（ぼまいほう）」「墓地埋葬法」と呼ばれます。'},
{chapter:5, type:'4',text:'「消費者保護の観点から、葬儀業者が行ってはいけないこと」として正しいものはどれか。',choices:['事前相談を受け付けること','過大・不当な費用を請求したり、必要のないサービスを強引に勧誘すること','葬儀の事前見積もりを出すこと','複数のプランを提示すること'],answer:1,explanation:'消費者保護の観点から葬儀業者が行ってはいけないことは、不当に高額な費用の請求・必要のないサービスの強引な勧誘・虚偽の表示・料金の不透明な説明などです。消費者契約法・景品表示法・特定商取引法等で規制されます。'},
{chapter:5, type:'4',text:'「死後事務委任契約（しごじむいにんけいやく）」とは何か。',choices:['遺産の分割を事前に決めておく契約','生前に第三者（弁護士・司法書士・信頼できる人など）に死後の事務（葬儀・遺品整理・各種手続き）を委任する契約','後継者に財産を贈与する契約','保険会社と葬儀費用を補填する契約'],answer:1,explanation:'死後事務委任契約は、生存中に信頼できる第三者（専門家・友人・NPOなど）に死後の事務（葬儀・納骨・遺品整理・行政手続き・デジタル遺産処理など）を代わって行ってもらうよう委任する契約です。独居の方や身寄りのない方に有効です。'},
{chapter:5, type:'4',text:'「遺品整理（いひんせいり）」業者の規制について正しいものはどれか。',choices:['特に法的規制がない','遺品の売買・廃棄には古物営業法・廃棄物処理法などの法律が適用される場合がある','医師免許が必要','葬祭ディレクター資格が必要'],answer:1,explanation:'遺品整理業者が行う業務には、古物の買い取り（古物営業法の古物商許可が必要）・廃棄物の処理（廃棄物処理法の規制対象）などが絡む場合があります。業界団体が「遺品整理士認定資格」を設けていますが、法的義務の資格ではありません。'},
{chapter:5, type:'4',text:'「特定非営利活動法人（NPO法人）」が墓地を経営できるかどうかの答えとして正しいものはどれか。',choices:['NPO法人はどこでも墓地を経営できる','原則として宗教法人・地方公共団体・公益財団法人が経営主体となり、NPO法人は認められない場合が多い','NPO法人のみが墓地を経営できる','株式会社なら無制限に墓地を経営できる'],answer:1,explanation:'墓地経営の主体は原則として宗教法人・地方公共団体・公益財団法人とされており、NPO法人・株式会社による経営は原則として認められていません（都道府県により異なる）。'},
{chapter:5, type:'4',text:'「葬儀サービスに関するトラブル相談先」として適切なものはどれか。',choices:['警察署','消費生活センター（国民生活センター）・弁護士・業界団体','葬儀社（同業他社）','税務署'],answer:1,explanation:'葬儀に関するトラブル（不当請求・サービス内容の相違・互助会の解約など）は消費生活センター（都道府県・市区町村設置）・国民生活センター・弁護士・業界団体（全葬連・全互連など）に相談できます。'},
{chapter:5, type:'4',text:'「遺骨の自宅保管」について正しいものはどれか。',choices:['法律で禁止されている','法律上は禁止されておらず、自宅に遺骨を保管することができる','3年以内に必ず納骨しなければならない','市区町村の許可が必要'],answer:1,explanation:'遺骨を自宅で保管することは日本の法律上禁止されていません。納骨の時期についても法律上の強制はありません。ただし状況によっては「散骨・自然葬」を行う場合に別途の確認が必要です。'},
{chapter:5, type:'4',text:'「医療費控除」と「葬儀費用の相続税控除」の違いとして正しいものはどれか。',choices:['どちらも所得税の控除','医療費控除は所得税（確定申告）での控除、葬儀費用は相続税計算上の控除（債務控除）','どちらも相続税の控除','どちらも控除できない'],answer:1,explanation:'医療費控除は所得税（確定申告）で利用する控除で、被相続人の医療費も「準確定申告」で控除できます。葬儀費用は相続税の計算における「債務控除」として相続財産から差し引くことができます。制度・申告先が異なります。'},
{chapter:5, type:'4',text:'「消費税と葬儀サービス」について正しいものはどれか。',choices:['葬儀サービスは非課税','葬儀サービス（祭壇・棺・霊柩車など）の多くは消費税の課税対象（お布施は不課税）','葬儀サービスはすべて軽減税率（8%）','火葬場の使用料は消費税非課税'],answer:1,explanation:'葬儀社のサービス（祭壇・棺・霊柩車・返礼品など）は一般的に消費税の課税対象（10%）です。僧侶へのお布施は対価性のない寄付のため不課税、公営火葬場の使用料は非課税の場合が多いです。'},
{chapter:5, type:'4',text:'「法定相続情報証明制度（ほうていそうぞくじょうほうしょうめいせいど）」とは何か。',choices:['相続人を法律で決定する制度','法務局が相続人の情報を一覧化して証明する制度で、各種相続手続きの簡略化に役立つ','遺産分割を強制する制度','税務署が相続財産を調査する制度'],answer:1,explanation:'法定相続情報証明制度は、法務局（登記所）が被相続人と相続人の関係を確認して「法定相続情報一覧図」を証明する制度です（2017年〜）。これにより銀行・不動産登記など複数の相続手続きで戸籍謄本の束の提出が省略できます。'},
{chapter:5, type:'4',text:'「国民健康保険の葬祭費（葬祭給付）」について正しいものはどれか。',choices:['葬儀費用全額を補填する給付','被保険者（国民健康保険加入者）が死亡した場合に、葬儀を行った者に一定額（3〜7万円程度）が支給される','すべての人に等しく10万円が支給される','申請は不要で自動的に支給される'],answer:1,explanation:'国民健康保険の「葬祭費」は被保険者死亡時に葬儀を行った方（喪主等）に、市区町村ごとに定める金額（3〜7万円程度）が支給されます。申請制であり、死亡後2年以内に申請が必要です。'},
{chapter:5, type:'4',text:'「労災保険（労働者災害補償保険）の葬祭料」について正しいものはどれか。',choices:['一切支給されない','業務上・通勤途上の死亡の場合に、葬儀を行った者に葬祭料が支給される','一般の死亡にも全員に支給される','会社が全額負担する'],answer:1,explanation:'業務上（労働災害）または通勤途上での死亡の場合、労災保険から「葬祭料」が支給されます。給付額は315,000円＋給付基礎日額の30日分（下限あり）で、葬儀を行った方（遺族等）が申請します。'},
{chapter:5, type:'4',text:'「行政書士」が葬儀に関連して行える業務として正しいものはどれか。',choices:['遺言書・各種許認可申請・相続関係の書類作成（非紛争）','葬儀の司会進行','戒名の授与','遺体の搬送'],answer:0,explanation:'行政書士は官公署に提出する書類の作成・手続き代行を業とします。遺言書（自筆証書遺言の作成支援）・相続関係書類（遺産分割協議書・各種許認可申請）などが業務範囲です。紛争性のある相続は弁護士の業務です。'},
{chapter:5, type:'4',text:'「遺産に関する税務」で葬儀費用を債務控除できる根拠法令はどれか。',choices:['所得税法','相続税法','消費税法','墓地埋葬法'],answer:1,explanation:'葬式費用の相続税からの控除（債務控除）は「相続税法第13条」に規定されています。相続財産から葬式費用（お布施・通夜振舞いなど含む）を差し引いて課税対象額を計算します。'},
{chapter:5, type:'4',text:'「公証役場（こうしょうやくば）」が関与する葬儀関連の業務として正しいものはどれか。',choices:['火葬許可証の発行','公正証書遺言の作成・任意後見契約の公正証書化','遺品の鑑定','葬儀費用の査定'],answer:1,explanation:'公証役場（公証人）が関与する主な葬儀・相続関連業務は①公正証書遺言の作成②任意後見契約の公正証書化③尊厳死宣言公正証書の作成などです。これらは公証人が当事者の意思確認・法的効力の付与を行います。'},
{chapter:5, type:'4',text:'「遺族厚生年金」の受給要件として正しいものはどれか。',choices:['すべての故人の遺族が受け取れる','厚生年金保険の被保険者・老齢厚生年金受給権者などが死亡した場合、要件を満たす遺族（配偶者・子など）が受給できる','死亡後すぐに自動で支給される','一時金として一括で支払われる'],answer:1,explanation:'遺族厚生年金は厚生年金保険の被保険者・老齢厚生年金受給権者等が死亡した場合に、要件を満たした遺族（配偶者・子・父母・孫・祖父母）に支給される年金です。国民年金の遺族基礎年金とは別の制度です。'},
{chapter:5, type:'4',text:'「高額療養費制度（こうがくりょうようひせいど）」と葬儀の関係として正しいものはどれか。',choices:['葬儀費用に高額療養費を使える','故人の入院・治療にかかった医療費が高額な場合、高額療養費として還付が受けられ、相続財産に含まれることがある','葬儀社が直接申請する','死亡後は申請できない'],answer:1,explanation:'高額療養費は被保険者の医療費が一定額を超えた場合に超過分が還付される制度です。死亡前の入院・治療費に適用され、未請求の場合は相続人が申請できます。相続財産の一部となる場合があります。'},
{chapter:5, type:'4',text:'「遺族基礎年金」の受給対象として正しいものはどれか。',choices:['すべての遺族','国民年金の被保険者が死亡した場合の子のある配偶者または子','65歳以上の配偶者のみ','親族全員'],answer:1,explanation:'遺族基礎年金は国民年金の被保険者（または受給権者）が死亡した場合に、「子のある配偶者」または「子」（18歳未満等）に支給されます。子のいない配偶者は受給できません（この場合は寡婦年金・死亡一時金が適用される場合あり）。'},
{chapter:5, type:'4',text:'「葬儀業者に対する行政的な指導・監督」の主体として正しいものはどれか。',choices:['法務省','都道府県・市区町村（条例・墓地埋葬法に基づく）','厚生労働省のみ','内閣府'],answer:1,explanation:'葬儀業・墓地経営などの監督は主に都道府県・市区町村が行います（墓地埋葬法は都道府県・市区町村長が許可権限を持つ）。厚生労働省は葬祭ディレクター資格の認定などを行いますが、直接の行政指導は地方自治体が主体です。'},
{chapter:5, type:'4',text:'「成年後見制度（せいねんこうけんせいど）」と葬儀の関係として正しいものはどれか。',choices:['後見人が被後見人の葬儀を行う法的義務がある','後見人は被後見人の死後も一定の「死後事務」（遺体引き取り・火葬・葬儀費支払い等）を行える場合があるが、義務はない','後見人は葬儀に関与できない','後見制度は生前のみ有効で死亡後は無関係'],answer:1,explanation:'後見人の権限は被後見人の死亡時に終了しますが、民法第873条の2により、死後事務として①遺体・入院費等の支払い②遺体の引き取り・火葬・葬儀（家庭裁判所の許可が必要な場合あり）などを行えます。義務ではありません。'}
,
