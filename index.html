{chapter:6, type:'4', text:'「弔電（ちょうでん）」の読み上げタイミングとして一般的に正しいものはどれか。', choices:['通夜の開式前','葬儀・告別式の式中（弔辞の後など）','出棺の直前','初七日法要の際'], answer:1, explanation:'弔電は葬儀・告別式の式中に読み上げるのが一般的で、通常は弔辞（ちょうじ）の後、または式の適切なタイミングで喪主・葬儀社スタッフが代読する。重要度の高いものから読み上げる。'},
{chapter:6, type:'4', text:'「棺（かん・ひつぎ）」の種類で「合板棺（プリント棺）」の特徴として正しいものはどれか。', choices:['天然木の無垢材を使用し高級感がある','合板の表面に木目や模様をプリントしたもので比較的低価格','金属製の棺で耐久性が高い','紙製の棺で環境に配慮している'], answer:1, explanation:'合板棺（プリント棺）は合板（ベニヤ）の表面に木目模様等をプリントまたは塩ビシートで仕上げたもの。天然木棺より低コストで、日本の葬儀で最も広く普及している一般的な棺。'},
{chapter:6, type:'4', text:'神式の葬儀（神葬祭）で使用する「玉串（たまぐし）」について正しいものはどれか。', choices:['玉串は仏式の焼香に相当するもので榊の枝に紙垂をつけたもの','玉串は神様へのお供え物として米・塩などを並べた台','玉串は神式の戒名（諡号）を書いた木の板','玉串は神社での礼拝時に投げ入れるコインの神式版'], answer:0, explanation:'玉串は神式で焼香に相当するもの。榊（さかき）の枝に紙垂（しで）や木綿（ゆう）をつけたもので、「玉串奉奠（ほうてん）」として祭壇に捧げる。焼香の代わりとして神葬祭・法要で行う。'},
{chapter:6, type:'4', text:'「生花祭壇」と「白木祭壇（しらきさいだん）」の説明として正しいものはどれか。', choices:['生花祭壇は生の花のみを使用、白木祭壇は造花を使用する','白木祭壇は白木（無塗装の木）と白布で構成され伝統的。生花祭壇は生花を多用したもの','生花祭壇は仏式のみ、白木祭壇は神式のみ使用できる','両者の価格差はほとんどない'], answer:1, explanation:'白木祭壇は白木（ヒノキなどの無塗装木材）と白布を組み合わせた伝統的な祭壇。生花祭壇は生の花を多数使用した祭壇で、近年急速に普及。白木祭壇は汎用性が高く仏式でも神式でも使用可能。'},
{chapter:6, type:'4', text:'「返礼品（へんれいひん）」の消費税の取り扱いとして正しいものはどれか。', choices:['葬儀の返礼品は非課税である','返礼品は一般の商品と同様に消費税が課税される','返礼品は香典返しのみ消費税が免除される','返礼品の消費税は喪主が負担しなくてよい'], answer:1, explanation:'葬儀の返礼品（会葬礼状・引き物・香典返しなど）は一般商品と同じく消費税が課税される。葬儀サービス自体は消費税の課税対象（標準税率10%）。非課税の特例はなく、通常の商取引として扱われる。'},
{chapter:6, type:'4', text:'「焼香台（しょうこうだい）」の設置位置として一般的に正しいものはどれか。', choices:['棺の真横（遺体の隣）','祭壇の正面、参列者が祭壇に向かって礼拝する位置','受付の隣','出棺口の近く'], answer:1, explanation:'焼香台は祭壇の正面（祭壇と参列者席の間）に設置し、参列者が焼香台の前で立ち止まり、祭壇に向かって焼香・礼拝できる位置に置く。参列者が列を作って進む動線を考慮して設置する。'},
{chapter:6, type:'4', text:'「数珠（じゅず）」の正しい持ち方（焼香時）として一般的なものはどれか。', choices:['両手で房を上にして持ち、左手の親指と人差し指の間にかける','片手の小指に引っ掛けて持つ','右手の4本の指に引っ掛けてぶら下げて持つ','首にかけて礼拝する'], answer:0, explanation:'数珠の正しい持ち方は両手を合わせ、左手の中指（または親指と人差し指の間）にかけ、房が下になるように持つのが基本。宗派によって細かい作法が異なる場合もある。'},
{chapter:6, type:'4', text:'仏式の祭壇に置く「三具足（みつぐそく）」の組み合わせとして正しいものはどれか。', choices:['香炉・燭台・花立て','香炉・鈴（りん）・位牌','位牌・遺影・花立て','燭台・鈴・経本'], answer:0, explanation:'三具足は仏壇や祭壇の基本的な仏具セットで「香炉（こうろ）・燭台（しょくだい）・花立て（はなたて）」の3点。これに燭台・花立てをもう1つずつ加えたものが「五具足（ごぐそく）」。'},
{chapter:6, type:'4', text:'「霊柩車（れいきゅうしゃ）」の種類として正しいものはどれか。', choices:['宮型（みやがた）・洋型・バン型（寝台車）','スポーツ型・セダン型・バス型','白型・黒型・銀型','一般型・特別型・豪華型'], answer:0, explanation:'霊柩車の種類：①宮型（神社の宮殿のような装飾の伝統的なもの）②洋型（リムジン風の棺を覆うケース付き）③バン型または寝台車（搬送専用、外観はハイエース等のバン）。近年は宮型から洋型への移行が進んでいる。'},
{chapter:6, type:'ox', text:'「霊柩車（宮型）」は減少傾向にあり、代わりに洋型霊柩車が普及している。', answer:1, explanation:'正しい。かつて主流だった宮型（お宮のような装飾の）霊柩車は「葬儀を連想させる」として住宅街等での使用を避ける傾向が強まり減少。現在は外観が目立たない洋型やバン型（寝台車兼用）が主流になっている。'},
{chapter:6, type:'ox', text:'「遺影写真（いえいしゃしん）」は法律により必ず正面顔のものでなければならない。', answer:0, explanation:'誤り。遺影写真に法的な規定はなく、正面顔以外（斜め顔・全身写真など）でも使用できる。近年は故人の個性や生前の姿を表す自然な表情の写真を使うケースが増えている。'},
{chapter:6, type:'ox', text:'「四十九日」は死亡日を1日目（初日）として数え、49日後に行う。', answer:1, explanation:'正しい。四十九日（七七日忌）は死亡した日を1日目として数え、49日目に行う。例えば1月1日に亡くなった場合は2月18日が四十九日にあたる（年によって変わる場合あり）。'},
{chapter:6, type:'4', text:'「お布施（ふせ）」を渡すタイミングとして最も一般的なものはどれか。', choices:['葬儀の前日（通夜の前）に渡す','葬儀後（告別式または出棺後）か、僧侣が来た際の挨拶のタイミングで渡す','葬儀の1週間後に寺院を訪問して渡す','香典袋と一緒に受付に預ける'], answer:1, explanation:'お布施は僧侶・住職に直接渡すのが基本。タイミングは葬儀社や地域の慣習により異なるが、通夜前の挨拶時・告別式後の出棺前・出棺後のいずれかが多い。必ず袱紗（ふくさ）に包み丁寧に渡す。'},
{chapter:6, type:'4', text:'「副葬品（ふくそうひん）」として棺に入れてよいものとして正しいものはどれか。', choices:['ガラス製の花瓶','金属製のゴルフクラブ','故人の好きだった本（紙製）','塩化ビニール製の人形'], answer:2, explanation:'副葬品で棺に入れてよいのは可燃性のもの（紙・布・木製品など）。ガラスは火葬後に残り骨と混ざる問題がある。金属は火葬炉を傷める。塩化ビニールは燃焼時に有害ガスを発生させるため不可。本（紙製）は可燃物で問題ない。'},
{chapter:6, type:'4', text:'神式の葬儀（神葬祭）で使う「祓詞（はらいことば）・祭詞（さいし）」を唱えるのは誰か。', choices:['喪主（もしゅ）','斎主（さいしゅ）・神職（しんしょく）','仏教で言う僧侶（そうりょ）にあたる世話役','葬儀ディレクター'], answer:1, explanation:'神葬祭では神道の祭詞・祭文を唱えるのは神職（神主）。仏式の僧侶に相当する存在。葬儀を主宰する神職を特に「斎主（さいしゅ）」と呼ぶ。'},
{chapter:6, type:'4', text:'「骨上げ（こつあげ）」の作法として正しいものはどれか。', choices:['一人で行い、足の骨から順に上に向かって収める','二人一組で箸を使い、足元から順に頭部へと骨を収める','燃え残った骨を機械で粉砕してから収める','遺族は参加せず葬儀社スタッフが全て行う'], answer:1, explanation:'骨上げは二人一組（遺族・近親者）が竹と木の箸を各一本ずつ持って（箸の素材を違えるのが一般的）、足の骨から頭部に向かって順に骨壺に収める作法。最後に喉仏（第二頸椎）を収める。'},
{chapter:6, type:'ox', text:'「寝棺（ねかん）」は故人を横たわった状態で収める棺で、日本の現代の葬儀で最も一般的に使用されている。', answer:1, explanation:'正しい。現代の日本では「寝棺」（故人を横たわった状態で収める棺）が一般的。古来は「座棺（ざかん）」（故人を座った姿勢で収める）が多かったが、現代ではほぼ寝棺が使用される。'},
{chapter:6, type:'ox', text:'「花祭壇」で使用される花は、すべて生花でなければならない。', answer:0, explanation:'誤り。花祭壇に使用される花は生花が中心だが、造花や布花（シルクフラワー）を組み合わせる場合もある。また、故人の好みによっては造花のみで制作するケースも選択できる。法律による制限はない。'},
{chapter:6, type:'4', text:'「香典（こうでん）」の表書きとして、四十九日以降（法要）の際に適切なものはどれか。', choices:['御霊前（ごれいぜん）','御仏前（ごぶつぜん）','御香典（ごこうでん）','御花料（おはなりょう）'], answer:1, explanation:'四十九日の忌明け後は故人が「仏」になっているとされるため「御仏前」が正しい。「御霊前」は四十九日前（忌中）の表書き。「御香典」は一般的な表書き。「御花料」はキリスト教式で使う。'},
{chapter:6, type:'4', text:'「弔辞（ちょうじ）」と「弔電（ちょうでん）」の違いとして正しいものはどれか。', choices:['弔辞は式で直接読み上げ、弔電は文書を読み上げる点で同じ','弔辞は参列者が式で直接読み上げるスピーチ、弔電は欠席者からの文書','弔辞は必ず2分以内、弔電は5分以内という規定がある','弔辞は主に仏式、弔電は主に神式で使われる'], answer:1, explanation:'弔辞は実際に葬儀に参列した人が故人への別れの言葉を読み上げるスピーチ。弔電は遠方などで参列できない人が電報・メール等で送ってくる哀悼のメッセージ文書で、葬儀社スタッフが代読する。'},
{chapter:6, type:'4', text:'日本の葬儀費用の構成として最も大きな割合を占めるものはどれか。', choices:['お布施・宗教者謝礼','葬儀一式費用（祭壇・棺・葬儀運営費）','飲食費（通夜振る舞い・精進落とし）','返礼品費用'], answer:1, explanation:'葬儀費用は大きく「葬儀一式費用（祭壇・棺・搬送・運営費）」「飲食費」「寺院・宗教者謝礼（お布施）」「返礼品」に分かれ、「葬儀一式費用」が最も大きな割合を占めることが多い。ただし葬儀規模や内容によって異なる。'},

// ===== Ch1: 葬儀の歴史と文化 (10問) =====
{chapter:1, type:'4', text:'明治時代に発布された「神仏分離令」が葬儀に与えた影響として正しいものはどれか。', choices:['仏式の葬儀が法律で禁止された','それまで神仏習合で行われていた葬儀が、神式と仏式に分離されることになった','キリスト教式の葬儀が奨励されるようになった','墓地の管理が全て国家に移管された'], answer:1, explanation:'明治元年（1868年）の神仏分離令により、それまで神仏習合（神道と仏教が混合）で行われていた日本の宗教的慣習が分離された。葬儀においても「神葬祭」が推奨され、神式と仏式が明確に区別されるようになった。'},
{chapter:1, type:'4', text:'「家族葬」が急速に普及した主な社会的背景として正しいものはどれか。', choices:['法律で大規模葬儀が禁止されたため','核家族化・少子高齢化・地域コミュニティの希薄化により、参列者数が減少し小規模葬儀を望む人が増えたため','葬儀費用の高騰を政府が抑制する政策を取ったため','火葬場の収容能力が低下したため'], answer:1, explanation:'家族葬の普及背景：①核家族化・単身世帯増加②地域コミュニティ・近隣付き合いの希薄化③「会葬者への気遣いより家族だけでゆっくり送りたい」という価値観の変化④少子高齢化による親族数の減少。'},
{chapter:1, type:'4', text:'「直葬（ちょくそう）」の説明として正しいものはどれか。', choices:['通夜・葬儀・告別式の全てを1日で行う葬儀形式','通夜・葬儀式を行わず、逝去後に遺体を直接火葬場に搬送して火葬のみを行う形式','自宅ではなく葬儀式場に直接搬送して行う葬儀','近親者のみで行う家族葬のこと'], answer:1, explanation:'直葬（ちょくそう）または「火葬式」は、通夜・葬儀・告別式などの儀式を行わず、亡くなった後に直接火葬場に搬送して火葬のみを行う最もシンプルな葬儀形式。費用が安く、東京などの都市部で増加している。'},
{chapter:1, type:'4', text:'日本の葬儀の歴史において「土葬」から「火葬」へ移行した主なきっかけとして正しいものはどれか。', choices:['江戸幕府が法律で火葬を義務化した','持統天皇（7世紀末）が仏教の影響を受けて火葬された最初の天皇とされており、仏教伝来が火葬普及の大きな要因となった','明治政府が土葬を禁止したため','戦後のGHQが衛生上の理由で火葬を推奨したため'], answer:1, explanation:'日本への仏教伝来（6世紀）とともに火葬文化が広まった。持統天皇（703年崩御）は文献上火葬された最初の天皇とされる。その後仏教の影響で火葬が広まり、現在日本の火葬率は世界最高水準の99%以上。'},
{chapter:1, type:'4', text:'「お盆（盂蘭盆会・うらぼんえ）」の宗教的起源として正しいものはどれか。', choices:['日本古来の神道の祭り','仏教の「目連（もくれん）救母伝説」を起源とする、先祖の霊を供養する行事','キリスト教の「諸聖人の日（万聖節）」に由来する','儒教の先祖崇拝思想に基づく','神仏習合により作られた完全な日本オリジナルの行事'], answer:1, explanation:'お盆（盂蘭盆）は仏教の「目連（もくれん）が母を餓鬼道から救った」という故事に由来。仏弟子の目連が餓鬼道で苦しむ母のために供物を捧げ僧侶に供養してもらったことが起源とされる。'},
{chapter:1, type:'ox', text:'「無宗教葬（自由葬）」は日本では法律で認められていない。', answer:0, explanation:'誤り。無宗教葬（自由葬）は日本で完全に認められている葬儀形式。宗教儀式を行わず、音楽や映像で故人を偲ぶなど自由な形式で行える。法律は葬儀の宗教的形式を規定していない。'},
{chapter:1, type:'ox', text:'日本の火葬率は世界的にみても非常に高く、ほぼ100%に近い。', answer:1, explanation:'正しい。日本の火葬率は約99.9%（2022年）と世界最高水準。土地の少ない日本では衛生上・土地利用上の観点から火葬が定着。欧米では宗教的理由から土葬が主流だった国も多いが近年火葬が増えている。'},
{chapter:1, type:'4', text:'「死者儀礼（葬送儀礼）」の社会的機能として適切でないものはどれか。', choices:['遺族・関係者が死を受け入れ悲嘆を表現する場を提供する','故人の社会的な死（社会的役割の終わり）を公式に確認する','遺族が相続財産の分配を葬儀の場で行う','コミュニティが故人の死を共に悼み絆を確認する場となる'], answer:2, explanation:'葬送儀礼の社会的機能：①遺族の悲嘆表現・受容の支援②故人の社会的役割終了の公式確認③コミュニティの結束確認④死を「ケガレ」から「ホトケ」へ変換する文化的意味付け。財産分配は法的に別途行うもので葬儀の本来的機能ではない。'},
{chapter:1, type:'4', text:'「葬儀の社会化・産業化」が進んだ主な時期はいつか。', choices:['江戸時代（17〜19世紀初頭）','明治〜大正時代（19世紀後半〜20世紀初頭）','高度経済成長期（1950〜70年代）','バブル崩壊後（1990年代）'], answer:2, explanation:'葬儀が家族・地域コミュニティ中心から専門業者（葬儀社）に委ねられる「社会化・産業化」が進んだのは主に高度経済成長期（1950〜70年代）。都市化・核家族化が進む中で葬儀社への依存が急増した。'},
{chapter:1, type:'4', text:'「終活（しゅうかつ）」という言葉が広まった背景として最も適切なものはどれか。', choices:['国が義務化した終末期の手続き','高齢化社会の進展の中で、生前に自分の死・葬儀・相続などを準備する動きが広まったため','葬儀費用の急騰を受け、事前に費用を積み立てる互助会の普及','医療技術の進歩で死亡時期の予測が可能になったため'], answer:1, explanation:'「終活」とは人生の終わりに向けた準備活動のこと。2009年頃から使われ始めた言葉で、高齢化社会の進展とともに自分の葬儀・お墓・遺言・エンディングノートなどを生前に準備する活動として普及した。'},

// ===== Ch2: 宗教・宗旨別葬儀 (10問) =====
{chapter:2, type:'4', text:'浄土真宗の葬儀における「焼香の作法」として正しいものはどれか。', choices:['抹香を額に当ててから香炉に入れる（一回）','抹香を額に当てずに香炉に入れる（一〜二回）','抹香を三回に分けて入れる','線香を三本立てる'], answer:1, explanation:'浄土真宗では「押しいただかない（額に当てない）」焼香が特徴。「阿弥陀仏の他力本願により救われる」という思想から、自力の功徳を積むための「押しいただき」は行わない。回数は宗派により1〜2回。'},
{chapter:2, type:'4', text:'「浄土宗」の開祖と総本山の正しい組み合わせはどれか。', choices:['法然（ほうねん）・知恩院（京都）','親鸞（しんらん）・西本願寺（京都）','道元（どうげん）・永平寺（福井）','日蓮（にちれん）・久遠寺（山梨）'], answer:0, explanation:'浄土宗の開祖は法然（源空、1133〜1212年）、総本山は知恩院（京都市東山区）。親鸞は浄土真宗の開祖（本願寺）、道元は曹洞宗の開祖（永平寺）、日蓮は日蓮宗の開祖（身延山久遠寺）。'},
{chapter:2, type:'4', text:'カトリックの葬儀で行われる「ミサ（葬儀ミサ）」について正しいものはどれか。', choices:['仏式の法要に相当し、死後49日目に行う','故人のためのミサで、ロザリオや聖書の朗読、聖体拝領などが含まれる','日本では法律により教会以外でのミサは認められていない','ミサでは線香を焚き、焼香に近い「献香」を行う'], answer:1, explanation:'カトリックの葬儀ミサ（Funeral Mass）は教会で行われる典礼で、旧約聖書・新約聖書の朗読、故人のための祈り、聖体拝領（ミサの中心儀式）などが含まれる。仏式の焼香の代わりに献花（白百合等）を行う。'},
{chapter:2, type:'4', text:'神道（神葬祭）における「帰幽奉告（きゆうほうこく）」とは何か。', choices:['火葬場に到着したことを神に報告する儀式','故人の死を神棚・祖先の霊に報告する儀式','葬儀場の設営が完了したことを喪主が確認する作業','遺骨を埋葬したことを役所に届け出ること'], answer:1, explanation:'帰幽奉告は神葬祭で最初に行う儀式で、故人が亡くなった（帰幽＝神のもとに帰ること）ことを神棚・祖先の霊・産土神（うぶすながみ）などに報告する。神棚の扉を閉じ白紙（半紙）を貼る「神棚封じ」も行う。'},
{chapter:2, type:'4', text:'「創価学会（そうかがっかい）」の葬儀の特徴として正しいものはどれか。', choices:['神式と仏式を融合した独自の形式で行う','「友人葬」と呼ばれ、僧侶を呼ばず友人・同志の学会員が導師役を務める','キリスト教に準じた形式で聖歌を斉唱する','伝統的な日蓮宗の形式に則り行う'], answer:1, explanation:'創価学会の葬儀は「友人葬」と呼ばれ、僧侶（お坊さん）を招かず、故人と親交のあった学会員が導師（どうし）・副導師として読経・司式を行う形式。日蓮大聖人の仏法に基づき「南無妙法蓮華経」を唱える。'},
{chapter:2, type:'4', text:'「天台宗」の開祖と本山の正しい組み合わせはどれか。', choices:['最澄（さいちょう）・比叡山延暦寺（滋賀）','空海（くうかい）・高野山金剛峯寺（和歌山）','道元（どうげん）・永平寺（福井）','栄西（えいさい）・建仁寺（京都）'], answer:0, explanation:'天台宗の開祖は最澄（767〜822年）、総本山は比叡山延暦寺（滋賀県大津市）。空海（弘法大師）は真言宗の開祖（高野山）、道元は曹洞宗の開祖（永平寺）、栄西は臨済宗の開祖（建仁寺）。'},
{chapter:2, type:'4', text:'プロテスタントの葬儀で行われる「説教」の位置付けとして正しいものはどれか。', choices:['説教は葬儀では行わず、追悼礼拝の場合のみ行う','聖書の言葉を通じて福音（神の恵み）を告げ、遺族を慰め励ます重要な要素','遺族が故人の生涯を振り返るスピーチのこと','寺院の住職が戒名の由来を説明すること'], answer:1, explanation:'プロテスタントの葬儀（記念式・召天式とも呼ぶ）では、牧師による「説教（せっきょう）」が中心的役割を担う。聖書の言葉に基づいて神の愛・救いのメッセージを語り、遺族を霊的に慰める重要な式次第の一部。'},
{chapter:2, type:'ox', text:'「浄土真宗」では「戒名（かいみょう）」ではなく「法名（ほうみょう）」と呼ぶ。', answer:1, explanation:'正しい。浄土真宗では亡くなった方に付ける名前を「法名（ほうみょう）」と呼ぶ。他の仏教宗派の「戒名」とは異なり、浄土真宗では戒律（かいりつ）を受けることを重視しないため「戒名」という言葉を使わない。'},
{chapter:2, type:'ox', text:'仏式の葬儀で「引導（いんどう）を渡す」作法は、禅宗（曹洞宗・臨済宗）や真言宗では行われない。', answer:0, explanation:'誤り。引導（いんどう）は故人に成仏を促す儀式で、主に禅宗（曹洞宗・臨済宗）や真言宗などで行われる重要な儀式。引導を渡すのは導師（どうし）の重要な役割の一つ。浄土真宗では引導の概念が異なり、形式が違う。'},
{chapter:2, type:'4', text:'神式の「玉串奉奠（たまぐしほうてん）」の正しい手順として最も適切なものはどれか。', choices:['玉串を両手で受け取り、時計回りに回して根元を祭壇に向けて捧げ、二礼二拍手一礼する','玉串を受け取り、そのまま祭壇に置き、一礼する','玉串を右手で受け取り焼香台の前に置き、合掌する','玉串を受け取り、反時計回りに回してから一礼のみで退く'], answer:0, explanation:'玉串奉奠の基本手順：①神職から両手で玉串を受け取る②玉串を胸の前に持ち、時計回りに回して「根元（木の元の部分）」を祭壇側に向ける③案（台）の上に捧げる④二礼・二拍手（忍び手で音を立てない）・一礼。'},

// ===== Ch3: 葬儀の流れ・式次第 (10問) =====
{chapter:3, type:'4', text:'「出棺（しゅっかん）」前に行う「釘打ち（くぎうち）」の習慣について正しいものはどれか。', choices:['棺を固定するための建築作業','遺族・近親者が石で棺の蓋の釘を打つ儀式。故人との別れを意味する','棺に副葬品を固定するための作業','法律により必須とされている火葬前の手続き'], answer:1, explanation:'釘打ちは棺の蓋を閉じる際に遺族・近親者が石（霊石・小石）を使って棺の釘を打ち込む儀式。「あの世に迷わず行けるように」「この世との縁を断つ」などの意味がある。近年は省略されるケースも多い。'},
{chapter:3, type:'4', text:'「火葬許可証（かそうきょかしょう）」を発行する機関はどこか。', choices:['厚生労働省','警察署','市区町村長（市役所・区役所・町村役場）','火葬場管理者'], answer:2, explanation:'火葬許可証は死亡届を提出した市区町村長が発行する（墓地埋葬法第5条）。死亡届提出時に同時に申請し、火葬を行う際は火葬場に提出が必要。火葬後は「火葬済」の証印が押されて埋葬許可証となる。'},
{chapter:3, type:'4', text:'「死亡届（しぼうとどけ）」の提出期限として正しいものはどれか。', choices:['死亡した日から3日以内','死亡の事実を知った日から7日以内（国内の場合）','死亡した日から14日以内','期限なし（いつでもよい）'], answer:1, explanation:'死亡届は戸籍法に基づき、死亡の事実を知った日から7日以内（国外で死亡した場合は3か月以内）に市区町村長に提出する義務がある（戸籍法第86条）。葬儀前に提出して火葬許可証を受け取るのが通例。'},
{chapter:3, type:'4', text:'「初七日（しょなぬか）法要」の現在一般的な実施タイミングはどれか。', choices:['死後7日目に単独で行う','葬儀・告別式の当日に繰り上げて行う「繰り上げ初七日」が一般化している','死後1ヶ月後に行う','初七日は現在では行われなくなっている'], answer:1, explanation:'本来は死後7日目に行う初七日法要だが、現在は葬儀・告別式と同日に行う「繰り上げ初七日」が一般的。遠方の参列者のために「精進落とし（会食）」を初七日法要と合わせて行うケースが多い。'},
{chapter:3, type:'4', text:'「喪主（もしゅ）」と「施主（せしゅ）」の違いとして正しいものはどれか。', choices:['喪主は故人の最も近い血族、施主は葬儀費用を負担する者で同一人物になるとは限らない','喪主は葬儀を仕切る葬儀社、施主は遺族の代表者','両者は完全に同じ意味で区別は不要','喪主は男性、施主は女性が務める'], answer:0, explanation:'喪主は故人と最も縁の深い人が務め（配偶者→長男→等の順）、対外的に喪家の代表として挨拶等を行う。施主は葬儀費用を支出する人。通常は同一人物だが、例えば「配偶者が高齢で喪主、長男が施主」のケースもある。'},
{chapter:3, type:'4', text:'「通夜（つや）」の本来の意味として正しいものはどれか。', choices:['葬儀の前日に行う短縮版の儀式','故人の傍らで一晩中ともに過ごし、霊を守り悪霊から守る慣習から発展した儀礼','参列者が故人に別れを告げる最後の機会','仏教の教えを説く法話の場'], answer:1, explanation:'通夜の起源は「夜通し」故人の傍らで過ごすこと。死者の魂が迷わず成仏できるよう守る・悪霊が近づかないよう番をするという意味があった。現在は1〜2時間の「半通夜」が一般的で、本来の「一晩中」は少数派になっている。'},
{chapter:3, type:'ox', text:'「精進落とし（しょうじんおとし）」は本来、忌明け（四十九日）後に精進料理から通常の食事に戻す食事のことを指していた。', answer:1, explanation:'正しい。精進落としは本来、忌中（四十九日まで）に精進料理（肉・魚を避ける）を食べていたものを、忌明け後に通常の食事に戻す（精進を「落とす」）宴席のこと。現代では葬儀後の会食全般を指すようになった。'},
{chapter:3, type:'4', text:'「出棺（しゅっかん）」の際に行う「位牌持ち」「遺影持ち」の順序として一般的なものはどれか。', choices:['遺影→位牌→棺の順で出る','位牌→遺影→棺の順で出る','棺が先頭で、その後に位牌・遺影が続く','全て棺の後ろで持ちながら歩く'], answer:1, explanation:'出棺時の行列は一般的に、①位牌（喪主または近親者が持つ）②遺影（近親者が持つ）③棺（霊柩車へ）の順が多い。ただし地域・葬儀社・宗派によって異なる場合もある。'},
{chapter:3, type:'4', text:'火葬後の「骨上げ（こつあげ）」で最後に収める骨として特別な意味を持つものはどれか。', choices:['足の骨（下肢骨）','頭蓋骨','喉仏（第二頸椎）','肋骨'], answer:2, explanation:'骨上げで最後に収めるのは「喉仏（のどぼとけ）」＝第二頸椎の骨。仏が合掌しているように見える形から「喉仏」と呼ばれ、特別に大切にされる。骨壺の最上部に安置するのが慣習。'},
{chapter:3, type:'4', text:'「仮通夜（かりつや）」について正しいものはどれか。', choices:['葬儀社が行う通夜の準備作業','病院や自宅で亡くなった当日の夜、近親者のみで行う内輪の通夜','正式な通夜の前日に行う予備的な儀式','半通夜（2時間程度の通夜）の別名'], answer:1, explanation:'仮通夜とは、死亡当日の夜に病院・自宅などで近親者だけで故人の傍で過ごす内輪の通夜。翌日以降に葬儀社の式場などで正式な「本通夜」を行う。遠方からの親族到着前に行う場合が多い。'},

// ===== Ch5: 関連法令 (10問) =====
{chapter:5, type:'4', text:'「墓地、埋葬等に関する法律（墓地埋葬法）」第4条の規定として正しいものはどれか。', choices:['死後48時間以内の埋葬・火葬を禁止している','死後24時間以内の埋葬・火葬を禁止している','埋葬・火葬に関する時間的制限はない','死後72時間以内の埋葬・火葬を禁止している'], answer:1, explanation:'墓地埋葬法第4条は「埋葬又は火葬は、死亡後24時間を経過した後でなければ、行ってはならない」と定める。ただし感染症法に基づく措置などで例外あり。これにより緊急の火葬等の防止と適切な死亡確認時間を確保している。'},
{chapter:5, type:'4', text:'「墓地の経営許可」を与える権限を持つ機関はどれか。', choices:['厚生労働大臣','都道府県知事（または政令市・中核市の市長）','市区町村長','法務大臣'], answer:1, explanation:'墓地埋葬法第10条により、墓地・納骨堂・火葬場の経営は都道府県知事（政令指定都市・中核市では市長）の許可が必要。個人や民間企業が勝手に墓地を経営することはできない。'},
{chapter:5, type:'4', text:'「死亡届」の提出について定める法律として正しいものはどれか。', choices:['墓地、埋葬等に関する法律','戸籍法','感染症の予防及び感染症の患者に対する医療に関する法律','医師法'], answer:1, explanation:'死亡届の提出は戸籍法（第86条〜）に定められ、死亡の事実を知った日から7日以内に市区町村長に届け出ることが義務付けられている。墓地埋葬法は火葬・埋葬の許可を定めるが死亡届自体は戸籍法の規定。'},
{chapter:5, type:'4', text:'「散骨（さんこつ）」の法的位置付けとして現在の日本で正しいものはどれか。', choices:['墓地埋葬法で明確に禁止されている','節度をもって行う限り違法でないとされているが、明確に許可する法律もない','海洋散骨は環境省の許可が必要','陸上散骨は都道府県知事の許可が必要'], answer:1, explanation:'散骨（海洋散骨・山への散骨等）は墓地埋葬法に直接の規定がない。1991年に法務省が「葬送のための節度をもって行われる限り違法ではない」との見解を示したが、明確に許可する法律もない。各自治体が独自条例で規制するケースもある。'},
{chapter:5, type:'4', text:'「相続」において遺産を法定相続人の法定割合で分ける「法定相続分」で、配偶者と子供1人の場合の割合として正しいものはどれか。', choices:['配偶者3/4、子供1/4','配偶者2/3、子供1/3','配偶者1/2、子供1/2','配偶者全額、子供は相続できない'], answer:2, explanation:'民法の法定相続分：配偶者と子供（一人）が相続人の場合は配偶者1/2、子供1/2。子供が複数の場合は子供の1/2をさらに均等に分ける。配偶者と直系尊属（親）の場合は配偶者2/3・親1/3。'},
{chapter:5, type:'4', text:'「遺言書（いごんしょ・ゆいごんしょ）」の種類で「自筆証書遺言」の要件として正しいものはどれか。', choices:['全文・日付・氏名を自筆し、押印する（財産目録はパソコン可）','全文をパソコンで作成し、署名のみ自筆すればよい','証人2人の前で内容を口述し作成する','公証人役場で公証人が作成する'], answer:0, explanation:'自筆証書遺言の要件（民法968条）：①全文を自筆で書く②作成の日付を自筆で書く③氏名を自筆で書く④押印する。2019年の改正で財産目録のみパソコン作成が認められたが、各ページへの署名・押印が必要。'},
{chapter:5, type:'ox', text:'「特殊居宅介護（訪問介護）」は「医療行為」に含まれ、葬儀社が行うことは禁止されている。', answer:0, explanation:'誤り。特殊居宅介護は介護の分野であり葬儀社の業務とは直接関係しない。葬儀社は遺体の搬送・安置・葬儀の実施などを行うが、「医療行為」（注射・医療的処置）は行えない。なお設問自体の文脈は不適切。'},
{chapter:5, type:'4', text:'「葬祭ディレクター技能審査」を実施している機関として正しいものはどれか。', choices:['厚生労働省','全日本葬祭業協同組合連合会と一般社団法人全日本冠婚葬祭互助協会が合同で実施','日本葬祭アカデミー教務センター','民間企業が独自に実施している'], answer:1, explanation:'葬祭ディレクター技能審査は「一般財団法人日本葬祭アカデミー教務センター」が実施（厚生労働省認定の技能審査）。全日本葬祭業協同組合連合会と全日本冠婚葬祭互助協会が共同で設立した制度。'},
{chapter:5, type:'4', text:'「感染症法（感染症の予防及び感染症の患者に対する医療に関する法律）」に基づき、一類感染症で死亡した遺体の取り扱いで正しいものはどれか。', choices:['通常の手順と全く同じで特別な措置は不要','焼却または二十四時間以内に火葬しなければならない場合がある','遺体を1ヶ月間隔離保管しなければならない','警察の管理下で処理しなければならない'], answer:1, explanation:'感染症法に基づき、エボラ出血熱などの一類感染症で死亡した場合は都道府県知事の指示により「二十四時間以内の火葬」等の緊急措置が取られることがある（感染症法第30条等）。感染拡大防止のための措置。'},
{chapter:5, type:'ox', text:'「墓地」は都道府県知事の許可なく個人が自分の土地に設置することができる。', answer:0, explanation:'誤り。墓地埋葬法第10条により、墓地の経営（設置）には都道府県知事（政令市・中核市では市長）の許可が必要。個人の土地であっても無許可で墓地を設置することは違法。'},

// ===== Ch7: 接遇・マナー (5問) =====
{chapter:7, type:'4', text:'「グリーフケア（Grief Care）」の「グリーフ（Grief）」の意味として正しいものはどれか。', choices:['喜び・感謝','悲嘆・深い悲しみ（大切な人を失った際の反応）','怒り・憤り','葬儀後の清掃作業'], answer:1, explanation:'グリーフ（Grief）は英語で「悲嘆」を意味し、大切な人を亡くした際の深い心理的・身体的・社会的な反応のこと。グリーフケアはその悲嘆を抱える人を支援すること。葬祭ディレクターにとって重要なスキル。'},
{chapter:7, type:'4', text:'遺族から「どんなお花が好きでしたか」と聞かれる状況で最も適切な対応はどれか。', choices:['「そういうことは聞けませんでした」と正直に答える','会話を通じて故人の好みを引き出し、その情報を葬儀の内容（花祭壇等）に反映する','「すべての花が同じです」と答えてその場を収める','「それは花屋に聞いてください」と案内する'], answer:1, explanation:'葬祭ディレクターは遺族との会話を通じて故人の個性・好み・生き方などをヒアリングし、それを葬儀内容（花・音楽・演出）に反映することが重要。故人らしさを演出する「パーソナル葬儀」の実現に繋がる。'},
{chapter:7, type:'4', text:'遺族が強い悲嘆の中にいる場合、葬祭ディレクターとして最も避けるべき言動はどれか。', choices:['遺族の気持ちに寄り添い、静かに話を聞く','「前向きに考えてください」「もう泣かないで」など否定的な声がけをする','必要な手続きをわかりやすく丁寧に説明する','遺族が希望する葬儀内容を丁寧にヒアリングする'], answer:1, explanation:'悲嘆の中にいる遺族に「泣かないで」「前向きに」などは悲しみを否定し、グリーフプロセスを妨げる可能性がある。葬祭ディレクターは共感的姿勢で話を聴き（傾聴）、判断や感情を押し付けないことが重要。'},
{chapter:7, type:'ox', text:'「忌み言葉（いみことば）」として「重ね重ね」「たびたび」「ますます」などの重ね言葉は弔事で使ってはいけない。', answer:1, explanation:'正しい。「重ね重ね」「たびたび」「ますます」「くれぐれも」などの重ね言葉（繰り返し言葉）は「不幸が重なる」「繰り返す」ことを連想させるとして弔事では忌み言葉とされる。'},
{chapter:7, type:'4', text:'「電話での訃報受け取り」の際に葬祭ディレクターが確認すべき事項として最も重要でないものはどれか。', choices:['故人のお名前と続柄','死亡日時・場所（病院名など）','遺族の人数と全員の生年月日','ご遺体の搬送先（安置場所の希望）'], answer:2, explanation:'訃報を受けた際に優先確認すべき事項：①故人の氏名②死亡日時・場所③遺族代表者（喪主予定者）の連絡先④搬送先の希望⑤宗教・宗派。遺族全員の生年月日は葬儀手配に即座に必要な情報ではなく優先度が低い。'},
{chapter:9, type:'4', text:'縄文・弥生時代の埋葬形式として正しい組み合わせはどれか。', choices:['縄文時代＝屈葬（くっそう）、弥生時代＝伸展葬（しんてんそう）が多く見られる', '縄文時代＝火葬、弥生時代＝土葬', '縄文時代＝風葬、弥生時代＝水葬', '縄文時代＝伸展葬、弥生時代＝屈葬'], answer:0, explanation:'縄文時代は体を折り曲げる「屈葬」が主流。弥生時代は大陸文化の影響で体を伸ばした「伸展葬」が多くなる。甕棺墓（かめかんぼ）も弥生時代の特徴。'},
{chapter:9, type:'4', text:'「もがり（殯）」について正しいものはどれか。', choices:['遺体を即座に火葬または土葬する古代の風習', '死者の霊を慰めるために遺体をしばらく安置し死の移行を見守る古代の喪の儀礼', '喪主が行う仏式の法要の古語', '死者の枕元に供える食事の総称'], answer:1, explanation:'「殯（もがり）」は古代日本の喪の儀礼。遺体を数日〜数ヶ月間仮安置し、霊魂が身体から完全に離れる過程を見守る。持統天皇の「大殯（おおもがり）」が日本書紀に記録されている。'},
{chapter:9, type:'4', text:'「古墳（こふん）」が作られた時代として正しいものはどれか。', choices:['縄文時代（約1万4000年前〜紀元前300年頃）', '弥生時代（紀元前300年頃〜3世紀頃）', '古墳時代（3世紀後半〜7世紀頃）', '奈良時代（710〜794年）'], answer:2, explanation:'古墳は3世紀後半〜7世紀頃の古墳時代に作られた。支配者層（首長・豪族）の墓で、前方後円墳が特徴的。仁徳天皇陵（大仙古墳）など世界最大級の墓も存在する。'},
{chapter:9, type:'4', text:'日本に火葬が伝わったのはいつ頃か。', choices:['縄文時代（約5000年前）', '弥生時代（紀元前後）', '飛鳥時代（仏教伝来以後、7世紀頃）', '江戸時代（17世紀）'], answer:2, explanation:'火葬は仏教とともに大陸から伝来。文献上最初の火葬は僧・道昭（700年）とされ、持統天皇（703年）が文献上最初に火葬された天皇。奈良時代に上流階級に普及した。'},
{chapter:9, type:'4', text:'「持統天皇（じとうてんのう）」が火葬された歴史的意義として正しいものはどれか。', choices:['初めて神式で葬られた天皇', '文献上日本で最初に火葬された天皇で、火葬普及の大きなきっかけとなった', '初めてキリスト教式で葬られた天皇', '仏式の大規模葬儀が最初に行われた天皇'], answer:1, explanation:'持統天皇（703年崩御）は続日本紀に火葬の記録が残る文献上最初の天皇。仏教の影響を強く受けた持統天皇の遺志による。その後、奈良時代〜平安時代に火葬が皇族・貴族層に普及した。'},
{chapter:9, type:'4', text:'「浄土真宗」が他の仏教宗派と大きく異なる葬儀上の特徴として正しいものはどれか。', choices:['葬儀の際に「引導」を渡す儀式を最も重視する', '「往生即成仏」の思想から引導・授戒の概念がなく「葬儀は仏法を聞く場」と位置づける', '通夜は行わず葬儀のみで済ませる慣習がある', '戒名に必ず「院号」が付き費用が高い'], answer:1, explanation:'浄土真宗では阿弥陀仏の本願力によって往生・成仏するため「この世からあの世へ導く」引導や授戒は不要。葬儀は「仏法に出会う場・報恩謝徳の場」と位置づけられる。'},
{chapter:9, type:'4', text:'「十三仏信仰（じゅうさんぶつしんこう）」と法要の関係として正しいものはどれか。', choices:['初七日〜三十三回忌までの各法要に特定の仏・菩薩が対応するという信仰', '13体の地蔵菩薩に拝むことで極楽往生できるという民間信仰', '13歳になった子供が寺院で行う成人式に相当する仏教儀礼', '13回忌以降の法要を指す言葉'], answer:0, explanation:'十三仏信仰は初七日（不動明王）〜四十九日（薬師如来）〜三十三回忌（虚空蔵菩薩）まで各法要に13体の仏菩薩が対応する日本独自の信仰体系。'},
{chapter:9, type:'4', text:'「枕経（まくらぎょう）」の正しい説明はどれか。', choices:['葬儀告別式で読まれる長い経', '死後まもなく（臨終直後）に僧侶が枕元で読む経', '四十九日法要で読まれる経', '毎朝仏壇の前で読む朝課の経'], answer:1, explanation:'枕経は臨終直後に僧侶が故人の枕元で読む経。故人の魂を仏法に導き成仏を助ける意味がある。地域・宗派によって通夜の際にまとめて行う場合もある。'},
{chapter:9, type:'4', text:'「六道輪廻（ろくどうりんね）」における六道の正しい組み合わせはどれか。', choices:['天道・人道・修羅道・畜生道・餓鬼道・地獄道', '極楽道・浄土道・菩薩道・声聞道・縁覚道・如来道', '天道・地道・東道・西道・南道・北道', '仏道・神道・儒道・道教・基督道・イスラム道'], answer:0, explanation:'六道は①地獄道②餓鬼道③畜生道④修羅道⑤人道⑥天道。生きとし生けるものが業（カルマ）に応じて輪廻転生する6つの世界。葬儀は死者が善い道（極楽浄土）に行けるよう願う儀礼でもある。'},
{chapter:9, type:'4', text:'仏教の「四十九日（七七日忌）」が49日に設定されている仏教的意味として正しいものはどれか。', choices:['7は仏教の聖数で49日かけて仏になると経典に定められているため', '閻魔大王をはじめ七人の裁判官が7日ごとに審判し四十九日目に最終判決が下るとされるため', '古代インドの暦で49日が1つの時間単位だったため', '釈迦が悟りを開くまでの日数が49日だったため'], answer:1, explanation:'四十九日の根拠は「冥界での7回の裁判」。7日ごとに閻魔大王等の前に立ち、四十九日目に転生先が決まるとされる。各法要で善根を積み良い判決が出るよう祈る意味がある。'},
{chapter:9, type:'4', text:'「曹洞宗（そうとうしゅう）」の開祖として正しいものはどれか。', choices:['法然（源空）', '道元（どうげん）', '日蓮（にちれん）', '栄西（えいさい）'], answer:1, explanation:'曹洞宗の開祖は道元禅師（1200〜1253年）。総本山は永平寺（福井県）と総持寺（神奈川県）の二本山。「只管打坐（しかんたざ）」＝ひたすら座禅するという修行法が特徴。'},
{chapter:9, type:'4', text:'「天台宗（てんだいしゅう）」の総本山として正しいものはどれか。', choices:['高野山金剛峯寺（和歌山県）', '比叡山延暦寺（滋賀県）', '永平寺（福井県）', '身延山久遠寺（山梨県）'], answer:1, explanation:'天台宗の開祖は最澄（767〜822年）、総本山は比叡山延暦寺（滋賀県大津市）。比叡山は「法然・親鸞・道元・日蓮」など多くの仏教宗派の開祖が修行した「仏教の母山」とも呼ばれる。'},
{chapter:9, type:'4', text:'真言宗の「密教（みっきょう）」の葬儀における特徴として正しいものはどれか。', choices:['念仏（南無阿弥陀仏）を唱えることが中心', '真言・陀羅尼を唱え護摩（ごま）を焚くなどの密教的作法が用いられる', '葬儀では一切の読経を行わない', '禅の修行法を葬儀に取り入れている'], answer:1, explanation:'真言宗（開祖：空海、総本山：高野山金剛峯寺）は密教を日本に伝えた宗派。葬儀では真言・陀羅尼（呪文）の読誦、曼荼羅を用いた儀式、場合により護摩供が行われる独自の作法がある。'},
{chapter:9, type:'4', text:'「日蓮宗（にちれんしゅう）」の葬儀の特徴として正しいものはどれか。', choices:['「南無阿弥陀仏」の念仏を唱えることが特徴', '「南無妙法蓮華経（なむみょうほうれんげきょう）」の題目を唱えることが特徴', '禅の形式に則り座禅を組むことが特徴', '神道と同様に玉串を奉奠することが特徴'], answer:1, explanation:'日蓮宗（開祖：日蓮、総本山：身延山久遠寺）の葬儀では「南無妙法蓮華経」の題目を唱えることが中心。法華経に基づき、太鼓（うちわ太鼓）を打ちながら読経する独特の形式が特徴。'},
{chapter:9, type:'4', text:'「浄土宗（じょうどしゅう）」の念仏（南無阿弥陀仏）を唱えることで往生できるという根拠となる経典はどれか。', choices:['般若心経（はんにゃしんぎょう）', '観無量寿経・阿弥陀経・無量寿経（浄土三部経）', '法華経（ほけきょう）', '涅槃経（ねはんぎょう）'], answer:1, explanation:'浄土宗・浄土真宗の根本経典は「浄土三部経」（観無量寿経・阿弥陀経・無量寿経）。念仏を唱えることで阿弥陀仏の極楽浄土に往生できると説く。法然・親鸞の教えの根拠。'},
{chapter:9, type:'4', text:'神道における「穢れ（けがれ）」と「死」の関係として正しいものはどれか。', choices:['神道では死は清浄なものとされ穢れとは無関係', '死は最も強い穢れ（死穢・しえ）とされ忌服期間中は神社参拝を避ける', '穢れは肉体的な汚れのみを指し死とは関係ない', '死穢は水で清めれば即座に消えるとされる'], answer:1, explanation:'神道では「死」は最も忌むべき穢れ（死穢・しえ）とされる。喪中（忌服期間）は神社への参拝を控え、神棚に白紙を貼って封じる「神棚封じ」を行う。'},
{chapter:9, type:'4', text:'「神葬祭（しんそうさい）」が明治時代に普及した政治的背景として正しいものはどれか。', choices:['仏教が明治政府によって禁止されたため', '明治政府が神道を国家宗教として整備する中で「神式での葬儀」を推進したため', 'キリスト教式の葬儀への対抗として神式が広まったため', '江戸幕府の「寺請制度」廃止に伴い自然と神式が普及したため'], answer:1, explanation:'明治元年の「神仏分離令」と神道国教化政策により神葬祭を推進。特に士族・官僚層から神式葬儀が普及した。江戸時代の「寺請制度」で義務化されていた仏式葬儀からの転換が進んだ。'},
{chapter:9, type:'4', text:'神道の「帰幽奉告（きゆうほうこく）」について正しいものはどれか。', choices:['火葬場に到着したことを神に報告する儀式', '故人の死を神棚・祖先の霊に報告する神葬祭最初の儀式', '葬儀場の設営完了を喪主が確認する作業', '遺骨を埋葬したことを役所に届け出ること'], answer:1, explanation:'帰幽奉告は神葬祭で最初に行う儀式で、故人が亡くなった（帰幽＝神のもとに帰ること）ことを神棚・祖先の霊・産土神に報告する。神棚の扉を閉じ白紙（半紙）を貼る「神棚封じ」も行う。'},
{chapter:9, type:'4', text:'神式の「玉串奉奠（たまぐしほうてん）」の正しい手順として最も適切なものはどれか。', choices:['玉串を両手で受け取り時計回りに回して根元を祭壇に向けて捧げ二礼二拍手（忍び手）一礼する', '玉串を受け取りそのまま祭壇に置き一礼する', '玉串を右手で受け取り焼香台の前に置き合掌する', '玉串を受け取り反時計回りに回してから一礼のみで退く'], answer:0, explanation:'玉串奉奠の手順：①神職から両手で受け取る②胸の前で時計回りに回し「根元（木の元）」を祭壇側に向ける③案（台）の上に捧げる④二礼・二拍手（忍び手で音を立てない）・一礼。'},
{chapter:9, type:'4', text:'神式の葬儀で「直会（なおらい）」とは何か。', choices:['神職が神前に祈る儀式', '葬儀・法要後に参列者が神饌（しんせん）をいただく会食', '神棚に奉納する食べ物の準備', '火葬場での最後の儀式'], answer:1, explanation:'直会（なおらい）は祭儀（神事・葬儀等）の後に参列者が神饌（神様にお供えした食事）をいただく会食。「神様と食事を共にする」という意味。仏式の「精進落とし」に相当する。'},
{chapter:9, type:'4', text:'江戸時代の「寺請制度（てらうけせいど）」の葬儀への影響として正しいものはどれか。', choices:['すべての庶民が神式の葬儀を行うことを義務付けた', 'すべての民衆がいずれかの仏教寺院の檀家となることを義務付け葬儀・法要を寺院が管理する体制が確立された', '葬儀費用の上限を幕府が規定した', '葬儀は武士のみが行えるものとされた'], answer:1, explanation:'江戸幕府の「寺請制度（檀家制度）」はキリシタン弾圧のため設けられ全民衆を仏教寺院の檀家に登録。死亡・婚姻等の証明を寺が発行（寺証文）。これにより「仏式の葬儀」が庶民に浸透した。'},
{chapter:9, type:'4', text:'「野辺送り（のべおくり）」の説明として正しいものはどれか。', choices:['告別式後に参列者全員で食事をする精進落としの古語', '遺体・棺を埋葬地まで行列を組んで送り届ける葬列の慣習', '通夜の夜に故人の思い出を語り合う時間', '四十九日法要で墓石に名前を刻む儀式'], answer:1, explanation:'「野辺送り」は葬列を組んで故人の棺を墓地や火葬場（古くは野）まで送り届ける慣習。白装束の近親者が位牌・遺影・棺の順に行列を組んだ。現代では霊柩車の普及により形骸化。'},
{chapter:9, type:'4', text:'「告別式（こくべつしき）」は日本古来の仏教儀礼で明治以前から行われていた。', choices:['正しい', '誤り'], answer:1, explanation:'「告別式」は明治以降、特に大正〜昭和初期に一般化した近代的な儀式形式。「一般会葬者が別れを告げる」という形式は近代の産物。告別式の元祖は1906年の「西村茂樹告別式」とされる。'},
{chapter:9, type:'4', text:'「家族葬」が急速に普及した主な社会的背景として正しいものはどれか。', choices:['法律で大規模葬儀が禁止されたため', '核家族化・少子高齢化・地域コミュニティの希薄化により小規模葬儀を望む人が増えたため', '葬儀費用の高騰を政府が抑制する政策を取ったため', '火葬場の収容能力が低下したため'], answer:1, explanation:'家族葬普及の背景：①核家族化・単身世帯増加②地域コミュニティの希薄化③「会葬者への気遣いより家族だけでゆっくり送りたい」という価値観の変化④少子高齢化による親族数の減少。'},
{chapter:9, type:'4', text:'「直葬（ちょくそう）」の説明として正しいものはどれか。', choices:['通夜・葬儀・告別式の全てを1日で行う葬儀形式', '通夜・葬儀式を行わず逝去後に遺体を直接火葬場に搬送して火葬のみを行う形式', '自宅ではなく葬儀式場に直接搬送して行う葬儀', '近親者のみで行う家族葬のこと'], answer:1, explanation:'直葬（ちょくそう）または「火葬式」は、通夜・葬儀・告別式等の儀式を行わず直接火葬場に搬送して火葬のみを行う最もシンプルな葬儀形式。費用が安く、東京など都市部で増加している。'},
{chapter:9, type:'4', text:'「逆さごと（さかさごと）」の習俗として正しいものはどれか。', choices:['死者が蘇ることを願って行う儀式の総称', '死の世界は現世と逆という観念から屏風を逆さに立てる・着物を左前にするなど日常と逆の作法を行う習俗', '葬儀後に祭壇を片付ける際の手順', '弔問客が右回りで焼香台を回る作法'], answer:1, explanation:'「逆さごと」は死の世界（あの世）は現世と逆という観念に基づく葬儀習俗。屏風の逆さ立て・着物の左前・足元から布団に入れる・茶碗に箸を立てる（一膳飯）などが該当。'},
{chapter:9, type:'4', text:'「頭陀袋（ずだぶくろ）」の葬儀における意味として正しいものはどれか。', choices:['香典を入れて喪主に渡す袋', '死者があの世への旅に持つとされる六文銭などを入れる袋で首から下げる', '僧侶が経典を持ち歩くための袋', '骨上げの際に遺骨を入れる布袋'], answer:1, explanation:'頭陀袋は死者の首から下げる布袋で、三途の川の渡し賃とされる「六文銭」や旅のお守りを入れる。「あの世への旅支度」の一つ。現代では冥銭（印刷）を入れる場合が多い。'},
{chapter:9, type:'4', text:'「一膳飯（いちぜんめし）」を枕元に供える習俗の意味として正しいものはどれか。', choices:['故人が腹を空かせないよう生前と同じ食事を供える', 'あの世への旅支度として最後の食事を用意する「逆さごと」の一つで茶碗に飯を山盛りにして箸を立てる', '参列者全員で食べる精進落としの最初の一膳', '僧侶に供えるお布施の一部'], answer:1, explanation:'一膳飯は枕飾りの一つ。茶碗に飯を山盛りにして箸を1本（または2本縦に）立てる。日常と逆（「逆さごと」）にして死者の食事であることを示す。'},
{chapter:9, type:'4', text:'「末期の水（まつごのみず）」について正しいものはどれか。', choices:['死亡確認後に医師が行う処置', '臨終に際して遺族が故人の唇を水で濡らす儀式', '葬儀社が行う遺体の口腔内ケア', '湯灌の際に行われる清拭の一部'], answer:1, explanation:'末期の水は「死に水」とも呼ばれ、臨終の際（または直後）に遺族が脱脂綿や小さな筆に水を含ませて故人の唇を濡らす儀式。「あの世への旅で喉が渇かないように」という意味を持つ。'},
{chapter:9, type:'4', text:'「北枕（きたまくら）」にする習慣の由来として正しいものはどれか。', choices:['北に向いて眠ることで仏の国（北方浄土）に向かうとされるため', '釈迦が入滅した際に頭を北に向けていたという故事から', '北は鬼門の方向であり邪気を寄せ付けないため', '古来より日本人が北を向いて就寝する習慣があったため'], answer:1, explanation:'北枕の由来は、釈迦（仏陀）が涅槃に入った際に頭を北に向け顔を西（西方浄土）に向けていたという「涅槃経」の記述から。仏教の影響を受けた日本の習俗として定着した。'},
{chapter:9, type:'4', text:'「陰膳（かげぜん）」の意味として正しいものはどれか。', choices:['葬儀後に喪主が食べる最初の食事', '旅先や遠方にいる人・亡くなった人の分として食事を用意する慣習', '精進料理として野菜だけで作られた食事', '僧侶への食事のお布施'], answer:1, explanation:'陰膳は離れて暮らす家族や死者のために食卓に一人分の食事を用意する慣習。葬儀においては故人が旅立った後も暫くの間（四十九日まで等）食事を供える意味合いで行われる。'},
{chapter:9, type:'4', text:'「精進落とし（しょうじんおとし）」の本来の意味として正しいものはどれか。', choices:['葬儀告別式後の会食全般を指す言葉', '忌明け（四十九日）後に精進料理から通常の食事に戻す宴席のこと', '通夜の夜に出される食事のこと', '出棺の際に参列者が食べる軽食のこと'], answer:1, explanation:'精進落としは本来、忌中（四十九日まで）に精進料理（肉・魚を避ける）を食べていたものを忌明け後に通常の食事に戻す宴席のこと。現代では葬儀後の会食全般を指すようになった。'},
{chapter:9, type:'4', text:'「通夜（つや）」の本来の意味として正しいものはどれか。', choices:['葬儀の前日に行う短縮版の儀式', '故人の傍らで一晩中ともに過ごし霊を守り悪霊から守る慣習から発展した儀礼', '参列者が故人に別れを告げる最後の機会', '仏教の教えを説く法話の場'], answer:1, explanation:'通夜の起源は「夜通し」故人の傍らで過ごすこと。死者の魂が迷わず成仏できるよう守る・悪霊が近づかないよう番をするという意味。現在は1〜2時間の「半通夜」が一般的。'},
{chapter:9, type:'ox', text:'「友引（ともびき）」の日に葬儀を避ける慣習は、仏教の教義に直接の根拠がある。', answer:1, explanation:'友引は「六曜（ろくよう）」という暦注の一つで仏教とは無関係（中国の「時刻占い」が起源）。「友を引く」という語呂合わせから葬儀を避ける慣習が生まれたが、仏教公式の教義に根拠はない。火葬場が友引に休業する風習も宗教的義務ではない。'},
{chapter:9, type:'4', text:'「散華（さんげ）」の葬儀における意味として正しいものはどれか。', choices:['棺に花を入れる「お別れの花入れ」のこと', '仏・菩薩を供養し場を清めるために花びら（または蓮の形の紙）を撒く荘厳作法', '火葬後に遺骨に花水をかける儀式', '墓前に花を供える作法'], answer:1, explanation:'散華は法要・葬儀の場を荘厳するために蓮の花びらや蓮形の紙を撒く仏教の作法。天女が花を撒く（天花乱墜）という仏教世界観に基づき、聖なる場を整える意味がある。'},
{chapter:9, type:'4', text:'「引導（いんどう）を渡す」の仏教的意味として正しいものはどれか。', choices:['故人の生前の罪を許す免罪符を渡す行為', '導師が故人の成仏を証明する法語を唱えあの世への道を示す儀式', '遺族全員が仏教の信徒になることを誓う儀式', '位牌に故人の戒名を書き入れる作業'], answer:1, explanation:'引導は禅宗・天台宗・真言宗などの葬儀で行われる重要な儀式。導師が「引導法語（いんどうほうご）」という偈文を唱え、故人の魂に「迷わず成仏せよ」という道を示す。「引導を渡す」の語源。'},
{chapter:9, type:'4', text:'「骨上げ」で二人一組で箸を使う理由として正しいものはどれか。', choices:['骨が重いため二人でないと持てないから', '「橋渡し（はしわたし）」に由来し故人をあの世へ橋渡しする意味と日常と逆の「箸渡し」で死の儀礼であることを示すため', '火葬場の衛生規定で二人での作業が義務付けられているため', '左手と右手で別々の箸を使うことで魂を安定させるとされるため'], answer:1, explanation:'骨上げで二人一組で箸を使うのは「橋渡し（はしわたし）」の意味。故人を「三途の川」の橋を渡らせ（はし＝橋・箸）あの世へ送り届ける象徴的行為。また箸渡しは日常でしない「逆さごと」でもある。'},
{chapter:9, type:'4', text:'「位牌（いはい）」の起源として正しいものはどれか。', choices:['日本の神道に起源を持つ独自の慣習', '中国の儒教儀礼における「木主（もくしゅ）」が禅宗の渡来とともに日本に伝わった', '平安時代に日本の貴族が独自に考案した', '明治時代に政府が推進した近代的な制度'], answer:1, explanation:'位牌は中国の儒教儀礼における「木主（木製の神主を祀る牌）」が起源で禅宗の渡来とともに日本に伝わった。日本で仏教と結びつき「戒名を記した位牌に霊魂が宿る」という独自の発展を遂げた。'},
{chapter:9, type:'ox', text:'「浄土真宗」では「戒名（かいみょう）」ではなく「法名（ほうみょう）」と呼ぶ。', answer:0, explanation:'正しい。浄土真宗では亡くなった方に付ける名前を「法名（ほうみょう）」と呼ぶ。他の仏教宗派の「戒名」とは異なり、浄土真宗では戒律を受けることを重視しないため「戒名」という言葉を使わない。'},
{chapter:9, type:'4', text:'「盂蘭盆経（うらぼんきょう）」に描かれる「目連救母伝説」の内容として正しいものはどれか。', choices:['目連が母親を地獄から一人で救い出した話', '目連が神通力では救えなかった餓鬼道の母を釈迦の教えに従い僧侶に供養してもらうことで救った話', '目連が母親の死を悲しむあまり出家した話', '目連が浄土に赴いて母親の魂に会いに行った話'], answer:1, explanation:'目連伝説：釈迦の弟子・目連は神通力で亡き母が餓鬼道で苦しんでいるのを見た。食物を送っても炎になる。釈迦の指示で7月15日に僧侶たちに飲食を施して供養すると母が救われた。これがお盆（盂蘭盆）の起源。'},
{chapter:9, type:'4', text:'「洗骨（せんこつ）」の習俗が現在も一部残る地域として正しいものはどれか。', choices:['北海道・東北地方', '沖縄県（特に先島諸島）', '京都・奈良の寺社周辺', '長崎・鹿児島のキリシタン地域'], answer:1, explanation:'「洗骨」は一度土葬した遺骨を数年後に掘り起こし骨を洗って改めて納骨する風習。沖縄県（特に宮古島・八重山諸島）に現在も一部残る。本土への火葬文化の普及前は広く行われていた。'},
{chapter:9, type:'4', text:'「五十回忌（ごじっかいき）」以降の法要における一般的な扱いとして正しいものはどれか。', choices:['五十回忌以降は法要を行わないことが仏教の教えで定められている', '三十三回忌または五十回忌を「弔い上げ」とし個人を祀る法要を終えて先祖霊に合一するとされる', '百回忌まで続けることが浄土宗で義務付けられている', '五十回忌以降は政府の法律で法要が禁止されている'], answer:1, explanation:'日本の民間信仰・慣習では三十三回忌または五十回忌を「弔い上げ」とし、個人としての法要を終了する。その後は故人は個性を失い「先祖代々の霊（祖霊）」に合一し「先祖供養」として祀られる。'},
{chapter:9, type:'4', text:'「メメント・モリ（Memento mori）」の意味として正しいものはどれか。', choices:['ラテン語で「死を忘れるな」を意味し中世ヨーロッパで死を意識させる芸術・慣習と関連する概念', '古代エジプトのミイラ作成儀式の名称', 'キリスト教式葬儀で歌われる鎮魂歌の別名', 'フランス語で「素晴らしい思い出」を意味する'], answer:0, explanation:'Memento mori（「死を忘れるな」）はラテン語の格言で、中世ヨーロッパの宗教的文脈で人間の死の必然性を思い起こさせる芸術・慣習に使われた。骸骨モチーフの絵画、頭蓋骨を飾る慣習などがこの思想に基づく。'},
{chapter:9, type:'4', text:'「祖霊（それい）」という概念の神道における説明として正しいものはどれか。', choices:['悪事を行った者がなる怨霊の総称', '死者は祀られることで個性を失い子孫を守護する「家の守り神」となるという神道の霊魂観', '特定の神社に祀られた偉人の霊のこと', '外国から来た神様の総称'], answer:1, explanation:'民俗学者・柳田国男らの研究による日本の霊魂観：死者は追善供養・法要・祭祀を重ねることで個性が薄れ、三十三回忌頃に「先祖代々の霊（祖霊）」に合一して家を守護する神の一部になるとされる。'},
{chapter:9, type:'4', text:'「お盆（盂蘭盆会）」の送り火を焚く日として一般的に正しいものはどれか。', choices:['8月13日（迎え火の日）', '8月16日（送り火の日）', '7月15日（旧盆）', '8月31日（夏の終わり）'], answer:1, explanation:'一般的なお盆の日程：8月13日（迎え火で先祖の霊を迎える）→14・15日（盆中）→8月16日（送り火で先祖の霊を見送る）。京都五山の送り火（大文字焼き）は8月16日に行われる。'},
{chapter:9, type:'4', text:'「本膳料理（ほんぜんりょうり）」が葬儀の席で歴史的に使われてきた理由として正しいものはどれか。', choices:['仏教の戒律で葬儀には本膳料理を使うことが定められていたため', '本膳料理は冠婚葬祭など正式な儀礼の場での日本の伝統的なもてなし形式であったため', '本膳料理は安価で大量に作れるため葬儀向きだったため', '明治政府が葬儀の食事に本膳料理を義務付けたため'], answer:1, explanation:'本膳料理は室町時代に武家社会で確立した正式な饗応料理形式で冠婚葬祭・正式な接待の場で用いられた。葬儀の精進落とし・通夜振る舞いの席でも「正式なもてなし」として使われてきた。'},
{chapter:9, type:'4', text:'「精進料理（しょうじんりょうり）」が葬儀・法要の食事として選ばれてきた理由として正しいものはどれか。', choices:['精進料理は安価で大量に作れるから', '仏教の「不殺生（ふせっしょう）」の戒律に基づき肉・魚を避けた食事で故人への追善供養とするため', '精進料理は日持ちするので弔問客に配りやすいから', '明治政府が葬儀の食事に精進料理を義務付けたため'], answer:1, explanation:'精進料理は仏教の「不殺生戒」（生き物を殺してはならない）に基づき肉・魚・五葷を避けた食事。喪中に食べることは「殺生を避け故人の冥福を祈る」という意味の追善行為。'},
{chapter:9, type:'4', text:'「弔辞（ちょうじ）」の歴史的起源として正しいものはどれか。', choices:['江戸時代の武士が主君の死を悼むために詠んだ和歌が起源', '中国の「誄（るい・なげき）」という死者を悼む詩文が漢籍とともに伝わり日本の弔辞の形式に影響を与えた', '明治政府が西洋の葬儀を模倣して制度化した', '昭和時代にラジオ放送の普及とともに一般化した'], answer:1, explanation:'弔辞の起源は中国の「誄（るい）」という死者の功績を讃え哀悼を表す詩文形式。奈良・平安時代に漢籍とともに伝わり日本の「弔辞」「弔文」の形式に影響を与えた。'},
{chapter:9, type:'4', text:'「キリスト教（カトリック）」の葬儀で行われる「ミサ」について正しいものはどれか。', choices:['仏式の法要に相当し死後49日目に行う', '故人のためのミサで聖書の朗読・聖体拝領などが含まれる近代的な典礼形式', '日本では法律により教会以外でのミサは認められていない', 'ミサでは線香を焚き焼香に近い「献香」を行う'], answer:1, explanation:'カトリックの葬儀ミサ（Funeral Mass）は教会で行われる典礼で旧約聖書・新約聖書の朗読、故人のための祈り、聖体拝領などが含まれる。仏式の焼香の代わりに献花（白百合等）を行う。'},
{chapter:9, type:'4', text:'プロテスタントの葬儀（記念式・召天式）で「説教」が果たす役割として正しいものはどれか。', choices:['説教は葬儀では行わず追悼礼拝の場合のみ行う', '聖書の言葉を通じて福音を告げ遺族を慰め励ます重要な要素', '遺族が故人の生涯を振り返るスピーチのこと', '寺院の住職が戒名の由来を説明すること'], answer:1, explanation:'プロテスタントの葬儀では牧師による「説教」が中心的役割を担う。聖書の言葉に基づいて神の愛・救いのメッセージを語り遺族を霊的に慰める重要な式次第の一部。'},
{chapter:9, type:'4', text:'「死後硬直（死後強直）」が始まる一般的な時間として正しいものはどれか。', choices:['死後10〜30分', '死後2〜4時間', '死後24時間以降', '死後1週間以降'], answer:1, explanation:'死後硬直は死後約2〜4時間で顎・首周辺から始まり12〜24時間で全身に及ぶ。その後24〜48時間程度で弛緩し始める。温度・年齢・体格などにより個人差がある。'},
{chapter:9, type:'4', text:'「湯灌（ゆかん）」について正しい説明はどれか。', choices:['遺体を塩水に浸けて防腐処置を行う儀式', '故人の体を清め温かいお湯で洗い清める儀式', '遺族が故人の衣服を着替えさせる儀式', '遺体の血液を薬液で置換する処置'], answer:1, explanation:'湯灌とは故人の身体を温かいお湯で洗い清める沐浴の儀式。仏教的には「この世の穢れを落として清らかに送り出す」という意味を持つ。専門業者が行う場合と家族が行う場合がある。'},
{chapter:9, type:'4', text:'「エンバーミング」の主な目的として最も適切なものはどれか。', choices:['遺体の美容・化粧を施すこと', '遺体の防腐・消毒処置を行い保存性を高めること', '遺体を法的に火葬許可が下りるまで保管すること', '遺体から感染性病原体を除去すること'], answer:1, explanation:'エンバーミングは遺体に防腐処置・消毒処置・修復処置を施す技術で、遺体の保存性を高め遺族が故人とゆっくり別れを告げられるようにすることが主目的。日本ではエンバーマーが施術する。'},
{chapter:9, type:'4', text:'「死に装束（しにしょうぞく）」として仏式で一般的に使用される衣装はどれか。', choices:['白の振袖', '白の経帷子（きょうかたびら）', '黒の喪服', '紋付き羽織袴'], answer:1, explanation:'仏式の死に装束は白い経帷子（白い浴衣状の衣）で、右前（左襟が上）に着せるのが特徴（生前と逆の「逆さごと」）。白は清浄・純潔の色で、あの世への旅支度の意味を持つ。'},
{chapter:9, type:'4', text:'「棺（かん・ひつぎ）」の種類で「合板棺（プリント棺）」の特徴として正しいものはどれか。', choices:['天然木の無垢材を使用し高級感がある', '合板の表面に木目や模様をプリントしたもので比較的低価格', '金属製の棺で耐久性が高い', '紙製の棺で環境に配慮している'], answer:1, explanation:'合板棺（プリント棺）は合板（ベニヤ）の表面に木目模様等をプリントまたは塩ビシートで仕上げたもの。天然木棺より低コストで日本の葬儀で最も広く普及している一般的な棺。'},
{chapter:9, type:'4', text:'「霊柩車（れいきゅうしゃ）」の種類として正しいものはどれか。', choices:['宮型（みやがた）・洋型・バン型（寝台車）', 'スポーツ型・セダン型・バス型', '白型・黒型・銀型', '一般型・特別型・豪華型'], answer:0, explanation:'霊柩車の種類：①宮型（神社の宮殿のような装飾の伝統的なもの）②洋型（リムジン風の棺を覆うケース付き）③バン型または寝台車（搬送専用）。近年は宮型から洋型への移行が進んでいる。'},
{chapter:9, type:'ox', text:'「宮型霊柩車」は現在も日本全国で増加傾向にある。', answer:1, explanation:'誤り。かつて主流だった宮型（お宮のような装飾の）霊柩車は「葬儀を連想させる」として住宅街での使用を避ける傾向が強まり減少。現在は外観が目立たない洋型やバン型が主流になっている。'},
{chapter:9, type:'4', text:'「副葬品（ふくそうひん）」として棺に入れてよいものとして正しいものはどれか。', choices:['ガラス製の花瓶', '金属製のゴルフクラブ', '故人の好きだった本（紙製）', '塩化ビニール製の人形'], answer:2, explanation:'副葬品で棺に入れてよいのは可燃性のもの（紙・布・木製品など）。ガラスは火葬後に残り骨と混ざる問題がある。金属は火葬炉を傷める。塩化ビニールは燃焼時に有害ガスを発生させるため不可。'},
{chapter:9, type:'4', text:'「火葬後の骨上げ（こつあげ）」で最後に収める骨として特別な意味を持つものはどれか。', choices:['足の骨（下肢骨）', '頭蓋骨', '喉仏（第二頸椎）', '肋骨'], answer:2, explanation:'骨上げで最後に収めるのは「喉仏（のどぼとけ）」＝第二頸椎の骨。仏が合掌しているように見える形から「喉仏」と呼ばれ特別に大切にされる。骨壺の最上部に安置するのが慣習。'},
{chapter:9, type:'4', text:'「香（こう）を焚く」習慣が葬儀で用いられるようになった起源として正しいものはどれか。', choices:['江戸時代に遺体の腐敗臭を消すための実用的な手段として始まった', 'インド仏教において「香」が仏への最高の供養の一つとされ仏教とともに日本に伝わった', '中国の道教から伝わった悪霊払いの儀式', '明治政府が衛生的な葬儀のために奨励した'], answer:1, explanation:'仏教では「六種供養（花・香・灯明・飲食・水・宝）」の一つとして「香」が重視される。インドでは香木を焚くことで仏菩薩に敬意を表し場を清め死者の霊を慰めるとされた。これが仏教とともに日本に伝わった。'},
{chapter:9, type:'4', text:'「死亡届（しぼうとどけ）」の提出期限として正しいものはどれか。', choices:['死亡した日から3日以内', '死亡の事実を知った日から7日以内（国内の場合）', '死亡した日から14日以内', '期限なし（いつでもよい）'], answer:1, explanation:'死亡届は戸籍法に基づき死亡の事実を知った日から7日以内（国外で死亡した場合は3か月以内）に市区町村長に提出する義務がある（戸籍法第86条）。葬儀前に提出して火葬許可証を受け取るのが通例。'},
{chapter:9, type:'4', text:'「仮通夜（かりつや）」について正しいものはどれか。', choices:['葬儀社が行う通夜の準備作業', '病院や自宅で亡くなった当日の夜、近親者のみで行う内輪の通夜', '正式な通夜の前日に行う予備的な儀式', '半通夜（2時間程度の通夜）の別名'], answer:1, explanation:'仮通夜とは死亡当日の夜に病院・自宅などで近親者だけで故人の傍で過ごす内輪の通夜。翌日以降に葬儀社の式場等で正式な「本通夜」を行う。遠方からの親族到着前に行う場合が多い。'},
{chapter:9, type:'4', text:'「釘打ち（くぎうち）」の慣習について正しいものはどれか。', choices:['棺を固定するための建築作業', '出棺前に遺族・近親者が石で棺の蓋の釘を打つ儀式', '棺に副葬品を固定するための作業', '法律により必須とされている火葬前の手続き'], answer:1, explanation:'釘打ちは棺の蓋を閉じる際に遺族・近親者が石（霊石・小石）を使って棺の釘を打ち込む儀式。「あの世に迷わず行けるように」「この世との縁を断つ」などの意味がある。近年は省略されるケースも多い。'},
{chapter:9, type:'4', text:'「初七日（しょなぬか）法要」の現在一般的な実施タイミングはどれか。', choices:['死後7日目に単独で行う', '葬儀・告別式の当日に繰り上げて行う「繰り上げ初七日」が一般化している', '死後1ヶ月後に行う', '初七日は現在では行われなくなっている'], answer:1, explanation:'本来は死後7日目に行う初七日法要だが、現在は葬儀・告別式と同日に行う「繰り上げ初七日」が一般的。遠方の参列者のために「精進落とし（会食）」を初七日法要と合わせて行うケースが多い。'},
{chapter:9, type:'4', text:'「出棺（しゅっかん）」の際に行う位牌・遺影・棺の順序として一般的なものはどれか。', choices:['遺影→位牌→棺の順で出る', '位牌→遺影→棺の順で出る', '棺が先頭で、その後に位牌・遺影が続く', '全て棺の後ろで持ちながら歩く'], answer:1, explanation:'出棺時の行列は一般的に、①位牌（喪主または近親者が持つ）②遺影（近親者が持つ）③棺（霊柩車へ）の順が多い。ただし地域・葬儀社・宗派によって異なる場合もある。'},
{chapter:9, type:'4', text:'「喪主（もしゅ）」と「施主（せしゅ）」の違いとして正しいものはどれか。', choices:['喪主は故人の最も近い血族、施主は葬儀費用を負担する者で同一人物になるとは限らない', '喪主は葬儀を仕切る葬儀社、施主は遺族の代表者', '両者は完全に同じ意味で区別は不要', '喪主は男性、施主は女性が務める'], answer:0, explanation:'喪主は故人と最も縁の深い人が務め（配偶者→長男→等の順）対外的に喪家の代表として挨拶等を行う。施主は葬儀費用を支出する人。通常は同一人物だが別人になるケースもある。'},
{chapter:9, type:'4', text:'「骨壺（こつつぼ）」のサイズが東日本と西日本で異なる主な理由はどれか。', choices:['東日本の遺骨は西日本より量が多いため', '東日本では全骨収集、西日本では部分収集の慣習があるため', '東日本と西日本では火葬温度が異なるため', '地域によって骨壺の素材が異なるため'], answer:1, explanation:'東日本では全骨収集（全ての骨を集める）が一般的なため骨壺が大きい（6〜7寸が標準）。西日本では部分収集（一部の骨のみ集める）が慣習のため骨壺が小さい（3〜4寸が標準）。'},
{chapter:9, type:'4', text:'「三具足（みつぐそく）」の組み合わせとして正しいものはどれか。', choices:['香炉・燭台・花立て', '香炉・鈴（りん）・位牌', '位牌・遺影・花立て', '燭台・鈴・経本'], answer:0, explanation:'三具足は仏壇や祭壇の基本的な仏具セットで「香炉（こうろ）・燭台（しょくだい）・花立て（はなたて）」の3点。これに燭台・花立てをもう1つずつ加えたものが「五具足（ごぐそく）」。'},
{chapter:9, type:'4', text:'「白木位牌（仮位牌）」と「本位牌」の関係として正しいものはどれか。', choices:['白木位牌は葬儀後四十九日まで使用し、その後本位牌に移す', '白木位牌は四十九日法要後も永続的に使用する', '本位牌は葬儀当日のみ使用する', '両者は全く同じもので呼び方が異なるだけ'], answer:0, explanation:'白木位牌（仮位牌）は葬儀から四十九日法要まで使用する仮のもの。四十九日法要の際に本位牌（塗位牌・唐木位牌など）に「魂入れ（開眼供養）」を行い移す。白木位牌はその後お寺で処分するのが一般的。'},
{chapter:9, type:'4', text:'「お布施（ふせ）」を渡すタイミングとして最も一般的なものはどれか。', choices:['葬儀の前日（通夜の前）に渡す', '葬儀後（告別式または出棺後）か僧侶が来た際の挨拶のタイミングで渡す', '葬儀の1週間後に寺院を訪問して渡す', '香典袋と一緒に受付に預ける'], answer:1, explanation:'お布施は僧侶・住職に直接渡すのが基本。タイミングは葬儀社や地域の慣習により異なるが通夜前の挨拶時・告別式後の出棺前・出棺後のいずれかが多い。必ず袱紗（ふくさ）に包み丁寧に渡す。'},
{chapter:9, type:'4', text:'「送り火（おくりび）」の意味として正しいものはどれか。', choices:['葬儀後に使用した祭壇・位牌などを焼却する儀式', 'お盆の最終日に戻ってきた先祖の霊をあの世に送り返すために焚く火', '出棺の際に遺体を清めるために焚く火', '火葬炉に点火する儀式'], answer:1, explanation:'送り火はお盆の最終日（8月16日）に先祖の霊を送り返すために焚く火。迎え火（8月13日）で先祖の霊を迎え、送り火で見送る。京都五山の送り火（大文字焼き）が有名。'},
{chapter:9, type:'4', text:'「通夜（つや）」の語源として正しいものはどれか。', choices:['「通過の夜（この世からあの世に通過する夜）」の略', '「夜を通して（一晩中）」故人の傍で過ごすことを示す言葉', '「灯が通る（ともしびが燃え続ける）夜」の意味', '「問（とい）の夜」＝故人の功績を問い合わせる夜'], answer:1, explanation:'「通夜」は「夜を通す」＝一晩中故人の傍で過ごすことが語源。現代では2〜3時間の「半通夜」が一般的だが、本来は文字通り夜通し（通夜）行うものだった。'},
{chapter:9, type:'4', text:'「葬祭ディレクター技能審査」を実施している機関として正しいものはどれか。', choices:['厚生労働省', '一般財団法人日本葬祭アカデミー教務センター', '日本葬祭業協同組合連合会', '経済産業省'], answer:1, explanation:'葬祭ディレクター技能審査は「一般財団法人日本葬祭アカデミー教務センター」が実施（厚生労働省認定の技能審査）。全日本葬祭業協同組合連合会と全日本冠婚葬祭互助協会が共同で設立した制度。'},
{chapter:9, type:'4', text:'「散骨（さんこつ）」の法的位置付けとして現在の日本で正しいものはどれか。', choices:['墓地埋葬法で明確に禁止されている', '節度をもって行う限り違法でないとされているが明確に許可する法律もない', '海洋散骨は環境省の許可が必要', '陸上散骨は都道府県知事の許可が必要'], answer:1, explanation:'散骨（海洋散骨・山への散骨等）は墓地埋葬法に直接の規定がない。1991年に法務省が「葬送のための節度をもって行われる限り違法ではない」との見解を示したが明確に許可する法律もない。'},
{chapter:9, type:'4', text:'「枕飾り（まくらかざり）」に置かれる一般的なものとして正しいものはどれか。', choices:['故人の遺影・遺骨・位牌', '香炉・燭台・花立て（三具足）・枕団子・枕飯', '棺・副葬品・死亡診断書', '祭壇幕・生花アレンジ・弔電'], answer:1, explanation:'枕飾りは臨終直後に設ける仮の祭壇で三具足（香炉・燭台・花立て）・枕団子・枕飯（一膳飯）・水・線香などを供える。式場の本祭壇とは別に故人の安置場所に設置する。'},
{chapter:9, type:'ox', text:'「寝棺（ねかん）」は故人を横たわった状態で収める棺で、日本の現代の葬儀で最も一般的に使用されている。', answer:0, explanation:'正しい。現代の日本では「寝棺」（故人を横たわった状態で収める棺）が一般的。古来は「座棺（ざかん）」（故人を座った姿勢で収める）が多かったが現代ではほぼ寝棺が使用される。'},
{chapter:9, type:'4', text:'「葬儀の社会化・産業化」が進んだ主な時期はいつか。', choices:['江戸時代（17〜19世紀初頭）', '明治〜大正時代（19世紀後半〜20世紀初頭）', '高度経済成長期（1950〜70年代）', 'バブル崩壊後（1990年代）'], answer:2, explanation:'葬儀が家族・地域コミュニティ中心から専門業者（葬儀社）に委ねられる「社会化・産業化」が進んだのは主に高度経済成長期（1950〜70年代）。都市化・核家族化が進む中で葬儀社への依存が急増した。'},
{chapter:9, type:'4', text:'「終活（しゅうかつ）」という言葉が広まった主な背景として最も適切なものはどれか。', choices:['国が義務化した終末期の手続き', '高齢化社会の進展の中で生前に自分の死・葬儀・相続などを準備する動きが広まったため', '葬儀費用の急騰を受け事前に費用を積み立てる互助会の普及', '医療技術の進歩で死亡時期の予測が可能になったため'], answer:1, explanation:'「終活」とは人生の終わりに向けた準備活動のこと。2009年頃から使われ始め、高齢化社会の進展とともに自分の葬儀・お墓・遺言・エンディングノートなどを生前に準備する活動として普及した。'},
{chapter:9, type:'4', text:'「日本の火葬率」について正しいものはどれか。', choices:['約50%で世界の平均的な水準', '約70%で先進国の中では高い水準', '約99%以上で世界最高水準', '約30%で依然として土葬が多い'], answer:2, explanation:'日本の火葬率は約99.9%（2022年）と世界最高水準。土地の少ない日本では衛生上・土地利用上の観点から火葬が定着。欧米では宗教的理由から土葬が主流だった国も多いが近年火葬が増えている。'},
{chapter:9, type:'4', text:'「神仏分離令（しんぶつぶんりれい）」が発布された年はいつか。', choices:['1600年（関ヶ原の戦い）', '1868年（明治元年）', '1912年（明治45年）', '1945年（終戦）'], answer:1, explanation:'神仏分離令は明治元年（1868年）に明治政府が発布。江戸時代の神仏習合（神道と仏教が混合した状態）を解消し神道と仏教を明確に分離することを命じた。廃仏毀釈（はいぶつきしゃく）運動にも繋がった。'},
{chapter:9, type:'4', text:'「無宗教葬（自由葬）」は日本では法律で認められていない。', choices:['正しい', '誤り'], answer:1, explanation:'誤り。無宗教葬（自由葬）は日本で完全に認められている葬儀形式。宗教儀式を行わず音楽や映像で故人を偲ぶなど自由な形式で行える。法律は葬儀の宗教的形式を規定していない。'},
{chapter:9, type:'4', text:'「告別式後の出棺」の際の棺の向きとして一般的に正しいものはどれか。', choices:['故人の頭が先頭（出口に向けて）出棺する', '故人の足が先頭（足先を出口に向けて）出棺するのが一般的', '棺の向きは搬送のしやすさを優先する', '地域にかかわらず全国一律で頭を後ろにする'], answer:1, explanation:'一般的に出棺の際は「足先が前（出口方向）」「頭が後方（式場内側）」の向きで運び出す。これは「日常とは逆（頭が奥）」にすることで死の儀礼であることを示す「逆さごと」の一つ。'},
{chapter:9, type:'4', text:'「祭壇の生花」を使わずに白木のみで構成された伝統的な祭壇を何というか。', choices:['花祭壇', '白木祭壇（しらきさいだん）', '無宗教祭壇', '自由祭壇'], answer:1, explanation:'白木祭壇は白木（ヒノキなどの無塗装木材）と白布を組み合わせた伝統的な祭壇。生花祭壇は生の花を多数使用した祭壇で近年急速に普及。白木祭壇は汎用性が高く仏式でも神式でも使用可能。'},
{chapter:9, type:'4', text:'「四十九日」に「忌明け（きあけ）」となる仏教的根拠として正しいものはどれか。', choices:['四十九日を過ぎると故人の魂が完全に消滅するため', '中陰（ちゅういん）の期間が終わり故人が次の世界が決まり「仏」となるとされるため', '神道の慣習で四十九日が喪の終わりと定められているため', '四十九日を過ぎると遺骨が完全に土に還るため'], answer:1, explanation:'仏教では死後49日間を「中陰（ちゅういん）」と呼び、故人の魂がこの世とあの世の間をさまよう期間とされる。四十九日目に最終判決が下り「仏」となる。忌明けはその霊的な変容の完了を意味する。'},
{chapter:9, type:'4', text:'「本位牌（ほんいはい）」の主な種類として正しいものはどれか。', choices:['白木位牌・経帷子位牌', '塗位牌（ぬりいはい）・唐木位牌（からきいはい）', '紙位牌・石位牌', '木位牌のみで種類はない'], answer:1, explanation:'本位牌の主な種類：①塗位牌（漆塗りで金蒔絵等の装飾、全国的に一般的）②唐木位牌（黒檀・紫檀・白檀等の木目を生かした位牌、禅宗系で多い）。四十九日法要で白木位牌から本位牌に移す。'},
{chapter:9, type:'4', text:'「香典（こうでん）」の表書きとして、四十九日以降（法要）の際に適切なものはどれか。', choices:['御霊前（ごれいぜん）', '御仏前（ごぶつぜん）', '御香典（ごこうでん）', '御花料（おはなりょう）'], answer:1, explanation:'四十九日の忌明け後は故人が「仏」になっているとされるため「御仏前」が正しい。「御霊前」は四十九日前（忌中）の表書き。「御香典」は一般的な表書き。「御花料」はキリスト教式。'},
{chapter:9, type:'4', text:'「弔電（ちょうでん）」の読み上げタイミングとして一般的に正しいものはどれか。', choices:['通夜の開式前', '葬儀・告別式の式中（弔辞の後など）', '出棺の直前', '初七日法要の際'], answer:1, explanation:'弔電は葬儀・告別式の式中に読み上げるのが一般的で、通常は弔辞（ちょうじ）の後または式の適切なタイミングで喪主・葬儀社スタッフが代読する。重要度の高いものから読み上げる。'},
{chapter:9, type:'4', text:'「数珠（じゅず）」の正しい持ち方（焼香時）として一般的なものはどれか。', choices:['両手を合わせ左手の中指（または親指と人差し指の間）にかけ房が下になるように持つ', '片手の小指に引っ掛けて持つ', '右手の4本の指に引っ掛けてぶら下げて持つ', '首にかけて礼拝する'], answer:0, explanation:'数珠の正しい持ち方は両手を合わせ左手の中指（または親指と人差し指の間）にかけ房が下になるように持つのが基本。宗派によって細かい作法が異なる場合もある。'},
{chapter:9, type:'4', text:'「供花（くげ・きょうか）」として葬儀でよく使われる花として最も不適切なものはどれか。', choices:['菊（白・黄）', 'カーネーション（白）', '百合（白）', 'バラ（赤）'], answer:3, explanation:'葬儀の供花は白・黄・淡い紫などの控えめな色が一般的。赤いバラは情熱・ロマンスのイメージが強く日本の伝統的な葬儀では不適切とされる場合が多い。ただし現代では個性的な花祭壇で使われるケースも増えている。'},
{chapter:9, type:'4', text:'「骨上げ（こつあげ）」の作法として正しいものはどれか。', choices:['一人で行い足の骨から順に上に向かって収める', '二人一組で箸を使い足元から順に頭部へと骨を収める', '燃え残った骨を機械で粉砕してから収める', '遺族は参加せず葬儀社スタッフが全て行う'], answer:1, explanation:'骨上げは二人一組（遺族・近親者）が竹と木の箸を各一本ずつ持って足の骨から頭部に向かって順に骨壺に収める作法。最後に喉仏（第二頸椎）を収める。'},
{chapter:9, type:'4', text:'「挨拶状（喪中はがき・年賀欠礼状）」を出す時期として正しいものはどれか。', choices:['死亡後1週間以内に出す', '相手が年賀状を書き始める前（一般的に11月〜12月上旬）に届くように送る', '年が明けた1月中旬に出す（寒中見舞いとして）', '葬儀後すぐに全ての人へ一斉に送る'], answer:1, explanation:'喪中はがき（年賀欠礼状）は相手が年賀状を準備する前に届けるのがマナー。一般的に11月中旬〜12月初旬が適切。年が明けてから気づいた場合は「寒中見舞い」（1月7日以降）として送る。'},
{chapter:9, type:'4', text:'「互助会（ごじょかい）の前払式特定取引」を規制する法律として正しいものはどれか。', choices:['墓地、埋葬等に関する法律', '特定商取引に関する法律（特定商取引法）', '医師法', '感染症法'], answer:1, explanation:'互助会（冠婚葬祭互助会）は「前払式特定取引」として特定商取引法の規制を受ける。解約時の返戻金計算・書面交付義務・クーリングオフ適用などが規定されており消費者保護の観点から重要。'},
{chapter:9, type:'4', text:'「葬儀費用の相続税における取り扱い」として正しいものはどれか。', choices:['葬儀費用は全額所得税から控除できる', '葬儀費用は相続税の計算上「債務控除」として遺産総額から差し引くことができる', '葬儀費用の控除は認められていない', '葬儀費用は消費税の還付対象'], answer:1, explanation:'通夜・葬儀・告別式の費用・お布施・遺体搬送費等は相続税法上の「債務控除」として相続財産から差し引ける。ただし香典返し・墓地購入費・四十九日以降の法要費は含まれない。'},
{chapter:9, type:'4', text:'「死体検案書（したいけんあんしょ）」が使われる場面として正しいものはどれか。', choices:['全ての死亡者に発行される標準的な書類', '医師が診察していない患者（事故死・変死・病院外死亡など）の死亡を確認した場合に発行される', '葬儀社が遺族の代わりに作成する書類', '警察署が発行する書類'], answer:1, explanation:'死体検案書は医師が診察していない患者（事故死・変死・病院外死亡・孤独死など）の死亡を確認した際に発行される書類。通常は「死亡診断書」（主治医が発行）とは別の書類だが法的には同じ効力を持つ。'},
{chapter:9, type:'4', text:'「葬儀の見積書」に関する消費者保護上の重要事項として正しいものはどれか。', choices:['葬儀の見積書は法律上必ず書面で交付する義務がある', '口頭での見積りのみでも契約は有効だが後のトラブルを防ぐため書面交付・内容説明が業界として推奨されている', '見積書の金額は法律で上限が設定されている', '見積書の交付義務は1,000万円以上の契約のみに適用される'], answer:1, explanation:'葬儀見積書の書面交付を直接義務付ける法律条文は現状ないが、消費者庁・経済産業省の指導・業界の自主ガイドライン等で書面による明確な見積り・内容説明が強く推奨されている。'},
{chapter:9, type:'4', text:'「グリーフワーク」における葬祭ディレクターの役割として最も適切なものはどれか。', choices:['遺族に「早く元気になるよう」具体的なアドバイスを積極的にする', '遺族の感情（悲しみ・怒り・罪悪感など）を否定せず傾聴し悲嘆のプロセスを妨げない環境を提供する', '遺族が泣かないよう感情を抑える支援をする', '専門家でないため葬祭ディレクターは遺族の感情には一切関与しない'], answer:1, explanation:'グリーフワークにおいて葬祭ディレクターは「最初に接する支援者」。遺族の感情を否定せず共感的に傾聴し悲嘆のプロセスを自然に進められるよう支援する姿勢が重要。「泣かないで」「元気を出して」は逆効果。'},
{chapter:9, type:'4', text:'「個人情報保護法」と葬儀業の関係として最も重要なものはどれか。', choices:['葬儀社は個人情報保護法の適用除外', '故人および遺族の個人情報は適切に管理し目的外使用・第三者提供は原則禁止', '葬儀の案内状送付のために弔問客リストを業者に売ることは合法', '死者の情報は個人情報保護法の保護対象外'], answer:1, explanation:'葬儀業者は遺族・故人・弔問客の個人情報（氏名・住所・連絡先・宗教・死因等）を多数取り扱う。個人情報保護法に基づき適切な管理・利用目的の明示・第三者提供の禁止が求められる。'},
{chapter:9, type:'4', text:'「改葬（かいそう）」に必要な手続きとして正しいものはどれか。', choices:['改葬は届出不要で遺族が自由に行える', '現在の墓地の市区町村長に「改葬許可申請」を行い許可証を取得してから改葬する', '改葬先の墓地の管理者だけに連絡すれば完了', '都道府県知事への申請が必要'], answer:1, explanation:'改葬は墓地埋葬法第5条に基づき現在の墓地がある市区町村長に「改葬許可申請書」を提出して「改葬許可証」を取得が必要。無許可の改葬は違法。'},
{chapter:9, type:'4', text:'「墓地埋葬法」による火葬（または埋葬）が許可される最短時間として正しいものはどれか。', choices:['死後6時間以降', '死後24時間以降', '死後48時間以降', '死後72時間以降'], answer:1, explanation:'墓地埋葬法第4条：「埋葬又は火葬は、死亡後24時間を経過した後でなければ、行ってはならない」。ただし感染症法に基づく措置などで例外あり。適切な死亡確認時間を確保するための規定。'},
{chapter:9, type:'4', text:'「葬儀の終活（エンディングノート）」に記載すべき内容として最も適切なものはどれか。', choices:['相続税の申告書の下書き', '葬儀の希望（形式・規模・参列者）・お墓の希望・財産の所在・大切な人への伝言などの情報', '株式・不動産の処分方法の法的指示書', '医師への医療同意書'], answer:1, explanation:'エンディングノートは法的拘束力のある遺言書ではなく、葬儀の希望・お墓・財産の所在・保険証券の場所・デジタル遺産（パスワード等）・大切な人へのメッセージなどを書き留める覚書。終活の重要なツール。'},
{chapter:10, type:'4', text:'「墓地、埋葬等に関する法律（墓地埋葬法）」の施行年として正しいものはどれか。', choices:['1947年（昭和22年）', '1968年（昭和43年）', '1985年（昭和60年）', '1998年（平成10年）'], answer:0, explanation:'墓地埋葬法は1947年（昭和22年）に制定・施行。占領下の戦後改革期に公衆衛生・宗教の自由・地方自治の観点から制定された。現在まで大きな改正なく基本的枠組みが維持されている。'},
{chapter:10, type:'4', text:'墓地埋葬法第4条「埋葬または火葬は、死亡後何時間を経過した後でなければ行ってはならないか」として正しいものはどれか。', choices:['12時間', '24時間', '36時間', '48時間'], answer:1, explanation:'墓地埋葬法第4条：「埋葬又は火葬は、死亡（死産を含む。以下同じ。）後24時間を経過した後でなければ、これを行つてはならない」と規定されている。'},
{chapter:10, type:'4', text:'「火葬許可証（埋葬許可証）」を交付する機関として正しいものはどれか。', choices:['法務省（地方法務局）', '死亡者が死亡した市区町村の長', '死亡者の本籍地の市区町村長', '都道府県知事'], answer:1, explanation:'火葬許可証（埋火葬許可証）は死亡届を受理した市区町村長が交付する（墓地埋葬法第8条）。この許可証なしに火葬することはできない。'},
{chapter:10, type:'4', text:'「墓地経営」を許可する権限を持つ機関として正しいものはどれか。', choices:['内閣総理大臣', '都道府県知事（または政令市・中核市の市長）', '厚生労働大臣', '法務大臣'], answer:1, explanation:'墓地の経営許可権は都道府県知事（政令指定都市・中核市では市長）が持つ（墓地埋葬法第10条）。宗教法人・地方公共団体・公益法人等が許可の主な対象。'},
{chapter:10, type:'4', text:'墓地埋葬法で「市町村長は条例で」定めることができる事項として正しいものはどれか。', choices:['葬儀社の営業許可', '火葬料金の上限', '死体の処理等に関する事項', '葬儀の宗教形式'], answer:2, explanation:'墓地埋葬法第18条：「市町村は、条例で、死体の埋葬、火葬又は改葬（火葬した骨を除く。）並びに墓地及び納骨堂に関して、この法律に定めるものを除く外、必要な事項を定めることができる」。'},
{chapter:10, type:'4', text:'「死亡届」の届出義務者として正しいものはどれか。', choices:['病院の院長', '同居の親族・その他の同居者・家主・地主・後見人・保佐人等', '死亡した者の配偶者のみ', '葬儀社'], answer:1, explanation:'戸籍法第87条：死亡届の届出義務者は「同居の親族、その他の同居者、家主、地主又は家屋若しくは土地の管理人」等の順で規定される。'},
{chapter:10, type:'ox', text:'「散骨」は墓地埋葬法で明示的に禁止されている。', answer:1, explanation:'誤り。散骨（海洋散骨・山林散骨等）を直接禁止する条文は墓地埋葬法にない。1991年に法務省が「葬送の一形態として節度をもって行われる限り違法ではない」との見解を示した。ただし明確に許可する法律もない。'},
{chapter:10, type:'4', text:'「死産届（しさんとどけ）」の届出期間として正しいものはどれか。', choices:['死産後3日以内', '死産後7日以内', '死産後14日以内', '死産後1か月以内'], answer:1, explanation:'死産届は死産後7日以内に届け出る義務がある（死産の届出に関する規程第2条）。'},
{chapter:10, type:'4', text:'「改葬許可証」を交付するのはどこか。', choices:['移葬先の都道府県知事', '現在の墓地がある市区町村長', '法務局', '火葬場の管理者'], answer:1, explanation:'改葬の許可は現在の墓地・納骨堂がある市区町村長が行う（墓地埋葬法第5条）。申請者は「改葬許可申請書」に必要事項を記載して提出する。'},
{chapter:10, type:'4', text:'「無許可墓地」に遺骨を埋葬した場合の墓地埋葬法上の取り扱いとして正しいものはどれか。', choices:['特に罰則はない', '懲役1年以下または罰金5万円以下の刑に処される', '都道府県知事が事後許可することが可能', '火葬場が責任を負う'], answer:1, explanation:'墓地埋葬法第20条：許可なく埋葬・火葬または改葬した者は「1年以下の懲役又は5万円以下の罰金」に処される（罰則規定）。'},
{chapter:10, type:'4', text:'「感染症の予防及び感染症の患者に対する医療に関する法律（感染症法）」で規定される「一類感染症」の患者が死亡した場合の遺体の処理として正しいものはどれか。', choices:['通常の葬儀手順で行ってよい', '24時間以内に火葬・埋葬が義務付けられる場合がある', '遺体は病院の規定に従って廃棄される', '一類感染症の場合、家族は遺体に触れることを法律で禁じられている'], answer:1, explanation:'感染症法第30条（一類感染症患者の死体）：都道府県知事は「一類感染症の患者の死体については、24時間以内に火葬することができる」と規定し通常の24時間待機規定の例外を設けている。'},
{chapter:10, type:'4', text:'「特定商取引法」が葬祭業に適用される場面として正しいものはどれか。', choices:['すべての葬儀契約に適用される', '互助会（前払式特定取引）の解約・クーリングオフ等に適用される', '式場の賃貸借契約に適用される', '葬儀費用の相続税控除に適用される'], answer:1, explanation:'特定商取引法は互助会（前払式特定取引）に適用され、解約時の返戻金計算方法・クーリングオフ（20日間）・書面交付義務などを規定している。通常の葬儀サービス契約は特定商取引法の「指定役務」に含まれる場合もある。'},
{chapter:10, type:'4', text:'「エンバーミング」を行う際の「エンバーマー」の資格について正しいものはどれか。', choices:['医師免許が必要', '厚生労働大臣の認定資格', '国家資格はなく業界団体（IFSA等）が認定する民間資格', '都道府県知事の免許が必要'], answer:2, explanation:'日本ではエンバーマーの国家資格は存在せず、一般社団法人日本遺体衛生保全協会（IFSA）等の業界団体が認定する民間資格が事実上の資格として機能している。'},
{chapter:10, type:'4', text:'「葬祭業者」が「廃棄物の処理及び清掃に関する法律（廃棄物処理法）」に関して注意すべき点として正しいものはどれか。', choices:['遺体から発生する廃液・廃棄物の適切な処理が求められる', '葬祭業者は廃棄物処理法の適用除外', '棺や花などの廃棄物は一般ごみとして処分できる', '廃棄物処理は葬儀社ではなく火葬場が全て責任を持つ'], answer:0, explanation:'湯灌・エンバーミング等から生じる廃液、使用後の医療材料・薬品類、副葬品の残渣等は廃棄物処理法に従った適切な処理が必要。感染リスクのある廃棄物は「感染性廃棄物」として特別管理廃棄物になる場合もある。'},
{chapter:10, type:'4', text:'「消費税」と葬儀の関係として正しいものはどれか。', choices:['葬儀サービスはすべて消費税が非課税', 'お布施は消費税の課税対象', '葬儀サービス（式場・棺・搬送等）には消費税が課税されるが、お布施は不課税（対価性がないため）', '火葬費用のみ消費税が非課税'], answer:2, explanation:'葬儀社が提供するサービス（式場使用料・棺・搬送費等）は消費税課税対象。お布施・戒名料等は宗教法人への「喜捨・布施」であり「対価」ではないため不課税（消費税の課税対象外）。'},
{chapter:10, type:'4', text:'「香典袋」の外袋の表書きとして、仏式（四十九日前）に最も一般的なものはどれか。', choices:['御花料（おはなりょう）', '御霊前（ごれいぜん）', '御神前（ごしんぜん）', '御玉串料（おたまぐしりょう）'], answer:1, explanation:'仏式の忌中（四十九日前）の表書きは「御霊前」「御香典」「御香料」など。「御花料」はキリスト教式。「御神前・御玉串料」は神式。「御仏前」は四十九日の忌明け後に使う。'},
{chapter:10, type:'4', text:'「香典袋（不祝儀袋）」の水引について、仏式の葬儀で正しいものはどれか。', choices:['赤・金の水引を使用する', '黒白または双銀の結び切りの水引を使用する', '蝶結びの黄金の水引を使用する', '水引なしが正式'], answer:1, explanation:'仏式の不祝儀袋は黒白または双銀（銀一色）の「結び切り」水引を使用するのが一般的。「結び切り」は「繰り返してほしくないこと」に使う。蝶結びは「何度でも繰り返したいこと（祝儀・お礼等）」に使うため不適切。'},
{chapter:10, type:'4', text:'「香典の金額」を書く際の数字の書き方として正しいものはどれか。', choices:['アラビア数字（1,2,3...）を使用する', '漢数字（一・二・三...）ではなく大字（壱・弐・参...）を使用する', '英語でも問題ない', '数字は書かず合計金額のみ文字で記す'], answer:1, explanation:'香典金額は改ざん防止のために「大字（だいじ）」（壱・弐・参・拾・萬等）を使用するのがマナー。アラビア数字や通常の漢数字は避ける。金額の前に「金」を付け「也（なり）」は省略可。'},
{chapter:10, type:'4', text:'「香典返し」の一般的な相場として正しいものはどれか。', choices:['香典の全額を返す', '香典の3分の1〜半額程度を目安にする', '香典の10%程度', '香典と同額かそれ以上'], answer:1, explanation:'香典返しの一般的な相場は「半返し（いただいた香典の半額程度）」が基本とされ、頂いた金額の3分の1〜半額程度が目安。高額の場合は3分の1が上限とされることも多い。'},
{chapter:10, type:'4', text:'「香典返し」の表書きとして正しいものはどれか。', choices:['御礼（おれい）', '志（こころざし）または粗供養（そくよう）', '内祝（うちいわい）', '寸志（すんし）'], answer:1, explanation:'香典返しの表書きは「志（こころざし）」が最も一般的（全国共通）。関西では「粗供養（そくよう）」もよく使われる。「内祝」は祝い事の返礼に使うため不祝儀には使わない。'},
{chapter:10, type:'4', text:'「香典」を「現金書留」で郵送する際のマナーとして正しいものはどれか。', choices:['現金書留の封筒に直接現金を入れて送る', '現金を不祝儀袋に入れてから現金書留の封筒に入れ、お悔やみの手紙を添える', '現金書留は葬儀後の香典送付には使えない', '速達で送るのが礼儀'], answer:1, explanation:'香典を郵送する際は現金書留を使用（現金の郵送は現金書留のみ可）。不祝儀袋に現金を入れ封をしてから現金書留の封筒に入れる。お悔やみの言葉を書いた手紙を同封するのがマナー。'},
{chapter:10, type:'4', text:'「弔問（ちょうもん）」に際して適切ではない言葉はどれか。', choices:['この度は誠にご愁傷様でございます', '謹んでお悔やみ申し上げます', 'ご冥福をお祈りいたします', '本当によかったですね（良い死に方でしたね）'], answer:3, explanation:'「よかった」「大往生でしたね」などのポジティブな表現は、遺族の気持ちを無視し悲しみを軽視する可能性があるため弔問では避けるべき。「ご愁傷様です」「お悔やみ申し上げます」「ご冥福をお祈りします」が定型の丁寧な表現。'},
{chapter:10, type:'4', text:'「忌み言葉（いみことば）」として弔問・弔電で避けるべきものはどれか。', choices:['「安らかに」', '「重ね重ね」「度々」「再び」などの重ね言葉', '「謹んで」', '「心よりお悔やみ申し上げます」'], answer:1, explanation:'弔問・弔電での忌み言葉は「重ね重ね・度々・再び・またまた・くれぐれ」などの重ね言葉（不幸が重なることを連想）、「死ぬ・生きる・苦しむ」などの直接的表現。「安らかに」「謹んで」は適切。'},
{chapter:10, type:'4', text:'「葬儀の受付」での記帳マナーとして正しいものはどれか。', choices:['ボールペンで記帳するのが最も一般的で適切', '薄墨（うすずみ）の筆または筆ペンで記帳するのが正式マナー', '鉛筆で記帳する', '赤ペンで目立つように記帳する'], answer:1, explanation:'弔事（不祝儀）では薄墨（薄い墨・薄墨）で記帳するのが日本の伝統的マナー。「悲しみで墨をすることもできなかった」「涙で滲んだ」という意味がある。ボールペンは略式だが受け入れられている場合もある。'},
{chapter:10, type:'4', text:'「ご霊前（御霊前）」と書いた香典袋が使えない仏教宗派はどれか。', choices:['天台宗', '真言宗', '浄土真宗', '浄土宗'], answer:2, explanation:'浄土真宗では「往生即成仏（亡くなるとすぐ仏になる）」の思想から「霊」の概念を使わない。そのため「御霊前」ではなく「御仏前」「御香典」「御香料」が適切。四十九日前でも「御仏前」を使う唯一の宗派。'},
{chapter:10, type:'4', text:'「神式（神葬祭）」の香典袋の表書きとして正しいものはどれか。', choices:['御霊前・御玉串料・御神前', '御香典・御香料', '御花料・御礼', '御仏前・御冥福'], answer:0, explanation:'神式の不祝儀袋の表書きは「御霊前（ごれいぜん）」「御玉串料（おたまぐしりょう）」「御神前（ごしんぜん）」「御榊料（おさかきりょう）」が適切。「御仏前・御香典・御冥福」は仏教用語のため神式では不適切。'},
{chapter:10, type:'4', text:'「キリスト教式」の葬儀の香典（供花料）袋の表書きとして正しいものはどれか。', choices:['御霊前・御仏前', '御花料（おはなりょう）・御ミサ料（カトリック）', '御香典・御香料', '御玉串料'], answer:1, explanation:'キリスト教式は「御花料」（一般的）またはカトリックでは「御ミサ料」。「御霊前」もプロテスタントでは使わないとされることが多い（「霊は神のもとへ帰った」という観念から）。不祝儀袋は白無地や十字架の入ったものが適切。'},
{chapter:10, type:'4', text:'「会葬礼状」に書いてはいけない内容として正しいものはどれか。', choices:['喪主の氏名', '故人の戒名', '死因の詳細（病名・経緯）', '葬儀を行った年月日'], answer:2, explanation:'会葬礼状（参列への礼状）には原則として死因の詳細（病名・具体的な経緯）を記載しない。遺族のプライバシー保護と故人の尊厳を守るためのマナー。「病気療養中のところ」「急逝いたしました」などの表現にとどめる。'},
{chapter:10, type:'4', text:'「喪中はがき（年賀欠礼状）」を出す親族の範囲として一般的に正しいものはどれか。', choices:['全ての親族（親等を問わない）', '一般的には2親等以内（配偶者・子・親・兄弟姉妹・祖父母）までが目安', '1親等のみ（配偶者・子・親）', '喪中はがきの範囲に関する厳格なルールはなく個人の判断による'], answer:3, explanation:'喪中はがきの範囲に法的・宗教的な厳格なルールはない。一般的には「2親等以内」が目安とされることが多いが、実際は個人・家族の判断による。親しかった関係（義理の祖父母・叔父叔母等）でも出す場合がある。'},
{chapter:10, type:'4', text:'「弔問」に伺う時間帯として最も適切なものはどれか。', choices:['通夜・葬儀の時間外にいつでも伺う', '基本的には通夜・告別式の時間に参列するか、それが難しい場合は事前に連絡して遺族の都合を確認してから伺う', '深夜でも構わない（早く弔問する方が礼儀）', '訃報を知った瞬間にすぐ駆けつける'], answer:1, explanation:'弔問のマナー：①できるだけ通夜・告別式に参列するのが基本②式以外で伺う場合は事前に電話連絡をして遺族の都合を確認する③遺族は疲弊しているため突然の訪問は避ける④深夜の弔問は絶対に避ける。'},
{chapter:10, type:'4', text:'「一周忌（いっしゅうき）」の正確な意味として正しいものはどれか。', choices:['死後1年目（満1年の命日）', '死後13ヶ月目', '死後1年を過ぎた最初のお盆', '死後2年目'], answer:0, explanation:'一周忌は「死後満1年目の命日（またはその前後に行う法要）」。「一回忌」ともいうが「一回忌=葬儀」「一周忌=満1年」と区別されることもある。一周忌までは「喪中」とする考え方が一般的。'},
{chapter:10, type:'4', text:'「三回忌（さんかいき）」は死後何年目の法要か。', choices:['死後3年目（満3年）', '死後2年目（満2年）', '死後4年目', '死後5年目'], answer:1, explanation:'日本の年忌法要の数え方は「満年数+1」。一周忌（満1年）→三回忌（満2年）→七回忌（満6年）→十三回忌（満12年）→…。「三回忌」は「3回目の命日の法要」ではなく「満2年」（命日を1回目と数えるため）。'},
{chapter:10, type:'4', text:'「年忌法要（年回法要）」の中で「弔い上げ」として最も一般的なものはどれか。', choices:['七回忌（満6年）', '十七回忌（満16年）', '三十三回忌（満32年）', '百回忌（満99年）'], answer:2, explanation:'「弔い上げ（とむらいあげ）」は個人としての年忌法要を終了すること。最も一般的なのは三十三回忌（満32年）。一部では五十回忌（満49年）を弔い上げとする地域もある。以降は先祖供養として合同で行う。'},
{chapter:10, type:'4', text:'「法要（ほうよう）」の際の服装について、三回忌以降の目安として正しいものはどれか。', choices:['三回忌以降も喪服（黒の礼服）着用が必須', '三回忌以降は平服（地味な普段着）でよいとされることが多いが、事前に施主の意向を確認する', '三回忌以降は法要に参列しなくてよい', '三回忌以降は僧侶のみ参列すればよい'], answer:1, explanation:'法要の服装の目安：一周忌まで→喪服。三回忌以降→平服（地味な色の普段着）でもよいとされるが、地域・家族・宗派の慣習によって異なる。事前に施主・喪主の意向を確認するのがマナー。'},
{chapter:10, type:'4', text:'「御霊屋（みたまや）または後飾り（あとかざり）」の一般的な撤去タイミングはいつか。', choices:['葬儀翌日に撤去する', '四十九日法要を終えた後（忌明け後）に撤去する', '一周忌を終えた後に撤去する', '撤去するタイミングに決まりはない'], answer:1, explanation:'後飾り（葬儀後に自宅に設置する仮祭壇）は四十九日法要を終えた忌明け後に撤去するのが一般的。それまでは線香・ローソクを灯して故人を供養する。撤去の際は丁寧に処分し感謝の気持ちを持って行う。'},
{chapter:10, type:'4', text:'「法要の案内状」を送るタイミングとして正しいものはどれか。', choices:['法要の3日前までに送る', '法要の1〜2ヶ月前に案内状を送り出席の可否を確認する', '当日に口頭で案内する', '訃報と同時に法要の日程も通知する'], answer:1, explanation:'法要（特に一周忌・三回忌等の年忌法要）の案内状は1〜2ヶ月前に送り、出席の可否を確認するのが一般的なマナー。特に遠方から来る参列者がいる場合は余裕を持って案内する。'},
{chapter:10, type:'4', text:'「お斎（おとき）」の説明として正しいものはどれか。', choices:['法要の前に行う準備儀式', '法要後に参列者で食事を共にする会食', '精進料理の別称', '葬儀告別式後の精進落とし専用の言葉'], answer:1, explanation:'お斎（おとき）は法要・葬儀後に参列者が食事をともにする会食。仏式の伝統的な言い方で「お斎を設けました」「粗飯（そはん）ですがご用意しました」などの表現で使われる。'},
{chapter:10, type:'ox', text:'「四十九日法要」は命日から数えて必ず49日目に行わなければならない。', answer:1, explanation:'誤り。四十九日法要は「49日目以前の直前の土日祝」に行うのが一般的な慣習（仏事は「先延ばしをしない」という考えから、49日目より後に行うのは避ける）。ただし法律的な期限の定めはない。'},
{chapter:10, type:'4', text:'「精進落とし」の席での喪主の挨拶内容として最も適切なものはどれか。', choices:['会社の業績報告や近況報告', '参列への感謝・故人の生前の交誼への感謝・今後も変わらぬお付き合いへのお願い', '故人の死因の詳細説明', '相続問題について参列者への説明'], answer:1, explanation:'精進落としでの喪主挨拶の内容：①参列・お手伝いへの感謝②故人の生前中のご厚誼への謝辞③今後も変わらぬ付き合いへのお願い④粗餐（食事の謙遜）への案内。時間は1〜3分程度が目安。'},
{chapter:10, type:'4', text:'「通夜振る舞い（つやぶるまい）」の目的と適切な過ごし方として正しいものはどれか。', choices:['故人を偲び参列者が飲食しながら生前のエピソードを語り合う場', '親族のみが参加する故人への報告会', '葬儀費用の精算を行う場', '翌日の葬儀の打ち合わせの場'], answer:0, explanation:'通夜振る舞いは通夜参列者（特に一般会葬者）への感謝を表し、故人の生前の思い出を語り合う場。一般的に30分〜1時間程度。喪主・遺族は全ての席をまわりお酌・挨拶をするのがマナー。'},
{chapter:10, type:'4', text:'「焼香（しょうこう）」の作法として正しいものはどれか。', choices:['焼香の回数は宗派によって異なり、1回・2回・3回のいずれかが宗派ごとに定められている', 'すべての宗派で1回', 'すべての宗派で3回', '焼香の回数は個人の自由'], answer:0, explanation:'焼香回数は宗派によって異なる：浄土真宗（本願寺派）1回、浄土真宗（大谷派）2回、浄土宗2回、曹洞宗2回（押しいただくのは1回目のみ）、臨済宗1回、真言宗3回、天台宗3回等。参列者は宗派にかかわらず1〜3回が許容される。'},
{chapter:10, type:'4', text:'「焼香」の際に「抹香（まっこう）を押しいただく」とはどういう動作か。', choices:['抹香を焼香台の上に落とす前に額の高さまで持ち上げてから静かに落とす', '抹香を強く押しつけて火種に押し付ける', '抹香を両手でこすり合わせて粉にする', '抹香の香りをかいでから鼻の前で止める'], answer:0, explanation:'「押しいただく（おしいただく）」は抹香をつまんで額の高さまで持ち上げ敬意を示してから香炉に入れる動作。宗派によっては「押しいただかずに（そのままつまんで）落とす」場合もある。'},
{chapter:10, type:'4', text:'葬儀・通夜への参列の際の「携帯電話（スマートフォン）」のマナーとして正しいものはどれか。', choices:['式中もメールの確認程度なら問題ない', '式場に入る前にマナーモード（サイレント）または電源オフにし式中は使用しない', '緊急の場合は式中でも通話してよい', '撮影禁止の規定がなければ写真撮影は自由'], answer:1, explanation:'葬儀・通夜の式中は携帯電話はサイレントモード（バイブも含め音が出ない状態）または電源オフが基本マナー。着信・通話は式の厳粛な雰囲気を著しく損なう。写真撮影は原則として遺族・葬儀社の許可を得てから。'},
{chapter:10, type:'4', text:'「数珠（じゅず）」を神式・キリスト教式の葬儀に持参することは適切か。', choices:['宗教にかかわらず持参した方が礼儀正しい', '神式・キリスト教式の葬儀では数珠は使用しないため持参しない（または使用しない）', '数珠は常に持参するのが日本の一般的なマナー', 'キリスト教式のみ持参してよい'], answer:1, explanation:'数珠は仏教の法具。神式・キリスト教式の葬儀では使用しない。誤って持参した場合でも式中は取り出さない。宗教に合わせた参列姿勢を心がけることが大切。'},
{chapter:10, type:'4', text:'「弔問（ちょうもん）」の際に持参するものとして最も適切でないものはどれか。', choices:['不祝儀袋（香典）', '供花または供物', 'お祝いの品（記念品）', '線香やろうそく'], answer:2, explanation:'弔問の際に「お祝いの品」を持参することは全く不適切。弔問では不祝儀袋（香典）・供花・供物・線香・ろうそくなどが一般的。手ぶらで伺うことも許容されるが、何らかの弔意の品を持参するのが一般的マナー。'},
{chapter:10, type:'4', text:'「告別式」でのスピーチ（弔辞）の長さとして適切なものはどれか。', choices:['5〜10分程度が最低限', '3〜5分程度（長くても5分以内）が適切', '時間制限はなく思いを十分に述べてよい', '1分以内に収めることが礼儀'], answer:1, explanation:'弔辞の適切な長さは3〜5分程度（原稿用紙2〜4枚程度）が目安。式全体の時間と他の弔辞人数を考慮する必要があり、一般に5分を超えると長すぎるとされる。故人への追悼の言葉を簡潔にまとめる。'},
{chapter:10, type:'4', text:'「参列者が遺族に伝えるべきでない言葉」として最も不適切なものはどれか。', choices:['「どうぞご自愛ください」', '「心よりお悔やみ申し上げます」', '「天国で楽しくやっているよ（きっと大丈夫）」という軽い言葉', '「謹んでご冥福をお祈りいたします」'], answer:2, explanation:'「天国で楽しくやっている」等の根拠のない楽観的な言葉は遺族の悲しみを軽視し逆効果になりがち。「辛そうですね」などの共感や「何かあれば声をかけてください」という具体的サポートの申し出が適切。'},
{chapter:10, type:'4', text:'「葬儀後の挨拶回り（後日弔問）」のマナーとして正しいものはどれか。', choices:['葬儀後すぐに伺うのが礼儀', '葬儀から四十九日法要の間（初七日後から四十九日前頃）を目安に事前連絡して伺う', '一周忌を過ぎてからでも問題ない', '後日弔問は必要なく葬儀に参列できなかった場合は手紙のみで十分'], answer:1, explanation:'葬儀に参列できなかった場合の後日弔問は、葬儀直後は遺族が多忙・疲弊しているため、初七日〜四十九日の間に事前連絡してから伺うのが一般的なマナー。長居しないこと（15〜30分程度）も心がける。'},
{chapter:10, type:'4', text:'「喪服」の「正喪服・準喪服・略喪服」の違いとして正しいものはどれか。', choices:['費用の高低による分類', 'フォーマル度の度合いによる分類で、参列の立場・場面によって使い分ける', '色の違い（黒・グレー・白）による分類', '性別による分類'], answer:1, explanation:'喪服のフォーマル度：①正喪服（最高格：喪主・近親者が通夜・葬儀で着用）②準喪服（一般的な黒喪服：参列者が使用、最も広く使われる）③略喪服（準喪服より格下：急な弔問・三回忌以降）の3段階に分類される。'},
{chapter:10, type:'4', text:'「真珠（パール）」のアクセサリーが弔事に適切とされる理由として正しいものはどれか。', choices:['真珠は最も高価な宝石だから', '「涙の象徴」「悲しみを表す」とされ白や黒の色が弔事の場に合う上品な装飾として認められているため', '真珠は天然素材であるため', '真珠は冠婚葬祭全てに使えるアクセサリーだから'], answer:1, explanation:'真珠は「涙を象徴する宝石」とされ、白・黒・グレー系の真珠は弔事のアクセサリーとして認められている。ただし3連以上のネックレスは「涙が重なる（不幸が重なる）」として不適切。1連が基本。'},
{chapter:10, type:'4', text:'「社葬（しゃそう）」の定義として正しいものはどれか。', choices:['従業員が亡くなった場合に会社が費用を出す葬儀全般', '会社（法人）として費用・運営を行う公式の葬儀で、主に創業者・役員・社会的功績者等が対象', '社員が自費で行う葬儀', '株主総会で承認された葬儀'], answer:1, explanation:'社葬とは会社が主体となって費用を負担・運営する公式の葬儀。対象は創業者・社長・会長・役員等の会社に多大な貢献をした人物や、業務上の死亡災害による社員等。'},
{chapter:10, type:'4', text:'「社葬費用」の税務上の取り扱いとして正しいものはどれか。', choices:['社葬費用は全額個人（遺族）の所得税から控除できる', '社葬費用は会社の損金（経費）として計上できる', '社葬費用は全額消費税が非課税', '社葬費用は経費にならず全額役員報酬として課税される'], answer:1, explanation:'社葬費用（式場費・礼品費・食事費等の葬儀に直接かかる費用）は会社の損金（法人税法上の経費）として計上可能。ただし一部は損金算入できないものもあり税理士への確認が必要。'},
{chapter:10, type:'4', text:'「香典（こうでん）」を会社として送る際の表書きの名義として適切なものはどれか。', choices:['社長の個人名のみ', '会社名と代表者名（例：○○株式会社 代表取締役 ○○）', '従業員全員の名前を列記する', '「会社一同」の表書きは不適切でやめるべき'], answer:1, explanation:'会社として香典を送る場合は「○○株式会社 代表取締役 ○○」のように会社名と代表者名を記載するのが一般的。部署単位の場合は「○○株式会社 ○○部一同」のように部署名を記す。'},
{chapter:10, type:'4', text:'「弔電（ちょうでん）」をNTTから送る場合の一般的な送り先として正しいものはどれか。', choices:['故人の自宅', '葬儀・告別式を行う式場（葬儀社の名称・住所・喪主名宛て）', 'お寺・神社', '役所'], answer:1, explanation:'弔電の送り先は「葬儀・告別式が行われる式場宛て」が一般的（喪主名宛て）。自宅に送ると遺族が式場に持参する手間が生じる。電報サービス（NTT・民間各社）から式場名・住所・喪主名（○○家）で送る。'},
{chapter:10, type:'4', text:'「社員が業務外で亡くなった場合」に会社が通常行う対応として一般的なものはどれか。', choices:['会社として特に何もしなくてよい', '弔電・弔意の連絡・香典（会社または部署として）・葬儀への代表者参列等の対応を行う', '社員全員を葬儀に強制参列させる', '社員の給料から香典費用を天引きする'], answer:1, explanation:'社員の業務外死亡への会社対応：弔電送付・代表者または上司の参列・会社または部署としての香典・必要に応じた慶弔規程に基づく弔慰金支給等。各社の「慶弔規程」に従った対応が基本。'},
{chapter:10, type:'4', text:'「慶弔見舞金規程（けいちょうみまいきんきてい）」で定めることが一般的な内容として正しいものはどれか。', choices:['健康保険・年金の手続き方法', '社員・役員等の死亡・入院・結婚・出産等の際に会社が支給する弔慰金・見舞金の金額・対象・手続き', '会社の葬儀業者との契約条件', '株主総会の招集手続き'], answer:1, explanation:'慶弔見舞金規程（慶弔規程）は就業規則の一部として、社員・役員・その家族の死亡・傷病・結婚・出産等の際に会社が支給する金品の種類・金額・支給条件・申請手続き等を規定する。'},
{chapter:10, type:'4', text:'「忌引き休暇（きびききゅうか）」の法的位置付けとして正しいものはどれか。', choices:['労働基準法で日数・対象が法定されている', '法律での義務規定はなく各社の就業規則・慣行で定められる', '忌引き休暇は有給休暇として計上しなければならない', '法定休暇のため取得を拒否することは違法'], answer:1, explanation:'忌引き休暇（服喪休暇）は労働基準法に明文規定がなく法定外休暇。各社が就業規則・慣行で日数（通常は続柄ごとに異なる）・給与の取り扱い（有給・無給）を独自に定める。'},
{chapter:10, type:'4', text:'「葬儀費用明細」を遺族に提出する際の葬祭業者の配慮として正しいものはどれか。', choices:['明細は詳細を省いて合計金額のみ伝える', '項目ごとの内訳を明記し不明な費用がないよう説明する', '明細は法律で交付義務がないため遺族から求められた場合のみ提出する', '見積り額より高くなった場合のみ明細を提出する'], answer:1, explanation:'葬儀費用の明細は項目別に明記して遺族に交付するのが適切な業者対応。後のトラブル防止・信頼関係構築のため「追加費用が発生した場合の事前説明義務」も重要。'},
{chapter:10, type:'4', text:'「神式の葬儀」での礼の回数として正しいものはどれか（玉串奉奠後）。', choices:['一礼のみ', '二礼・二拍手（忍び手）・一礼', '三礼三拍手', '三礼二拍手一礼'], answer:1, explanation:'神式の玉串奉奠後は「二礼・二拍手（しのびで、音を立てない）・一礼」が正式。通常の神社参拝は「二礼二拍手一礼」で拍手を鳴らすが、葬儀では「忍び手（しのびで）」で静かに行う。'},
{chapter:10, type:'4', text:'「仏式の焼香」と「神式の玉串奉奠」の最大の違いとして正しいものはどれか。', choices:['礼の回数のみが異なる', '焼香は抹香を火に落とす行為・玉串奉奠は榊の枝（玉串）を祭壇に捧げる行為という形式の根本的な違いがある', 'どちらも同じ意味を持つ', '費用が異なるだけ'], answer:1, explanation:'焼香は仏教の作法で抹香（香木の粉）を香炉に入れて薫香を立てる。玉串奉奠は神道の作法で榊（さかき）の枝（玉串）を神前に捧げる。形式・宗教的意味が根本的に異なる。'},
{chapter:10, type:'4', text:'「キリスト教（カトリック）」の葬儀で「献花」の花として最も適切なものはどれか。', choices:['菊の花（黄色・白）', '白い百合・カーネーション等の白い花', '赤いバラ', '木の葉・草'], answer:1, explanation:'キリスト教式の葬儀では仏式の焼香の代わりに「献花」を行う。花は白い百合（復活・純潔の象徴）・白いカーネーション・白い菊等が一般的。カトリックでは特に白百合がキリストとマリアの象徴として好まれる。'},
{chapter:10, type:'4', text:'「イスラム教」の葬儀で最も重要なとされる事項として正しいものはどれか。', choices:['豪華な棺と大規模な葬儀を行う', '可能な限り速やかに（死後24時間以内が目安）土葬することが基本', '火葬が義務付けられている', '喪の期間は1年間とされる'], answer:1, explanation:'イスラム教（ムスリム）の葬儀：①できるだけ速やかに土葬（24時間以内が理想）②遺体はキブラ（メッカ）の方向を向けて埋葬③火葬は禁止④遺体を白い布（屍衣）で包む⑤質素な葬儀を基本とする。'},
{chapter:10, type:'4', text:'「ユダヤ教」の葬儀の特徴として正しいものはどれか。', choices:['火葬が義務付けられている', '亡くなってからできるだけ早く（24時間以内が理想）、装飾のないシンプルな木の棺で土葬する', '豪華な儀式と大規模な参列者が慣習', '喪の期間は3日間とされる'], answer:1, explanation:'ユダヤ教の葬儀：①速やかな土葬（24時間以内が理想、シャバット・祝日は翌日）②装飾のないシンプルな木棺（「塵に帰す」という理念から自然に分解される素材）③喪の期間：シヴァ（7日間）→シェロシム（30日間）④火葬は伝統的に禁止（改革派では認める場合も）'},
{chapter:10, type:'4', text:'「神前結婚式」が普及したのはいつ頃か（参考：冠婚葬祭の知識）。', choices:['江戸時代中期', '明治33年（1900年）の皇太子御婚儀（後の大正天皇）をモデルに一般化', '昭和30年代の高度経済成長期', '平成元年以降'], answer:1, explanation:'神前結婚式は明治33年（1900年）の皇太子御婚儀を一般向けにアレンジした形式が帝国ホテルで行われたことをきっかけに普及した。それ以前は家庭内での式が一般的だった。'},
{chapter:10, type:'4', text:'「神前式・仏前式・教会式・人前式」の4つの結婚式形式のうち「人前式（じんぜんしき）」の特徴として正しいものはどれか。', choices:['神式の略式版', '参列者（人）全員を証人として二人が誓いを立てる無宗教の結婚式', '佛式と神式を組み合わせた形式', '市役所の職員が立ち会い行政的に行う式'], answer:1, explanation:'人前式は特定の宗教儀礼を行わず参列者（人）全員の前で誓いを立てる結婚式。式の内容・会場・進行を自由に設計できる。宗教的制約がなく多様な価値観に対応できることから近年増加している。'},
{chapter:10, type:'4', text:'「グリーフ（grief）」という言葉の意味として正しいものはどれか。', choices:['病気の予後（回復の見通し）', '大切なものを失ったことによる深い悲嘆・悲しみ', '死後の世界に関する宗教的考え方', '遺体の適切な処置方法'], answer:1, explanation:'グリーフ（grief）は英語で「大切なものを失った際の深い悲嘆・悲しみ」を意味する。死別・離婚・失職・ペットの死など様々な喪失体験に伴う心理・身体・社会的反応を包括する概念。'},
{chapter:10, type:'4', text:'「アンビバレンス（ambivalence）」が遺族の悲嘆において現れる場面として正しいものはどれか。', choices:['遺族が故人の死を受け入れる最終段階', '「安らかになった（苦しみが終わった）」という安堵と「もっと一緒にいたかった」という悲しみが同時に共存する複雑な感情状態', '遺族が怒りと悲しみを交互に感じる状態', '遺産相続をめぐる家族間の対立'], answer:1, explanation:'アンビバレンス（両価感情）は相反する感情が同時に存在すること。長期の介護の後や、関係が複雑だった故人への遺族が「ほっとした気持ち」と「悲しみ・罪悪感」を同時に感じるケースはグリーフケアの現場でよく見られる。'},
{chapter:10, type:'4', text:'「傾聴（けいちょう）」の基本姿勢として正しいものはどれか。', choices:['話の問題点を素早く指摘してアドバイスを提供する', '相手の話を評価・批判せず共感的に聴き、相手が自分の気持ちを自由に表現できる環境を提供する', '沈黙を避けて積極的に話しかけ続ける', '専門的な知識を元に適切な解決策を提示する'], answer:1, explanation:'傾聴の基本：①判断・評価・批判をしない②共感的に聴く（話し手の感情を理解しようとする）③沈黙も大切にする④アドバイスより「聴くこと」を優先する⑤相手のペースに合わせる。これは遺族対応にも重要なスキル。'},
{chapter:10, type:'4', text:'「初めて葬祭ディレクターとして遺族に対応する際」の最初に心がけるべきことはどれか。', choices:['葬儀の費用見積りをすぐに提示して安心してもらう', '遺族の混乱・悲嘆の状態を把握し急かさず温かく寄り添いながら必要な情報を丁寧に収集する', '故人の写真や遺品を素早く確認して効率よく準備を進める', '遺族全員を集めて一度に全ての説明をする'], answer:1, explanation:'初回対応で最重要なのは遺族の心身の状態への配慮。突然の死別で混乱・悲嘆の中にいる遺族を急かさず、共感的な態度で寄り添いながら、必要な情報（故人の情報・葬儀の希望）を丁寧に収集する。'},
{chapter:10, type:'4', text:'「葬祭ディレクターの守秘義務」について正しいものはどれか。', choices:['守秘義務は医師・弁護士等のみに適用されるため葬祭ディレクターには関係ない', '業務で知り得た遺族・故人の個人情報・プライバシーは目的外で第三者に漏らしてはならない', '遺族から直接同意を得た場合のみ情報を扱ってよい', '守秘義務は葬儀当日のみ適用される'], answer:1, explanation:'葬祭ディレクターは業務上、死因・家族関係・財産状況・宗教・個人情報等のセンシティブな情報を多く取り扱う。個人情報保護法・職業倫理・信義則に基づき守秘義務が課される。'},
{chapter:10, type:'4', text:'「死亡診断書」と「死体検案書」の違いとして正しいものはどれか。', choices:['死亡診断書は家族が書き、死体検案書は医師が書く', '死亡診断書は診察していた医師が書き、死体検案書は診察していなかった医師が死体を検案した後に書く', '両者は全く同じ書類で呼称が異なるだけ', '死亡診断書は死亡確認後24時間以内、死体検案書は48時間以内に作成'], answer:1, explanation:'死亡診断書：最後に診察した医師が作成（診察後24時間以内の死亡・または同じ疾患による死亡）。死体検案書：診察していた医師以外の医師、または診察後24時間以降の死亡等で医師が死体を検案（確認）して作成。書式は同じ。'},
{chapter:10, type:'4', text:'「検視（けんし）」が行われるケースとして正しいものはどれか。', choices:['すべての死亡者に対して行われる', '死因が不明・事故死・自殺・他殺の疑いがある死亡の場合に警察・検察が遺体の状況を調査する', '医師が行う死亡確認の別称', '葬儀後に行政が行う書類審査'], answer:1, explanation:'検視（けんし）は刑事訴訟法第229条に基づき変死体・変死の疑いのある死体の死因・状況を警察・検察官が調査する手続き。司法解剖（犯罪の疑い）や行政解剖（死因不明）につながる場合もある。'},
{chapter:10, type:'4', text:'「遺言書（いごんしょ・ゆいごんしょ）」の種類で「公正証書遺言（こうせいしょうしょいごん）」の特徴として正しいものはどれか。', choices:['自書でよく証人が不要', '公証人が作成し原本が公証役場に保管されるため最も確実性が高い', '家庭裁判所での検認が必要', 'パソコンで作成してもよい'], answer:1, explanation:'公正証書遺言は公証人が作成し公証役場に原本が保管されるため紛失・偽造リスクがない。証人2名が立ち会い必要。家庭裁判所での検認不要。最も安全・確実な遺言方式だが費用がかかる。'},
{chapter:10, type:'4', text:'「遺産分割協議書（いさんぶんかつきょうぎしょ）」について正しいものはどれか。', choices:['家庭裁判所のみで作成できる', '法定相続人全員の合意と署名・実印が必要で相続財産の分割方法を定める文書', '葬儀社が作成を代行できる', '公証人の認証が必ず必要'], answer:1, explanation:'遺産分割協議書は法定相続人全員が参加した遺産分割協議の結果をまとめた書類。全相続人の署名・実印（印鑑証明書添付）が必要。家庭裁判所への提出は不要だが、不動産の名義変更・金融機関の手続きに必要。'},
{chapter:10, type:'4', text:'「相続放棄（そうぞくほうき）」の申述期限として正しいものはどれか。', choices:['被相続人の死亡から6ヶ月以内', '相続の開始を知った時から3ヶ月以内', '被相続人の死亡から1年以内', '特に期限はない'], answer:1, explanation:'相続放棄は「自己のために相続の開始があったことを知った時（通常は死亡を知った日）から3ヶ月以内」に家庭裁判所に申述する必要がある（民法第915条）。期限を過ぎると単純承認したとみなされる場合がある。'},
{chapter:10, type:'4', text:'「限定承認（げんていしょうにん）」について正しいものはどれか。', choices:['相続財産の中で特定のものだけを相続すること', '相続によって得た財産の限度においてのみ被相続人の債務を弁済する承認方法（相続人全員が共同で申述）', '未成年者のみが使える相続方法', '借金だけを相続する方法'], answer:1, explanation:'限定承認は「相続で得たプラスの財産の範囲でのみマイナス（借金等）を引き継ぐ」方法。相続人全員が共同で家庭裁判所に申述が必要。手続きが複雑なため実際の利用は少ない。'},
{chapter:10, type:'4', text:'「遺族年金（いぞくねんきん）」の受給権を持つ配偶者の条件として正しいものはどれか（厚生年金の遺族厚生年金）。', choices:['被相続人の死亡時に婚姻関係があれば所得・子の有無に関わらず受給できる', '妻の場合は年齢・所得要件あり、夫の場合は55歳以上などの要件がある', '遺族年金は廃止されており現在は受給できない', '子供がいる場合のみ受給できる'], answer:1, explanation:'遺族厚生年金の配偶者への支給：妻の場合は原則年齢制限なし（ただし子のいない30歳未満は5年のみ）。夫の場合は死亡時55歳以上が要件（60歳から支給）。所得制限あり（年収850万円未満等）。'},
{chapter:10, type:'4', text:'「死亡保険金（生命保険）」の相続税における取り扱いとして正しいものはどれか。', choices:['死亡保険金は全額非課税', '「500万円×法定相続人の数」の非課税限度額がある', '死亡保険金は相続財産に含まれないため相続税はかからない', '死亡保険金は所得税のみ課税される'], answer:1, explanation:'死亡保険金の非課税枠：「500万円×法定相続人の数」。この非課税枠を超えた部分が相続税の課税対象となる「みなし相続財産」。受取人が相続人でない場合は非課税枠が適用されない場合もある。'},
{chapter:10, type:'4', text:'「葬儀費用の立替払い」の問題が生じた場合、遺産分割前に相続預金から一部を単独で引き出せる制度として2019年以降正しいものはどれか。', choices:['遺族は銀行口座を凍結前に全額引き出せる', '仮払い制度（家庭裁判所の審判を経ずに標準的相続分の3分の1または150万円を上限として引き出せる）', '葬儀社が直接被相続人の口座から費用を引き落とせる', '2019年より相続預金の引き出しは全て禁止された'], answer:1, explanation:'2019年の民法改正で相続預金の仮払い制度が創設：各法定相続人は家庭裁判所の判断を経ずに「相続開始時の預貯金額×3分の1×当該相続人の法定相続分」または「150万円のいずれか少ない額」を単独で引き出せる（民法909条の2）。'},
{chapter:10, type:'4', text:'「エンディングノート」と「遺言書（遺言）」の法的効力の違いとして正しいものはどれか。', choices:['エンディングノートも公証役場で認証を受ければ遺言書と同等の効力を持つ', 'エンディングノートは法的拘束力がないが遺言書（民法に従った形式の）は法的拘束力を持つ', '遺言書もエンディングノートも法的効力はなく道義的な意味しかない', 'エンディングノートの方が遺言書より新しい法律で認められた効力が強い'], answer:1, explanation:'エンディングノートは法的拘束力がない覚書。遺言書は民法で定められた形式（自筆証書・公正証書・秘密証書）を守れば法的拘束力を持ち、遺族はその内容に法的に従う義務が生じる。'},
{chapter:10, type:'4', text:'「葬儀の打ち合わせ（事前相談・当日相談）」で葬祭ディレクターが必ず確認すべき最優先事項として正しいものはどれか。', choices:['葬儀費用の予算', '宗旨・宗派・故人の希望・家族構成', '葬儀社の利益率', '参列人数の上限'], answer:1, explanation:'打ち合わせで最優先で確認すべき内容：①宗旨・宗派（仏式・神式・無宗教等）②菩提寺（ぼだいじ）の有無と連絡③故人の意向・家族の希望④家族構成・喪主の確認。これらなしに式の方向性は決められない。'},
{chapter:10, type:'4', text:'「会葬御礼品（かいそうおれいひん）」と「香典返し」の違いとして正しいものはどれか。', choices:['金額に違いはなく同じもの', '会葬御礼品は当日参列者全員に渡す少額の品、香典返しは香典をいただいた方への後日（または当日）のお返し', '会葬御礼品は近親者のみ、香典返しは全参列者', '会葬御礼品は不要で香典返しのみが正式マナー'], answer:1, explanation:'会葬御礼品（当日礼品）は葬儀当日に参列者全員に渡す少額の品（お茶・ハンカチ等）。香典返しは香典（不祝儀）をいただいた方への個別のお返しで金額は香典の3分の1〜半額程度が目安。'},
{chapter:10, type:'4', text:'「葬儀の事前相談（プレアレンジ）」の利点として最も適切なものはどれか。', choices:['費用が必ず安くなる', '実際に葬儀が必要になった際に慌てず故人・家族の希望に沿った葬儀を行いやすい', '法律で義務付けられている', '葬儀社が一方的に決めた内容を確認するだけ'], answer:1, explanation:'事前相談のメリット：①いざという時に慌てない②故人の意向（葬儀の形式・規模等）を生前に確認できる③費用の概算を把握できる④複数社比較検討が可能⑤適切な葬儀を選択できる。費用が必ずしも安くなるわけではない。'},
{chapter:10, type:'4', text:'「互助会（こじょかい）」の特徴として正しいものはどれか。', choices:['加入した翌日から全てのサービスが無償で受けられる', '毎月一定額を積立て将来の冠婚葬祭費用に充当する前払式の会員制度', '解約は一切できない', '銀行の積み立て預金と同じ仕組み'], answer:1, explanation:'互助会は月数千円程度を積み立て満期時（または任意のタイミング）にその積立額を冠婚葬祭費用に充当できる前払式の制度。解約時は経済産業省規定の計算式による返戻金がある（全額は戻らない場合が多い）。'},
{chapter:10, type:'4', text:'「葬儀サービスのクーリングオフ」について正しいものはどれか。', choices:['葬儀サービス全般にクーリングオフが適用される（8日間）', '互助会（前払式特定取引）への新規申込はクーリングオフ可（20日間）だが、葬儀サービス本体の契約は異なる規定がある', 'クーリングオフは消費者に適用されず事業者間のみ', '葬儀は死亡後すぐに始まるためクーリングオフは現実的に不可能'], answer:1, explanation:'互助会（前払式特定取引）の新規申込にはクーリングオフ20日間が適用（特定商取引法）。ただし葬儀サービス本体（実際の葬儀契約）はクーリングオフ対象にならない場合が多い（既に役務が完了しているケース等）。'},
{chapter:10, type:'4', text:'「葬祭ディレクター技能審査」の1級と2級の主な違いとして正しいものはどれか。', choices:['1級は実技試験がなく筆記のみ', '1級は実技試験・筆記試験ともに高度な内容で葬祭業での実務経験年数の要件が2級より長い', '2級の方が1級より難しい', '1級と2級の内容に実質的な差はない'], answer:1, explanation:'葬祭ディレクター技能審査は1級・2級があり、1級は実務経験年数の要件（2級取得後5年以上等）が2級より長く筆記・実技の難度も高い。2級は実務経験2年以上（学歴等により変動）。'},
{chapter:10, type:'4', text:'「葬儀の打ち合わせシート（チェックリスト）」で確認する内容に含まれるべき最重要事項として正しいものはどれか。', choices:['参列者の全員の住所・連絡先', '菩提寺（ぼだいじ）の有無・連絡先・宗派・住職との関係', '故人の学歴・職歴の全詳細', '会社名・役職名の全リスト'], answer:1, explanation:'打ち合わせシートの最重要確認事項：菩提寺の有無（菩提寺がある場合は必ず連絡が必要で式の形式・日程が大きく制約される）・宗派・住職との関係（戒名のランク・費用等）。これを確認せずに進めると後のトラブルにつながる。'},
{chapter:10, type:'4', text:'「浄土真宗の門徒（もんと）」の葬儀で禁忌とされる対応はどれか。', choices:['白木の祭壇を使用すること', '「冥福をお祈りします」「成仏してください」「天国に召されました」等の他宗派的な表現を使うこと', '白い花を供えること', '線香を使わないこと'], answer:1, explanation:'浄土真宗では「冥福（冥土での幸福）」「成仏（この世で仏になること）」の概念を使わない（往生即成仏のため冥土を経由しない）。「天国」もキリスト教的概念。「お浄土に往生される」「阿弥陀仏のお計らい」等が適切な表現。'},
{chapter:10, type:'4', text:'「骨上げを行わない（または骨の一部のみ収骨する）」のが一般的な地域として正しいものはどれか。', choices:['東北地方・北海道', '関西（大阪・京都等）地方', '沖縄県', '九州南部'], answer:1, explanation:'骨上げの習慣：東日本では全骨収集（全ての骨を骨壺へ）。西日本（特に関西）では部分収集（喉仏等の一部の骨のみ収集）が一般的で残りは火葬場に委ねる。そのため骨壺のサイズも東西で異なる（東が大きい）。'},
{chapter:10, type:'4', text:'「葬儀後に遺族が行うべき手続き」として最初に行うべき緊急性の高いものはどれか。', choices:['相続税の申告（10ヶ月以内）', '健康保険・年金の資格喪失届（14日〜2ヶ月以内）', '遺産分割協議（3ヶ月以内目安）', '死亡届の提出と火葬許可証の取得（葬儀前）'], answer:3, explanation:'葬儀前最優先手続き：死亡届提出と火葬許可証の取得（死亡の事実を知ってから7日以内の義務）。火葬許可証なしに火葬できないため葬儀前の最優先事項。これ以降の健康保険・年金等の手続きは順次行う。'},
{chapter:10, type:'4', text:'「成年後見人（せいねんこうけんにん）が管理する財産」から葬儀費用を支出する際の問題点として正しいものはどれか。', choices:['問題なく後見人が自由に支出できる', '後見人は本人（被後見人）の生前の財産を管理するが本人死亡後は後見が終了するため原則として死後の葬儀費用を後見財産から支出できない', '後見人が喪主を務める義務がある', '成年後見人は葬儀費用の全額を個人負担しなければならない'], answer:1, explanation:'成年後見は本人の死亡で当然終了（民法第653条）。後見財産は相続財産となり相続人に帰属するため後見人の権限は消滅。ただし「死後事務委任契約」を生前に結んでいれば後見人（または第三者）が葬儀等の死後事務を行える。'},
{chapter:10, type:'4', text:'「デジタル遺産（デジタル遺品）」の処理で葬祭業者が遺族にアドバイスすべき内容として正しいものはどれか。', choices:['故人のSNSアカウントはすぐに削除する', 'パスワードの確認・各サービスへの解約届出・データのバックアップ等を整理する必要があり、生前のエンディングノートへの記載を勧める', 'デジタル遺産は業者が代行処理できる', '法律によりデジタル遺産は全て国庫に帰属する'], answer:1, explanation:'デジタル遺産（SNSアカウント・クラウドデータ・仮想通貨・ネット銀行等）の処理は近年の重要課題。各サービスへの解約届出・データ整理が必要だが、パスワード不明の場合は困難。生前のエンディングノートへの記録が有効。'},
{chapter:10, type:'4', text:'「孤独死（孤立死）」が発生した場合の遺体発見から葬儀までの特殊な手続きとして正しいものはどれか。', choices:['家族が直ちに遺体を葬儀社に引き渡せる', '警察への通報→検視・死因究明→遺体の引き渡し→清掃業者による特殊清掃という手順が一般的', '葬儀社が直接遺体を引き取る', '保健所が全ての手続きを代行する'], answer:1, explanation:'孤独死（孤立死）の手順：①発見者が警察に通報②警察による検視・死因究明（場合により解剖）③遺体を葬儀社に引き渡し④特殊清掃（専門業者）→一般的な葬儀へ。警察の許可なく遺体を動かしてはならない。'},
{chapter:10, type:'4', text:'「葬儀の見積書」の「一式（ひとしき）」表示に関するトラブルとして正しいものはどれか。', choices:['一式表示は法律で禁止されている', '「一式」という表示で内訳が不明確なため後から追加費用が生じやすく、消費者庁や業界団体が項目別明示を推奨している', '一式表示は最もわかりやすい表示方法', '一式に含まれるものは全国統一で定められている'], answer:1, explanation:'「一式」表示は含まれる内容が不明確で後のトラブルの原因になりやすい。消費者庁・経済産業省・業界団体は「内訳（項目ごと）を明示した見積書」の交付を推奨。何が含まれ何が含まれないかを明確にする必要がある。'},
{chapter:10, type:'4', text:'「葬祭ディレクター」の仕事において最も重要な姿勢として正しいものはどれか。', choices:['自社の売上を最大化するために高価な商品を積極的に勧める', '悲嘆と混乱の中にある遺族の立場に立ち、故人を尊厳を持って送り出せるよう専門的知識と人間的温かさを持ってサポートする', '短時間で効率よく作業を完了させる', '遺族に感情移入せず常に業務的な態度を保つ'], answer:1, explanation:'葬祭ディレクターの本質的役割：①遺族の悲嘆に共感し寄り添う②故人への最後の敬意（尊厳ある送り出し）③専門的知識（宗教・法令・作法）に基づくサポート④遺族が後悔のない別れができる環境づくり。'},
{chapter:10, type:'4', text:'「女性（配偶者）が施主（喪主）を務める場合」の一般的な対応として最も適切なものはどれか。', choices:['女性は施主（喪主）になれないため長男が代行する', '女性でも喪主・施主を務めることができ、挨拶文・名義等で女性の喪主として対応する', '女性が喪主の場合は挨拶を省略する', '女性施主の場合のみ費用が半額になる'], answer:1, explanation:'喪主・施主に性別による制約はない。配偶者（妻）・長女・その他女性が喪主を務めることは一般的。葬祭ディレクターは「喪主が女性である」ことを特別視せず、名義・挨拶文等を適切に準備する。'},
{chapter:10, type:'4', text:'「故人の遺影写真」の選定で葬祭ディレクターが遺族にアドバイスすべき基本的内容として正しいものはどれか。', choices:['証明写真のみが使用可', '故人が元気だった頃の自然な笑顔の写真を選び、解像度・サイズが十分なものを選ぶ', '白黒写真のみが正式', '最近（直前）の写真を必ず使用する'], answer:1, explanation:'遺影写真の選定ポイント：①故人らしい自然な表情（特に笑顔）②解像度が高い（引き伸ばしに耐えられる）③できれば単独・背景がシンプル④故人のイメージに合う時期の写真。必ずしも最新・白黒・証明写真でなくてよい。'},
{chapter:10, type:'4', text:'「葬儀の場所（式場）の選択」で考慮すべき最も重要な点はどれか。', choices:['式場の豪華さと知名度', '遺族・参列者のアクセス・規模・菩提寺との関係・費用・故人の希望などを総合的に考慮する', '費用だけで判断する', '自社の式場を最優先に勧める'], answer:1, explanation:'式場選択の考慮点：①アクセス（参列者が来やすいか）②収容人数（参列者の規模に合っているか）③菩提寺との関係（寺院葬が望ましい場合等）④費用⑤故人・遺族の希望⑥地域の慣習。総合的な判断が必要。'},
{chapter:10, type:'4', text:'「お悔やみの言葉」として「ご冥福をお祈りします」と言ってはいけない場面として正しいものはどれか。', choices:['仏式の通夜・葬儀の場', '神式・キリスト教式の葬儀および浄土真宗の葬儀', '全ての場面で問題ない', '高齢者の葬儀のみ'], answer:1, explanation:'「ご冥福をお祈りします」の「冥福（めいふく）」は「冥土（冥界）での幸福」という仏教的概念。浄土真宗（冥土の概念がない）・神式・キリスト教式では適切でない。宗派に関わらず使える「お悔やみ申し上げます」が安全。'},
{chapter:10, type:'4', text:'「葬祭業における苦情対応（クレーム対応）」の基本として最も正しいものはどれか。', choices:['苦情を受けたら直ちに全面謝罪して返金する', 'まず遺族の気持ちを真摯に受け止め事実確認を行い、誠実に対応し再発防止策を講じる', '苦情には法律部門のみが対応する', '葬儀後の苦情は受け付けない旨を契約書に明記する'], answer:1, explanation:'葬祭業の苦情対応基本：①遺族の感情を尊重し真摯に受け止める②事実確認（何が起きたか・何が不満か）③誠実な説明と対応④適切な解決策の提示⑤再発防止策の実施⑥業界の調停機関（全葬連等）の活用。'},
{chapter:11, type:'4', text:'「グリーフ（grief）」と「ビリーブメント（bereavement）」の区別として正しいものはどれか。', choices:['全く同じ意味で区別はない', 'グリーフは「喪失に伴う悲嘆の感情・反応」を指し、ビリーブメントは「喪失そのもの（愛する人を奪われた状態）」を指す', 'グリーフは身体的反応のみ、ビリーブメントは精神的反応のみを指す', 'グリーフは生前の不安、ビリーブメントは死後の反応'], answer:1, explanation:'グリーフ（grief）：喪失に伴う感情的・心理的・身体的・社会的反応（悲嘆）。ビリーブメント（bereavement）：愛する人を失った状態・状況そのもの。モーニング（mourning）：悲嘆を社会的・文化的に表現するプロセス（喪に服すること）。'},
{chapter:11, type:'4', text:'「ウォーデン（J.W. Worden）」の「悲嘆の4つの課題（Tasks of Mourning）」として正しい組み合わせはどれか。', choices:['否認・怒り・取引・受容', '喪失の現実を受け入れる・悲嘆の苦痛を乗り越える・故人のいない世界に適応する・故人との新しい関係を見つけて先へ進む', 'ショック・悲嘆・孤独・回復', '急性悲嘆・慢性悲嘆・複雑性悲嘆・病的悲嘆'], answer:1, explanation:'ウォーデンの悲嘆の4課題：Task1「喪失の現実を受け入れる（Accept the reality of loss）」Task2「悲嘆の苦痛を乗り越える」Task3「故人のいない世界に適応する」Task4「故人との永続的な絆を維持しつつ前に進む」。段階モデルと異なり「達成すべき課題」として提示。'},
{chapter:11, type:'4', text:'「キューブラー・ロス（E. Kübler-Ross）」が提唱した「死の受容の5段階」の正しい順序はどれか。', choices:['否認→怒り→取引→抑うつ→受容', '受容→否認→怒り→取引→抑うつ', '怒り→否認→取引→抑うつ→受容', '抑うつ→怒り→否認→取引→受容'], answer:0, explanation:'キューブラー・ロスの死の受容5段階（1969年「死ぬ瞬間」より）：①否認（Denial）②怒り（Anger）③取引（Bargaining）④抑うつ（Depression）⑤受容（Acceptance）。ただし全ての人がこの順序を経るわけではなく現在では段階の固定性を否定する批判も多い。'},
{chapter:11, type:'4', text:'「リンデマン（E. Lindemann）」が1944年に発表したグリーフ研究の特徴として正しいものはどれか。', choices:['老年期の悲嘆のみを対象とした研究', 'ボストンのココナッツグローブ火災犠牲者遺族の悲嘆を研究し「急性悲嘆の症状と管理」を発表、グリーフカウンセリングの基礎を築いた', '子供の悲嘆のみを研究した', 'グリーフを病気として分類した最初の研究'], answer:1, explanation:'リンデマン（1944年）はボストン・ココナッツグローブ火災（1942年）の生存者・遺族を研究し「急性悲嘆の症状（躯体的な苦痛・故人へのとらわれ・罪悪感・敵意・機能喪失）」を記述。グリーフワーク（悲嘆作業）という概念を確立した先駆的研究。'},
{chapter:11, type:'4', text:'「継続する絆理論（Continuing Bonds Theory）」の説明として正しいものはどれか。', choices:['故人との絆を断ち切ることが健全な悲嘆の解決', 'キャシー・ワーデンが提唱した段階モデルの改訂版', 'クラス・ら（Klass, Silverman, Nickman）が提唱した理論で、故人との精神的絆を維持しつつ生活に適応することが健全な悲嘆と主張する', '故人の思い出を全て消去することが回復への道'], answer:1, explanation:'継続する絆理論（1996年）：クラス・シルバーマン・ニックマンが提唱。従来の「故人との絆を断ち切って前に進む」という理論を否定し「故人との絆を形を変えながら維持し続けることが適応的な悲嘆プロセス」と主張。'},
{chapter:11, type:'4', text:'「複雑性悲嘆（Complicated Grief / Prolonged Grief Disorder）」の特徴として正しいものはどれか。', choices:['誰もが経験する通常の悲嘆プロセスの一部', '強い分離苦痛・故人への強いとらわれが6〜12ヶ月以上継続し生活機能が著しく障害される持続性の悲嘆障害', '泣くことができない感情麻痺の状態', '愛着の問題で親と子の間にのみ生じる'], answer:1, explanation:'複雑性悲嘆（DSM-5では「持続性複雑死別障害」、ICD-11では「遷延性悲嘆障害」）：分離苦痛（故人への強いとらわれ・渇望）が6〜12ヶ月以上持続し、社会・職業機能が著しく障害される状態。通常の悲嘆と区別して専門的支援が必要。'},
{chapter:11, type:'4', text:'「ストレッセルら（Stroebe & Schut）」が提唱した「二重プロセスモデル（Dual Process Model）」として正しいものはどれか。', choices:['悲嘆者は喪失志向と回復志向の間を揺れ動くことで適応するという理論', '悲嘆には男性型と女性型の2種類があるという理論', 'グリーフは2段階（急性期と慢性期）で進むという理論', '悲嘆者は2人のカウンセラーを必要とするという理論'], answer:0, explanation:'二重プロセスモデル（Stroebe & Schut, 1999）：悲嘆者は「喪失志向（喪失そのものに向き合う）」と「回復志向（喪失後の生活変化への適応）」の間をオシレーション（振動・揺れ動き）することで適応するという理論。'},
{chapter:11, type:'4', text:'「予期悲嘆（Anticipatory Grief）」の説明として正しいものはどれか。', choices:['死後に予期せず発生する悲嘆', '終末期患者の家族等が死亡前（予期される死の前）から経験する悲嘆', '子供が初めて死を体験した時の悲嘆', '抑うつ障害の一形態'], answer:1, explanation:'予期悲嘆（Anticipatory Grief）：末期疾患・認知症等で死が予期される状況で、死亡前から家族・患者自身が経験する悲嘆。フィンクは「予期悲嘆は実際の死別悲嘆を軽減するかどうか」について研究者間で議論がある。'},
{chapter:11, type:'4', text:'「ボウルビィ（J. Bowlby）」のアタッチメント理論と悲嘆の関係として正しいものはどれか。', choices:['アタッチメント理論は幼少期のみに適用され成人の悲嘆とは無関係', '安定したアタッチメントを持つ人は愛着対象（故人）を失うと深刻な悲嘆を経験するが適応も健全であるという理論', 'アタッチメントが強いほど悲嘆が弱くなる', 'アタッチメント理論では悲嘆は病気として分類される'], answer:1, explanation:'ボウルビィの愛着理論（1969〜1980）では愛着対象の喪失が深刻な悲嘆を生み出すと説明。ショック→分離の抗議（パイニング）→絶望→再組織化の4段階プロセスを提唱。アタッチメントパターン（安定・不安定）が悲嘆スタイルに影響する。'},
{chapter:11, type:'4', text:'「グリーフカウンセリング（Grief Counseling）」と「グリーフセラピー（Grief Therapy）」の違いとして正しいものはどれか。', choices:['全く同じ意味で区別はない', 'グリーフカウンセリングは通常の悲嘆プロセスを支援するもの、グリーフセラピーは複雑性悲嘆等の病理的な悲嘆に専門的に介入するもの', 'グリーフカウンセリングは医師が行い、グリーフセラピーは看護師が行う', 'グリーフカウンセリングは費用がかからない'], answer:1, explanation:'ウォーデンによる区分：グリーフカウンセリング（非病理的な通常の悲嘆者への支援・促進・補完）とグリーフセラピー（複雑性悲嘆・病理的悲嘆への専門的介入）は異なる。後者は精神科医・心理士等の専門職が担う。'},
{chapter:11, type:'4', text:'「悲嘆の身体的反応」として正しいものはどれか。', choices:['身体的反応は悲嘆の過程では生じない', '胃部不快感・胸の締め付け・喉の詰まり・息切れ・疲労感・食欲不振・睡眠障害などが報告されている', '高血圧と糖尿病が必ず発症する', '身体的症状は全て精神科薬で完全に解消できる'], answer:1, explanation:'悲嘆の身体的反応（リンデマン1944等）：胃部の空虚感・喉の詰まり感・胸の締め付け・息切れ・身体的疲労感・食欲不振・睡眠障害・免疫機能低下など多様な症状が出現する。'},
{chapter:11, type:'4', text:'「悲嘆の認知的反応」として正しいものはどれか。', choices:['認知的変化は悲嘆では生じない', '故人がまだ生きているという感覚（幻視・幻聴）・集中力の低下・混乱・故人への思いのとらわれ・夢の変化などが見られる', '記憶力が飛躍的に向上する', '悲嘆者は全員が認知症を発症する'], answer:1, explanation:'悲嘆の認知的反応：①故人がまだいるような感覚（非現実感）②幻視・幻聴（故人の声・姿を感じる）③集中力・記憶力の低下（「グリーフブレイン」）④故人へのとらわれ⑤混乱・迷い。これらは通常の悲嘆反応。'},
{chapter:11, type:'4', text:'「悲嘆の感情的反応」として正しいものはどれか。', choices:['悲しみのみが悲嘆の感情反応', '悲しみだけでなく、怒り・罪悪感・自責・不安・孤独感・ほっとした気持ち（安堵）など複雑で多様な感情が現れる', '悲嘆者は常に泣き続ける', '怒りは悲嘆の症状ではなく心理的問題の証拠'], answer:1, explanation:'悲嘆の感情的反応は多様：①悲しみ②怒り（なぜ死んだのか・なぜ自分が等）③罪悪感・自責（もっとできたのでは等）④不安⑤孤独感⑥ほっとした気持ち（長期闘病の場合）⑦感情の麻痺（ショック）等。'},
{chapter:11, type:'4', text:'「悲嘆の行動的反応」として正しいものはどれか。', choices:['悲嘆者は必ず活動性が低下する', '睡眠障害・過食または拒食・社会的引きこもり・故人の遺品への強い執着または処分できないこと・夢を多く見ることなど多様な行動変化が現れる', '悲嘆者は必ず攻撃的になる', '行動変化は悲嘆では生じない'], answer:1, explanation:'悲嘆の行動的反応：①睡眠障害（過眠・不眠）②食行動の変化③社会的引きこもり・孤立④故人の遺品へのとらわれ⑤泣く（また泣けない）⑥ため息⑦故人を探す行動（幼い子供等）⑧故人を思わせる場所・物への接近または回避。'},
{chapter:11, type:'4', text:'「ウィドウフッド（Widowhood）」の研究で明らかにされた死別後の健康リスクとして正しいものはどれか。', choices:['配偶者の死別後は健康状態が改善する傾向がある', '配偶者を亡くした男性は特に死亡率が上昇する「配偶者死別効果」が多くの研究で報告されている', '配偶者死別は女性のみに健康リスクがある', '配偶者死別後の健康への影響は研究されていない'], answer:1, explanation:'配偶者死別効果（Widowhood Effect）：配偶者死別後の死亡リスク上昇は多数の研究で報告。特に男性・高齢者・社会的孤立がある場合に顕著。死別後最初の数ヶ月が最もリスクが高い。原因は免疫機能低下・うつ病・自己放任・孤独等。'},
{chapter:11, type:'4', text:'「子供（幼児〜小学生）の悲嘆」の特徴として正しいものはどれか。', choices:['子供は死を理解できないため悲嘆を経験しない', '波のように悲嘆と普通の遊びが交互に現れ、退行（幼児返り）・身体症状・就学困難等が見られる場合がある', '子供は成人と同じ悲嘆プロセスを経る', '子供の悲嘆は葬儀後72時間以内に完全に解消される'], answer:1, explanation:'子供の悲嘆の特徴：①「悲しみの波」（深い悲しみと普通の行動が急速に切り替わる）②年齢・発達段階による死の理解の違い③退行（指しゃぶり・夜尿等）④身体症状⑤学業不振⑥感情表現よりも行動で悲嘆を示す。大人とは大きく異なる。'},
{chapter:11, type:'4', text:'「子供が初めて死を理解できるようになる年齢」について最も一般的な発達心理学的見解はどれか。', choices:['生後6ヶ月頃（乳児期）', '概ね8〜9歳頃に「死の普遍性・不可逆性・非機能性」など死の概念を総合的に理解できるようになる', '2〜3歳（幼児期）', '10代以降（思春期）'], answer:1, explanation:'死の概念の発達：①幼児期（2〜5歳）：死は一時的・可逆的と誤解しがち②学童前期（5〜7歳）：死は本物だが自分には関係ないと考えがち③学童後期（8〜9歳）：普遍性・不可逆性・非機能性・原因を理解しはじめる。'},
{chapter:11, type:'4', text:'「高齢者の悲嘆」の特徴として正しいものはどれか。', choices:['高齢者は死に慣れているため悲嘆しない', '同時多発的な喪失（配偶者・友人・機能・健康等）を経験しやすく「累積悲嘆（cumulative grief）」が生じやすい', '高齢者の悲嘆は必ず認知症につながる', '高齢者の悲嘆は若者より軽い'], answer:1, explanation:'高齢者の悲嘆の特徴：①複数の喪失が重なる累積悲嘆②社会的サポートの減少③身体的な脆弱性の増大④表現を抑制する世代的傾向⑤「どうせ自分も長くない」という意識⑥慢性疾患等との区別が難しい。'},
{chapter:11, type:'4', text:'「自殺（suicide）」による死別の遺族（サバイバー）の悲嘆の特徴として正しいものはどれか。', choices:['自殺による死別は他の死別と特に変わらない', '強い自責・罪悪感・なぜ気づかなかったのかという後悔・スティグマ（社会的な偏見）・怒りなどが重なる複雑な悲嘆になりやすい', '自殺遺族の悲嘆は必ず1年以内に解消される', '自殺遺族はグリーフカウンセリングを拒否する'], answer:1, explanation:'自殺遺族（SOS - Survivors of Suicide）の悲嘆：①自責・罪悪感（助けられたのではという思い）②「なぜ」という問いへの答えのなさ③スティグマ（恥・偏見）④孤立④怒り⑤複雑性悲嘆のリスクが高い。専門的な自殺遺族支援グループ・カウンセリングが有効。'},
