{ chapter:5, type:'ox', text:'「禅（ぜん）」とはサンスクリット語の「ディヤーナ（瞑想）」に由来する言葉である。', answer:true, explanation:'「禅」は梵語（サンスクリット語）の「ディヤーナ（dhyāna）」が中国語で「禅那（ぜんな）」と音写され、「禅」と略されたものです。「瞑想・禅定」という意味で、坐禅（坐った瞑想）の実践を通じて悟りを目指す修行法を指します。' },
{ chapter:5, type:'ox', text:'「臨済宗妙心寺派」は日本最大の臨済宗の派で、全国に約3500か寺の末寺を持つ。', answer:true, explanation:'臨済宗は現在14の派に分かれており、その中で最大勢力を持つのが妙心寺派（総本山：妙心寺、京都市右京区）です。臨済宗は室町幕府の保護を受け、五山制度のもとで文化的にも大きな役割を果たしました。' },
{ chapter:5, type:'ox', text:'「道元」は永平寺を開いた後、一度も比叡山に戻ることなく越前（福井県）で一生を終えた。', answer:false, explanation:'道元は永平寺開山後、1247年に鎌倉幕府の執権・北条時頼に招かれて鎌倉に下向しましたが、約半年で帰山しました。また1253年に病を得て京都に上り、在京中に53歳で入寂（死去）しました。' },
{ chapter:5, type:'ox', text:'「法然」の弟子である「親鸞」は、師の教えをより徹底させ「他力本願」の思想を発展させた。', answer:true, explanation:'法然が「専修念仏」（ひたすら念仏を称えること）を説いたのに対し、親鸞はさらにそれを深め、自己の力（自力）を完全に捨て阿弥陀仏の働き（他力）にすべてを委ねる「絶対他力」の思想を確立しました。主著は「教行信証」です。' },
{ chapter:5, type:'ox', text:'浄土真宗の「歎異抄（たんにしょう）」は親鸞自身が書いた著作である。', answer:false, explanation:'歎異抄は親鸞の弟子・唯円（ゆいえん）が書いたとされる書物で、師・親鸞の言葉を記録しその教えの歪みを嘆いた内容です。「善人なほもて往生をとぐ、いはんや悪人をや」という言葉（悪人正機）が有名で、親鸞の著作ではありません。' },
{ chapter:5, type:'ox', text:'「日蓮宗」では、日蓮の遺骨が納められた身延山が聖地とされ、多くの信者が参詣に訪れる。', answer:true, explanation:'日蓮上人は身延山（山梨県）で晩年の約9年を過ごし、1282年に入滅しました。身延山久遠寺には日蓮の御廟所（お墓）があり、日蓮宗の総本山として多くの参詣者が訪れます。「身延詣り」は日蓮宗信者の重要な巡礼です。' },
{ chapter:5, type:'ox', text:'「真言宗」の「真言（マントラ）」は、意味を理解して唱えることが重要とされる。', answer:false, explanation:'真言（マントラ）は密教において「秘密の言葉」とされ、意味を論理的に理解して唱えることより、音（声）そのものに神聖な力があると考えられています。梵語のまま唱えることが重視され、翻訳しないことが原則です。' },
{ chapter:5, type:'ox', text:'「四弘誓願（しぐせいがん）」は、菩薩（悟りを求める者）が立てる四つの誓いで、多くの宗派の葬儀でも唱えられる。', answer:true, explanation:'四弘誓願とは①衆生無辺誓願度（すべての衆生を救う）②煩悩無尽誓願断（すべての煩悩を断つ）③法門無量誓願学（すべての法門を学ぶ）④仏道無上誓願成（最高の仏道を成就する）の四つです。多くの宗派の法要で唱えられます。' },
{ chapter:5, type:'ox', text:'「浄土宗」の増上寺（東京）は、徳川将軍家の菩提寺として知られる。', answer:true, explanation:'増上寺（東京都港区）は浄土宗の大本山で、徳川家康が江戸入府後に菩提寺と定めました。2代秀忠・6代家宣・7代家継・9代家重・12代家慶・14代家茂の将軍とその家族が埋葬されています。' },
{ chapter:5, type:'ox', text:'「臨済宗」の「公案（こうあん）」は、論理的な思考で解くことができる哲学的な問いかけである。', answer:false, explanation:'公案は「隻手の声を聞け」「父母未生以前の本来の面目とは何か」など、論理的・概念的思考では解けない問いです。これに取り組むことで思考の限界を超え、直接的な悟りの体験（見性）を目指すのが臨済宗の修行法です。' },

// --- 神式深掘り ---
{ chapter:5, type:'ox', text:'神道の「八百万（やおよろず）の神」とは、自然・万物すべてに神が宿るという考え方を表す。', answer:true, explanation:'「八百万の神」は日本神道の多神教的・アニミズム的な世界観を象徴する表現で、山・川・海・木・動物・人間など自然界のすべてに神が宿ると考えます。「八百万」は無数に多いという意味の表現です。' },
{ chapter:5, type:'ox', text:'神式葬儀では「御神酒（おみき）」を供えるのが一般的であるが、火葬後は供えない。', answer:false, explanation:'神式葬儀では故人への供え物（神饌・しんせん）として御神酒・米・塩・水・野菜・魚などを供えます。火葬後（火葬祭・帰家祭）でも御神酒を含む供え物を捧げます。供え物を控える特定の場面はありますが「火葬後は供えない」というルールはありません。' },
{ chapter:5, type:'ox', text:'「伊勢神宮（内宮）」の御祭神は、天照大御神（あまてらすおおみかみ）である。', answer:true, explanation:'伊勢神宮の内宮（皇大神宮）の御祭神は天照大御神で、太陽の神・皇室の祖先神として日本神道の最高位に位置づけられます。外宮（豊受大神宮）の御祭神は豊受大御神（食物・農業の神）です。' },
{ chapter:5, type:'ox', text:'神葬祭における「斎主（さいしゅ）」は仏式の「導師（僧侶）」に相当する役割を担う。', answer:true, explanation:'斎主は神葬祭を主宰する神職のことで、仏式の導師（葬儀を主宰する僧侶）に相当します。祝詞（のりと）の奏上・各種の儀礼の執行など、式全体を取り仕切ります。' },
{ chapter:5, type:'ox', text:'神道では「穢れ（けがれ）」を払うために「禊（みそぎ）」を行う。', answer:true, explanation:'禊（みそぎ）は水で身体を洗い清めることで穢れを祓う神道の浄化儀礼です。伊邪那岐命が黄泉の国から戻った際に禊を行ったという神話が起源とされます。現代の神式葬儀後の「清祓」も穢れを払う儀礼のひとつです。' },

// --- キリスト教深掘り ---
{ chapter:5, type:'ox', text:'「カトリック」とはギリシャ語で「普遍的な」という意味である。', answer:true, explanation:'「カトリック（Catholic）」はギリシャ語「カトリコス（katholikos）」に由来し、「普遍的な・全体にわたる」という意味です。「普遍教会（普遍的なキリストの教会）」という意味でカトリックと呼ばれます。' },
{ chapter:5, type:'ox', text:'「プロテスタント」という名称は、16世紀の宗教改革において改革派が旧体制に「抗議（プロテスト）」したことに由来する。', answer:true, explanation:'「プロテスタント」は1529年のシュパイヤー帝国議会でカトリック側の決定に対してルター派諸侯が「抗議（Protestatio）」したことに由来します。現在は「プロテスト（抗議）」という意味よりも、宗教改革から生まれたキリスト教各派の総称として使われています。' },
{ chapter:5, type:'ox', text:'日本のキリスト教人口は総人口の約30%を占める。', answer:false, explanation:'日本のキリスト教人口は総人口の約1〜2%程度とされており、非常に少数派です（カトリック・プロテスタント・正教会などを合わせて）。仏教徒（約67〜70%）・神道（約70〜80%、重複含む）と比べて大幅に少ない数字です。' },
{ chapter:5, type:'ox', text:'「正教会（せいきょうかい）」は東方キリスト教の一派で、ロシア正教・ギリシャ正教などがある。', answer:true, explanation:'正教会（Eastern Orthodox Church）は1054年のキリスト教大分裂でカトリックと分かれた東方キリスト教の流れで、ロシア正教会・ギリシャ正教会・日本正教会（ハリストス正教会）などがあります。日本では幕末に伝来しました。' },
{ chapter:5, type:'ox', text:'キリスト教の「臨終の秘跡（病者の塗油）」は、死が迫った時に司祭が行う儀礼でカトリックのみの慣行である。', answer:true, explanation:'病者の塗油（かつての「終油の秘跡」）はカトリックの七つの秘跡（サクラメント）のひとつで、重篤な患者や臨終の際に司祭が聖油を塗り祈る儀礼です。プロテスタントは一般的にこのような秘跡の制度を持ちません。' },

// --- 新宗教・諸派深掘り ---
{ chapter:5, type:'ox', text:'「天理教」では死を「出直し（でなおし）」と表現し、現世での修行を終えて神のもとへ帰ると考える。', answer:true, explanation:'天理教では人の死を否定的に捉えず、「神から借りていた体を返し、魂が生まれ直す（出直す）」という積極的な意味を持たせています。このため葬儀の場でも「死」「亡くなる」などの言葉を使わず「出直す」と言います。' },
{ chapter:5, type:'ox', text:'「霊友会（れいゆうかい）」は仏教系の新宗教で、現在も多くの派生宗教を生み出している。', answer:true, explanation:'霊友会（1919年創設）は法華経と先祖供養を基本とする新宗教で、立正佼成会・仏所護念会・妙智会など多くの派生宗教（分派）を生み出しました。これらをまとめて「霊友会系」と呼ぶこともあります。' },
{ chapter:5, type:'ox', text:'「世界救世教（せかいきゅうせいきょう）」は岡田茂吉が開いた新宗教で、「浄霊（じょうれい）」と呼ばれる手かざし療法が特徴である。', answer:true, explanation:'世界救世教は1935年に岡田茂吉（もきち）が開いた新宗教で、「光」を手から放射して病気を治す「浄霊」が特徴的な実践です。MOA美術館（静岡・東京）の運営でも知られます。' },
{ chapter:5, type:'ox', text:'「生長の家（せいちょうのいえ）」は谷口雅春が開いた新宗教で、「神の子」として人間の完全性を説く。', answer:true, explanation:'生長の家は1930年に谷口雅春が開いた新宗教で、「人間は神の子であり本来完全・善・美である」という「神人不二」の思想を説きます。雑誌「生長の家」の出版・「聖使命」誌などを通じて広まりました。' },
{ chapter:5, type:'ox', text:'「神社神道」と「教派神道」は同じものである。', answer:false, explanation:'神社神道は全国の神社・神宮で行われる伝統的な神道です。教派神道は明治時代に政府が公認した天理教・金光教・黒住教など13の宗教団体を指します。神社神道は国家管理下に置かれ（戦前）、教派神道は民間宗教として別扱いされました。' },
{ chapter:5, type:'ox', text:'「黒住教（くろずみきょう）」は江戸時代後期に岡山で成立した神道系の新宗教で、太陽神・天照大御神への信仰が中心である。', answer:true, explanation:'黒住教は1814年に岡山の神官・黒住宗忠が「天命直授（てんめいじきじゅ）」の神秘体験を経て開いた神道系新宗教です。太陽（天照大御神）への信仰と感謝を中心に、明るく積極的な生き方を説きます。教派神道の一つです。' },

// --- 法要・忌日深掘り ---
{ chapter:5, type:'ox', text:'「三十三回忌」は多くの宗派で「弔い上げ（とむらいあげ）」とされ、以後の個別の年忌法要を終了することが多い。', answer:true, explanation:'三十三回忌（満32年後）は多くの仏教宗派で年忌法要の締めくくり（弔い上げ）とされます。この後は個人として祀るのをやめ、先祖代々の霊として合祀する場合が多いです。地域・宗派によっては五十回忌を弔い上げとすることもあります。' },
{ chapter:5, type:'ox', text:'「月命日（つきめいにち）」とは、毎月その人が亡くなった日と同じ日付のことである。', answer:true, explanation:'月命日は毎月巡ってくる命日で、例えば3月15日に亡くなった場合、毎月15日が月命日です。年に一度の「命日（祥月命日・しょうつきめいにち）」と区別して「月命日」と呼びます。月命日に墓参りや仏前での手を合わせを行う習慣があります。' },
{ chapter:5, type:'ox', text:'「祥月命日（しょうつきめいにち）」とは、故人が亡くなった月日（月と日）が一致する、年に一度の命日のことである。', answer:true, explanation:'祥月命日（正忌・しょうき）は故人が亡くなった月と日が同じ、年に一度の本来の命日です。毎月の「月命日」と区別します。一周忌・三回忌などの年忌法要は原則としてこの祥月命日に行います。' },
{ chapter:5, type:'ox', text:'「涅槃会（ねはんえ）」は釈迦の誕生を祝う仏教行事である。', answer:false, explanation:'涅槃会は2月15日に釈迦の入滅（死去）を偲ぶ仏教行事です。釈迦の誕生を祝う行事は「花まつり（灌仏会・かんぶつえ）」で4月8日に行われます。「成道会（じょうどうえ）」は12月8日に釈迦の悟りを祝う行事です。' },
{ chapter:5, type:'ox', text:'「お盆（盂蘭盆会）」は仏教行事であり、先祖の霊が年に一度この世に戻ってくると信じられている。', answer:true, explanation:'お盆（盂蘭盆会・うらぼんえ）はインドの仏教行事が日本の祖先信仰・神道と融合した行事です。8月13日に迎え火で先祖の霊を迎え、16日に送り火で送り出す慣習があります（地域によっては7月）。精霊棚・盆踊りなど日本独自の文化も生まれました。' },

// --- 葬儀マナー・実務 ---
{ chapter:5, type:'ox', text:'葬儀に参列する際の数珠は、宗派の違う葬儀でも自分の宗派の数珠を使って構わない。', answer:true, explanation:'数珠は本来その宗派専用のものがありますが、葬儀に参列する際は自分の宗派の数珠（または「略式数珠」）を持参することが一般的で、他宗派の葬儀でも使用して問題ありません。数珠を持参すること自体が礼儀とされます。' },
{ chapter:5, type:'ox', text:'「喪中はがき」は一般的に故人が亡くなった翌年の年賀状シーズンに合わせて11〜12月に送る。', answer:true, explanation:'喪中はがき（年賀欠礼状）は、相手が年賀状を書く前に届くよう11月〜12月初旬に送るのが一般的なマナーです。年賀状が届いた後に喪中の事を知った場合は「寒中見舞い」で返答します。' },
{ chapter:5, type:'ox', text:'「香典（こうでん）」の語源は、線香・焼香など香を供えることへのお礼が金銭に変化したものとされる。', answer:true, explanation:'香典はもともと「香料（こうりょう）」とも呼ばれ、線香・香などを供えることへの代わりとして金銭を包むようになったものです。「典」は「典礼・儀式」という意味で、「香を供える儀礼への志」という意味合いがあります。' },
{ chapter:5, type:'ox', text:'「弔電（ちょうでん）」は葬儀に参列できない場合に喪家に送る電報で、現代でもNTTなどを通じて送ることができる。', answer:true, explanation:'弔電は葬儀に参列できない際に喪主宛てに送る電報形式のお悔やみで、現代でもNTT・KDDI・電報各社のサービスを通じて送ることができます。葬儀式場に届くよう、通夜・葬儀の前日までに手配するのが一般的です。' },
{ chapter:5, type:'ox', text:'葬儀の「受付」は遺族が担当するのが正式なマナーである。', answer:false, explanation:'葬儀の受付は故人の友人・知人・会社の同僚など「世話人（てつだい人）」が担当するのが一般的です。遺族は弔問客への挨拶・接待・式の進行に専念するため、受付は他の人に委ねるのが通例です。' },

// --- 葬儀形式・現代的変化 ---
{ chapter:5, type:'ox', text:'「音楽葬（おんがくそう）」とは、故人が好んだ音楽を式中に流したり演奏したりする葬儀形式で、無宗教葬の一種である。', answer:true, explanation:'音楽葬は宗教的な儀礼の代わりに、または組み合わせて、故人が愛した音楽を中心に構成する葬儀形式です。無宗教葬（自由葬）の中でも増加しており、生演奏・録音再生・合唱など様々な形があります。' },
{ chapter:5, type:'ox', text:'「グリーフケア」は遺族支援のためのケアであり、葬儀社が提供するアフターフォローとしても注目されている。', answer:true, explanation:'グリーフケアは死別などによる悲嘆（グリーフ）を抱えた遺族を心理的・社会的に支援するケアです。近年、葬儀社が葬儀後の遺族を訪問したり、グリーフケアの場を提供したりするアフターフォローの一環として提供するケースが増えています。' },
{ chapter:5, type:'ox', text:'「手元供養（てもとくよう）」とは、遺骨の一部を小さな骨壺や専用のアクセサリーに入れて手元に置いて供養する方法である。', answer:true, explanation:'手元供養は墓への納骨に加えて（または代わりに）遺骨の一部を手元に置いて供養する方法です。ミニ骨壺・メモリアルジュエリー（遺骨を入れたアクセサリー）・ぬいぐるみ型など様々な形があり、近年増加しています。' },

// ========================================
// 追加問題（4択 48問）
// ========================================

// --- 仏教宗派詳細 ---
{ chapter:5, type:'4', text:'「浄土真宗大谷派（東本願寺）」の焼香作法として正しいものはどれか。', choices:['額に押しいただいて1回','額に押しいただかずに1回','額に押しいただかずに2回','額に押しいただいて3回'], answer:2, explanation:'真宗大谷派（東本願寺）の焼香は「押しいただかず（額に当てず）に2回」が正式な作法です。浄土真宗本願寺派（西本願寺）は「押しいただかずに1回」です。この違いは覚えておく必要があります。' },
{ chapter:5, type:'4', text:'「一向宗（いっこうしゅう）」とは何の別称か。', choices:['曹洞宗','日蓮宗','浄土真宗','時宗'], answer:2, explanation:'一向宗は浄土真宗（本願寺）の俗称で、「ひたすら（一向に）阿弥陀仏を念じる」という意味から付いた呼び名です。戦国時代に各地で起きた「一向一揆」は浄土真宗（一向宗）の門徒が起こした武装蜂起でした。' },
{ chapter:5, type:'4', text:'「修験道（しゅげんどう）」の特徴として正しいものはどれか。', choices:['純粋な仏教の宗派','山岳での厳しい修行を通じて呪力を得ようとする、仏教・神道・道教などが融合した宗教実践','キリスト教の影響を受けた日本固有の宗教','武士道を宗教化した日本独自の精神形式'], answer:1, explanation:'修験道は山岳に神仏が宿るという信仰のもと、峰入り（山中での修行）を通じて霊力・呪力（験力）を得ようとする宗教実践で、仏教（特に密教）・神道・道教・山岳信仰などが融合しています。役小角（えんのおづぬ）を開祖とします。' },
{ chapter:5, type:'4', text:'「高野山（こうやさん）」について正しい説明はどれか。', choices:['天台宗の総本山がある山','真言宗の総本山・金剛峯寺がある霊場で、世界遺産にも登録されている','日蓮宗の創始者・日蓮が晩年を過ごした山','禅宗の修行道場が集まる山'], answer:1, explanation:'高野山（和歌山県伊都郡高野町）は真言宗の総本山・金剛峯寺がある霊場で、2004年に「紀伊山地の霊場と参詣道」としてユネスコ世界遺産に登録されました。奥之院には空海の御廟所があり、今も生きて定を続けていると信じられています。' },
{ chapter:5, type:'4', text:'「比叡山（ひえいざん）」延暦寺の説明として正しいものはどれか。', choices:['真言宗の総本山','浄土宗の開祖・法然が開いた寺','天台宗の総本山で、多くの鎌倉仏教の開祖を輩出した日本仏教の母山','日蓮宗の総本山'], answer:2, explanation:'比叡山延暦寺（滋賀県大津市）は天台宗の総本山で、最澄（伝教大師）が開きました。法然・親鸞・道元・日蓮・栄西など鎌倉時代の多くの宗祖が修行した場所であり「日本仏教の母山」と呼ばれます。2004年に世界遺産登録。' },
{ chapter:5, type:'4', text:'「永平寺（えいへいじ）」について正しい説明はどれか。', choices:['臨済宗の総本山','曹洞宗の大本山のひとつで、道元が開いた寺','浄土真宗の本山','真言宗の別院'], answer:1, explanation:'永平寺（福井県吉田郡永平寺町）は曹洞宗の大本山のひとつで、道元が1244年に開きました。現在も多くの雲水（修行僧）が修行する「参禅道場」として知られます。もう一つの大本山は横浜の總持寺です。' },
{ chapter:5, type:'4', text:'「知恩院（ちおんいん）」の説明として正しいものはどれか。', choices:['曹洞宗の総本山','浄土宗の総本山で、法然上人が念仏を広めた地に建てられた','日蓮宗の大本山','浄土真宗の別院'], answer:1, explanation:'知恩院（京都市東山区）は浄土宗の総本山で、法然上人が念仏の教えを広め、入定（死去）した地に建てられました。三門（国宝）は木造建築として日本最大級の規模を誇ります。除夜の鐘でも有名です。' },
{ chapter:5, type:'4', text:'「宗祖（しゅうそ）」と「中興の祖（ちゅうこうのそ）」の違いとして正しいものはどれか。', choices:['宗祖は現在の宗派のトップ、中興の祖は歴史上の人物','宗祖はその宗派を開いた人物、中興の祖は後に宗派を再興・発展させた人物','まったく同じ意味','宗祖は仏教用語、中興の祖は神道用語'], answer:1, explanation:'宗祖はその宗派の開祖を指します。中興の祖は宗派が衰えた時期にそれを再び盛んにした功績ある人物のことです。例えば曹洞宗では道元が宗祖、瑩山紹瑾が中興の祖とされます。' },

// --- 神式詳細 ---
{ chapter:5, type:'4', text:'神式葬儀の「発柩祭（はっきゅうさい）」とは何か。', choices:['火葬場で行う最後の儀式','棺を斎場・自宅から出棺する際の儀式','骨上げの際の儀式','帰宅後の清めの儀式'], answer:1, explanation:'発柩祭は棺を安置場所（自宅・斎場）から出棺する際に行う神式の儀式です。仏式の「出棺」に相当します。出棺の際に神職が祝詞を奏上し、一同が玉串を奉奠して故人の旅立ちを送ります。' },
{ chapter:5, type:'4', text:'神式葬儀における香典の正しい表書きはどれか。', choices:['御仏前','御花料','御玉串料または御榊料','御霊前のみ'], answer:2, explanation:'神式葬儀への香典は「御玉串料（おたまぐしりょう）」または「御榊料（おさかきりょう）」が最も適切です。「御神前（ごしんぜん）」「御霊前」も使えます。「御仏前」は仏式専用です。' },
{ chapter:5, type:'4', text:'神道における「祓詞（はらえことば）」とはどういうものか。', choices:['葬儀の際に奏上する弔いの言葉','穢れや罪を祓い清めるために唱える祝詞（のりと）','神社への参拝時に述べる感謝の言葉','神職の身分を証明する言葉'], answer:1, explanation:'祓詞は穢れ・罪・災いを祓い清めるために唱える祝詞で、「払へ給ひ清め給へと申す事を聞こし召せと白す」という内容が含まれます。神葬祭でも各種の儀礼で祓詞が奏上されます。' },

// --- 諸宗教・比較 ---
{ chapter:5, type:'4', text:'「イスラム教」の葬儀の特徴として正しいものはどれか。', choices:['火葬が原則で、できるだけ早く行う','土葬が原則で、死後できるだけ早く（24時間以内が理想）行う','散骨が推奨される','遺体は7日間安置してから埋葬する'], answer:1, explanation:'イスラム教では遺体を土に還すことが教義上の原則のため土葬です。また「早い埋葬が故人への敬意」とされ、死後できるだけ早く（24時間以内が理想）に行います。日本では土葬できる墓地が少なく課題となっています。' },
{ chapter:5, type:'4', text:'ユダヤ教の葬儀の特徴として正しいものはどれか。', choices:['豪華な棺を使い、長期間かけて行う','シンプルな木製の棺を使い、死後できるだけ早く土葬する','火葬を推奨する','僧侶が読経する'], answer:1, explanation:'ユダヤ教では「人間は土から生まれ土に返る」という考えから、土葬が原則です。棺はシンプルな木製（木釘使用・金具不使用）が伝統で、土に早く還るようにします。死後24時間以内の埋葬が理想とされます。' },
{ chapter:5, type:'4', text:'ヒンドゥー教の葬儀の特徴として正しいものはどれか。', choices:['土葬が原則','火葬が原則で、ガンジス川での水葬も行われる','遺体は保存処理して長期間安置する','読経を3日間続ける'], answer:1, explanation:'ヒンドゥー教では輪廻転生の思想から「肉体はただの入れ物」と考え、火葬（荼毘・だび）が一般的です。インドではガンジス川沿いの火葬場（ガート）で火葬し、遺灰を川に流す慣習があります。仏教の「荼毘に付す」という言葉もヒンドゥー教由来です。' },
{ chapter:5, type:'4', text:'「神道」「仏教」「キリスト教」「イスラム教」の中で、日本人の葬儀で最も多く行われているのはどれか。', choices:['神道（神葬祭）','仏教式（仏式）','キリスト教式','イスラム教式'], answer:1, explanation:'日本の葬儀は仏教式が最も多く、約90%前後とされています（調査機関・時期によって異なります）。神式は数%程度、キリスト教式は1〜2%程度です。ただし近年は無宗教・家族葬の増加により、宗教色のない葬儀も増えています。' },
{ chapter:5, type:'4', text:'次のうち「教派神道」として明治政府が公認した13派に含まれないものはどれか。', choices:['天理教','黒住教','金光教','創価学会'], answer:3, explanation:'教派神道（神道十三派）は明治政府が公認した神道系宗教で、黒住教・神道修成派・出雲大社教・扶桑教・実行教・大成教・神習教・御嶽教・神道大社教・禊教・金光教・天理教・神道本局の13派です。創価学会は日蓮宗系の新宗教であり含まれません。' },

// --- 法要・文化 ---
{ chapter:5, type:'4', text:'「お彼岸（おひがん）」に行う主な供養として一般的なものはどれか。', choices:['神社への参拝と玉串奉奠','墓参り・仏壇への供養・法要','教会での礼拝と献花','散骨と海洋供養'], answer:1, explanation:'お彼岸（春分・秋分の前後各3日間）には先祖の墓参り・仏壇への供物・法要などが行われます。「ぼたもち（牡丹餅）」「おはぎ（御萩）」を供える慣習も有名です（春はぼたもち、秋はおはぎ）。神式・キリスト教式では一般的な行事ではありません。' },
{ chapter:5, type:'4', text:'「四十九日」に行う一般的な作法として誤っているものはどれか。', choices:['仮の白木位牌から本位牌へ切り替える','香典の表書きを「御霊前」から「御仏前」に変更する','納骨を行う','喪中はがきを送る'], answer:3, explanation:'喪中はがき（年賀欠礼状）は11〜12月に送るもので、四十九日のタイミングで送るものではありません。四十九日では①白木位牌から本位牌への切り替え②納骨③忌明けのお礼④「御霊前」→「御仏前」への表書き変更、などが一般的に行われます。' },
{ chapter:5, type:'4', text:'「回向（えこう）」とはどういう意味か。', choices:['お墓の向きを変えること','自分の功徳（善行・読経など）を故人や他の人のために振り向けること','葬儀場の方向を確認すること','仏壇の向きを直すこと'], answer:1, explanation:'回向（廻向）とは自分が積んだ善根・功徳を他の者（故人や生きている人）のために振り向けることです。法要での読経・布施などが回向の代表的な実践で、「追善回向」は故人の冥福のために行う追善供養を指します。' },
{ chapter:5, type:'4', text:'「施餓鬼（せがき）」法要とは何か。', choices:['葬儀の費用を計算する儀礼','餓鬼道に苦しむ霊や無縁仏に食物を施す供養法要','お盆に行う盆踊りの起源となった儀式','彼岸に行う先祖供養の特別法要'], answer:1, explanation:'施餓鬼法要は、餓鬼道（飢えに苦しむ世界）に堕ちた霊や無縁仏（供養する人のない霊）に食物を施して供養する法要です。お盆の時期や彼岸に合わせて行われることが多く、お寺が主催する合同の施餓鬼法要も各地で行われます。' },
{ chapter:5, type:'4', text:'「位牌（いはい）」の説明として正しいものはどれか。', choices:['神式で使用する霊魂の依代','仏式で戒名・没年月日・俗名などを記した木製の牌で、故人の霊の依代とされる','キリスト教式で聖書を置く台','葬儀場の案内表示板'], answer:1, explanation:'位牌は仏式で使用する木製の牌で、戒名・没年月日・俗名・享年などが記されます。故人の霊の依代（よりしろ）として仏壇に安置し、日々の供養の対象となります。葬儀直後は白木の「仮位牌（白木位牌）」を使い、四十九日後に塗位牌・本位牌に変えます。' },
{ chapter:5, type:'4', text:'「通夜振舞い（つやぶるまい）」とは何か。', choices:['通夜の式次第の進行のこと','通夜終了後に参列者を接待する会食のこと','通夜の際に喪主が挨拶すること','通夜の翌朝に行う朝食のこと'], answer:1, explanation:'通夜振舞いは通夜の式が終わった後、参列者に飲食でもてなす会食のことです。故人との思い出を語り合い、遺族が参列へのお礼をする場でもあります。料理は寿司・オードブル・精進料理などが多く、地域によって内容が異なります。' },
{ chapter:5, type:'4', text:'「中陰（ちゅういん）」とは何を指すか。', choices:['仏壇のある部屋のこと','死後に次の生を受けるまでの49日間の状態','仏教の瞑想修行の一種','葬儀と告別式の間の休憩時間'], answer:1, explanation:'中陰（中有）とは仏教において、死後に次の生（転生）を受けるまでの過渡的な状態・期間を指します。この期間は49日間（七七日）とされ、7日ごとに裁きを受けると考えられています。これが四十九日法要を重視する根拠となっています。' },
{ chapter:5, type:'4', text:'「引導（いんどう）」を渡す主な目的として正しいものはどれか。', choices:['遺体を火葬場まで運ぶ','故人の霊を迷いから解放し、仏の世界へ導く','遺族に葬儀の費用を説明する','参列者に式の進行を案内する'], answer:1, explanation:'引導は導師（僧侶）が故人に向けて引導文（いんどうぶん）を読み上げ、この世への執着を断ち切って迷わず仏の世界へ向かうよう導く儀式です。仏式葬儀（特に禅宗）の中核をなす重要な儀礼のひとつです。' },
{ chapter:5, type:'4', text:'「導師（どうし）」が複数の僧侶で行う葬儀の場合、最も位の高い僧侶はどの役割を担うか。', choices:['受付・案内','導師（引導を渡す主役の僧侶）','斎主（神職の役割）','葬儀社の担当者'], answer:1, explanation:'複数の僧侶が参列する葬儀では、最も地位の高い（または住職・故人と最も縁の深い）僧侶が「導師」として引導・読経の中心的役割を務めます。他の僧侶は「伴僧（ばんそう）・脇僧（わきそう）」として導師を補佐します。' },
{ chapter:5, type:'4', text:'「焼香」の「抹香（まっこう）」とはどういうものか。', choices:['線香を細かく粉末にしたもの，または香木・香料を粉末にしたもの','ロウソクに火をつける道具','仏壇に供える果物や菓子','焼香台の炭火のこと'], answer:0, explanation:'抹香（まっこう）は香木・香料などを細かく粉末状にしたもので、焼香の際に指でつまんで炭火の上に落として焚きます。「沈香（じんこう）」「白檀（びゃくだん）」など香木が主原料です。' },
{ chapter:5, type:'4', text:'「般若心経（はんにゃしんぎょう）」はどの宗派でも広く読まれているか。', choices:['浄土真宗でも必ず読まれる','浄土真宗では読まれないが、他の多くの宗派で広く読まれている','日蓮宗でのみ読まれる','キリスト教でも取り入れている'], answer:1, explanation:'般若心経は真言宗・天台宗・禅宗（曹洞宗・臨済宗）・浄土宗など多くの宗派で読まれる経典です。しかし浄土真宗では「阿弥陀経・正信偈」など浄土三部経が中心で、般若心経は読みません。日蓮宗も法華経が中心です。' },
{ chapter:5, type:'4', text:'「過去帳（かこちょう）」を毎日めくる習慣について正しいものはどれか。', choices:['浄土真宗では毎日めくり、その日の命日の故人に手を合わせる習慣がある','すべての宗派で必ず毎日めくる','過去帳はめくらずに保管するだけのもの','過去帳は寺院だけが持つもの'], answer:0, explanation:'浄土真宗では過去帳を命日帳として毎日めくり（日付のある「日めくり型過去帳」）、その日に命日を迎える先祖に手を合わせる習慣があります。位牌を使わない浄土真宗において過去帳は重要な供養の道具です。' },
{ chapter:5, type:'4', text:'「檀家（だんか）」制度の説明として正しいものはどれか。', choices:['江戸幕府が設けた制度で、すべての人が特定の寺院に所属することを義務付けた','平安時代に始まった貴族と寺院の関係','神社と氏子の関係を指す','葬儀社が顧客を管理するシステム'], answer:0, explanation:'檀家制度は江戸幕府がキリシタン禁制のために設けた「寺請制度（てらうけせいど）」に基づくもので、すべての民衆が特定の寺院の檀家となり、宗教証明を受けることを義務付けました。これが現代の「菩提寺（ぼだいじ）」制度の起源です。' },

// --- 追加30問（○×15・4択15）---
{ chapter:5, type:'ox', text:'「お布施（おふせ）」は葬儀サービスへの対価（報酬）であり、消費税の課税対象となる。', answer:false, explanation:'お布施は僧侶・寺院への感謝として渡すものであり、法的には「寄付金（布施）」の性格を持ちます。対価性のない寄付のため消費税は不課税です。金額の明示義務もなく、「お気持ち」として遺族が決める形が多いです。' },
{ chapter:5, type:'ox', text:'「初七日法要」は現代では葬儀当日に「繰り込み初七日」として行われることが多い。', answer:true, explanation:'本来は死後7日目に行う初七日法要ですが、遠方からの参列者の都合・日程の効率化のため、現代では葬儀・告別式当日に続けて行う「繰り込み初七日（式中初七日）」が主流になっています。' },
{ chapter:5, type:'ox', text:'「精霊馬（しょうりょううま）」はお盆に作るきゅうりとなすの飾りで、きゅうりが馬、なすが牛を表す。', answer:true, explanation:'精霊馬（精霊牛）はお盆に先祖の霊を迎え送るための乗り物として作ります。きゅうりは足の速い「馬」（あの世から早く帰ってくるよう）、なすはゆっくりした「牛」（この世をゆっくり去っていくよう）を表します。' },
{ chapter:5, type:'ox', text:'「寺請制度（てらうけせいど）」は明治時代に廃止され、現代日本には存在しない。', answer:true, explanation:'寺請制度は明治政府の政教分離政策により1871年（明治4年）に廃止されました。しかし「菩提寺」への依存や仏教式葬儀の慣行は現在も続いており、制度としては廃止されても文化・慣習として根付いています。' },
{ chapter:5, type:'ox', text:'「禅語」で有名な「不立文字（ふりゅうもんじ）」とは「文字に頼らず直接体験で悟りを得る」という禅の立場を示す。', answer:true, explanation:'「不立文字」は禅の基本姿勢を示す言葉で、「経典の文字・言葉に頼らず、師から弟子への心から心への直接伝達（以心伝心）によって悟りを伝える」という意味です。「教外別伝（きょうげべつでん）」「直指人心（じきしにんしん）」「見性成仏（けんしょうじょうぶつ）」とともに禅の四句とされます。' },
{ chapter:5, type:'ox', text:'「念仏（ねんぶつ）」とは仏の名前を唱えることだけを指す。', answer:false, explanation:'念仏とは本来「仏を念じる（心に思い浮かべる）」という意味で、①口称念仏（くしょうねんぶつ：声に出して仏名を称える）②観想念仏（かんそうねんぶつ：仏の姿を心に観想する）③実相念仏などがあります。日本の浄土宗系では主に口称念仏（「南無阿弥陀仏」を称える）を指します。' },
{ chapter:5, type:'ox', text:'「神道」では「死穢（しえ）」を最大の穢れとするため、神社の境内に墓地を設けることは原則ない。', answer:true, explanation:'神道において死は最大の穢れ（死穢）とされるため、神社の境内に墓地を設けることは原則ありません。これは寺院が境内に墓地（寺院墓地）を持つ仏教の慣習と対照的です。神道系の墓地は神社とは別の場所に設けられます。' },
{ chapter:5, type:'ox', text:'「連名（れんめい）」の香典は、複数人が連名で一つの香典袋に入れて渡すことができる。', answer:true, explanation:'同僚・グループ・部署など複数人でまとめて香典を出す場合、連名で一つの香典袋に入れることができます。表書きには代表者名を書き「外一同」などと添えます。別紙に全員の名前と金額を書いて同封するのが丁寧な作法です。' },
{ chapter:5, type:'ox', text:'「浄土（じょうど）」とは仏が清らかにした世界のことで、「極楽浄土」は阿弥陀仏の浄土を指す。', answer:true, explanation:'浄土は仏・菩薩が衆生を救うために設けた清浄な世界のことです。阿弥陀仏の浄土は「極楽浄土（西方極楽世界）」、薬師仏の浄土は「東方浄瑠璃世界」などがあります。浄土宗・浄土真宗は阿弥陀仏の極楽浄土への往生を目指します。' },
{ chapter:5, type:'ox', text:'「密教（みっきょう）」は公開された教えであり、誰でも自由に学ぶことができる。', answer:false, explanation:'密教の「密」は「秘密」を意味し、師から弟子への秘密の伝授（口伝・灌頂）によって伝えられる教えです。「顕教（けんきょう）」が経典として公開された教えなのに対し、密教は師資相承（師弟間の秘密の伝達）を重視します。' },
{ chapter:5, type:'ox', text:'「真言宗」の「護摩（ごま）」とは、火を使った密教の儀式で、煩悩を焼き尽くす意味がある。', answer:true, explanation:'護摩（梵語：ホーマ）は密教の重要な修法で、炉に火を焚き、木・米・胡麻などの供物を投入して燃やすことで煩悩を焼き尽くし、願いを成就させるとされます。不動明王を本尊として行う「不動護摩」が代表的です。' },
{ chapter:5, type:'ox', text:'「日蓮正宗（にちれんしょうしゅう）」は日蓮宗から派生した宗派で、創価学会はかつてこの宗派の信徒団体だった。', answer:true, explanation:'日蓮正宗は1290年頃に日興（にっこう）が日蓮の本弟子として開いた宗派で、総本山は富士山麓の大石寺（静岡県富士宮市）です。創価学会は元々日蓮正宗の信徒団体でしたが、1991年に対立が深まり破門されて独立しました。' },
{ chapter:5, type:'ox', text:'「おくり火（送り火）」はお盆の最終日（8月16日）に先祖の霊を送り出すために焚く火である。', answer:true, explanation:'送り火はお盆の終わり（8月16日）に先祖の霊があの世へ帰るのを見送るために焚く火です。迎え火（8月13日）の対となる慣習です。京都の「大文字焼き（五山の送り火）」は全国的に有名な送り火の行事です。' },
{ chapter:5, type:'ox', text:'「施主（せしゅ）」は仏教用語で、もともとは「布施（ふせ）をする人＝僧侶・寺院に財物を施す人」を意味する。', answer:true, explanation:'施主は梵語「ダーパティ」の訳で、本来は「布施をする在家信者（お金・食物などを僧侶に施す人）」という意味です。現代では葬儀・法要の費用を負担し手配する人（多くの場合、喪主と同一人物）を指す意味でも使われています。' },
{ chapter:5, type:'ox', text:'「開眼供養（かいげんくよう）」とは、新しく作った仏像・位牌・墓石などに魂（霊）を入れる儀式である。', answer:true, explanation:'開眼供養（開眼法要・魂入れ）は新しく仏像・位牌・墓石などを作った際に、僧侶が読経して「目を開く（魂・霊を入れる）」儀式です。これにより単なる物体が礼拝の対象となります。墓石を建てた際にも行われます。' },
{ chapter:5, type:'4', text:'「両祖（りょうそ）」という言葉で知られる曹洞宗の二人の宗祖は誰か。', choices:['道元と栄西','道元と瑩山紹瑾','最澄と空海','法然と親鸞'], answer:1, explanation:'曹洞宗では「両祖（りょうそ）」として道元（承陽大師）と瑩山紹瑾（常済大師）を崇敬します。道元が宗祖として曹洞宗を開き、瑩山が総持寺を開いて宗勢を大きく拡大したことから「中興の祖」と呼ばれます。' },
{ chapter:5, type:'4', text:'「禅宗」の葬儀における焼香の回数として一般的なものはどれか。', choices:['1回','2回','3回','5回'], answer:2, explanation:'曹洞宗・臨済宗などの禅宗では焼香を3回行うのが一般的な作法です。ただし地域・寺院・状況によって異なる場合もあります。浄土真宗（1〜2回）や浄土宗（1〜3回）などと比較して覚えましょう。' },
{ chapter:5, type:'4', text:'「五山（ごさん）」制度とは何か。', choices:['天台宗の五つの本山','鎌倉・室町幕府が定めた禅宗寺院の格付け制度','真言宗の重要寺院五か所','浄土宗の五つの大本山'], answer:1, explanation:'五山制度は鎌倉・室町幕府が臨済宗の重要寺院を格付けした制度で、京都五山（天龍寺・相国寺・建仁寺・東福寺・万寿寺）と鎌倉五山（建長寺・円覚寺・寿福寺・浄智寺・浄妙寺）があります。幕府の保護下で禅文化が発展しました。' },
{ chapter:5, type:'4', text:'「本山（ほんざん）」と「末寺（まつじ）」の関係として正しいものはどれか。', choices:['本山は古い寺院、末寺は新しい寺院','本山は宗派の中心となる寺院、末寺はその宗派に属する一般の寺院','本山は大きな寺院、末寺は小さな寺院','本山は東京の寺院、末寺は地方の寺院'], answer:1, explanation:'本山は宗派の中心・統括機関となる寺院（総本山・大本山など）で、宗祖ゆかりの地に建てられることが多いです。末寺はその宗派に属する一般の寺院で、本山の管轄下にあります。「本末関係（ほんまつかんけい）」と呼ばれます。' },
{ chapter:5, type:'4', text:'「無宗教葬（自由葬）」で避けるべき配慮として正しいものはどれか。', choices:['音楽を流すこと','特定の宗教の儀礼（読経・祝詞・讃美歌など）を押しつけないこと','献花を行うこと','司会者を設けること'], answer:1, explanation:'無宗教葬では参列者の宗教的背景が様々であることを考慮し、特定宗教の儀礼を強制しないことが重要です。音楽・献花・司会・映像などは宗教色のない演出として広く使われます。故人・遺族の意向を最大限尊重した式づくりが求められます。' },
{ chapter:5, type:'4', text:'「葬場祭（そうじょうさい）」とはどの宗教の葬儀用語か。', choices:['仏式','神式（神葬祭）','キリスト教式','無宗教葬'], answer:1, explanation:'葬場祭は神葬祭（神式葬儀）の中心的な儀式で、仏式の「葬儀・告別式」に相当します。斎主が祭詞を奏上し、参列者が玉串奉奠を行います。神葬祭の式次第は遷霊祭→発柩祭→葬場祭→火葬祭→帰家祭の順です。' },
{ chapter:5, type:'4', text:'「戒名料（かいみょうりょう）」についての正しい説明はどれか。', choices:['法律で定められた一定の金額がある','一般的に院号＞道号・戒名＞位号の順に高くなる傾向があり、金額は寺院・宗派によって大きく異なる','戒名料は仏教どの宗派でも同じ料金体系','戒名料は葬儀社が設定する'], answer:1, explanation:'戒名料は法律で定められた金額はなく、院号の有無・文字数・寺院との関係などによって大きく異なります。院号付きは数十万〜数百万円、一般的な戒名は数万〜数十万円程度が相場とされますが、寺院・地域・宗派によって様々です。' },
{ chapter:5, type:'4', text:'「神棚封じ（かみだなふうじ）」とはどういうものか。', choices:['神棚を撤去すること','死の穢れが神棚に及ばないよう、白い紙を貼って神棚を封じること','神棚に新しい神札を入れること','神棚の掃除をすること'], answer:1, explanation:'神棚封じは家人が亡くなった際に、死の穢れが神様に及ばないよう神棚の扉または正面に白紙（半紙）を貼って封じる慣習です。神道の「死穢（しえ）」の概念から来ており、忌明け（五十日祭後）に紙を取り外します。' },
{ chapter:5, type:'4', text:'「菩提寺（ぼだいじ）」の意味として正しいものはどれか。', choices:['悟りを開いた場所にある寺','その家の先祖代々の葬儀・法事を行い、遺骨・位牌を管理する縁の深い寺院','全国で最も格式の高い寺院','葬儀社が指定する提携寺院'], answer:1, explanation:'菩提寺とは、その家の先祖代々の葬儀・年忌法要を行い、墓地・位牌を管理する縁の深い寺院のことです。江戸時代の寺請制度に起源を持ち、現代でも「家の宗教」として続いています。菩提寺のある家では葬儀の際に菩提寺の住職に依頼するのが一般的です。' },
{ chapter:5, type:'4', text:'「三途の川（さんずのかわ）」について正しい説明はどれか。', choices:['神道の死後の世界に存在する川','仏教の死後の世界観で、死者がこの世からあの世へ渡る際に越えるとされる川','キリスト教の天国への道にある川','実在する河川の別名'], answer:1, explanation:'三途の川は仏教の死後の世界観で、死者が冥土へ向かう途中に渡るとされる川です。生前の行いによって渡り方が異なり（橋・浅瀬・深み）、川の番人「奪衣婆（だつえば）」と「懸衣翁（けんえおう）」が衣服を奪って罪の重さを量るとされます。' },
{ chapter:5, type:'4', text:'「冥土（めいど）」「黄泉（よみ）」「地獄（じごく）」の説明として正しいものはどれか。', choices:['すべて同じ場所を指す別の言葉','冥土は仏教の死後の世界、黄泉は日本神話の死者の国、地獄は冥土の中でも罪人が苦しむ場所','冥土はキリスト教用語、黄泉は仏教用語','地獄は現世の苦しい状態を表すだけで死後の世界ではない'], answer:1, explanation:'「冥土（冥途）」は仏教における死後の世界の総称、「黄泉（よもつひらさか）」は日本神話（古事記）に登場する死者が行く国、「地獄」は冥土の中で最も厳しい罰を受ける場所です。それぞれ由来する宗教・文化が異なります。' },
{ chapter:5, type:'4', text:'「仏壇（ぶつだん）」の本来の意味として正しいものはどれか。', choices:['先祖の位牌を飾る棚','家庭内に本尊（仏像）を安置し礼拝するための壇','葬儀場に設置する祭壇','お盆に精霊棚として使う棚'], answer:1, explanation:'仏壇は本来、家庭内に本尊（仏像・曼荼羅など）を安置して礼拝するための壇です。先祖の位牌を置く機能は後から加わったもので、「先祖を祀る場所」というイメージが強くなっていますが、本来は「本尊を礼拝する家庭の小さなお寺」です。' },
{ chapter:5, type:'4', text:'「宗派（しゅうは）」を確認することが葬儀準備で重要な理由として最も適切なものはどれか。', choices:['葬儀費用の計算のため','祭壇形式・焼香回数・経典・作法など式全体に関わるため','参列者へのご案内文作成のため','火葬場の予約のため'], answer:1, explanation:'宗旨宗派によって祭壇の形（白木/花）・焼香回数（1〜3回）・読む経典・引導の有無・数珠の形式・位牌の使用有無・戒名の呼称（戒名/法名）など、式全体に関わる多くの要素が異なります。葬儀施行の最重要確認事項のひとつです。' },
{ chapter:5, type:'4', text:'「檀那（だんな）」の語源として正しいものはどれか。', choices:['中国語で「主人」を意味する言葉','梵語（サンスクリット語）の「ダーナ（布施・施し）」に由来する','日本語の「旦那」から来た言葉','英語の「donor（寄付者）」から来た言葉'], answer:1, explanation:'「檀那（だんな）」は梵語のダーナ（dāna・布施・施し）が由来で、「寺院に布施をする在家信者（檀家）」を意味します。これが転じて「主人・旦那様」という意味でも使われるようになりました。「檀家（だんか）」も同じ語源です。' },
{ chapter:5, type:'4', text:'次の「宗派別・焼香回数」の組み合わせとして正しいものはどれか。', choices:['浄土真宗本願寺派：2回、真宗大谷派：1回','浄土真宗本願寺派：1回、真宗大谷派：2回','曹洞宗：1回、日蓮宗：3回','浄土宗：2回、天台宗：1回'], answer:1, explanation:'浄土真宗の焼香回数は本願寺派（西）が1回、大谷派（東）が2回です（いずれも額に押しいただかない）。曹洞宗・臨済宗は3回が一般的、浄土宗・天台宗・真言宗は1〜3回（宗派の指定あり）、日蓮宗は1回または3回が多いです。' },
// ===== ○× 問題（50問）=====
{chapter:6, type:'ox',text:'「白木祭壇（しらきさいだん）」は未塗装の白木で作られた仏式の伝統的な祭壇である。',answer:true,explanation:'白木祭壇は未塗装・無垢の木材（白木）で作られた仏式の伝統的な祭壇で、段飾り（3〜7段程度）に本尊・位牌・遺影・供物などを飾ります。近年は花祭壇に替わるケースも増えています。'},
{chapter:6, type:'ox',text:'「花祭壇（はなさいだん）」は生花・造花を使った現代的な祭壇で、故人の趣味や個性を反映できる。',answer:true,explanation:'花祭壇は生花を主体に構成された祭壇で、故人の好きな花・色・テーマを取り入れることができます。近年急増しており、白木祭壇に代わって標準的な選択肢となっています。'},
{chapter:6, type:'ox',text:'「棺（かん・ひつぎ）」は素材・形状によって火葬場での燃焼時間が変わる。',answer:true,explanation:'棺の素材（桐・松・その他木材）・形状・装飾の量によって、火葬時の燃焼時間・燃焼状態が異なります。火葬場では棺のサイズ・素材に規定がある場合があります。'},
{chapter:6, type:'ox',text:'「棺の種類」として「エンバイロタイプ（段ボール棺）」が使われることがある。',answer:true,explanation:'段ボール素材の棺（エコ棺・段ボール棺）は海外では普及しており、日本でも直葬・エコ葬などで使用されることがあります。燃えやすく・環境負荷が低いとされますが、普及率はまだ低いです。'},
{chapter:6, type:'ox',text:'「骨壺（こつつぼ）」は一般的に陶磁器製が多いが、素材に決まりはない。',answer:true,explanation:'骨壺（骨瓶）は陶磁器（磁器・陶器）が最も一般的ですが、金属製・木製・ガラス製・自然素材（和紙など）のものもあります。素材に法律上の規定はなく、デザイン・素材は多様です。'},
{chapter:6, type:'ox',text:'「位牌（いはい）」は宗教的な意味を持ち、すべての宗教で使用される。',answer:false,explanation:'位牌は仏教（主に禅宗・浄土宗などの日本仏教）で使用される礼拝具です。浄土真宗では原則使用しません。神式では「霊璽（れいじ）」、キリスト教式では十字架などを使用します。'},
{chapter:6, type:'ox',text:'「遺影写真（いえいしゃしん）」のサイズは決まっていて、A4サイズでなければならない。',answer:false,explanation:'遺影写真のサイズに法律上の規定はありません。一般的には額縁に入れた大きなサイズ（四切・A4相当）が祭壇用に使われますが、棺に入れる小さな遺影・位牌に添える小サイズなど様々です。'},
{chapter:6, type:'ox',text:'「焼香台（しょうこうだい）」は仏式葬儀でのみ使用される。',answer:true,explanation:'焼香台は抹香・香炉・炭などを置く仏式専用の道具です。神式では玉串奉奠、キリスト教式では献花と、宗教によって参拝の作法・道具が異なります。'},
{chapter:6, type:'ox',text:'「枕飾りの一膳飯（枕飯・まくらめし）」は、箸を立てずに出す。',answer:false,explanation:'枕飯は茶碗に山盛りに盛った白飯に、箸を垂直に立てたものです。日常では縁起が悪いとされる「箸立て」を、逆さごとの一つとして枕飾りでは行います。'},
{chapter:6, type:'ox',text:'「香典袋（こうでんぶくろ）」の水引は、仏式では「黒白」または「双銀」の結び切りが一般的である。',answer:true,explanation:'仏式の香典袋は黒白または双銀（全銀）の「結び切り（あわじ結び）」の水引を使います。結び切りは「一度結んだら解けない＝繰り返さない」意味で弔事に使います。紅白の蝶結びは慶事用です。'},
{chapter:6, type:'ox',text:'「造花（ぞうか）」は生花に比べて葬儀費用を抑えられるため、現代では広く使われている。',answer:true,explanation:'造花（プリザーブドフラワー含む）は生花より持ちが良く・管理が容易・費用を抑えられるため、祭壇装飾・供花に使用されることがあります。ただし高級葬儀では生花が基本です。'},
{chapter:6, type:'ox',text:'「供花（くげ・きょうか）」は、参列者から故人に贈る花のことである。',answer:true,explanation:'供花は故人への弔意を込めて贈る花で、葬儀式場に飾られます。参列者・会社・団体などから贈られ、生花を使った「フラワーアレンジメント」や「花輪（はなわ）」などの形があります。'},
{chapter:6, type:'ox',text:'「花輪（はなわ）」は葬儀・告別式の会場外（入口付近）に飾るのが一般的である。',answer:true,explanation:'花輪（フラワーリース）は葬儀場・斎場の入口付近・会場外に並べて飾るのが一般的です。贈り主の名札が付けられ、故人・喪家への弔意を示します。'},
{chapter:6, type:'ox',text:'「返礼品（かんれいひん）」のし紙の表書きは「志（こころざし）」が最も一般的である。',answer:true,explanation:'香典返し・会葬御礼ののし紙（掛け紙）の表書きは「志（こころざし）」が最も一般的です。関西では「粗供養（そくよう）」と書く場合もあります。のし紙の水引は黒白または双銀の結び切りです。'},
{chapter:6, type:'ox',text:'「白木位牌（仮位牌）」は葬儀終了後も永続的に仏壇に祀る。',answer:false,explanation:'白木位牌（野位牌・仮位牌）は葬儀から四十九日まで使う仮の位牌です。四十九日法要のタイミングで、漆塗り等の「本位牌（塗り位牌）」に替えるのが一般的です。'},
{chapter:6, type:'ox',text:'「葬具（そうぐ）」とは、葬儀に使用する道具・用品の総称である。',answer:true,explanation:'葬具は葬儀に使う道具・器具の総称で、棺・骨壺・位牌・遺影・香炉・燭台・花立・枕飾りセット・霊柩車用品など広範囲の用品が含まれます。'},
{chapter:6, type:'ox',text:'「龕（がん・かん）」とは、棺を運ぶための乗り物（輿）のことで、現代でも広く使用されている。',answer:false,explanation:'龕（がん）は昔の葬儀で棺を担いで運ぶための輿（こし）のことです。現代では霊柩車が普及したため、龕を使った葬儀はほぼ行われなくなりました。一部の地域的な伝統行事で見られることがあります。'},
{chapter:6, type:'ox',text:'「数珠（じゅず・ねんじゅ）」の主珠（おもだま）の数は、宗派によって異なる。',answer:true,explanation:'数珠（念珠）の主珠の数は宗派によって異なります。浄土宗は24珠・浄土真宗（西）は20珠・真言宗は108珠（本式）など、宗派ごとに形・数・使い方が定められています。略式の数珠は共通して使えるものが多いです。'},
{chapter:6, type:'ox',text:'「仏旗（ぶっき）」は葬儀式場に飾る赤い旗である。',answer:false,explanation:'仏旗は仏教のシンボルカラー（青・黄・赤・白・橙色の5色またはその組み合わせ）を使った旗で、葬儀会場や寺院に飾ることがあります。赤一色の旗ではありません。'},
{chapter:6, type:'ox',text:'「祭壇に供えるろうそくの色」は、仏式では白が基本とされる。',answer:true,explanation:'仏式葬儀の祭壇に使うろうそくは白が基本です。一部の法要（年忌法要など）では赤いろうそくを使う宗派・地域もあります（浄土真宗など）が、葬儀では白ろうそくが一般的です。'},
{chapter:6, type:'ox',text:'「輪袈裟（わげさ）」は僧侶が葬儀の際に着用する法衣の一部である。',answer:false,explanation:'輪袈裟は浄土真宗の門徒（信者）が儀礼の際に首にかける簡略化された袈裟で、僧侶の法衣の一部ではありません。僧侶は「七条袈裟」などの正式な袈裟を着用します。'},
{chapter:6, type:'ox',text:'「神棚（かみだな）」と「仏壇（ぶつだん）」を同じ部屋に置くことは禁じられている。',answer:false,explanation:'神棚と仏壇を同じ部屋に置くことを禁じる法律はありません。ただし「神仏を向かい合わせにしない」「神棚を仏壇より低い位置に置かない」など、礼儀として配慮すべき点はあります。'},
{chapter:6, type:'ox',text:'「龍彫棺（りゅうちょうかん）」など彫刻が施された棺は、火葬場で受け入れを断られる場合がある。',answer:false,explanation:'棺の彫刻・装飾自体は多くの火葬場で受け入れられますが、素材（金属・ガラス・プラスチック）や副葬品の種類・量によっては制限があります。彫刻のある棺の受け入れ可否は火葬場の規定によります。'},
{chapter:6, type:'ox',text:'「パネル展示（思い出コーナー）」は無宗教葬・自由葬でよく見られる演出である。',answer:true,explanation:'故人の写真・思い出の品・業績などをパネルや展示コーナーで紹介する演出は、無宗教葬・自由葬でよく行われます。参列者が故人を偲ぶ機会となり、葬儀を個性化する方法のひとつです。'},
{chapter:6, type:'ox',text:'「映像葬（えいぞうそう）」では故人の生前の映像・写真をスクリーンに映し出すことができる。',answer:true,explanation:'映像葬は生前の写真・動画をスライドショー・追悼映像として式中に上映する演出です。無宗教葬・自由葬に多く取り入れられており、参列者が故人の人生を振り返る感動的な場面を作れます。'},
{chapter:6, type:'ox',text:'「生花の持ち帰り」は葬儀後に参列者が行うことができる。',answer:true,explanation:'葬儀・告別式後の祭壇の生花は、遺族の許可のもと参列者が持ち帰ることができます。「お清めの花」として持ち帰る慣習のある地域もあります。'},
{chapter:6, type:'ox',text:'「祭壇の段数」は奇数（3・5・7段）が縁起が良いとされる。',answer:true,explanation:'日本の慣習では奇数（1・3・5・7）が「陽数（よう数）」として縁起が良いとされ、祭壇の段数も3・5・7段などの奇数が多く見られます。ただし現代の祭壇設計では必ずしも奇数にこだわらない場合もあります。'},
{chapter:6, type:'ox',text:'「喪服（もふく）」は必ず黒の礼服でなければならないという法律がある。',answer:false,explanation:'喪服（弔服）のデザイン・色について法律上の規定はありません。日本では慣習上黒の礼服・和服が正式とされますが、地域・宗教・故人の意向によっては色の制限が異なる場合もあります。'},
{chapter:6, type:'ox',text:'「のし紙（掛け紙）の表書き」は上に種類（志など）、下に贈り主の名前を書く。',answer:true,explanation:'のし紙（掛け紙）の書き方は上段に「志・粗供養・御礼」など表書き、下段（水引の下）に贈り主の氏名（または会社名）を書きます。'},
{chapter:6, type:'ox',text:'「白黒（黒白）の水引」は弔事全般に使用でき、仏式・神式・キリスト教式どれにも対応している。',answer:false,explanation:'黒白の水引は仏式・神式の弔事に一般的に使用されますが、キリスト教式では水引を使わない「白い封筒」が一般的です（御花料など）。また関西では黄白の水引を使う地域もあります。'},
{chapter:6, type:'ox',text:'「花祭壇の費用」は一般的に白木祭壇より高くなる傾向がある。',answer:true,explanation:'花祭壇は使用する生花の量・種類・デザインによって費用が変動し、豪華なものは白木祭壇より高額になる場合があります。ただしシンプルなものは白木祭壇と同程度か安価な場合もあります。'},
{chapter:6, type:'ox',text:'「柩台（ひつぎだい）・棺台」は棺を安置するための台で、式中は棺を直接床に置かない。',answer:true,explanation:'柩台（棺台）は葬儀中に棺を安置するための専用の台です。棺を床に直接置くことは礼儀上・衛生上からも避け、専用台に置きます。素材は木製・金属製など様々です。'},
{chapter:6, type:'ox',text:'「表白（ひょうびゃく）」とは、真言宗の葬儀で導師が読み上げる文章で、故人の略歴・戒名などを述べるものである。',answer:true,explanation:'表白は真言宗・天台宗などの葬儀で導師が読む文章で、故人の戒名・俗名・生年月日・功績などを仏前に申し述べる儀礼文です。他宗派でも類似の文章（疏文・そもん）が読まれます。'},
{chapter:6, type:'ox',text:'「葬儀の司会者」は必ず葬儀社のスタッフでなければならない。',answer:false,explanation:'葬儀の司会は葬儀社スタッフが行う場合が多いですが、遺族・知人・外部の司会業者が担当することもあります。特に無宗教葬・お別れ会では外部のプロ司会者を招くケースもあります。'},
{chapter:6, type:'ox',text:'「清め塩（きよめしお）」は神道の考え方に基づき、葬儀から帰宅した際に身を清めるために使う。',answer:true,explanation:'清め塩は神道の「死穢（しえ）」の考え方に基づき、葬儀から帰宅した際に玄関先で自分の体に振りかけて身を清める慣習です。ただし浄土真宗などでは死を穢れとみなさないため、会葬御礼に清め塩を入れない場合があります。'},
{chapter:6, type:'ox',text:'「浄土真宗では「清め塩」は不要とされる。',answer:true,explanation:'浄土真宗では死を穢れとする概念がないため、清め塩の慣習は不要・不適切とされています。浄土真宗の葬儀では会葬御礼に清め塩が入っていないことがあります。'},
{chapter:6, type:'ox',text:'「花環（はなかん）」と「花輪（はなわ）」は同じものを指す。',answer:true,explanation:'花環と花輪はどちらも円形（リング状）の花飾りで、葬儀場の入口付近に飾る弔意の花として使われます。呼び方は地域によって異なることがあります。'},
{chapter:6, type:'ox',text:'「ドライフラワー」は葬儀の副葬品として棺に入れることができる。',answer:true,explanation:'ドライフラワーは乾燥した植物素材で燃えやすく、一般的に副葬品として棺に入れられます。ただし大量に入れると火葬に影響するため適量が必要です。'},
{chapter:6, type:'ox',text:'「祭壇の設置・撤去」は通常、葬儀社が行う。',answer:true,explanation:'葬儀の祭壇設置・装飾・撤去は通常葬儀社（または専門の葬儀施工業者）が担当します。葬儀終了後の片付け・生花の処理も葬儀社が行うのが一般的です。'},
{chapter:6, type:'ox',text:'「供物（くもつ）」として菓子折り・線香・ろうそく・缶詰などを贈ることができる。',answer:true,explanation:'供物（お供え物）として菓子折り・線香・ろうそく・缶詰（果物の缶詰など）を贈ることは一般的です。線香・ろうそくは仏式に適しており、神式では食品・お酒・果物なども適します。'},
{chapter:6, type:'ox',text:'「盆提灯（ぼんちょうちん）」は葬儀の祭壇に飾るものである。',answer:false,explanation:'盆提灯はお盆の際に先祖の霊を導くために仏壇近くや縁側に飾るものです。葬儀の祭壇に飾るものではありません。ただし初盆（新盆）の法要では白提灯を飾る慣習があります。'},
{chapter:6, type:'ox',text:'「葬儀の祭壇」は宗教・宗派によって形式・飾り方が異なる。',answer:true,explanation:'仏式（白木祭壇・花祭壇）・神式（神式祭壇・八足台）・キリスト教式（十字架・花による装飾・シンプルな台）など、宗教・宗派によって祭壇の形式・構成・飾り物が大きく異なります。'},
{chapter:6, type:'ox',text:'「和型墓石（わがたぼせき）」は日本で最も一般的な墓石の形状である。',answer:true,explanation:'「○○家之墓」などと縦書きされた縦長の「和型墓石（棹石型）」は日本で最もよく見られる墓石の形式です。近年は洋型（横型）・デザイン型なども増加しています。'},
{chapter:6, type:'ox',text:'「永代供養墓（えいたいくようぼ）」は個人の墓石が不要で、複数の人が合葬される。',answer:true,explanation:'永代供養墓は寺院・霊園が管理を引き受け、個別の墓石なしに複数の人の遺骨を一か所に納める合葬・合祀型の墓です。後継者・管理者が不要なため近年急増しています。'},
{chapter:6, type:'ox',text:'「輿（こし）」を使った葬列は現代日本でも広く行われている。',answer:false,explanation:'かつての葬列では棺を輿（こし）に載せて担いで運んでいましたが、霊柩車の普及によりほぼ廃れました。現代で輿を使った葬列が見られるのは一部の伝統行事・時代劇などに限られます。'},
{chapter:6, type:'ox',text:'「葬儀の受付（うけつけ）」は遺族が担当するのが正式とされる。',answer:false,explanation:'葬儀の受付は一般的に故人の友人・会社の同僚など「世話人・手伝いの方」が担当します。遺族は弔問客への挨拶・式の進行・各所への対応に専念するため、受付は第三者に委ねるのが一般的です。'},
{chapter:6, type:'ox',text:'「お清め（おきよめ）」として振る舞われるお酒・食事は、通夜振舞い（通夜ぶるまい）と同義である。',answer:true,explanation:'通夜の後に参列者に振る舞う飲食（お清め）は「通夜振舞い」と同義で使われます。故人を偲びながら歓談する場でもあり、遺族がお礼を伝える機会にもなっています。'},

// ===== 4択 問題（50問）=====
{chapter:6, type:'4',text:'「白木祭壇」の特徴として正しいものはどれか。',choices:['生花を多用した現代的な祭壇','未塗装の白木で作られた段飾りの伝統的な仏式の祭壇','神式葬儀専用の祭壇','キリスト教式で使用する白い壁の祭壇'],answer:1,explanation:'白木祭壇は白木（未塗装の木材）で作られた段飾りの仏式伝統的な祭壇です。本尊・位牌・遺影・供物を飾り付けます。近年は花祭壇への移行が進んでいますが、伝統的な選択肢として今も使用されます。'},
{chapter:6, type:'4',text:'「棺（かん）の種類」として誤っているものはどれか。',choices:['六角棺（ろっかくかん）','布張棺（ぬのばりかん）','鉄製棺','桐棺（きりかん）'],answer:2,explanation:'棺の主な種類は桐・松などの木材を使った「木棺」で、形状（六角形・四角）・仕上げ（布張り・彫刻）によって様々あります。鉄製棺は火葬場での使用が困難（金属残留・炉への損傷）で一般的ではありません。'},
{chapter:6, type:'4',text:'「副葬品として棺に入れられる量の目安」として正しいものはどれか。',choices:['制限なし、好きなだけ入れられる','火葬場の規定に従い、燃えるもの・金属や危険物でないものを適量','液体以外なら何でも入れられる','食品のみ入れられる'],answer:1,explanation:'副葬品は①燃えるもの（紙・木・布・花）②危険物でないもの（金属・プラスチック・ガラス・爆発物は不可）を③火葬場の規定に沿った量で入れます。大量の紙・厚い本なども火葬に支障をきたす場合があります。'},
{chapter:6, type:'4',text:'「数珠の持ち方」として仏式葬儀での正しい持ち方はどれか。',choices:['右手一本に全部かける','左手または両手に輪をかけて合掌する','首にかける','焼香の際は下に置く'],answer:1,explanation:'数珠は一般的に左手または両手に輪をかけて合掌します。焼香の際も持ったまま（左手または両手）行います。宗派によって房の位置・持ち方が異なりますが、基本は手に掛けて使用します。'},
{chapter:6, type:'4',text:'「位牌（いはい）」に記す内容として一般的に含まれないものはどれか。',choices:['戒名（法名）','没年月日','俗名（生前の名前）','故人の銀行口座番号'],answer:3,explanation:'位牌に記す内容は①戒名（または法名）②没年月日（干支を含む場合も）③俗名（本名）④享年（行年）が一般的です。銀行口座番号などの財産情報は記しません。'},
{chapter:6, type:'4',text:'「香典袋の選び方（仏式・四十九日前）」として正しいものはどれか。',choices:['紅白の蝶結びの水引','白黒または双銀の結び切りの水引','水引なしの白封筒','黒金の結び切りの水引'],answer:1,explanation:'仏式の葬儀（四十九日前）の香典袋は白黒または双銀の「結び切り（あわじ結び）」の水引を使います。蝶結びは慶事用・繰り返し可能なものに使用し、弔事には使いません。'},
{chapter:6, type:'4',text:'「会葬礼状（かいそうれいじょう）」の内容として一般的なものはどれか。',choices:['葬儀費用の明細','参列への感謝・故人の略歴・喪主名・日付を記した礼状','香典返しの品物リスト','葬儀社のサービス案内'],answer:1,explanation:'会葬礼状は葬儀に参列してくれた方への感謝状で、①参列への感謝の言葉②故人の名前・没年月日③喪主名④日付を記した文書です。会葬御礼の品物と一緒に渡します。'},
{chapter:6, type:'4',text:'「のし（熨斗）」について正しいものはどれか。',choices:['弔事（香典・返礼品）にはのしをつける','のしはアワビを乾燥させたものが起源で、慶事に用い弔事には用いない','のしは必ず金色でなければならない','のしは外国では使用できない'],answer:1,explanation:'のし（熨斗）はアワビを薄く延ばして乾燥させたものが起源の縁起物で、慶事の贈り物に添えます。弔事（香典返しなど）にはのしをつけません（「のしなし・のし紙なし」が弔事の作法）。掛け紙は使いますがのしはつけません。'},
{chapter:6, type:'4',text:'「祭壇の規模」を決める主な要素はどれか。',choices:['式場の壁の色','参列者数・予算・故人の希望・式場のサイズ','担当スタッフの好み','開催する曜日'],answer:1,explanation:'祭壇の規模・グレードは①参列者数（大規模な葬儀には大きな祭壇）②予算③故人・遺族の希望（シンプル・豪華）④式場のサイズに合わせて決めます。'},
{chapter:6, type:'4',text:'「骨壺の収骨後の扱い」として一般的なものはどれか。',choices:['すぐに墓地に埋葬する','自宅の仏壇・祭壇に安置し、四十九日後に納骨するのが一般的','火葬場に預ける','役所に届け出て処分する'],answer:1,explanation:'骨上げ後の骨壺は自宅・仏壇・祭壇（後飾り壇）に安置し、四十九日の法要後に墓地・納骨堂に納骨するのが一般的な流れです。'},
{chapter:6, type:'4',text:'「後飾り壇（あとかざりだん）」とはどういうものか。',choices:['葬儀当日のみ使う祭壇','納骨が終わるまで（主に四十九日まで）自宅に設ける遺骨・位牌を安置する壇','お盆に飾る精霊棚','結婚式の祝い台'],answer:1,explanation:'後飾り壇（中陰壇・しょうりょうだな）は葬儀後から納骨（四十九日）まで自宅に設ける壇で、骨壺・位牌（仮）・遺影を安置し、線香・花・供物を供えます。七日ごとの法要もこの壇の前で行います。'},
{chapter:6, type:'4',text:'「棺の蓋を閉める儀式（釘打ちの儀）」について正しいものはどれか。',choices:['葬儀社スタッフのみが行う','遺族・親族が石（または木槌など）で棺の釘を打つ伝統的な儀礼','参列者全員が行う','火葬場で行う'],answer:1,explanation:'釘打ちの儀は棺の蓋を閉め、遺族・親族が石（小石・拳大の石）または木槌で棺の釘を打つ仏式の伝統的な儀礼です。「縁起の悪い方向（左手など）から打つ」など地域差もあります。近年は省略される場合も増えています。'},
{chapter:6, type:'4',text:'「神式葬儀で使用する「八足台（やつあしだい）」とは何か。',choices:['棺を運ぶための輿（こし）','8本の足を持つ神具の台で、供物・玉串などを置く','骨壺を安置する台','神主が立つ台'],answer:1,explanation:'八足台は8本の脚を持つ神道の祭壇・供物台で、神式葬儀（神葬祭）の際に供物・玉串・神具などを置くために使用します。神社の拝殿でも見られる神道特有の道具です。'},
{chapter:6, type:'4',text:'「遺影写真の加工」として現代では一般的に行われていることはどれか。',choices:['白黒写真への変換（必須）','デジタル技術による背景変更・サイズ拡大・肌の整え・衣装の変更など','鉛筆画への変換','3Dプリントによる立体化'],answer:1,explanation:'現代の遺影写真はデジタル技術を使って①背景の変更（無地・お気に入りの場所など）②衣装の差し替え（礼服・着物への変換）③サイズ拡大④顔の整えなどの加工が一般的に行われます。'},
{chapter:6, type:'4',text:'「花祭壇のデザイン」で故人の個性を表現する方法として適切でないものはどれか。',choices:['故人の好きな花・色を取り入れる','趣味・職業をモチーフにしたデザイン','法律で定められた標準デザイン','メッセージボードの設置'],answer:2,explanation:'花祭壇のデザインを法律で定めた標準規格というものはありません。故人の個性を表現するために①好きな花・色②趣味・職業のモチーフ③故人ゆかりのオブジェ・写真④遺族のメッセージなど自由なデザインが可能です。'},
{chapter:6, type:'4',text:'「焼香の抹香」を指で押しいただく（額に当てる）かどうかについて正しいものはどれか。',choices:['すべての宗派で押しいただく','浄土真宗は押しいただかず、多くの宗派は押しいただく','すべての宗派で押しいただかない','キリスト教式のみ押しいただく'],answer:1,explanation:'焼香の作法は宗派によって異なり、浄土真宗（本願寺派・大谷派）は抹香を「押しいただかずに」香炉にくべます。他の多くの宗派（天台宗・真言宗・浄土宗・禅宗など）は一般的に1〜3回、抹香を指でつまみ押しいただいてからくべます。'},
{chapter:6, type:'4',text:'「供花（きょうか）」を贈る際の一般的な方法として正しいものはどれか。',choices:['遺族に直接花束を持参する','葬儀社または花屋に連絡し、式場への配送を手配する','香典袋に入れて渡す','葬儀終了後に届ける'],answer:1,explanation:'供花（スタンド花・アレンジメント）を贈る際は、葬儀社または提携花店に連絡して式場への直接配送を手配するのが一般的です。式の前日〜当日午前中に届くよう手配します。'},
{chapter:6, type:'4',text:'「清め塩」を会葬御礼に入れない理由として正しいものはどれか。',choices:['塩は高価なため','浄土真宗では死を穢れとみなさないため（または宗教的な理由から）','清め塩の製造が難しいため','法律で禁止されているため'],answer:1,explanation:'浄土真宗では死を穢れとする考えがないため、清め塩の慣習を否定しています。また、死を穢れとみなすことへの宗教的観点から、宗派を問わず清め塩を入れないことを選択する葬儀も増えています。'},
{chapter:6, type:'4',text:'「霊柩車の種類」として近年増加しているものはどれか。',choices:['宮型（神社・仏閣様の豪華な装飾付き）','洋型（シンプルなリムジン・ワゴン型）','馬車型','自転車型'],answer:1,explanation:'近年は住宅街での違和感・故人らしさを求めるニーズ・デザインの変化から、シンプルな「洋型霊柩車」が増加傾向にあります。宮型は減少しており、地域によっては見かけなくなってきています。'},
{chapter:6, type:'4',text:'「棺の大きさ（寸法）」の決め方として正しいものはどれか。',choices:['すべて同じサイズ','故人の身長・体格に合わせたサイズを選ぶ','法律で全国統一サイズが定められている','遺族の好みだけで決める'],answer:1,explanation:'棺は故人の身長・体格に合わせたサイズを選びます。日本棺の標準的なサイズは内寸で長さ170〜200cm程度ですが、体格に応じて特注の大きめのものを用意することもあります。火葬炉のサイズにも合致することが必要です。'},
{chapter:6, type:'4',text:'「布（ぬの）張り棺（ぬのばりかん）」の特徴として正しいものはどれか。',choices:['木製の棺を布で包んだもので、主に仏式で使用される伝統的な形式','プラスチック製の棺','段ボール製の棺の別称','金属製の棺'],answer:0,explanation:'布張棺は木製の棺の表面に布（多くは白または紫の布）を貼った棺で、仏式葬儀で伝統的に使用されます。彫刻が施された棺・天板に蓮の花などが描かれた棺など、様々なデザインがあります。'},
{chapter:6, type:'4',text:'「遺影写真の準備」として最も良いタイミングはどれか。',choices:['亡くなってから急いで探す','生前から「この写真を使ってほしい」という写真を選んでおく（終活の一環）','葬儀社が用意する','特に準備しなくていい'],answer:1,explanation:'遺影写真は生前に「この写真を使ってほしい」という希望の写真をあらかじめ選んでおくのが最善です（終活の一環）。急な死の場合に慌てずに済み、故人の希望を反映できます。近年は終活フォト撮影サービスも普及しています。'},
{chapter:6, type:'4',text:'「骨壺のサイズ」が地域によって異なる理由として正しいものはどれか。',choices:['地域によって骨の大きさが異なるため','東日本は全収骨（大きいサイズが必要）、西日本は部分収骨（小さいサイズで十分）の違いによる','製造業者が地域で異なるため','法律で地域ごとのサイズが定められているため'],answer:1,explanation:'東日本では遺骨をほぼすべて収骨する「全収骨（7〜8寸の大きい骨壺）」、西日本では一部の骨のみ収骨する「部分収骨（3〜6寸の小さい骨壺）」が一般的なため、骨壺のサイズが地域によって異なります。'},
{chapter:6, type:'4',text:'「焼香の向き（祭壇への礼の方向）」として正しいものはどれか。',choices:['祭壇に背を向けて焼香する','焼香台の前で祭壇（遺影・位牌）に向かって焼香・合掌する','遺族席に向かって焼香する','会場の出口に向かって焼香する'],answer:1,explanation:'焼香は焼香台の前に進み、祭壇（遺影・位牌・本尊）に正面から向いて焼香・合掌します。焼香後は祭壇に背を向けずに（後ずさりするように）退くのが丁寧な作法です。'},
{chapter:6, type:'4',text:'「葬儀式場（葬祭ホール）の設備」として一般的に備わっているものはどれか。',choices:['プール施設','祭壇室（式場）・控室・安置室・駐車場・受付スペース','飲食店','宿泊施設'],answer:1,explanation:'一般的な葬祭ホールには式場（祭壇を設ける部屋）・控室（遺族・親族の待機）・安置室（遺体の安置）・受付スペース・駐車場などが備わっています。規模・グレードによっては宿泊機能も備える斎場もあります。'},
{chapter:6, type:'4',text:'「葬儀費用の内訳」として「式場費」に含まれる一般的なものはどれか。',choices:['お布施（僧侶への謝礼）','式場使用料・祭壇設営費・音響・照明費など','香典返しの品代','火葬料'],answer:1,explanation:'式場費（葬儀費用の内訳）には式場使用料・祭壇設営費・音響設備・照明・受付設備費などが含まれます。お布施（宗教者への謝礼）・香典返し・火葬料などは別途実費として計上されます。'},
{chapter:6, type:'4',text:'「葬儀の「祭具（さいぐ）」として正しいものはどれか。',choices:['位牌・香炉・燭台・花立・りん・木魚など、儀式に使用する器具類','葬儀費用の伝票','葬儀社の制服','会葬御礼の品物'],answer:0,explanation:'祭具（仏具・神具）は儀式に使用する器具・道具の総称で、位牌・香炉・燭台（ろうそく立て）・花立・鈴（りん）・木魚・数珠・焼香台などが含まれます。'},
{chapter:6, type:'4',text:'「葬儀のBGM（音楽）」の著作権について正しいものはどれか。',choices:['葬儀での音楽使用は著作権の対象外','著作権の存在する楽曲を式場で使用する場合、著作権使用料の支払いが必要なことがある','お経・賛美歌は著作権がないので自由に使える','式場内での個人使用は著作権法の適用外'],answer:1,explanation:'著作権存続中の楽曲を葬儀式場で演奏・再生する行為は著作権法上の「演奏権・上映権」が関係し、JASRACへの届出・使用料が必要な場合があります。パブリックドメインの楽曲（著作権切れ）は自由に使用できます。'},
{chapter:6, type:'4',text:'「受付係（受付担当者）」の主な役割として正しいものはどれか。',choices:['読経を行う','参列者を迎える・芳名帳への記帳案内・香典の受け取り・会葬御礼の配布・式場内への案内','葬儀の司会進行','棺の搬送'],answer:1,explanation:'受付担当者（世話係・手伝い）の主な役割は①参列者を丁寧に迎える②芳名帳（会葬者名簿）への記帳案内③香典の受け取り・整理④会葬御礼の配布⑤式場内・控室への案内などです。'},
{chapter:6, type:'4',text:'「葬儀の「ご挨拶（喪主挨拶）」に含める内容として一般的なものはどれか。',choices:['葬儀費用の詳細報告','参列への感謝・故人の最期の様子・今後の法要案内など','他の葬儀社への批評','政治・宗教の主張'],answer:1,explanation:'喪主挨拶の一般的な内容は①ご参列への感謝②故人の臨終・入院の状況③故人の人柄・エピソード④生前のご厚誼への感謝⑤今後の法要・連絡先の案内などで、簡潔（3〜5分以内）にまとめます。'},
{chapter:6, type:'4',text:'「葬儀の「会葬者芳名録（芳名帳）」の目的として正しいものはどれか。',choices:['葬儀費用の計算','参列者の氏名・住所を記録し、後日の礼状・返礼品送付に活用する','法律上の届出書類','税務署への報告'],answer:1,explanation:'芳名帳（会葬者名簿）は参列者に氏名・住所・会社名を記入してもらう帳簿で、後日の会葬礼状の送付・香典返しの配送・遺族が参列者を把握するための大切な記録です。'},
{chapter:6, type:'4',text:'「葬儀の「弔辞（ちょうじ）」の長さの目安として適切なものはどれか。',choices:['1分以内','3〜5分程度','10〜15分','30分以上'],answer:1,explanation:'弔辞の適切な長さは3〜5分程度（原稿用紙2〜3枚分）が一般的な目安です。長すぎると参列者・遺族に負担をかけます。故人との思い出・功績・別れの言葉などを簡潔にまとめます。'},
{chapter:6, type:'4',text:'「葬儀における「喪章（もしょう）」を着用する人として正しいものはどれか。',choices:['参列者全員','喪主・遺族・世話係・葬儀委員長など葬儀の中心関係者','僧侶のみ','葬儀社スタッフのみ'],answer:1,explanation:'喪章（黒いリボン・腕章・バッジなど）は喪主・遺族・親族・世話役・社葬の場合は葬儀委員長などが着用します。参列者全員が着用するわけではありません。'},
{chapter:6, type:'4',text:'「葬儀の「式辞（しきじ）」とはどういうものか。',choices:['弔辞と同じもの','葬儀委員長や施主が葬儀の始まりに述べる挨拶・開式の辞','僧侶が読む引導文','参列者全員に配布する式次第の説明書'],answer:1,explanation:'式辞は葬儀委員長・施主などが葬儀の開会に際して述べる挨拶（開式の辞）で、主に社葬などの大規模な葬儀で行われます。弔辞（故人への別れの言葉）とは異なります。'},
{chapter:6, type:'4',text:'「葬儀の「献奏（けんそう）」とはどういうものか。',choices:['参列者が香典を捧げること','音楽演奏を故人に捧げること（無宗教葬・音楽葬でよく行われる）','花を供えること','読経の一部'],answer:1,explanation:'献奏とは音楽演奏を故人に捧げる行為です。無宗教葬・音楽葬では生演奏（弦楽四重奏・ピアノなど）や録音による音楽を流す「献奏」が式の中心的な演出になることがあります。'},
{chapter:6, type:'4',text:'「葬儀費用の「基本パッケージ」に含まれないことが多いものはどれか。',choices:['棺','祭壇','お布施・飲食費・返礼品・火葬料などの実費','霊柩車'],answer:2,explanation:'葬儀の基本パッケージ（セット）に含まれる主な項目は棺・祭壇・霊柩車・骨壺などですが、お布施（宗教者への謝礼）・飲食費（通夜振舞い・精進落とし）・返礼品・火葬料などは「実費」として別途かかることが多いです。'}
,

{ chapter:6, type:'ox', text:'「禅（ぜん）」とはサンスクリット語の「ディヤーナ（瞑想）」に由来する言葉である。', answer:true, explanation:'「禅」は梵語（サンスクリット語）の「ディヤーナ（dhyāna）」が中国語で「禅那（ぜんな）」と音写され、「禅」と略されたものです。「瞑想・禅定」という意味で、坐禅（坐った瞑想）の実践を通じて悟りを目指す修行法を指します。' },
{ chapter:6, type:'ox', text:'「臨済宗妙心寺派」は日本最大の臨済宗の派で、全国に約3500か寺の末寺を持つ。', answer:true, explanation:'臨済宗は現在14の派に分かれており、その中で最大勢力を持つのが妙心寺派（総本山：妙心寺、京都市右京区）です。臨済宗は室町幕府の保護を受け、五山制度のもとで文化的にも大きな役割を果たしました。' },
{ chapter:6, type:'ox', text:'「道元」は永平寺を開いた後、一度も比叡山に戻ることなく越前（福井県）で一生を終えた。', answer:false, explanation:'道元は永平寺開山後、1247年に鎌倉幕府の執権・北条時頼に招かれて鎌倉に下向しましたが、約半年で帰山しました。また1253年に病を得て京都に上り、在京中に53歳で入寂（死去）しました。' },
{ chapter:6, type:'ox', text:'「法然」の弟子である「親鸞」は、師の教えをより徹底させ「他力本願」の思想を発展させた。', answer:true, explanation:'法然が「専修念仏」（ひたすら念仏を称えること）を説いたのに対し、親鸞はさらにそれを深め、自己の力（自力）を完全に捨て阿弥陀仏の働き（他力）にすべてを委ねる「絶対他力」の思想を確立しました。主著は「教行信証」です。' },
{ chapter:6, type:'ox', text:'浄土真宗の「歎異抄（たんにしょう）」は親鸞自身が書いた著作である。', answer:false, explanation:'歎異抄は親鸞の弟子・唯円（ゆいえん）が書いたとされる書物で、師・親鸞の言葉を記録しその教えの歪みを嘆いた内容です。「善人なほもて往生をとぐ、いはんや悪人をや」という言葉（悪人正機）が有名で、親鸞の著作ではありません。' },
{ chapter:6, type:'ox', text:'「日蓮宗」では、日蓮の遺骨が納められた身延山が聖地とされ、多くの信者が参詣に訪れる。', answer:true, explanation:'日蓮上人は身延山（山梨県）で晩年の約9年を過ごし、1282年に入滅しました。身延山久遠寺には日蓮の御廟所（お墓）があり、日蓮宗の総本山として多くの参詣者が訪れます。「身延詣り」は日蓮宗信者の重要な巡礼です。' },
{ chapter:6, type:'ox', text:'「真言宗」の「真言（マントラ）」は、意味を理解して唱えることが重要とされる。', answer:false, explanation:'真言（マントラ）は密教において「秘密の言葉」とされ、意味を論理的に理解して唱えることより、音（声）そのものに神聖な力があると考えられています。梵語のまま唱えることが重視され、翻訳しないことが原則です。' },
{ chapter:6, type:'ox', text:'「四弘誓願（しぐせいがん）」は、菩薩（悟りを求める者）が立てる四つの誓いで、多くの宗派の葬儀でも唱えられる。', answer:true, explanation:'四弘誓願とは①衆生無辺誓願度（すべての衆生を救う）②煩悩無尽誓願断（すべての煩悩を断つ）③法門無量誓願学（すべての法門を学ぶ）④仏道無上誓願成（最高の仏道を成就する）の四つです。多くの宗派の法要で唱えられます。' },
{ chapter:6, type:'ox', text:'「浄土宗」の増上寺（東京）は、徳川将軍家の菩提寺として知られる。', answer:true, explanation:'増上寺（東京都港区）は浄土宗の大本山で、徳川家康が江戸入府後に菩提寺と定めました。2代秀忠・6代家宣・7代家継・9代家重・12代家慶・14代家茂の将軍とその家族が埋葬されています。' },
{ chapter:6, type:'ox', text:'「臨済宗」の「公案（こうあん）」は、論理的な思考で解くことができる哲学的な問いかけである。', answer:false, explanation:'公案は「隻手の声を聞け」「父母未生以前の本来の面目とは何か」など、論理的・概念的思考では解けない問いです。これに取り組むことで思考の限界を超え、直接的な悟りの体験（見性）を目指すのが臨済宗の修行法です。' },

// --- 神式深掘り ---
{ chapter:6, type:'ox', text:'神道の「八百万（やおよろず）の神」とは、自然・万物すべてに神が宿るという考え方を表す。', answer:true, explanation:'「八百万の神」は日本神道の多神教的・アニミズム的な世界観を象徴する表現で、山・川・海・木・動物・人間など自然界のすべてに神が宿ると考えます。「八百万」は無数に多いという意味の表現です。' },
{ chapter:6, type:'ox', text:'神式葬儀では「御神酒（おみき）」を供えるのが一般的であるが、火葬後は供えない。', answer:false, explanation:'神式葬儀では故人への供え物（神饌・しんせん）として御神酒・米・塩・水・野菜・魚などを供えます。火葬後（火葬祭・帰家祭）でも御神酒を含む供え物を捧げます。供え物を控える特定の場面はありますが「火葬後は供えない」というルールはありません。' },
{ chapter:6, type:'ox', text:'「伊勢神宮（内宮）」の御祭神は、天照大御神（あまてらすおおみかみ）である。', answer:true, explanation:'伊勢神宮の内宮（皇大神宮）の御祭神は天照大御神で、太陽の神・皇室の祖先神として日本神道の最高位に位置づけられます。外宮（豊受大神宮）の御祭神は豊受大御神（食物・農業の神）です。' },
{ chapter:6, type:'ox', text:'神葬祭における「斎主（さいしゅ）」は仏式の「導師（僧侶）」に相当する役割を担う。', answer:true, explanation:'斎主は神葬祭を主宰する神職のことで、仏式の導師（葬儀を主宰する僧侶）に相当します。祝詞（のりと）の奏上・各種の儀礼の執行など、式全体を取り仕切ります。' },
{ chapter:6, type:'ox', text:'神道では「穢れ（けがれ）」を払うために「禊（みそぎ）」を行う。', answer:true, explanation:'禊（みそぎ）は水で身体を洗い清めることで穢れを祓う神道の浄化儀礼です。伊邪那岐命が黄泉の国から戻った際に禊を行ったという神話が起源とされます。現代の神式葬儀後の「清祓」も穢れを払う儀礼のひとつです。' },

// --- キリスト教深掘り ---
{ chapter:6, type:'ox', text:'「カトリック」とはギリシャ語で「普遍的な」という意味である。', answer:true, explanation:'「カトリック（Catholic）」はギリシャ語「カトリコス（katholikos）」に由来し、「普遍的な・全体にわたる」という意味です。「普遍教会（普遍的なキリストの教会）」という意味でカトリックと呼ばれます。' },
{ chapter:6, type:'ox', text:'「プロテスタント」という名称は、16世紀の宗教改革において改革派が旧体制に「抗議（プロテスト）」したことに由来する。', answer:true, explanation:'「プロテスタント」は1529年のシュパイヤー帝国議会でカトリック側の決定に対してルター派諸侯が「抗議（Protestatio）」したことに由来します。現在は「プロテスト（抗議）」という意味よりも、宗教改革から生まれたキリスト教各派の総称として使われています。' },
{ chapter:6, type:'ox', text:'日本のキリスト教人口は総人口の約30%を占める。', answer:false, explanation:'日本のキリスト教人口は総人口の約1〜2%程度とされており、非常に少数派です（カトリック・プロテスタント・正教会などを合わせて）。仏教徒（約67〜70%）・神道（約70〜80%、重複含む）と比べて大幅に少ない数字です。' },
{ chapter:6, type:'ox', text:'「正教会（せいきょうかい）」は東方キリスト教の一派で、ロシア正教・ギリシャ正教などがある。', answer:true, explanation:'正教会（Eastern Orthodox Church）は1054年のキリスト教大分裂でカトリックと分かれた東方キリスト教の流れで、ロシア正教会・ギリシャ正教会・日本正教会（ハリストス正教会）などがあります。日本では幕末に伝来しました。' },
{ chapter:6, type:'ox', text:'キリスト教の「臨終の秘跡（病者の塗油）」は、死が迫った時に司祭が行う儀礼でカトリックのみの慣行である。', answer:true, explanation:'病者の塗油（かつての「終油の秘跡」）はカトリックの七つの秘跡（サクラメント）のひとつで、重篤な患者や臨終の際に司祭が聖油を塗り祈る儀礼です。プロテスタントは一般的にこのような秘跡の制度を持ちません。' },

// --- 新宗教・諸派深掘り ---
{ chapter:6, type:'ox', text:'「天理教」では死を「出直し（でなおし）」と表現し、現世での修行を終えて神のもとへ帰ると考える。', answer:true, explanation:'天理教では人の死を否定的に捉えず、「神から借りていた体を返し、魂が生まれ直す（出直す）」という積極的な意味を持たせています。このため葬儀の場でも「死」「亡くなる」などの言葉を使わず「出直す」と言います。' },
{ chapter:6, type:'ox', text:'「霊友会（れいゆうかい）」は仏教系の新宗教で、現在も多くの派生宗教を生み出している。', answer:true, explanation:'霊友会（1919年創設）は法華経と先祖供養を基本とする新宗教で、立正佼成会・仏所護念会・妙智会など多くの派生宗教（分派）を生み出しました。これらをまとめて「霊友会系」と呼ぶこともあります。' },
{ chapter:6, type:'ox', text:'「世界救世教（せかいきゅうせいきょう）」は岡田茂吉が開いた新宗教で、「浄霊（じょうれい）」と呼ばれる手かざし療法が特徴である。', answer:true, explanation:'世界救世教は1935年に岡田茂吉（もきち）が開いた新宗教で、「光」を手から放射して病気を治す「浄霊」が特徴的な実践です。MOA美術館（静岡・東京）の運営でも知られます。' },
{ chapter:6, type:'ox', text:'「生長の家（せいちょうのいえ）」は谷口雅春が開いた新宗教で、「神の子」として人間の完全性を説く。', answer:true, explanation:'生長の家は1930年に谷口雅春が開いた新宗教で、「人間は神の子であり本来完全・善・美である」という「神人不二」の思想を説きます。雑誌「生長の家」の出版・「聖使命」誌などを通じて広まりました。' },
{ chapter:6, type:'ox', text:'「神社神道」と「教派神道」は同じものである。', answer:false, explanation:'神社神道は全国の神社・神宮で行われる伝統的な神道です。教派神道は明治時代に政府が公認した天理教・金光教・黒住教など13の宗教団体を指します。神社神道は国家管理下に置かれ（戦前）、教派神道は民間宗教として別扱いされました。' },
{ chapter:6, type:'ox', text:'「黒住教（くろずみきょう）」は江戸時代後期に岡山で成立した神道系の新宗教で、太陽神・天照大御神への信仰が中心である。', answer:true, explanation:'黒住教は1814年に岡山の神官・黒住宗忠が「天命直授（てんめいじきじゅ）」の神秘体験を経て開いた神道系新宗教です。太陽（天照大御神）への信仰と感謝を中心に、明るく積極的な生き方を説きます。教派神道の一つです。' },

// --- 法要・忌日深掘り ---
{ chapter:6, type:'ox', text:'「三十三回忌」は多くの宗派で「弔い上げ（とむらいあげ）」とされ、以後の個別の年忌法要を終了することが多い。', answer:true, explanation:'三十三回忌（満32年後）は多くの仏教宗派で年忌法要の締めくくり（弔い上げ）とされます。この後は個人として祀るのをやめ、先祖代々の霊として合祀する場合が多いです。地域・宗派によっては五十回忌を弔い上げとすることもあります。' },
{ chapter:6, type:'ox', text:'「月命日（つきめいにち）」とは、毎月その人が亡くなった日と同じ日付のことである。', answer:true, explanation:'月命日は毎月巡ってくる命日で、例えば3月15日に亡くなった場合、毎月15日が月命日です。年に一度の「命日（祥月命日・しょうつきめいにち）」と区別して「月命日」と呼びます。月命日に墓参りや仏前での手を合わせを行う習慣があります。' },
{ chapter:6, type:'ox', text:'「祥月命日（しょうつきめいにち）」とは、故人が亡くなった月日（月と日）が一致する、年に一度の命日のことである。', answer:true, explanation:'祥月命日（正忌・しょうき）は故人が亡くなった月と日が同じ、年に一度の本来の命日です。毎月の「月命日」と区別します。一周忌・三回忌などの年忌法要は原則としてこの祥月命日に行います。' },
{ chapter:6, type:'ox', text:'「涅槃会（ねはんえ）」は釈迦の誕生を祝う仏教行事である。', answer:false, explanation:'涅槃会は2月15日に釈迦の入滅（死去）を偲ぶ仏教行事です。釈迦の誕生を祝う行事は「花まつり（灌仏会・かんぶつえ）」で4月8日に行われます。「成道会（じょうどうえ）」は12月8日に釈迦の悟りを祝う行事です。' },
{ chapter:6, type:'ox', text:'「お盆（盂蘭盆会）」は仏教行事であり、先祖の霊が年に一度この世に戻ってくると信じられている。', answer:true, explanation:'お盆（盂蘭盆会・うらぼんえ）はインドの仏教行事が日本の祖先信仰・神道と融合した行事です。8月13日に迎え火で先祖の霊を迎え、16日に送り火で送り出す慣習があります（地域によっては7月）。精霊棚・盆踊りなど日本独自の文化も生まれました。' },

// --- 葬儀マナー・実務 ---
{ chapter:6, type:'ox', text:'葬儀に参列する際の数珠は、宗派の違う葬儀でも自分の宗派の数珠を使って構わない。', answer:true, explanation:'数珠は本来その宗派専用のものがありますが、葬儀に参列する際は自分の宗派の数珠（または「略式数珠」）を持参することが一般的で、他宗派の葬儀でも使用して問題ありません。数珠を持参すること自体が礼儀とされます。' },
{ chapter:6, type:'ox', text:'「喪中はがき」は一般的に故人が亡くなった翌年の年賀状シーズンに合わせて11〜12月に送る。', answer:true, explanation:'喪中はがき（年賀欠礼状）は、相手が年賀状を書く前に届くよう11月〜12月初旬に送るのが一般的なマナーです。年賀状が届いた後に喪中の事を知った場合は「寒中見舞い」で返答します。' },
{ chapter:6, type:'ox', text:'「香典（こうでん）」の語源は、線香・焼香など香を供えることへのお礼が金銭に変化したものとされる。', answer:true, explanation:'香典はもともと「香料（こうりょう）」とも呼ばれ、線香・香などを供えることへの代わりとして金銭を包むようになったものです。「典」は「典礼・儀式」という意味で、「香を供える儀礼への志」という意味合いがあります。' },
{ chapter:6, type:'ox', text:'「弔電（ちょうでん）」は葬儀に参列できない場合に喪家に送る電報で、現代でもNTTなどを通じて送ることができる。', answer:true, explanation:'弔電は葬儀に参列できない際に喪主宛てに送る電報形式のお悔やみで、現代でもNTT・KDDI・電報各社のサービスを通じて送ることができます。葬儀式場に届くよう、通夜・葬儀の前日までに手配するのが一般的です。' },
{ chapter:6, type:'ox', text:'葬儀の「受付」は遺族が担当するのが正式なマナーである。', answer:false, explanation:'葬儀の受付は故人の友人・知人・会社の同僚など「世話人（てつだい人）」が担当するのが一般的です。遺族は弔問客への挨拶・接待・式の進行に専念するため、受付は他の人に委ねるのが通例です。' },

// --- 葬儀形式・現代的変化 ---
{ chapter:6, type:'ox', text:'「音楽葬（おんがくそう）」とは、故人が好んだ音楽を式中に流したり演奏したりする葬儀形式で、無宗教葬の一種である。', answer:true, explanation:'音楽葬は宗教的な儀礼の代わりに、または組み合わせて、故人が愛した音楽を中心に構成する葬儀形式です。無宗教葬（自由葬）の中でも増加しており、生演奏・録音再生・合唱など様々な形があります。' },
{ chapter:6, type:'ox', text:'「グリーフケア」は遺族支援のためのケアであり、葬儀社が提供するアフターフォローとしても注目されている。', answer:true, explanation:'グリーフケアは死別などによる悲嘆（グリーフ）を抱えた遺族を心理的・社会的に支援するケアです。近年、葬儀社が葬儀後の遺族を訪問したり、グリーフケアの場を提供したりするアフターフォローの一環として提供するケースが増えています。' },
{ chapter:6, type:'ox', text:'「手元供養（てもとくよう）」とは、遺骨の一部を小さな骨壺や専用のアクセサリーに入れて手元に置いて供養する方法である。', answer:true, explanation:'手元供養は墓への納骨に加えて（または代わりに）遺骨の一部を手元に置いて供養する方法です。ミニ骨壺・メモリアルジュエリー（遺骨を入れたアクセサリー）・ぬいぐるみ型など様々な形があり、近年増加しています。' },

// ========================================
