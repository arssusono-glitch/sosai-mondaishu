<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>葬祭問題集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#ff6b9d;--purple:#c44dff;--blue:#4d9fff;--teal:#00d4aa;
  --yellow:#ffd93d;--orange:#ff8c00;
  --bg:#f8f0ff;--card:#fff;--text:#333;--sub:#666;--light:#f0e8ff;
}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo UI','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.page{display:none;min-height:100vh;padding:16px}
.page.active{display:block}
.app-header{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;text-align:center;padding:22px 16px 18px;border-radius:0 0 24px 24px;margin:-16px -16px 20px;box-shadow:0 4px 20px rgba(196,77,255,.35)}
.app-header h1{font-size:1.7rem;font-weight:900;letter-spacing:.05em}
.app-header .sub{font-size:.85rem;opacity:.9;margin-top:4px}
.card{background:var(--card);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 4px 18px rgba(0,0,0,.07)}
.btn{display:inline-block;border:none;border-radius:50px;padding:12px 26px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .18s;line-height:1.2}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 4px 16px rgba(196,77,255,.35)}
.btn-secondary{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;box-shadow:0 4px 16px rgba(0,212,170,.3)}
.btn-outline{background:#fff;border:2px solid var(--purple);color:var(--purple)}
.btn-sm{padding:8px 18px;font-size:.85rem}
.mode-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.mode-btn{background:#fff;border-radius:18px;padding:18px 10px;text-align:center;border:3px solid transparent;cursor:pointer;transition:all .18s;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.mode-btn.basic{border-color:var(--blue)}
.mode-btn.advanced{border-color:var(--orange)}
.mode-btn:active{transform:scale(.96)}
.mode-btn .icon{font-size:2rem;margin-bottom:6px}
.mode-btn h3{font-size:1rem;font-weight:800;margin-bottom:3px}
.mode-btn .desc{font-size:.75rem;color:var(--sub)}
.mode-btn.basic h3{color:var(--blue)}
.mode-btn.advanced h3{color:var(--orange)}
.user-card{background:linear-gradient(135deg,#e0f7fa,#e8f5e9);border-radius:16px;padding:14px;margin-bottom:14px}
.user-card h3{font-size:.9rem;font-weight:700;color:#2e7d32;margin-bottom:10px}
.user-display{display:flex;align-items:center;gap:10px}
.user-avatar{font-size:1.8rem}
.user-info .name{font-size:1rem;font-weight:700}
.user-info .dept{font-size:.82rem;color:var(--sub)}
.reg-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.reg-form label{font-size:.8rem;color:#666;display:block;margin-bottom:3px}
.reg-form input{width:100%;border:2px solid #ddd;border-radius:10px;padding:8px 10px;font-size:.9rem;outline:none;transition:border .2s;background:#fff}
.reg-form input:focus{border-color:var(--purple)}
.history-item{border-left:4px solid var(--purple);padding:10px 14px;margin-bottom:8px;background:#fdf8ff;border-radius:0 12px 12px 0}
.history-item .hi-date{font-size:.77rem;color:var(--sub)}
.history-item .hi-score{font-size:1.2rem;font-weight:800;color:var(--purple)}
.history-item .hi-meta{font-size:.8rem;color:var(--sub);margin-top:2px}
.section-title{font-size:.95rem;font-weight:800;color:var(--purple);margin-bottom:10px}
/* Setup */
.count-btns{display:flex;gap:10px;justify-content:center;margin:12px 0}
.count-btn{flex:1;min-width:60px;max-width:100px;padding:12px 6px;text-align:center;background:#fff;border-radius:14px;border:3px solid #ddd;cursor:pointer;font-size:1.15rem;font-weight:800;transition:all .2s}
.count-btn .cnt-sub{font-size:.72rem;color:#888;margin-top:3px;font-weight:400}
.count-btn.selected{border-color:var(--purple);background:var(--light);color:var(--purple)}
/* Quiz */
#quizPage{padding:12px}
.quiz-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.progress-wrap{flex:1}
.progress-bar{height:7px;background:#f0e8ff;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .4s;border-radius:4px}
.q-num{font-size:.82rem;color:var(--sub);margin-bottom:3px}
.q-mode-tag{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--light);color:var(--purple)}
.question-card{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 4px 18px rgba(0,0,0,.07)}
.q-type-badge{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 12px;border-radius:20px;margin-bottom:10px}
.q-type-badge.ox{background:#fff0f8;color:var(--pink)}
.q-type-badge.four{background:#f0f5ff;color:var(--blue)}
.question-text{font-size:1rem;line-height:1.8;font-weight:500}
.choices-grid{display:grid;gap:8px;margin-bottom:14px}
.choice-btn{background:#fff;border:2px solid #e0d8ff;border-radius:14px;padding:12px 14px;font-size:.9rem;text-align:left;cursor:pointer;transition:all .18s;line-height:1.5;width:100%}
.choice-btn .clabel{font-weight:700;color:var(--purple);margin-right:8px}
.choice-btn:hover{border-color:var(--purple);background:var(--light)}
.choice-btn.selected{border-color:var(--purple);background:var(--light)}
.choice-btn.correct{border-color:#00c853;background:#f1fff6;color:#00695c}
.choice-btn.wrong{border-color:#f44336;background:#fff5f5;color:#c62828}
.answer-section h4{font-size:.85rem;color:var(--sub);margin-bottom:10px;text-align:center}
.answer-btns{display:flex;gap:8px;justify-content:center}
.ans-btn{flex:1;max-width:110px;padding:13px 6px;border-radius:16px;border:none;font-size:.88rem;font-weight:800;cursor:pointer;transition:all .18s;text-align:center;line-height:1.3}
.ans-btn:active{transform:scale(.94)}
.ans-o{background:linear-gradient(135deg,#43ea80,#00c853);color:#fff;box-shadow:0 4px 14px rgba(0,200,83,.35)}
.ans-d{background:linear-gradient(135deg,#ffd740,#ff8f00);color:#fff;box-shadow:0 4px 14px rgba(255,143,0,.35)}
.ans-x{background:linear-gradient(135deg,#ff6b6b,#f44336);color:#fff;box-shadow:0 4px 14px rgba(244,67,54,.35)}
.feedback-card{border-radius:16px;padding:14px 16px;margin-bottom:12px;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.feedback-correct{background:#e8fff1;border:2px solid #00c853}
.feedback-wrong{background:#fff5f5;border:2px solid #f44336}
.feedback-ambi{background:#fff8e1;border:2px solid #ffc107}
.feedback-icon{font-size:1.6rem;margin-bottom:5px}
.feedback-title{font-size:.95rem;font-weight:800;margin-bottom:6px}
.feedback-exp{font-size:.85rem;line-height:1.65;color:#444}
.next-btn-wrap{text-align:center;margin-top:8px}
/* Result */
#resultPage{padding:16px}
.result-hero{text-align:center;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-radius:22px;padding:24px 16px;margin-bottom:16px}
.score-circle{width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.2);border:4px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;flex-direction:column}
.score-num{font-size:2.2rem;font-weight:900}
.score-pct{font-size:.75rem;opacity:.9}
.result-hero h2{font-size:1.25rem;font-weight:800;margin-bottom:3px}
.result-sub{font-size:.85rem;opacity:.85}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:14px;padding:12px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.stat-card .snum{font-size:1.5rem;font-weight:900}
.stat-card .slabel{font-size:.72rem;color:var(--sub)}
.stat-correct .snum{color:#00c853}
.stat-ambi .snum{color:#ff8f00}
.stat-wrong .snum{color:#f44336}
.review-list{margin-top:6px}
.review-item{border-left:4px solid #ffc107;padding:9px 12px;margin-bottom:7px;background:#fffdf0;border-radius:0 12px 12px 0;font-size:.83rem;line-height:1.55}
.review-item.wrong-item{border-color:#f44336;background:#fff5f5}
.review-item .rq{font-weight:600;margin-bottom:3px;color:#333}
.review-item .ra{color:var(--sub);font-size:.78rem}
</style>
</head>
<body>
<!-- TOP PAGE -->
<div id="topPage" class="page active">
  <div class="app-header"><h1>⛩️ 葬祭問題集</h1><div class="sub">葬祭ディレクター技能審査対策</div></div>
  <div id="userSection"></div>
  <div class="card">
    <div class="section-title">📚 問題を解く</div>
    <div class="mode-btns">
      <div class="mode-btn basic" onclick="startSetup('basic')"><div class="icon">📖</div><h3>基本問題</h3><div class="desc">Ch1〜8 / 1,966問</div></div>
      <div class="mode-btn advanced" onclick="startSetup('advanced')"><div class="icon">🔥</div><h3>上級問題</h3><div class="desc">Ch9〜11 / 300問</div></div>
    </div>
  </div>
  <div class="card">
    <div class="section-title">📊 最近の学習</div>
    <div id="historyPreview"></div>
    <button class="btn btn-outline btn-sm" onclick="showPage('historyPage')" style="width:100%;margin-top:8px">すべての履歴を見る</button>
  </div>
</div>

<!-- SETUP PAGE -->
<div id="setupPage" class="page">
  <div class="app-header"><h1 id="setupTitle">問題設定</h1></div>
  <div class="card">
    <div class="section-title">🔢 問題数</div>
    <div class="count-btns" style="flex-wrap:wrap;gap:8px">
      <div class="count-btn" id="cnt10" onclick="selectCount(10)">10問<div class="cnt-sub">約5分</div></div>
      <div class="count-btn" id="cnt30" onclick="selectCount(30)">30問<div class="cnt-sub">約15分</div></div>
      <div class="count-btn" id="cnt50" onclick="selectCount(50)">50問<div class="cnt-sub">約25分</div></div>
      <div class="count-btn" id="cnt100" onclick="selectCount(100)">100問<div class="cnt-sub">約50分</div></div>
    </div>
  </div>
  <div class="card">
    <div class="section-title">📋 章を絞る（任意）</div>
    <p style="font-size:.82rem;color:#888;margin-bottom:10px">選択しない場合は全章からランダム</p>
    <div id="chapterSelect"></div>
  </div>
  <div style="text-align:center;margin:12px 0">
    <button class="btn btn-primary" onclick="startQuiz()" style="padding:15px 50px">🚀 スタート</button>
  </div>
  <div style="text-align:center;padding-bottom:20px">
    <button class="btn btn-outline btn-sm" onclick="showPage('topPage')">← 戻る</button>
  </div>
</div>

<!-- QUIZ PAGE -->
<div id="quizPage" class="page">
  <div class="quiz-header">
    <div class="progress-wrap">
      <div class="q-num" id="qNum">問 1 / 50</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:2%"></div></div>
    </div>
    <div id="modeTag" class="q-mode-tag">基本</div>
  </div>
  <div class="question-card">
    <div id="questionCategory" style="font-size:.75rem;font-weight:700;color:#c44dff;background:#f0e8ff;display:inline-block;padding:2px 12px;border-radius:20px;margin-bottom:8px"></div>
    <span class="q-type-badge" id="typeBadge">○×</span>
    <div class="question-text" id="questionText"></div>
  </div>
  <div id="choicesArea" class="choices-grid" style="display:none"></div>
  <div id="answerArea" class="answer-section" style="display:none">
    <h4 id="answerAreaLabel">あなたの答えは？</h4>
    <div class="answer-btns">
      <button class="ans-btn ans-o" id="btnO" onclick="submitAnswer('o')">○<br><span style="font-size:.7rem">確信</span></button>
      <button class="ans-btn ans-d" id="btnD" onclick="submitAnswer('d')">△<br><span style="font-size:.7rem">あいまい</span></button>
      <button class="ans-btn ans-x" id="btnX" onclick="submitAnswer('x')">×<br><span style="font-size:.7rem">誤り</span></button>
    </div>
  </div>
  <div id="feedbackArea" style="display:none">
    <div id="feedbackCard" class="feedback-card">
      <div class="feedback-icon" id="feedIcon"></div>
      <div class="feedback-title" id="feedTitle"></div>
      <div class="feedback-exp" id="feedExp"></div>
    </div>
    <div class="next-btn-wrap"><button class="btn btn-primary" onclick="nextQuestion()">次の問題 →</button></div>
  </div>
  <div style="text-align:center;margin-top:20px;padding-bottom:24px">
    <button class="btn btn-outline btn-sm" onclick="confirmQuit()">テストを終了</button>
  </div>
</div>

<!-- RESULT PAGE -->
<div id="resultPage" class="page">
  <div class="result-hero">
    <div class="score-circle"><div class="score-num" id="resultScoreNum">0</div><div class="score-pct">点</div></div>
    <h2 id="resultTitle"></h2>
    <div class="result-sub" id="resultSub"></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card stat-correct"><div class="snum" id="statCorrect">0</div><div class="slabel">✅ 正解</div></div>
    <div class="stat-card stat-ambi"><div class="snum" id="statAmbi">0</div><div class="slabel">⚠️ 要見直し</div></div>
    <div class="stat-card stat-wrong"><div class="snum" id="statWrong">0</div><div class="slabel">❌ 不正解</div></div>
  </div>
  <div class="card" id="reviewSection" style="display:none">
    <div class="section-title">⚠️ 要見直し（△を押した問題）</div>
    <div id="reviewList" class="review-list"></div>
  </div>
  <div class="card">
    <div class="section-title">❌ 不正解だった問題</div>
    <div id="wrongList" class="review-list"></div>
  </div>
  <div style="text-align:center;padding:14px 0 30px;display:flex;gap:10px;justify-content:center">
    <button class="btn btn-primary" onclick="showPage('topPage')">🏠 トップへ</button>
    <button class="btn btn-secondary" onclick="retryQuiz()">🔄 もう一度</button>
  </div>
</div>

<!-- HISTORY PAGE -->
<div id="historyPage" class="page">
  <div class="app-header"><h1>📊 学習履歴</h1></div>
  <div id="historyList"></div>
  <div style="text-align:center;margin-top:12px;padding-bottom:30px">
    <button class="btn btn-outline btn-sm" onclick="showPage('topPage')">← トップへ</button>
    <button class="btn btn-sm" onclick="clearHistory()" style="background:#fff5f5;color:#f44336;border:2px solid #f44336;border-radius:50px;padding:8px 18px;font-size:.85rem;font-weight:700;cursor:pointer;margin-left:8px">履歴クリア</button>
  </div>
</div>

<script>
const ALL_QUESTIONS = [
// --- ○× 問題（25問） ---
  {
    chapter:1, type: 'ox',
    text: '日本における火葬の歴史は、奈良時代に文武天皇が初めて火葬されたことに始まるとされる。',
    answer: true,
    explanation: '700年（大宝元年）に崩御した文武天皇の葬儀で初めて火葬が行われたとされ、これが日本の公式な火葬の始まりとされています。その後、仏教の普及とともに火葬が広まりました。'
  },
  {
    chapter:1, type: 'ox',
    text: '縄文時代の日本では、主に火葬が行われていた。',
    answer: false,
    explanation: '縄文時代の主な埋葬方法は土葬（屈葬・伸展葬）です。遺体を胎児のように折り曲げて埋める「屈葬」が多く見られました。火葬が普及するのは奈良時代以降のことです。'
  },
  {
    chapter:1, type: 'ox',
    text: '明治政府は一時期、神道国教化政策の一環として火葬を禁止したことがある。',
    answer: true,
    explanation: '明治6年（1873年）に太政官布告により火葬が一時禁止されました。これは神道を国教として推進する政策の一環でしたが、火葬需要の高まりにより同8年（1875年）に禁止令は解除されました。'
  },
  {
    chapter:1, type: 'ox',
    text: '現在の日本の火葬率は世界でもほぼ100%に近く、最も高い水準にある。',
    answer: true,
    explanation: '日本の火葬率は99%を超えており、これは世界最高水準です。土地の制約・衛生上の理由・仏教文化の定着などにより、現代日本ではほぼすべての遺体が火葬されます。'
  },
  {
    chapter:1, type: 'ox',
    text: '「もがり（殯）」とは、遺体を埋葬せずに一定期間安置し、死を悼む儀礼のことで、古代日本で広く行われた。',
    answer: true,
    explanation: '殯（もがり）は古代日本の葬送儀礼で、天皇や貴族の遺体を仮安置し、霊魂の定着を願いながら哀悼する期間を設けるものでした。日本書紀などにも記載があります。'
  },
  {
    chapter:1, type: 'ox',
    text: '葬儀の形態として「家族葬」が広まったのは主に昭和初期のことである。',
    answer: false,
    explanation: '家族葬が広まったのは1990年代以降、特に2000年代に急速に普及しました。昭和時代は地域・近隣を巻き込んだ大規模な葬儀が一般的でした。少子高齢化・核家族化・都市化が家族葬普及の背景にあります。'
  },
  {
    chapter:1, type: 'ox',
    text: '直葬（ちょくそう）とは、通夜・葬儀を行わずに火葬のみを行う葬儀形態である。',
    answer: true,
    explanation: '直葬（直接火葬）は、通夜・告別式などの式を省略し、火葬のみを行うシンプルな葬儀形態です。費用の抑制や故人の意思などにより選ばれるケースが増えています。'
  },
  {
    chapter:1, type: 'ox',
    text: '沖縄の「洗骨」は、埋葬後に遺骨を取り出して洗い清め、再び納骨する伝統的習俗である。',
    answer: true,
    explanation: '洗骨は主に沖縄で行われてきた葬送習俗で、一定期間土葬した後に遺骨を掘り起こし、女性の親族が丁寧に骨を洗い清め、改めて納骨する儀礼です。現代では行われる地域は減っています。'
  },
  {
    chapter:1, type: 'ox',
    text: '弥生時代の埋葬では、遺体を伸ばした状態で埋葬する「伸展葬」のほか、甕（かめ）の中に遺体を納める「甕棺墓」も見られた。',
    answer: true,
    explanation: '弥生時代には地域によってさまざまな埋葬形式が見られました。北部九州では甕棺墓が多く、近畿・東海では土坑墓（どこうぼ）が一般的でした。遺体を甕に納める甕棺墓は弥生時代の特徴的な葬制です。'
  },
  {
    chapter:1, type: 'ox',
    text: '古墳時代の前方後円墳は、身分の高い人物のみに許された墓制であった。',
    answer: true,
    explanation: '前方後円墳は古墳時代（3〜7世紀）の支配層・首長クラスの墓です。その大きさや副葬品の豪華さで被葬者の権力を示しました。一般庶民は小規模な土坑墓や群集墳に葬られました。'
  },
  {
    chapter:1, type: 'ox',
    text: '江戸時代の寺請制度では、すべての人が寺院の檀家となることが義務付けられた。',
    answer: true,
    explanation: '江戸幕府はキリシタン禁制のため寺請制度を設け、すべての民衆がいずれかの寺院に所属することを義務付けました。これにより寺院が戸籍管理を担い、仏式葬儀が庶民に普及しました。'
  },
  {
    chapter:1, type: 'ox',
    text: '「野辺送り」とは、遺体を火葬場や墓地まで送る行列のことで、現代でも全国的に広く行われている。',
    answer: false,
    explanation: '野辺送りは遺体を葬地まで行列で送る習俗で、かつては全国的に見られましたが、現代では霊柩車の普及によりほぼ廃れています。地域によっては形式的に残る場合もあります。'
  },
  {
    chapter:1, type: 'ox',

{ chapter:2, type:'ox', text:'仏教は紀元前5世紀ごろ、インドのガウタマ・シッダールタ（釈迦）によって開かれた宗教である。', answer:true, explanation:'釈迦（ゴータマ・シッダッタ）は紀元前5世紀ごろ北インド（現ネパール）に生まれ、菩提樹の下で悟りを開き仏教を創始しました。仏教はその後アジア各地に広まり、日本には6世紀（538年または552年）に伝来したとされています。' },
{ chapter:2, type:'ox', text:'仏教が日本に公式に伝来したのは平安時代とされている。', answer:false, explanation:'仏教の日本公式伝来は飛鳥時代（538年説または552年説）とされています。百済の聖明王から欽明天皇に仏像・経典が贈られたとされ、その後聖徳太子が仏教を積極的に保護しました。平安時代は天台宗・真言宗が確立した時代です。' },
{ chapter:2, type:'ox', text:'「三宝（さんぽう）」とは仏教における仏・法・僧の三つを指す。', answer:true, explanation:'三宝とは仏（ブッダ・悟りを開いた者）・法（ダルマ・仏の教え）・僧（サンガ・修行者の集団）の三つで、仏教徒が帰依する根本です。「南無三宝」は三宝に帰依することを意味します。' },
{ chapter:2, type:'ox', text:'「南無（なむ）」とは「わたしは帰依します」という意味のサンスクリット語に由来する。', answer:true, explanation:'「南無」はサンスクリット語の「ナマス（namas）」の音写で、「帰依する・敬礼する」という意味です。「南無阿弥陀仏」は「阿弥陥仏に帰依します」、「南無妙法蓮華経」は「妙法蓮華経（法華経）に帰依します」という意味になります。' },
{ chapter:2, type:'ox', text:'「小乗仏教」と「大乗仏教」は同じ教えであり、地域による呼び方の違いに過ぎない。', answer:false, explanation:'小乗（上座部）仏教と大乗仏教は教義・実践において異なります。上座部仏教は個人の悟りを重視し、スリランカ・東南アジアに広まりました。大乗仏教はすべての衆生の救済を目指し、中国・朝鮮・日本などに広まりました。日本の仏教はほぼすべて大乗仏教です。' },

// --- 浄土宗・浄土真宗 ---
{ chapter:2, type:'ox', text:'浄土宗の開祖・法然は比叡山で修行した後、専修念仏の教えを広めた。', answer:true, explanation:'法然（1133〜1212年）は比叡山延暦寺で学んだ後、「南無阿弥陀仏」を称えるだけで誰でも極楽浄土に往生できるという専修念仏を説き、浄土宗を開きました。その弟子・親鸞が浄土真宗を開きます。' },
{ chapter:2, type:'ox', text:'浄土真宗本願寺派（西本願寺）と真宗大谷派（東本願寺）は同じ宗派である。', answer:false, explanation:'両派はもともと同じ浄土真宗でしたが、江戸時代初期に本願寺が東西に分立しました。西本願寺（本願寺派）と東本願寺（大谷派）は現在も別の宗派組織として活動しています。焼香回数など儀礼にも若干の違いがあります。' },
{ chapter:2, type:'ox', text:'浄土真宗では「お位牌」を用いず、代わりに「過去帳」や「法名軸」を用いる。', answer:true, explanation:'浄土真宗では霊魂が位牌に宿るという概念がないため、一般的に位牌を使用しません。代わりに法名（戒名に相当）を記した「法名軸」を仏壇に掛けたり、「過去帳」に記録したりします。' },
{ chapter:2, type:'ox', text:'浄土真宗の葬儀における焼香は、本願寺派（西）は1回、大谷派（東）は2回が作法とされる。', answer:true, explanation:'浄土真宗本願寺派（西本願寺）の焼香は額に押しいただかずに1回、真宗大谷派（東本願寺）は額に押しいただかずに2回が正式な作法です。どちらも「額に押しいただかない」点が他宗派と異なります。' },
{ chapter:2, type:'ox', text:'浄土宗の総本山は京都の知恩院である。', answer:true, explanation:'知恩院（京都市東山区）は浄土宗の総本山で、法然上人が念仏の教えを広めた地に建てられました。三門（国宝）は日本最大級の木造建築のひとつとして知られています。' },
{ chapter:2, type:'ox', text:'親鸞は「悪人正機（あくにんしょうき）」の考えを説き、善人よりも悪人こそが阿弥陀仏に救われると説いた。', answer:true, explanation:'「悪人正機」は親鸞の教えの根本で、自力で善を行える人よりも、自らの罪深さを自覚した悪人こそ阿弥陀仏の他力本願の救いの正しい対象（正機）であるという逆説的な教えです。歎異抄に記されています。' },

// --- 禅宗（曹洞宗・臨済宗・黄檗宗）---
{ chapter:2, type:'ox', text:'曹洞宗の開祖・道元は「只管打坐（しかんたざ）」を説き、ひたすら坐禅することを修行の根本とした。', answer:true, explanation:'道元（1200〜1253年）は宋から禅を持ち帰り曹洞宗を開きました。「只管打坐」とはひたすら坐禅することで、坐禅そのものが悟りの表れ（修証一等）であると説きました。主著は「正法眼蔵」です。' },
{ chapter:2, type:'ox', text:'臨済宗は「公案（こうあん）」と呼ばれる問答を用いた禅の修行で知られる。', answer:true, explanation:'臨済宗では師匠から「隻手の声を聞け」などの論理的に解けない問い（公案）を与えられ、それに取り組むことで悟りを目指します。道元の曹洞宗が「黙照禅（もくしょうぜん）」と呼ばれるのに対し、臨済宗は「看話禅（かんなぜん）」とも呼ばれます。' },
{ chapter:2, type:'ox', text:'黄檗宗（おうばくしゅう）は江戸時代初期に中国から伝わった禅宗の一派である。', answer:true, explanation:'黄檗宗は江戸時代初期（1654年）に中国・福建省から来日した隠元隆琦（いんげんりゅうき）が開いた禅宗の一派です。総本山は京都府宇治市の万福寺で、中国風の伽藍様式が特徴的です。隠元が日本にインゲン豆・スイカ・蓮根などを伝えたとも言われます。' },
{ chapter:2, type:'ox', text:'曹洞宗の大本山は永平寺のみである。', answer:false, explanation:'曹洞宗には二つの大本山があります。道元が開いた永平寺（福井県）と、瑩山紹瑾（けいざんじょうきん）が開き後に移転した總持寺（神奈川県横浜市）です。この二本山制は曹洞宗の大きな特徴です。' },

// --- 日蓮宗・法華系 ---
{ chapter:2, type:'ox', text:'日蓮宗の開祖・日蓮は鎌倉時代に活躍し、他宗派を激しく批判したことで知られる。', answer:true, explanation:'日蓮（1222〜1282年）は法華経こそ釈迦の真の教えと信じ、念仏・禅・真言などの諸宗を「念仏無間、禅天魔、真言亡国、律国賊」と激しく批判しました。これが原因で各地へ流罪になりましたが、信念を曲げませんでした。' },
{ chapter:2, type:'ox', text:'日蓮宗の総本山は身延山久遠寺（山梨県）である。', answer:true, explanation:'身延山久遠寺（山梨県南巨摩郡身延町）は日蓮宗の総本山で、日蓮上人が晩年の9年間を過ごした地です。日蓮の墓所もあり、全国の日蓮宗寺院の根本道場として信仰を集めています。' },
{ chapter:2, type:'ox', text:'創価学会は日蓮宗の正式な宗派のひとつである。', answer:false, explanation:'創価学会はかつて日蓮正宗（にちれんしょうしゅう）の信徒団体でしたが、1991年に破門され現在は独立した宗教法人です。日蓮宗とも日蓮正宗とも別の組織です。葬儀は「友人葬」と呼ばれる形式で行われ、僧侶を呼ばないことが特徴です。' },
{ chapter:2, type:'ox', text:'日蓮宗の葬儀における焼香は1回が正式とされる。', answer:false, explanation:'日蓮宗の焼香回数は1回または3回とされていますが、地域や寺院によって異なります。一般的には3回行うことが多く、1回目は額に押しいただき、2・3回目はそのまま香炉にくべるとされることもあります。' },

// --- 真言宗 ---
{ chapter:2, type:'ox', text:'真言宗の開祖・空海は「弘法大師」の諡号を持ち、高野山に金剛峯寺を開いた。', answer:true, explanation:'空海（774〜835年）は唐で密教を学び帰国後、高野山（和歌山県）に金剛峯寺を開き真言宗を確立しました。「弘法大師」は921年に醍醐天皇から贈られた諡号で、「弘法も筆の誤り」などのことわざにも名前が残っています。' },
{ chapter:2, type:'ox', text:'真言宗では大日如来を最高の仏（本尊）とする。', answer:true, explanation:'真言宗（密教）では宇宙の真理そのものを体現する「大日如来（だいにちにょらい）」を最高の仏・宇宙の根本仏（本尊）とします。釈迦如来を本尊とする他宗派と異なるのが特徴です。' },
{ chapter:2, type:'ox', text:'四国八十八箇所霊場の巡礼（お遍路）は、真言宗の開祖・空海ゆかりの寺院を巡る巡礼である。', answer:true, explanation:'四国八十八箇所霊場は、空海（弘法大師）が修行した地や縁のある寺院88か所を巡る巡礼です。「同行二人」という言葉は、巡礼者が常に弘法大師と二人連れで歩むという意味で、白衣・金剛杖・菅笠が巡礼の装束です。' },

// --- 天台宗 ---
{ chapter:2, type:'ox', text:'天台宗の開祖・最澄は「伝教大師」の諡号を持ち、比叡山延暦寺を開いた。', answer:true, explanation:'最澄（767〜822年）は唐で天台宗を学んで帰国し、比叡山（滋賀県）に延暦寺を開き天台宗を確立しました。「伝教大師」は最澄の諡号です。比叡山は後に法然・親鸞・道元・日蓮など多くの宗祖が修行した「日本仏教の母山」とも呼ばれます。' },
{ chapter:2, type:'ox', text:'天台宗は法華経のみを所依の経典とし、他の経典を認めない。', answer:false, explanation:'天台宗は法華経を中心に据えますが、密教・禅・念仏なども包括する総合仏教的な性格を持ちます。最澄は「円・密・禅・戒」の四宗を天台宗に統合しようとしました。一宗一経に限定する日蓮宗とは異なります。' },

// --- 神式 ---
{ chapter:2, type:'ox', text:'神道は日本固有の宗教であり、特定の開祖・教典を持たない。', answer:true, explanation:'神道は日本列島に古来から根付いた自然崇拝・祖先崇拝・アニミズムを基盤とした宗教で、仏教のような特定の開祖や、キリスト教の聖書のような体系的な教典を持ちません。「記紀（古事記・日本書紀）」が神話として重視されます。' },
{ chapter:2, type:'ox', text:'神葬祭における「帰幽奉告（きゆうほうこく）」とは、神棚に訃報を告げる儀式である。', answer:true, explanation:'帰幽奉告は死亡直後に行う最初の儀礼で、神棚・祖霊舎に向かって家の主が訃報を告げます。この後、神棚に白い紙（半紙）を貼って封じる「神棚封じ」を行います。忌明け（五十日祭後）に紙を外します。' },
{ chapter:2, type:'ox', text:'神式葬儀の「清祓（きよはらい）」とは、葬儀後に家の穢れを祓う儀式である。', answer:true, explanation:'神道では死は穢れとされるため、葬儀後に神職が家や参列者を祓い清める「清祓」を行います。これにより日常生活に戻ることができます。帰家祭・清祓は仏式の「精進落とし」に相当する区切りの儀礼です。' },
{ chapter:2, type:'ox', text:'神式の「年祭（ねんさい）」は仏式の「年忌法要」に相当し、一年祭・三年祭・五年祭・十年祭などがある。', answer:true, explanation:'神式では仏式の年忌法要に相当する「年祭」を行います。一年祭（一周忌相当）・三年祭・五年祭・十年祭・二十年祭・三十年祭・五十年祭などがあり、五十年祭以降は祖先神として祀られます。' },
{ chapter:2, type:'ox', text:'神式葬儀では「御霊（みたま）」という概念があり、人は死後に御霊となると考える。', answer:true, explanation:'神道では人が死ぬと「御霊（みたま）」となり、祀られることで「祖霊（それい）」として子孫を守護する存在になると考えます。この思想が神式葬儀や先祖祭祀の根本にあります。' },

// --- キリスト教 ---
{ chapter:2, type:'ox', text:'カトリックとプロテスタントはどちらもキリスト教だが、16世紀の宗教改革によって分かれた。', answer:true, explanation:'16世紀にマルティン・ルターらが当時のカトリック教会の腐敗を批判し宗教改革を起こし、プロテスタント諸派が誕生しました。カトリックはローマ教皇を頂点とする組織を維持しています。日本ではカトリックを「公教」と呼ぶ場合もあります。' },
{ chapter:2, type:'ox', text:'プロテスタントの葬儀では「煉獄（れんごく）」のための祈りを行う。', answer:false, explanation:'煉獄（死後に魂が清められる場所）はカトリックの概念で、プロテスタントは煉獄の存在を認めません。プロテスタントでは聖書のみを権威とし、死者のための功徳的な祈りや典礼的な儀礼よりも、聖書朗読・説教・賛美歌が中心です。' },
{ chapter:2, type:'ox', text:'カトリックの葬儀ミサでは「聖体拝領（せいたいはいりょう）」が行われる。', answer:true, explanation:'聖体拝領はカトリックの中心的な秘跡（サクラメント）で、パンとぶどう酒がキリストの体と血に変わる（聖変化）と信じ、信者がそれを受け取る儀式です。葬儀ミサでも行われ、非信者は参加しないのが原則です。' },
{ chapter:2, type:'ox', text:'キリスト教式葬儀では、日本の仏式と同様に「御仏前」と表書きした香典を持参するのが適切である。', answer:false, explanation:'「御仏前」は仏式葬儀専用の表書きです。キリスト教式では「御花料」（プロテスタント・カトリック共通で使いやすい）、または「御霊前」（カトリックでは可）を使います。「御仏前」はキリスト教式では使いません。' },

// --- 新宗教・諸派 ---
{ chapter:2, type:'ox', text:'創価学会の葬儀は「友人葬」と呼ばれ、僧侶を呼ばずに学会の幹部が導師役を務める。', answer:true, explanation:'創価学会は1991年に日蓮正宗から破門された後、独自の「友人葬」を確立しました。読経は会員が行い、僧侶・神職・牧師を招かないのが特徴です。香典返しを行わないなど独自の作法があります。' },
{ chapter:2, type:'ox', text:'立正佼成会は法華経を基本経典とする新宗教で、日蓮宗系の流れを汲む。', answer:true, explanation:'立正佼成会は1938年に庭野日敬・長沼妙佼によって創設された新宗教で、法華経を中心経典とし日蓮宗の影響を受けています。「法座」と呼ばれる輪談法座が特徴的な実践形式です。' },
{ chapter:2, type:'ox', text:'天理教は奈良県天理市を発祥とする新宗教で、独自の神観念と葬儀作法を持つ。', answer:true, explanation:'天理教は1838年に中山みきが開いた新宗教で、本部は奈良県天理市にあります。唯一の神「天理王命（てんりおのみこと）」を信仰し、葬儀は「おそろしい」「死」などの言葉を使わない独自の言葉遣いがあります。' },
{ chapter:2, type:'ox', text:'金光教（こんこうきょう）は幕末・明治に成立した神道系の新宗教で、教祖は川手文治郎（金光大神）である。', answer:true, explanation:'金光教は1859年に岡山県の農民・川手文治郎（後に金光大神と称された）が開いた神道系新宗教です。「天地金乃神（てんちかねのかみ）」を唯一の神として信仰し、「とりつぎ」と呼ばれる仲介の実践が特徴です。' },
{ chapter:2, type:'ox', text:'浄土真宗と真宗（しんしゅう）は別の宗教である。', answer:false, explanation:'「真宗」は「浄土真宗」の略称で同じ宗教です。親鸞が開いた宗派を指します。ただし浄土真宗は現在、本願寺派・大谷派・高田派など複数の教団（宗派）に分かれており、それぞれが独立した組織として活動しています。' },

// --- 法要・忌日 ---
{ chapter:2, type:'ox', text:'「七七日（しちしちにち）」とは四十九日のことで、仏教では故人が次の生に生まれ変わる日とされる。', answer:true, explanation:'四十九日（七七日）は亡くなってから49日目で、この日に閻魔大王による最後の裁きが下り、次の生に転生するとされます（多くの宗派の解釈）。この日が「忌明け」となり、仮の白木位牌から本位牌に変えるのが一般的です。' },
{ chapter:2, type:'ox', text:'「一周忌」は故人が亡くなってから満1年後、「三回忌」は満3年後に行う。', answer:false, explanation:'一周忌は満1年後（死後2年目）ですが、三回忌は満2年後（死後3年目）に行います。日本の法要では「回忌」の数え方が独特で、三回忌は「3年目」ではなく「亡くなった年を1回目として3回目」つまり満2年後になります。' },
{ chapter:2, type:'ox', text:'「新盆（初盆）」とは、故人が亡くなって初めて迎えるお盆のことである。', answer:true, explanation:'新盆（初盆・にいぼん・はつぼん）は故人が亡くなって四十九日後に初めて迎えるお盆で、通常のお盆よりも丁寧に供養します。白提灯を飾るなど通常のお盆と異なる慣習がある地域も多くあります。' },
{ chapter:2, type:'ox', text:'「彼岸（ひがん）」は年に2回あり、春分の日・秋分の日を中日とする前後3日間ずつ計7日間である。', answer:true, explanation:'彼岸は春分・秋分の日を中心とした各7日間（前3日・中日・後3日）で、年に2回あります。仏教では「西方浄土」に通じる日とされ、先祖の墓参りや供養を行う習慣があります。' },

// --- 数珠・祭壇・道具 ---
{ chapter:2, type:'ox', text:'数珠（念珠）の珠の数は宗派によって異なり、108珠が最も一般的な本式念珠とされる。', answer:true, explanation:'108珠は人間の108の煩悩を表すとされる本式の数珠です。ただし略式では27珠・54珠なども使われます。宗派によって形や使い方が異なり、浄土真宗・日蓮宗などはそれぞれ独自の形式の念珠を使います。' },
{ chapter:2, type:'ox', text:'浄土真宗では「位牌」を使用しないため、葬儀での「白木位牌」も不要である。', answer:false, explanation:'浄土真宗でも葬儀の際は「法名軸（ほうみょうじく）」や「繰り出し位牌」を使う場合もあり、葬儀中は「野位牌（野卒塔婆）」を用いることもあります。ただし四十九日後に本位牌に切り替える習慣はなく、過去帳・法名軸に記すのが一般的です。' },

// --- 香典・マナー ---
{ chapter:2, type:'ox', text:'香典袋の表書き「御霊前」は、浄土真宗の葬儀では使用しないのが望ましい。', answer:true, explanation:'浄土真宗では「往生即成仏」の教えにより、亡くなった方はすでに仏様になっているとされます。そのため「霊」として存在するという概念と合わず、「御霊前」よりも「御仏前」または「御香典」が適切とされます。' },
{ chapter:2, type:'ox', text:'香典の金額は、一般的に奇数（割り切れない数）を選ぶ慣習がある。', answer:true, explanation:'香典の金額は、偶数は「割り切れる＝縁が切れる」という忌避感から奇数が好まれます。特に3・5・7の数字が使われ、1万円・3万円・5万円などが一般的です。ただし2万円は「偶数だが1＋1=2で1組」とする見方から使われることもあります。' },
{ chapter:2, type:'ox', text:'「精進落とし（しょうじんおとし）」は、火葬後・葬儀終了後に行う会食のことである。', answer:true, explanation:'精進落としは、忌中に肉食・飲酒を控えていた（精進していた）喪家が、葬儀の区切りとして通常の食事に戻るための会食です。現代では火葬待機中や火葬後に行うことが多く、参列者へのお礼の場ともなります。' },

// ========================================
// 4択 問題（100問）
// ========================================

// --- 仏教総論・各宗派知識 ---
{ chapter:2, type:'4', text:'次の宗派と開祖の組み合わせとして正しいものはどれか。', choices:['浄土宗 ── 親鸞','浄土真宗 ── 法然','日蓮宗 ── 日蓮','曹洞宗 ── 栄西'], answer:2, explanation:'日蓮宗の開祖は日蓮（鎌倉時代）です。浄土宗の開祖は法然、浄土真宗の開祖は親鸞（法然の弟子）、曹洞宗の開祖は道元、臨済宗の開祖が栄西です。これらはすべて鎌倉時代に成立した宗派です。' },
{ chapter:2, type:'4', text:'浄土宗の葬儀で唱える念仏として正しいものはどれか。', choices:['南無妙法蓮華経','南無阿弥陀仏','南無大師遍照金剛','南無釈迦牟尼仏'], answer:1, explanation:'「南無阿弥陀仏」は浄土宗・浄土真宗など浄土系宗派の念仏です。「南無妙法蓮華経」は日蓮宗の題目、「南無大師遍照金剛」は真言宗で空海に向けて唱える言葉、「南無釈迦牟尼仏」は禅宗などで用います。' },
{ chapter:2, type:'4', text:'「鎌倉仏教」として誕生した宗派でないものはどれか。', choices:['浄土宗','日蓮宗','天台宗','曹洞宗'], answer:2, explanation:'天台宗は平安時代初期（806年）に最澄が開いた宗派で、鎌倉仏教ではありません。鎌倉仏教とは鎌倉時代（12〜14世紀）に成立した浄土宗・浄土真宗・時宗・日蓮宗・曹洞宗・臨済宗などを指します。' },
{ chapter:2, type:'4', text:'次の宗派と総本山（または大本山）の組み合わせとして誤っているものはどれか。', choices:['真言宗 ── 高野山金剛峯寺（和歌山）','天台宗 ── 比叡山延暦寺（滋賀）','浄土宗 ── 知恩院（京都）','日蓮宗 ── 善光寺（長野）'], answer:3, explanation:'善光寺は特定の宗派の総本山ではなく、「無宗派」の寺院として知られます（天台宗・浄土宗が共同で管理）。日蓮宗の総本山は身延山久遠寺（山梨県）です。' },
{ chapter:2, type:'4', text:'次の宗派と本尊（主に礼拝される仏）の組み合わせとして正しいものはどれか。', choices:['真言宗 ── 阿弥陀如来','浄土宗 ── 大日如来','日蓮宗 ── 題目曼荼羅（南無妙法蓮華経）','曹洞宗 ── 弥勒菩薩'], answer:2, explanation:'日蓮宗では「南無妙法蓮華経」と書かれた題目曼荼羅を本尊とします。真言宗の本尊は大日如来、浄土宗・浄土真宗の本尊は阿弥陀如来、曹洞宗の本尊は釈迦牟尼仏です。' },
{ chapter:2, type:'4', text:'浄土真宗本願寺派（西本願寺）の本山はどこか。', choices:['東本願寺（京都）','西本願寺（京都）','知恩院（京都）','増上寺（東京）'], answer:1, explanation:'浄土真宗本願寺派の総本山は西本願寺（龍谷山本願寺、京都市下京区）です。真宗大谷派の本山は東本願寺（真宗本廟）、浄土宗の総本山は知恩院（京都）、増上寺は浄土宗の大本山（東京）です。' },
{ chapter:2, type:'4', text:'「時宗（じしゅう）」の開祖と特徴として正しいものはどれか。', choices:['一遍・踊り念仏（踊念仏）で知られる','法然・専修念仏を広めた','親鸞・悪人正機を説いた','道元・只管打坐を説いた'], answer:0, explanation:'時宗の開祖は一遍（1239〜1289年）で、念仏の札を配りながら諸国を遊行（旅をして布教）し、「踊り念仏（踊念仏）」で知られます。「南無阿弥陀仏」を称えることで誰でも救われると説きました。' },
{ chapter:2, type:'4', text:'真言宗の葬儀で故人に授ける「真言（しんごん）」とはどういうものか。', choices:['故人の戒名を読み上げる言葉','梵語（サンスクリット語）による秘密の言葉・呪文で、仏の真実の言葉とされる','故人を浄土へ導く引導文','焼香の際に唱える念仏'], answer:1, explanation:'真言とはサンスクリット語「マントラ」の漢訳で、「秘密の言葉・真実の言葉」という意味です。密教では真言を唱えることで仏と一体になれると考えます。真言宗葬儀では各種の真言を唱える儀礼が行われます。' },
{ chapter:2, type:'4', text:'「臨済宗」の開祖として正しい人物はどれか。', choices:['道元','栄西（明庵栄西）','隠元隆琦','夢窓疎石'], answer:1, explanation:'臨済宗の開祖は栄西（えいさい、1141〜1215年）で、宋から禅を持ち帰りました。道元は曹洞宗、隠元隆琦は黄檗宗の開祖です。夢窓疎石は南北朝時代の臨済宗の高僧で、庭園設計でも知られます。' },
{ chapter:2, type:'4', text:'「浄土三部経」として正しい組み合わせはどれか。', choices:['法華経・般若心経・阿弥陀経','無量寿経・観無量寿経・阿弥陀経','法華経・無量寿経・維摩経','般若心経・阿弥陀経・大日経'], answer:1, explanation:'浄土三部経とは浄土宗・浄土真宗の根本経典である「無量寿経（大経）」「観無量寿経（観経）」「阿弥陀経（小経）」の三つです。法華経は天台宗・日蓮宗の根本経典、般若心経は真言宗・禅宗などで広く読まれます。' },

// --- 戒名・位号 ---
{ chapter:2, type:'4', text:'戒名の「位号（いごう）」として、男性の最も一般的なものはどれか。', choices:['大姉（だいし）','居士（こじ）','童子（どうじ）','禅定門（ぜんじょうもん）'], answer:1, explanation:'居士（こじ）は成人男性の一般的な位号（戒名の末尾に付く称号）です。女性の一般的な位号は「大姉（だいし）」です。「童子」は子どもの男性、「孩子（がいし）」は幼い男児の位号です。' },
{ chapter:2, type:'4', text:'戒名の「院号（いんごう）」について正しい説明はどれか。', choices:['すべての仏教徒に自動的に授けられる','本来は寺院の建立など仏教への貢献が著しい人に授けられる最上位の称号','子どもが亡くなった場合のみ授けられる','神式葬儀でのみ使用される'], answer:1, explanation:'院号は戒名の最上位に付く称号（例：〇〇院）で、本来は寺院の建立・再興や仏教への多大な功績がある人に授けられていました。現代では多額の寄付などによって授けられることもあり、戒名料の相場が高くなる要因のひとつです。' },
{ chapter:2, type:'4', text:'浄土真宗で授けられる「法名（ほうみょう）」の特徴として正しいものはどれか。', choices:['院号・道号・法号・位号の四つで構成される','「釋（釈）」の一字が必ず頭につく','男女ともに「居士」「大姉」の位号をつける','文字数が必ず4文字と定められている'], answer:1, explanation:'浄土真宗の法名は「釋〇〇」（男性）または「釋尼〇〇」（女性）の形式が基本で、「釋（釈）」は釈迦の弟子を意味します。院号・道号・位号などの複雑な構成はなく、シンプルな形式が特徴です。' },
{ chapter:2, type:'4', text:'子どもの戒名に使われる位号として正しいものはどれか。', choices:['居士・大姉','信士・信女','童子・童女','禅定門・禅定尼'], answer:2, explanation:'子どもの戒名の位号は、男児は「童子（どうじ）」、女児は「童女（どうにょ）」が一般的です。さらに幼い場合は「孩子（がいし）・孩女（がいにょ）」、水子（胎児・新生児）には「水子」が使われることもあります。' },

// --- 神式詳細 ---
{ chapter:2, type:'4', text:'神葬祭における「遷霊祭（せんれいさい）」について正しい説明はどれか。', choices:['遺体を火葬場へ移す儀式','故人の霊魂を霊璽（れいじ）に移す儀式','遺骨を墓所へ移す儀式','神棚に訃報を告げる儀式'], answer:1, explanation:'遷霊祭は神葬祭の核心をなす儀式で、故人の霊魂を「霊璽（みたましろ）」と呼ばれる木製の御霊代に移します。電灯を消して暗闇の中で行うことが多く、神職が「遷霊詞（せんれいのことば）」を奏上します。' },
{ chapter:2, type:'4', text:'神式葬儀の「榊（さかき）」を使った儀式の名称はどれか。', choices:['焼香','献花','玉串奉奠','塗香'], answer:2, explanation:'玉串奉奠（たまぐしほうてん）は榊の枝に紙垂（しで）をつけた「玉串」を神前に捧げる儀式で、仏式の焼香に相当します。「奉奠」は「つつしんで捧げる」という意味です。' },
{ chapter:2, type:'4', text:'神式葬儀で用いる「霊璽（れいじ）」とは何か。', choices:['遺体を納める棺','故人の霊魂を移す御霊代（みたましろ）となる木製の御霊符','神前に供える特別な食物','葬儀で使用する神具の総称'], answer:1, explanation:'霊璽は故人の霊魂を移して祀る御霊代（みたましろ）で、仏式の位牌に相当します。白木で作られた木製のもので、遷霊祭の後に故人の名（諡）が書かれ、祖霊舎（それいしゃ）に安置されます。' },
{ chapter:2, type:'4', text:'神道の「祖霊舎（それいしゃ）」とは何か。', choices:['神社の本殿','先祖の霊璽を安置する家庭内の神棚','神式墓地の墓石','葬儀を行う施設'], answer:1, explanation:'祖霊舎は家庭に設ける神棚の一種で、先祖の霊璽（霊魂の依代）を安置します。仏式の「仏壇」に相当するものです。五十日祭の後に霊璽が祖霊舎に移され、以後は祖先神として祀られます。' },
{ chapter:2, type:'4', text:'神式葬儀における「一年祭」は仏式のどの法要に相当するか。', choices:['初七日','四十九日','一周忌','三回忌'], answer:2, explanation:'神式の「一年祭」は故人の命日から一年後に行う祭事で、仏式の「一周忌」に相当します。同様に「三年祭」は三回忌、「五年祭」は五回忌に相当します。神式では「回忌」ではなく「年祭」と呼びます。' },
{ chapter:2, type:'4', text:'神式葬儀の「五十日祭（ごじゅうにちさい）」の意味として正しいものはどれか。', choices:['故人の50回目の誕生日を祝う祭','仏式の四十九日に相当する忌明けの祭','毎年の命日に行う年祭','火葬後に行う清めの儀式'], answer:1, explanation:'神式の五十日祭は仏式の四十九日法要に相当する忌明けの祭事です。死亡日から50日目に行われ、この後に霊璽を祖霊舎に移します。五十日祭で忌が明け、神社参拝なども再開できます。' },
{ chapter:2, type:'4', text:'神式葬儀で死亡直後に行う「帰幽奉告（きゆうほうこく）」とは何か。', choices:['遺体を神聖な場所に移すこと','神棚・祖霊舎に訃報を告げる儀式','火葬許可証を市区町村に申請すること','葬儀社に依頼の連絡をすること'], answer:1, explanation:'帰幽奉告は死亡直後に行う最初の神式の儀礼で、神棚と祖霊舎に向かって家の代表者が訃報を告げます。「帰幽」は「幽世（かくりよ・あの世）に帰る」という意味です。その後、神棚に白紙を貼って封じる「神棚封じ」を行います。' },

// --- キリスト教詳細 ---
{ chapter:2, type:'4', text:'カトリックの葬儀ミサにおける「香（こう）」の使用について正しいものはどれか。', choices:['仏式と同様に抹香を使う','乳香（にゅうこう）など天然樹脂の香を香炉で焚く','線香を立てる','香は使用しない'], answer:1, explanation:'カトリックの儀礼では乳香（フランキンセンスなどの天然樹脂）を香炉（振り香炉・つりびつ）で焚きます。仏式の抹香（粉末の香木）とは異なります。プロテスタントでは香の使用は一般的ではありません。' },
{ chapter:2, type:'4', text:'プロテスタントの葬儀礼拝における「賛美歌（さんびか）」の役割として正しいものはどれか。', choices:['故人の成仏を祈る念仏の代わり','神への賛美と感謝を捧げ、会衆が共に歌う礼拝の中心要素のひとつ','葬儀社のBGMとして流すもの','告別式の開始を知らせるもの'], answer:1, explanation:'プロテスタントの礼拝では賛美歌（讃美歌）を会衆が共に歌うことが礼拝の重要な要素です。葬儀礼拝でも賛美歌を歌い、神への賛美・感謝・故人の召天を祝います。カトリックでは「聖歌」と呼ぶことが多いです。' },
{ chapter:2, type:'4', text:'日本にキリスト教を最初に伝えた人物として正しいのはどれか。', choices:['マルコ・ポーロ','フランシスコ・ザビエル','コロンブス','ヴァスコ・ダ・ガマ'], answer:1, explanation:'フランシスコ・ザビエル（イエズス会士）が1549年に鹿児島に来日し、日本に初めてキリスト教（カトリック）を伝えました。その後、戦国時代には多くの大名がキリシタンになりましたが、江戸時代に禁教令が出されました。' },
{ chapter:2, type:'4', text:'キリスト教式葬儀（プロテスタント）の香典の表書きとして最も適切なものはどれか。', choices:['御仏前','御霊前','御花料','御玉串料'], answer:2, explanation:'プロテスタントへの香典は「御花料（おはなりょう）」が最も一般的です。「御霊前」はカトリックでは使えますが、プロテスタントでは霊魂観が異なるため不適切とされる場合があります。「御仏前」は仏式、「御玉串料」は神式に使います。' },
{ chapter:2, type:'4', text:'カトリックの「終油の秘跡（終油礼）」の現代の名称として正しいものはどれか。', choices:['洗礼','堅信','病者の塗油','告解'], answer:2, explanation:'「終油の秘跡」は現在「病者の塗油（びょうしゃのとゆ）」と呼ばれます。重篤な患者や臨終の際に司祭が額と手に聖油を塗る秘跡で、肉体的・霊的な癒しを求める儀礼です。かつては死の直前にしか行われませんでしたが、現在は重病時にも行われます。' },

// --- 新宗教・諸派 ---
{ chapter:2, type:'4', text:'創価学会の葬儀「友人葬」の特徴として正しいものはどれか。', choices:['僧侶が導師を務める','学会の友人・幹部が導師役を務め、僧侶を招かない','神職が玉串奉奠を行う','キリスト教式の讃美歌を歌う'], answer:1, explanation:'創価学会の友人葬は、日蓮正宗から破門後（1991年）に確立された独自の葬儀形式です。学会の男性幹部が「導師」役を務めて読経し、僧侶・神職・牧師を招きません。香典返しを行わないなど独自の慣習があります。' },
{ chapter:2, type:'4', text:'天理教の葬儀「みたまうつし」の意味として正しいものはどれか。', choices:['遺体を火葬場へ移すこと','故人の魂（みたま）が天理の神のもとへ帰ることを意味する儀礼','遺骨を骨壺に収めること','位牌に魂を入れる儀式'], answer:1, explanation:'天理教では人の死を「魂が神のもとへ帰る（出直し）」と捉え、葬儀を「みたまうつし」と呼びます。「死」「亡くなる」などの言葉を使わず、「出直す（でなおす）」という独自の言葉を使うのが特徴です。' },
{ chapter:2, type:'4', text:'「PL教団（パーフェクト リバティー教団）」の葬儀に関して正しいものはどれか。', choices:['仏式の読経が中心','「芸術は生活なり」を教義とし、独自の葬儀形式がある','神式の玉串奉奠が中心','プロテスタントの礼拝と同じ形式'], answer:1, explanation:'PL教団は「芸術は生活なり」を基本戒律とする新宗教で、1946年に御木徳近（みきとくちか）が創設しました。本部は大阪府富田林市にあり、独自の葬儀形式（PL葬）があります。派手な花火大会でも知られます。' },
{ chapter:2, type:'4', text:'「立正佼成会（りっしょうこうせいかい）」の特徴として正しいものはどれか。', choices:['法華経を根本経典とし、「法座」と呼ばれる輪談法座が特徴','浄土三部経を根本経典とする','神道の影響を強く受けた新宗教','キリスト教系の新宗教'], answer:0, explanation:'立正佼成会は1938年に庭野日敬・長沼妙佼が創設した法華経系の新宗教です。「法座（ほうざ）」と呼ばれる小グループでの輪談（話し合い）が特徴的な修行実践です。本部は東京都杉並区にあります。' },
{ chapter:2, type:'4', text:'「金光教（こんこうきょう）」の特徴として正しいものはどれか。', choices:['法華経を根本経典とする仏教系新宗教','江戸時代末期に川手文治郎が開いた神道系新宗教で「とりつぎ」が特徴','キリスト教の影響を受けた新宗教','大本（おおもと）の分派として成立した宗教'], answer:1, explanation:'金光教は1859年に岡山県の農民・川手文治郎（金光大神）が開いた神道系の新宗教です。「天地金乃神（てんちかねのかみ）」を信仰し、教祖が神と人の間を取り次ぐ「とりつぎ」が中心的な実践です。本部は岡山県浅口市金光町にあります。' },
{ chapter:2, type:'4', text:'「大本（おおもと）」教の開祖として正しいのはどれか。', choices:['出口なお（でぐちなお）と出口王仁三郎（おにさぶろう）','川手文治郎','中山みき','庭野日敬'], answer:0, explanation:'大本は1892年に出口なおが開いた神道系新宗教で、出口王仁三郎がそれを発展させました。「立替え立て直し」の世界改変を説き、第一次・第二次大本事件（1921年・1935年）で弾圧を受けました。本部は京都府亀岡市と綾部市にあります。' },
{ chapter:2, type:'4', text:'「霊友会（れいゆうかい）」系の新宗教として正しい組み合わせはどれか。', choices:['霊友会・立正佼成会・仏所護念会','創価学会・日蓮正宗・顕本法華宗','天理教・金光教・黒住教','大本・生長の家・世界救世教'], answer:0, explanation:'霊友会（1919年創設）は法華経系の新宗教で、立正佼成会・仏所護念会・妙智会などは霊友会から派生した宗教です。いずれも法華経と先祖供養を重視します。天理教・金光教・黒住教は幕末に成立した教派神道です。' },
{ chapter:2, type:'4', text:'「幸福の科学」の開祖として正しいのはどれか。', choices:['池田大作','大川隆法','出口王仁三郎','岡田茂吉'], answer:1, explanation:'幸福の科学は1986年に大川隆法が創設した新宗教で、仏教・キリスト教・儒教などを包括した独自の世界観を持ちます。政治活動（幸福実現党）にも積極的です。池田大作は創価学会第三代会長です。' },
{ chapter:2, type:'4', text:'「神道十三派（教派神道）」に含まれない宗教として正しいものはどれか。', choices:['黒住教','天理教','金光教','創価学会'], answer:3, explanation:'教派神道（神道十三派）とは明治政府が公認した神道系宗教団体で、黒住教・天理教・金光教・神道大社教・実行教・扶桑教などが含まれます。創価学会は日蓮宗系の新宗教であり、教派神道には含まれません。' },

// --- 法要・忌日 ---
{ chapter:2, type:'4', text:'仏式の法要の名称と時期の組み合わせとして誤っているものはどれか。', choices:['初七日 ── 死後7日目','三十五日 ── 死後35日目（五七日）','四十九日 ── 死後49日目','百か日 ── 死後200日目'], answer:3, explanation:'百か日（ひゃっかにち）は死後100日目に行う法要です。「卒哭忌（そっこくき）」とも呼ばれ、泣き悲しむことを卒（お）えるという意味があります。200日目ではありません。' },
{ chapter:2, type:'4', text:'仏式の「七回忌」は故人が亡くなってから何年後か。', choices:['7年後（満7年）','6年後（満6年）','8年後（満8年）','5年後（満5年）'], answer:1, explanation:'「回忌」の数え方では亡くなった年を「1」として数えるため、七回忌は亡くなって満6年後になります。同様に三回忌は満2年後、十三回忌は満12年後です。一般的な年忌は一・三・七・十三・十七・二十三・二十七・三十三・五十・百回忌などです。' },
{ chapter:2, type:'4', text:'仏式の「追善供養（ついぜんくよう）」とはどういう意味か。', choices:['故人の生前の善行を振り返ること','生きている者が善行を積んで故人の冥福に追加する（回向する）こと','葬儀費用の追加精算のこと','お墓の清掃と修繕のこと'], answer:1, explanation:'追善供養とは、残された者が善いことを行い（読経・布施・回向など）、その功徳を故人に振り向けることで冥土での故人の幸福（冥福）を助けるという考え方です。仏式法要の根本的な意味がここにあります。' },
{ chapter:2, type:'4', text:'「初盆（新盆）」が通常のお盆と異なる点として正しいものはどれか。', choices:['4日間（13〜16日）ではなく7日間かけて行う','通常より丁寧に供養し、白提灯を飾る慣習がある地域が多い','初盆では読経を行ってはならない','故人の遺族以外は参加できない'], answer:1, explanation:'初盆（新盆）は亡くなって四十九日後に初めて迎えるお盆で、故人の霊が初めて帰ってくるとされます。通常のお盆より丁寧に供養するため、僧侶を招いて読経してもらったり、白一色の提灯（白提灯）を飾ったりする地域が多くあります。' },
{ chapter:2, type:'4', text:'「永代供養（えいたいくよう）」とはどういう制度か。', choices:['家族が代々お墓を引き継ぐこと','寺院・霊園が遺族に代わって長期間（永代）にわたり供養・管理を行う制度','故人を永遠に葬祭ディレクターが管理すること','毎年命日に必ず法要を行う約束'], answer:1, explanation:'永代供養とは、遺族に代わって寺院や霊園が長期間（永代）にわたり遺骨の管理・供養を行う制度です。後継者がいない・子どもに負担をかけたくないなどの理由から近年増加しています。合祀墓・樹木葬などと組み合わせるケースも多いです。' },

// --- 数珠・仏具・祭壇 ---
{ chapter:2, type:'4', text:'数珠（念珠）の使い方として誤っているものはどれか。', choices:['焼香の際に左手にかける','礼拝の際に両手にかけて合掌する','神式の玉串奉奠の際に使用する','宗派によって形や玉の数が異なる'], answer:2, explanation:'数珠は仏教の道具であり、神式（神葬祭）では使用しません。神式では玉串奉奠の際に数珠を使わないのが適切です。数珠は仏式の焼香・礼拝・合掌の際に使用します。' },
{ chapter:2, type:'4', text:'「白木祭壇」と「花祭壇」の特徴の違いとして正しいものはどれか。', choices:['白木祭壇は神式専用、花祭壇は仏式専用','白木祭壇は仏式で伝統的に使われてきた木製の段飾りで、花祭壇は生花を主体にした現代的な祭壇','白木祭壇は火葬場で使用し、花祭壇は式場で使用する','費用は花祭壇の方が常に安い'], answer:1, explanation:'白木祭壇は未塗装の白木で作られた伝統的な仏式の祭壇です。近年は生花を主体とした花祭壇が普及し、故人の趣味・個性を反映したデザインが可能になっています。費用は規模や内容によって様々です。' },
{ chapter:2, type:'4', text:'「過去帳（かこちょう）」の説明として正しいものはどれか。', choices:['葬儀の費用明細を記録する帳簿','先祖代々の戒名・俗名・没年月日などを記録した帳簿','神式で霊璽の代わりに使う道具','葬儀社が遺族に渡す会葬御礼の記録簿'], answer:1, explanation:'過去帳は先祖の戒名・俗名・没年月日・享年などを記録した仏壇用の帳簿で、「命日帳」とも呼ばれます。浄土真宗では位牌の代わりに過去帳を重視します。寺院が管理する「寺の過去帳」は古くからある個人情報の記録でもあります。' },
{ chapter:2, type:'4', text:'「卒塔婆（そとうば・そとば）」の説明として正しいものはどれか。', choices:['神式の墓標として立てる木の板','仏式で墓石の後ろに立てる細長い木の板で、梵字・経文・戒名などが書かれた供養具','キリスト教式の十字架','葬儀場の入口に立てる案内板'], answer:1, explanation:'卒塔婆（梵語「ストゥーパ」の音写）は仏式の供養具で、細長い木の板に梵字・経文・戒名・命日などを書き、墓石の後ろに立てます。法要のたびに新しいものを立て、追善供養の意味があります。浄土真宗では原則使用しません。' },

// --- 香典・マナー・総合 ---
{ chapter:2, type:'4', text:'香典袋の選び方として、仏式（四十九日以前）に最も適切なものはどれか。', choices:['白黒の水引・「御霊前」の表書き','紅白の水引・「御祝」の表書き','黄白の水引・「御仏前」の表書き','白い封筒のみ・表書きなし'], answer:0, explanation:'仏式の葬儀（四十九日以前）では白黒または双銀の結び切り（あわじ結び）の水引がついた香典袋に「御霊前」または「御香典」「御香料」と書きます。四十九日以降の法要では「御仏前」を使います。' },
{ chapter:2, type:'4', text:'「会葬御礼（かいそうおれい）」と「香典返し」の違いとして正しいものはどれか。', choices:['まったく同じもので呼び方が違うだけ','会葬御礼は葬儀当日に参列者全員に渡す礼品、香典返しは香典をいただいた方へ後日（または即日）返礼する品','会葬御礼は喪主のみが受け取るもの','香典返しは必ず四十九日後に郵送しなければならない'], answer:1, explanation:'会葬御礼は葬儀・告別式に参列してくれた方全員に当日渡す礼品（会葬礼状・菓子など）で、香典の有無に関わらず渡します。香典返しは香典をいただいた方への返礼品で、忌明け後（または当日即返し）に渡します。' },
{ chapter:2, type:'4', text:'弔辞（ちょうじ）を述べる際の一般的なマナーとして正しいものはどれか。', choices:['できるだけ長く詳細に述べる','忌み言葉（重ね言葉・直接的な死の表現）を避け、3〜5分程度にまとめる','拡声器を使って大声で読み上げる','必ず暗記して紙を見ずに述べる'], answer:1, explanation:'弔辞では「重ね重ね」「再び」「続いて」などの重ね言葉（忌み言葉）や、「死ぬ」「生き返る」など直接的な表現を避けます。時間は3〜5分程度が一般的です。読み上げる際は弔辞用紙（巻紙）を広げながら読むのが正式な作法です。' },
{ chapter:2, type:'4', text:'次の「忌み言葉」として不適切でないものはどれか。', choices:['重ね重ねご愁傷様です','続いてお悔やみ申し上げます','謹んでご冥福をお祈りいたします','再び哀悼の意を表します'], answer:2, explanation:'「謹んでご冥福をお祈りいたします」は適切なお悔やみの言葉です。「重ね重ね」「続いて」「再び」は不幸が重なることを連想させる「重ね言葉（忌み言葉）」であり、弔事の場では避けるのがマナーです。' },
{ chapter:2, type:'4', text:'宗教別の「死後の名前」の組み合わせとして正しいものはどれか。', choices:['仏式：戒名、神式：法名、キリスト教式：洗礼名','仏式：戒名（浄土真宗は法名）、神式：諡（おくりな）、キリスト教式：洗礼名','仏式：諡、神式：戒名、キリスト教式：霊名','仏式：法号、神式：院号、キリスト教式：聖名'], answer:1, explanation:'仏式では「戒名」（浄土真宗のみ「法名」）、神式では「諡（おくりな）」、キリスト教では受洗時に授けられた「洗礼名（霊名）」が死後の名前として使われます。それぞれ宗教・宗派によって意味や授けられ方が異なります。' },
{ chapter:2, type:'4', text:'「お斎（おとき）」とは何か。', choices:['葬儀の費用のこと','法要後に行われる会食（精進料理を中心とした食事）','お盆に行う迎え火・送り火のこと','通夜の際に飾る枕飾りのこと'], answer:1, explanation:'お斎（おとき）とは法事・法要の後に行われる会食のことです。もともとは精進料理（動物性食品を使わない料理）が中心でしたが、現代では通常の料理が供される場合も多くなっています。僧侶へのお礼として振る舞うものでもあります。' },
{ chapter:2, type:'4', text:'神式と仏式の法要の時期の組み合わせとして正しいものはどれか。', choices:['神式：五十日祭＝仏式：初七日','神式：五十日祭＝仏式：四十九日','神式：一年祭＝仏式：三回忌','神式：百日祭＝仏式：一周忌'], answer:1, explanation:'神式の五十日祭（死後50日目）は仏式の四十九日（死後49日目）に相当する忌明けの祭事です。また神式の一年祭は仏式の一周忌、三年祭は三回忌、五年祭は五回忌にそれぞれ相当します。' },
{ chapter:2, type:'4', text:'「喪主（もしゅ）」と「施主（せしゅ）」の違いとして正しいものはどれか。', choices:['喪主と施主は同じ意味で区別はない','喪主は葬儀全体の主宰者（通常は故人の最も近い遺族）、施主は葬儀費用を負担する人','喪主は仏式のみの用語、施主は神式のみの用語','施主は葬儀社のスタッフを指す'], answer:1, explanation:'喪主は葬儀を主宰し、弔問客への挨拶・お礼などを行う代表者で、通常は配偶者・長子などが務めます。施主は葬儀費用を負担する人で、多くの場合は喪主と同一人物ですが、異なる場合もあります（会社が費用負担する社葬など）。' },

// --- 比較・総合 ---
{ chapter:2, type:'4', text:'次のうち「忌中（きちゅう）」の正しい説明はどれか。', choices:['喪に服す期間全体（一般的に一年間）','葬儀当日から四十九日（神式は五十日）までの期間','故人の命日から三年間の期間','お盆の期間のみ'], answer:1, explanation:'忌中とは、葬儀（または死亡）から忌明け（仏式：四十九日、神式：五十日祭）までの期間で、特に慎む期間です。神社参拝・慶事への参加などを控えるのが慣習です。忌中が明けた後も「喪中」として一年間は慶事を控えるのが一般的です。' },
{ chapter:2, type:'4', text:'「宗旨（しゅうし）」と「宗派（しゅうは）」の違いとして最も適切な説明はどれか。', choices:['まったく同じ意味で区別はない','宗旨は宗教の根本的な教え・教義、宗派はその宗旨の下の具体的な分派・組織','宗旨は新宗教、宗派は伝統仏教を指す','宗旨は海外の宗教、宗派は日本の宗教を指す'], answer:1, explanation:'宗旨とは宗教の根本的な教え・主義・信条のことで、「浄土宗旨」「禅宗旨」などと使います。宗派はその宗旨に基づく具体的な分派・教団組織を指します。葬儀業では「宗旨宗派」をセットで確認します。' },
{ chapter:2, type:'4', text:'葬儀施行の前に宗旨宗派を確認する主な理由として最も適切なものはどれか。', choices:['戒名の文字数を決めるため','読経の時間を計算するため','祭壇の形式・焼香の回数・読経の内容・作法などが宗旨宗派によって異なるため','参列者の数を予測するため'], answer:2, explanation:'宗旨宗派によって祭壇の形式（白木/花）・焼香の回数・読経する経典・引導の有無・数珠の形式・位牌の有無など、葬儀の進行に関わる多くの要素が異なります。そのため施行前の宗旨宗派確認は葬儀準備の基本中の基本です。' }
,

// ========================================
// 追加問題（○× 50問）
// ========================================

// --- 仏教各宗派・深掘り ---
{ chapter:2, type:'ox', text:'「禅（ぜん）」とはサンスクリット語の「ディヤーナ（瞑想）」に由来する言葉である。', answer:true, explanation:'「禅」は梵語（サンスクリット語）の「ディヤーナ（dhyāna）」が中国語で「禅那（ぜんな）」と音写され、「禅」と略されたものです。「瞑想・禅定」という意味で、坐禅（坐った瞑想）の実践を通じて悟りを目指す修行法を指します。' },
{ chapter:2, type:'ox', text:'「臨済宗妙心寺派」は日本最大の臨済宗の派で、全国に約3500か寺の末寺を持つ。', answer:true, explanation:'臨済宗は現在14の派に分かれており、その中で最大勢力を持つのが妙心寺派（総本山：妙心寺、京都市右京区）です。臨済宗は室町幕府の保護を受け、五山制度のもとで文化的にも大きな役割を果たしました。' },
{ chapter:2, type:'ox', text:'「道元」は永平寺を開いた後、一度も比叡山に戻ることなく越前（福井県）で一生を終えた。', answer:false, explanation:'道元は永平寺開山後、1247年に鎌倉幕府の執権・北条時頼に招かれて鎌倉に下向しましたが、約半年で帰山しました。また1253年に病を得て京都に上り、在京中に53歳で入寂（死去）しました。' },
{ chapter:2, type:'ox', text:'「法然」の弟子である「親鸞」は、師の教えをより徹底させ「他力本願」の思想を発展させた。', answer:true, explanation:'法然が「専修念仏」（ひたすら念仏を称えること）を説いたのに対し、親鸞はさらにそれを深め、自己の力（自力）を完全に捨て阿弥陀仏の働き（他力）にすべてを委ねる「絶対他力」の思想を確立しました。主著は「教行信証」です。' },
{ chapter:2, type:'ox', text:'浄土真宗の「歎異抄（たんにしょう）」は親鸞自身が書いた著作である。', answer:false, explanation:'歎異抄は親鸞の弟子・唯円（ゆいえん）が書いたとされる書物で、師・親鸞の言葉を記録しその教えの歪みを嘆いた内容です。「善人なほもて往生をとぐ、いはんや悪人をや」という言葉（悪人正機）が有名で、親鸞の著作ではありません。' },
{ chapter:2, type:'ox', text:'「日蓮宗」では、日蓮の遺骨が納められた身延山が聖地とされ、多くの信者が参詣に訪れる。', answer:true, explanation:'日蓮上人は身延山（山梨県）で晩年の約9年を過ごし、1282年に入滅しました。身延山久遠寺には日蓮の御廟所（お墓）があり、日蓮宗の総本山として多くの参詣者が訪れます。「身延詣り」は日蓮宗信者の重要な巡礼です。' },
{ chapter:2, type:'ox', text:'「真言宗」の「真言（マントラ）」は、意味を理解して唱えることが重要とされる。', answer:false, explanation:'真言（マントラ）は密教において「秘密の言葉」とされ、意味を論理的に理解して唱えることより、音（声）そのものに神聖な力があると考えられています。梵語のまま唱えることが重視され、翻訳しないことが原則です。' },
{ chapter:2, type:'ox', text:'「四弘誓願（しぐせいがん）」は、菩薩（悟りを求める者）が立てる四つの誓いで、多くの宗派の葬儀でも唱えられる。', answer:true, explanation:'四弘誓願とは①衆生無辺誓願度（すべての衆生を救う）②煩悩無尽誓願断（すべての煩悩を断つ）③法門無量誓願学（すべての法門を学ぶ）④仏道無上誓願成（最高の仏道を成就する）の四つです。多くの宗派の法要で唱えられます。' },
{ chapter:2, type:'ox', text:'「浄土宗」の増上寺（東京）は、徳川将軍家の菩提寺として知られる。', answer:true, explanation:'増上寺（東京都港区）は浄土宗の大本山で、徳川家康が江戸入府後に菩提寺と定めました。2代秀忠・6代家宣・7代家継・9代家重・12代家慶・14代家茂の将軍とその家族が埋葬されています。' },
{ chapter:2, type:'ox', text:'「臨済宗」の「公案（こうあん）」は、論理的な思考で解くことができる哲学的な問いかけである。', answer:false, explanation:'公案は「隻手の声を聞け」「父母未生以前の本来の面目とは何か」など、論理的・概念的思考では解けない問いです。これに取り組むことで思考の限界を超え、直接的な悟りの体験（見性）を目指すのが臨済宗の修行法です。' },

// --- 神式深掘り ---
{ chapter:2, type:'ox', text:'神道の「八百万（やおよろず）の神」とは、自然・万物すべてに神が宿るという考え方を表す。', answer:true, explanation:'「八百万の神」は日本神道の多神教的・アニミズム的な世界観を象徴する表現で、山・川・海・木・動物・人間など自然界のすべてに神が宿ると考えます。「八百万」は無数に多いという意味の表現です。' },
{ chapter:2, type:'ox', text:'神式葬儀では「御神酒（おみき）」を供えるのが一般的であるが、火葬後は供えない。', answer:false, explanation:'神式葬儀では故人への供え物（神饌・しんせん）として御神酒・米・塩・水・野菜・魚などを供えます。火葬後（火葬祭・帰家祭）でも御神酒を含む供え物を捧げます。供え物を控える特定の場面はありますが「火葬後は供えない」というルールはありません。' },
{ chapter:2, type:'ox', text:'「伊勢神宮（内宮）」の御祭神は、天照大御神（あまてらすおおみかみ）である。', answer:true, explanation:'伊勢神宮の内宮（皇大神宮）の御祭神は天照大御神で、太陽の神・皇室の祖先神として日本神道の最高位に位置づけられます。外宮（豊受大神宮）の御祭神は豊受大御神（食物・農業の神）です。' },
{ chapter:2, type:'ox', text:'神葬祭における「斎主（さいしゅ）」は仏式の「導師（僧侶）」に相当する役割を担う。', answer:true, explanation:'斎主は神葬祭を主宰する神職のことで、仏式の導師（葬儀を主宰する僧侶）に相当します。祝詞（のりと）の奏上・各種の儀礼の執行など、式全体を取り仕切ります。' },
{ chapter:2, type:'ox', text:'神道では「穢れ（けがれ）」を払うために「禊（みそぎ）」を行う。', answer:true, explanation:'禊（みそぎ）は水で身体を洗い清めることで穢れを祓う神道の浄化儀礼です。伊邪那岐命が黄泉の国から戻った際に禊を行ったという神話が起源とされます。現代の神式葬儀後の「清祓」も穢れを払う儀礼のひとつです。' },

// --- キリスト教深掘り ---
{ chapter:2, type:'ox', text:'「カトリック」とはギリシャ語で「普遍的な」という意味である。', answer:true, explanation:'「カトリック（Catholic）」はギリシャ語「カトリコス（katholikos）」に由来し、「普遍的な・全体にわたる」という意味です。「普遍教会（普遍的なキリストの教会）」という意味でカトリックと呼ばれます。' },
{ chapter:2, type:'ox', text:'「プロテスタント」という名称は、16世紀の宗教改革において改革派が旧体制に「抗議（プロテスト）」したことに由来する。', answer:true, explanation:'「プロテスタント」は1529年のシュパイヤー帝国議会でカトリック側の決定に対してルター派諸侯が「抗議（Protestatio）」したことに由来します。現在は「プロテスト（抗議）」という意味よりも、宗教改革から生まれたキリスト教各派の総称として使われています。' },
{ chapter:2, type:'ox', text:'日本のキリスト教人口は総人口の約30%を占める。', answer:false, explanation:'日本のキリスト教人口は総人口の約1〜2%程度とされており、非常に少数派です（カトリック・プロテスタント・正教会などを合わせて）。仏教徒（約67〜70%）・神道（約70〜80%、重複含む）と比べて大幅に少ない数字です。' },
{ chapter:2, type:'ox', text:'「正教会（せいきょうかい）」は東方キリスト教の一派で、ロシア正教・ギリシャ正教などがある。', answer:true, explanation:'正教会（Eastern Orthodox Church）は1054年のキリスト教大分裂でカトリックと分かれた東方キリスト教の流れで、ロシア正教会・ギリシャ正教会・日本正教会（ハリストス正教会）などがあります。日本では幕末に伝来しました。' },
{ chapter:2, type:'ox', text:'キリスト教の「臨終の秘跡（病者の塗油）」は、死が迫った時に司祭が行う儀礼でカトリックのみの慣行である。', answer:true, explanation:'病者の塗油（かつての「終油の秘跡」）はカトリックの七つの秘跡（サクラメント）のひとつで、重篤な患者や臨終の際に司祭が聖油を塗り祈る儀礼です。プロテスタントは一般的にこのような秘跡の制度を持ちません。' },

// --- 新宗教・諸派深掘り ---
{ chapter:2, type:'ox', text:'「天理教」では死を「出直し（でなおし）」と表現し、現世での修行を終えて神のもとへ帰ると考える。', answer:true, explanation:'天理教では人の死を否定的に捉えず、「神から借りていた体を返し、魂が生まれ直す（出直す）」という積極的な意味を持たせています。このため葬儀の場でも「死」「亡くなる」などの言葉を使わず「出直す」と言います。' },
{ chapter:2, type:'ox', text:'「霊友会（れいゆうかい）」は仏教系の新宗教で、現在も多くの派生宗教を生み出している。', answer:true, explanation:'霊友会（1919年創設）は法華経と先祖供養を基本とする新宗教で、立正佼成会・仏所護念会・妙智会など多くの派生宗教（分派）を生み出しました。これらをまとめて「霊友会系」と呼ぶこともあります。' },
{ chapter:2, type:'ox', text:'「世界救世教（せかいきゅうせいきょう）」は岡田茂吉が開いた新宗教で、「浄霊（じょうれい）」と呼ばれる手かざし療法が特徴である。', answer:true, explanation:'世界救世教は1935年に岡田茂吉（もきち）が開いた新宗教で、「光」を手から放射して病気を治す「浄霊」が特徴的な実践です。MOA美術館（静岡・東京）の運営でも知られます。' },
{ chapter:2, type:'ox', text:'「生長の家（せいちょうのいえ）」は谷口雅春が開いた新宗教で、「神の子」として人間の完全性を説く。', answer:true, explanation:'生長の家は1930年に谷口雅春が開いた新宗教で、「人間は神の子であり本来完全・善・美である」という「神人不二」の思想を説きます。雑誌「生長の家」の出版・「聖使命」誌などを通じて広まりました。' },
{ chapter:2, type:'ox', text:'「神社神道」と「教派神道」は同じものである。', answer:false, explanation:'神社神道は全国の神社・神宮で行われる伝統的な神道です。教派神道は明治時代に政府が公認した天理教・金光教・黒住教など13の宗教団体を指します。神社神道は国家管理下に置かれ（戦前）、教派神道は民間宗教として別扱いされました。' },
{ chapter:2, type:'ox', text:'「黒住教（くろずみきょう）」は江戸時代後期に岡山で成立した神道系の新宗教で、太陽神・天照大御神への信仰が中心である。', answer:true, explanation:'黒住教は1814年に岡山の神官・黒住宗忠が「天命直授（てんめいじきじゅ）」の神秘体験を経て開いた神道系新宗教です。太陽（天照大御神）への信仰と感謝を中心に、明るく積極的な生き方を説きます。教派神道の一つです。' },

// --- 法要・忌日深掘り ---
{ chapter:2, type:'ox', text:'「三十三回忌」は多くの宗派で「弔い上げ（とむらいあげ）」とされ、以後の個別の年忌法要を終了することが多い。', answer:true, explanation:'三十三回忌（満32年後）は多くの仏教宗派で年忌法要の締めくくり（弔い上げ）とされます。この後は個人として祀るのをやめ、先祖代々の霊として合祀する場合が多いです。地域・宗派によっては五十回忌を弔い上げとすることもあります。' },
{ chapter:2, type:'ox', text:'「月命日（つきめいにち）」とは、毎月その人が亡くなった日と同じ日付のことである。', answer:true, explanation:'月命日は毎月巡ってくる命日で、例えば3月15日に亡くなった場合、毎月15日が月命日です。年に一度の「命日（祥月命日・しょうつきめいにち）」と区別して「月命日」と呼びます。月命日に墓参りや仏前での手を合わせを行う習慣があります。' },
{ chapter:2, type:'ox', text:'「祥月命日（しょうつきめいにち）」とは、故人が亡くなった月日（月と日）が一致する、年に一度の命日のことである。', answer:true, explanation:'祥月命日（正忌・しょうき）は故人が亡くなった月と日が同じ、年に一度の本来の命日です。毎月の「月命日」と区別します。一周忌・三回忌などの年忌法要は原則としてこの祥月命日に行います。' },
{ chapter:2, type:'ox', text:'「涅槃会（ねはんえ）」は釈迦の誕生を祝う仏教行事である。', answer:false, explanation:'涅槃会は2月15日に釈迦の入滅（死去）を偲ぶ仏教行事です。釈迦の誕生を祝う行事は「花まつり（灌仏会・かんぶつえ）」で4月8日に行われます。「成道会（じょうどうえ）」は12月8日に釈迦の悟りを祝う行事です。' },
{ chapter:2, type:'ox', text:'「お盆（盂蘭盆会）」は仏教行事であり、先祖の霊が年に一度この世に戻ってくると信じられている。', answer:true, explanation:'お盆（盂蘭盆会・うらぼんえ）はインドの仏教行事が日本の祖先信仰・神道と融合した行事です。8月13日に迎え火で先祖の霊を迎え、16日に送り火で送り出す慣習があります（地域によっては7月）。精霊棚・盆踊りなど日本独自の文化も生まれました。' },

// --- 葬儀マナー・実務 ---
{ chapter:2, type:'ox', text:'葬儀に参列する際の数珠は、宗派の違う葬儀でも自分の宗派の数珠を使って構わない。', answer:true, explanation:'数珠は本来その宗派専用のものがありますが、葬儀に参列する際は自分の宗派の数珠（または「略式数珠」）を持参することが一般的で、他宗派の葬儀でも使用して問題ありません。数珠を持参すること自体が礼儀とされます。' },
{ chapter:2, type:'ox', text:'「喪中はがき」は一般的に故人が亡くなった翌年の年賀状シーズンに合わせて11〜12月に送る。', answer:true, explanation:'喪中はがき（年賀欠礼状）は、相手が年賀状を書く前に届くよう11月〜12月初旬に送るのが一般的なマナーです。年賀状が届いた後に喪中の事を知った場合は「寒中見舞い」で返答します。' },
{ chapter:2, type:'ox', text:'「香典（こうでん）」の語源は、線香・焼香など香を供えることへのお礼が金銭に変化したものとされる。', answer:true, explanation:'香典はもともと「香料（こうりょう）」とも呼ばれ、線香・香などを供えることへの代わりとして金銭を包むようになったものです。「典」は「典礼・儀式」という意味で、「香を供える儀礼への志」という意味合いがあります。' },
{ chapter:2, type:'ox', text:'「弔電（ちょうでん）」は葬儀に参列できない場合に喪家に送る電報で、現代でもNTTなどを通じて送ることができる。', answer:true, explanation:'弔電は葬儀に参列できない際に喪主宛てに送る電報形式のお悔やみで、現代でもNTT・KDDI・電報各社のサービスを通じて送ることができます。葬儀式場に届くよう、通夜・葬儀の前日までに手配するのが一般的です。' },
{ chapter:2, type:'ox', text:'葬儀の「受付」は遺族が担当するのが正式なマナーである。', answer:false, explanation:'葬儀の受付は故人の友人・知人・会社の同僚など「世話人（てつだい人）」が担当するのが一般的です。遺族は弔問客への挨拶・接待・式の進行に専念するため、受付は他の人に委ねるのが通例です。' },

// --- 葬儀形式・現代的変化 ---
{ chapter:2, type:'ox', text:'「音楽葬（おんがくそう）」とは、故人が好んだ音楽を式中に流したり演奏したりする葬儀形式で、無宗教葬の一種である。', answer:true, explanation:'音楽葬は宗教的な儀礼の代わりに、または組み合わせて、故人が愛した音楽を中心に構成する葬儀形式です。無宗教葬（自由葬）の中でも増加しており、生演奏・録音再生・合唱など様々な形があります。' },
{ chapter:2, type:'ox', text:'「グリーフケア」は遺族支援のためのケアであり、葬儀社が提供するアフターフォローとしても注目されている。', answer:true, explanation:'グリーフケアは死別などによる悲嘆（グリーフ）を抱えた遺族を心理的・社会的に支援するケアです。近年、葬儀社が葬儀後の遺族を訪問したり、グリーフケアの場を提供したりするアフターフォローの一環として提供するケースが増えています。' },
{ chapter:2, type:'ox', text:'「手元供養（てもとくよう）」とは、遺骨の一部を小さな骨壺や専用のアクセサリーに入れて手元に置いて供養する方法である。', answer:true, explanation:'手元供養は墓への納骨に加えて（または代わりに）遺骨の一部を手元に置いて供養する方法です。ミニ骨壺・メモリアルジュエリー（遺骨を入れたアクセサリー）・ぬいぐるみ型など様々な形があり、近年増加しています。' },

// ========================================
