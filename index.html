// ========================================

// --- 仏教宗派詳細 ---
{ chapter:6, type:'4', text:'「浄土真宗大谷派（東本願寺）」の焼香作法として正しいものはどれか。', choices:['額に押しいただいて1回','額に押しいただかずに1回','額に押しいただかずに2回','額に押しいただいて3回'], answer:2, explanation:'真宗大谷派（東本願寺）の焼香は「押しいただかず（額に当てず）に2回」が正式な作法です。浄土真宗本願寺派（西本願寺）は「押しいただかずに1回」です。この違いは覚えておく必要があります。' },
{ chapter:6, type:'4', text:'「一向宗（いっこうしゅう）」とは何の別称か。', choices:['曹洞宗','日蓮宗','浄土真宗','時宗'], answer:2, explanation:'一向宗は浄土真宗（本願寺）の俗称で、「ひたすら（一向に）阿弥陀仏を念じる」という意味から付いた呼び名です。戦国時代に各地で起きた「一向一揆」は浄土真宗（一向宗）の門徒が起こした武装蜂起でした。' },
{ chapter:6, type:'4', text:'「修験道（しゅげんどう）」の特徴として正しいものはどれか。', choices:['純粋な仏教の宗派','山岳での厳しい修行を通じて呪力を得ようとする、仏教・神道・道教などが融合した宗教実践','キリスト教の影響を受けた日本固有の宗教','武士道を宗教化した日本独自の精神形式'], answer:1, explanation:'修験道は山岳に神仏が宿るという信仰のもと、峰入り（山中での修行）を通じて霊力・呪力（験力）を得ようとする宗教実践で、仏教（特に密教）・神道・道教・山岳信仰などが融合しています。役小角（えんのおづぬ）を開祖とします。' },
{ chapter:6, type:'4', text:'「高野山（こうやさん）」について正しい説明はどれか。', choices:['天台宗の総本山がある山','真言宗の総本山・金剛峯寺がある霊場で、世界遺産にも登録されている','日蓮宗の創始者・日蓮が晩年を過ごした山','禅宗の修行道場が集まる山'], answer:1, explanation:'高野山（和歌山県伊都郡高野町）は真言宗の総本山・金剛峯寺がある霊場で、2004年に「紀伊山地の霊場と参詣道」としてユネスコ世界遺産に登録されました。奥之院には空海の御廟所があり、今も生きて定を続けていると信じられています。' },
{ chapter:6, type:'4', text:'「比叡山（ひえいざん）」延暦寺の説明として正しいものはどれか。', choices:['真言宗の総本山','浄土宗の開祖・法然が開いた寺','天台宗の総本山で、多くの鎌倉仏教の開祖を輩出した日本仏教の母山','日蓮宗の総本山'], answer:2, explanation:'比叡山延暦寺（滋賀県大津市）は天台宗の総本山で、最澄（伝教大師）が開きました。法然・親鸞・道元・日蓮・栄西など鎌倉時代の多くの宗祖が修行した場所であり「日本仏教の母山」と呼ばれます。2004年に世界遺産登録。' },
{ chapter:6, type:'4', text:'「永平寺（えいへいじ）」について正しい説明はどれか。', choices:['臨済宗の総本山','曹洞宗の大本山のひとつで、道元が開いた寺','浄土真宗の本山','真言宗の別院'], answer:1, explanation:'永平寺（福井県吉田郡永平寺町）は曹洞宗の大本山のひとつで、道元が1244年に開きました。現在も多くの雲水（修行僧）が修行する「参禅道場」として知られます。もう一つの大本山は横浜の總持寺です。' },
{ chapter:6, type:'4', text:'「知恩院（ちおんいん）」の説明として正しいものはどれか。', choices:['曹洞宗の総本山','浄土宗の総本山で、法然上人が念仏を広めた地に建てられた','日蓮宗の大本山','浄土真宗の別院'], answer:1, explanation:'知恩院（京都市東山区）は浄土宗の総本山で、法然上人が念仏の教えを広め、入定（死去）した地に建てられました。三門（国宝）は木造建築として日本最大級の規模を誇ります。除夜の鐘でも有名です。' },
{ chapter:6, type:'4', text:'「宗祖（しゅうそ）」と「中興の祖（ちゅうこうのそ）」の違いとして正しいものはどれか。', choices:['宗祖は現在の宗派のトップ、中興の祖は歴史上の人物','宗祖はその宗派を開いた人物、中興の祖は後に宗派を再興・発展させた人物','まったく同じ意味','宗祖は仏教用語、中興の祖は神道用語'], answer:1, explanation:'宗祖はその宗派の開祖を指します。中興の祖は宗派が衰えた時期にそれを再び盛んにした功績ある人物のことです。例えば曹洞宗では道元が宗祖、瑩山紹瑾が中興の祖とされます。' },

// --- 神式詳細 ---
{ chapter:6, type:'4', text:'神式葬儀の「発柩祭（はっきゅうさい）」とは何か。', choices:['火葬場で行う最後の儀式','棺を斎場・自宅から出棺する際の儀式','骨上げの際の儀式','帰宅後の清めの儀式'], answer:1, explanation:'発柩祭は棺を安置場所（自宅・斎場）から出棺する際に行う神式の儀式です。仏式の「出棺」に相当します。出棺の際に神職が祝詞を奏上し、一同が玉串を奉奠して故人の旅立ちを送ります。' },
{ chapter:6, type:'4', text:'神式葬儀における香典の正しい表書きはどれか。', choices:['御仏前','御花料','御玉串料または御榊料','御霊前のみ'], answer:2, explanation:'神式葬儀への香典は「御玉串料（おたまぐしりょう）」または「御榊料（おさかきりょう）」が最も適切です。「御神前（ごしんぜん）」「御霊前」も使えます。「御仏前」は仏式専用です。' },
{ chapter:6, type:'4', text:'神道における「祓詞（はらえことば）」とはどういうものか。', choices:['葬儀の際に奏上する弔いの言葉','穢れや罪を祓い清めるために唱える祝詞（のりと）','神社への参拝時に述べる感謝の言葉','神職の身分を証明する言葉'], answer:1, explanation:'祓詞は穢れ・罪・災いを祓い清めるために唱える祝詞で、「払へ給ひ清め給へと申す事を聞こし召せと白す」という内容が含まれます。神葬祭でも各種の儀礼で祓詞が奏上されます。' },

// --- 諸宗教・比較 ---
{ chapter:6, type:'4', text:'「イスラム教」の葬儀の特徴として正しいものはどれか。', choices:['火葬が原則で、できるだけ早く行う','土葬が原則で、死後できるだけ早く（24時間以内が理想）行う','散骨が推奨される','遺体は7日間安置してから埋葬する'], answer:1, explanation:'イスラム教では遺体を土に還すことが教義上の原則のため土葬です。また「早い埋葬が故人への敬意」とされ、死後できるだけ早く（24時間以内が理想）に行います。日本では土葬できる墓地が少なく課題となっています。' },
{ chapter:6, type:'4', text:'ユダヤ教の葬儀の特徴として正しいものはどれか。', choices:['豪華な棺を使い、長期間かけて行う','シンプルな木製の棺を使い、死後できるだけ早く土葬する','火葬を推奨する','僧侶が読経する'], answer:1, explanation:'ユダヤ教では「人間は土から生まれ土に返る」という考えから、土葬が原則です。棺はシンプルな木製（木釘使用・金具不使用）が伝統で、土に早く還るようにします。死後24時間以内の埋葬が理想とされます。' },
{ chapter:6, type:'4', text:'ヒンドゥー教の葬儀の特徴として正しいものはどれか。', choices:['土葬が原則','火葬が原則で、ガンジス川での水葬も行われる','遺体は保存処理して長期間安置する','読経を3日間続ける'], answer:1, explanation:'ヒンドゥー教では輪廻転生の思想から「肉体はただの入れ物」と考え、火葬（荼毘・だび）が一般的です。インドではガンジス川沿いの火葬場（ガート）で火葬し、遺灰を川に流す慣習があります。仏教の「荼毘に付す」という言葉もヒンドゥー教由来です。' },
{ chapter:6, type:'4', text:'「神道」「仏教」「キリスト教」「イスラム教」の中で、日本人の葬儀で最も多く行われているのはどれか。', choices:['神道（神葬祭）','仏教式（仏式）','キリスト教式','イスラム教式'], answer:1, explanation:'日本の葬儀は仏教式が最も多く、約90%前後とされています（調査機関・時期によって異なります）。神式は数%程度、キリスト教式は1〜2%程度です。ただし近年は無宗教・家族葬の増加により、宗教色のない葬儀も増えています。' },
{ chapter:6, type:'4', text:'次のうち「教派神道」として明治政府が公認した13派に含まれないものはどれか。', choices:['天理教','黒住教','金光教','創価学会'], answer:3, explanation:'教派神道（神道十三派）は明治政府が公認した神道系宗教で、黒住教・神道修成派・出雲大社教・扶桑教・実行教・大成教・神習教・御嶽教・神道大社教・禊教・金光教・天理教・神道本局の13派です。創価学会は日蓮宗系の新宗教であり含まれません。' },

// --- 法要・文化 ---
{ chapter:6, type:'4', text:'「お彼岸（おひがん）」に行う主な供養として一般的なものはどれか。', choices:['神社への参拝と玉串奉奠','墓参り・仏壇への供養・法要','教会での礼拝と献花','散骨と海洋供養'], answer:1, explanation:'お彼岸（春分・秋分の前後各3日間）には先祖の墓参り・仏壇への供物・法要などが行われます。「ぼたもち（牡丹餅）」「おはぎ（御萩）」を供える慣習も有名です（春はぼたもち、秋はおはぎ）。神式・キリスト教式では一般的な行事ではありません。' },
{ chapter:6, type:'4', text:'「四十九日」に行う一般的な作法として誤っているものはどれか。', choices:['仮の白木位牌から本位牌へ切り替える','香典の表書きを「御霊前」から「御仏前」に変更する','納骨を行う','喪中はがきを送る'], answer:3, explanation:'喪中はがき（年賀欠礼状）は11〜12月に送るもので、四十九日のタイミングで送るものではありません。四十九日では①白木位牌から本位牌への切り替え②納骨③忌明けのお礼④「御霊前」→「御仏前」への表書き変更、などが一般的に行われます。' },
{ chapter:6, type:'4', text:'「回向（えこう）」とはどういう意味か。', choices:['お墓の向きを変えること','自分の功徳（善行・読経など）を故人や他の人のために振り向けること','葬儀場の方向を確認すること','仏壇の向きを直すこと'], answer:1, explanation:'回向（廻向）とは自分が積んだ善根・功徳を他の者（故人や生きている人）のために振り向けることです。法要での読経・布施などが回向の代表的な実践で、「追善回向」は故人の冥福のために行う追善供養を指します。' },
{ chapter:6, type:'4', text:'「施餓鬼（せがき）」法要とは何か。', choices:['葬儀の費用を計算する儀礼','餓鬼道に苦しむ霊や無縁仏に食物を施す供養法要','お盆に行う盆踊りの起源となった儀式','彼岸に行う先祖供養の特別法要'], answer:1, explanation:'施餓鬼法要は、餓鬼道（飢えに苦しむ世界）に堕ちた霊や無縁仏（供養する人のない霊）に食物を施して供養する法要です。お盆の時期や彼岸に合わせて行われることが多く、お寺が主催する合同の施餓鬼法要も各地で行われます。' },
{ chapter:6, type:'4', text:'「位牌（いはい）」の説明として正しいものはどれか。', choices:['神式で使用する霊魂の依代','仏式で戒名・没年月日・俗名などを記した木製の牌で、故人の霊の依代とされる','キリスト教式で聖書を置く台','葬儀場の案内表示板'], answer:1, explanation:'位牌は仏式で使用する木製の牌で、戒名・没年月日・俗名・享年などが記されます。故人の霊の依代（よりしろ）として仏壇に安置し、日々の供養の対象となります。葬儀直後は白木の「仮位牌（白木位牌）」を使い、四十九日後に塗位牌・本位牌に変えます。' },
{ chapter:6, type:'4', text:'「通夜振舞い（つやぶるまい）」とは何か。', choices:['通夜の式次第の進行のこと','通夜終了後に参列者を接待する会食のこと','通夜の際に喪主が挨拶すること','通夜の翌朝に行う朝食のこと'], answer:1, explanation:'通夜振舞いは通夜の式が終わった後、参列者に飲食でもてなす会食のことです。故人との思い出を語り合い、遺族が参列へのお礼をする場でもあります。料理は寿司・オードブル・精進料理などが多く、地域によって内容が異なります。' },
{ chapter:6, type:'4', text:'「中陰（ちゅういん）」とは何を指すか。', choices:['仏壇のある部屋のこと','死後に次の生を受けるまでの49日間の状態','仏教の瞑想修行の一種','葬儀と告別式の間の休憩時間'], answer:1, explanation:'中陰（中有）とは仏教において、死後に次の生（転生）を受けるまでの過渡的な状態・期間を指します。この期間は49日間（七七日）とされ、7日ごとに裁きを受けると考えられています。これが四十九日法要を重視する根拠となっています。' },
{ chapter:6, type:'4', text:'「引導（いんどう）」を渡す主な目的として正しいものはどれか。', choices:['遺体を火葬場まで運ぶ','故人の霊を迷いから解放し、仏の世界へ導く','遺族に葬儀の費用を説明する','参列者に式の進行を案内する'], answer:1, explanation:'引導は導師（僧侶）が故人に向けて引導文（いんどうぶん）を読み上げ、この世への執着を断ち切って迷わず仏の世界へ向かうよう導く儀式です。仏式葬儀（特に禅宗）の中核をなす重要な儀礼のひとつです。' },
{ chapter:6, type:'4', text:'「導師（どうし）」が複数の僧侶で行う葬儀の場合、最も位の高い僧侶はどの役割を担うか。', choices:['受付・案内','導師（引導を渡す主役の僧侶）','斎主（神職の役割）','葬儀社の担当者'], answer:1, explanation:'複数の僧侶が参列する葬儀では、最も地位の高い（または住職・故人と最も縁の深い）僧侶が「導師」として引導・読経の中心的役割を務めます。他の僧侶は「伴僧（ばんそう）・脇僧（わきそう）」として導師を補佐します。' },
{ chapter:6, type:'4', text:'「焼香」の「抹香（まっこう）」とはどういうものか。', choices:['線香を細かく粉末にしたもの，または香木・香料を粉末にしたもの','ロウソクに火をつける道具','仏壇に供える果物や菓子','焼香台の炭火のこと'], answer:0, explanation:'抹香（まっこう）は香木・香料などを細かく粉末状にしたもので、焼香の際に指でつまんで炭火の上に落として焚きます。「沈香（じんこう）」「白檀（びゃくだん）」など香木が主原料です。' },
{ chapter:6, type:'4', text:'「般若心経（はんにゃしんぎょう）」はどの宗派でも広く読まれているか。', choices:['浄土真宗でも必ず読まれる','浄土真宗では読まれないが、他の多くの宗派で広く読まれている','日蓮宗でのみ読まれる','キリスト教でも取り入れている'], answer:1, explanation:'般若心経は真言宗・天台宗・禅宗（曹洞宗・臨済宗）・浄土宗など多くの宗派で読まれる経典です。しかし浄土真宗では「阿弥陀経・正信偈」など浄土三部経が中心で、般若心経は読みません。日蓮宗も法華経が中心です。' },
{ chapter:6, type:'4', text:'「過去帳（かこちょう）」を毎日めくる習慣について正しいものはどれか。', choices:['浄土真宗では毎日めくり、その日の命日の故人に手を合わせる習慣がある','すべての宗派で必ず毎日めくる','過去帳はめくらずに保管するだけのもの','過去帳は寺院だけが持つもの'], answer:0, explanation:'浄土真宗では過去帳を命日帳として毎日めくり（日付のある「日めくり型過去帳」）、その日に命日を迎える先祖に手を合わせる習慣があります。位牌を使わない浄土真宗において過去帳は重要な供養の道具です。' },
{ chapter:6, type:'4', text:'「檀家（だんか）」制度の説明として正しいものはどれか。', choices:['江戸幕府が設けた制度で、すべての人が特定の寺院に所属することを義務付けた','平安時代に始まった貴族と寺院の関係','神社と氏子の関係を指す','葬儀社が顧客を管理するシステム'], answer:0, explanation:'檀家制度は江戸幕府がキリシタン禁制のために設けた「寺請制度（てらうけせいど）」に基づくもので、すべての民衆が特定の寺院の檀家となり、宗教証明を受けることを義務付けました。これが現代の「菩提寺（ぼだいじ）」制度の起源です。' },

// --- 追加30問（○×15・4択15）---
{ chapter:6, type:'ox', text:'「お布施（おふせ）」は葬儀サービスへの対価（報酬）であり、消費税の課税対象となる。', answer:false, explanation:'お布施は僧侶・寺院への感謝として渡すものであり、法的には「寄付金（布施）」の性格を持ちます。対価性のない寄付のため消費税は不課税です。金額の明示義務もなく、「お気持ち」として遺族が決める形が多いです。' },
{ chapter:6, type:'ox', text:'「初七日法要」は現代では葬儀当日に「繰り込み初七日」として行われることが多い。', answer:true, explanation:'本来は死後7日目に行う初七日法要ですが、遠方からの参列者の都合・日程の効率化のため、現代では葬儀・告別式当日に続けて行う「繰り込み初七日（式中初七日）」が主流になっています。' },
{ chapter:6, type:'ox', text:'「精霊馬（しょうりょううま）」はお盆に作るきゅうりとなすの飾りで、きゅうりが馬、なすが牛を表す。', answer:true, explanation:'精霊馬（精霊牛）はお盆に先祖の霊を迎え送るための乗り物として作ります。きゅうりは足の速い「馬」（あの世から早く帰ってくるよう）、なすはゆっくりした「牛」（この世をゆっくり去っていくよう）を表します。' },
{ chapter:6, type:'ox', text:'「寺請制度（てらうけせいど）」は明治時代に廃止され、現代日本には存在しない。', answer:true, explanation:'寺請制度は明治政府の政教分離政策により1871年（明治4年）に廃止されました。しかし「菩提寺」への依存や仏教式葬儀の慣行は現在も続いており、制度としては廃止されても文化・慣習として根付いています。' },
{ chapter:6, type:'ox', text:'「禅語」で有名な「不立文字（ふりゅうもんじ）」とは「文字に頼らず直接体験で悟りを得る」という禅の立場を示す。', answer:true, explanation:'「不立文字」は禅の基本姿勢を示す言葉で、「経典の文字・言葉に頼らず、師から弟子への心から心への直接伝達（以心伝心）によって悟りを伝える」という意味です。「教外別伝（きょうげべつでん）」「直指人心（じきしにんしん）」「見性成仏（けんしょうじょうぶつ）」とともに禅の四句とされます。' },
{ chapter:6, type:'ox', text:'「念仏（ねんぶつ）」とは仏の名前を唱えることだけを指す。', answer:false, explanation:'念仏とは本来「仏を念じる（心に思い浮かべる）」という意味で、①口称念仏（くしょうねんぶつ：声に出して仏名を称える）②観想念仏（かんそうねんぶつ：仏の姿を心に観想する）③実相念仏などがあります。日本の浄土宗系では主に口称念仏（「南無阿弥陀仏」を称える）を指します。' },
{ chapter:6, type:'ox', text:'「神道」では「死穢（しえ）」を最大の穢れとするため、神社の境内に墓地を設けることは原則ない。', answer:true, explanation:'神道において死は最大の穢れ（死穢）とされるため、神社の境内に墓地を設けることは原則ありません。これは寺院が境内に墓地（寺院墓地）を持つ仏教の慣習と対照的です。神道系の墓地は神社とは別の場所に設けられます。' },
{ chapter:6, type:'ox', text:'「連名（れんめい）」の香典は、複数人が連名で一つの香典袋に入れて渡すことができる。', answer:true, explanation:'同僚・グループ・部署など複数人でまとめて香典を出す場合、連名で一つの香典袋に入れることができます。表書きには代表者名を書き「外一同」などと添えます。別紙に全員の名前と金額を書いて同封するのが丁寧な作法です。' },
{ chapter:6, type:'ox', text:'「浄土（じょうど）」とは仏が清らかにした世界のことで、「極楽浄土」は阿弥陀仏の浄土を指す。', answer:true, explanation:'浄土は仏・菩薩が衆生を救うために設けた清浄な世界のことです。阿弥陀仏の浄土は「極楽浄土（西方極楽世界）」、薬師仏の浄土は「東方浄瑠璃世界」などがあります。浄土宗・浄土真宗は阿弥陀仏の極楽浄土への往生を目指します。' },
{ chapter:6, type:'ox', text:'「密教（みっきょう）」は公開された教えであり、誰でも自由に学ぶことができる。', answer:false, explanation:'密教の「密」は「秘密」を意味し、師から弟子への秘密の伝授（口伝・灌頂）によって伝えられる教えです。「顕教（けんきょう）」が経典として公開された教えなのに対し、密教は師資相承（師弟間の秘密の伝達）を重視します。' },
{ chapter:6, type:'ox', text:'「真言宗」の「護摩（ごま）」とは、火を使った密教の儀式で、煩悩を焼き尽くす意味がある。', answer:true, explanation:'護摩（梵語：ホーマ）は密教の重要な修法で、炉に火を焚き、木・米・胡麻などの供物を投入して燃やすことで煩悩を焼き尽くし、願いを成就させるとされます。不動明王を本尊として行う「不動護摩」が代表的です。' },
{ chapter:6, type:'ox', text:'「日蓮正宗（にちれんしょうしゅう）」は日蓮宗から派生した宗派で、創価学会はかつてこの宗派の信徒団体だった。', answer:true, explanation:'日蓮正宗は1290年頃に日興（にっこう）が日蓮の本弟子として開いた宗派で、総本山は富士山麓の大石寺（静岡県富士宮市）です。創価学会は元々日蓮正宗の信徒団体でしたが、1991年に対立が深まり破門されて独立しました。' },
{ chapter:6, type:'ox', text:'「おくり火（送り火）」はお盆の最終日（8月16日）に先祖の霊を送り出すために焚く火である。', answer:true, explanation:'送り火はお盆の終わり（8月16日）に先祖の霊があの世へ帰るのを見送るために焚く火です。迎え火（8月13日）の対となる慣習です。京都の「大文字焼き（五山の送り火）」は全国的に有名な送り火の行事です。' },
{ chapter:6, type:'ox', text:'「施主（せしゅ）」は仏教用語で、もともとは「布施（ふせ）をする人＝僧侶・寺院に財物を施す人」を意味する。', answer:true, explanation:'施主は梵語「ダーパティ」の訳で、本来は「布施をする在家信者（お金・食物などを僧侶に施す人）」という意味です。現代では葬儀・法要の費用を負担し手配する人（多くの場合、喪主と同一人物）を指す意味でも使われています。' },
{ chapter:6, type:'ox', text:'「開眼供養（かいげんくよう）」とは、新しく作った仏像・位牌・墓石などに魂（霊）を入れる儀式である。', answer:true, explanation:'開眼供養（開眼法要・魂入れ）は新しく仏像・位牌・墓石などを作った際に、僧侶が読経して「目を開く（魂・霊を入れる）」儀式です。これにより単なる物体が礼拝の対象となります。墓石を建てた際にも行われます。' },
{ chapter:6, type:'4', text:'「両祖（りょうそ）」という言葉で知られる曹洞宗の二人の宗祖は誰か。', choices:['道元と栄西','道元と瑩山紹瑾','最澄と空海','法然と親鸞'], answer:1, explanation:'曹洞宗では「両祖（りょうそ）」として道元（承陽大師）と瑩山紹瑾（常済大師）を崇敬します。道元が宗祖として曹洞宗を開き、瑩山が総持寺を開いて宗勢を大きく拡大したことから「中興の祖」と呼ばれます。' },
{ chapter:6, type:'4', text:'「禅宗」の葬儀における焼香の回数として一般的なものはどれか。', choices:['1回','2回','3回','5回'], answer:2, explanation:'曹洞宗・臨済宗などの禅宗では焼香を3回行うのが一般的な作法です。ただし地域・寺院・状況によって異なる場合もあります。浄土真宗（1〜2回）や浄土宗（1〜3回）などと比較して覚えましょう。' },
{ chapter:6, type:'4', text:'「五山（ごさん）」制度とは何か。', choices:['天台宗の五つの本山','鎌倉・室町幕府が定めた禅宗寺院の格付け制度','真言宗の重要寺院五か所','浄土宗の五つの大本山'], answer:1, explanation:'五山制度は鎌倉・室町幕府が臨済宗の重要寺院を格付けした制度で、京都五山（天龍寺・相国寺・建仁寺・東福寺・万寿寺）と鎌倉五山（建長寺・円覚寺・寿福寺・浄智寺・浄妙寺）があります。幕府の保護下で禅文化が発展しました。' },
{ chapter:6, type:'4', text:'「本山（ほんざん）」と「末寺（まつじ）」の関係として正しいものはどれか。', choices:['本山は古い寺院、末寺は新しい寺院','本山は宗派の中心となる寺院、末寺はその宗派に属する一般の寺院','本山は大きな寺院、末寺は小さな寺院','本山は東京の寺院、末寺は地方の寺院'], answer:1, explanation:'本山は宗派の中心・統括機関となる寺院（総本山・大本山など）で、宗祖ゆかりの地に建てられることが多いです。末寺はその宗派に属する一般の寺院で、本山の管轄下にあります。「本末関係（ほんまつかんけい）」と呼ばれます。' },
{ chapter:6, type:'4', text:'「無宗教葬（自由葬）」で避けるべき配慮として正しいものはどれか。', choices:['音楽を流すこと','特定の宗教の儀礼（読経・祝詞・讃美歌など）を押しつけないこと','献花を行うこと','司会者を設けること'], answer:1, explanation:'無宗教葬では参列者の宗教的背景が様々であることを考慮し、特定宗教の儀礼を強制しないことが重要です。音楽・献花・司会・映像などは宗教色のない演出として広く使われます。故人・遺族の意向を最大限尊重した式づくりが求められます。' },
{ chapter:6, type:'4', text:'「葬場祭（そうじょうさい）」とはどの宗教の葬儀用語か。', choices:['仏式','神式（神葬祭）','キリスト教式','無宗教葬'], answer:1, explanation:'葬場祭は神葬祭（神式葬儀）の中心的な儀式で、仏式の「葬儀・告別式」に相当します。斎主が祭詞を奏上し、参列者が玉串奉奠を行います。神葬祭の式次第は遷霊祭→発柩祭→葬場祭→火葬祭→帰家祭の順です。' },
{ chapter:6, type:'4', text:'「戒名料（かいみょうりょう）」についての正しい説明はどれか。', choices:['法律で定められた一定の金額がある','一般的に院号＞道号・戒名＞位号の順に高くなる傾向があり、金額は寺院・宗派によって大きく異なる','戒名料は仏教どの宗派でも同じ料金体系','戒名料は葬儀社が設定する'], answer:1, explanation:'戒名料は法律で定められた金額はなく、院号の有無・文字数・寺院との関係などによって大きく異なります。院号付きは数十万〜数百万円、一般的な戒名は数万〜数十万円程度が相場とされますが、寺院・地域・宗派によって様々です。' },
{ chapter:6, type:'4', text:'「神棚封じ（かみだなふうじ）」とはどういうものか。', choices:['神棚を撤去すること','死の穢れが神棚に及ばないよう、白い紙を貼って神棚を封じること','神棚に新しい神札を入れること','神棚の掃除をすること'], answer:1, explanation:'神棚封じは家人が亡くなった際に、死の穢れが神様に及ばないよう神棚の扉または正面に白紙（半紙）を貼って封じる慣習です。神道の「死穢（しえ）」の概念から来ており、忌明け（五十日祭後）に紙を取り外します。' },
{ chapter:6, type:'4', text:'「菩提寺（ぼだいじ）」の意味として正しいものはどれか。', choices:['悟りを開いた場所にある寺','その家の先祖代々の葬儀・法事を行い、遺骨・位牌を管理する縁の深い寺院','全国で最も格式の高い寺院','葬儀社が指定する提携寺院'], answer:1, explanation:'菩提寺とは、その家の先祖代々の葬儀・年忌法要を行い、墓地・位牌を管理する縁の深い寺院のことです。江戸時代の寺請制度に起源を持ち、現代でも「家の宗教」として続いています。菩提寺のある家では葬儀の際に菩提寺の住職に依頼するのが一般的です。' },
{ chapter:6, type:'4', text:'「三途の川（さんずのかわ）」について正しい説明はどれか。', choices:['神道の死後の世界に存在する川','仏教の死後の世界観で、死者がこの世からあの世へ渡る際に越えるとされる川','キリスト教の天国への道にある川','実在する河川の別名'], answer:1, explanation:'三途の川は仏教の死後の世界観で、死者が冥土へ向かう途中に渡るとされる川です。生前の行いによって渡り方が異なり（橋・浅瀬・深み）、川の番人「奪衣婆（だつえば）」と「懸衣翁（けんえおう）」が衣服を奪って罪の重さを量るとされます。' },
{ chapter:6, type:'4', text:'「冥土（めいど）」「黄泉（よみ）」「地獄（じごく）」の説明として正しいものはどれか。', choices:['すべて同じ場所を指す別の言葉','冥土は仏教の死後の世界、黄泉は日本神話の死者の国、地獄は冥土の中でも罪人が苦しむ場所','冥土はキリスト教用語、黄泉は仏教用語','地獄は現世の苦しい状態を表すだけで死後の世界ではない'], answer:1, explanation:'「冥土（冥途）」は仏教における死後の世界の総称、「黄泉（よもつひらさか）」は日本神話（古事記）に登場する死者が行く国、「地獄」は冥土の中で最も厳しい罰を受ける場所です。それぞれ由来する宗教・文化が異なります。' },
{ chapter:6, type:'4', text:'「仏壇（ぶつだん）」の本来の意味として正しいものはどれか。', choices:['先祖の位牌を飾る棚','家庭内に本尊（仏像）を安置し礼拝するための壇','葬儀場に設置する祭壇','お盆に精霊棚として使う棚'], answer:1, explanation:'仏壇は本来、家庭内に本尊（仏像・曼荼羅など）を安置して礼拝するための壇です。先祖の位牌を置く機能は後から加わったもので、「先祖を祀る場所」というイメージが強くなっていますが、本来は「本尊を礼拝する家庭の小さなお寺」です。' },
{ chapter:6, type:'4', text:'「宗派（しゅうは）」を確認することが葬儀準備で重要な理由として最も適切なものはどれか。', choices:['葬儀費用の計算のため','祭壇形式・焼香回数・経典・作法など式全体に関わるため','参列者へのご案内文作成のため','火葬場の予約のため'], answer:1, explanation:'宗旨宗派によって祭壇の形（白木/花）・焼香回数（1〜3回）・読む経典・引導の有無・数珠の形式・位牌の使用有無・戒名の呼称（戒名/法名）など、式全体に関わる多くの要素が異なります。葬儀施行の最重要確認事項のひとつです。' },
{ chapter:6, type:'4', text:'「檀那（だんな）」の語源として正しいものはどれか。', choices:['中国語で「主人」を意味する言葉','梵語（サンスクリット語）の「ダーナ（布施・施し）」に由来する','日本語の「旦那」から来た言葉','英語の「donor（寄付者）」から来た言葉'], answer:1, explanation:'「檀那（だんな）」は梵語のダーナ（dāna・布施・施し）が由来で、「寺院に布施をする在家信者（檀家）」を意味します。これが転じて「主人・旦那様」という意味でも使われるようになりました。「檀家（だんか）」も同じ語源です。' },
{ chapter:6, type:'4', text:'次の「宗派別・焼香回数」の組み合わせとして正しいものはどれか。', choices:['浄土真宗本願寺派：2回、真宗大谷派：1回','浄土真宗本願寺派：1回、真宗大谷派：2回','曹洞宗：1回、日蓮宗：3回','浄土宗：2回、天台宗：1回'], answer:1, explanation:'浄土真宗の焼香回数は本願寺派（西）が1回、大谷派（東）が2回です（いずれも額に押しいただかない）。曹洞宗・臨済宗は3回が一般的、浄土宗・天台宗・真言宗は1〜3回（宗派の指定あり）、日蓮宗は1回または3回が多いです。' },
// ===== ○× 問題（55問）=====
{chapter:7, type:'ox',text:'「接遇（せつぐう）」とは、お客様をもてなし、心地よいサービスを提供することである。',answer:true,explanation:'接遇は単なる「接客（必要な対応）」を超え、相手の立場・気持ちを汲み取り、心のこもったもてなし（ホスピタリティ）を提供することです。葬祭業では悲嘆の中にある遺族への細やかな配慮が特に求められます。'},
{chapter:7, type:'ox',text:'葬儀における接遇では、通常のサービス業より高い水準の配慮が求められる。',answer:true,explanation:'葬儀業のお客様（遺族・参列者）は大切な方を亡くした深い悲しみの中にいます。そのため通常のサービス業以上に、言葉遣い・態度・タイミング・心遣いなど、あらゆる面で高度な配慮が必要です。'},
{chapter:7, type:'ox',text:'「敬語」は「尊敬語」「謙譲語」「丁寧語」の三種類に分類される。',answer:true,explanation:'敬語は①尊敬語（相手の動作・状態を高める：「いらっしゃる・おっしゃる・召し上がる」）②謙譲語（自分の動作をへりくだる：「申し上げる・伺う・いただく」）③丁寧語（丁寧な表現：「です・ます」）の三種類です。'},
{chapter:7, type:'ox',text:'遺族に「ご愁傷様です」と声をかけることは失礼にあたる。',answer:false,explanation:'「ご愁傷様です（ごしゅうしょうさまです）」は「お気の毒に存じます・お悔やみ申し上げます」という意味のお悔やみの言葉で、適切な表現です。「お気の毒様」などのより丁寧な表現も使います。失礼にあたりません。'},
{chapter:7, type:'ox',text:'「忌み言葉（いみことば）」は弔事の場で使うことが適切な言葉である。',answer:false,explanation:'忌み言葉は不幸が重なる・縁起が悪いとされ、弔事の場で使用を避ける言葉のことです（例：「重ね重ね・再び・続けて・返す返す」）。弔事の場で使うことが「不適切」な言葉です。'},
{chapter:7, type:'ox',text:'「重ね言葉（かさねことば）」とは「重ね重ね・再び・引き続き」などの繰り返しを示す言葉で、弔事の場では忌み言葉として避けるべきである。',answer:true,explanation:'重ね言葉（重ね重ね・再び・続いて・またまた）は不幸の繰り返しを連想させるため、弔事の場では忌み言葉として避けます。挨拶文・弔辞・日常会話でも葬儀の場では意識する必要があります。'},
{chapter:7, type:'ox',text:'遺族対応では、第一印象が非常に重要であり、最初の声かけ・態度で信頼関係が決まることが多い。',answer:true,explanation:'遺族が葬儀社と最初に接触する場面（病院・電話・来社）での第一印象は、その後の信頼関係に大きく影響します。深い悲しみの中でのファーストコンタクトは特に丁寧・迅速・誠実な対応が求められます。'},
{chapter:7, type:'ox',text:'「服喪（ふくも）」とは、身内を亡くした後に一定期間、慶事を控え喪に服することである。',answer:true,explanation:'服喪（喪に服す）は身内の死後、一定期間（一般的に一年間を喪中）は慶事への参加・年賀状送付などを自粛する日本の慣習です。'},
{chapter:7, type:'ox',text:'電話対応では、用件がなければ電話を切ってよい。',answer:false,explanation:'電話対応では用件を確認し、必要な場合は折り返しの連絡・担当者への取り次ぎなどを行います。一方的に電話を切ることは失礼です。特に葬儀社への問い合わせは緊急性があることも多く、丁寧な対応が必要です。'},
{chapter:7, type:'ox',text:'「訃報の電話連絡を受ける際」は、まず落ち着いて相手の話を聞き、必要事項（故人名・連絡先・状況）を確認する。',answer:true,explanation:'訃報の連絡を受けた際はお悔やみの言葉を述べた上で、①故人のお名前②連絡先（ご遺族の連絡先）③状況（病院・自宅など）④担当者の到着予定時間を確認します。メモを取りながら正確に聞き取ります。'},
{chapter:7, type:'ox',text:'「弔問（ちょうもん）」とは、葬儀の後に遺族宅を訪問してお悔やみを述べることを主に指す。',answer:false,explanation:'弔問とは通夜・葬儀への参列や、遺族を訪問してお悔やみを述べることを広く指します。特に「通夜前の弔問（枕元参り）」「通夜・告別式への参列」「葬儀後の遺族宅訪問」すべてを含みます。'},
{chapter:7, type:'ox',text:'「会葬者（かいそうしゃ）」が式場に到着した際は、まず受付で芳名帳に記帳・香典を渡す流れが一般的である。',answer:true,explanation:'一般的な葬儀・告別式の流れでは、参列者が式場に到着後①受付で芳名帳（会葬者名簿）に記帳②香典を渡す③会葬御礼を受け取る④式場または待合室へ案内される、という流れが一般的です。'},
{chapter:7, type:'ox',text:'「芳名帳（ほうめいちょう）」は参列者が署名するもので、住所・氏名を記入する。',answer:true,explanation:'芳名帳（会葬者名簿）は参列者が住所・氏名（会社名）を記入する帳簿で、後日の御礼状送付・香典返しの郵送・遺族が参列者を把握するために使用します。'},
{chapter:7, type:'ox',text:'「弔辞を読む際の姿勢」は、背筋を伸ばして故人への敬意を表して読む。',answer:true,explanation:'弔辞は故人への最後の言葉であり、背筋を伸ばし、はっきりとした声で読みます。原稿（巻紙・奉書紙）を広げながら読み、読み終えたら祭壇に向かって一礼するのが正式な作法です。'},
{chapter:7, type:'ox',text:'「制服（ユニフォーム）」の着用は葬儀スタッフの信頼感・プロ意識の向上に役立つ。',answer:true,explanation:'葬儀スタッフが清潔感のある制服を正しく着用することは、遺族・参列者に「プロが担当している」という安心感・信頼感を与えます。身だしなみは接遇の基本です。'},
{chapter:7, type:'ox',text:'葬儀スタッフの「身だしなみ」は、派手なアクセサリー・強い香水・過度なメイクを避けるのが基本である。',answer:true,explanation:'葬儀スタッフの身だしなみの基本は①清潔感②地味・控えめ（弔事の雰囲気に合わせる）です。派手なアクセサリー・強い香水・極端なメイク・派手な爪（ネイル）は避けます。'},
{chapter:7, type:'ox',text:'「グリーフ（Grief）」とは、大切な人を失った後の深い悲嘆（悲しみ）のことである。',answer:true,explanation:'グリーフはラテン語「gravare（重くなる）」に由来し、「深い悲嘆・哀惜（あいせき）」を意味します。死別・離別・喪失体験後に感じる感情的・身体的・認知的な反応全体を指します。'},
{chapter:7, type:'ox',text:'「グリーフケア」では、遺族の悲しみを早く忘れさせることが目標である。',answer:false,explanation:'グリーフケアの目標は「悲しみを忘れさせる」ことではなく、悲嘆のプロセスに寄り添い、遺族が自分なりのペースで悲嘆を乗り越えて日常生活を取り戻せるよう支援することです。悲しみを否定せず受容することが重要です。'},
{chapter:7, type:'ox',text:'「積極的傾聴（せっきょくてきけいちょう）」とは、相手の話をただ黙って聞くことである。',answer:false,explanation:'積極的傾聴（アクティブリスニング）はただ聞くだけでなく、相手の目を見る・うなずく・適切な相槌・繰り返し（反映）・感情の言語化などを通じて「あなたの話をしっかり受け止めています」と伝えながら聴く技法です。'},
{chapter:7, type:'ox',text:'「遺族が泣いている際」は、すぐに話題を変えて気持ちを切り替えてもらうよう誘導するのが良い。',answer:false,explanation:'遺族が泣いている際は、無理に話題を変えたり「元気を出して」と励ましたりするのは逆効果です。「泣いても良い・悲しんでいい」と受容し、そばに寄り添い、タオル・お茶などを提供しながら静かに見守ることが適切です。'},
{chapter:7, type:'ox',text:'「言葉が出ない遺族」への対応では、沈黙を恐れず、静かに寄り添うことも大切な接遇である。',answer:true,explanation:'深い悲しみの中にある遺族は言葉が出ないこともあります。そのような場合に無理に話しかけたり沈黙を埋めようとするのは逆効果です。静かに寄り添い、存在を示すだけで十分な場合があります。'},
{chapter:7, type:'ox',text:'「クレーム（苦情）」への対応は、まず謝罪してから事実確認を行う。',answer:true,explanation:'クレーム対応の基本は①まずお詫び（不便・不快をかけたことへの謝罪）②事実確認（何が問題だったかの丁寧な確認）③解決策の提示④再発防止策の説明です。事実確認より先に謝罪（不快への謝罪）を行います。'},
{chapter:7, type:'ox',text:'「インシデント（incident）」と「クレーム」は同じ意味である。',answer:false,explanation:'インシデントは「ヒヤリハット・軽微なミス・事故に至らなかった出来事」を指す用語です。クレームは「顧客からの苦情・不満の申し立て」です。インシデントがクレームに発展することがありますが、両者は異なります。'},
{chapter:7, type:'ox',text:'「遺族へのお礼の言葉」として「お世話になりました」は適切である。',answer:false,explanation:'「お世話になりました」は主に自分が相手にお世話になった際の言葉です。遺族（喪主）がスタッフに言うことはありますが、スタッフが遺族に言う言葉としては「お力落としのこととは存じますが、どうかお体をお大切に」「お世話をさせていただき光栄でございました」などが適切です。'},
{chapter:7, type:'ox',text:'「受付での言葉遣い」として「ご香典を頂戴いたします」は適切である。',answer:true,explanation:'受付での「ご香典を頂戴いたします（頂戴してもよろしいでしょうか）」は正しい謙譲語を使った丁寧な表現です。「もらいます」「受け取ります」より丁寧で、葬儀の受付場面に適した言葉遣いです。'},
{chapter:7, type:'ox',text:'「案内誘導（あんないゆうどう）」では、指先（人差し指のみ）でなく、手の平を上向きにして方向を示す。',answer:true,explanation:'案内・誘導の際に指先（人差し指のみ）で指すことは失礼にあたるため、手のひら全体を上向きにした「手のひら案内（開手案内）」が丁寧な作法です。葬儀の受付・案内係は特に意識すべき基本動作です。'},
{chapter:7, type:'ox',text:'「葬儀スタッフのお辞儀（礼）の角度」は、通常15度・30度・45度の3種類が使い分けられる。',answer:true,explanation:'お辞儀は①15度（会釈・すれ違い時）②30度（通常の挨拶）③45度（深礼・感謝・謝罪・特別な敬意）の三段階があります。葬儀の場では遺族・参列者への深礼（45度）が多く使われます。'},
{chapter:7, type:'ox',text:'「遺族に向けて「大変でしたね」と声をかけることは、感情の押しつけになるため避けるべきである。',answer:false,explanation:'「大変でしたね」「さぞかしつらいことと存じます」などの共感を示す言葉は、遺族の気持ちを受け止める言葉として適切です。ただし言い方・タイミング・表情など全体が伴うことが大切です。'},
{chapter:7, type:'ox',text:'「電話応対の基本」として、電話は3コール以内に出るのが望ましい。',answer:true,explanation:'一般的なビジネスマナーとして電話は3コール（9秒）以内に出ることが望ましいとされます。特に葬儀社への問い合わせは緊急性がある場合も多く、迅速な対応が信頼につながります。'},
{chapter:7, type:'ox',text:'「遺族への言葉」として「頑張ってください」は励ましになるため積極的に使うべきである。',answer:false,explanation:'「頑張ってください」は通常は励ましですが、深い悲しみの中にある遺族に対しては「まだ頑張れていないのか」と受け取られたり、プレッシャーを与えたりすることがあります。「どうかお体をお大切に」「皆様でお支え合いください」などの言葉が適切です。'},
{chapter:7, type:'ox',text:'「通夜・葬儀における司会（進行役）」は、式の流れを滞りなく進める重要な役割である。',answer:true,explanation:'葬儀の司会者は式の進行を担う重要な役割で、開式・閉式のアナウンス・焼香の案内・弔電の紹介・出棺の案内など、式全体の流れを作ります。落ち着いた低めの声・丁寧な言葉遣いが求められます。'},
{chapter:7, type:'ox',text:'「遺族のプライバシー情報（故人情報・家族構成など）」は、業務目的以外に使用してはならない。',answer:true,explanation:'葬儀業で取得する遺族・故人の個人情報は個人情報保護法の対象であり、業務目的（葬儀の施行・アフターフォロー）以外の使用は禁じられています。第三者への漏洩も厳禁です。'},
{chapter:7, type:'ox',text:'「笑顔（えがお）」は葬儀の場でも常に必要である。',answer:false,explanation:'葬儀の場では笑顔は基本的に控えます。故人・遺族への弔意を示す「厳粛な表情・穏やかで落ち着いた表情」が求められます。ただし遺族が笑顔で昔話をする場面など、状況によっては自然な微笑みが適切な場合もあります。'},
{chapter:7, type:'ox',text:'「弔電（ちょうでん）」の紹介は告別式（葬儀）の中で行われることが多い。',answer:true,explanation:'弔電は告別式（または通夜）の式次第の中で「弔電披露」として読み上げられます。多数の場合は代表的なものを読み上げ、残りは「以下省略」とする場合もあります。'},
{chapter:7, type:'ox',text:'「葬儀後のアフターフォロー」として遺族を訪問することは、グリーフケアの観点からも重要である。',answer:true,explanation:'葬儀後に遺族を訪問・連絡してフォローすること（アフターフォロー）は、グリーフケアの観点から遺族の孤立防止・悲嘆のサポートとして重要です。近年、葬儀社がアフターフォローを充実させる取り組みが増えています。'},
{chapter:7, type:'ox',text:'「会場の整理・清掃」は葬儀スタッフとして最も重要な業務であり、他のすべての業務より優先される。',answer:false,explanation:'会場の整理・清掃はスタッフの重要な業務のひとつですが、「すべての業務より優先される」わけではありません。遺族への対応・式の進行・安全管理など状況に応じた優先順位の判断が必要です。'},
{chapter:7, type:'ox',text:'「接遇の5S」とは、整理・整頓・清掃・清潔・躾（しつけ）のことである。',answer:true,explanation:'5S（ごエス）は製造業から広まった職場環境改善の概念で、①整理②整頓③清掃④清潔⑤躾（習慣化）の頭文字を取ったものです。葬儀社の式場管理・社内環境整備にも適用されます。'},
{chapter:7, type:'ox',text:'「接遇における「報告・連絡・相談（報連相）」は、葬儀業でも重要なコミュニケーションの基本である。',answer:true,explanation:'報連相（報告・連絡・相談）はどの業種でも重要な社内コミュニケーションの基本です。葬儀業では式の進行変更・遺族の状況・トラブルなどをチームで共有することで、スムーズな施行と事故防止につながります。'},
{chapter:7, type:'ox',text:'「弔問客が式場を間違えた場合」は、正しい式場を案内するのが接遇の基本である。',answer:true,explanation:'弔問客が式場を間違えた場合（異なる葬儀が同じ建物で行われている場合など）は、丁寧に正しい式場・受付場所を案内します。混乱・失礼を防ぐためにも、入口付近での丁寧な案内・誘導が重要です。'},
{chapter:7, type:'ox',text:'「遺族への対応中に急ぎの用件が入った際」は、遺族に一言断ってから対応するのが礼儀である。',answer:true,explanation:'遺族と話している最中に急ぎの用件が入った場合は「少々失礼いたします・ただいま急ぎの用件がございまして」と一言断ってから対応するのが礼儀です。無断でその場を離れることは失礼にあたります。'},
{chapter:7, type:'ox',text:'「接遇における「共感（きょうかん）」とは、相手と全く同じ感情を持つことである。',answer:false,explanation:'共感（エンパシー）とは「相手の立場・感情を理解しようとする姿勢」であり、自分が同じ感情になることではありません（それは「同情・シンパシー」）。「あなたの気持ちがわかります」と理解を示しながら、自分の感情を保つことが専門家としての共感です。'},
{chapter:7, type:'ox',text:'「遺族から「ありがとう」と感謝された際」は「いえ、当然のことをしたまでです」と謙遜するのが最も適切である。',answer:false,explanation:'「いえ、当然のことをしたまでです」は謙虚に見えますが、相手の感謝を否定する表現です。「お役に立てて光栄です」「ご遺族のためにお力添えできましたこと、うれしゅうございます」など、感謝を受け入れつつへりくだる表現が適切です。'},
{chapter:7, type:'ox',text:'「手土産を持参した参列者」への受け取り方としては、両手で受け取り、感謝を述べる。',answer:true,explanation:'いただいた品物（供物・贈り物）は両手で丁寧に受け取り、「頂戴いたします・ありがとうございます」などの言葉を添えます。片手での受け取りや無言での受け取りは失礼にあたります。'},
{chapter:7, type:'ox',text:'「遺族に関する情報（プライバシー）」は、同じ職場のスタッフ間でも必要最小限に共有する。',answer:true,explanation:'遺族・故人の個人情報はチームで施行するために必要な範囲で共有しますが、業務に不要な情報を広範に共有することは個人情報保護の観点から避けます。特に宗教・財産・家族事情などは取り扱いに注意が必要です。'},
{chapter:7, type:'ox',text:'「着席（ちゃくせき）の案内」では、喪主・遺族は祭壇側・棺に近い席（上席）に案内するのが一般的である。',answer:true,explanation:'着席案内では喪主・遺族・近親者を祭壇に近い側（上席・前方）に案内し、遺族から遠い関係の方ほど後方に案内するのが一般的です。式場の「上座・下座」の概念は葬儀にも適用されます。'},
{chapter:7, type:'ox',text:'「葬儀スタッフが式中に食事をとること」は問題ない行為である。',answer:false,explanation:'葬儀スタッフが式の進行中に式場内や参列者の目に触れる場所で食事をとることは、遺族・参列者への礼を失した行為です。食事は休憩時間に控室等で行います。'},
{chapter:7, type:'ox',text:'「通夜の受付時間」は一般的に通夜開始1時間前から始まることが多い。',answer:true,explanation:'通夜の受付は一般的に通夜開始の30分〜1時間前から始まります。参列者が到着し始める時間に合わせて受付スタッフが配置されます。'},
{chapter:7, type:'ox',text:'「葬儀における座席の上座」は祭壇・遺影に近い席である。',answer:true,explanation:'葬儀での座席は祭壇・遺影に最も近い席が「上座（かみざ）」で、喪主・遺族・近親者が座ります。祭壇から遠くなるほど下座となり、一般参列者はより後方に着席します。'},
{chapter:7, type:'ox',text:'「葬儀スタッフの「立ち居振る舞い（たちいふるまい）」は、遺族・参列者に与える印象に大きく影響する。',answer:true,explanation:'立ち居振る舞い（立ち方・歩き方・礼の仕方・物の渡し方など）は言葉以上に「プロフェッショナリズム」「誠実さ」「敬意」を伝えます。特に葬儀の場ではすべての動作が遺族の目に触れるため、丁寧な動作が信頼につながります。'},
{chapter:7, type:'ox',text:'「喪家（もか・そうか）」とは、亡くなった方の遺族・家族のことを指す。',answer:true,explanation:'喪家とは喪（も・葬儀）の家＝亡くなった方の遺族・家を指す言葉です。葬儀業界の専門用語として使われます。'},
{chapter:7, type:'ox',text:'「式の進行中に遺族が体調を崩した場合」は、式を止めて対応することが優先される。',answer:true,explanation:'遺族の体調不良（気分不良・失神・過呼吸など）は式の進行より優先されます。迅速に対応（付き添い・別室への誘導・AED・119番など）し、式は一時中断するか担当者が対応します。'},
{chapter:7, type:'ox',text:'「接遇の「傾聴（けいちょう）」では、スマートフォンを手に持ったまま話を聞いても構わない。',answer:false,explanation:'傾聴の基本は相手に集中することです。スマートフォンを手に持ったまま・画面を見ながらの傾聴は相手への集中不足・失礼にあたります。傾聴時はデバイスをしまい、相手に向き合うことが基本です。'},

// ===== 4択 問題（45問）=====
{chapter:7, type:'4',text:'「接遇」と「接客」の違いとして最も適切なものはどれか。',choices:['まったく同じ意味','接遇は相手の立場に立った心のこもったもてなし、接客は業務として必要な対応','接遇は高級ホテルのみ、接客は一般企業のみ','接客は悪い意味、接遇は良い意味'],answer:1,explanation:'接客は業務上必要な対応（注文・会計・案内など）で、接遇はそれに加えて相手の気持ちを汲み取り、心のこもったもてなし（ホスピタリティ）を提供することです。葬儀業では特に接遇の意識が求められます。'},
{chapter:7, type:'4',text:'「忌み言葉（いみことば）」の例として正しいものはどれか。',choices:['謹んでお悔やみ申し上げます','重ね重ねご愁傷様です','心よりお悔やみ申し上げます','このたびのご逝去に際し'],answer:1,explanation:'「重ね重ね」は重ね言葉（不幸の繰り返しを連想）の忌み言葉です。「謹んで・心より・このたびのご逝去に際し」は適切なお悔やみの表現です。他に「再び・続けて・かえすがえす・またまた・ますます」なども忌み言葉です。'},
{chapter:7, type:'4',text:'「敬語の使い分け」として、「故人が生前おっしゃっていたことです」の「おっしゃる」は何敬語か。',choices:['謙譲語（自分をへりくだる）','尊敬語（相手や故人を敬う）','丁寧語','美化語'],answer:1,explanation:'「おっしゃる」は「言う」の尊敬語で、相手または第三者（この場合は故人）の行為を高める表現です。自分の「言う」には「申す・申し上げる（謙譲語）」を使います。'},
{chapter:7, type:'4',text:'「受付での対応」として誤っているものはどれか。',choices:['芳名帳への記帳をお願いする','香典を両手で丁寧に受け取る','会葬御礼をお渡しする','参列者の香典の金額を大きな声で確認する'],answer:3,explanation:'香典の金額を大きな声で確認することは、他の参列者に聞こえてプライバシーを侵害するため不適切です。金額の確認が必要な場合は静かに確認するか、後で記録します。'},
{chapter:7, type:'4',text:'「電話応対の基本」として正しいものはどれか。',choices:['電話は10コール以上鳴ってから出る','電話に出たら「もしもし」と言う','名乗り（社名・担当者名）を最初に告げる','要件は聞かずに折り返す'],answer:2,explanation:'ビジネス電話の基本は①迅速に出る（3コール以内）②最初に社名・担当者名を名乗る（「〇〇葬儀社でございます」）③丁寧に用件を聞く④メモを取りながら確認する、です。「もしもし」はビジネス電話では避けます。'},
{chapter:7, type:'4',text:'「訃報の電話を受けた際に確認すべき事項」として最も重要なものはどれか。',choices:['葬儀費用の予算','故人のお名前・連絡先・現在地（病院・自宅）・状況','故人の趣味・職歴','葬儀に招待する人数'],answer:1,explanation:'訃報連絡を受けた際に最初に確認すべきことは①故人のお名前②ご連絡先（遺族の電話番号）③現在地（病院名・住所、または自宅住所）④状況（いつ亡くなったか）⑤担当者の到着時間の確認などです。'},
{chapter:7, type:'4',text:'「グリーフケアにおける「正常な悲嘆反応（グリーフ反応）」として正しいものはどれか。',choices:['死別後すぐに普通の生活に戻れること','泣く・眠れない・食欲がない・怒り・否認・思慕など感情的・身体的・認知的な反応が出ること','悲しみを感じないこと','必ず5段階の感情変化をたどること'],answer:1,explanation:'グリーフ（悲嘆）反応は「正常な反応」であり、涙・不眠・食欲不振・怒り・否認（信じたくない）・思慕（故人を求める気持ち）・無気力など多様な形で現れます。これらは死別に対する正常な心身の反応です。'},
{chapter:7, type:'4',text:'「クレーム対応の基本ステップ」として正しいものはどれか。',choices:['まず言い訳をする→謝罪→事実確認','まず謝罪（不快へのお詫び）→事実確認→解決策提示→再発防止','事実確認→謝罪→言い訳→解決','解決策提示→謝罪→事実確認'],answer:1,explanation:'クレーム対応の基本は①まずお詫び（不快・ご迷惑をかけたことへの謝罪）②事実確認（何が問題だったかを丁寧に確認）③解決策の提示（できる対応・できない対応の明示）④再発防止の説明です。'},
{chapter:7, type:'4',text:'「遺族への「傾聴（けいちょう）」の実践方法として正しいものはどれか。',choices:['自分の意見をたくさん述べて励ます','相手の目を見て・うなずき・適切な相槌で「聴いています」を示す','メモを取りながら事務的に聞く','相手の話を否定・訂正しながら聞く'],answer:1,explanation:'傾聴の実践は①目を見る（アイコンタクト）②うなずき・相槌（「そうでしたか・ご苦労でしたね」）③繰り返し（「〇〇とのことでしたね」）④沈黙の受容などです。自分の意見を押しつけたり話を否定したりすることは避けます。'},
{chapter:7, type:'4',text:'「案内・誘導」の際の正しい手の使い方はどれか。',choices:['人差し指一本で方向を指す','手のひらを上向きにした「開手（かいて）」で方向を示す','肩をつかんで誘導する','目線だけで案内する'],answer:1,explanation:'案内・誘導の際は人差し指一本での指し示し（指差し）は失礼にあたります。手のひら全体を上向きにした「開手（かいて）案内」で方向を示し、「こちらへどうぞ」などの言葉を添えます。'},
{chapter:7, type:'4',text:'「司会進行の「開式のことば」として適切なものはどれか。',choices:['それではそろそろ始めましょうか','ただいまより、故○○○○様の告別式を執り行います','みなさん、集まってください','はい、始まります'],answer:1,explanation:'葬儀の司会の開式アナウンスは「ただいまより、故○○○○様の葬儀・告別式を執り行います。ご参列の皆様には、しばらくの間ご着席のままご参列くださいますようお願い申し上げます」などが適切です。'},
{chapter:7, type:'4',text:'「遺族が他界直後に葬儀社を選ぶ際の状況」として正しいものはどれか。',choices:['冷静に複数社を比較検討する余裕がある','深い悲しみ・混乱の中で、時間的・精神的余裕がほとんどない状態が多い','事前に十分情報収集している','葬儀費用は重要ではない'],answer:1,explanation:'多くの遺族は身内の死直後に悲しみ・混乱・疲労の中で葬儀社を選ばなければなりません。時間的プレッシャーもあり、冷静な比較検討が難しい状況です。だからこそ葬儀社の「信頼できる誠実な第一対応」が重要です。'},
{chapter:7, type:'4',text:'「ホスピタリティ（Hospitality）」の意味として最も適切なものはどれか。',choices:['病院のサービス専用の言葉','相手を心から歓迎し、思いやりと温かさをもってもてなす精神・姿勢','業務上の義務的な対応','高価なサービスを提供すること'],answer:1,explanation:'ホスピタリティは相手の立場に立ち、心から歓迎・敬意・思いやりを持ってもてなす精神・姿勢です。医療・葬祭・ホテル・航空など対人サービスのすべてで重視される概念で、「おもてなし」とも訳されます。'},
{chapter:7, type:'4',text:'「遺族が「なぜうちの家族が亡くなったのか」と嘆いている際の対応として正しいものはどれか。',choices:['「これは神様の意思です」と説明する','「何か理由があったのでしょう」と言う','「そのようなお気持ち、よくわかります」と受容し、静かに寄り添う','「泣いても仕方ありません」と諭す'],answer:2,explanation:'深い悲しみ・怒り・嘆きを訴える遺族には「そのようなお気持ち、よくわかります・さぞかし辛いことと存じます」と受容・共感を示し、静かに寄り添うことが最善です。宗教的な解釈の押しつけや否定的な言葉は逆効果です。'},
{chapter:7, type:'4',text:'「「ご遺体（ごいたい）」という言葉について正しいものはどれか。',choices:['遺体を丁寧に言う言葉で、業界・遺族ともに広く使われる','死体・遺体は全員同じように使う','ご遺体は仏式のみの表現','外国では使用しない'],answer:0,explanation:'「ご遺体」は「遺体（亡くなった方の体）」を丁寧に言う敬称で、葬儀業界・医療現場・遺族間で広く使われます。単なる「遺体」「死体」より敬意が込められた表現です。'},
{chapter:7, type:'4',text:'「通夜・告別式の終了後」に司会者が言う言葉として最も適切なものはどれか。',choices:['お疲れ様でした','以上をもちまして、故○○○○様の告別式を終了いたします','ありがとうございました（ではまた）','はい、終わりです'],answer:1,explanation:'告別式終了のアナウンスとして「以上をもちまして、故○○○○様の葬儀・告別式をすべて終了いたします。ご参列の皆様には最後までご参列いただきまして、誠にありがとうございました」などが適切です。'},
{chapter:7, type:'4',text:'「葬儀社スタッフが「感謝される」場面での適切な返答はどれか。',choices:['いえ、あたりまえです','当然のことでございます','お役に立てましたこと、光栄でございます','どうも』と軽く返す'],answer:2,explanation:'「お役に立てましたこと、光栄でございます」は感謝を受け入れつつ、プロとしての姿勢を示す適切な表現です。「あたりまえです・当然です」は相手の感謝を軽視するような表現になります。'},
{chapter:7, type:'4',text:'「遺族の「感情の波（泣いたり・笑ったり・沈黙したり）」への対応として正しいものはどれか。',choices:['笑ったら一緒に大笑いする','感情の変化を自然なこととして受け入れ、その都度適切に対応する','常に沈黙を保つ','泣いたらすぐに話題を変える'],answer:1,explanation:'悲嘆の中にある遺族の感情は大きく揺れ動きます（泣く・怒る・笑う・沈黙するなど）。これは正常なグリーフ反応です。スタッフはその変化を自然なこととして受け入れ、それぞれの状況に応じた対応（タオル・お茶・言葉・沈黙）を心がけます。'},
{chapter:7, type:'4',text:'「葬儀業における「5W1H」の「H（How）」にあたるものはどれか。',choices:['誰が亡くなったか（Who）','どこで葬儀を行うか（Where）','どのように葬儀を行うか（式次第・宗派・規模等）','なぜ葬儀をするか（Why）'],answer:2,explanation:'「How（どのように）」は葬儀の方法・内容・式次第・宗旨宗派・規模・費用などを指します。葬儀の打合せでは5W1H（誰が・いつ・どこで・何を・なぜ・どのように）の確認がすべての準備の基本です。'},
{chapter:7, type:'4',text:'「喪主への最初の挨拶」で伝えるべき内容として最も重要なものはどれか。',choices:['葬儀費用の見積書の説明','お悔やみの言葉・担当者紹介・今後の流れの説明・安心感の提供','他社との比較','故人の宗教批判'],answer:1,explanation:'喪主への最初の挨拶では①まず心からのお悔やみの言葉②担当者の自己紹介③これからの流れ（何をいつどうするか）の説明④「安心してお任せください」という安心感の提供が最重要です。'},
{chapter:7, type:'4',text:'「葬儀後に遺族から「もっと豪華な祭壇にしておけばよかった」という後悔の声が出た場合の対応として正しいものはどれか。',choices:['「それはあなたの責任です」と言う','「そうですね、もっと提案するべきでした」と共感しつつ、「○○様は必ず喜んでいらっしゃいます」などとフォローする','無視する','「祭壇の費用が足りませんでした」と説明する'],answer:1,explanation:'遺族の後悔の声には①共感（「そのようにお感じになる気持ち、よくわかります」）②フォロー（「故人様は必ずお喜びになっていると存じます」「心のこもったお見送りができたと思います」）③今後につながる提案で対応します。'},
{chapter:7, type:'4',text:'「ご遺族が複数の宗教を信仰している場合」の対応として正しいものはどれか。',choices:['一番多い宗教の形式で行う','ご遺族・喪主の意向を丁寧に確認し、最も適切な形式を提案・確認する','無宗教で行う','葬儀社が勝手に決める'],answer:1,explanation:'宗教・宗旨宗派が複雑な場合は①ご遺族・喪主の意向を丁寧に確認②故人の信仰・遺言・家族の慣習を確認③適切な形式（宗派別・無宗教・複数の要素を組み合わせ）を提案・相談して決定します。'},
{chapter:7, type:'4',text:'「弔問客が式場で泣き崩れた場合」の対応として正しいものはどれか。',choices:['放置する','「泣かないでください」と言う','タオル・お茶などを提供し、静かに寄り添う','式進行のために急かす'],answer:2,explanation:'式場で泣き崩れた参列者への対応は①タオル（ハンカチ）を提供②お茶・水をお持ちする③静かに寄り添う（「ゆっくりなさっていてください」）④必要に応じて控室に案内するなどです。'},
{chapter:7, type:'4',text:'「葬儀スタッフが複数のご遺族に同時に対応を求められた場合」の優先順位として正しいものはどれか。',choices:['先着順で対応する','緊急性・重要性を判断し、他のスタッフへの連携も活用しながら適切に対応する','無視して自分の業務を続ける','全員を待たせて一人ずつ対応する'],answer:1,explanation:'複数の遺族から同時に対応を求められた場合は①緊急性・重要性を素早く判断②他のスタッフに連絡・応援依頼③「少々お待ちください、すぐ対応いたします」と全員に声をかけ④適切に分担して対応します。'},
{chapter:7, type:'4',text:'「葬儀における「下座（しもざ）・上座（かみざ）」について正しいものはどれか。',choices:['下座は出口に近い席・上座は出口から遠い席が基本（葬儀では祭壇に近い席が上座）','部屋の広さで決まる','どこに座っても同じ','喪主が下座に座る'],answer:0,explanation:'葬儀の式場では祭壇（遺影・棺）に最も近い席が「上座」で喪主・遺族・近親者が座り、出入口（後方）に近いほど「下座」で一般参列者が座ります。一般のビジネス上座（出口から遠い席）と基本的に同じです。'},
{chapter:7, type:'4',text:'「葬儀スタッフの「言葉遣い」で避けるべきものはどれか。',choices:['「ご逝去」「ご遺族」「おくやみ」','「死んだ」「死骸」「お棺（おかん）を運ぶ」（荒い表現）','「ご逝去されました」「ご遺体」','「このたびはお力落としのこととお察し申し上げます」'],answer:1,explanation:'葬儀の場では「死んだ」「死骸」「死体」などの直接的・荒い表現は避け、「ご逝去・ご遺体・お棺（おかん→おひつぎ）」などの敬意ある言葉を使います。また「浮かばれない・迷う」なども状況に応じて避けます。'},
{chapter:7, type:'4',text:'「通夜・告別式の進行で「遺族から変更の申し出があった場合」の対応として正しいものはどれか。',choices:['断固として最初の計画通り進める','変更の内容を確認し、可能な範囲で柔軟に対応する','すべての変更を受け入れる','遺族の申し出は無視する'],answer:1,explanation:'遺族からの変更申し出（追加弔電の読み上げ・式の順番変更・時間調整など）は、可能なものは柔軟に対応します。ただし安全上・時間上の制約から対応困難な変更は、その理由を丁寧に説明してご理解をいただきます。'},
{chapter:7, type:'4',text:'「納骨の際の案内」として正しいものはどれか。',choices:['「お骨を埋めます」と案内する','「ご納骨をお願いいたします・ご遺骨をお収めする時間となりました」と案内する','「捨てます」と言う','「処理します」と言う'],answer:1,explanation:'納骨の案内では「ご納骨をお願いいたします」「ご遺骨をお収め（おさめ）になる時間となりました」などの丁寧な表現を使います。「埋める・捨てる・処理する」などは故人・遺族への敬意を欠く表現です。'},
{chapter:7, type:'4',text:'「骨上げ（こつあげ）の案内」として正しいものはどれか。',choices:['「お骨を拾います」と案内する','「お骨上げ（ご収骨）の時間となりました。ご遺族の皆様はこちらへどうぞ」と案内する','「火葬が終わりました、早く来てください」と言う','「灰になりました」と言う'],answer:1,explanation:'骨上げの案内では「お骨上げ（ご収骨・こつあげ）の時間となりました。ご遺族の皆様はこちらへお越しください」などの丁寧な表現を使います。「灰になった・拾います」などの表現は遺族への配慮を欠きます。'},
{chapter:7, type:'4',text:'「葬儀スタッフが業務中に私語（しご）をすることについて」正しいものはどれか。',choices:['業務効率のために必要な場合もある','式中・遺族・参列者の近くでの私語は厳禁で、コミュニケーションは業務上必要な内容に限る','大声で話しても問題ない','遺族が見ていなければよい'],answer:1,explanation:'式の進行中・遺族・参列者の近くでスタッフが私語（業務外の会話・笑い声など）をすることは、遺族・参列者への礼を失した行為で厳禁です。業務上必要な連絡は小声・手話サイン・インカムなどで行います。'},
{chapter:7, type:'4',text:'「遺族への「お礼の品（返礼品）」の渡し方として正しいものはどれか。',choices:['床に置いたまま取ってもらう','両手で丁寧に差し出し「こちらをどうぞ」と言葉を添える','片手で雑に渡す','袋のまま投げて渡す'],answer:1,explanation:'品物を渡す際は両手で丁寧に差し出し、「どうぞお受け取りください」「心ばかりの品でございます」などの言葉を添えます。床置き・片手・投げ渡しは失礼にあたります。'},
{chapter:7, type:'4',text:'「「ありがとう」「お世話になりました」と言われた際、葬儀スタッフの返答として最も適切なものはどれか。',choices:['「どういたしまして」','「お役に立てましたこと、光栄でございます。どうかお体をお大切になさってください」','「当然です」','「またいつでもどうぞ」'],answer:1,explanation:'「どういたしまして」は日常的な返答ですがやや軽く、葬儀の場では「お役に立てましたこと、光栄でございます（うれしゅうございます）。どうかお体をお大切に・ご無理なさらないように」などが最もふさわしい返答です。'},
{chapter:7, type:'4',text:'「個人情報保護の観点から、葬儀業者が守るべきことはどれか。',choices:['遺族情報を他の遺族に話して良い','ご遺族・故人の情報は業務目的のみに使用し、第三者への漏洩・目的外使用を禁止する','スタッフ全員に遺族の全情報を共有する','SNSに遺族情報を投稿する'],answer:1,explanation:'個人情報保護法に基づき、遺族・故人の個人情報（連絡先・家族構成・宗教・財産状況など）は業務目的のみに使用し、無断の第三者提供・目的外利用・SNSへの投稿などは厳禁です。'},
{chapter:7, type:'4',text:'「葬儀式場での「携帯電話（スマートフォン）のマナー」として正しいものはどれか。',choices:['式中もいつでも使って良い','式中は電源を切るかマナーモードにし、通話・操作は式場外で行う','着信音が鳴っても問題ない','SNSへの投稿は自由'],answer:1,explanation:'葬儀式場では携帯電話はマナーモード（または電源オフ）が基本マナーです。通話・メール・SNS操作は式場外で行います。スタッフも業務連絡以外のスマートフォン操作は控えます。'},
{chapter:7, type:'4',text:'「「心よりお悔やみ申し上げます」という表現は何語か。',choices:['忌み言葉','お悔やみ（弔慰・ちょうい）の言葉として正しい表現','重ね言葉','禁止されている表現'],answer:1,explanation:'「心よりお悔やみ申し上げます（しんよりおくやみもうしあげます）」は遺族へのお悔やみとして最も一般的で適切な表現のひとつです。「謹んでお悔やみ申し上げます」「哀悼の意を捧げます」なども同様に適切です。'}

// --- 仏教各宗派・深掘り ---
{ chapter:7, type:'ox', text:'「禅（ぜん）」とはサンスクリット語の「ディヤーナ（瞑想）」に由来する言葉である。', answer:true, explanation:'「禅」は梵語（サンスクリット語）の「ディヤーナ（dhyāna）」が中国語で「禅那（ぜんな）」と音写され、「禅」と略されたものです。「瞑想・禅定」という意味で、坐禅（坐った瞑想）の実践を通じて悟りを目指す修行法を指します。' },
{ chapter:7, type:'ox', text:'「臨済宗妙心寺派」は日本最大の臨済宗の派で、全国に約3500か寺の末寺を持つ。', answer:true, explanation:'臨済宗は現在14の派に分かれており、その中で最大勢力を持つのが妙心寺派（総本山：妙心寺、京都市右京区）です。臨済宗は室町幕府の保護を受け、五山制度のもとで文化的にも大きな役割を果たしました。' },
{ chapter:7, type:'ox', text:'「道元」は永平寺を開いた後、一度も比叡山に戻ることなく越前（福井県）で一生を終えた。', answer:false, explanation:'道元は永平寺開山後、1247年に鎌倉幕府の執権・北条時頼に招かれて鎌倉に下向しましたが、約半年で帰山しました。また1253年に病を得て京都に上り、在京中に53歳で入寂（死去）しました。' },
{ chapter:7, type:'ox', text:'「法然」の弟子である「親鸞」は、師の教えをより徹底させ「他力本願」の思想を発展させた。', answer:true, explanation:'法然が「専修念仏」（ひたすら念仏を称えること）を説いたのに対し、親鸞はさらにそれを深め、自己の力（自力）を完全に捨て阿弥陀仏の働き（他力）にすべてを委ねる「絶対他力」の思想を確立しました。主著は「教行信証」です。' },
{ chapter:7, type:'ox', text:'浄土真宗の「歎異抄（たんにしょう）」は親鸞自身が書いた著作である。', answer:false, explanation:'歎異抄は親鸞の弟子・唯円（ゆいえん）が書いたとされる書物で、師・親鸞の言葉を記録しその教えの歪みを嘆いた内容です。「善人なほもて往生をとぐ、いはんや悪人をや」という言葉（悪人正機）が有名で、親鸞の著作ではありません。' },
{ chapter:7, type:'ox', text:'「日蓮宗」では、日蓮の遺骨が納められた身延山が聖地とされ、多くの信者が参詣に訪れる。', answer:true, explanation:'日蓮上人は身延山（山梨県）で晩年の約9年を過ごし、1282年に入滅しました。身延山久遠寺には日蓮の御廟所（お墓）があり、日蓮宗の総本山として多くの参詣者が訪れます。「身延詣り」は日蓮宗信者の重要な巡礼です。' },
{ chapter:7, type:'ox', text:'「真言宗」の「真言（マントラ）」は、意味を理解して唱えることが重要とされる。', answer:false, explanation:'真言（マントラ）は密教において「秘密の言葉」とされ、意味を論理的に理解して唱えることより、音（声）そのものに神聖な力があると考えられています。梵語のまま唱えることが重視され、翻訳しないことが原則です。' },
{ chapter:7, type:'ox', text:'「四弘誓願（しぐせいがん）」は、菩薩（悟りを求める者）が立てる四つの誓いで、多くの宗派の葬儀でも唱えられる。', answer:true, explanation:'四弘誓願とは①衆生無辺誓願度（すべての衆生を救う）②煩悩無尽誓願断（すべての煩悩を断つ）③法門無量誓願学（すべての法門を学ぶ）④仏道無上誓願成（最高の仏道を成就する）の四つです。多くの宗派の法要で唱えられます。' },
{ chapter:7, type:'ox', text:'「浄土宗」の増上寺（東京）は、徳川将軍家の菩提寺として知られる。', answer:true, explanation:'増上寺（東京都港区）は浄土宗の大本山で、徳川家康が江戸入府後に菩提寺と定めました。2代秀忠・6代家宣・7代家継・9代家重・12代家慶・14代家茂の将軍とその家族が埋葬されています。' },
{ chapter:7, type:'ox', text:'「臨済宗」の「公案（こうあん）」は、論理的な思考で解くことができる哲学的な問いかけである。', answer:false, explanation:'公案は「隻手の声を聞け」「父母未生以前の本来の面目とは何か」など、論理的・概念的思考では解けない問いです。これに取り組むことで思考の限界を超え、直接的な悟りの体験（見性）を目指すのが臨済宗の修行法です。' },

// --- 神式深掘り ---
{ chapter:7, type:'ox', text:'神道の「八百万（やおよろず）の神」とは、自然・万物すべてに神が宿るという考え方を表す。', answer:true, explanation:'「八百万の神」は日本神道の多神教的・アニミズム的な世界観を象徴する表現で、山・川・海・木・動物・人間など自然界のすべてに神が宿ると考えます。「八百万」は無数に多いという意味の表現です。' },
{ chapter:7, type:'ox', text:'神式葬儀では「御神酒（おみき）」を供えるのが一般的であるが、火葬後は供えない。', answer:false, explanation:'神式葬儀では故人への供え物（神饌・しんせん）として御神酒・米・塩・水・野菜・魚などを供えます。火葬後（火葬祭・帰家祭）でも御神酒を含む供え物を捧げます。供え物を控える特定の場面はありますが「火葬後は供えない」というルールはありません。' },
{ chapter:7, type:'ox', text:'「伊勢神宮（内宮）」の御祭神は、天照大御神（あまてらすおおみかみ）である。', answer:true, explanation:'伊勢神宮の内宮（皇大神宮）の御祭神は天照大御神で、太陽の神・皇室の祖先神として日本神道の最高位に位置づけられます。外宮（豊受大神宮）の御祭神は豊受大御神（食物・農業の神）です。' },
{ chapter:7, type:'ox', text:'神葬祭における「斎主（さいしゅ）」は仏式の「導師（僧侶）」に相当する役割を担う。', answer:true, explanation:'斎主は神葬祭を主宰する神職のことで、仏式の導師（葬儀を主宰する僧侶）に相当します。祝詞（のりと）の奏上・各種の儀礼の執行など、式全体を取り仕切ります。' },
{ chapter:7, type:'ox', text:'神道では「穢れ（けがれ）」を払うために「禊（みそぎ）」を行う。', answer:true, explanation:'禊（みそぎ）は水で身体を洗い清めることで穢れを祓う神道の浄化儀礼です。伊邪那岐命が黄泉の国から戻った際に禊を行ったという神話が起源とされます。現代の神式葬儀後の「清祓」も穢れを払う儀礼のひとつです。' },

// --- キリスト教深掘り ---
{ chapter:7, type:'ox', text:'「カトリック」とはギリシャ語で「普遍的な」という意味である。', answer:true, explanation:'「カトリック（Catholic）」はギリシャ語「カトリコス（katholikos）」に由来し、「普遍的な・全体にわたる」という意味です。「普遍教会（普遍的なキリストの教会）」という意味でカトリックと呼ばれます。' },
{ chapter:7, type:'ox', text:'「プロテスタント」という名称は、16世紀の宗教改革において改革派が旧体制に「抗議（プロテスト）」したことに由来する。', answer:true, explanation:'「プロテスタント」は1529年のシュパイヤー帝国議会でカトリック側の決定に対してルター派諸侯が「抗議（Protestatio）」したことに由来します。現在は「プロテスト（抗議）」という意味よりも、宗教改革から生まれたキリスト教各派の総称として使われています。' },
{ chapter:7, type:'ox', text:'日本のキリスト教人口は総人口の約30%を占める。', answer:false, explanation:'日本のキリスト教人口は総人口の約1〜2%程度とされており、非常に少数派です（カトリック・プロテスタント・正教会などを合わせて）。仏教徒（約67〜70%）・神道（約70〜80%、重複含む）と比べて大幅に少ない数字です。' },
{ chapter:7, type:'ox', text:'「正教会（せいきょうかい）」は東方キリスト教の一派で、ロシア正教・ギリシャ正教などがある。', answer:true, explanation:'正教会（Eastern Orthodox Church）は1054年のキリスト教大分裂でカトリックと分かれた東方キリスト教の流れで、ロシア正教会・ギリシャ正教会・日本正教会（ハリストス正教会）などがあります。日本では幕末に伝来しました。' },
{ chapter:7, type:'ox', text:'キリスト教の「臨終の秘跡（病者の塗油）」は、死が迫った時に司祭が行う儀礼でカトリックのみの慣行である。', answer:true, explanation:'病者の塗油（かつての「終油の秘跡」）はカトリックの七つの秘跡（サクラメント）のひとつで、重篤な患者や臨終の際に司祭が聖油を塗り祈る儀礼です。プロテスタントは一般的にこのような秘跡の制度を持ちません。' },

// --- 新宗教・諸派深掘り ---
{ chapter:7, type:'ox', text:'「天理教」では死を「出直し（でなおし）」と表現し、現世での修行を終えて神のもとへ帰ると考える。', answer:true, explanation:'天理教では人の死を否定的に捉えず、「神から借りていた体を返し、魂が生まれ直す（出直す）」という積極的な意味を持たせています。このため葬儀の場でも「死」「亡くなる」などの言葉を使わず「出直す」と言います。' },
{ chapter:7, type:'ox', text:'「霊友会（れいゆうかい）」は仏教系の新宗教で、現在も多くの派生宗教を生み出している。', answer:true, explanation:'霊友会（1919年創設）は法華経と先祖供養を基本とする新宗教で、立正佼成会・仏所護念会・妙智会など多くの派生宗教（分派）を生み出しました。これらをまとめて「霊友会系」と呼ぶこともあります。' },
{ chapter:7, type:'ox', text:'「世界救世教（せかいきゅうせいきょう）」は岡田茂吉が開いた新宗教で、「浄霊（じょうれい）」と呼ばれる手かざし療法が特徴である。', answer:true, explanation:'世界救世教は1935年に岡田茂吉（もきち）が開いた新宗教で、「光」を手から放射して病気を治す「浄霊」が特徴的な実践です。MOA美術館（静岡・東京）の運営でも知られます。' },
{ chapter:7, type:'ox', text:'「生長の家（せいちょうのいえ）」は谷口雅春が開いた新宗教で、「神の子」として人間の完全性を説く。', answer:true, explanation:'生長の家は1930年に谷口雅春が開いた新宗教で、「人間は神の子であり本来完全・善・美である」という「神人不二」の思想を説きます。雑誌「生長の家」の出版・「聖使命」誌などを通じて広まりました。' },
{ chapter:7, type:'ox', text:'「神社神道」と「教派神道」は同じものである。', answer:false, explanation:'神社神道は全国の神社・神宮で行われる伝統的な神道です。教派神道は明治時代に政府が公認した天理教・金光教・黒住教など13の宗教団体を指します。神社神道は国家管理下に置かれ（戦前）、教派神道は民間宗教として別扱いされました。' },
{ chapter:7, type:'ox', text:'「黒住教（くろずみきょう）」は江戸時代後期に岡山で成立した神道系の新宗教で、太陽神・天照大御神への信仰が中心である。', answer:true, explanation:'黒住教は1814年に岡山の神官・黒住宗忠が「天命直授（てんめいじきじゅ）」の神秘体験を経て開いた神道系新宗教です。太陽（天照大御神）への信仰と感謝を中心に、明るく積極的な生き方を説きます。教派神道の一つです。' },

// --- 法要・忌日深掘り ---
{ chapter:7, type:'ox', text:'「三十三回忌」は多くの宗派で「弔い上げ（とむらいあげ）」とされ、以後の個別の年忌法要を終了することが多い。', answer:true, explanation:'三十三回忌（満32年後）は多くの仏教宗派で年忌法要の締めくくり（弔い上げ）とされます。この後は個人として祀るのをやめ、先祖代々の霊として合祀する場合が多いです。地域・宗派によっては五十回忌を弔い上げとすることもあります。' },
{ chapter:7, type:'ox', text:'「月命日（つきめいにち）」とは、毎月その人が亡くなった日と同じ日付のことである。', answer:true, explanation:'月命日は毎月巡ってくる命日で、例えば3月15日に亡くなった場合、毎月15日が月命日です。年に一度の「命日（祥月命日・しょうつきめいにち）」と区別して「月命日」と呼びます。月命日に墓参りや仏前での手を合わせを行う習慣があります。' },
{ chapter:7, type:'ox', text:'「祥月命日（しょうつきめいにち）」とは、故人が亡くなった月日（月と日）が一致する、年に一度の命日のことである。', answer:true, explanation:'祥月命日（正忌・しょうき）は故人が亡くなった月と日が同じ、年に一度の本来の命日です。毎月の「月命日」と区別します。一周忌・三回忌などの年忌法要は原則としてこの祥月命日に行います。' },
{ chapter:7, type:'ox', text:'「涅槃会（ねはんえ）」は釈迦の誕生を祝う仏教行事である。', answer:false, explanation:'涅槃会は2月15日に釈迦の入滅（死去）を偲ぶ仏教行事です。釈迦の誕生を祝う行事は「花まつり（灌仏会・かんぶつえ）」で4月8日に行われます。「成道会（じょうどうえ）」は12月8日に釈迦の悟りを祝う行事です。' },
{ chapter:7, type:'ox', text:'「お盆（盂蘭盆会）」は仏教行事であり、先祖の霊が年に一度この世に戻ってくると信じられている。', answer:true, explanation:'お盆（盂蘭盆会・うらぼんえ）はインドの仏教行事が日本の祖先信仰・神道と融合した行事です。8月13日に迎え火で先祖の霊を迎え、16日に送り火で送り出す慣習があります（地域によっては7月）。精霊棚・盆踊りなど日本独自の文化も生まれました。' },

// --- 葬儀マナー・実務 ---
{ chapter:7, type:'ox', text:'葬儀に参列する際の数珠は、宗派の違う葬儀でも自分の宗派の数珠を使って構わない。', answer:true, explanation:'数珠は本来その宗派専用のものがありますが、葬儀に参列する際は自分の宗派の数珠（または「略式数珠」）を持参することが一般的で、他宗派の葬儀でも使用して問題ありません。数珠を持参すること自体が礼儀とされます。' },
{ chapter:7, type:'ox', text:'「喪中はがき」は一般的に故人が亡くなった翌年の年賀状シーズンに合わせて11〜12月に送る。', answer:true, explanation:'喪中はがき（年賀欠礼状）は、相手が年賀状を書く前に届くよう11月〜12月初旬に送るのが一般的なマナーです。年賀状が届いた後に喪中の事を知った場合は「寒中見舞い」で返答します。' },
{ chapter:7, type:'ox', text:'「香典（こうでん）」の語源は、線香・焼香など香を供えることへのお礼が金銭に変化したものとされる。', answer:true, explanation:'香典はもともと「香料（こうりょう）」とも呼ばれ、線香・香などを供えることへの代わりとして金銭を包むようになったものです。「典」は「典礼・儀式」という意味で、「香を供える儀礼への志」という意味合いがあります。' },
{ chapter:7, type:'ox', text:'「弔電（ちょうでん）」は葬儀に参列できない場合に喪家に送る電報で、現代でもNTTなどを通じて送ることができる。', answer:true, explanation:'弔電は葬儀に参列できない際に喪主宛てに送る電報形式のお悔やみで、現代でもNTT・KDDI・電報各社のサービスを通じて送ることができます。葬儀式場に届くよう、通夜・葬儀の前日までに手配するのが一般的です。' },
{ chapter:7, type:'ox', text:'葬儀の「受付」は遺族が担当するのが正式なマナーである。', answer:false, explanation:'葬儀の受付は故人の友人・知人・会社の同僚など「世話人（てつだい人）」が担当するのが一般的です。遺族は弔問客への挨拶・接待・式の進行に専念するため、受付は他の人に委ねるのが通例です。' },

// --- 葬儀形式・現代的変化 ---
{ chapter:7, type:'ox', text:'「音楽葬（おんがくそう）」とは、故人が好んだ音楽を式中に流したり演奏したりする葬儀形式で、無宗教葬の一種である。', answer:true, explanation:'音楽葬は宗教的な儀礼の代わりに、または組み合わせて、故人が愛した音楽を中心に構成する葬儀形式です。無宗教葬（自由葬）の中でも増加しており、生演奏・録音再生・合唱など様々な形があります。' },
{ chapter:7, type:'ox', text:'「グリーフケア」は遺族支援のためのケアであり、葬儀社が提供するアフターフォローとしても注目されている。', answer:true, explanation:'グリーフケアは死別などによる悲嘆（グリーフ）を抱えた遺族を心理的・社会的に支援するケアです。近年、葬儀社が葬儀後の遺族を訪問したり、グリーフケアの場を提供したりするアフターフォローの一環として提供するケースが増えています。' },
{ chapter:7, type:'ox', text:'「手元供養（てもとくよう）」とは、遺骨の一部を小さな骨壺や専用のアクセサリーに入れて手元に置いて供養する方法である。', answer:true, explanation:'手元供養は墓への納骨に加えて（または代わりに）遺骨の一部を手元に置いて供養する方法です。ミニ骨壺・メモリアルジュエリー（遺骨を入れたアクセサリー）・ぬいぐるみ型など様々な形があり、近年増加しています。' },

// --- 仏教宗派詳細 ---
{ chapter:7, type:'4', text:'「浄土真宗大谷派（東本願寺）」の焼香作法として正しいものはどれか。', choices:['額に押しいただいて1回','額に押しいただかずに1回','額に押しいただかずに2回','額に押しいただいて3回'], answer:2, explanation:'真宗大谷派（東本願寺）の焼香は「押しいただかず（額に当てず）に2回」が正式な作法です。浄土真宗本願寺派（西本願寺）は「押しいただかずに1回」です。この違いは覚えておく必要があります。' },
{ chapter:7, type:'4', text:'「一向宗（いっこうしゅう）」とは何の別称か。', choices:['曹洞宗','日蓮宗','浄土真宗','時宗'], answer:2, explanation:'一向宗は浄土真宗（本願寺）の俗称で、「ひたすら（一向に）阿弥陀仏を念じる」という意味から付いた呼び名です。戦国時代に各地で起きた「一向一揆」は浄土真宗（一向宗）の門徒が起こした武装蜂起でした。' },
{ chapter:7, type:'4', text:'「修験道（しゅげんどう）」の特徴として正しいものはどれか。', choices:['純粋な仏教の宗派','山岳での厳しい修行を通じて呪力を得ようとする、仏教・神道・道教などが融合した宗教実践','キリスト教の影響を受けた日本固有の宗教','武士道を宗教化した日本独自の精神形式'], answer:1, explanation:'修験道は山岳に神仏が宿るという信仰のもと、峰入り（山中での修行）を通じて霊力・呪力（験力）を得ようとする宗教実践で、仏教（特に密教）・神道・道教・山岳信仰などが融合しています。役小角（えんのおづぬ）を開祖とします。' },
{ chapter:7, type:'4', text:'「高野山（こうやさん）」について正しい説明はどれか。', choices:['天台宗の総本山がある山','真言宗の総本山・金剛峯寺がある霊場で、世界遺産にも登録されている','日蓮宗の創始者・日蓮が晩年を過ごした山','禅宗の修行道場が集まる山'], answer:1, explanation:'高野山（和歌山県伊都郡高野町）は真言宗の総本山・金剛峯寺がある霊場で、2004年に「紀伊山地の霊場と参詣道」としてユネスコ世界遺産に登録されました。奥之院には空海の御廟所があり、今も生きて定を続けていると信じられています。' },
{ chapter:7, type:'4', text:'「比叡山（ひえいざん）」延暦寺の説明として正しいものはどれか。', choices:['真言宗の総本山','浄土宗の開祖・法然が開いた寺','天台宗の総本山で、多くの鎌倉仏教の開祖を輩出した日本仏教の母山','日蓮宗の総本山'], answer:2, explanation:'比叡山延暦寺（滋賀県大津市）は天台宗の総本山で、最澄（伝教大師）が開きました。法然・親鸞・道元・日蓮・栄西など鎌倉時代の多くの宗祖が修行した場所であり「日本仏教の母山」と呼ばれます。2004年に世界遺産登録。' },
{ chapter:7, type:'4', text:'「永平寺（えいへいじ）」について正しい説明はどれか。', choices:['臨済宗の総本山','曹洞宗の大本山のひとつで、道元が開いた寺','浄土真宗の本山','真言宗の別院'], answer:1, explanation:'永平寺（福井県吉田郡永平寺町）は曹洞宗の大本山のひとつで、道元が1244年に開きました。現在も多くの雲水（修行僧）が修行する「参禅道場」として知られます。もう一つの大本山は横浜の總持寺です。' },
{ chapter:7, type:'4', text:'「知恩院（ちおんいん）」の説明として正しいものはどれか。', choices:['曹洞宗の総本山','浄土宗の総本山で、法然上人が念仏を広めた地に建てられた','日蓮宗の大本山','浄土真宗の別院'], answer:1, explanation:'知恩院（京都市東山区）は浄土宗の総本山で、法然上人が念仏の教えを広め、入定（死去）した地に建てられました。三門（国宝）は木造建築として日本最大級の規模を誇ります。除夜の鐘でも有名です。' },
{ chapter:7, type:'4', text:'「宗祖（しゅうそ）」と「中興の祖（ちゅうこうのそ）」の違いとして正しいものはどれか。', choices:['宗祖は現在の宗派のトップ、中興の祖は歴史上の人物','宗祖はその宗派を開いた人物、中興の祖は後に宗派を再興・発展させた人物','まったく同じ意味','宗祖は仏教用語、中興の祖は神道用語'], answer:1, explanation:'宗祖はその宗派の開祖を指します。中興の祖は宗派が衰えた時期にそれを再び盛んにした功績ある人物のことです。例えば曹洞宗では道元が宗祖、瑩山紹瑾が中興の祖とされます。' },

// --- 神式詳細 ---
{ chapter:7, type:'4', text:'神式葬儀の「発柩祭（はっきゅうさい）」とは何か。', choices:['火葬場で行う最後の儀式','棺を斎場・自宅から出棺する際の儀式','骨上げの際の儀式','帰宅後の清めの儀式'], answer:1, explanation:'発柩祭は棺を安置場所（自宅・斎場）から出棺する際に行う神式の儀式です。仏式の「出棺」に相当します。出棺の際に神職が祝詞を奏上し、一同が玉串を奉奠して故人の旅立ちを送ります。' },
{ chapter:7, type:'4', text:'神式葬儀における香典の正しい表書きはどれか。', choices:['御仏前','御花料','御玉串料または御榊料','御霊前のみ'], answer:2, explanation:'神式葬儀への香典は「御玉串料（おたまぐしりょう）」または「御榊料（おさかきりょう）」が最も適切です。「御神前（ごしんぜん）」「御霊前」も使えます。「御仏前」は仏式専用です。' },
{ chapter:7, type:'4', text:'神道における「祓詞（はらえことば）」とはどういうものか。', choices:['葬儀の際に奏上する弔いの言葉','穢れや罪を祓い清めるために唱える祝詞（のりと）','神社への参拝時に述べる感謝の言葉','神職の身分を証明する言葉'], answer:1, explanation:'祓詞は穢れ・罪・災いを祓い清めるために唱える祝詞で、「払へ給ひ清め給へと申す事を聞こし召せと白す」という内容が含まれます。神葬祭でも各種の儀礼で祓詞が奏上されます。' },

// --- 諸宗教・比較 ---
{ chapter:7, type:'4', text:'「イスラム教」の葬儀の特徴として正しいものはどれか。', choices:['火葬が原則で、できるだけ早く行う','土葬が原則で、死後できるだけ早く（24時間以内が理想）行う','散骨が推奨される','遺体は7日間安置してから埋葬する'], answer:1, explanation:'イスラム教では遺体を土に還すことが教義上の原則のため土葬です。また「早い埋葬が故人への敬意」とされ、死後できるだけ早く（24時間以内が理想）に行います。日本では土葬できる墓地が少なく課題となっています。' },
{ chapter:7, type:'4', text:'ユダヤ教の葬儀の特徴として正しいものはどれか。', choices:['豪華な棺を使い、長期間かけて行う','シンプルな木製の棺を使い、死後できるだけ早く土葬する','火葬を推奨する','僧侶が読経する'], answer:1, explanation:'ユダヤ教では「人間は土から生まれ土に返る」という考えから、土葬が原則です。棺はシンプルな木製（木釘使用・金具不使用）が伝統で、土に早く還るようにします。死後24時間以内の埋葬が理想とされます。' },
{ chapter:7, type:'4', text:'ヒンドゥー教の葬儀の特徴として正しいものはどれか。', choices:['土葬が原則','火葬が原則で、ガンジス川での水葬も行われる','遺体は保存処理して長期間安置する','読経を3日間続ける'], answer:1, explanation:'ヒンドゥー教では輪廻転生の思想から「肉体はただの入れ物」と考え、火葬（荼毘・だび）が一般的です。インドではガンジス川沿いの火葬場（ガート）で火葬し、遺灰を川に流す慣習があります。仏教の「荼毘に付す」という言葉もヒンドゥー教由来です。' },
{ chapter:7, type:'4', text:'「神道」「仏教」「キリスト教」「イスラム教」の中で、日本人の葬儀で最も多く行われているのはどれか。', choices:['神道（神葬祭）','仏教式（仏式）','キリスト教式','イスラム教式'], answer:1, explanation:'日本の葬儀は仏教式が最も多く、約90%前後とされています（調査機関・時期によって異なります）。神式は数%程度、キリスト教式は1〜2%程度です。ただし近年は無宗教・家族葬の増加により、宗教色のない葬儀も増えています。' },
{ chapter:7, type:'4', text:'次のうち「教派神道」として明治政府が公認した13派に含まれないものはどれか。', choices:['天理教','黒住教','金光教','創価学会'], answer:3, explanation:'教派神道（神道十三派）は明治政府が公認した神道系宗教で、黒住教・神道修成派・出雲大社教・扶桑教・実行教・大成教・神習教・御嶽教・神道大社教・禊教・金光教・天理教・神道本局の13派です。創価学会は日蓮宗系の新宗教であり含まれません。' },

// --- 法要・文化 ---
{ chapter:7, type:'4', text:'「お彼岸（おひがん）」に行う主な供養として一般的なものはどれか。', choices:['神社への参拝と玉串奉奠','墓参り・仏壇への供養・法要','教会での礼拝と献花','散骨と海洋供養'], answer:1, explanation:'お彼岸（春分・秋分の前後各3日間）には先祖の墓参り・仏壇への供物・法要などが行われます。「ぼたもち（牡丹餅）」「おはぎ（御萩）」を供える慣習も有名です（春はぼたもち、秋はおはぎ）。神式・キリスト教式では一般的な行事ではありません。' },
{ chapter:7, type:'4', text:'「四十九日」に行う一般的な作法として誤っているものはどれか。', choices:['仮の白木位牌から本位牌へ切り替える','香典の表書きを「御霊前」から「御仏前」に変更する','納骨を行う','喪中はがきを送る'], answer:3, explanation:'喪中はがき（年賀欠礼状）は11〜12月に送るもので、四十九日のタイミングで送るものではありません。四十九日では①白木位牌から本位牌への切り替え②納骨③忌明けのお礼④「御霊前」→「御仏前」への表書き変更、などが一般的に行われます。' },
{ chapter:7, type:'4', text:'「回向（えこう）」とはどういう意味か。', choices:['お墓の向きを変えること','自分の功徳（善行・読経など）を故人や他の人のために振り向けること','葬儀場の方向を確認すること','仏壇の向きを直すこと'], answer:1, explanation:'回向（廻向）とは自分が積んだ善根・功徳を他の者（故人や生きている人）のために振り向けることです。法要での読経・布施などが回向の代表的な実践で、「追善回向」は故人の冥福のために行う追善供養を指します。' },
{ chapter:7, type:'4', text:'「施餓鬼（せがき）」法要とは何か。', choices:['葬儀の費用を計算する儀礼','餓鬼道に苦しむ霊や無縁仏に食物を施す供養法要','お盆に行う盆踊りの起源となった儀式','彼岸に行う先祖供養の特別法要'], answer:1, explanation:'施餓鬼法要は、餓鬼道（飢えに苦しむ世界）に堕ちた霊や無縁仏（供養する人のない霊）に食物を施して供養する法要です。お盆の時期や彼岸に合わせて行われることが多く、お寺が主催する合同の施餓鬼法要も各地で行われます。' },
{ chapter:7, type:'4', text:'「位牌（いはい）」の説明として正しいものはどれか。', choices:['神式で使用する霊魂の依代','仏式で戒名・没年月日・俗名などを記した木製の牌で、故人の霊の依代とされる','キリスト教式で聖書を置く台','葬儀場の案内表示板'], answer:1, explanation:'位牌は仏式で使用する木製の牌で、戒名・没年月日・俗名・享年などが記されます。故人の霊の依代（よりしろ）として仏壇に安置し、日々の供養の対象となります。葬儀直後は白木の「仮位牌（白木位牌）」を使い、四十九日後に塗位牌・本位牌に変えます。' },
{ chapter:7, type:'4', text:'「通夜振舞い（つやぶるまい）」とは何か。', choices:['通夜の式次第の進行のこと','通夜終了後に参列者を接待する会食のこと','通夜の際に喪主が挨拶すること','通夜の翌朝に行う朝食のこと'], answer:1, explanation:'通夜振舞いは通夜の式が終わった後、参列者に飲食でもてなす会食のことです。故人との思い出を語り合い、遺族が参列へのお礼をする場でもあります。料理は寿司・オードブル・精進料理などが多く、地域によって内容が異なります。' },
{ chapter:7, type:'4', text:'「中陰（ちゅういん）」とは何を指すか。', choices:['仏壇のある部屋のこと','死後に次の生を受けるまでの49日間の状態','仏教の瞑想修行の一種','葬儀と告別式の間の休憩時間'], answer:1, explanation:'中陰（中有）とは仏教において、死後に次の生（転生）を受けるまでの過渡的な状態・期間を指します。この期間は49日間（七七日）とされ、7日ごとに裁きを受けると考えられています。これが四十九日法要を重視する根拠となっています。' },
{ chapter:7, type:'4', text:'「引導（いんどう）」を渡す主な目的として正しいものはどれか。', choices:['遺体を火葬場まで運ぶ','故人の霊を迷いから解放し、仏の世界へ導く','遺族に葬儀の費用を説明する','参列者に式の進行を案内する'], answer:1, explanation:'引導は導師（僧侶）が故人に向けて引導文（いんどうぶん）を読み上げ、この世への執着を断ち切って迷わず仏の世界へ向かうよう導く儀式です。仏式葬儀（特に禅宗）の中核をなす重要な儀礼のひとつです。' },
{ chapter:7, type:'4', text:'「導師（どうし）」が複数の僧侶で行う葬儀の場合、最も位の高い僧侶はどの役割を担うか。', choices:['受付・案内','導師（引導を渡す主役の僧侶）','斎主（神職の役割）','葬儀社の担当者'], answer:1, explanation:'複数の僧侶が参列する葬儀では、最も地位の高い（または住職・故人と最も縁の深い）僧侶が「導師」として引導・読経の中心的役割を務めます。他の僧侶は「伴僧（ばんそう）・脇僧（わきそう）」として導師を補佐します。' },
{ chapter:7, type:'4', text:'「焼香」の「抹香（まっこう）」とはどういうものか。', choices:['線香を細かく粉末にしたもの，または香木・香料を粉末にしたもの','ロウソクに火をつける道具','仏壇に供える果物や菓子','焼香台の炭火のこと'], answer:0, explanation:'抹香（まっこう）は香木・香料などを細かく粉末状にしたもので、焼香の際に指でつまんで炭火の上に落として焚きます。「沈香（じんこう）」「白檀（びゃくだん）」など香木が主原料です。' },
{ chapter:7, type:'4', text:'「般若心経（はんにゃしんぎょう）」はどの宗派でも広く読まれているか。', choices:['浄土真宗でも必ず読まれる','浄土真宗では読まれないが、他の多くの宗派で広く読まれている','日蓮宗でのみ読まれる','キリスト教でも取り入れている'], answer:1, explanation:'般若心経は真言宗・天台宗・禅宗（曹洞宗・臨済宗）・浄土宗など多くの宗派で読まれる経典です。しかし浄土真宗では「阿弥陀経・正信偈」など浄土三部経が中心で、般若心経は読みません。日蓮宗も法華経が中心です。' },
{ chapter:7, type:'4', text:'「過去帳（かこちょう）」を毎日めくる習慣について正しいものはどれか。', choices:['浄土真宗では毎日めくり、その日の命日の故人に手を合わせる習慣がある','すべての宗派で必ず毎日めくる','過去帳はめくらずに保管するだけのもの','過去帳は寺院だけが持つもの'], answer:0, explanation:'浄土真宗では過去帳を命日帳として毎日めくり（日付のある「日めくり型過去帳」）、その日に命日を迎える先祖に手を合わせる習慣があります。位牌を使わない浄土真宗において過去帳は重要な供養の道具です。' },
{ chapter:7, type:'4', text:'「檀家（だんか）」制度の説明として正しいものはどれか。', choices:['江戸幕府が設けた制度で、すべての人が特定の寺院に所属することを義務付けた','平安時代に始まった貴族と寺院の関係','神社と氏子の関係を指す','葬儀社が顧客を管理するシステム'], answer:0, explanation:'檀家制度は江戸幕府がキリシタン禁制のために設けた「寺請制度（てらうけせいど）」に基づくもので、すべての民衆が特定の寺院の檀家となり、宗教証明を受けることを義務付けました。これが現代の「菩提寺（ぼだいじ）」制度の起源です。' },

// --- 追加30問（○×15・4択15）---
{ chapter:7, type:'ox', text:'「お布施（おふせ）」は葬儀サービスへの対価（報酬）であり、消費税の課税対象となる。', answer:false, explanation:'お布施は僧侶・寺院への感謝として渡すものであり、法的には「寄付金（布施）」の性格を持ちます。対価性のない寄付のため消費税は不課税です。金額の明示義務もなく、「お気持ち」として遺族が決める形が多いです。' },
{ chapter:7, type:'ox', text:'「初七日法要」は現代では葬儀当日に「繰り込み初七日」として行われることが多い。', answer:true, explanation:'本来は死後7日目に行う初七日法要ですが、遠方からの参列者の都合・日程の効率化のため、現代では葬儀・告別式当日に続けて行う「繰り込み初七日（式中初七日）」が主流になっています。' },
{ chapter:7, type:'ox', text:'「精霊馬（しょうりょううま）」はお盆に作るきゅうりとなすの飾りで、きゅうりが馬、なすが牛を表す。', answer:true, explanation:'精霊馬（精霊牛）はお盆に先祖の霊を迎え送るための乗り物として作ります。きゅうりは足の速い「馬」（あの世から早く帰ってくるよう）、なすはゆっくりした「牛」（この世をゆっくり去っていくよう）を表します。' },
{ chapter:7, type:'ox', text:'「寺請制度（てらうけせいど）」は明治時代に廃止され、現代日本には存在しない。', answer:true, explanation:'寺請制度は明治政府の政教分離政策により1871年（明治4年）に廃止されました。しかし「菩提寺」への依存や仏教式葬儀の慣行は現在も続いており、制度としては廃止されても文化・慣習として根付いています。' },
{ chapter:7, type:'ox', text:'「禅語」で有名な「不立文字（ふりゅうもんじ）」とは「文字に頼らず直接体験で悟りを得る」という禅の立場を示す。', answer:true, explanation:'「不立文字」は禅の基本姿勢を示す言葉で、「経典の文字・言葉に頼らず、師から弟子への心から心への直接伝達（以心伝心）によって悟りを伝える」という意味です。「教外別伝（きょうげべつでん）」「直指人心（じきしにんしん）」「見性成仏（けんしょうじょうぶつ）」とともに禅の四句とされます。' },
{ chapter:7, type:'ox', text:'「念仏（ねんぶつ）」とは仏の名前を唱えることだけを指す。', answer:false, explanation:'念仏とは本来「仏を念じる（心に思い浮かべる）」という意味で、①口称念仏（くしょうねんぶつ：声に出して仏名を称える）②観想念仏（かんそうねんぶつ：仏の姿を心に観想する）③実相念仏などがあります。日本の浄土宗系では主に口称念仏（「南無阿弥陀仏」を称える）を指します。' },
{ chapter:7, type:'ox', text:'「神道」では「死穢（しえ）」を最大の穢れとするため、神社の境内に墓地を設けることは原則ない。', answer:true, explanation:'神道において死は最大の穢れ（死穢）とされるため、神社の境内に墓地を設けることは原則ありません。これは寺院が境内に墓地（寺院墓地）を持つ仏教の慣習と対照的です。神道系の墓地は神社とは別の場所に設けられます。' },
{ chapter:7, type:'ox', text:'「連名（れんめい）」の香典は、複数人が連名で一つの香典袋に入れて渡すことができる。', answer:true, explanation:'同僚・グループ・部署など複数人でまとめて香典を出す場合、連名で一つの香典袋に入れることができます。表書きには代表者名を書き「外一同」などと添えます。別紙に全員の名前と金額を書いて同封するのが丁寧な作法です。' },
{ chapter:7, type:'ox', text:'「浄土（じょうど）」とは仏が清らかにした世界のことで、「極楽浄土」は阿弥陀仏の浄土を指す。', answer:true, explanation:'浄土は仏・菩薩が衆生を救うために設けた清浄な世界のことです。阿弥陀仏の浄土は「極楽浄土（西方極楽世界）」、薬師仏の浄土は「東方浄瑠璃世界」などがあります。浄土宗・浄土真宗は阿弥陀仏の極楽浄土への往生を目指します。' },
{ chapter:7, type:'ox', text:'「密教（みっきょう）」は公開された教えであり、誰でも自由に学ぶことができる。', answer:false, explanation:'密教の「密」は「秘密」を意味し、師から弟子への秘密の伝授（口伝・灌頂）によって伝えられる教えです。「顕教（けんきょう）」が経典として公開された教えなのに対し、密教は師資相承（師弟間の秘密の伝達）を重視します。' },
{ chapter:7, type:'ox', text:'「真言宗」の「護摩（ごま）」とは、火を使った密教の儀式で、煩悩を焼き尽くす意味がある。', answer:true, explanation:'護摩（梵語：ホーマ）は密教の重要な修法で、炉に火を焚き、木・米・胡麻などの供物を投入して燃やすことで煩悩を焼き尽くし、願いを成就させるとされます。不動明王を本尊として行う「不動護摩」が代表的です。' },
{ chapter:7, type:'ox', text:'「日蓮正宗（にちれんしょうしゅう）」は日蓮宗から派生した宗派で、創価学会はかつてこの宗派の信徒団体だった。', answer:true, explanation:'日蓮正宗は1290年頃に日興（にっこう）が日蓮の本弟子として開いた宗派で、総本山は富士山麓の大石寺（静岡県富士宮市）です。創価学会は元々日蓮正宗の信徒団体でしたが、1991年に対立が深まり破門されて独立しました。' },
{ chapter:7, type:'ox', text:'「おくり火（送り火）」はお盆の最終日（8月16日）に先祖の霊を送り出すために焚く火である。', answer:true, explanation:'送り火はお盆の終わり（8月16日）に先祖の霊があの世へ帰るのを見送るために焚く火です。迎え火（8月13日）の対となる慣習です。京都の「大文字焼き（五山の送り火）」は全国的に有名な送り火の行事です。' },
{ chapter:7, type:'ox', text:'「施主（せしゅ）」は仏教用語で、もともとは「布施（ふせ）をする人＝僧侶・寺院に財物を施す人」を意味する。', answer:true, explanation:'施主は梵語「ダーパティ」の訳で、本来は「布施をする在家信者（お金・食物などを僧侶に施す人）」という意味です。現代では葬儀・法要の費用を負担し手配する人（多くの場合、喪主と同一人物）を指す意味でも使われています。' },
{ chapter:7, type:'ox', text:'「開眼供養（かいげんくよう）」とは、新しく作った仏像・位牌・墓石などに魂（霊）を入れる儀式である。', answer:true, explanation:'開眼供養（開眼法要・魂入れ）は新しく仏像・位牌・墓石などを作った際に、僧侶が読経して「目を開く（魂・霊を入れる）」儀式です。これにより単なる物体が礼拝の対象となります。墓石を建てた際にも行われます。' },
{ chapter:7, type:'4', text:'「両祖（りょうそ）」という言葉で知られる曹洞宗の二人の宗祖は誰か。', choices:['道元と栄西','道元と瑩山紹瑾','最澄と空海','法然と親鸞'], answer:1, explanation:'曹洞宗では「両祖（りょうそ）」として道元（承陽大師）と瑩山紹瑾（常済大師）を崇敬します。道元が宗祖として曹洞宗を開き、瑩山が総持寺を開いて宗勢を大きく拡大したことから「中興の祖」と呼ばれます。' },
{ chapter:7, type:'4', text:'「禅宗」の葬儀における焼香の回数として一般的なものはどれか。', choices:['1回','2回','3回','5回'], answer:2, explanation:'曹洞宗・臨済宗などの禅宗では焼香を3回行うのが一般的な作法です。ただし地域・寺院・状況によって異なる場合もあります。浄土真宗（1〜2回）や浄土宗（1〜3回）などと比較して覚えましょう。' },
{ chapter:7, type:'4', text:'「五山（ごさん）」制度とは何か。', choices:['天台宗の五つの本山','鎌倉・室町幕府が定めた禅宗寺院の格付け制度','真言宗の重要寺院五か所','浄土宗の五つの大本山'], answer:1, explanation:'五山制度は鎌倉・室町幕府が臨済宗の重要寺院を格付けした制度で、京都五山（天龍寺・相国寺・建仁寺・東福寺・万寿寺）と鎌倉五山（建長寺・円覚寺・寿福寺・浄智寺・浄妙寺）があります。幕府の保護下で禅文化が発展しました。' },
{ chapter:7, type:'4', text:'「本山（ほんざん）」と「末寺（まつじ）」の関係として正しいものはどれか。', choices:['本山は古い寺院、末寺は新しい寺院','本山は宗派の中心となる寺院、末寺はその宗派に属する一般の寺院','本山は大きな寺院、末寺は小さな寺院','本山は東京の寺院、末寺は地方の寺院'], answer:1, explanation:'本山は宗派の中心・統括機関となる寺院（総本山・大本山など）で、宗祖ゆかりの地に建てられることが多いです。末寺はその宗派に属する一般の寺院で、本山の管轄下にあります。「本末関係（ほんまつかんけい）」と呼ばれます。' },
{ chapter:7, type:'4', text:'「無宗教葬（自由葬）」で避けるべき配慮として正しいものはどれか。', choices:['音楽を流すこと','特定の宗教の儀礼（読経・祝詞・讃美歌など）を押しつけないこと','献花を行うこと','司会者を設けること'], answer:1, explanation:'無宗教葬では参列者の宗教的背景が様々であることを考慮し、特定宗教の儀礼を強制しないことが重要です。音楽・献花・司会・映像などは宗教色のない演出として広く使われます。故人・遺族の意向を最大限尊重した式づくりが求められます。' },
{ chapter:7, type:'4', text:'「葬場祭（そうじょうさい）」とはどの宗教の葬儀用語か。', choices:['仏式','神式（神葬祭）','キリスト教式','無宗教葬'], answer:1, explanation:'葬場祭は神葬祭（神式葬儀）の中心的な儀式で、仏式の「葬儀・告別式」に相当します。斎主が祭詞を奏上し、参列者が玉串奉奠を行います。神葬祭の式次第は遷霊祭→発柩祭→葬場祭→火葬祭→帰家祭の順です。' },
{ chapter:7, type:'4', text:'「戒名料（かいみょうりょう）」についての正しい説明はどれか。', choices:['法律で定められた一定の金額がある','一般的に院号＞道号・戒名＞位号の順に高くなる傾向があり、金額は寺院・宗派によって大きく異なる','戒名料は仏教どの宗派でも同じ料金体系','戒名料は葬儀社が設定する'], answer:1, explanation:'戒名料は法律で定められた金額はなく、院号の有無・文字数・寺院との関係などによって大きく異なります。院号付きは数十万〜数百万円、一般的な戒名は数万〜数十万円程度が相場とされますが、寺院・地域・宗派によって様々です。' },
{ chapter:7, type:'4', text:'「神棚封じ（かみだなふうじ）」とはどういうものか。', choices:['神棚を撤去すること','死の穢れが神棚に及ばないよう、白い紙を貼って神棚を封じること','神棚に新しい神札を入れること','神棚の掃除をすること'], answer:1, explanation:'神棚封じは家人が亡くなった際に、死の穢れが神様に及ばないよう神棚の扉または正面に白紙（半紙）を貼って封じる慣習です。神道の「死穢（しえ）」の概念から来ており、忌明け（五十日祭後）に紙を取り外します。' },
{ chapter:7, type:'4', text:'「菩提寺（ぼだいじ）」の意味として正しいものはどれか。', choices:['悟りを開いた場所にある寺','その家の先祖代々の葬儀・法事を行い、遺骨・位牌を管理する縁の深い寺院','全国で最も格式の高い寺院','葬儀社が指定する提携寺院'], answer:1, explanation:'菩提寺とは、その家の先祖代々の葬儀・年忌法要を行い、墓地・位牌を管理する縁の深い寺院のことです。江戸時代の寺請制度に起源を持ち、現代でも「家の宗教」として続いています。菩提寺のある家では葬儀の際に菩提寺の住職に依頼するのが一般的です。' },
{ chapter:7, type:'4', text:'「三途の川（さんずのかわ）」について正しい説明はどれか。', choices:['神道の死後の世界に存在する川','仏教の死後の世界観で、死者がこの世からあの世へ渡る際に越えるとされる川','キリスト教の天国への道にある川','実在する河川の別名'], answer:1, explanation:'三途の川は仏教の死後の世界観で、死者が冥土へ向かう途中に渡るとされる川です。生前の行いによって渡り方が異なり（橋・浅瀬・深み）、川の番人「奪衣婆（だつえば）」と「懸衣翁（けんえおう）」が衣服を奪って罪の重さを量るとされます。' },
{ chapter:7, type:'4', text:'「冥土（めいど）」「黄泉（よみ）」「地獄（じごく）」の説明として正しいものはどれか。', choices:['すべて同じ場所を指す別の言葉','冥土は仏教の死後の世界、黄泉は日本神話の死者の国、地獄は冥土の中でも罪人が苦しむ場所','冥土はキリスト教用語、黄泉は仏教用語','地獄は現世の苦しい状態を表すだけで死後の世界ではない'], answer:1, explanation:'「冥土（冥途）」は仏教における死後の世界の総称、「黄泉（よもつひらさか）」は日本神話（古事記）に登場する死者が行く国、「地獄」は冥土の中で最も厳しい罰を受ける場所です。それぞれ由来する宗教・文化が異なります。' },
{ chapter:7, type:'4', text:'「仏壇（ぶつだん）」の本来の意味として正しいものはどれか。', choices:['先祖の位牌を飾る棚','家庭内に本尊（仏像）を安置し礼拝するための壇','葬儀場に設置する祭壇','お盆に精霊棚として使う棚'], answer:1, explanation:'仏壇は本来、家庭内に本尊（仏像・曼荼羅など）を安置して礼拝するための壇です。先祖の位牌を置く機能は後から加わったもので、「先祖を祀る場所」というイメージが強くなっていますが、本来は「本尊を礼拝する家庭の小さなお寺」です。' },
{ chapter:7, type:'4', text:'「宗派（しゅうは）」を確認することが葬儀準備で重要な理由として最も適切なものはどれか。', choices:['葬儀費用の計算のため','祭壇形式・焼香回数・経典・作法など式全体に関わるため','参列者へのご案内文作成のため','火葬場の予約のため'], answer:1, explanation:'宗旨宗派によって祭壇の形（白木/花）・焼香回数（1〜3回）・読む経典・引導の有無・数珠の形式・位牌の使用有無・戒名の呼称（戒名/法名）など、式全体に関わる多くの要素が異なります。葬儀施行の最重要確認事項のひとつです。' },
{ chapter:7, type:'4', text:'「檀那（だんな）」の語源として正しいものはどれか。', choices:['中国語で「主人」を意味する言葉','梵語（サンスクリット語）の「ダーナ（布施・施し）」に由来する','日本語の「旦那」から来た言葉','英語の「donor（寄付者）」から来た言葉'], answer:1, explanation:'「檀那（だんな）」は梵語のダーナ（dāna・布施・施し）が由来で、「寺院に布施をする在家信者（檀家）」を意味します。これが転じて「主人・旦那様」という意味でも使われるようになりました。「檀家（だんか）」も同じ語源です。' },
{ chapter:7, type:'4', text:'次の「宗派別・焼香回数」の組み合わせとして正しいものはどれか。', choices:['浄土真宗本願寺派：2回、真宗大谷派：1回','浄土真宗本願寺派：1回、真宗大谷派：2回','曹洞宗：1回、日蓮宗：3回','浄土宗：2回、天台宗：1回'], answer:1, explanation:'浄土真宗の焼香回数は本願寺派（西）が1回、大谷派（東）が2回です（いずれも額に押しいただかない）。曹洞宗・臨済宗は3回が一般的、浄土宗・天台宗・真言宗は1〜3回（宗派の指定あり）、日蓮宗は1回または3回が多いです。' },
// ===== ○× 問題（50問）=====
{chapter:8, type:'ox',text:'日本の葬儀業界は少子高齢化による死亡者数の増加を背景に、市場規模が拡大傾向にある。',answer:true,explanation:'日本は世界有数の高齢化社会で、年間死亡者数は増加しており（約140万人前後・2020年代）葬儀需要は増加傾向にあります。一方で家族葬・直葬の普及により1件あたりの単価は低下しており、単純な拡大ではなく変質が続いています。'},
{chapter:8, type:'ox',text:'「葬儀業（そうぎぎょう）」は一般の製造業と同様に、景気変動の影響を強く受ける業種である。',answer:false,explanation:'葬儀業は「死亡」という社会的に必然かつ経済状況に関わらず発生する事象を扱うため、他業種に比べて景気変動の影響が比較的小さい「景気耐性」の高い業種とされています。ただし単価・形式の変化は起こります。'},
{chapter:8, type:'ox',text:'「互助会（こじょかい）」は前払い方式で会員から積立金を集め、将来の葬儀・冠婚サービスを提供するビジネスモデルである。',answer:true,explanation:'冠婚葬祭互助会は毎月一定額を積み立て（前払い）、会員が葬儀・結婚式などを行う際にそのサービスを利用できる仕組みです。割賦販売法の前払式割賦販売として規制を受け、前受金の2分の1以上の保全が義務付けられています。'},
{chapter:8, type:'ox',text:'「互助会の解約（中途解約）」では、積立金の全額が返金される。',answer:false,explanation:'互助会の中途解約では一般的に手数料・解約費（割賦販売法では解約手数料の上限が定められていますが）が差し引かれ、全額は返金されません。また解約手続きが複雑でトラブルになるケースもあり、消費者相談の多い分野です。'},
{chapter:8, type:'ox',text:'「家族葬（かぞくそう）」の普及により、1件あたりの葬儀費用は減少傾向にある。',answer:true,explanation:'家族葬・直葬の普及に伴い、規模縮小・参列者減少・返礼品・飲食費の削減などにより、1件あたりの葬儀費用（葬儀社への支払い）は全国的に低下傾向にあります。葬儀社は数量の確保と単価の維持が課題となっています。'},
{chapter:8, type:'ox',text:'「直葬（ちょくそう・じきそう）」の割合は2000年以降増加している。',answer:true,explanation:'直葬（通夜・葬儀・告別式を行わず火葬のみ）は高齢者の単身世帯増・費用負担の軽減・故人の意向などから増加しています。東京などの大都市圏では直葬の割合が特に高く、30〜40%に達するとも言われています。'},
{chapter:8, type:'ox',text:'「葬儀業における「差別化（さべつか）」とは、他社と異なる独自の強みを持つことである。',answer:true,explanation:'競争が激化する葬儀業界では「他社との差別化」が重要です。差別化の方法として価格・品質・スタッフ対応・アフターフォロー・施設・地域密着など様々な要素があります。'},
{chapter:8, type:'ox',text:'「葬儀業における「固定費（こていひ）」には人件費・施設費・設備費が含まれる。',answer:true,explanation:'固定費は売上の増減に関わらず一定期間発生するコストで、葬儀業では人件費（スタッフ給与）・施設費（式場賃料）・設備費（霊柩車・搬送車・棺・備品）などが含まれます。葬儀は突発的な需要があるため人員・設備の固定費管理が重要です。'},
{chapter:8, type:'ox',text:'「葬儀業における「変動費（へんどうひ）」には、葬儀ごとに変わる材料費・外注費が含まれる。',answer:true,explanation:'変動費は売上・件数に応じて変化するコストで、葬儀業では棺・花・料理・返礼品など材料費、宗教者への謝礼（外注費）、火葬費用（外部機関への支払い）などが変動費にあたります。'},
{chapter:8, type:'ox',text:'「粗利益（そりえき）」は売上から変動費（原価）を差し引いたものである。',answer:true,explanation:'粗利益（売上総利益）＝売上高－売上原価（変動費）で計算します。葬儀業の粗利率は祭壇・棺など用品のマージン・外注費の割合によって大きく変わります。'},
{chapter:8, type:'ox',text:'「葬儀業の「稼働率（かどうりつ）」は式場・霊柩車・スタッフの利用効率を示す指標である。',answer:true,explanation:'稼働率は設備・人員がどの程度活用されているかを示す指標です。葬儀業では式場の稼働率・霊柩車の稼働率・スタッフの配置効率などを管理することで、コスト効率の改善につながります。'},
{chapter:8, type:'ox',text:'「葬儀業の「マーケティング（marketing）」では、地域の潜在顧客（まだ葬儀の必要がない人）へのアプローチも重要である。',answer:true,explanation:'葬儀のマーケティングは「今すぐ必要な人」だけでなく、将来的な顧客（終活セミナー参加者・地域の高齢者・互助会加入者など）へのアプローチも重要です。信頼関係の事前構築が選ばれる葬儀社になる鍵です。'},
{chapter:8, type:'ox',text:'「終活（しゅうかつ）セミナー」を地域で開催することは、葬儀社の顧客獲得・認知度向上に役立つ。',answer:true,explanation:'終活セミナー（エンディングノート・遺言・葬儀の準備・相続など）の開催は、地域の潜在顧客（高齢者・家族）への認知度向上・信頼関係構築に効果的なマーケティング手法です。'},
{chapter:8, type:'ox',text:'「葬儀業における「口コミ（くちこみ）」は、新規顧客獲得の重要な手段である。',answer:true,explanation:'葬儀は一般的に数年〜数十年に一度の利用であり、「知人・友人からの紹介・口コミ」が葬儀社選びの大きな決め手になることが多いです。良質なサービスによる口コミ獲得は最も費用対効果の高い集客方法のひとつです。'},
{chapter:8, type:'ox',text:'「葬儀業界における「過当競争（かとうきょうそう）」とは、業者間の競争が激しすぎて価格低下・サービス低下が起きることである。',answer:true,explanation:'葬儀業界では家族葬・直葬の普及・新規参入業者の増加・価格比較サイトの普及などにより競争が激化しています。価格競争（ダンピング）によるサービス品質低下や業者の経営難が課題となっています。'},
{chapter:8, type:'ox',text:'「葬儀業の「一件当たり売上高（平均客単価）」は、参列者数・規模・選択プランによって大きく異なる。',answer:true,explanation:'葬儀の客単価は①一般葬（100〜300万円）②家族葬（50〜150万円）③一日葬（30〜100万円）④直葬（20〜50万円）と規模・形式によって大幅に異なります。付帯サービス（飲食・返礼品・お布施）も含めると総額はさらに変動します。'},
{chapter:8, type:'ox',text:'「葬儀業の「繁忙期（はんぼうき）」は一般的に冬（1〜2月）と夏（7〜8月）に多い傾向がある。',answer:true,explanation:'死亡者数は寒暖差が大きい冬（1〜2月）と夏（7〜8月）に増える傾向があります（特に高齢者の心疾患・熱中症などが増加）。葬儀件数も季節変動があり、これに合わせた人員・設備の管理が必要です。'},
{chapter:8, type:'ox',text:'「葬儀業の「施行件数（せこうけんすう）」と「売上高」は常に比例する。',answer:false,explanation:'施行件数が増えても直葬・簡素葬が増えれば1件あたりの売上は下がるため、件数と売上は必ずしも比例しません。件数×平均客単価が売上となるため、件数だけでなく客単価の管理が重要です。'},
{chapter:8, type:'ox',text:'「葬儀業の「原価率（げんかりつ）」が高いほど、利益率は低くなる。',answer:true,explanation:'原価率（売上原価÷売上高×100）が高いということは売上に対して費やすコストが大きいということで、その分利益が少なくなります。葬儀業では棺・花・料理・外注費などの原価管理が利益率に直結します。'},
{chapter:8, type:'ox',text:'「葬儀業の「スタッフ採用」では、業界経験者しか採用できない。',answer:false,explanation:'葬儀業のスタッフ採用は異業種（ホテル・医療・小売・接客業）からの転職者も多く、未経験者採用も行われています。接遇・コミュニケーション能力・マインド（使命感）が重視される職種で、専門知識は入社後に習得できます。'},
{chapter:8, type:'ox',text:'「葬儀業の「BCP（事業継続計画）」とは、大規模災害・事故・感染症発生時でも事業を継続するための計画である。',answer:true,explanation:'BCP（Business Continuity Plan）は災害・事故・パンデミックなど緊急事態でも事業を継続・早期復旧させるための計画です。葬儀業は「絶対に止められないサービス」であるため、感染症流行時・自然災害時の対応計画が特に重要です。'},
{chapter:8, type:'ox',text:'「葬儀業者の「廃業（はいぎょう）」や「倒産（とうさん）」は発生しないと考えてよい。',answer:false,explanation:'葬儀業も一般企業と同様に廃業・倒産が発生しています。特に小規模葬儀社・互助会系では経営難・後継者不在による廃業も見られます。遺族は互助会加入時や前払い契約時に業者の経営状態を確認することが重要です。'},
{chapter:8, type:'ox',text:'「葬儀業の「M&A（合併・買収）」は近年増加している。',answer:true,explanation:'葬儀業界でも後継者不在・規模拡大・エリア拡張・施設取得を目的としたM&A（合併・買収）が近年増加しています。大手葬儀グループが地域の中小葬儀社を買収・グループ化する動きが見られます。'},
{chapter:8, type:'ox',text:'「「縁起の悪い」とされる日（友引など）でも、現代では葬儀を行える式場が多い。',answer:true,explanation:'かつて「友引には葬儀を行わない（友を引くと縁起が悪い）」という慣習から、多くの火葬場が友引に休業していました。しかし近年は友引でも営業する火葬場・式場が増え、友引葬儀も可能な地域が多くなっています。'},
{chapter:8, type:'ox',text:'「葬儀業の「クレーム件数」は経営指標のひとつとして管理されるべきである。',answer:true,explanation:'クレーム件数・内容の記録・分析は経営改善のための重要な指標です。クレームはサービスの問題点を示す「改善のシグナル」であり、集計・分類・原因分析・再発防止策の実施が経営品質向上につながります。'},
{chapter:8, type:'ox',text:'「葬儀業の「事前相談件数」は、将来の施行につながる先行指標（せんこうしひょう）として重要である。',answer:true,explanation:'事前相談（生前相談・終活相談）を受けた件数は、将来の施行件数に直結する先行指標です。相談者が実際に葬儀を依頼する割合（転換率）を高めることが集客・売上につながります。'},
{chapter:8, type:'ox',text:'「葬儀業の「施行後アンケート」は、サービス改善の重要なフィードバック手段である。',answer:true,explanation:'施行後アンケート（満足度調査）は遺族からサービスの評価・改善点・スタッフの対応評価などを収集する重要な手段です。定期的な集計・分析によりサービス品質の維持・向上につながります。'},
{chapter:8, type:'ox',text:'「「葬祭ディレクター2級」は実務経験不要で受験できる。',answer:false,explanation:'葬祭ディレクター2級の受験資格は葬祭業での実務経験が概ね2年以上が目安とされています。実務経験なしでは受験できません（1級は概ね5年以上）。'},
{chapter:8, type:'ox',text:'「葬儀業の「顧客満足度（CS）」と「従業員満足度（ES）」は密接に関連している。',answer:true,explanation:'従業員満足度（ES）が高い職場では従業員がモチベーション高く働き、その結果として顧客への接遇・サービス品質が向上して顧客満足度（CS）が高まるという正の相関関係があります。「ESなくしてCSなし」と言われます。'},
{chapter:8, type:'ox',text:'「葬儀業の「完全歩合制（フルコミッション）」は一般的な給与体系である。',answer:false,explanation:'葬儀業では毎日の業務が不定期であり、スタッフが安定して働けるよう月給制・固定給制が一般的です。完全歩合制（売上に連動した給与のみ）は葬儀業ではほとんど採用されていません。'},
{chapter:8, type:'ox',text:'「葬儀業の「深夜・早朝対応」は、追加費用なしで提供されることが多い。',answer:false,explanation:'深夜・早朝の呼び出し・搬送・対応には「深夜割増料金」が発生する葬儀社が多くあります。人件費の割増・緊急対応コストがかかるためです。事前に料金体系を確認することが重要です。'},
{chapter:8, type:'ox',text:'「葬儀業の「ISO認証（アイエスオー認証）」取得を目指す企業が増えている。',answer:true,explanation:'ISO（国際標準化機構）の品質管理規格（ISO9001など）やCSRに関する認証を取得する葬儀社が増えています。認証取得は品質管理・業務改善・顧客への信頼性アピールなどに役立ちます。'},
{chapter:8, type:'ox',text:'「葬儀業の「プライスリスト（料金表）の明示」は消費者保護の観点から重要である。',answer:true,explanation:'葬儀費用は複雑・不透明になりやすいため、明確な料金表・パッケージ内容の提示は消費者保護の観点から重要です。景品表示法・消費者保護法の観点からも、不当な価格表示・不透明な費用提示は問題です。'},
{chapter:8, type:'ox',text:'「葬儀業の「SNS（ソーシャルメディア）マーケティング」は、プライバシーへの配慮が特に必要である。',answer:true,explanation:'葬儀のSNSマーケティングでは個人情報（故人・遺族）のプライバシー保護が特に重要です。遺族の許可なく式の様子を投稿したり、会員の個人情報をSNSで使用することは厳禁です。'},
{chapter:8, type:'ox',text:'「葬儀業の「地域連携」として医療機関・介護施設との協力関係構築は重要である。',answer:true,explanation:'葬儀業の主要な顧客獲得経路として、病院・老人ホーム・介護施設との連携（紹介・提携）は重要です。医療・介護スタッフへの情報提供・施設内での遺体搬送協力などが関係構築につながります。'},
{chapter:8, type:'ox',text:'「「寺院・神社・教会との関係」は葬儀業にとって重要なビジネスパートナーシップである。',answer:true,explanation:'葬儀業と寺院・神社・教会は葬儀の施行において協力関係にあります。導師の手配・葬儀の宗教的執行において不可欠なパートナーであり、良好な関係構築が葬儀施行の質に直結します。'},
{chapter:8, type:'ox',text:'「葬儀業の「従業員教育（スタッフ研修）」は、定期的に実施することが重要である。',answer:true,explanation:'葬儀業のスタッフには葬儀の専門知識（宗旨宗派・法律・接遇）・グリーフケアの理解・接遇スキル・衛生管理など多岐にわたる知識・技術が必要です。定期的な研修・資格取得支援が人材育成の基本です。'},
{chapter:8, type:'ox',text:'「葬儀業の「年間売上目標」は、件数のみで設定するのが最も効果的である。',answer:false,explanation:'年間売上目標は件数だけでなく、①件数②平均客単価（1件あたり売上）③総売上高④コスト（原価・固定費）⑤利益率など複合的な指標で設定することが効果的です。件数が増えても単価が下がれば売上・利益は改善しません。'},
{chapter:8, type:'ox',text:'「「終活ビジネス（しゅうかつビジネス）」は葬儀業にとって新しいビジネス機会である。',answer:true,explanation:'終活（エンディング活動）ニーズの高まりにより、葬儀業者が「終活セミナー・エンディングノート配布・生前相談・家族信託相談」など終活に関連したビジネスを展開することが増えています。既存の葬儀業務を超えた新しいビジネス機会です。'},
{chapter:8, type:'ox',text:'「「グリーフケアサービス」の提供は、葬儀業の業務範囲外のビジネス拡大にはつながらない。',answer:false,explanation:'グリーフケアサービス（遺族支援・相談窓口・グリーフグループの開催）は葬儀業の「アフターフォロー」として提供することで、遺族からの信頼・紹介・再利用（次の葬儀）につながる重要なビジネス拡大の機会となっています。'},
{chapter:8, type:'ox',text:'「「フランチャイズ（FC）」形式の葬儀業は日本に存在しない。',answer:false,explanation:'葬儀業でもフランチャイズ（FC）形式（本部が加盟店にノウハウ・ブランド・仕組みを提供し加盟金・ロイヤリティを受け取る方式）を採用しているチェーンが存在します。独立した葬儀社がFCに加盟してブランド力・集客力を強化するケースもあります。'},
{chapter:8, type:'ox',text:'「「宇宙葬（うちゅうそう）」は遺骨または遺灰を宇宙空間に打ち上げる新しい形の葬法である。',answer:true,explanation:'宇宙葬は遺骨・遺灰の一部をカプセルに入れて宇宙ロケットで打ち上げる葬法で、海外企業（Celestis社など）が商業サービスとして提供しています。日本でも選択する人が増えており、新しいエンディングの形として注目されています。'},
{chapter:8, type:'ox',text:'「「樹木葬（じゅもくそう）」は墓石の代わりに樹木・花を墓標とする葬法で、近年急速に普及している。',answer:true,explanation:'樹木葬は墓石を使わず、樹木・花・芝生などを墓標とし、その根元に遺骨を埋葬する形式です。1999年に日本初の樹木葬が始まり、後継者不要・自然に還れる・費用を抑えられるなどの理由から急速に普及しています。'},

// ===== 4択 問題（50問）=====
{chapter:8, type:'4',text:'「日本の年間死亡者数」は2020年代においておよそ何人か。',choices:['約50万人','約100万人','約140万人','約200万人'],answer:2,explanation:'日本の年間死亡者数は2020年代に約140万人前後で推移しており（2022年は約156万人と過去最多を更新）、高齢化の進展に伴って増加傾向にあります。この死亡者数が葬儀需要の基本的な規模を決定します。'},
{chapter:8, type:'4',text:'「直葬（火葬のみ）」が全国的に増加している主な理由として最も適切なものはどれか。',choices:['火葬場が葬儀を禁止しているため','費用の抑制・故人の意向・核家族化・参列者の高齢化などの理由から','葬儀社の数が減ったため','法律で直葬が義務化されたため'],answer:1,explanation:'直葬増加の主な要因は①費用を抑えたい②故人が「派手な葬儀は不要」と遺言していた③核家族化で呼べる参列者が少ない④高齢者の死亡で参列者も高齢化して参列困難⑤宗教離れ、などです。'},
{chapter:8, type:'4',text:'「互助会の前受金保全義務」とはどういうものか。',choices:['積立金を銀行に全額預ける義務','割賦販売法により、前受金（積立金）の2分の1以上を法務大臣の指定する保全機関に保全する義務','消費者に毎月報告する義務','税務署に申告する義務'],answer:1,explanation:'割賦販売法は互助会（前払式割賦販売業者）に対し、消費者から受け取った前受金（積立金）の2分の1以上を政府指定の機関（公益財団法人割賦販売協会等）で保全することを義務付けています。業者倒産時の消費者保護のためです。'},
{chapter:8, type:'4',text:'「葬儀業の収益構造」において重要な考え方はどれか。',choices:['件数のみを増やすことが利益増につながる','件数×平均客単価で売上が決まり、そこから費用を引いた利益を最大化することが重要','費用は考慮しなくてよい','利益より件数が大切'],answer:1,explanation:'葬儀業の収益は「件数×平均客単価＝売上高」「売上高－費用（固定費＋変動費）＝利益」の構造です。件数が増えても単価が下がれば利益が出ない場合もあるため、件数・単価・費用のバランス管理が重要です。'},
{chapter:8, type:'4',text:'「葬儀業の「顧客獲得（集客）手段」として近年最も増加しているものはどれか。',choices:['新聞広告のみ','インターネット（ウェブサイト・SNS・比較サイト）を活用した集客','飛び込み営業','テレビCMのみ'],answer:1,explanation:'近年の葬儀集客は自社ウェブサイト・口コミサイト・葬儀価格比較サイト（いい葬儀・葬儀レビューなど）・SNSの活用が増加しています。新聞折込チラシ・看板・地域情報誌なども引き続き有効です。'},
{chapter:8, type:'4',text:'「葬儀業の「売上高総利益率（粗利率）」を改善するための方法として誤っているものはどれか。',choices:['原価（仕入れコスト）を下げる','高付加価値サービスの提供による単価向上','直葬のみにして件数を大幅に増やす','外注費の見直しによるコスト削減'],answer:2,explanation:'直葬は客単価が低いため、直葬のみに特化して件数を増やしても粗利率改善には必ずしもつながりません。粗利率改善には①原価低減②高付加価値サービスで客単価を上げる③外注費見直し などが有効です。'},
{chapter:8, type:'4',text:'「葬儀業の「繁忙期対策」として最も重要なものはどれか。',choices:['繁忙期に店を閉める','スタッフの増員・シフト管理・外部業者との連携体制の整備','繁忙期の予測はできない','価格を上げる'],answer:1,explanation:'葬儀業の繁忙期（冬・夏）には件数が増加しスタッフ・設備が不足しやすいため、①人員増員・シフト管理②協力業者（ドライバー・スタッフ派遣）との連携③設備の事前点検・補充を行うことが重要です。'},
{chapter:8, type:'4',text:'「葬儀社の「見積もり」で消費者が最も注意すべき点はどれか。',choices:['社員数','基本セットに何が含まれ、別途どんな実費がかかるかを明確にすること','会社の設立年数','HPのデザイン'],answer:1,explanation:'葬儀の見積もりで最も注意すべきは「基本セット（パック）に含まれるもの」と「別途実費（飲食・返礼品・お布施・火葬料など）」の区別です。総額でいくらかかるかを必ず事前に確認することが重要です。'},
{chapter:8, type:'4',text:'「葬儀業の「事業承継（じぎょうしょうけい）」における課題として正しいものはどれか。',choices:['後継者の確保・育成が容易','後継者不在・後継者の業界理解不足・顧客関係の引き継ぎが課題となることが多い','事業承継は法律上自動的に行われる','承継後の顧客は自動的に継続する'],answer:1,explanation:'中小葬儀社の事業承継では①後継者の確保・育成②業界特有の知識・顧客関係の引き継ぎ③M&A（他社への売却）の検討など多くの課題があります。後継者不在による廃業も多い業種です。'},
{chapter:8, type:'4',text:'「葬儀業の「人材定着（じんざいていちゃく）」のために重要なものはどれか。',choices:['給与のみを上げれば定着する','やりがい・職場環境・評価制度・教育研修・福利厚生などの複合的な施策','長時間労働を課す','休日を減らす'],answer:1,explanation:'人材定着のためには①給与・賞与②やりがい・使命感③職場環境・コミュニケーション④適切な評価制度⑤教育研修・キャリアパス⑥休日・休暇・福利厚生の複合的な施策が必要です。'},
{chapter:8, type:'4',text:'「葬儀業の「地域シェア（市場占有率）」を高めるための施策として正しいものはどれか。',choices:['他社を批判する広告を出す','地域密着の認知度向上・信頼構築（終活セミナー・地域イベント参加・口コミ獲得）','全国一律のサービスに統一する','価格を業界最低価格にする'],answer:1,explanation:'地域シェア向上策として①終活セミナー・地域イベントでの認知度向上②既存顧客からの口コミ・紹介獲得③医療・介護施設との連携④アフターフォローによるリピート・紹介獲得などが有効です。'},
{chapter:8, type:'4',text:'「「葬儀価格比較サイト」の普及が葬儀業界に与えた影響として正しいものはどれか。',choices:['価格が上昇した','価格の透明化・競争激化・消費者の価格意識向上が進んだ','葬儀社の数が増えた','葬儀の品質が向上した'],answer:1,explanation:'葬儀価格比較サイト（いい葬儀・葬儀社比較.comなど）の普及により①価格の透明化・見えやすさが向上②消費者の価格比較が容易になり競争が激化③葬儀社は価格だけでなくサービス品質・口コミ評価での差別化が重要になりました。'},
{chapter:8, type:'4',text:'「葬儀業の「新規顧客獲得コスト（CAC）」を下げるために有効な方法はどれか。',choices:['高額な広告費を使う','口コミ・紹介・リピート（家族の再依頼）の強化と既存顧客との関係維持','新規顧客を無視する','価格を大幅に下げる'],answer:1,explanation:'新規顧客獲得コスト（CAC）を下げるには、広告費に依存せず①既存顧客からの口コミ・紹介獲得②施行後アフターフォローによる次回依頼の確保③終活セミナー参加者からの転換などが費用対効果の高い方法です。'},
{chapter:8, type:'4',text:'「「エンディングノート」を葬儀社が配布する主な目的はどれか。',choices:['遺言書の代わりとして法的効力を持たせるため','潜在顧客（終活中の方・その家族）への接点作り・認知度向上・将来の依頼につなげるため','市役所への届出書類として使うため','宗教団体への入会を勧めるため'],answer:1,explanation:'エンディングノートを配布する目的は①終活に関心のある潜在顧客への接点作り②自社の認知度・信頼感の向上③将来の葬儀依頼の際に「あの会社から配られたノートがある」として想起される、というマーケティング効果です。法的効力はありません。'},
{chapter:8, type:'4',text:'「葬儀業の「競合分析（きょうごうぶんせき）」で把握すべき情報として正しいものはどれか。',choices:['競合の社長の趣味','競合他社の料金・エリア・規模・強み・弱み・口コミ評価','競合社員の個人情報','競合の色使い'],answer:1,explanation:'競合分析では①価格帯・プランの内容②営業エリア・施設数③強み（対応の早さ・施設の豪華さ）と弱み④口コミ・評判⑤集客方法などを調査・比較して自社の差別化戦略に活かします。'},
{chapter:8, type:'4',text:'「葬儀業の「SWOT分析（スウォット分析）」の要素として正しい組み合わせはどれか。',choices:['S（Sales）・W（Win）・O（Order）・T（Team）','S（Strengths強み）・W（Weaknesses弱み）・O（Opportunities機会）・T（Threats脅威）','S（Service）・W（Work）・O（Output）・T（Target）','S（Speed）・W（Weight）・O（Offer）・T（Time）'],answer:1,explanation:'SWOT分析とはS（Strengths：強み）・W（Weaknesses：弱み）・O（Opportunities：機会）・T（Threats：脅威）を分析して戦略立案に活用するフレームワークです。経営戦略の基本的なツールとして葬儀業でも活用されます。'},
{chapter:8, type:'4',text:'「葬儀業の「サービスの標準化（ひょうじゅんか）」と「個別対応（こべつたいおう）」のバランスについて正しいものはどれか。',choices:['完全に標準化すれば良い','基本的な業務の標準化（品質の均一化）と遺族の個別事情への柔軟な対応の両立が重要','個別対応だけで良い','どちらも不要'],answer:1,explanation:'葬儀業では①業務の標準化（手順・品質・接遇の均一化でミスを減らす）②個別対応（遺族の事情・希望・宗教・予算に合わせた柔軟な対応）の両立が重要です。画一的すぎても個別すぎても品質管理が難しくなります。'},
{chapter:8, type:'4',text:'「葬儀業の「労働時間管理」における課題として正しいものはどれか。',choices:['残業はいくらでもしてよい','不定時・深夜・緊急対応が多く、労働基準法の遵守・スタッフの健康管理・適切な残業管理が課題','スタッフは24時間いつでも呼び出してよい','有給休暇は不要'],answer:1,explanation:'葬儀業は臨終・搬送・通夜・葬儀など不定時・深夜対応が多く、スタッフの労働時間管理が複雑です。労働基準法（時間外労働の上限・休日・割増賃金）を遵守しながら、スタッフの健康・ワークライフバランスを守ることが重要な経営課題です。'},
{chapter:8, type:'4',text:'「葬儀業における「在庫管理（ざいこかんり）」の特徴として正しいものはどれか。',choices:['在庫は不要','棺・骨壺・副葬品・返礼品・生花など使用タイミングが読めない中で適切な在庫を維持する必要がある','在庫はいくらでも持ってよい','在庫管理は葬儀業に関係ない'],answer:1,explanation:'葬儀業では①棺・骨壺・返礼品・葬具など在庫管理が必要な商材がある②死亡は突発的で需要予測が難しい③季節変動がある、という特徴があります。欠品はサービス不可能に直結するため適切な在庫維持が重要です。'},
{chapter:8, type:'4',text:'「葬儀業の「DX（デジタルトランスフォーメーション）」として進んでいるものはどれか。',choices:['すべての葬儀をオンラインのみで行う','オンライン葬儀（リモート参列）・デジタル訃報連絡・電子契約・電子香典・SNS活用など','紙の書類をなくす','葬儀をロボットが行う'],answer:1,explanation:'葬儀業のDXとして①コロナ禍で広まったオンライン葬儀（Zoom等でのリモート参列）②電子訃報連絡③オンライン見積もり・電子契約④デジタル香典（LINE Pay等）⑤SNS活用⑥業務管理システムのデジタル化などが進んでいます。'},
{chapter:8, type:'4',text:'「オンライン葬儀・リモート参列」が普及した主なきっかけはどれか。',choices:['インターネットの普及のみ','新型コロナウイルスによる感染拡大で対面での参列が困難になったこと','法律で義務化されたため','葬儀社の要望'],answer:1,explanation:'オンライン葬儀・リモート参列は2020年の新型コロナウイルス感染拡大（緊急事態宣言・感染リスクへの配慮）により急速に普及しました。遠方の参列者・高齢で移動困難な参列者なども参列できる利点から現在も続いています。'},
{chapter:8, type:'4',text:'「「SDGs（持続可能な開発目標）」と葬儀業の関連について正しいものはどれか。',choices:['葬儀業にはSDGsは関係ない','エコ葬儀（環境負荷低減・段ボール棺・樹木葬など）や地域社会への貢献活動がSDGsと関連する','SDGsは国際機関のみが対応するもの','SDGsのゴールは葬儀業には含まれない'],answer:1,explanation:'葬儀業とSDGsの関連として①エコ葬儀（段ボール棺・生花の堆肥化・燃料消費低減）②樹木葬・自然葬による環境への配慮③地域コミュニティへの貢献（高齢者支援・孤立防止）などがSDGsの目標と関連します。'},
{chapter:8, type:'4',text:'「葬儀業の「ブランディング（Branding）」の目的として正しいものはどれか。',choices:['有名芸能人を広告に起用すること','自社の理念・強み・提供価値を明確にして消費者に「この会社に頼みたい」と感じてもらうこと','ロゴを作ること','制服のデザインを変えること'],answer:1,explanation:'ブランディングとは「この会社に頼みたい・信頼できる」という感情・イメージを消費者に持ってもらうことで、①理念・ビジョンの明確化②一貫したサービス品質③口コミ・評判の積み上げ④広告・発信などを通じて形成されます。'},
{chapter:8, type:'4',text:'「葬儀業の「社員研修」の内容として網羅すべきものはどれか。',choices:['料理の作り方のみ','葬儀の専門知識（宗旨宗派・法律・衛生）・接遇・グリーフケア・業務別の実技・安全管理など幅広い内容','会社の沿革のみ','株式投資の方法'],answer:1,explanation:'葬儀業スタッフの研修内容は①葬儀専門知識（宗教・宗派・法律・衛生保全）②接遇マナー（言葉遣い・立ち居振る舞い）③グリーフケアの基礎④実技（搬送・納棺・司会・受付）⑤安全衛生管理（感染防止・腰痛対策）⑥コンプライアンスなど多岐にわたります。'},
{chapter:8, type:'4',text:'「葬儀業の「コンプライアンス（法令遵守）」として特に重要なものはどれか。',choices:['税法のみ遵守すればよい','墓地埋葬法・個人情報保護法・労働基準法・消費者契約法・景品表示法など多岐にわたる法令を遵守する','上司の指示に従えばよい','業界ルールのみ守ればよい'],answer:1,explanation:'葬儀業に関わるコンプライアンスは多岐にわたります。①墓地埋葬法②個人情報保護法③労働基準法④消費者契約法⑤景品表示法⑥特定商取引法⑦割賦販売法（互助会）などを理解・遵守することが経営リスク回避の基本です。'},
{chapter:8, type:'4',text:'「葬儀業の「CS（顧客満足度）向上策」として最も効果的なものはどれか。',choices:['価格を最も安くすること','一貫した高品質なサービス・丁寧な接遇・迅速な対応・アフターフォローの継続的提供','豪華な式場を建てること','有名人に依頼すること'],answer:1,explanation:'CS（顧客満足度）向上に最も寄与するのは①常に安定した高品質なサービス②誠実・丁寧・迅速な遺族対応③葬儀後のアフターフォロー④スタッフの接遇力向上⑤遺族の期待を上回る「感動体験」の提供などです。'},
{chapter:8, type:'4',text:'「葬儀業における「危機管理（クライシスマネジメント）」として重要なものはどれか。',choices:['危機は起きないと考える','火災・感染症・スタッフの急病・設備故障など想定されるリスクへの事前対策と発生時の対応手順の整備','危機は全部保険でカバーする','社長が独断で対応する'],answer:1,explanation:'葬儀業の危機管理として想定すべきリスクは①火災・自然災害②感染症（スタッフ・遺族）③設備故障（霊柩車故障・式場設備）④スタッフの急病⑤誤搬送・事故⑥情報漏洩などです。事前対策・マニュアル整備・訓練が重要です。'},
{chapter:8, type:'4',text:'「葬儀業の「財務指標」として重要なものとして誤っているものはどれか。',choices:['1件当たり売上高（客単価）','件数（施行件数）','原価率・粗利率','社長の年齢'],answer:3,explanation:'葬儀業の主要な財務・経営指標は①施行件数②1件当たり売上高（客単価）③売上高総利益率（粗利率）④営業利益率⑤稼働率⑥顧客満足度⑦クレーム件数などです。社長の年齢は財務指標ではありません。'},
{chapter:8, type:'4',text:'「「海洋散骨（かいようさんこつ）」サービスを提供する葬儀社が増えている理由として正しいものはどれか。',choices:['法律で義務化されたため','墓を持たない・後継者がいない・自然に還りたいという需要の増加と、それに対応したビジネス機会として','海洋散骨が最も安価なため','宗教的に義務とされているため'],answer:1,explanation:'海洋散骨は①墓を持たない（買えない・後継者がいない）②自然に還りたいという故人・遺族の希望③費用が墓に比べてかかりにくいなどの需要から増加し、葬儀社・専門業者がサービスを提供するビジネス機会になっています。'},
{chapter:8, type:'4',text:'「「宇宙葬（うちゅうそう）」のビジネスを提供している企業について正しいものはどれか。',choices:['日本の公営事業として提供されている','海外の民間宇宙企業（Celestis社など）や国内の関連業者が商業サービスとして提供している','法律で禁止されている','宇宙葬は実在しない'],answer:1,explanation:'宇宙葬は米国のCelestis社が商業サービスとして先駆けて提供しており、その後複数の企業が参入しています。日本でも代理店や関連業者を通じて申し込めます。公営サービスではなく民間商業サービスです。'},
{chapter:8, type:'4',text:'「「ペット葬儀（ペットそうぎ）」の市場について正しいものはどれか。',choices:['ペット葬儀に対する需要はほとんどない','ペットを家族の一員とみなす人が増え、ペット葬儀・ペット霊園のサービス需要が拡大している','ペット葬儀は法律で禁止されている','ペットは通常の葬儀場で人間と同じ方法で葬儀できる'],answer:1,explanation:'ペットを家族の一員として大切にする意識の高まりから、ペット葬儀・ペット火葬・ペット霊園・ペット納骨サービスの需要が拡大しています。葬儀業者がペット葬儀部門を設けるケースも増えています。'},
{chapter:8, type:'4',text:'「「終活（しゅうかつ）」に関心を持つ層として主に対象となるのはどれか。',choices:['10〜20代の若者','40〜80代（特に60代以上）とその家族','葬儀業関係者のみ','全国民が義務として行うもの'],answer:1,explanation:'終活に関心を持つ主な層は40〜80代（特に60〜70代以上）の高齢者と、その家族です。「万が一の時に備えたい・家族に迷惑をかけたくない・自分の最期を自分で決めたい」というニーズが中心です。'},
{chapter:8, type:'4',text:'「葬儀業の「経営ビジョン（けいえいビジョン）」を持つことの重要性はどれか。',choices:['経営ビジョンは不要','スタッフの行動指針・採用基準・サービスの方向性を示し、組織の一体感・モチベーション向上につながる','ビジョンは大企業にのみ必要','ビジョンは銀行に提出するためだけに作る'],answer:1,explanation:'経営ビジョン（「こうありたい・こういう会社にしたい」という将来像）は①スタッフが何を目指すかの指針②採用・評価基準③サービスの方向性④取引先・地域への信頼提示として機能し、組織の一体感と長期的な成長に貢献します。'},
{chapter:8, type:'4',text:'「葬儀業の「IT活用（アイティかつよう）」として進んでいるものはどれか。',choices:['ITは葬儀業に関係ない','電子施行管理システム・デジタル見積もり・オンライン相談・SNS集客・顧客データ管理など','全業務をAIに任せる','スマートフォンの使用を禁止する'],answer:1,explanation:'葬儀業のIT活用として①電子施行管理（スケジュール・担当者・費用の管理システム）②デジタル見積もり③オンライン相談・事前相談④SNS・ウェブによる集客⑤顧客データベース管理⑥デジタル訃報連絡などが進んでいます。'},
{chapter:8, type:'4',text:'「葬儀業の「アフターフォロー」として顧客に提供できるサービスはどれか。',choices:['遺族の代わりに全財産を管理すること','遺族への挨拶状・法要のご案内・グリーフケア情報の提供・年忌法要の案内など','遺産相続の一切を代行すること','他社への紹介'],answer:1,explanation:'葬儀業のアフターフォローとして提供できるサービスは①施行後の感謝状・挨拶状②一周忌などの法要のお知らせ・案内③グリーフケア情報・相談窓口の案内④終活セミナーへの招待⑤お盆・彼岸のご挨拶などです。'},
{chapter:8, type:'4',text:'「葬儀業における「感染症対策」として重要なものはどれか。',choices:['感染症対策は不要','手洗い・マスク着用・手指消毒・換気・遺体取り扱い時の防護具着用・スタッフの健康管理','感染した遺体は断る','感染症は葬儀業に関係ない'],answer:1,explanation:'葬儀業の感染症対策は①スタッフの手洗い・マスク・消毒②式場の換気・消毒③感染症で亡くなった遺体取り扱い時の防護具（手袋・マスク・ゴーグル・防護服）④スタッフの体調管理⑤BCPに基づく感染拡大時の対応計画などが重要です。'},
{chapter:8, type:'4',text:'「葬儀業の「専門職（資格）」として正しいものはどれか。',choices:['弁護士・公認会計士','葬祭ディレクター（技能審査資格）・エンバーマー（IFSA認定）・グリーフケアアドバイザーなど','医師・看護師','税理士・司法書士'],answer:1,explanation:'葬儀業固有の専門資格として①葬祭ディレクター（厚生労働省認定技能審査・1級・2級）②エンバーマー（IFSA認定）③納棺師（民間認定）④グリーフケアアドバイザー（民間資格）⑤フューネラルアドバイザー（民間資格）などがあります。'},
{chapter:8, type:'4',text:'「葬儀業に関連する「異業種連携（いぎょうしゅれんけい）」として有効なものはどれか。',choices:['スポーツチームとの連携のみ','医療機関・介護施設・法律事務所・不動産業者・行政書士・寺院・花店などとの連携','競合他社との連携','海外企業のみとの連携'],answer:1,explanation:'葬儀業の異業種連携として①医療機関・介護施設（紹介関係）②法律事務所・行政書士（相続・遺言）③不動産業者（空き家・実家整理）④花店（供花・祭壇）⑤石材店（墓石・納骨）⑥寺院・神社・教会（宗教儀礼）などとの連携が有効です。'},
{chapter:8, type:'4',text:'「葬儀業の「CSR（企業の社会的責任）」として実践できることはどれか。',choices:['利益を追求するだけ','地域の高齢者支援・終活相談・環境への配慮（エコ葬儀）・従業員の働き方改善など','CSRは大企業だけ','法律さえ守ればCSRは不要'],answer:1,explanation:'葬儀業のCSRとして①地域の高齢者支援（孤立死対策・見守り）②終活セミナー・相談窓口の提供③環境配慮（エコ葬儀・廃棄物削減）④従業員の働き方改善・教育⑤地域清掃・地域活動参加などが実践できます。'}
,

// --- 仏教各宗派・深掘り ---
{ chapter:8, type:'ox', text:'「禅（ぜん）」とはサンスクリット語の「ディヤーナ（瞑想）」に由来する言葉である。', answer:true, explanation:'「禅」は梵語（サンスクリット語）の「ディヤーナ（dhyāna）」が中国語で「禅那（ぜんな）」と音写され、「禅」と略されたものです。「瞑想・禅定」という意味で、坐禅（坐った瞑想）の実践を通じて悟りを目指す修行法を指します。' },
{ chapter:8, type:'ox', text:'「臨済宗妙心寺派」は日本最大の臨済宗の派で、全国に約3500か寺の末寺を持つ。', answer:true, explanation:'臨済宗は現在14の派に分かれており、その中で最大勢力を持つのが妙心寺派（総本山：妙心寺、京都市右京区）です。臨済宗は室町幕府の保護を受け、五山制度のもとで文化的にも大きな役割を果たしました。' },
{ chapter:8, type:'ox', text:'「道元」は永平寺を開いた後、一度も比叡山に戻ることなく越前（福井県）で一生を終えた。', answer:false, explanation:'道元は永平寺開山後、1247年に鎌倉幕府の執権・北条時頼に招かれて鎌倉に下向しましたが、約半年で帰山しました。また1253年に病を得て京都に上り、在京中に53歳で入寂（死去）しました。' },
{ chapter:8, type:'ox', text:'「法然」の弟子である「親鸞」は、師の教えをより徹底させ「他力本願」の思想を発展させた。', answer:true, explanation:'法然が「専修念仏」（ひたすら念仏を称えること）を説いたのに対し、親鸞はさらにそれを深め、自己の力（自力）を完全に捨て阿弥陀仏の働き（他力）にすべてを委ねる「絶対他力」の思想を確立しました。主著は「教行信証」です。' },
{ chapter:8, type:'ox', text:'浄土真宗の「歎異抄（たんにしょう）」は親鸞自身が書いた著作である。', answer:false, explanation:'歎異抄は親鸞の弟子・唯円（ゆいえん）が書いたとされる書物で、師・親鸞の言葉を記録しその教えの歪みを嘆いた内容です。「善人なほもて往生をとぐ、いはんや悪人をや」という言葉（悪人正機）が有名で、親鸞の著作ではありません。' },
{ chapter:8, type:'ox', text:'「日蓮宗」では、日蓮の遺骨が納められた身延山が聖地とされ、多くの信者が参詣に訪れる。', answer:true, explanation:'日蓮上人は身延山（山梨県）で晩年の約9年を過ごし、1282年に入滅しました。身延山久遠寺には日蓮の御廟所（お墓）があり、日蓮宗の総本山として多くの参詣者が訪れます。「身延詣り」は日蓮宗信者の重要な巡礼です。' },
{ chapter:8, type:'ox', text:'「真言宗」の「真言（マントラ）」は、意味を理解して唱えることが重要とされる。', answer:false, explanation:'真言（マントラ）は密教において「秘密の言葉」とされ、意味を論理的に理解して唱えることより、音（声）そのものに神聖な力があると考えられています。梵語のまま唱えることが重視され、翻訳しないことが原則です。' },
{ chapter:8, type:'ox', text:'「四弘誓願（しぐせいがん）」は、菩薩（悟りを求める者）が立てる四つの誓いで、多くの宗派の葬儀でも唱えられる。', answer:true, explanation:'四弘誓願とは①衆生無辺誓願度（すべての衆生を救う）②煩悩無尽誓願断（すべての煩悩を断つ）③法門無量誓願学（すべての法門を学ぶ）④仏道無上誓願成（最高の仏道を成就する）の四つです。多くの宗派の法要で唱えられます。' },
{ chapter:8, type:'ox', text:'「浄土宗」の増上寺（東京）は、徳川将軍家の菩提寺として知られる。', answer:true, explanation:'増上寺（東京都港区）は浄土宗の大本山で、徳川家康が江戸入府後に菩提寺と定めました。2代秀忠・6代家宣・7代家継・9代家重・12代家慶・14代家茂の将軍とその家族が埋葬されています。' },
{ chapter:8, type:'ox', text:'「臨済宗」の「公案（こうあん）」は、論理的な思考で解くことができる哲学的な問いかけである。', answer:false, explanation:'公案は「隻手の声を聞け」「父母未生以前の本来の面目とは何か」など、論理的・概念的思考では解けない問いです。これに取り組むことで思考の限界を超え、直接的な悟りの体験（見性）を目指すのが臨済宗の修行法です。' },

// --- 神式深掘り ---
