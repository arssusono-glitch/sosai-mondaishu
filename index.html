{chapter:2, type:'4', source:'past', text:'仏教における「中陰（ちゅういん）」の説明として最も適切なものはどれか。', choices:['納骨を終えてから一周忌までの期間のこと','百か日から一周忌までの期間のこと','死後四十九日間をいい、七日ごとに故人が審判を受けるとされる期間のこと','通夜から初七日までの期間のこと 葬祭ディレクター技能審査 完全対策問題集 第4 章：神道・キリスト教・無宗教の葬儀 （50問）'], answer:2, explanation:'中陰（中有）は、死から次の生を受けるまでの間とされる四十九日間をいう。この間、七日ごとに王の審判を受けると されることから、遺族は初七日から七七日（四十九日）まで七日ごとに追善供養を行う習わしが生まれた。四十九日目 は満中陰と呼ばれ、忌明けとされる。なお浄土真宗では、往生即成仏の教えから、中陰の法要は追善のためではなく、 仏徳讃嘆と報恩の場と位置付けられている。 葬祭ディレクター技能審査 完全対策問題集 第4章：神道・キリスト 教・無宗教の葬儀'},
{chapter:2, type:'4', source:'past', text:'神葬祭が一般に神社の社殿内では行われない理由として、最も適切なものはどれか。', choices:['神道では死を穢れととらえるため、神聖な場である神社に穢れを持ち込むことを避けるから。','神社は氏子の参拝のための施設であり、建物が狭く参列者を収容できないから。','法令により、神社の境内で葬儀を執り行うことが禁止されているから。','神葬祭は必ず夜間に行う決まりがあり、神社の開門時間に合わないから。'], answer:0, explanation:'神道では死は穢れ（けがれ）とされ、神聖な場所である神社に持ち込むことを避ける考え方がある。このため神葬祭は 神社の社殿では行わず、故人の自宅や斎場などで執り行うのが一般的である。これは故人や遺族を忌み嫌う意味ではな く、聖域を清浄に保つための伝統的な観念に基づくものである。法令による禁止や時間の制約によるものではなく、葬 祭ディレクターは会場選定の背景となる考え方として理解しておく必要がある。'},
{chapter:2, type:'4', source:'past', text:'神道における死後の御霊（みたま）のとらえ方として、最も適切なものはどれか。', choices:['御霊は四十九日の審判を経て極楽浄土へ往生すると考えられている。','御霊は祖霊となって家にとどまり、子孫を見守る守護神になると考えられている。','御霊は天国に召され、永遠の命を与えられると考えられている。','御霊は輪廻転生を繰り返し、別の生命に生まれ変わると考えられている。'], answer:1, explanation:'神道には祖先の御霊が家や子孫を見守るという祖霊信仰があり、故人の御霊は五十日祭などの霊祭を経て祖霊に合わせ 祀られ、家の守護神になると考えられている。極楽浄土への往生や輪廻転生の考え方は仏教の死生観であり、天国で永 遠の命を与えられるという考え方はキリスト教の死生観である。神葬祭はこの祖霊信仰に基づいて営まれるため、他宗 教との死生観の違いを正しく理解しておくことが学科試験でも実務でも重要である。'},
{chapter:2, type:'4', source:'past', text:'神葬祭における「帰幽奉告（きゆうほうこく）」の説明として、最も適切なものはどれか。', choices:['火葬が無事に終わったことを斎場で神職に報告することである。','忌明けに親族が集まり、墓前で納骨の終了を奉告することである。','人が亡くなったことを神棚や祖霊舎に奉告することである。','喪主が氏神神社に出向き、葬儀の日程を届け出ることである。'], answer:2, explanation:'神道では死去することを「帰幽」といい、家族が亡くなった際には神棚や祖霊舎（それいしゃ）に死去の旨を奉告す る。これを帰幽奉告といい、神葬祭の一連の流れの最初に行われる。奉告の後には、死の穢れが及ばないように神棚の 扉を閉じて白紙を貼る神棚封じが行われる。帰幽は神道で死を表す重要な用語であり、火葬や納骨の報告、神社への日 程の届け出を指すものではないため、意味を正確に覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'神葬祭に関連して行われる「神棚封じ」の説明として、最も適切なものはどれか。', choices:['葬儀で家を留守にする間、盗難防止のため神棚の扉に鍵をかけることである。','神棚の御神札を取り出して、葬儀の祭壇に移して祀ることである。','祖霊舎を新しい白木のものに取り替えて、しめ縄を張ることである。','死の穢れが及ばないよう神棚の扉を閉じて白紙を貼り、忌明けまで祀りを控えることである。'], answer:3, explanation:'神棚封じは、家族の死去に際して死の穢れが神棚に及ばないようにするための習俗で、神棚の扉を閉じて白い紙を貼り、 忌明けである五十日祭のころまで日々のお祀りを中断するものである。期間中は礼拝やお供えも控えるのが一般的とさ れる。神棚封じは帰幽奉告の後に行われ、忌明けに白紙を取り除いて平常のお祀りに戻す。御神札を祭壇に移したり祖霊 舎を取り替えたりするものではなく、神道の穢れの観念を示す習俗として理解しておく。'},
{chapter:2, type:'4', source:'past', text:'神葬祭における「枕直しの儀」の説明として、最も適切なものはどれか。', choices:['遺体を棺に納め、蓋を閉じて白布で覆う儀式である。','遺体を北枕などに安置し、守り刀を置いて枕飾りを整える儀式である。','故人の御霊を霊璽に遷すため、部屋を暗くして行う儀式である。','火葬を終えて自宅に戻り、葬儀の終了を奉告する儀式である。'], answer:1, explanation:'枕直しの儀は神葬祭において遺体を安置する際の儀式で、遺体を北枕などに寝かせて顔に白布を掛け、守り刀を置き、枕 元に枕飾りを整えるものである。仏式の枕飾りに相当するが、米・塩・水などの神饌を供える点に神道の特徴がある。 遺体を棺に納めるのは納棺の儀、御霊を霊璽に遷すのは遷霊祭、帰宅後に終了を奉告するのは帰家祭であり、それぞれ 別の儀式であるから、名称と内容を混同しないように注意が必要である。'},
{chapter:2, type:'4', source:'past', text:'神葬祭における「遷霊祭（せんれいさい）」の説明として、最も適切なものはどれか。', choices:['故人の御霊を霊璽に遷し留める儀式で、御霊移しとも呼ばれる。','故人の御霊を氏神神社の本殿に合祀する儀式である。','遺骨を墓所に埋葬して、御霊の安住を祈る儀式である。','新調した祖霊舎に先祖代々の御霊代を移す儀式である。'], answer:0, explanation:'遷霊祭は故人の御霊を霊璽（れいじ）に遷し留める神葬祭の重要な儀式で、御霊移しとも呼ばれる。一般に通夜祭に引 き続いて行われ、部屋の明かりを消して暗くした中で斎主が遷霊詞を奏上して執り行う。御霊が遷された霊璽は、以 後、故人の御霊の依り代として祀られる。氏神神社への合祀や遺骨の埋葬を指すものではない。通夜祭と遷霊祭を併せ て行う形が現在は広く見られ、神葬祭の流れの中でも特に重要な儀式とされている。'},
{chapter:2, type:'4', source:'past', text:'神道の「霊璽（れいじ）」と仏式の用具との対応として、最も適切なものはどれか。', choices:['仏式の数珠にあたり、参列者が手に掛けて拝礼に用いる。','仏式の本尊にあたり、神社から授与されて祭壇の中央に祀る。','仏式の位牌にあたり、故人の御霊の依り代として祀られる。','仏式の骨壺にあたり、遺骨を納めて祖霊舎に安置する。'], answer:2, explanation:'霊璽は故人の御霊の依り代となるもので、仏式の位牌にあたるとされる。遷霊祭で御霊が遷された後は、忌明けを経て 祖霊舎（それいしゃ）に納め、家庭で祀られる。白木で作られ、表に故人の霊号を記すのが一般的である。遺骨を納め る容器ではなく、神社から授与される御神札とも異なる。霊璽と位牌、祖霊舎と仏壇といった神式と仏式の用具の対応 関係は学科試験で問われやすいため、正確に整理して覚えておく必要がある。'},
{chapter:2, type:'4', source:'past', text:'神葬祭における「葬場祭（そうじょうさい）」の説明として、最も適切なものはどれか。', choices:['火葬場で火葬の前に行われる、故人との最後の別れの儀式である。','葬儀の前夜に行われる、仏式の通夜にあたる儀式である。','自宅に戻って葬儀が無事終了したことを奉告する儀式である。','仏式の葬儀・告別式にあたる、神葬祭の中心となる儀式である。'], answer:3, explanation:'葬場祭は神葬祭の中心となる儀式で、仏式の葬儀・告別式に相当する。斎主による祭詞奏上、弔辞・弔電の奉読、遺 族・参列者による玉串奉奠などが行われ、故人との別れの場となる。火葬場で行われるのは火葬祭、前夜に行われるの は通夜祭、帰宅後に終了を奉告するのは帰家祭であり、それぞれ役割が異なる。神葬祭を構成する各儀式の名称と位置 づけは出題されやすいので、一連の流れの中で正確に理解しておくことが大切である。'},
{chapter:2, type:'4', source:'past', text:'神道において一般に忌明けの節目とされる霊祭はどれか。', choices:['五十日祭','十日祭','一年祭','百日祭'], answer:0, explanation:'神道では死後十日ごとに十日祭、二十日祭などの霊祭を行い、五十日祭をもって忌明けとするのが一般的である。五十 日祭は仏式の四十九日法要に相当する重要な節目で、このころに神棚封じの白紙を取り除いて平常の祀りに戻る。また 忌明け後に霊璽を祖霊舎に納めて祖霊として祀る合祀祭を行うことも多い。百日祭や一年祭はその後に営まれる霊祭で あり、忌明けの節目となる霊祭とは異なるため、時期の違いを混同しないよう注意したい。'},
{chapter:2, type:'4', source:'past', text:'玉串奉奠において、玉串を案（台）の上に置く際の作法として最も適切なものはどれか。', choices:['葉先が祭壇側、根元が自分側に向くようにして置く。','受け取ったままの向きを変えず、横向きのまま静かに置く。','時計回りに回して、根元が祭壇側に向くようにして置く。','反時計回りに回して、葉先が祭壇側に向くようにして置く。'], answer:2, explanation:'玉串奉奠では、神職や係から玉串を受け取って案の前に進み、祈念を込めたのち玉串を時計回り（右回り）に回し、根 元を祭壇（神前）に向けて案の上に捧げ置くのが基本の作法である。受け取った向きのまま置いたり、葉先を神前に向 けたりするのは誤りとされる。置いた後は二礼二拍手一礼で拝礼するが、拍手は音を立てない忍び手で行う。玉串奉奠は 神葬祭における参列者の中心的な拝礼作法であり、正確に案内できるよう習熟しておきたい。'},
{chapter:2, type:'4', source:'past', text:'神葬祭における拝礼の作法として、最も適切なものはどれか。', choices:['二礼二拍手一礼で拝礼し、拍手は通常の参拝と同様に音を立てて打つ。','二礼二拍手一礼で拝礼するが、拍手は音を立てない忍び手で行う。','拍手は一切行わず、深い一礼のみを繰り返して拝礼する。','数珠を手に掛けて合掌し、黙とうして拝礼する。'], answer:1, explanation:'神葬祭での拝礼は二礼二拍手一礼が基本であるが、拍手は音を立てずに打つ忍び手（しのびて）で行うのが作法とされ る。忍び手は両手を打ち合わせる直前で止めるように音を立てずに打つもので、慶事の柏手と区別し、悲しみ慎む心を 表すとされる。通常の神社参拝のように音を立てて打つことは葬儀の場ではふさわしくない。また数珠や合掌は仏式の 作法であり神葬祭では用いない。神式特有の拝礼作法として確実に覚えておく必要がある。'},
{chapter:2, type:'4', source:'past', text:'玉串奉奠で玉串を受け取る際の持ち方として、最も適切なものはどれか。', choices:['両手のひらを上に向けて差し出し、玉串を水平に載せてもらう。','左手で根元を上から持ち、右手で葉先を下から支えるように受け取る。','右手だけで根元を握り、左手は体の脇に付けたまま受け取る。','右手で根元を上から持ち、左手で葉先を下から支えるように受け取る。'], answer:3, explanation:'玉串を受け取る際は、右手で根元（茎側）を上からつまむように持ち、左手で葉先の下を支えるように受け取るのが基 本の作法である。このとき根元が右、葉先が左になる形で胸の高さに捧げ持ち、玉串案の前へ進む。左右の手が逆に なったり、片手で受け取ったりするのは作法として誤りである。受け取りから回し方、置き方、忍び手による拝礼まで の一連の流れは、葬祭ディレクターが会葬者に説明できなければならない基本知識である。'},
{chapter:2, type:'4', source:'past', text:'神葬祭を主宰する神職の呼称として、最も適切なものはどれか。', choices:['導師','司祭','斎主','斎員'], answer:2, explanation:'神葬祭を主宰する神職は斎主（さいしゅ）と呼ばれ、斎主を補佐する神職は斎員（さいいん）と呼ばれる。導師は仏式 の葬儀で儀式を主宰する僧侶の呼称であり、司祭はカトリックの聖職者の職名で神父と敬称される。宗教ごとに儀式を 主宰する者の呼称は異なっており、仏式は導師、神式は斎主、カトリックは神父（司祭）、プロテスタントは牧師と整 理できる。学科試験でも実務の打合せでも必要となる基本用語として確実に覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'神葬祭に関連する「直会（なおらい）」の説明として、最も適切なものはどれか。', choices:['神事の後に、神饌のお下がりなどを参列者でいただく会食のことである。','遷霊祭の前に、遺族が身を清めるために行う沐浴のことである。','祭詞奏上に先立って、参列者の罪穢れを祓う儀式のことである。','霊璽を祖霊舎に納める際に行う奉告の儀式のことである。'], answer:0, explanation:'直会は神事の終了後、神前に供えた神饌や御神酒のお下がりを参列者でいただく会食のことで、神葬祭においては仏式 の精進落としにあたるものとされる。神に供えたものを共にいただくことで、神と人との結びつきを深める意味がある とされる。身を清める沐浴や、祓いの儀式、霊璽を納める奉告の儀式を指す言葉ではない。直会と精進落としのよう に、神式と仏式で対応する事柄の用語の違いを整理して覚えておくことが大切である。'},
{chapter:2, type:'4', source:'past', text:'神道における故人の名前の扱いとして、最も適切なものはどれか。', choices:['僧侶から戒名を授かり、霊璽の表面に記す。','洗礼名を用いて、教会の記録簿に登録する。','生前の名前は忌み名となるため、以後一切用いない。','戒名にあたるものはなく、生前の名前に「命（みこと）」などを付した霊号を用いる。'], answer:3, explanation:'神道には仏式の戒名にあたるものはなく、生前の名前に「大人命（うしのみこと）」「刀自命（とじのみこと）」など の尊称を付した諡（おくりな）・霊号を用い、霊璽などに記す。戒名は仏弟子となった証として授けられる仏教のもので あり、洗礼名はキリスト教で用いられるものである。神道では生前の名前がそのまま霊号の基になる点が特徴である。 宗教による故人の呼び名の違いは、学科試験でも実務の場でも問われる基本知識である。'},
{chapter:2, type:'4', source:'past', text:'神葬祭に参列する際に持参する不祝儀袋の表書きとして、最も適切なものはどれか。', choices:['御仏前','御玉串料','御花料','御布施'], answer:1, explanation:'神葬祭の不祝儀袋の表書きには「御玉串料」「御榊料」「御神前」などが用いられる。御仏前は仏式で主に忌明け後に 用いる表書き、御花料はキリスト教式で用いる表書き、御布施は仏式で僧侶への謝礼に用いるものであり、いずれも神葬 祭の会葬者の表書きとしてはふさわしくない。なお「御霊前」は神式の葬儀でも用いられるとされる。宗教別の表書き の使い分けは会葬者から最も尋ねられやすい事項の一つであり、正確な知識が求められる。'},
{chapter:2, type:'4', source:'past', text:'神葬祭の場で遺族に弔意を述べる際、避けるべきとされる言葉はどれか。', choices:['御霊の平安をお祈りいたします','御冥福をお祈りいたします','心から哀悼の意を表します','お力落としのございませんように'], answer:1, explanation:'「冥福」は死後に赴く冥土での幸福を祈るという仏教に基づく言葉であり、成仏や供養などと同様に神道の死生観には そぐわないため、神葬祭の場では避けるべきとされる。神式では「御霊の平安をお祈りします」などの表現が適切であ る。哀悼の意を表す言葉や遺族をいたわる言葉は宗教を問わず用いることができる。宗教によって避けるべき言葉は異 なるため、会葬者への案内や弔電・挨拶文の作成においても正しく使い分ける必要がある。'},
{chapter:2, type:'4', source:'past', text:'神葬祭の玉串に用いられる植物として、最も適切なものはどれか。', choices:['樒（しきみ）','杉','榊（さかき）','柳'], answer:2, explanation:'玉串は榊の枝に紙垂（しで）を付けたもので、神前に捧げて拝礼するために用いられる。榊は常緑樹で神聖な木とさ れ、玉串のほか祭壇の飾りなど神事全般に広く用いられる。一方、樒は仏式の葬儀で枕飾りや祭壇に用いられる植物で あり、神式の榊と対比して覚えておくべきものである。玉串には一般に榊を用いるが、榊が得にくい地域では杉・樅 （もみ）・樫（かし）などの常緑樹で代用することもある。玉串奉奠は神葬祭の中心的な拝礼作法であるため、玉串そ のものの構成についても正確な知識を持っておきたい。'},
{chapter:2, type:'4', source:'past', text:'神葬祭における「帰家祭（きかさい）」の説明として、最も適切なものはどれか。', choices:['火葬などを終えて自宅に戻り、葬儀が無事終了したことを霊前に奉告する儀式である。','出棺に先立って、故人が住み慣れた家に別れを告げる儀式である。','忌明けに神棚封じを解いて、日常の祀りに戻すための儀式である。','転居の際に、祖霊舎の御霊に新居への移転を奉告する儀式である。'], answer:0, explanation:'帰家祭は、火葬や埋葬などの一連の儀式を終えて自宅に戻った後、霊前に葬儀が滞りなく終了したことを奉告する儀式 である。帰宅の際には手水や塩で身を清めてから家に入るのがならわしとされる。出棺前の別れや、忌明けに神棚封じ を解くこと、転居の奉告を指すものではない。神葬祭は帰幽奉告に始まり、通夜祭・遷霊祭、葬場祭、火葬祭、帰家祭、 その後の霊祭へと続くため、この流れの中で帰家祭の位置を覚えておくとよい。'},
{chapter:2, type:'4', source:'past', text:'神葬祭の一連の儀式の一般的な順序として、最も適切なものはどれか。', choices:['葬場祭 → 通夜祭・遷霊祭 → 火葬祭 → 帰家祭','通夜祭・遷霊祭 → 火葬祭 → 葬場祭 → 帰家祭','通夜祭・遷霊祭 → 帰家祭 → 葬場祭 → 火葬祭','通夜祭・遷霊祭 → 葬場祭 → 火葬祭 → 帰家祭'], answer:3, explanation:'神葬祭は、帰幽奉告や枕直しの儀、納棺の儀ののち、前夜に通夜祭とこれに続く遷霊祭を行い、当日に中心儀式である 葬場祭を執り行う。出棺後は火葬場で火葬祭を行い、自宅に戻って帰家祭により葬儀の終了を奉告するのが一般的な流 れである。その後は十日祭などの霊祭を経て、五十日祭で忌明けとなる。各儀式の名称だけでなく、全体の順序も学科 試験で問われやすいため、一連の流れとして確実に覚えておくことが重要である。'},
{chapter:2, type:'4', source:'past', text:'カトリックの葬儀を司式する聖職者の呼称として、最も適切なものはどれか。', choices:['牧師','宣教師','神父（司祭）','修道士'], answer:2, explanation:'カトリックで葬儀を司式するのは司祭であり、神父はその敬称として用いられる。牧師はプロテスタントの教職者の呼 称であって、カトリックの聖職者には用いない。宣教師は布教にあたる者の総称であり、修道士は修道会に属して修道生 活を送る者であるから、いずれも葬儀の司式者の呼称として適切ではない。カトリックとプロテスタントでは、聖職者 の呼称をはじめ儀式や用語が大きく異なるため、対比して正確に覚えておくことが重要である。'},
{chapter:2, type:'4', source:'past', text:'プロテスタントの葬儀を司式する教職者の呼称として、最も適切なものはどれか。', choices:['神父','牧師','司教','助祭'], answer:1, explanation:'プロテスタントで葬儀を司式するのは牧師である。プロテスタントの葬儀は神への礼拝として営まれ、牧師の司式によ り聖書朗読や祈祷、賛美歌斉唱などが行われる。神父はカトリックの司祭に対する敬称であり、司教や助祭もカトリッ クにおける聖職者の職階であるから、プロテスタントの教職者の呼称としては適切でない。神父と牧師の混同は遺族や 教会に対して失礼にあたるため、教派の確認とともに呼称の使い分けを徹底する必要がある。'},
{chapter:2, type:'4', source:'past', text:'カトリック教会における「ミサ」の説明として、最も適切なものはどれか。', choices:['プロテスタント教会で日曜日ごとに行われる礼拝のことである。','洗礼を受ける際に行われる入信の儀式のことである。','臨終が近い信者に神父が聖油を塗る秘跡のことである。','カトリック教会の最も重要な祭儀であり、葬儀もミサを中心に営まれる。'], answer:3, explanation:'ミサはカトリック教会における最も重要な祭儀で、キリストの最後の晩餐に由来し、パンとぶどう酒を奉献する聖体の 典礼を中心とする。カトリックの葬儀は葬儀ミサとして営まれ、教会で神父の司式により行われるのが伝統的な形であ る。プロテスタントではミサは行わず、礼拝として葬儀を営む。臨終が近い信者に聖油を塗るのは病者の塗油という別 の秘跡である。ミサと礼拝の区別は、カトリックとプロテスタントを見分ける基本事項である。'},
{chapter:2, type:'4', source:'past', text:'キリスト教の葬儀で歌われる宗教歌の呼称について、最も適切な記述はどれか。', choices:['カトリックでは一般に聖歌、プロテスタントでは一般に賛美歌と呼ばれる。','カトリックでは一般に賛美歌、プロテスタントでは一般に聖歌と呼ばれる。','いずれの教派でも御詠歌と呼ばれる。','いずれの教派でも声明と呼ばれる。'], answer:0, explanation:'キリスト教の葬儀で歌われる宗教歌は、カトリックでは聖歌、プロテスタントでは賛美歌と呼び分けられるのが一般的 である。式次第の作成や会葬者への案内でも、教派に応じて用語を正しく使い分ける必要がある。御詠歌は仏教の巡礼 歌・和讃の類であり、声明は仏教の儀式声楽であるから、キリスト教の葬儀とは関係がない。神父と牧師、ミサと礼 拝、聖歌と賛美歌という対応関係をひとまとまりで覚えておくと、教派による違いを整理しやすい。'},
{chapter:2, type:'4', source:'past', text:'キリスト教式の葬儀に持参する不祝儀袋の表書きとして、最も一般的なものはどれか。', choices:['御花料','御玉串料','御仏前','御布施'], answer:0, explanation:'キリスト教式の葬儀では、不祝儀袋の表書きに「御花料」を用いるのが一般的であり、カトリックでは「御ミサ料」が 用いられることもある。御玉串料は神式の表書き、御仏前と御布施は仏式の表書きであるから、キリスト教式にはふさ わしくない。不祝儀袋は十字架や百合の花が描かれたキリスト教用のものや無地のものを用いるのがよいとされる。宗 教別の表書きは会葬者から尋ねられることが多く、即答できるようにしておきたい基本知識である。'},
{chapter:2, type:'4', source:'past', text:'カトリックにおいて、かつて「終油の秘跡」と呼ばれていた秘跡の現在の呼称として最も適切なものはどれ か。', choices:['洗礼','堅信','聖体','病者の塗油'], answer:3, explanation:'かつて終油の秘跡と呼ばれていたものは、現在では「病者の塗油」と呼ばれている。病気や高齢により死が近づいた信 者などに神父が聖油を塗り、神の恵みと癒やしを祈る秘跡であり、臨終の際に限らず重い病の際にも授けられる。洗礼は 入信の秘跡、堅信は信仰を堅固にする秘跡、聖体はミサにおけるパンとぶどう酒にかかわる秘跡であり、それぞれ別の ものである。信者が危篤のときはまず教会に連絡するよう案内することも実務上重要である。'},
{chapter:2, type:'4', source:'past', text:'プロテスタントの葬儀において、仏式の通夜にあたるものの呼称として最も適切なものはどれか。', choices:['通夜祭','前夜式','赦祷式','遷霊祭'], answer:1, explanation:'プロテスタントでは、仏式の通夜にあたるものを前夜式と呼び、葬儀の前夜に牧師の司式で聖書朗読、祈祷、賛美歌斉 唱などを行う。通夜祭は神葬祭における通夜にあたる儀式であり、遷霊祭は神葬祭で故人の御霊を霊璽に遷す儀式である から、いずれも神道の用語である。赦祷式はカトリックの葬儀で故人の罪のゆるしを神に願う祈りであり、通夜にあた るものではない。同じ役割の儀式でも宗教・教派により呼称が異なる点を整理しておきたい。'},
{chapter:2, type:'4', source:'past', text:'カトリックの葬儀で行われる「赦祷式」の説明として、最も適切なものはどれか。', choices:['故人の御霊を霊璽に遷すために行われる儀式である。','臨終に際して、信者でない者に洗礼を授ける儀式である。','故人の生前の罪のゆるしを神に願って祈る儀式である。','遺族が懺悔を行い、聖体を拝領する儀式である。'], answer:2, explanation:'赦祷式はカトリックの葬儀において、故人が生前に犯した罪のゆるしを神に願い、祈りを捧げる儀式であり、葬儀ミサに 続く告別の祈りとして行われる。故人の御霊を霊璽に遷すのは神道の遷霊祭であり、カトリックの儀式ではない。また 赦祷式は故人のために祈るものであって、遺族の懺悔や洗礼の授与を目的とするものでもない。カトリックの葬儀は葬 儀ミサと赦祷式（告別式）を中心に構成されることを理解しておく必要がある。'},
{chapter:2, type:'4', source:'past', text:'キリスト教式の葬儀において、仏式の焼香に代わるものとして一般に行われるのはどれか。', choices:['玉串奉奠','散華','献茶','献花'], answer:3, explanation:'キリスト教式の葬儀では、仏式の焼香や神式の玉串奉奠に代わる弔意の表し方として献花が一般に行われる。参列者は 一人ずつ祭壇前に進み、花を捧げて故人に別れを告げる。献花は日本の葬儀で広まった習慣ともいわれ、キリスト教式 のほか無宗教葬でも広く行われている。玉串奉奠は神式の拝礼作法であり、散華や献茶は仏教にかかわるものであるか ら、キリスト教式の作法としては適切でない。献花の作法の案内も葬祭ディレクターの役割である。'},
{chapter:2, type:'4', source:'past', text:'キリスト教における死のとらえ方として、最も適切なものはどれか。', choices:['死は穢れであり、遺族は一定期間祭壇に近づいてはならないとされる。','死はすべての終わりであり、死後の世界は考えられていない。','死は神のもとに召される永遠の命への旅立ちととらえられる。','死は輪廻の一過程であり、来世での生まれ変わりを意味するとされる。'], answer:2, explanation:'キリスト教では、死は終わりではなく、神のもとに召されて永遠の命に入る旅立ちととらえられる。このため葬儀は、 悲しみの中にも望みをもって故人を神にゆだね、遺族を慰める場とされる。死を穢れとする観念は神道のものであり、 輪廻転生の考え方は仏教などのものである。死後の世界を考えないというのもキリスト教の死生観とは異なる。宗教ご との死生観の違いは、弔意の言葉遣いや式の構成に直結する基本知識として重要である。'},
{chapter:2, type:'4', source:'past', text:'キリスト教式の葬儀で遺族に弔意を伝える言葉として、最もふさわしいものはどれか。', choices:['安らかな眠りをお祈りいたします','御冥福をお祈りいたします','御成仏をお祈りいたします','御霊のご平安をお祈りいたします'], answer:0, explanation:'キリスト教では死を神のもとへ召される永遠の命への旅立ちととらえるため、「安らかな眠りをお祈りします」「安ら かな旅立ちでありますように」といった表現がふさわしいとされる。冥福は冥土での幸福を祈る仏教の言葉であり、成 仏も仏教の用語である。御霊の平安を祈る言い方は神道で用いられる表現である。弔意の言葉は宗教によって適否が異 なり、誤った用語は遺族への配慮を欠くことになるため、正確な使い分けを身につけておく必要がある。'},
{chapter:2, type:'4', source:'past', text:'プロテスタントの葬儀の基本的な性格として、最も適切なものはどれか。', choices:['故人の霊を慰めて成仏を祈る、追善供養として行われる。','神に祈りを捧げる礼拝として行われ、故人を偲び遺族を慰める場ともなる。','故人の御霊が家の守護神となることを祈る祭りとして行われる。','故人の来世での幸福な生まれ変わりを祈願する儀式として行われる。'], answer:1, explanation:'プロテスタントの葬儀は神への礼拝として営まれるのが基本的な性格であり、その中で故人の生涯を振り返って遺徳を 偲び、遺族を慰める。死者の霊を慰める追善供養という考え方は仏教のものであり、キリスト教では故人は神のもとに 召されるとされるため、供養や成仏という概念はなじまない。御霊が家の守護神になるという考え方は神道の祖霊信仰 である。葬儀が持つ意味の宗教による違いは、式の組み立てや挨拶文作成の基礎となる。'},
{chapter:2, type:'4', source:'past', text:'キリスト教の教派に関する記述として、最も適切なものはどれか。', choices:['プロテスタントは、ローマ教皇を最高指導者として仰ぐ教派である。','カトリックは、16世紀の宗教改革によって新たに生まれた教派である。','プロテスタントは、16世紀の宗教改革を機にカトリックから分かれた諸教派の総称である。','カトリックとプロテスタントは、互いに異なる宗教の聖典を用いている。'], answer:2, explanation:'プロテスタントは、16世紀にルターらが起こした宗教改革を機に、カトリック教会から分かれて成立した諸教派の総称 である。ローマ教皇を最高指導者とするのはカトリックであり、両教派とも聖典は同じ聖書である。葬儀においても、 カトリックは神父の司式による葬儀ミサ、プロテスタントは牧師の司式による礼拝形式と、教派により内容が異なる。依 頼を受けた際には、どちらの教派であるかを最初に確認することが実務上欠かせない。'},
{chapter:2, type:'4', source:'past', text:'カトリックにおいて、死後に故人を追悼して教会で行われる儀式の呼称として最も適切なものはどれか。', choices:['記念式','五十日祭','年忌法要','追悼ミサ'], answer:3, explanation:'カトリックでは、死後3日目・7日目・30日目や毎年の命日などに教会で追悼ミサを行い、故人を追悼する。記念式はプ ロテスタントにおける追悼の集会で、死後1か月後の召天記念日などに行われるものである。五十日祭は神道の霊祭であ り、年忌法要は仏式の追善供養であるから、いずれもカトリックの儀式ではない。葬儀後の追悼行事の呼称と時期は宗 教ごとに異なるため、対応関係を整理して覚えておくと遺族への案内に役立つ。'},
{chapter:2, type:'4', source:'past', text:'プロテスタントの葬儀の進行に含まれる内容として、最も一般的な組み合わせはどれか。', choices:['読経、焼香、引導','聖書朗読、祈祷、賛美歌斉唱','祭詞奏上、玉串奉奠、直会','聖体拝領、撒水、献香'], answer:1, explanation:'プロテスタントの葬儀は牧師の司式による礼拝として行われ、聖書朗読、祈祷、賛美歌斉唱、説教などで構成されるの が一般的である。読経や焼香、引導は仏式の儀礼であり、祭詞奏上や玉串奉奠、直会は神式のものである。聖体拝領や 撒水・献香はカトリックの葬儀ミサで行われるものであり、プロテスタントの葬儀では通常行われない。同じキリスト 教であっても教派により式の内容が異なる点は、学科試験でも実務でも重要なポイントである。'},
{chapter:2, type:'4', source:'past', text:'キリスト教式の葬儀祭壇に飾られるものとして、最も適切な組み合わせはどれか。', choices:['十字架、燭台、生花','樒、リン、五色の幡','神鏡、榊、三方','位牌、香炉、灯籠'], answer:0, explanation:'キリスト教式の祭壇には、十字架を中心に燭台や生花、遺影などが飾られるのが一般的である。樒やリン、位牌、香 炉、灯籠は仏式の祭壇や葬具に用いられるものであり、神鏡や榊、三方は神式の祭壇に用いられるものである。宗教に よって祭壇の構成や用具は大きく異なり、設営の誤りは遺族や宗教者の信頼を損なう重大な失敗となるため、葬祭ディレ クターには各宗教の用具を正確に識別し、適切に設営する知識と技能が求められる。'},
{chapter:2, type:'4', source:'past', text:'カトリックの葬儀において、神父が棺を清めるために用いるものとして最も適切なものはどれか。', choices:['清めの塩','御神酒','樒の葉','聖水'], answer:3, explanation:'カトリックの葬儀では、神父が棺に聖水を注ぎかけ、献香を行って故人を清め、神にゆだねる祈りを捧げることがあ る。聖水は教会で祝別された水で、カトリックの諸儀式に広く用いられる。清めの塩は死を穢れとする神道的観念に由 来する日本の習俗であり、御神酒は神式の供物、樒は仏式の葬儀に用いられる植物であるから、いずれもカトリックの 儀式には用いられない。キリスト教では死を穢れととらえない点も併せて理解しておきたい。'},
{chapter:2, type:'4', source:'past', text:'キリスト教式の葬儀に参列する際の作法として、適切でないものはどれか。', choices:['数珠を手に掛けて献花を行う。','地味な色の喪服を着用して参列する。','「御花料」と表書きした不祝儀袋を持参する。','献花の後、遺影に向かって一礼する。'], answer:0, explanation:'数珠は仏式の法具であり、キリスト教式の葬儀では用いないのが作法である。仏式に参列し慣れた会葬者が習慣で持参 してしまうことがあるため、案内の際には注意が必要である。服装は仏式と同様の地味な喪服でよく、不祝儀袋の表書 きは「御花料」が一般的である。献花の後に遺影へ一礼することは自然な弔意の表れであり差し支えない。キリスト教 式では焼香や玉串奉奠の代わりに献花を行うなど、作法の違いを正しく案内できるようにしたい。'},
{chapter:2, type:'4', source:'past', text:'キリスト教の葬儀を行う場所についての伝統的な考え方として、最も適切なものはどれか。', choices:['死は穢れであるため、教会では行わず自宅でのみ行う。','葬儀は必ず屋外の墓地で行うものとされている。','故人や遺族が所属する教会で行うのが基本とされている。','教会は礼拝専用の施設であるため、葬儀には使用できない。'], answer:2, explanation:'キリスト教の葬儀は、故人や遺族が所属する教会で行うのが伝統的な形である。キリスト教では死を穢れとはとらえな いため、聖なる場である教会に遺体を安置して葬儀を行うことに支障はない。これは、死を穢れとして神社では葬儀を 行わない神道と対照的である。近年は斎場で行う例もあるが、その場合も所属教会の神父や牧師に司式を依頼するた め、教会との日程調整や打合せが葬祭ディレクターの重要な実務となる。'},
{chapter:2, type:'4', source:'past', text:'キリスト教において信者の死去を表す言葉の組み合わせとして、最も適切なものはどれか。', choices:['カトリックでは「帰幽」、プロテスタントでは「他界」という。','カトリックでは「帰天」、プロテスタントでは「召天」という。','カトリックでは「召天」、プロテスタントでは「帰天」という。','カトリックでは「入滅」、プロテスタントでは「往生」という。'], answer:1, explanation:'カトリックでは信者の死去を、神のもとへ帰るという意味で「帰天」と表現し、プロテスタントでは神に召されるとい う意味で「召天」と表現するのが一般的である。帰幽は神道で死去を表す言葉であり、入滅や往生は仏教の用語であ る。訃報や死亡広告、弔電などの文面ではこれらを正しく使い分ける必要があり、教派を取り違えると遺族や教会に対 して失礼となる。カトリックとプロテスタントの用語の対応は確実に覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'無宗教葬の説明として、最も適切なものはどれか。', choices:['僧侶による読経は行うが、戒名を付けない形式の葬儀である。','特定の宗教の儀礼によらず、自由な形式で行う葬儀である。','通夜や告別式を行わず、火葬のみを行う形式の葬儀である。','複数の宗教の儀礼を組み合わせて行う形式の葬儀である。'], answer:1, explanation:'無宗教葬は、読経や祭詞奏上、ミサといった特定の宗教の儀礼によらず、献花や黙とう、音楽などを取り入れて自由な 形式で行う葬儀であり、自由葬とも呼ばれる。僧侶の読経を行うものは宗教儀礼による仏式の葬儀であり、無宗教葬には あたらない。また通夜や告別式を行わず火葬のみを行う形式は直葬（火葬式）と呼ばれる別のものであり、複数の宗教 儀礼を組み合わせる形式を指すものでもない。定義を正確に押さえておきたい。'},
{chapter:2, type:'4', source:'past', text:'無宗教葬の式の内容として、最も一般的な組み合わせはどれか。', choices:['読経、焼香、法話','祭詞奏上、玉串奉奠、直会','葬儀ミサ、聖体拝領、赦祷式','献花、黙とう、お別れの言葉、音楽演奏'], answer:3, explanation:'無宗教葬では宗教儀礼を行わない代わりに、献花、黙とう、お別れの言葉、故人の経歴紹介、音楽演奏やスライド上映 などを組み合わせて式を構成するのが一般的である。読経や焼香、法話は仏式の儀礼であり、祭詞奏上や玉串奉奠、直 会は神式、葬儀ミサや聖体拝領、赦祷式はカトリックの儀礼であるから、いずれも無宗教葬の内容としては適切でな い。決まった式次第がないため、これらの要素を遺族の意向に沿って自由に組み立てることになる。'},
{chapter:2, type:'4', source:'past', text:'無宗教葬を執り行ううえで特に重要とされることとして、最も適切なものはどれか。', choices:['決まった式次第がないため、遺族と事前に綿密な打合せを行うこと。','式の前日までに宗教者の手配を必ず済ませておくこと。','仏式の式次第をそのまま流用して進行すること。','菩提寺から事前に戒名を授かっておくこと。'], answer:0, explanation:'無宗教葬には宗教儀礼に基づく決まった式次第がないため、式の構成や進行はすべて遺族の意向をもとに組み立てるこ とになる。どのような形で故人を送りたいのかを丁寧に聞き取り、事前に綿密な打合せを行うことが何より重要であ る。宗教者の手配や戒名の授与は宗教儀礼を前提とするものであり、無宗教葬では必要とされない。また仏式の式次第 の流用は無宗教葬の趣旨に反する。進行の自由度が高い分、企画力と準備が問われる形式である。'},
{chapter:2, type:'4', source:'past', text:'「お別れ会」「偲ぶ会」と呼ばれる形式の説明として、最も適切なものはどれか。', choices:['通夜の前に近親者のみで行う仮の葬儀のことである。','火葬の直前に、火葬炉の前で行う短い別れの儀式のことである。','密葬や家族葬などの後、日を改めて関係者を広く招いて行う会のことである。','忌明けの法要と同時に行う、親族のみの会食のことである。'], answer:2, explanation:'お別れ会・偲ぶ会は、近親者のみで密葬や家族葬を済ませた後、日を改めて友人・知人や仕事関係者などを広く招き、 故人との別れの場を設ける会である。ホテルや会館などを会場とし、献花や映像の上映、会食などを中心に、宗教儀礼 にとらわれない自由な形式で行われることが多い。通夜前の仮の儀式や火葬直前の別れ、忌明け法要の会食を指すもの ではない。社葬に代わる形式として企業が主催する例もあり、現代の葬送の多様化を示している。'},
{chapter:2, type:'4', source:'past', text:'「音楽葬」の説明として、最も適切なものはどれか。', choices:['僧侶が雅楽の演奏に合わせて読経を行う仏式の葬儀のことである。','参列者全員で賛美歌を斉唱するプロテスタントの葬儀のことである。','国の儀式としてのみ行われる、吹奏楽団の演奏を伴う葬儀のことである。','故人の愛した曲の演奏や鑑賞を式の中心に据えて行う葬儀のことである。'], answer:3, explanation:'音楽葬は、故人が生前に愛した楽曲や思い出の曲を生演奏や音源で流し、音楽を式の中心に据えて故人を送る形式であ り、無宗教葬の代表的なスタイルの一つである。献花や黙とう、お別れの言葉と組み合わせて構成されることが多い。 雅楽を伴う読経や賛美歌の斉唱は特定の宗教儀礼の中の音楽であり、音楽葬という形式そのものを指すわけではない。 また音楽葬は誰でも選べる形式であって、国の儀式に限られるものではない。'},
{chapter:2, type:'4', source:'past', text:'献花の一般的な作法として、最も適切なものはどれか。', choices:['花が祭壇側、茎が自分の手前側に向くようにして献花台に置く。','受け取った花を高く掲げてから、献花台に投げ入れるように置く。','花が自分の手前側、茎が祭壇側に向くようにして献花台に置く。','花を胸元に挿してから、係に返却して席に戻る。'], answer:2, explanation:'献花では、係から花を両手で受け取り、祭壇前に進んで一礼したのち、花が自分の手前側、茎（根元）が祭壇側に向く ように回してから献花台に置くのが一般的な作法とされる。置いた後は黙とうや一礼をして席に戻る。花側を祭壇に向 けて置いたり、投げ入れるように置いたりするのは作法として誤りである。献花はキリスト教式や無宗教葬、お別れ会 で広く行われる弔意の表し方であり、会葬者に正しく案内できるようにしておく必要がある。'},
{chapter:2, type:'4', source:'past', text:'菩提寺がある家が、宗教者を呼ばない無宗教葬を行う場合の注意点として最も適切なものはどれか。', choices:['無宗教葬であっても、菩提寺への連絡や相談は一切必要ない。','菩提寺の墓への納骨を断られることがあるため、事前に菩提寺へ相談し確認しておく。','無宗教葬を行うと、火葬許可証が交付されないことがある。','無宗教葬を行った場合、遺骨は必ず散骨しなければならない。'], answer:1, explanation:'菩提寺がある家が菩提寺の宗教儀礼によらない無宗教葬を行うと、その後に菩提寺の墓地への納骨を断られるなどのト ラブルが生じることがある。このため、無宗教葬を検討する遺族には事前に菩提寺へ相談し、納骨の可否などを確認し ておくよう助言することが重要である。火葬許可証の交付は死亡届に基づく行政手続であり、葬儀の宗教形式とは関係 がない。遺骨の扱いが散骨に限られることもない。菩提寺の有無の確認は受注時の重要事項である。'},
{chapter:2, type:'4', source:'past', text:'無宗教葬の別の呼び方として、最も一般的なものはどれか。', choices:['自由葬','密葬','社葬','直葬'], answer:0, explanation:'無宗教葬は、宗教儀礼にとらわれず式の内容を自由に構成できることから、自由葬とも呼ばれる。密葬は近親者のみで 内々に行う葬儀を指し、後日に本葬やお別れ会を行うことを前提として用いられてきた言葉である。社葬は企業が施主 となって行う葬儀であり、直葬は通夜や葬儀式を行わずに火葬のみを行う形式である。これらは規模や主催者、儀式の 有無に着目した分類であり、宗教儀礼によらないことを意味する無宗教葬・自由葬とは観点が異なる。'},
{chapter:2, type:'4', source:'past', text:'ホテルでお別れ会・偲ぶ会を開催する場合の一般的な注意点として、最も適切なものはどれか。', choices:['遺体や遺骨の持ち込み、線香を用いる焼香などが制限されることが多いため、事前の確認が必要であ る。','ホテルでの開催では、宗教儀礼を必ず取り入れなければならない。','ホテルで開催する場合は、保健所の許可を受けなければならない。','ホテルでは献花や黙とうを行うことが禁止されている。'], answer:0, explanation:'ホテルは宿泊や宴会を主な目的とする施設であるため、お別れ会・偲ぶ会の会場とする場合には、遺体や遺骨の持ち込 み、線香を用いる焼香などが制限されることが多い。このため遺影と生花を中心とした飾り付けとし、弔意は献花で表 すなどの工夫を行い、事前にホテル側へ可否を確認することが欠かせない。献花や黙とうまで禁止されるものではな く、宗教儀礼の導入が義務付けられることも、保健所の許可が必要となることもない。'},
{chapter:2, type:'4', source:'past', text:'無宗教葬を希望する遺族への葬祭ディレクターの助言として、最も適切なものはどれか。', choices:['無宗教葬では会葬者を招くことができないと説明する。','無宗教葬では香典を受け取ることができないと説明する。','宗教儀礼を重んじる親族もいるため、親族間で事前に理解を得ておくよう勧める。','無宗教葬を行うには行政への特別な届出が必要であると説明する。 葬祭ディレクター技能審査 完全対策問題集 第5 章：臨終から納棺まで （50問）'], answer:2, explanation:'無宗教葬は従来の宗教儀礼によらない形式であるため、宗教儀礼を大切に考える高齢の親族などから戸惑いや反対が生 じることがある。後の親族間の不和を避けるためにも、事前に親族の理解を得ておくよう助言することが適切である。 無宗教葬でも会葬者を招くことや香典を受け取ることは自由であり、葬儀の宗教形式について行政への届出も必要な い。形式の自由度が高いからこそ求められる、親族への配慮を理解しておくことが大切である。 葬祭ディレクター技能審査 完全対策問題集 第5章：臨終から納棺まで'},
{chapter:3, type:'4', source:'past', text:'臨終に際して医師が死亡を判定する際に確認する「死の三徴候」の組み合わせとして、正しいものはどれか。', choices:['心拍の停止・呼吸の停止・瞳孔の散大と対光反射の消失','体温の低下・呼吸の停止・死後硬直の発現','心拍の停止・血圧の低下・意識の消失','脳波の平坦化・呼吸の停止・体温の低下'], answer:0, explanation:'死の三徴候とは、心拍（心臓）の停止、呼吸の停止、瞳孔の散大と対光反射の消失をいい、医師はこれらを総合的に確 認して死亡を判定する。体温の低下や死後硬直は死亡後に時間を経て現れる死体現象であり、判定の基準そのものでは ない。脳波の確認は脳死判定に関わるもので、通常の死亡確認の手順ではない。死亡の判定と死亡診断書の交付は医師 （自己の診療患者については歯科医師も可）に限られる行為である。'},
{chapter:3, type:'4', source:'past', text:'医師が死体を検案して異状があると認めた場合の対応について、医師法第21条の規定として正しいものはどれ か。', choices:['48時間以内に保健所長へ届け出る','24時間以内に所轄の警察署に届け出る','7日以内に市区町村長へ届け出る','直ちに地方法務局へ届け出る'], answer:1, explanation:'医師法第21条では、医師は死体を検案して異状があると認めたときは、24時間以内に所轄警察署に届け出なければなら ないと定められている。届出を受けた警察は検視などを行って犯罪性の有無を確認し、その手続を経た遺体には検案し た医師から死体検案書が交付される。この間、遺族や葬祭業者が遺体を勝手に動かすことはできない。届出先は保健所 や市区町村役場ではなく警察署であり、期限が24時間以内である点が重要である。'},
{chapter:3, type:'4', source:'past', text:'死亡診断書と死体検案書に関する記述として、正しいものはどれか。', choices:['死亡診断書は医師が、死体検案書は警察官が作成する','死亡診断書と死体検案書は全く別の様式の用紙が用いられる','診療継続中の患者がその傷病に関連して死亡した場合は死亡診断書が、それ以外の遺体を検案した場 合は死体検案書が交付される','死体検案書は遺族が記入して提出する書類である'], answer:2, explanation:'死亡診断書は、継続的に診療していた患者がその診療に係る傷病に関連して死亡した場合に医師が交付する。これに対 し、診療していなかった人の死亡や異状死などで遺体を検案した場合に交付されるのが死体検案書である。いずれも作 成できるのは医師であり（死亡診断書は歯科医師も可）、警察官や遺族が作成することはできない。両者は同一様式の 一枚の用紙になっており、使用しない側の名称を二重線で消して用いる。'},
{chapter:3, type:'4', source:'past', text:'戸籍法に基づく死亡届の届出期間として、正しいものはどれか（国内で死亡した場合）。', choices:['死亡の事実を知った日から24時間以内','死亡の事実を知った日から3日以内','死亡の事実を知った日から14日以内','死亡の事実を知った日から7日以内'], answer:3, explanation:'戸籍法により、死亡届は届出義務者が死亡の事実を知った日から7日以内に提出しなければならないとされている。国外 で死亡した場合の期間は、その事実を知った日から3か月以内である。死亡届が受理されると火葬（埋葬）許可証が交付 され、火葬を行えるようになるため、実務では葬儀日程に合わせて速やかに届け出るのが通例である。24時間という数 字は墓地埋葬法上の火葬時期の制限であり、届出期間と混同してはならない。'},
{chapter:3, type:'4', source:'past', text:'死亡届と死亡診断書（死体検案書）の関係について、正しいものはどれか。', choices:['それぞれ別々の用紙で、異なる窓口に提出する','一枚の用紙の左半分が死亡届、右半分が死亡診断書（死体検案書）となっている','死亡診断書を提出すれば死亡届の提出は不要である','死亡届と死亡診断書はいずれも火葬を済ませた後に提出する'], answer:1, explanation:'死亡届と死亡診断書（死体検案書）は一枚の用紙にまとめられており、向かって左側が死亡届、右側が死亡診断書（死 体検案書）の様式となっている。右側に医師の記入・交付を受けたうえで、左側の死亡届に届出人が必要事項を記入 し、市区町村の窓口に提出する。死亡届の受理によって火葬（埋葬）許可証が交付されるため、死亡届の提出は火葬の 前に必要な手続であり、診断書の提出だけで届出に代えることはできない。'},
{chapter:3, type:'4', source:'past', text:'死亡届を提出することができる市区町村として、正しい組み合わせはどれか。', choices:['死亡地、死亡者の本籍地、届出人の所在地のいずれかの市区町村','死亡者の勤務先がある市区町村に限られる','届出人の本籍地の市区町村に限られる','都道府県庁の窓口に提出する'], answer:0, explanation:'戸籍法上、死亡届は死亡地、死亡者の本籍地、届出人の所在地のいずれかの市区町村に提出することができる。病院で 亡くなった場合は、死亡地である病院所在地の市区町村にも提出できるため、火葬許可証の受領などの段取りに合わせ て提出先を選ぶことができる。多くの市区町村では夜間・休日も宿直窓口で届書を受け付けている。提出先は市区町村 であって都道府県ではなく、勤務先の所在地という基準も存在しない。'},
{chapter:3, type:'4', source:'past', text:'墓地、埋葬等に関する法律における火葬の時期の制限について、正しいものはどれか。', choices:['死亡後12時間を経過すれば火葬を行うことができる','死亡後48時間を経過しなければ火葬を行うことができない','原則として死亡後24時間を経過した後でなければ火葬を行ってはならない','火葬の時期について法律上の制限は設けられていない'], answer:2, explanation:'墓地、埋葬等に関する法律により、埋葬または火葬は、原則として死亡（死産）後24時間を経過した後でなければ行っ てはならないとされている。これは蘇生の可能性に配慮した規定と説明される。ただし、感染症法に定める一類感染症 などで死亡した場合や、妊娠7か月に満たない死産の場合には、例外として24時間以内の火葬が認められている。葬祭実 務では、この時間制限を前提に通夜・葬儀・火葬の日程を組む必要がある。'},
{chapter:3, type:'4', source:'past', text:'「末期の水（死に水）」の儀礼について、その意味として最も適切なものはどれか。', choices:['遺体の腐敗を遅らせるために行う保全処置である','検視に先立って必ず行うことが法律で定められた手続である','故人の蘇生を医学的に試みる処置である','故人の唇を水で潤し、安らかな旅立ちを願って行う臨終の儀礼である'], answer:3, explanation:'末期の水（死に水）は、臨終に立ち会った家族らが故人の唇を水で潤し、安らかな旅立ちを願って行う儀礼である。臨 終の釈尊が水を求めたという故事に由来すると伝えられ、現在では死亡確認の後、病室や安置の場で行われることが多 い。あの世で渇きに苦しまないように、また少しでも生き返ってほしいという願いを込めた最後の別れの作法であり、 腐敗防止のための保全処置や法律で定められた手続ではない。'},
{chapter:3, type:'4', source:'past', text:'末期の水の一般的な作法として、最も適切なものはどれか。', choices:['新しい筆や割り箸の先に脱脂綿やガーゼを含ませ、水で故人の唇を軽く湿らせる','故人の口の中に直接水を注ぎ込む','故人の額や頭部に水を振りかける','茶碗の水を遺体の胸元に静かにこぼす'], answer:0, explanation:'末期の水は、新しい筆や割り箸の先に脱脂綿やガーゼを巻いて水を含ませ、故人の唇を軽く湿らせるように行うのが一 般的である。樒の葉や鳥の羽を用いる地域もある。配偶者、子というように、故人と血縁の深い順に一人ずつ行うこと が多い。口の中に直接水を流し込んだり、額や体に水をかけたりするものではない。細部の形式は地域や宗派によって 異なるが、唇を潤して別れを告げるという基本は共通している。'},
{chapter:3, type:'4', source:'past', text:'病院から自宅や安置施設への遺体搬送について、正しいものはどれか。', choices:['遺体搬送には救急車を要請するのが原則である','遺体は鉄道便で送るのが一般的である','通常は許可を受けた事業者の寝台車により搬送する','搬送には市区町村長が発行する搬送許可証が必要である'], answer:2, explanation:'死亡した人の搬送には、通常、霊柩運送の許可を受けた事業者の寝台車が用いられる。霊柩運送は貨物自動車運送事業 法に基づく許可事業であり、業として遺体を搬送するには許可が必要である。救急車は傷病者を搬送するためのもので あり、死亡が確認された人の搬送には用いられない。また、国内の搬送について市区町村長の許可証といった書類は必 要ないが、万一に備えて死亡診断書を携行することが望ましいとされる。'},
{chapter:3, type:'4', source:'past', text:'病院で死亡した場合の遺体搬送に関する記述として、最も適切なものはどれか。', choices:['病院の霊安室は日数の制限なく利用できるため、搬送を急ぐ必要はない','病院の霊安室は一時的な安置場所であり、比較的早い時間での搬送を求められることが多い','搬送先は病院が指定するため、遺族が選ぶことはできない','搬送は必ず死亡の翌日以降に行わなければならない'], answer:1, explanation:'病院の霊安室はあくまで一時的な安置場所であり、次の利用への対応などの事情から、死亡後数時間程度での搬出を求 められることが多い。そのため遺族は早い段階で葬儀社に搬送を依頼し、自宅に安置するか、葬儀社の安置施設などを 利用するかという搬送先を決める必要がある。搬送先を決定するのは遺族であり、病院が指定するものではない。搬送 の時期を死亡の翌日以降としなければならないという決まりも存在しない。'},
{chapter:3, type:'4', source:'past', text:'寝台車による遺体搬送の料金について、一般的な仕組みとして正しいものはどれか。', choices:['搬送料金は全国一律の定額制と法令で定められている','搬送料金は故人の年齢によって算定される','搬送料金は喪主の所得に応じて決められる','搬送料金は基本料金に搬送距離に応じた加算を行う距離制が一般的である'], answer:3, explanation:'寝台車による搬送料金は、一定の距離までの基本料金に、それを超える距離に応じた加算額を加える距離制運賃が一般 的である。これに深夜・早朝の割増料金や高速道路の利用料、遺体保全用品などの実費が加わることがある。搬送距離 が長くなるほど料金も高くなるため、搬送先や火葬場の選定にも関わる要素となる。全国一律の定額制と定められてい る事実はなく、故人の年齢や喪主の所得を基準とする算定方法もない。'},
{chapter:3, type:'4', source:'past', text:'仏式における遺体安置の方角に関する習俗として、正しいものはどれか。', choices:['頭を北に向ける北枕とし、それが難しい場合には西枕とすることもある','頭を南に向ける南枕が正式とされている','方角の習俗はキリスト教式のみに存在する','足を西に向けることが最も重視される'], answer:0, explanation:'仏式では、釈尊が入滅の際に頭を北、顔を西に向けて横たわったという故事（頭北面西）にちなみ、遺体の頭を北に向 ける北枕で安置する習俗がある。部屋の構造などで北枕が難しい場合には、西方浄土の信仰にちなんで西枕とすること もある。いずれも難しいときは方角にこだわらなくてもよいとされる。南枕を正式とする考え方はなく、方角に関する 習俗がキリスト教式に固有のものというわけでもない。'},
{chapter:3, type:'4', source:'past', text:'遺体の安置に際して用いられる「守り刀」について、正しいものはどれか。', choices:['故人の身元を証明するために行政から貸与される道具である','魔除けの意味を込めて、遺体の布団の上や胸元に置かれる習俗である','すべての宗派で必ず用いることとされている','刃先を故人の顔に向けて置くのが正しい作法である'], answer:1, explanation:'守り刀は、死者に魔や悪霊が近づかないようにという魔除けの意味で、安置した遺体の布団の上や胸元・枕元に小刀な どを置く習俗である。武家の風習に由来するなど起源には諸説ある。置く際には刃先を故人の顔の方に向けないよう配 慮するのが一般的である。亡くなるとただちに仏になると考える浄土真宗では用いないなど、宗派や地域によって扱いは 異なり、すべての宗派で必ず用いるものではない。身元証明の道具でもない。'},
{chapter:3, type:'4', source:'past', text:'「神棚封じ」に関する記述として、正しいものはどれか。', choices:['仏壇の扉を金色の紙で覆い隠す儀礼である','故人の遺影を神棚に飾って拝むことをいう','四十九日の法要が済んでから初めて行うものである','神棚の扉を閉めて白い紙を貼り、忌明けまで日々の礼拝を控える習俗である'], answer:3, explanation:'神棚封じは、死を穢れととらえる神道の観念に基づき、家族に死者が出た際に神棚の扉を閉じて白い紙（半紙）を貼り、 忌明けまで日々の礼拝を控える習俗である。死の穢れが神様に及ばないようにするためのもので、死亡後すみやかに行 い、忌明けの後に紙を外して平常に戻す。穢れの及んでいない第三者が行うのがよいとする考え方も伝えられている。仏 壇の扉を金色の紙で覆うものではなく、遺影を神棚に飾る行為とも関係がない。'},
{chapter:3, type:'4', source:'past', text:'ドライアイスによる遺体の保全について、当て方の基本として最も適切なものはどれか。', choices:['顔面に直接当てて表情の変化を防ぐ','足の裏に集中して当てる','腐敗が内臓から進みやすいため、腹部を中心に当てる','遺体には触れさせず、部屋の四隅に置いておく'], answer:2, explanation:'遺体の腐敗は、腸内細菌などの働きによって内臓のある腹部から進行しやすい。このためドライアイスは腹部を中心に 当て、必要に応じて胸部や頸部などにも追加するのが基本である。タオルや布で包み、直接皮膚に触れないように当て、 溶け具合を確認しながら交換する。顔面への使用は変色などを招くおそれがあり慎重を要する。部屋の隅に置くだけで は冷却効果は得られず、昇華した二酸化炭素がこもらないよう換気への配慮も必要である。'},
{chapter:3, type:'4', source:'past', text:'夏季における遺体の安置・保全について、最も適切な対応はどれか。', choices:['冷房により室温を低く保ち、ドライアイスの点検・交換を小まめに行う','冬季と同じ管理で特に問題はない','窓を開けて日光と外気に当てるとよい','腐敗防止のため遺体に温風を当てる'], answer:0, explanation:'気温や湿度の高い夏季は腐敗の進行が早いため、冷房によって室温をできるだけ低く保ち、ドライアイスの状態を小ま めに点検して交換することが基本となる。安置が長期にわたる場合には、保冷庫を備えた安置施設の利用やエンバーミ ングの検討を提案することもある。直射日光や外気、温風は腐敗を促進させるため避けなければならない。季節や安置 日数に応じた遺体の保全管理は、葬祭業者の重要な業務の一つである。'},
{chapter:3, type:'4', source:'past', text:'遺体を布団に安置した際の習俗として、一般に行われるものはどれか。', choices:['故人の顔を派手な色の布で覆う','故人の手足を布団の外に出しておく','故人の顔の上に位牌を載せる','故人の顔に白布を掛ける'], answer:3, explanation:'遺体を安置した際には、故人の顔に白布を掛ける習俗が広く行われている。白は清浄を表す色とされ、顔を覆うことに は死者の尊厳を守るとともに、顔の乾燥や変化を目に触れにくくするという実際的な意味合いもあるとされる。安置に 際しては手を胸の上で組ませ、数珠を掛けることも多い。派手な色の布を用いる作法はなく、手足を布団から出したま まにしたり、顔の上に物を載せたりすることも適切ではない。'},
{chapter:3, type:'4', source:'past', text:'葬送儀礼における「逆さごと」の説明として、正しいものはどれか。', choices:['祝い事の作法をそのまま葬儀に取り入れること','水に湯を足して湯加減を整えるなど、日常と逆の作法で行う葬送習俗の総称','遺体をうつ伏せに安置すること','通夜と葬儀・告別式の順序を入れ替えて行うこと'], answer:1, explanation:'逆さごとは、死後の世界は現世と逆さまであるという観念や、死を日常から区別する意識に基づき、葬送の場面で日常と は逆の作法を用いる習俗の総称である。水に湯を足して温度を整える逆さ水、着物を左前に着せること、屏風を上下逆 に立てる逆さ屏風、着物を上下逆さに遺体へ掛けることなどが代表例とされる。遺体をうつ伏せに安置することや、通 夜と葬儀・告別式の順序を入れ替えることを指す言葉ではない。'},
{chapter:3, type:'4', source:'past', text:'仏式の枕飾りの一般的な構成として、最も適切なものはどれか。', choices:['漆塗りの大型祭壇に多数の供物を並べる','金屏風を立てて紅白の幕を張る','白木の小机に香炉・燭台・花立を置き、花立には樒などを一本挿す','祭壇は設けず、線香のみを焚く'], answer:2, explanation:'枕飾りは遺体の枕元に設ける小さな祭壇で、仏式では白木の小机（白布を掛けた机を用いることもある）に、香炉・燭 台・花立のいわゆる三具足を置くのが基本形である。花立には樒などを一本だけ挿す一本花とし、このほか枕飯・枕団 子・浄水、りんなどを供えることが多い。線香や蝋燭の火を絶やさないようにする習俗も伝えられている。漆塗りの大 型祭壇や金屏風・紅白の幕は祝儀の設えであり、枕飾りには用いない。'},
{chapter:3, type:'4', source:'past', text:'枕飾りに供える「枕飯」について、一般的な作法として正しいものはどれか。', choices:['新品の茶碗に飯を平らに少量盛る','赤飯を重箱に詰めて供える','故人が生前愛用した茶碗に飯を山盛りにし、箸を立てる','パンや麺類で代用するのが正式である'], answer:2, explanation:'枕飯は一膳飯とも呼ばれ、故人が生前に使っていた茶碗に飯を高く山盛りにし、箸を立てて供えるのが一般的である。 死者のための最後の食事とされ、日常の盛り方とは異なる形にする点で逆さごとに通じる作法と説明される。地域に よっては一合の米を炊き切りにして全部盛るなどの習俗もある。赤飯のような祝いの食物を用いることはなく、新品の 茶碗に少量を平らに盛る作法でもない。パンや麺類で代用するのが正式という事実もない。'},
{chapter:3, type:'4', source:'past', text:'枕飾りに供える「枕団子」について、正しいものはどれか。', choices:['米の粉で作る白い団子で、六個供える地域が多い','餡を包んだ紅白の団子を供える','故人が甘党であった場合に限って供える','火葬を終えた後に初めて供えるものである'], answer:0, explanation:'枕団子は、上新粉などの米の粉を丸めてゆでた白い団子で、枕飾りに供えられる。個数は六道（地獄・餓鬼・畜生・修 羅・人間・天）にちなんで六個とする地域が多いが、十三個などとする地域もあり全国一律ではない。死出の旅路の弁 当、あるいは釈尊入滅にまつわる故事に由来する供物などと説明される。餡入りや紅白の団子といった祝儀の品は用い ない。供えるのは安置から葬儀までの間であり、火葬後に初めて供えるものではない。'},
{chapter:3, type:'4', source:'past', text:'「枕経（まくらぎょう）」について、最も適切な説明はどれか。', choices:['火葬炉の前で行われる読経のことである','遺族だけで唱えるもので、僧侶は関与しない','四十九日の忌明け法要で読まれる経のことである','本来は臨終に際しての勤行であり、現在は安置後に僧侶が枕元で読経する形が一般的である'], answer:3, explanation:'枕経は、本来は臨終を迎えようとする人の枕元で、安らかに往生できるようにと読まれた臨終の勤行であった。病院で 亡くなることが多くなった現在では、遺体を安置して枕飾りを整えた後、菩提寺などの僧侶を招き、枕元で読経しても らう形が一般的になっている。死後最初に営まれる仏事であり、その席で戒名や通夜・葬儀の日程について相談するこ とも多い。火葬炉の前での読経や、忌明け法要での読経を指す言葉ではない。'},
{chapter:3, type:'4', source:'past', text:'エンゼルケア（死後の処置）の内容として、最も適切なものはどれか。', choices:['血管内の血液を防腐剤に置き換える処置である','医療器具類の抜去、全身の清拭、含み綿、傷の手当てなどを行う処置である','警察が行う検視手続の一部である','墓地に埋葬する前に行う宗教儀礼である'], answer:1, explanation:'エンゼルケア（死後の処置）は、死亡後にカテーテルや点滴などの医療器具を抜去し、全身の清拭、口腔や鼻腔への詰 め物・含み綿、創部の手当て、更衣・整髪などを行い、故人の外見を生前に近い安らかな姿に整えるもので、病院では主 に看護職が担う。血管内の血液を防腐剤と置き換えるのはエンバーミングであり、死後の処置とは別のものである。ま た、検視は警察が行う手続であり、宗教儀礼とも性格を異にする。'},
{chapter:3, type:'4', source:'past', text:'死後の処置で行われる「含み綿」の主な目的として、最も適切なものはどれか。', choices:['頬のくぼみを整え、生前に近い穏やかな表情にするため','遺体の体温を保持するため','口を大きく開いた状態で固定するため','法令上の義務を果たすため'], answer:0, explanation:'含み綿は、死後に頬がこけてやつれた印象の顔貌にならないよう、口腔内に脱脂綿などを適量含ませて頬のふくらみを 補い、生前に近い穏やかな表情に整えるために行う処置である。死後の処置の一環として看護職や納棺の専門スタッフ が行い、量が多すぎるとかえって不自然になるため加減が重要とされる。体温の保持や、口を開いた状態で固定するこ とを目的とするものではなく、法令で実施が義務付けられているものでもない。'},
{chapter:3, type:'4', source:'past', text:'湯灌（ゆかん）の意義について、最も適切な説明はどれか。', choices:['単なる身体の洗浄であり、宗教的・精神的な意味は持たない','感染症予防のため法律で実施が義務付けられている','遺体を洗い清めることで現世の穢れを落とし、清らかな姿で旅立たせる意味を持つ','遺体の長期保存を可能にする防腐処置である'], answer:2, explanation:'湯灌は、遺体を湯で洗い清める儀礼であり、現世での穢れや苦しみを洗い流し、清らかな身体で来世へ旅立たせるとい う宗教的・精神的な意味を持つ。産湯になぞらえて新たな世界への再生を願う意味があるとも説明される。身体を清潔 に保つ実際上の効果も伴うが、その本質は単なる洗浄ではなく儀礼である。法律で実施が義務付けられたものではな く、行うかどうかは遺族の意向で決まる。防腐を主目的とするエンバーミングとも異なる。'},
{chapter:3, type:'4', source:'past', text:'湯灌などで用いられる「逆さ水」の説明として、正しいものはどれか。', choices:['湯に水を足して適温にしたもの','水に湯を足してぬるま湯にする、日常とは逆の手順によるもの','川の水を下流から上流へ向かって汲んだもの','一度沸騰させて完全に冷ました水のこと'], answer:1, explanation:'逆さ水とは、たらいなどにまず水を張り、そこへ湯を足してぬるま湯に整えたもの、またはその手順をいう。日常の「湯 に水を足す」のとは逆の順序で行うことからこの名があり、死後の世界は現世と逆さまであるという観念に基づく逆さ ごとの代表例である。湯灌で遺体を洗い清める際などに用いられてきた。日常生活でこの手順を避ける習慣が残るの も、この習俗の影響とされる。川の水の汲み方や湯冷ましを指す言葉ではない。'},
{chapter:3, type:'4', source:'past', text:'現代の湯灌サービスについて、最も適切な説明はどれか。', choices:['現代の湯灌サービスでは遺体に湯を使うことはない','湯灌は寺院の浴室で行うことが法律で定められている','湯灌の実施には医師の立ち会いが必要である','移動式の浴槽を自宅や安置施設に持ち込み、専門スタッフが洗体・洗髪などを行う形が普及している'], answer:3, explanation:'現代の湯灌サービスは、湯灌車などで移動式の浴槽を自宅や安置施設・斎場に運び込み、専門のスタッフが遺族の立ち 会いのもとで洗体・洗髪・洗顔などを行い、その後の死化粧や着せ替えまで一連の流れで進める形が広く普及してい る。バスタオルなどで肌の露出を覆い、故人の尊厳に配慮しながら行われる。かつて家族や近親者がたらいの湯で行っ た湯灌が専門サービスへ発展したものであり、寺院の浴室で行う定めや医師の立ち会いの義務はない。'},
{chapter:3, type:'4', source:'past', text:'仏式の死装束である「経帷子（きょうかたびら）」について、正しいものはどれか。', choices:['故人が生前に愛用していた晴れ着のことである','通常の着物と同じく右前に着せる','神式で用いられる正式な装束である','白い木綿などで仕立てられた仏式の死装束で、着せる際は左前にする'], answer:3, explanation:'経帷子は、白の木綿や麻などで仕立てられた仏式の死装束で、布に経文や名号を書き入れることもある。仕立てに際し て糸の端に玉留めをしないなど、日常の裁縫とは変える習俗を伴う地域もある。着せるときは、通常の着物の右前とは 逆の左前にするのが作法とされ、これは死の世界が現世と逆であるとする逆さごとの観念によるものである。故人が生 前に着ていた晴れ着を指す言葉ではなく、神式の装束とも区別される。'},
{chapter:3, type:'4', source:'past', text:'仏式の死装束で遺体に施される「旅支度」の意味として、最も適切なものはどれか。', choices:['死後の世界への旅立ちの装いとして、手甲・脚絆・六文銭などを身に着けさせるもの','生前の旅行の趣味を偲ぶための演出である','遺体の保温を目的とした実用的な装備である','明治期に法令で定められた葬送時の服装規定である'], answer:0, explanation:'仏式には、死者は冥土へ旅立つという死出の旅の観念があり、経帷子に加えて額に天冠（三角の布）、手に手甲、脚に 脚絆、白足袋や草鞋を着け、杖を添え、頭陀袋に六文銭を納めるなど、巡礼の旅姿になぞらえた旅支度を施す習俗があ る。無事にあの世へたどり着けるようにとの願いが込められたものである。生前の旅行趣味をしのぶ演出や保温のため の装備ではなく、法令で定められた服装規定でもない。'},
{chapter:3, type:'4', source:'past', text:'死装束とともに納められる「六文銭」について、正しいものはどれか。', choices:['故人の財産の象徴として高額の現金を棺に納める習俗である','三途の川の渡し賃とされ、現在は紙に印刷したものを頭陀袋に納めることが多い','遺族が形見分けとして保管する貨幣である','神式の葬儀にのみ用いられるものである'], answer:1, explanation:'六文銭は、死者が三途の川を渡るときの渡し賃として頭陀袋に納める六枚の銭である。現在では、実物の硬貨を棺に入 れて燃やすことは貨幣損傷等取締法との関係や燃え残りの問題から適当でないため、紙に印刷した六文銭を納めるのが 一般的となっている。冥土の旅の路銀を持たせるという死出の旅の観念に基づく仏式の習俗であり、神式に固有のもの ではない。高額の現金を納める習俗や、遺族が保管する形見の品とも異なる。'},
{chapter:3, type:'4', source:'past', text:'浄土真宗における死装束の考え方として、正しいものはどれか。', choices:['他宗派より厳重な旅支度を施す','旅支度に加えて武具を身に着けさせる','臨終と同時に阿弥陀仏の浄土に往生すると考えるため、死出の旅支度は行わない','他の宗派と全く同じ旅支度を行う'], answer:2, explanation:'浄土真宗では、人は臨終と同時に阿弥陀如来の働きによってただちに浄土へ往生すると考えるため、死者が冥土を旅す るという観念がなく、天冠・手甲・脚絆・六文銭といった死出の旅支度は行わないのが基本である。遺体には白服を着 せるなど簡素に整えられる。同様の理由から、守り刀や清め塩も本来は用いないとされる。宗派の死生観の違いが葬送 の作法に表れる代表的な例であり、厳重な旅支度をするという理解は誤りである。'},
{chapter:3, type:'4', source:'past', text:'現代における死装束の傾向について、最も適切な記述はどれか。', choices:['法令により経帷子以外を着せることは禁止されている','エンディングドレスや故人が愛用した服を着せるなど、死装束は多様化している','死装束は黒色のものに限ると定められている','死装束は遺族が必ず手縫いで用意しなければならない'], answer:1, explanation:'現代では、伝統的な経帷子のほか、エンディングドレスと呼ばれる現代的な死装束や、故人が生前に愛用していた服、思 い入れのある衣装を着せる例が増え、死装束の選択は多様化している。故人らしい姿で見送りたいという遺族の意向や 宗教観の変化が背景にある。死装束について法令上の定めはなく、色や素材、用意の方法が法律で制限されているわけ ではない。ただし火葬を考慮し、金具など燃えにくい装飾は避ける配慮が望ましい。'},
{chapter:3, type:'4', source:'past', text:'納棺の儀式について、一般的な在り方として最も適切なものはどれか。', choices:['納棺は葬祭業者だけで行い、遺族は立ち会わないものとされている','納棺は必ず火葬当日の朝に行うこととされている','遺体はうつ伏せの姿勢で棺に納める','遺族・近親者が立ち会い、皆の手で遺体を棺に納めることが多い'], answer:3, explanation:'納棺は、死装束などを整えた遺体を棺に納める儀式で、遺族や近親者が立ち会い、皆の手で身体を支えて納める形が広 く行われている。故人に触れて別れを実感する大切な機会とされ、納棺師などの専門スタッフが関わる場合も、遺族の 参加を促しながら進めるのが一般的である。時期は通夜までに行うことが多く、火葬当日の朝と決められているわけで はない。遺体は仰向けに納め、夜具や副葬品を整えてから蓋をする。'},
{chapter:3, type:'4', source:'past', text:'棺に納める副葬品として避けるべきものの組み合わせはどれか。', choices:['ガラス製品・金属製品・スプレー缶などの不燃物や危険物','故人にあてた手紙や寄せ書き','少量の折り紙や千羽鶴','故人が好きだった菓子（少量）'], answer:0, explanation:'副葬品は火葬されることを前提に選ぶ必要がある。ガラス製品や金属製品は燃え残って遺骨を傷つけたり変色させたり するおそれがあり、スプレー缶・ライター・電池などは炉内で爆発する危険があるため、棺に納めてはならない。一 方、手紙や寄せ書き、少量の折り紙や菓子などの燃えやすい品は、一般に副葬品とすることができる。判断に迷う物に ついては、火葬場の取り決めを踏まえて葬祭業者が適切に案内することが求められる。'},
{chapter:3, type:'4', source:'past', text:'心臓ペースメーカーを装着した遺体の火葬について、正しい対応はどれか。', choices:['ペースメーカーは火葬に全く影響しないため特段の対応は不要である','遺族が自ら取り外してから火葬しなければならない','火葬時に破裂するおそれがあるため、装着の事実を葬祭業者や火葬場に申告する','ペースメーカー装着者の火葬は法律で禁止されている'], answer:2, explanation:'心臓ペースメーカーは、内蔵された電池が火葬中の高温によって破裂し、火葬炉の損傷や係員の負傷につながるおそれ がある。このため装着している場合には、葬祭業者を通じて火葬場へ申告することが必要である。申告を受けた火葬場 では、炉の運転を調整するなどの対応がとられる。摘出が必要となる場合の処置は医療機関で行われるものであり、遺 族が取り外すことはできない。装着していても火葬自体が法律で禁じられるわけではない。'},
{chapter:3, type:'4', source:'past', text:'故人が愛用していたメガネや指輪などの金属・ガラス類について、適切な扱いはどれか。', choices:['必ず棺に入れて遺体とともに火葬する','貴金属は高温で完全に燃え尽きるため副葬品に適している','金属製品は棺に入れても遺骨に影響を与えることはない','火葬後に骨壺へ納めるなど、棺に入れない方法を提案するのがよい'], answer:3, explanation:'メガネや指輪などのガラス・金属製品は火葬しても燃えずに残り、高温で溶けて遺骨に付着したり、変色させたりするお それがあるため、棺には入れないのが原則である。故人の愛用品を一緒に送りたいという遺族には、火葬後に骨壺へ納 める方法や、形見として手元に残す方法を提案するのが葬祭ディレクターとして適切な対応である。貴金属が高温で燃え 尽きることはなく、金属製品が遺骨に影響を与えないという理解も誤りである。'},
{chapter:3, type:'4', source:'past', text:'副葬品としての書籍や果物について、適切な考え方はどれか。', choices:['厚い書籍も紙製品なので冊数を問わず納めてよい','分厚い書籍や大きな果物は燃え残りや火葬時間延長の原因となるため避ける','辞書類を複数冊納めるのが正式の作法である','スイカなどの大きな果物は炉内の温度を適切に保つため推奨される'], answer:1, explanation:'紙製品であっても、辞書のように分厚い書籍は内部まで火が通りにくく、燃え残りや火葬時間の延長、遺骨への付着な どの原因となるため、副葬品としては避けるのが原則である。思い出の本は一部のページを納めるなどの工夫が考えら れる。スイカやメロンのような水分の多い大きな果物も燃焼を妨げるため、納める場合は小さく切るなどの配慮が必要 となる。これらを多量に納めることが正式な作法とされた事実はない。'},
{chapter:3, type:'4', source:'past', text:'棺の種類に関する記述として、正しいものはどれか。', choices:['棺は全国共通の一種類のみで、選択の余地はない','布張棺とは石材の表面に布を張った棺をいう','天然木を用いた木棺や、合板の表面に布を張った布張棺など、複数の種類がある','日本の火葬では石棺が最も広く用いられている'], answer:2, explanation:'日本で用いられる棺には、桐・檜・樅などの天然木で作られた木棺、合板を芯材として表面に布を張った布張棺、彫刻 を施した棺など複数の種類があり、材質・装飾・価格帯は幅広い。火葬を前提とするため、燃えやすい木質系の材料で 作られているのが基本であり、石棺が広く用いられているという事実はない。布張棺の芯材は石材ではなく木質の合板 である。遺族の希望や予算に応じた棺の提案は、葬祭ディレクターの大切な業務である。'},
{chapter:3, type:'4', source:'past', text:'棺の大きさの選び方として、最も適切なものはどれか。', choices:['故人の身長に応じて、ゆとりのある適切な寸法の棺を選ぶ','棺の寸法は一種類に統一されているため選ぶ必要はない','故人の体重だけを基準にして選ぶ','身長よりも小さめの棺を選ぶのが作法である'], answer:0, explanation:'棺は六尺（約180センチメートル）を標準として複数の寸法が用意されており、故人の身長に対して10センチメートル程 度以上の余裕がある棺を選ぶのが基本である。身長の高い人には六尺五寸や七尺などの長尺棺、体格のよい人には幅広 の棺を用いることもある。その際には、使用する火葬炉に納まる寸法であるかの確認も欠かせない。寸法が一種類しか ないという事実はなく、体重だけを基準に選ぶものでも、小さめを選ぶ作法があるわけでもない。'},
{chapter:3, type:'4', source:'past', text:'エンバーミング（遺体衛生保全）の説明として、最も適切なものはどれか。', choices:['遺体を低温の保冷庫で冷凍保存する技術である','血液を防腐剤（保全液）に置き換えるなどして遺体を衛生的に保全する技術である','遺体を直ちに火葬するための行政手続である','遺骨を樹脂で加工して保存する技術である'], answer:1, explanation:'エンバーミングは遺体衛生保全とも呼ばれ、動脈から保全液（防腐剤）を注入して血液と置き換え、体腔内の処置や必 要な修復を行うことにより、遺体の腐敗を防いで衛生的に保全する技術である。専門の教育を受けたエンバーマーが専 用の施設で処置を行う。薬液によって保全する点で、ドライアイスや保冷庫など低温による一時的な保全とは方法が根本 的に異なり、冷凍保存ではない。火葬のための行政手続や遺骨の加工技術でもない。'},
{chapter:3, type:'4', source:'past', text:'エンバーミングの主な目的として、最も適切な組み合わせはどれか。', choices:['遺体を永久に保存することのみを目的とする','火葬そのものを不要にすることを目的とする','腐敗防止による保全、感染防止、損傷部の修復などを目的とする','死因を究明することを目的とする'], answer:2, explanation:'エンバーミングの目的は、薬液による殺菌・消毒で遺族らへの感染の危険を減らすこと、腐敗を防いで遺体を一定期間 良好な状態に保つこと、闘病や事故でやつれたり損傷したりした容貌を修復し生前に近い姿に整えることなどにある。 処置によりドライアイスを使わずに対面でき、葬儀まで日数が空く場合や長距離の搬送にも対応しやすくなる。永久保 存を目的とするものではなく、火葬を不要にするものでもない。死因の究明は解剖などの役割である。'},
{chapter:3, type:'4', source:'past', text:'日本におけるエンバーミングの自主基準（IFSA基準）について、正しいものはどれか。', choices:['処置後10日以内に火葬しなければならない','処置により遺体は1年間保存できると定められている','処置に要する時間は50時間以内と定められている','海外移送の場合を除き、死亡と判定された日から50日を超えない範囲で火葬または埋葬することとさ れている'], answer:3, explanation:'日本にはエンバーミングを直接規律する法律がないため、業界団体である日本遺体衛生保全協会（IFSA）が自主基準を定 めている。同基準では、海外移送の場合を除き、エンバーミングを施した遺体は死亡と判定された日から50日を超えて 保全せず、その期間内に火葬または埋葬することとされ、無期限の保存は行わないことが原則となっている。このほか、 遺族の文書による依頼・同意に基づいて処置を行うことなども定められている。10日以内の火葬や1年間の保存、処置時 間の制限といった内容ではない。'},
{chapter:3, type:'4', source:'past', text:'エンバーミングが発達した背景について、正しいものはどれか。', choices:['土葬が中心の欧米で発達し、アメリカでは南北戦争を契機に普及した','火葬率の高い日本で世界に先駆けて開発された','古代エジプトのミイラ製作技術がそのまま現代まで変わらず用いられている','冷凍保存技術の進歩により20世紀末に初めて考案された'], answer:0, explanation:'エンバーミングの源流は古代エジプトのミイラ作りなどに求められるが、現代の技術は、土葬が中心で遺体と対面して 別れを告げる文化を持つ欧米で発達した。特にアメリカでは、南北戦争の際に戦死者を故郷へ送り届けるための防腐処 置として広まったことが普及の契機とされる。日本に本格的に導入されたのは比較的近年のことであり、火葬率の高い日 本で先に開発されたものではない。古代の技術がそのまま使われ続けているわけでもない。'},
{chapter:3, type:'4', source:'past', text:'遺影写真の準備について、最も適切な記述はどれか。', choices:['遺影は白黒写真でなければならないと定められている','全身が写った写真以外は遺影に使用できない','故人の人柄が表れたピントの鮮明な写真を預かり、引き伸ばしや背景などの加工を行って作成する','遺影写真は葬儀が終わってから用意するものである'], answer:2, explanation:'遺影写真は、故人の人柄や表情がよく表れ、ピントが鮮明で顔がなるべく大きく写った写真を遺族から預かり、引き伸 ばしや背景の差し替え、服装の修整などの加工を施して作成するのが一般的である。集合写真やスナップ写真から顔の 部分を拡大して用いることもできる。近年はカラーが主流で、背景や額の色も多様化している。白黒や全身写真に限る 決まりはなく、通夜・葬儀の祭壇に飾るため、原板は打合せの早い段階で預かる必要がある。'},
{chapter:3, type:'4', source:'past', text:'喪主の決定について、一般的な考え方として最も適切なものはどれか。', choices:['喪主は長男が務めることが法律で義務付けられている','故人の配偶者や子など、故人と縁の深い人が務めることが多い','喪主は葬祭業者が務めるものとされている','喪主は故人の友人の中から選出しなければならない'], answer:1, explanation:'喪主は、遺族を代表して葬儀を主宰し、弔問や会葬者のあいさつを受ける立場であり、慣習として故人の配偶者や子 （長男・長女）など、故人と最も縁の深い人が務めることが多い。誰が務めるかについて法律上の定めはなく、家族構 成や事情に応じて決めてよい。高齢の配偶者に代わって子が務める例や、夫婦・きょうだいが連名で務める例もある。 葬祭業者や友人が務めるものと決められているわけではなく、遺族の話し合いで決定される。'},
{chapter:3, type:'4', source:'past', text:'葬儀における「世話役」について、最も適切な説明はどれか。', choices:['受付や会計など、遺族に代わって葬儀の実務を手伝う人のことで、親族や近隣者・友人などに依頼す ることが多い','導師を務める僧侶の別の呼び名である','市区町村から派遣される職員のことである','香典を受け取る権利を持つ相続人の代表者をいう'], answer:0, explanation:'世話役は、葬儀に際して遺族に代わり、受付、会計、携帯品の管理、接待・台所、進行の補助といった実務を引き受け る人をいい、信頼できる親族、近隣の人、故人や遺族の友人・同僚などに依頼することが多い。規模の大きな葬儀で は、全体を取りまとめる世話役代表を置くこともある。特に香典など金銭を扱う会計係は、信頼の置ける人に依頼する ことが重要とされる。僧侶の呼称や行政の派遣職員ではなく、相続上の地位とも関係しない。'},
{chapter:3, type:'4', source:'past', text:'菩提寺がある場合の死亡後の対応として、最も適切なものはどれか。', choices:['菩提寺への連絡は四十九日法要の頃で差し支えない','菩提寺には知らせず、別の寺院に葬儀を依頼するのが通例である','菩提寺への連絡は弔問客の代表が行うこととされている','死亡後できるだけ早く菩提寺に一報を入れ、枕経や戒名、葬儀日程について相談する'], answer:3, explanation:'菩提寺がある場合には、死亡後できるだけ早く一報を入れ、枕経を依頼するとともに、戒名（法名・法号）や通夜・葬 儀の日程について相談するのが適切である。菩提寺の都合を確かめないまま日程を決めると、導師を務めてもらえない 事態が起こりかねない。また、菩提寺に無断で他の寺院へ葬儀を依頼すると、後日の納骨を断られるなどのトラブルに つながるおそれがある。連絡は遺族側から行うものであり、四十九日まで知らせずにおくのは不適切である。'},
{chapter:3, type:'4', source:'past', text:'通夜・葬儀の日程を決める際の考え方として、最も適切なものはどれか。', choices:['喪主の希望だけで決定でき、関係先との調整は不要である','死亡時刻によって日程は自動的に確定する','火葬場の予約状況を考慮する必要はない','火葬場や式場の空き状況、宗教者の都合などを総合的に調整して決める'], answer:3, explanation:'通夜・葬儀の日程は、火葬場の空き状況、式場の予約状況、導師を務める宗教者の都合という三つの要素を軸に、遠方 の親族の到着時間、友引などの暦、死後24時間は火葬できないという法律上の制限なども踏まえ、総合的に調整して決 める。とりわけ火葬場の予約が確保できなければ日程全体が組めないため、その確認は最優先となる。喪主の希望だけ で確定できるものではなく、死亡時刻から自動的に決まるものでもない。'},
{chapter:3, type:'4', source:'past', text:'友引と葬儀日程の関係について、最も適切な記述はどれか。', choices:['友引に通夜を行うことは法律で禁止されている','友引に葬儀を避ける習俗は六曜に由来するもので、友引を休場日とする火葬場が多い','友引は仏教の経典で葬儀を禁じた日である','友引には通夜・葬儀とも一切行うことができない 葬祭ディレクター技能審査 完全対策問題集 第6 章：通夜・葬儀・告別式の実務 （50問）'], answer:1, explanation:'友引は中国から伝わった六曜の一つで、本来は勝負のつかない日を意味したが、「友を引く」という字面から、この日 に葬儀を出すと友をあの世へ引き寄せるとして忌む俗信が広まった。仏教の教義とは本来関係のない迷信由来の習俗だ が、現実には友引を休場日とする火葬場が多いため、葬儀・告別式は友引を避けて日程が組まれることが多い。一方、 通夜は友引の日でも通常どおり行われている。法律で禁止されているわけではない。 葬祭ディレクター技能審査 完全対策問題集 第6章：通夜・葬儀・告別 式の実務'},
{chapter:3, type:'4', source:'past', text:'「半通夜」の説明として最も適切なものはどれか。', choices:['本来は夜を通して故人に付き添う通夜を、夜間の一定時刻までで切り上げる形式の通夜','葬儀の前々日などに近親者のみで営む仮の通夜','通夜を日中の時間帯に行う形式の通夜','通夜振る舞いを省略して読経のみで終える通夜'], answer:0, explanation:'通夜は本来、夜を通して灯明や線香を絶やさず故人に付き添う「通し通夜」の形で営まれてきたが、現代では防火管理 上の制約や弔問客の事情などから、夕方に開式して2〜3時間程度で切り上げる「半通夜」が主流となっている。なお、 葬儀の前々日などに近親者のみで営むものは仮通夜と呼ばれ、半通夜とは区別される。通夜の形式は地域や式場の事情 によっても異なるため、事前の確認が必要である。'},
{chapter:3, type:'4', source:'past', text:'通夜振る舞いに関する記述として最も適切なものはどれか。', choices:['香典への返礼として持ち帰り用の品物を渡すこと','読経の謝礼として僧侶に金品を包んで渡すこと','通夜のあと弔問客に酒食をふるまい、故人への供養と弔問への感謝を表すこと','火葬場へ同行した人に車中で弁当を配ること'], answer:2, explanation:'通夜振る舞いは、通夜の後に弔問客へ酒や料理をふるまう習俗で、故人と共にする最後の食事という供養の意味と、弔問 への感謝の意味を持つとされる。地域性が大きく、関東では一般弔問客にも広く勧めるのに対し、関西などでは近親者 のみで行う地域もある。香典への返礼品や僧侶への謝礼とは性格の異なるものであり、施行にあたっては地域の慣習と 遺族の意向を確認して準備することが大切である。'},
{chapter:3, type:'4', source:'past', text:'通夜の本来の意義として最も適切なものはどれか。', choices:['会葬者から香典を受け取り、会計処理を行うこと','近親者が夜を通して故人に付き添い、灯明や線香を絶やさず見守ること','親族が集まって遺産の分け方について協議すること','葬儀社が祭壇設営の最終確認を行うこと'], answer:1, explanation:'通夜は本来、死者の蘇生を願い、また遺体を邪霊などから守るために、近親者が夜を徹して遺体に付き添い、灯明や線 香を絶やさずに見守る儀礼であったとされる。現代では一般弔問客を迎える儀式としての性格が強まり、夜間の一定時 間で終える半通夜が主流となっているが、故人とともに最後の夜を過ごすという本来の意味は今も受け継がれている。 香典の会計や遺産の協議のための場ではない。'},
{chapter:3, type:'4', source:'past', text:'通夜の受付開始時刻について、一般的な実務上の目安として最も適切なものはどれか。', choices:['開式と同時に受付を開始する','開式の3時間以上前から受付を開始する','開式の5分前を目安に受付を開始する','開式の30分から1時間程度前を目安に受付を開始する'], answer:3, explanation:'通夜の受付は、弔問客が開式前に余裕をもって記帳し着席できるよう、開式の30分から1時間程度前に開始するのが一般 的な目安である。受付開始までに芳名帳や筆記用具、香典受け、返礼品などを整え、受付係に対して香典の取り扱いや 式場の案内方法を説明しておく。開式直前の受付開始では弔問客が集中して混雑を招き、開式の遅れにつながるため、 時間に余裕を持った準備が実務の基本となる。'},
{chapter:3, type:'4', source:'past', text:'通夜における喪主挨拶の内容として最も適切なものはどれか。', choices:['弔問への感謝と生前の厚誼への御礼を述べ、翌日の葬儀・告別式の日時を案内する','いただいた香典の金額と内訳を報告する','故人の遺産の処分方針について説明する','弔問客一人ひとりの氏名を読み上げて紹介する'], answer:0, explanation:'通夜における喪主挨拶では、弔問への感謝と、故人が生前に賜った厚誼への御礼を述べ、あわせて翌日の葬儀・告別式 の日時や場所を案内するのが一般的である。通夜振る舞いの席を設けている場合には、その案内も併せて行う。挨拶は 簡潔にまとめることが望ましく、司会者は挨拶を行うタイミングや内容の要点について、開式前に喪主と打ち合わせを しておくと進行が円滑になる。'},
{chapter:3, type:'4', source:'past', text:'葬儀式（葬儀）の本来の性格として最も適切なものはどれか。', choices:['友人・知人が故人に別れを告げる社会的儀礼である','遺族・近親者を中心に、宗教的儀礼によって故人をあの世へ送る儀式である','行政機関に死亡の事実を届け出る法的手続である','会葬者に酒食をふるまうための社交的な宴席である'], answer:1, explanation:'葬儀式は、宗教的儀礼にのっとって故人をこの世からあの世へ送るための儀式であり、本来は遺族・近親者を中心とし て営まれるものである。これに対して告別式は、友人・知人など故人と縁のあった人々が最後の別れを告げる社会的儀 礼であり、宗教性を本質としない点で区別される。現代では両者が一体化し「葬儀・告別式」として連続して営まれる ことが多いが、両者の性格の違いを理解しておくことが大切である。'},
{chapter:3, type:'4', source:'past', text:'告別式の本来の性格として最も適切なものはどれか。', choices:['導師が故人に引導を渡すための宗教的儀礼である','遺族のみが参列して営む宗教上の儀式である','友人・知人など故人と縁のあった人々が別れを告げる社会的儀礼である','戒名を授けるために寺院で行う儀式である'], answer:2, explanation:'告別式は、故人と生前に縁のあった友人・知人らが最後の別れを告げるための社会的儀礼であり、宗教的儀礼である葬 儀式とは本来性格を異にする。明治34年に行われた中江兆民の告別式が、宗教儀礼によらない告別式の始まりとして知 られている。現代では葬儀式に続けて告別式を行い、両者を一体のものとして営む形が一般化しているが、概念上の区 別は葬祭実務者として理解しておくべき基本知識である。'},
{chapter:3, type:'4', source:'past', text:'現代における葬儀式と告別式の関係について最も適切な記述はどれか。', choices:['法律により葬儀式と告別式は別の日に行うよう定められている','告別式を行う場合は葬儀式を省略しなければならない','葬儀式と告別式は会場を分けて同時刻に並行して行うのが原則である','本来は別の性格の儀式であるが、現代では一体化して連続的に行われることが多い'], answer:3, explanation:'葬儀式は宗教的儀礼、告別式は社会的儀礼として本来は別個の性格を持つ儀式であるが、現代の実務では時間や会場の 制約などから両者を厳密に区別せず、一連の式として連続的に営む形が広く定着している。読経の間に一般会葬者の焼 香を組み込むなど、進行のうえでも一体化している例が多い。実施の方法や順序について法律上の定めはなく、宗教・ 宗派、地域慣習、遺族の意向に応じて柔軟に組み立てられている。'},
{chapter:3, type:'4', source:'past', text:'仏式の葬儀・告別式における一般的な式次第の順序として最も適切なものはどれか。', choices:['開式の辞→読経→弔辞拝受→弔電奉読→焼香→閉式の辞','焼香→弔辞拝受→開式の辞→読経→閉式の辞→弔電奉読','読経→開式の辞→焼香→弔電奉読→弔辞拝受→閉式の辞','開式の辞→焼香→閉式の辞→読経→弔辞拝受→弔電奉読'], answer:0, explanation:'仏式の葬儀・告別式は、開式の辞に始まり、僧侶による読経や引導、弔辞拝受、弔電奉読と続き、喪主以下の焼香を経て 閉式の辞で結び、その後出棺となるのが一般的な流れである。弔辞・弔電を置く位置や焼香の組み込み方など細部は宗 派・地域・式場の事情によって異なるが、開式に始まり閉式で終わる基本の構造を理解したうえで式次第を組み立てる ことが、司会・進行を担う者の基本となる。'},
{chapter:3, type:'4', source:'past', text:'仏式葬儀における「引導」の説明として最も適切なものはどれか。', choices:['会葬者を式場内の席へ案内すること','出棺の際に霊柩車を先導して火葬場へ向かうこと','導師が故人に法を説き、迷いを断ってあの世へ導くために行う儀礼','遺族が会葬者に返礼品を手渡すこと'], answer:2, explanation:'引導とは、葬儀において導師を務める僧侶が故人に対して法語を唱えるなどして、現世への迷いを断ち、仏の世界へ導 くために行う宗教的儀礼である。作法は宗派により異なり、禅宗系では引導法語を唱える一方、浄土真宗では臨終と同 時に往生するという教義から引導を行わないなどの違いがある。葬儀式の宗教的な中核をなす部分であり、司会者は導 師の所作に合わせた進行を心がける必要がある。'},
{chapter:3, type:'4', source:'past', text:'葬儀式場における席次の一般的な配置として最も適切なものはどれか。', choices:['祭壇に向かって左側に遺族・親族が着席する','祭壇に向かって右側に遺族・親族が着席し、血縁の濃い順に祭壇に近い席から座る','遺族・親族は式場の最後方にまとまって着席する','席次に関する慣習はなく、すべて到着した順に自由に着席する'], answer:1, explanation:'一般的な席次では、祭壇に向かって右側が遺族・親族席とされ、喪主を筆頭に血縁の濃い順に祭壇に近い席から着席す る。向かって左側には世話役代表や来賓、友人・知人などが座り、一般会葬者はその後方に着席する。ただし席次の取 り方には地域差があり、式場の構造によっても変わるため、施行担当者は地域の慣習と遺族の意向を確認したうえで席 次を定め、案内係にも周知しておくことが重要である。'},
{chapter:3, type:'4', source:'past', text:'一般的な葬儀式場で、世話役代表や来賓が着席する位置として最も適切なものはどれか。', choices:['祭壇に向かって左側の前方','祭壇に向かって右側の最前列','祭壇の真後ろに設けた席','受付のすぐ隣に設けた席'], answer:0, explanation:'一般的な式場配置では、祭壇に向かって右側に喪主以下の遺族・親族が血縁の濃い順に着席し、向かって左側の前方に 世話役代表や来賓など、故人や遺族と関係の深い会葬者が着席する。友人・知人がこれに続き、一般会葬者は後方の席に 着く。この配置はあくまで一般的な目安であり、地域の慣習や式場の構造によって異なる場合があるため、設営の段階 で喪主や世話役と確認しておくことが求められる。'},
{chapter:3, type:'4', source:'past', text:'仏式葬儀における焼香の一般的な順序として最も適切なものはどれか。', choices:['一般会葬者→来賓→親族→遺族→喪主','来賓→喪主→一般会葬者→遺族→親族','親族→遺族→喪主→来賓→一般会葬者','喪主→遺族→親族→来賓・一般会葬者'], answer:3, explanation:'焼香は故人と血縁の深い順に行うのが原則であり、喪主が最初に焼香し、続いて遺族、親族、その後に世話役代表や来 賓、一般会葬者の順で行うのが一般的である。遺族・親族の中での順序も、席次と同様に血縁の濃い順とされる。焼香 の順序は親族間の感情に関わりやすく、トラブルの原因にもなり得るため、施行担当者は事前に喪主と順序を確認し、 必要に応じて名簿を整えておくことが望ましい。'},
{chapter:3, type:'4', source:'past', text:'一部の地域で行われる「止め焼香」の趣旨として最も適切なものはどれか。', choices:['焼香の回数を一人一回に制限する取り決めのこと','開式前に遺族だけで焼香を済ませておくこと','親族焼香の最後に縁の深い者が焼香して締めくくり、順序への不満を残さないようにする習俗','香炉の火を消して焼香の受付を終了すること'], answer:2, explanation:'止め焼香は主に関西地方などにみられる習俗で、親族焼香の最後に、故人と縁の深い親族が「留め」として焼香し、一 連の焼香を締めくくるものである。最後に身内の代表が控えることで、焼香の順番が多少前後しても角が立たないよう にするという、順序をめぐる親族間の不満やわだかまりを防ぐ意味があるとされる。あくまで地域の慣習であるため、 施行する地域の習俗と遺族の意向を確認して対応する。'},
{chapter:3, type:'4', source:'past', text:'葬儀受付における芳名帳（会葬者名簿）の主な役割として最も適切なものはどれか。', choices:['香典の金額を一覧にして会葬者に公開するための台帳','会葬者の氏名・住所を記録し、後日の御礼や香典返しなど遺族の事後対応に役立てる名簿','式場内の座席を指定するために配布する整理簿','葬儀社が営業活動のために顧客情報を集める台帳'], answer:1, explanation:'芳名帳（会葬者名簿）は、会葬者に氏名と住所を記帳してもらい、誰が会葬してくれたかを記録するためのものであ る。遺族が後日、会葬への御礼や香典返し、法要の案内などを行う際の基礎資料となるため、住所まで正確に記帳して もらうよう受付係から依頼することが望ましい。香典帳とともに遺族へ確実に引き継ぐべき重要な記録であり、紛失や 取り違えのないよう管理には十分な注意を要する。'},
{chapter:3, type:'4', source:'past', text:'受付係による香典の取り扱いとして最も適切なものはどれか。', choices:['記帳と照合できるよう整理し、会計係へ確実に引き継いで一括管理する','受付係が個々に保管し、後日それぞれ遺族宅へ届ける','その場で開封して中身だけを保管し、香典袋は処分する','金額をその場で確認して読み上げ、会葬者に相違ないか確かめる'], answer:0, explanation:'香典は遺族に属する大切な金銭であり、受付係は受け取った香典に番号を付けるなどして芳名帳の記帳と照合できるよ う整理し、会計係へ確実に引き継ぐことが基本となる。香典袋には住所や金額が記されているため袋ごと保管し、開封 や集計は会計係が複数人で行うのが望ましい。受付に現金を放置せず、責任者を決めて一括管理する体制を整えること が、紛失や盗難を防ぐうえで実務上きわめて重要である。'},
{chapter:3, type:'4', source:'past', text:'会葬返礼品について、即日返し（当日返し）を採用している場合の一般的な実務として最も適切なものはどれ か。', choices:['香典の金額をその場で確かめ、金額に応じて異なる品を選んで渡す','当日は何も渡さず、四十九日法要の後に全員へ郵送する','香典の額にかかわらず一律の品を、会葬礼状とともに当日手渡す','返礼品は後日喪主が一軒ずつ持参して手渡すよう法律で定められている'], answer:2, explanation:'即日返し（当日返し）は、忌明け後に贈る香典返しに代えて、会葬当日に香典の額にかかわらず一律の品を会葬礼状と ともに手渡す方式で、遺族の事後の負担を軽減できることから広く普及している。受付で香典を受けた際や焼香後の退 出時に渡すのが一般的である。高額の香典をいただいた方には、忌明け後に改めて差額相当の品を贈って対応する。実 施するかどうかは地域の慣習と遺族の意向を踏まえて決める。'},
{chapter:3, type:'4', source:'past', text:'葬儀開式前に施行担当者が受付係に説明しておくべき事項として最も適切なものはどれか。', choices:['故人の死因や病歴の詳細','香典の予想総額と遺産の内容','僧侶に渡す布施の金額','記帳の依頼方法、香典の受け取りと引き継ぎ、返礼品の渡し方、式場や控室の案内'], answer:3, explanation:'受付係は遺族に代わって会葬者に最初に応対する重要な役割を担うため、施行担当者は開式前に、芳名帳への記帳依頼 の仕方、香典の受け取り方と会計係への引き継ぎ方法、返礼品を渡すタイミング、式場内の席や控室・トイレなどの案 内について具体的に説明しておく必要がある。受付係は世話役など遺族側の関係者が務めることが多く、丁寧な事前の 打ち合わせが式全体の円滑な進行につながる。'},
{chapter:3, type:'4', source:'past', text:'弔電で用いられる敬称「ご尊父様」が指す続柄として正しいものはどれか。', choices:['受取人の祖父','受取人の父','受取人の夫','差出人の父'], answer:1, explanation:'弔電の敬称は受取人（喪主など）から見た故人の続柄を表すもので、「ご尊父様」は受取人の父を指す。母は「ご母堂 様」、夫は「ご主人様」、妻は「ご令室様」などと表されるのが一般的である。司会者が弔電を奉読する際に敬称の意 味を取り違えると、誰の逝去への弔意であるかを誤って伝えることになり、遺族にも差出人にも失礼となるため、事前に 文面を確認しておくことが司会実務の基本である。'},
{chapter:3, type:'4', source:'past', text:'弔電において、受取人（喪主）の妻を指す敬称として最も適切なものはどれか。', choices:['ご令室様','ご母堂様','ご息女様','ご尊父様'], answer:0, explanation:'弔電において受取人の妻を指す敬称としては「ご令室様」が広く用いられる。父は「ご尊父様」、母は「ご母堂様」、 娘は「ご息女様」や「ご令嬢様」などと表される。これらの敬称は日常では使う機会の少ない格式の高い言葉であるた め、司会者は奉読前に必ず文面に目を通し、続柄や読み方を確認しておく必要がある。敬称の知識は、弔電奉読を担う 司会者にとって欠かすことのできない基礎知識である。'},
{chapter:3, type:'4', source:'past', text:'司会者が弔電を奉読する際の実務として最も適切なものはどれか。', choices:['届いた弔電はすべて全文を読み上げなければならない','差出人名は個人情報にあたるため、すべて伏せて読む','内容は確認せず、届いた順にそのまま読み上げる','喪主側と相談して奉読する弔電を選び、数通は全文を、その他は差出人名のみを紹介する'], answer:3, explanation:'弔電が多数寄せられた場合、すべてを全文奉読すると式の進行に支障をきたすため、喪主や世話役と相談のうえで特に 重要な数通を選んで全文を奉読し、残りは差出人の氏名・肩書のみを紹介するのが一般的な実務である。奉読の順序 は、故人や遺族との関係の深さ、社会的立場などを考慮して決める。氏名や会社名・肩書には読み誤りが許されないた め、事前に読み方を確認しておくことが不可欠である。'},
{chapter:3, type:'4', source:'past', text:'開式前に司会者が行う場内アナウンスの内容として最も適切なものはどれか。', choices:['香典の金額の目安を具体的に案内する','故人の死因と臨終の経過を詳しく説明する','開式が近いことを告げて着席を促し、携帯電話の設定など式中の注意事項を案内する','返礼品の内容と仕入価格を紹介する'], answer:2, explanation:'開式前のアナウンスでは、まもなく開式となる旨を告げて着席を促すとともに、携帯電話をマナーモードに設定するこ とや式場内での写真撮影を控えることなど、式中の注意事項を簡潔に案内するのが一般的である。これにより会葬者が 落ち着いて儀式に臨める環境を整えることができる。司会者は厳粛な雰囲気を損なわないよう、落ち着いた口調と適切 な音量を心がけ、進行に変更がある場合は丁寧に案内する。'},
{chapter:3, type:'4', source:'past', text:'葬儀司会者の進行時間管理として最も適切なものはどれか。', choices:['読経や焼香の所要時間を見積もり、出棺や火葬場到着の予定時刻から逆算して進行を管理する','時間の管理はすべて導師に任せ、司会者は関与しない','式を早く終えるため、弔辞や焼香を省略して進行を詰める','火葬場の予約時刻は考慮せず、式が自然に終わるまで見守る'], answer:0, explanation:'葬儀・告別式は火葬場の予約時刻という動かしがたい制約の中で営まれるため、司会者は読経・弔辞・弔電・焼香など それぞれの所要時間を見積もり、出棺予定時刻から逆算して式全体の進行を管理する必要がある。会葬者が多く焼香に 時間を要すると見込まれる場合は、焼香の列を増やすなどの調整を式場係と連携して行う。時間を優先するあまり儀式 の厳粛さを損なわないよう、両立を図ることが司会の力量である。'},
{chapter:3, type:'4', source:'past', text:'弔辞の依頼に関する実務として最も適切なものはどれか。', choices:['開式の直前に式場で口頭により依頼する','葬儀の日程が決まり次第できるだけ早く依頼し、故人との関係を踏まえて人選する','依頼はせず、当日申し出のあった人に読んでもらう','文面は遺族が用意し、読み手は当日くじ引きで決める'], answer:1, explanation:'弔辞は故人と関係の深かった人に依頼するものであり、依頼を受けた側には文面を考えて準備する時間が必要となるた め、葬儀の日程が決まり次第、できるだけ早く依頼するのが礼儀とされる。人選は故人との親交の深さや社会的な関係 を踏まえて喪主・遺族が行い、依頼の際には日時・場所、弔辞の長さの目安、ほかに弔辞を読む人の有無などを伝えて おくと、依頼された側も準備がしやすくなる。'},
{chapter:3, type:'4', source:'past', text:'複数の人に弔辞を依頼した場合の奉読順序の決め方として最も適切なものはどれか。', choices:['読む人の氏名の五十音順とする','読む人の年齢の若い順とする','故人との関係や社会的立場を考慮し、あらかじめ喪主側と相談して決めておく','当日式場に到着した順とする'], answer:2, explanation:'弔辞が複数ある場合の奉読順序は、故人との関係の深さや社会的立場、会社関係・友人関係などの間柄のバランスを考 慮し、あらかじめ喪主・遺族と相談して決めておくのが実務の基本である。司会者は決定した順序に従い、氏名や肩書 の読み方を事前に確認したうえで紹介する。順序を当日の偶然に委ねると、紹介の混乱や関係者の心情を損なう事態を 招きかねないため、事前の取り決めが欠かせない。'},
{chapter:3, type:'4', source:'past', text:'祭壇周りに供花を並べる際の一般的な配置の原則として最も適切なものはどれか。', choices:['贈り主の氏名の五十音順に左右へ並べる','供花の価格の安い順に祭壇の近くへ並べる','式場に届いた順に祭壇から遠い位置へ並べる','祭壇に近い位置ほど上位とし、喪主・遺族・親族のものから順に関係の深さに応じて配置する'], answer:3, explanation:'供花は祭壇に近い位置ほど上位とされ、喪主や子ども一同、孫一同など遺族・親族からのものを祭壇のすぐ近くに配置 し、次いで親しい友人、会社関係、一般の関係者のものを順に外側へ並べていくのが一般的である。芳名札の出し方や 対の組み方には地域差がある。供花の配置は贈り主への配慮に直結し、並べ方を誤ると苦情の原因にもなるため、設営 時に喪主や世話役に確認してもらうことが重要である。'},
{chapter:3, type:'4', source:'past', text:'供花・供物の芳名札に関する設営時の実務として最も適切なものはどれか。', choices:['氏名・会社名・肩書の文字を受注控えと照合し、並べる位置とともに喪主側に確認してもらう','芳名札は式の雰囲気を損なうため、飾る前にすべて取り外して処分する','名札の誤字は式が終わってから訂正すれば足りる','並び順は葬儀社のみの判断で決め、遺族には確認を求めない'], answer:0, explanation:'供花・供物の芳名札は贈り主の弔意を表すものであり、氏名や会社名・肩書の誤字、社名の表記の誤りは贈り主に対す る重大な失礼となる。設営の際には受注控えなどと照合して文字を確認し、並べる順序や位置についても喪主や世話役 に事前に確認してもらうことが不可欠である。誤りが開式後に見つかると訂正が間に合わず、葬儀社への信頼を損なう 事態にもつながるため、開式前の点検を徹底する。'},
{chapter:3, type:'4', source:'past', text:'神式の葬儀（神葬祭）における供物に関する記述として最も適切なものはどれか。', choices:['最上段に線香と抹香を供える','線香・抹香は用いず、米・酒・魚・野菜・果物などの神饌を供える','数珠を祭壇の中央に供える','供物はすべて精進物の盛籠でなければならない'], answer:1, explanation:'神式の葬儀（神葬祭）では、仏式と異なり線香や抹香を用いず、焼香に代わって玉串奉奠が行われる。供物としては 米・酒・塩・水のほか、魚や野菜、果物などの神饌を供えるのが特徴である。仏式で用いる線香やろうそく、数珠など は神式にはなじまない。供物や供花を手配する際には宗教・宗派の確認が欠かせず、宗教による供物の違いを理解して おくことは葬祭ディレクターの基本的な知識である。'},
{chapter:3, type:'4', source:'past', text:'キリスト教式の葬儀における供花・供物の一般的な慣行として最も適切なものはどれか。', choices:['抹香を焚いた香炉を祭壇に供える','缶詰や乾物の盛籠を祭壇の左右に多数並べる','故人の好んだ酒を祭壇に供えるのが正式である','供物を供える習慣はなく、生花を贈るのが一般的である'], answer:3, explanation:'キリスト教式の葬儀では、仏式のような盛籠などの供物や線香・抹香を用いる習慣はなく、贈るのは生花とするのが一 般的である。供花は白を基調とした洋花が中心で、教会によっては芳名札を立てない場合もあるため、教会や遺族への 事前確認が必要となる。香典に相当する金包みの表書きには「御花料」などが用いられる。仏式との違いが多いため、 宗教ごとの慣行を正しく理解しておくことが実務上重要である。'},
{chapter:3, type:'4', source:'past', text:'出棺前に行われる「別れ花」の説明として最も適切なものはどれか。', choices:['霊柩車の屋根に花輪を取り付けて飾ること','会葬者に花束を配って持ち帰ってもらうこと','閉式後に棺の蓋を開け、遺族らが祭壇の花などを故人の周りに入れて最後の対面をすること','火葬場の炉前に花を敷き詰めて飾ること'], answer:2, explanation:'別れ花は、葬儀・告別式の閉式後に棺の蓋を開け、遺族・近親者が祭壇に供えられていた生花などを故人の周囲に手向 けながら最後の対面をする儀礼である。故人と縁の深い順に花を入れていくのが一般的で、愛用品などの副葬品をこの ときに納めることも多い。出棺前の最も感情のこもる場面であり、施行担当者は時間配分に配慮しながらも、遺族が心 ゆくまで別れを惜しめるよう静かに進行を支える。'},
{chapter:3, type:'4', source:'past', text:'出棺前の「釘打ちの儀」に関する記述として最も適切なものはどれか。', choices:['棺の蓋に遺族らが小石などで釘を打つ習俗であるが、現代では省略されることが多い','法律で義務づけられており、行わなければ火葬許可が取り消される','会葬者全員が一人ずつ釘を打ち終えるまで出棺できない決まりがある','僧侶だけが行う宗教儀礼であり、遺族が加わることはない'], answer:0, explanation:'釘打ちの儀は、出棺に先立って棺の蓋に遺族・近親者が小石などで釘を打ち納める習俗で、故人が無事にあの世へ渡れ るようにとの願いなどが込められていると伝えられる。しかし遺族の心情への配慮や棺の構造の変化などから、現代で は省略される場合が多くなっている。法律上の義務ではなく、行うか否かは地域の慣習と遺族の意向によるため、施行 担当者は事前に確認したうえで対応することが望ましい。'},
{chapter:3, type:'4', source:'past', text:'出棺の際の棺の搬出方法として一般的とされるものはどれか。', choices:['故人の頭側を先にして搬出する','故人の足側を先にして搬出する','棺を縦に立てた状態で搬出する','蓋を開けたまま搬出する'], answer:1, explanation:'出棺の際は、故人の足側を先にして棺を搬出するのが一般的とされる。これには、故人が再び家に戻らないようにとい う意味などが込められていると伝えられている。棺は遺族・近親者らが数人で持つか、式場係が台車を用いるなどして 丁重に運び、霊柩車に納める。地域によって作法の細部が異なる場合があるため、その地域の慣習を確認し、傾けたり ぶつけたりすることのないよう細心の注意を払って取り扱う。'},
{chapter:3, type:'4', source:'past', text:'出棺時に位牌と遺影を持つ人の一般的な組み合わせとして最も適切なものはどれか。', choices:['位牌は葬儀社の担当者が、遺影は僧侶が持つ','位牌は受付係が、遺影は司会者が持つ','位牌は喪主が持ち、遺影は喪主に次いで故人と縁の深い遺族が持つ','位牌と遺影はいずれも霊柩車の運転手が携行する'], answer:2, explanation:'出棺の際は、白木の位牌を喪主が胸の高さに捧げ持ち、遺影は喪主に次いで故人と縁の深い遺族が持つのが一般的であ る。位牌・遺影を持つ者は棺とともに霊柩車へ向かい、火葬場にも同行する。誰が位牌を持ち、誰が遺影を持つかは、 出棺の直前に慌てることのないよう事前に遺族と打ち合わせて決めておく。地域や宗派によって作法が異なることもあ るため、慣習の確認も忘れてはならない。'},
{chapter:3, type:'4', source:'past', text:'出棺時に行われる喪主（遺族代表）の挨拶の内容として最も適切なものはどれか。', choices:['会葬への感謝と生前の厚誼への御礼を述べ、遺族への今後の支援をお願いする','香典の総額を報告し、葬儀費用の収支を説明する','利用した葬儀社のサービス内容を紹介して講評する','遺産相続の配分の決定内容を発表する'], answer:0, explanation:'出棺に際しての喪主（遺族代表）挨拶は、見送りの会葬者に対し、会葬への感謝と故人が生前に賜った厚誼への御礼を 述べ、残された遺族への変わらぬ支援をお願いする内容が一般的である。故人の人柄や最期の様子に簡潔に触れること もある。挨拶は位牌・遺影を持った遺族が並ぶ中で行われるため、長くなりすぎないようにまとめ、終了後は速やかに 出棺できるよう司会者や式場係と連携して進行する。'},
{chapter:3, type:'4', source:'past', text:'火葬場への同行者と車両手配に関する実務として最も適切なものはどれか。', choices:['同行者は当日その場で募り、車には到着した順に乗ってもらう','火葬場には喪主一人だけが同行することと定められている','一般会葬者を含む全員を必ず火葬場へ同行させる','同行者の人数を事前に確認し、霊柩車に続く車両の台数と乗車割りを決めておく'], answer:3, explanation:'火葬場へは遺族・近親者など故人と縁の深い人が同行するのが一般的であり、施行担当者は事前に同行者の人数を確認 したうえで、霊柩車に続くハイヤーやマイクロバスなどの台数と乗車割りを決めておく必要がある。位牌・遺影を持つ 喪主らは霊柩車またはその直後の車に乗るのが通例である。当日の混乱を避けるため、乗車の組み分けを記した名簿を 用意し、出棺前に乗車案内を行うことが円滑な進行につながる。'},
{chapter:3, type:'4', source:'past', text:'宮型霊柩車の説明として最も適切なものはどれか。', choices:['バスの車体に棺室と座席を備え、遺族が同乗できる霊柩車','車体後部に宮殿や社寺建築を模した木製の装飾を施した霊柩車','外観が一般の乗用バンとほとんど変わらない搬送用の車両','装飾のないリムジン形の洋風霊柩車'], answer:1, explanation:'宮型霊柩車は、車体の後部に白木造りや漆塗りの宮殿・社寺建築を模した装飾を施した日本独特の霊柩車である。かつ ては広く用いられたが、近年は葬儀の簡素化や沿道・近隣への配慮などから、火葬場によっては乗り入れを制限する例 もみられ、外観の控えめな洋型やバン型の利用が増えている。霊柩車にはほかにバス型などの種類があり、葬儀の形式 や移動人数、地域の事情に応じて選択される。'},
{chapter:3, type:'4', source:'past', text:'バス型霊柩車の特徴として最も適切なものはどれか。', choices:['棺を車体の屋根上に固定して運ぶ構造の車両','オートバイで棺を載せた台車を牽引する車両','車内に棺室を設け、遺族や同行者が棺とともに乗車できる構造の車両','遺影と位牌のみを運ぶための小型車両'], answer:2, explanation:'バス型霊柩車は、バスの車体に棺を納める棺室を設け、遺族や近親者が棺とともに同乗して火葬場へ移動できる構造の 霊柩車である。別にハイヤーやマイクロバスを仕立てる必要がないため、降雪地や火葬場までの距離が長い地域、同行 者を一度にまとめて移動させたい場合などに適している。霊柩車にはこのほか宮型・洋型・バン型があり、葬儀の規模 や形式、地域の事情、遺族の希望に応じて使い分けられる。'},
{chapter:3, type:'4', source:'past', text:'会葬御礼と香典返しの違いに関する記述として最も適切なものはどれか。', choices:['会葬御礼は香典の有無にかかわらず会葬者全員に渡すもので、香典返しは香典への返礼である','会葬御礼は香典の倍額に相当する品を贈るものである','香典返しは会葬しなかった人に限って贈るものである','両者は同一のものであり、地域によって呼び方が異なるにすぎない'], answer:0, explanation:'会葬御礼は、香典の有無にかかわらず会葬していただいたことへの御礼として、会葬礼状とともに会葬者全員に渡す品 である。これに対して香典返しは、香典をいただいたことへの返礼であり、本来は忌明け後に半返しなどの目安で贈る ものとされる。両者は性格の異なるものであるため、香典返しを当日に行う即日返しを採用する場合でも、その区別を 理解し、遺族に正しく説明できることが実務上求められる。'},
{chapter:3, type:'4', source:'past', text:'会葬礼状に関する記述として最も適切なものはどれか。', choices:['親族にのみ渡し、一般会葬者には渡さない','葬儀の一週間後に電話で御礼を伝えることをいう','香典の金額の一覧を記載した文書である','会葬への御礼を記した書状で、当日返礼品とともに会葬者へ手渡されるのが一般的である'], answer:3, explanation:'会葬礼状は、会葬への感謝を述べる書状で、喪主や親族一同の名で作成し、当日、会葬御礼の品とともに受付や出口で 会葬者に手渡すのが一般的である。本来は後日改めて挨拶すべきところを書状で代えるという略儀としての意味合いを 持つとされる。文面には故人の名前、会葬への御礼、略儀である旨のお詫びなどを記し、日付と喪主名を入れる。近年 は故人の人柄を伝える自由な文面の礼状も増えている。'},
{chapter:3, type:'4', source:'past', text:'生花祭壇と白木祭壇に関する記述として最も適切なものはどれか。', choices:['白木祭壇は生花のみで構成された祭壇のことである','白木祭壇は白木で組まれた伝統的な祭壇であり、生花祭壇は生花を主体に飾る祭壇である','生花祭壇は造花だけを用いて飾る祭壇のことである','両者は同じものであり、名称が異なるだけである'], answer:1, explanation:'白木祭壇は白木で組み上げられた伝統的な祭壇で、多くは葬儀社が保有し、組み立てて繰り返し使用される。一方、生 花祭壇は生花を主体にデザインして飾り付ける祭壇で、故人の好きだった花や色を取り入れるなど自由度が高く、近年 広く普及している。両者を組み合わせて用いる例もある。祭壇の選択は宗教形式や予算、遺族の希望により決まるた め、それぞれの特徴と費用を分かりやすく説明することが大切である。'},
{chapter:3, type:'4', source:'past', text:'仏式葬儀の祭壇における遺影の一般的な位置として最も適切なものはどれか。', choices:['式場出入口の外側に掲示する','祭壇の最下段の床に直接置く','祭壇の中央部に、棺や位牌との釣り合いを取りつつ会葬者からよく見える位置に飾る','受付の机の上にのみ置く'], answer:2, explanation:'遺影は故人の面影をしのぶ象徴として、祭壇の中央部に、棺や位牌との釣り合いを取りながら会葬者からよく見える位置 に飾るのが一般的である。写真は生前の人柄がよく表れたものを遺族に選んでもらい、必要に応じて引き伸ばしや背 景・服装の修整を行って額装する。出棺時には近親者が遺影を捧げ持って火葬場へ同行し、葬儀後は後飾り祭壇などに 安置されるなど、葬送の各場面で重要な役割を担う。'},
{chapter:3, type:'4', source:'past', text:'式場設営における導線計画として最も適切なものはどれか。', choices:['会葬者の入退場、焼香の動き、棺の搬出経路を考慮して通路や席の配置を決める','導線よりも祭壇の見栄えを最優先して設営する','焼香に向かう列と戻る列が同じ狭い通路で交差するように配置する','焼香台は会葬者の席から最も遠い場所に置くことと定められている'], answer:0, explanation:'式場設営では、受付から着席までの会葬者の流れ、焼香の際に席を立ってから戻るまでの動き、出棺時に棺を搬出する 経路といった導線を総合的に考慮し、通路の幅や焼香台・席の配置を決めることが基本である。導線が交錯すると混雑 や事故、進行の遅れの原因となる。予想される会葬者数に応じて焼香の列数を決め、高齢者や車椅子の方への配慮も含 めて計画することが、安全で円滑な式の進行につながる。'},
{chapter:3, type:'4', source:'past', text:'葬儀式場における控室の準備として最も適切なものはどれか。', choices:['控室は設けず、全員式場内で待機してもらう','僧侶と遺族には必ず同じ控室を使うよう案内する','控室には祭壇を設置しなければならない','宗教者用と遺族・親族用の控室を分けて用意し、茶菓の接待や着替えの場として整える'], answer:3, explanation:'式場の控室は、僧侶など宗教者用と遺族・親族用とを分けて用意するのが基本である。宗教者控室は着替えや開式前の 待機に用いられ、遺族控室は親族の休憩や着替え、世話役との打ち合わせなどに使われる。それぞれに茶菓の接待を整 え、開式前後の案内も丁寧に行う。通夜で親族が宿泊する場合には寝具の手配が必要となることもある。控室の配置と 使い方は式の進行に直結するため、事前確認が欠かせない。'},
{chapter:3, type:'4', source:'past', text:'遺族の葬儀における服装に関する記述として最も適切なものはどれか。', choices:['遺族は会葬者よりも軽い略式の装いでよい','喪主・遺族は最も格の高い正喪服または準喪服を着用するのが基本である','遺族は明るい色の装いで会葬者を迎えるのが正式である','喪服に格の違いはなく、黒であれば何を着てもよい'], answer:1, explanation:'喪服には正喪服・準喪服・略喪服という格の違いがあり、葬儀を主催する側である喪主・遺族は、最も格の高い正喪服 （和装の黒紋付、洋装のモーニングコートや黒のフォーマルドレスなど）または準喪服を着用するのが基本とされる。 会葬者は遺族より格上の装いとならないよう準喪服や略喪服を用いるのが慣例である。近年は遺族も洋装の準喪服で臨 む例が増えているが、格の考え方は理解しておく必要がある。'},
{chapter:3, type:'4', source:'past', text:'一般会葬者の服装のマナーとして最も適切なものはどれか。', choices:['準喪服または略喪服を着用し、遺族より格上の装いは避ける','遺族と同格以上になるよう正喪服を必ず着用する','明るい色のスーツに華やかなネクタイを合わせる','服装に決まりはないため、普段着のままでよい'], answer:0, explanation:'一般会葬者は、ブラックスーツやブラックフォーマルなどの準喪服、または地味な色合いの略喪服を着用するのが基本 であり、喪家側の装いである正喪服は遺族より格上とならないよう避けるのがマナーとされる。男性は白無地のワイ シャツに黒無地のネクタイ、黒の靴下と靴を合わせ、女性は黒のワンピースやスーツで肌の露出を抑えた装いとする。 光沢の強い素材や派手な装飾は弔意の場にふさわしくない。'},
{chapter:3, type:'4', source:'past', text:'女性会葬者のアクセサリーに関する一般的なマナーとして最も適切なものはどれか。', choices:['二連の真珠のネックレスが最も格式高く望ましい','大ぶりの金のネックレスで弔意を表すのがよい','真珠の一連のネックレスは着用してよいが、二連は不幸が重なることを連想させるため避ける','真珠を含め、アクセサリーは一切身に着けてはならない'], answer:2, explanation:'弔事における女性のアクセサリーは、結婚指輪のほかは控えめにするのが基本で、着用する場合は白や黒の真珠の一連 のネックレスや一粒タイプのイヤリング程度がよいとされる。真珠は涙の象徴ともいわれ弔事に許容される一方、二連 や三連のネックレスは「不幸が重なる」ことを連想させるため避けるべきとされる。華美な光り物を慎み、弔意を表す 控えめな装いに徹するという考え方がマナーの基礎にある。'},
{chapter:3, type:'4', source:'past', text:'男性会葬者の装いに関する一般的なマナーとして最も適切なものはどれか。', choices:['赤系のネクタイを締めて弔意を表す','ネクタイは着用しないのが正式である','白無地のネクタイを着用する','黒無地のネクタイを締め、ネクタイピンなど光る装飾は避ける'], answer:3, explanation:'弔事における男性の装いは、ブラックスーツに白無地のワイシャツ、黒無地のネクタイが基本であり、ネクタイピンやカ フスボタンなど光る装飾品は着用しないのがマナーとされる。靴・靴下・ベルトも黒で統一し、エナメルなど光沢の強 い素材や金具の目立つものは避ける。白いネクタイは慶事に用いるものであり、弔事には用いない。華美さを抑えた控 えめな装いで弔意を表すことが、会葬の基本である。'},
{chapter:3, type:'4', source:'past', text:'香典帳に関する記述として最も適切なものはどれか。', choices:['葬儀が終わったらすぐに処分すべき一時的なメモである','香典をくださった方の氏名・住所・金額を記録し、香典返しや交際の資料として遺族が保管する帳簿 である','僧侶の読経の時間と内容を記録する帳簿である','会葬者が自由に閲覧できるよう式場に掲示する名簿である'], answer:1, explanation:'香典帳は、香典をいただいた方の氏名・住所・金額などを整理して記録する帳簿で、香典袋の表書きと中身を照合しな がら会計係が作成する。忌明け後に行う香典返しの品選びの目安となるほか、先方に不幸があった際の交際の参考にも なるため、芳名帳とともに遺族が保管する重要な記録である。金額という秘匿性の高い情報を含むため、作成と引き継 ぎは責任者を決めて慎重に行い、外部に漏らさないようにする。'},
{chapter:3, type:'4', source:'past', text:'仏式の通夜の一般的な進行に関する記述として最も適切なものはどれか。', choices:['通夜では読経は行わず、弔問客の焼香のみを行う','焼香は僧侶が到着する前にすべて済ませておく','僧侶の読経の間に、喪主から順に遺族・親族・弔問客が焼香を行う','読経は弔問客全員が交代で行う'], answer:2, explanation:'仏式の通夜は、僧侶の入場と読経に始まり、読経の間に喪主、遺族、親族、弔問客の順で焼香を行うのが一般的な進行 である。読経や法話が終わって僧侶が退場した後、喪主が弔問への御礼の挨拶を行い、通夜振る舞いの席へ案内する流 れが多い。焼香を始めるタイミングは、司会者が僧侶や式場係とあらかじめ打ち合わせて案内する。通夜の進行は、翌 日の葬儀・告別式における係の動きを確認する機会ともなる。'},
{chapter:3, type:'4', source:'past', text:'出棺を見送る会葬者のマナーとして最も適切なものはどれか。', choices:['霊柩車が出発するときに大きな声で歓送する','出棺と同時に速やかに解散し、見送りはしない','拍手をしながら棺を送り出す','コートを脱いで姿勢を正し、合掌または黙礼で霊柩車を見送る 葬祭ディレクター技能審査 完全対策問題集 第7 章：火葬・埋葬・葬儀後の実務 （50問）'], answer:3, explanation:'出棺は会葬者が故人を見送る最後の場面であり、寒い時期であってもコートを脱いで姿勢を正し、喪主の挨拶を静かに 聞いたうえで、霊柩車が出発する際には合掌または深い黙礼で見送るのがマナーとされる。私語を慎み、車が見えなく なるまで礼を尽くすのが丁寧な作法である。施行する側は、会葬者が安全に整列して見送れるよう、車の進路と立ち位 置をあらかじめ確保し、適切に誘導することが求められる。 葬祭ディレクター技能審査 完全対策問題集 第7章：火葬・埋葬・葬儀 後の実務'},
{chapter:3, type:'4', source:'past', text:'死亡から納骨に至る火葬関係の手続きの流れとして、最も適切なものはどれか。', choices:['死亡届の受理後に市町村長から火葬許可証が交付され、これを火葬場に提出し、火葬後に火葬執行済 の証明印が押されて返却される。','火葬許可証は火葬場の管理者が交付し、火葬の前に市町村役場へ提出する。','火葬許可証は火葬の終了後に市町村長から交付されるため、火葬の際には不要である。','死亡届と火葬許可証はそれぞれ別の役所に申請し、埋蔵の際には死亡診断書の原本を墓地管理者に提 出する。'], answer:0, explanation:'火葬を行うには、まず市区町村に死亡届を提出し、受理された後に市町村長から火葬許可証の交付を受ける。火葬許可 証は火葬場に提出され、火葬の執行後に火葬済の証明印が押されて遺族に返却される。この証明印付きの火葬許可証 は、墓地に遺骨を埋蔵する際に墓地の管理者へ提出する必要があるため、納骨まで大切に保管しなければならない。葬 祭ディレクターが遺族に確実に案内すべき基本の流れである。'},
{chapter:3, type:'4', source:'past', text:'火葬許可証を交付するのは、原則として誰か。', choices:['火葬場を管轄する都道府県知事','死亡届を受理した市町村長','死亡を確認した医師','火葬場の管理者'], answer:1, explanation:'墓地、埋葬等に関する法律では、埋葬や火葬を行おうとする者は市町村長の許可を受けなければならないと定められて おり、死亡届を受理した市町村長が火葬許可証を交付する。実務では死亡届の提出と同時に火葬許可申請書を提出し、 その場で許可証の交付を受けるのが一般的である。都道府県知事や医師、火葬場の管理者に交付の権限はない。交付さ れた許可証は火葬の際に火葬場へ提出する重要な書類である。'},
{chapter:3, type:'4', source:'past', text:'火葬場で火葬炉の前で行われる「納めの式」の説明として、最も適切なものはどれか。', choices:['遺骨を骨壺に納める儀式で、収骨の別称である。','出棺の前に自宅や式場で柩に花を入れる別れ花の儀式である。','火葬炉の前に柩を安置し、僧侶の読経や遺族の焼香によって故人と最後の別れを行う儀式である。','遺骨を墓所のカロートに納める納骨の儀式である。'], answer:2, explanation:'納めの式は、火葬場に到着した後、柩を火葬炉の前に安置して行う最後の別れの儀式である。同行した僧侶による読 経、遺族・会葬者の焼香が行われ、柩の小窓から最後の対面をすることもある。収骨は火葬後に遺骨を拾い上げる儀 式、納骨は墓所に遺骨を納める儀式であり、いずれも納めの式とは異なる。葬祭ディレクターには炉前への誘導と短時間 での式の進行を滞りなく行うことが求められる。'},
{chapter:3, type:'4', source:'past', text:'一般的な火葬炉での成人の火葬に要する時間の目安として、最も適切なものはどれか。', choices:['15〜30分程度','30〜45分程度','4〜6時間程度','おおむね1〜2時間程度'], answer:3, explanation:'成人の火葬に要する時間は、火葬炉の性能や故人の体格などにより差があるが、おおむね1〜2時間程度が目安とされ る。近年の火葬炉は燃焼効率が向上し、1時間前後で終了する施設も多い。遺族や会葬者はこの間、控室で待機すること になるため、葬祭ディレクターは待ち時間を考慮した茶菓の手配や、その後の収骨・還骨の段取り、帰路の車両の手配な どを整えておくことが求められる。'},
{chapter:3, type:'4', source:'past', text:'火葬中の遺族・会葬者への対応として、最も適切なものはどれか。', choices:['控室で茶菓などをもてなしながら待機し、地域や日程によってはこの待ち時間を利用して精進落とし の会食を行うこともある。','火葬中は全員が火葬炉の前に立って待機するのがしきたりである。','火葬中に遺族が火葬場の建物から離れることは法律で禁止されている。','火葬中の飲食は慎むべきものとされ、茶菓を出してはならない。'], answer:0, explanation:'火葬には1〜2時間程度を要するため、遺族・会葬者は控室で茶菓や軽食のもてなしを受けながら待機するのが一般的で ある。地域の慣習や当日の日程によっては、この待ち時間を利用して精進落としの会食を済ませる場合もある。炉前で 立って待ち続ける決まりや、火葬場を離れてはならないという法律上の定めはなく、葬祭ディレクターは施設の設備と日 程に応じて柔軟に進行を組み立てることができる。'},
{chapter:3, type:'4', source:'past', text:'収骨（骨上げ）の際に行われる「箸渡し」の説明として、最も適切なものはどれか。', choices:['故人が生前に使っていた箸を柩に納める習俗である。','二人一組で遺骨を箸から箸へと受け渡し、または一つの遺骨を二人の箸で挟んで骨壺に納める習俗で ある。','箸を遺骨の上に置いて合掌する作法である。','会食の席で箸を隣の人に手渡してはならないという食事の作法そのものを指す。'], answer:1, explanation:'箸渡しは、収骨の際に二人一組となって遺骨を箸から箸へ受け渡したり、一つの遺骨を二人の箸で同時に挟んで骨壺に 納めたりする習俗である。「箸」と「橋」の音が通じることから、故人をこの世からあの世へ三途の川を渡して橋渡し するという意味が込められているとされる。日常の食事で食べ物を箸から箸へ渡すことが忌避されるのは、この葬送習 俗を連想させるためであり、両者を区別して理解する必要がある。'},
{chapter:3, type:'4', source:'past', text:'収骨の際に遺骨を拾う順序として、一般的とされるものはどれか。', choices:['頭の骨から順に足の方へ向かって拾う。','喉仏を最初に拾い、その後の順序は問わない。','足の骨から順に上体へ向かって拾い上げていく。','大きな骨から順に拾い、細かい骨は拾わない決まりである。'], answer:2, explanation:'収骨では、骨壺に納めたときに故人の身体が立った姿と同じ配置になるよう、足の骨から順に上体へ向かって拾い上げ ていくのが一般的とされる。そして最後に、故人と縁の深い者が喉仏を納めて収骨を終える地域が多い。頭から拾う、 大きな骨だけを選ぶといった決まりはなく、実際には火葬場の係員の案内に従い、遺族が二人一組で箸渡しをしながら 順に拾っていくのが通例である。地域差があることにも留意したい。'},
{chapter:3, type:'4', source:'past', text:'収骨の際に「喉仏（のどぼとけ）」と呼ばれて大切に扱われる骨について、最も適切な説明はどれか。', choices:['喉頭隆起を形成する軟骨で、火葬後も原形のまま残る。','胸骨の一部で、最初に骨壺に納められる。','第一肋骨のことで、男性にのみ存在する。','第二頸椎のことで、座禅を組む仏の姿に似ているとされ、最後に骨壺に納められることが多い。'], answer:3, explanation:'収骨で喉仏と呼ばれるのは、解剖学的には第二頸椎（軸椎）である。その形が合掌して座禅を組む仏の姿に似ているこ とから尊ばれ、喪主など故人と縁の深い者が最後に骨壺に納める習俗が広く見られる。日常語でのどぼとけと呼ばれる 喉頭隆起は軟骨であるため火葬でほとんど残らず、収骨の対象となるものではない。第二頸椎は男女を問わず誰にでも ある骨であり、性別による有無の違いはない。'},
{chapter:3, type:'4', source:'past', text:'収骨の方法に関する東日本と西日本の一般的な違いとして、最も適切なものはどれか。', choices:['東日本ではすべての遺骨を拾う全部収骨、西日本では主要な骨のみを拾う部分収骨が一般的である。','東日本では部分収骨、西日本では全部収骨が一般的である。','東西で収骨方法に違いはなく、全国一律に全部収骨である。','東日本では収骨を行わず、火葬場がすべての遺骨を処理する。'], answer:0, explanation:'収骨の方法には大きな地域差があり、東日本ではすべての遺骨を骨壺に納める全部収骨が、西日本では喉仏など主要な 骨の一部のみを納める部分収骨が一般的とされる。部分収骨の場合、残された遺骨は火葬場が供養施設などで適切に取 り扱う。この違いに対応して用いられる骨壺の大きさも異なり、東日本では大きめ、西日本では小さめの骨壺が選ばれ る。他地域から会葬した遺族への説明にも必要な知識である。'},
{chapter:3, type:'4', source:'past', text:'骨壺の大きさに関する記述として、最も適切なものはどれか。', choices:['骨壺の大きさは法令で全国一律に定められている。','全部収骨が一般的な東日本では7寸前後の大きめの骨壺、部分収骨が一般的な西日本では3〜5寸程度 の小さめの骨壺が主に用いられる。','西日本では東日本よりも大きな骨壺を用いるのが一般的である。','骨壺の寸法は故人の身長によって法的に決められている。'], answer:1, explanation:'骨壺の大きさは収骨の方法と対応しており、すべての遺骨を納める全部収骨が一般的な東日本では7寸前後の大きめの骨 壺が、主要な骨のみを納める部分収骨が一般的な西日本では3〜5寸程度の小さめの骨壺が主に用いられる。骨壺の寸法 を定める法令はなく、地域の慣習や墓所のカロートの広さなどに応じて選択される。寸は骨壺の口径を表す単位で、1寸 は約3センチメートルに相当する。'},
{chapter:3, type:'4', source:'past', text:'火葬場で遺骨の一部を分けて受け取る「分骨」を行う場合に必要となる書類として、最も適切なものはどれ か。', choices:['新たな死亡届','改葬許可証','分骨証明書（火葬場の管理者などが発行する証明書）','特に書類は不要で、口頭で申し出れば足りる。'], answer:2, explanation:'火葬場で遺骨を複数に分けて受け取る分骨を行う場合は、火葬場の管理者などから分骨を証明する書類、いわゆる分骨 証明書の交付を受ける必要がある。これは分けた遺骨を別の墓地や納骨堂に納める際に、その遺骨が適正な火葬を経た ものであることを示すために求められる。改葬許可証はすでに埋葬されている遺骨を別の墓所へ移す場合の書類であ り、分骨の場面とは異なる。分骨の意向は火葬前に火葬場へ伝えておく必要がある。'},
{chapter:3, type:'4', source:'past', text:'すでに墓地に埋蔵されている遺骨を別の墓地へ移す「改葬」に必要な手続きとして、最も適切なものはどれ か。', choices:['移転先の墓地の管理者が単独で許可する。','都道府県知事に改葬届を提出すれば足りる。','遺族間の合意があれば、行政の手続きは一切不要である。','現在の墓地がある市町村長から改葬許可証の交付を受ける。'], answer:3, explanation:'すでに埋蔵されている遺骨を他の墓地や納骨堂へ移す改葬には、現に埋蔵されている墓地が所在する市町村長から改葬 許可証の交付を受ける必要がある。申請には、現在の墓地の管理者が発行する埋蔵証明や、受入先の墓地が交付する受 入証明などを添えるのが一般的である。墓地の管理者や都道府県知事が単独で許可するものではなく、遺族の合意だけ で行政手続きを省略することもできない。墓地、埋葬等に関する法律に基づく重要な手続きである。'},
{chapter:3, type:'4', source:'past', text:'火葬後、自宅に戻った遺骨を四十九日まで安置する祭壇の一般的な呼称として、最も適切なものはどれか。', choices:['後飾り祭壇（中陰壇）','須弥壇','祭壇幕','盆棚（精霊棚）'], answer:0, explanation:'火葬を終えて自宅に戻った遺骨は、四十九日の忌明けまで後飾り祭壇に安置する。これは中陰壇とも呼ばれ、白木の位 牌、遺影、遺骨を中心に、線香・ろうそく・花・水・供物などを供える簡素な祭壇である。須弥壇は仏壇内部で本尊を 安置する壇、盆棚は盂蘭盆会に先祖を迎えるための棚であり、いずれも用途が異なる。後飾り祭壇は忌明け後に片づけ、 葬祭ディレクターはその設置と後の撤去について遺族に案内する。'},
{chapter:3, type:'4', source:'past', text:'火葬を終えて遺骨を自宅などに迎えた後に営まれる「還骨法要（還骨回向）」の説明として、最も適切なもの はどれか。', choices:['火葬の前に火葬場で行う最後の別れの読経である。','遺骨を後飾り祭壇に安置し、僧侶の読経によって供養する火葬後の法要である。','一周忌に営む年忌法要のことである。','納骨の際に墓前で行う読経のことのみを指す。'], answer:1, explanation:'還骨法要は、火葬を終えた遺骨を自宅などに迎え、後飾り祭壇に安置して僧侶の読経により供養する法要である。還骨 回向とも呼ばれる。火葬前に火葬炉の前で行う納めの式とは時点が異なり、一周忌などの年忌法要とも別のものであ る。近年は遺族や僧侶の負担を考慮し、葬儀の式中や火葬後の還骨法要に合わせて初七日法要を繰り上げて営むことが 多く、葬祭ディレクターは一連の進行を整える役割を担う。'},
{chapter:3, type:'4', source:'past', text:'葬儀当日に営まれることが多い「繰り上げ初七日法要」の説明として、最も適切なものはどれか。', choices:['初七日を本来より遅らせて営むことをいう。','初七日を二回に分けて営むことをいう。','本来は命日を含めて七日目に営む初七日法要を、参列者の負担などに配慮して葬儀当日に繰り上げて 営むものである。','初七日を四十九日と同時に営むことをいう。'], answer:2, explanation:'初七日法要は本来、命日を含めて数えて七日目に営むものだが、近年は遠方からの参列者の再度の来集が難しいことな どから、葬儀当日に繰り上げて営むことが一般的になっている。葬儀の式中に読経として組み込む式中初七日や、火葬 後に再び式場や自宅に戻って営む戻り初七日などの形がある。本来より遅らせるものでも、二回に分けるものでも、四 十九日と同時に営むものでもない点に注意が必要である。'},
{chapter:3, type:'4', source:'past', text:'葬儀・告別式や火葬の後に設けられる「精進落とし（お斎）」の本来の意味として、最も適切なものはどれ か。', choices:['遺族が喪に服す期間の開始を告げる会食である。','会葬者から香典を集めるために設ける会食である。','故人の遺産分割を話し合うために設ける会食である。','忌中の間の精進潔斎を解き、僧侶や世話役などへの感謝を込めてもてなす会食である。'], answer:3, explanation:'精進落としは、お斎とも呼ばれ、本来は四十九日の忌明けに、それまで肉や魚を避けてきた精進潔斎の期間を終え、通 常の食事に戻すことを意味した。現在では葬儀・火葬の後に、読経をつとめた僧侶や葬儀を支えた世話役・親族などを ねぎらい、感謝の意を込めてもてなす会食を指すことが多い。香典を集めるためや遺産分割を話し合うための席ではな く、関係者への感謝と労いを目的とする場である。'},
{chapter:3, type:'4', source:'past', text:'精進落としの席で行われる「献杯（けんぱい）」の作法として、最も適切なものはどれか。', choices:['故人に敬意を表して杯を捧げるもので、声を抑え、杯は打ち合わせず、拍手も行わないのが一般的で ある。','盃を高く掲げ、参加者一同で大きな発声をして杯を打ち合わせる。','祝い事と同様に「乾杯」と発声し、拍手をして始める。','遺族の長が一人だけ杯を口にし、ほかの参加者は飲まない。'], answer:0, explanation:'献杯は、故人に敬意を表して杯を捧げる作法であり、祝い事の乾杯とは趣を異にする。発声は控えめにし、杯を高く掲 げたり互いに打ち合わせたりせず、拍手も行わないのが一般的なならわしである。発声の役は遺族の代表や故人と縁の 深い来賓などが務める。遺族の長だけが飲むという決まりはなく、献杯の後は参加者が静かに杯を口にする。葬祭ディ レクターは進行役として、こうした作法を踏まえた案内を行う。'},
{chapter:3, type:'4', source:'past', text:'精進落としの席次（席順）の考え方として、最も適切なものはどれか。', choices:['遺族を最も上座に座らせ、僧侶や来賓は末席とする。','僧侶や来賓を上座に、遺族はもてなす側として末席に座るのが一般的である。','喪主を必ず会場の出入口に最も近い席に座らせる。','席次は定めず、到着した順に好きな席へ着く。'], answer:1, explanation:'精進落としは遺族が僧侶や来賓・世話役などをもてなす席であるため、僧侶や来賓を上座とし、遺族はもてなす側とし て末席に座るのが一般的とされる。これは通夜・葬儀における遺族中心の席次とは逆の考え方である。喪主を必ず出入 口に座らせる決まりはなく、到着順に自由に着席するものでもない。葬祭ディレクターは会場の上座・下座を踏まえて 席札を配置し、当日の案内が円滑に進むよう配慮する。'},
{chapter:3, type:'4', source:'past', text:'四十九日法要の日程の組み方について、一般的な配慮として最も適切なものはどれか。', choices:['参列者の都合を考え、四十九日の当日より後の都合のよい日に営むのがよい。','必ず四十九日の当日に営まなければならず、前後にずらしてはならない。','参列者が集まりやすいよう、四十九日の当日より前の土日などに繰り上げて営むのが一般的である。','日程は僧侶の都合のみで決め、遺族や参列者の都合は考慮しない。'], answer:2, explanation:'四十九日法要は本来の当日に営むのが原則だが、参列者が集まりやすいように土日などへ日程を調整することが多い。 その際は当日より後ろにずらすことは避け、当日かそれより前に繰り上げて営むのが一般的とされる。これは忌明けの 法要を遅らせないという考え方による。必ず当日でなければならないわけでも、僧侶の都合だけで決めるものでもな く、遺族・僧侶・参列者の都合を調整して決める。葬祭ディレクターは早めの日程調整を助言する。'},
{chapter:3, type:'4', source:'past', text:'四十九日の忌明けに合わせて行われることが多い位牌に関する実務として、最も適切なものはどれか。', choices:['白木の位牌をそのまま仏壇に納め、作り替えは行わない。','本位牌を四十九日より前に用意し、葬儀でそのまま用いる。','位牌は用いず、遺影のみを仏壇に安置する。','葬儀で用いた白木の位牌から、漆塗りなどの本位牌（塗位牌）に作り替え、開眼供養を行う。'], answer:3, explanation:'葬儀から忌明けまで用いる白木の位牌は仮の位牌であり、四十九日の忌明けを目安に、漆塗りや唐木などの本位牌（塗 位牌）に作り替えるのが一般的である。新しい本位牌には僧侶による開眼供養（魂入れ）を営み、白木の位牌は寺院に 納めるなどして処理する。本位牌は作製に日数を要するため、葬祭ディレクターは早めの手配を案内する必要がある。 なお浄土真宗では位牌に代えて過去帳や法名軸を用いるなど、宗派による違いにも留意する。'},
{chapter:3, type:'4', source:'past', text:'新しく用意した本位牌や仏壇に対して僧侶が行う「開眼供養（魂入れ）」の意味として、最も適切なものはど れか。', choices:['位牌や仏像、墓石などに魂を入れ、礼拝の対象として供養する儀式である。','古い位牌から魂を抜く儀式である。','仏壇を購入した日を記録するための届出である。','遺骨を墓所に納める儀式そのものである。'], answer:0, explanation:'開眼供養は、新たに用意した本位牌や仏壇の本尊、墓石などに僧侶が読経して魂を入れ、礼拝・供養の対象とする儀式 である。魂入れ、入魂式などとも呼ばれる。これに対し、古い位牌や墓石を処分する際などに魂を抜く儀式は閉眼供養 （魂抜き）と呼ばれ、目的が逆である。仏壇購入の届出や納骨そのものを指すものでもない。四十九日には本位牌の開 眼供養と納骨を併せて営むことも多く、葬祭ディレクターは一連の準備を支援する。'},
{chapter:3, type:'4', source:'past', text:'遺骨を墓地に埋蔵（納骨）する際に、墓地の管理者へ提出が必要となる書類として、最も適切なものはどれ か。', choices:['死亡診断書の原本','火葬執行済の証明印が押された火葬許可証（または埋葬許可証）','本位牌の購入領収書','会葬御礼の挨拶状'], answer:1, explanation:'遺骨を墓地のカロートなどに埋蔵する納骨の際には、火葬の執行を証明する印が押された火葬許可証を墓地の管理者へ 提出する必要がある。火葬後に返却されるこの書類は埋葬許可証とも呼ばれ、納骨まで紛失しないよう保管しなければ ならない。死亡診断書の原本や位牌の領収書、会葬御礼の挨拶状は、納骨の際に墓地管理者へ提出する書類ではない。 葬祭ディレクターは火葬後にこの許可証を確実に遺族へ引き渡し、保管を促すことが重要である。'},
{chapter:3, type:'4', source:'past', text:'墓石のある墓所へ納骨する際の一般的な段取りとして、最も適切なものはどれか。', choices:['遺族だけで墓石を動かして納骨するのが通例である。','市町村の職員が墓石を開けに来るのを待つ。','石材店に連絡してカロート（納骨室）の開閉を依頼し、墓地の管理者にも納骨の手続きを行う。','納骨は火葬場の係員が墓所まで出向いて行う。'], answer:2, explanation:'墓石のある墓所に納骨する場合、骨壺を納めるカロート（納骨室）のふたや拝石を開閉する必要がある。これは重量が あり据え付けも専門的なため、石材店に連絡して開閉を依頼するのが一般的である。あわせて墓地の管理者に納骨の届 出を行い、火葬許可証を提出する。遺族だけで無理に墓石を動かすのは破損や事故の危険があり、市町村職員や火葬場 係員が墓所で納骨を行うものでもない。葬祭ディレクターは石材店や寺院との連絡調整を助ける。'},
{chapter:3, type:'4', source:'past', text:'香典返しを贈る本来の時期について、最も適切なものはどれか。', choices:['通夜・葬儀の当日に必ず手渡さなければならない。','一周忌を過ぎてから贈るのが本来である。','香典返しは時期の決まりがなく、いつ贈ってもよい。','四十九日の忌明け後に、忌明けの報告を兼ねて贈るのが本来である。'], answer:3, explanation:'香典返しは本来、四十九日の忌明けを無事に終えた報告を兼ねて、忌明け後に贈るものである。挨拶状を添えて品物を 送り、いただいた香典への返礼とする。近年は通夜・葬儀の当日に一定額の品を渡す即日返し（当日返し）も広く行わ れるが、これは本来の形を簡略化したものである。一周忌の後まで遅らせるものでも、時期に決まりがないものでもな い。葬祭ディレクターは即日返しと忌明けの香典返しの違いを踏まえ、適切に案内する必要がある。'},
{chapter:3, type:'4', source:'past', text:'香典返しの金額の目安として、一般的にいわれるものはどれか。', choices:['いただいた香典のおおむね半分程度を返す、いわゆる半返しが目安とされる。','いただいた香典と同額を返す。','いただいた香典の二倍程度を返す。','金額にかかわらず一律に高額の品を返す。'], answer:0, explanation:'香典返しの金額は、いただいた香典のおおむね半分程度を返す、いわゆる半返しが一般的な目安とされる。三分の一程度 とする地域や考え方もある。香典は本来、遺族を経済的に支える相互扶助の意味を持つため、同額や二倍を返すのでは 趣旨に反する。即日返しを行った場合でも、高額の香典をいただいた相手には、半返しに見合うよう忌明けに改めて品 を追加して贈るのが望ましい。葬祭ディレクターはこうした目安を踏まえて助言する。'},
{chapter:3, type:'4', source:'past', text:'即日返し（当日返し）を行った場合に、高額の香典をいただいた相手への一般的な対応として、最も適切なも のはどれか。', choices:['即日返しを渡しているので、追加の対応は一切不要である。','忌明け後に、半返しの目安に見合うよう不足分の品を改めて贈る。','いただいた香典をそのまま現金で返す。','次回の法要への参列をもって返礼に代える。'], answer:1, explanation:'即日返しは香典の金額にかかわらず一定額の品を当日に渡す方法のため、高額の香典をいただいた相手には半返しの目 安に対して返礼が不足することがある。その場合は、忌明け後に不足分を補う品を改めて贈り、挨拶状を添えるのが一 般的な対応である。いただいた香典をそのまま現金で返すのは失礼にあたり、法要への参列で返礼に代えるという考え 方も一般的ではない。葬祭ディレクターは即日返しの限界を理解し、後日の追加返礼について案内する。'},
{chapter:3, type:'4', source:'past', text:'香典返しの掛け紙（のし紙）の表書きとして、一般的に用いられるものはどれか。', choices:['「御祝」「内祝」','「御中元」「御歳暮」','「志」「満中陰志」','「寿」「賀」'], answer:2, explanation:'香典返しの表書きには、全国的に「志」が広く用いられるほか、関西地方などでは「満中陰志」が使われる。満中陰と は四十九日の忌明けを指す語で、忌明けの香典返しであることを表す。これらの表書きは弔事用の掛け紙に薄墨で記し、 結び切りの水引を用いるのが一般的である。「御祝」「内祝」「寿」などは慶事の表書きであり、弔事には用いない。 葬祭ディレクターは地域の慣習に応じた適切な表書きを案内する必要がある。'},
{chapter:3, type:'4', source:'past', text:'喪中はがき（年賀欠礼状）を出す時期として、一般的に適切とされるものはどれか。', choices:['元日に届くように出す。','年が明けてから、松の内が過ぎた頃に出す。','喪に服した直後、四十九日より前に出す。','相手が年賀状の準備を始める前、おおむね11月中旬から12月初旬までに先方へ届くように出す。'], answer:3, explanation:'喪中はがきは、近親者に不幸があったために年賀の挨拶を控える旨を知らせる年賀欠礼状である。相手が年賀状の準備 を始める前に届くよう、おおむね11月中旬から12月初旬までに先方へ届くように出すのが一般的である。元日や松の内 が過ぎてからでは年賀状の欠礼を伝える趣旨に間に合わない。四十九日より前など早すぎる時期も適切とはいえない。 年明けに不幸を知った場合などは、松の内が明けてから寒中見舞いで知らせる方法がある。'},
{chapter:3, type:'4', source:'past', text:'喪中はがきを受け取る前に、すでに年賀状を投函してしまったことが分かった場合などに用いられる挨拶状と して、最も適切なものはどれか。', choices:['寒中見舞い','暑中見舞い','残暑見舞い','年賀状の再送'], answer:0, explanation:'喪中であることを知らずに年賀状を出してしまった場合や、年が明けてから不幸を知らせる場合などには、松の内が明 けてから立春の頃までの間に寒中見舞いを出すのが一般的である。寒中見舞いは本来、厳寒期に相手の安否を気遣う挨 拶状だが、こうした場面でのお詫びやお知らせにも用いられる。暑中見舞い・残暑見舞いは夏の挨拶であり時期が合わ ず、年賀状の再送も適切ではない。葬祭ディレクターは喪中の挨拶に関する基本的な知識として押さえておきたい。'},
{chapter:3, type:'4', source:'past', text:'形見分けに関する伝統的なマナーとして、最も適切なものはどれか。', choices:['高価な品ほど目上の人に優先して贈るのが礼儀である。','目上の人には形見を贈らないものとされ、贈る場合でも先方の希望を確かめるなどの配慮が必要とさ れてきた。','形見分けは必ず四十九日より前に終えなければならない。','形見は親族以外には一切分けてはならない。'], answer:1, explanation:'形見分けは、故人の愛用品などを近親者や親しかった人に分け、故人をしのぶ習わしである。伝統的なマナーとして、目 上の人には形見を贈らないものとされてきた。これは品物を与える行為が失礼にあたると考えられたためで、目上の人 へ贈る場合は先方の希望を確かめるなどの配慮が望ましいとされる。高価な品を目上に優先するのは逆の考え方であ り、四十九日より前に終える決まりや親族以外に分けてはならないという決まりもない。一般には忌明け頃に行う。'},
{chapter:3, type:'4', source:'past', text:'近年需要が高まっている「遺品整理業」に関する記述として、最も適切なものはどれか。', choices:['遺品をすべて廃棄することのみを行い、形見の選別は一切扱わない。','遺品整理は法律で遺族本人以外が行ってはならないと定められている。','遺族に代わって故人の遺品の整理・分別・搬出などを行う事業で、核家族化や高齢化を背景に需要が 高まっている。','遺品整理業は遺産の名義変更などの相続手続きを代行する士業である。'], answer:2, explanation:'遺品整理業は、遺族に代わって故人の遺品を整理・分別し、必要に応じて搬出・清掃・不用品の処分などを行う事業で ある。核家族化や高齢化、遺族の遠隔居住などを背景に需要が高まっている。形見として残す品の選別や貴重品の捜索 を含めて依頼できることも多く、すべてを廃棄するだけのものではない。遺品整理を遺族以外が行うことを禁じる法律 はなく、相続の名義変更などを代行する士業でもない。葬祭ディレクターは関連サービスとして概要を理解しておきた い。'},
{chapter:3, type:'4', source:'past', text:'死亡に伴う公的年金の手続きとして、最も適切なものはどれか。', choices:['受給者が死亡しても年金は自動的に支給が続くため、いかなる場合も手続きは一切不要である。','年金の停止手続きは死亡から3年以内に行えばよい。','年金は死亡後も遺族が代わりに受給し続けてよい。','日本年金機構にマイナンバーが収録されている受給者は原則として死亡届を省略でき、提出が必要な 場合は厚生年金は10日以内、国民年金は14日以内に届け出る。'], answer:3, explanation:'公的年金の受給者が死亡したときは支給を停止する必要があるが、日本年金機構にマイナンバーが収録されている受給 者は、原則として年金受給権者死亡届の提出を省略できる。提出が必要な場合の期限は、厚生年金が死亡後10日以内、 国民年金が14日以内である。届出が遅れて過払いが生じると返還を求められることがある。年金が自動的に支給され続 けたり、遺族がそのまま受給し続けたりしてよいものではない。なお死亡月分までの未支給年金は、一定の遺族が別途 請求でき、遺族年金の請求も別に必要となる。'},
{chapter:3, type:'4', source:'past', text:'世帯主が死亡した場合に必要となることがある市区町村への届出として、最も適切なものはどれか。', choices:['世帯主変更届','転出届','印鑑登録の新規申請','住民票コードの変更届'], answer:0, explanation:'世帯主が死亡し、残された世帯員が二人以上いて新しい世帯主が一義的に定まらない場合には、市区町村に世帯主変更 届を提出する必要がある。これは住民基本台帳上の世帯主を変更する手続きである。なお、残る世帯員が一人だけの場 合や世帯主が明らかな場合は、届出を要しないこともある。転出届は他の市区町村へ移る際の手続き、印鑑登録は死亡 により抹消されるものであり、いずれも世帯主の死亡に伴う変更手続きとしては当てはまらない。'},
{chapter:3, type:'4', source:'past', text:'国民健康保険の被保険者が死亡した場合に、その葬儀を行った者に対して支給される給付の名称として、最も 適切なものはどれか。', choices:['埋葬料','葬祭費','遺族基礎年金','高額療養費'], answer:1, explanation:'国民健康保険や後期高齢者医療制度の被保険者が死亡したときは、葬儀を行った者（喪主など）に対して葬祭費が支給 される。支給額は市区町村や広域連合によって異なり、申請が必要である。一方、会社員などが加入する健康保険（被 用者保険）では、同様の給付が埋葬料・埋葬費という名称で支給される。遺族基礎年金は国民年金の遺族給付、高額療 養費は医療費の自己負担を軽減する制度であり、葬儀費用への給付ではない。葬祭ディレクターは制度の違いを理解して 案内する。'},
{chapter:3, type:'4', source:'past', text:'健康保険（被用者保険）の被保険者が死亡した場合に支給される、葬儀に関する給付の名称として、最も適切 なものはどれか。', choices:['葬祭費','死亡一時金','埋葬料（埋葬費）','寡婦年金'], answer:2, explanation:'会社員などが加入する健康保険（被用者保険）では、被保険者が死亡したとき、その人に生計を維持されていた者で埋 葬を行う者に対して埋葬料が支給される。該当者がいない場合は、実際に埋葬を行った者に埋葬費として実費の範囲内 で支給される。市区町村の国民健康保険などで支給される同種の給付は葬祭費という名称である。死亡一時金や寡婦年 金は国民年金の給付であり、葬儀に関する健康保険からの給付ではない。葬祭ディレクターは加入制度に応じた給付の違 いを押さえる。'},
{chapter:3, type:'4', source:'past', text:'相続の放棄を行う場合の期限として、最も適切なものはどれか。', choices:['相続の開始を知った時から原則10か月以内','相続の開始を知った時から原則1年以内','特に期限はなく、いつでも放棄できる。','自己のために相続の開始があったことを知った時から原則3か月以内'], answer:3, explanation:'相続人が相続を放棄する場合は、自己のために相続の開始があったことを知った時から原則として3か月以内に、家庭裁 判所へ相続放棄の申述をしなければならない。この期間は熟慮期間と呼ばれる。同じ期間内に、債務を相続財産の限度 で引き継ぐ限定承認を選ぶこともできる。期間内に手続きをしないと、原則として単純承認したものとみなされ、債務 も含めて相続することになる。10か月は相続税申告の期限であり混同しやすい。葬祭ディレクターは概略を案内し、詳 細は専門家への相談を促す。'},
{chapter:3, type:'4', source:'past', text:'相続税の申告・納付の期限として、最も適切なものはどれか。', choices:['相続の開始があったことを知った日の翌日から原則10か月以内','相続の開始があったことを知った日の翌日から原則3か月以内','相続の開始があったことを知った日の翌日から原則2年以内','相続税には申告期限がない。'], answer:0, explanation:'相続税の申告と納付は、相続の開始があったことを知った日の翌日から原則として10か月以内に行わなければならな い。基礎控除額を超える課税対象がある場合などに申告が必要となり、期限を過ぎると加算税や延滞税が課されること がある。3か月は相続放棄や限定承認の熟慮期間であり、これと混同しやすいので注意が必要である。なお、すべての相 続で相続税の申告が必要になるわけではない。葬祭ディレクターは期限の存在を案内し、具体的な手続きは税理士など 専門家へつなぐとよい。'},
{chapter:3, type:'4', source:'past', text:'民法上の法定相続人に関する記述として、最も適切なものはどれか。', choices:['配偶者がいる場合、子は相続人になれない。','被相続人の配偶者は、常に相続人となる。','被相続人に子がいても、まず兄弟姉妹が相続人となる。','内縁の配偶者は、当然に法定相続人となる。'], answer:1, explanation:'民法では、被相続人の配偶者は常に相続人となると定められている。配偶者とともに相続人となる血族には順位があ り、第一順位が子（およびその代襲者）、第二順位が直系尊属（父母など）、第三順位が兄弟姉妹である。子がいる場 合は配偶者と子が相続人となり、子がいなければ次の順位へ移る。したがって子がいるのに兄弟姉妹が優先することは ない。なお、法律上の婚姻関係にない内縁の配偶者は、当然には法定相続人とならない。葬祭ディレクターは基礎知識 として理解しておく。'},
{chapter:3, type:'4', source:'past', text:'一周忌の時期として、最も適切なものはどれか。', choices:['死後49日目','死後100日目','死亡した翌年の祥月命日、すなわち満1年目','死亡した年の年末'], answer:2, explanation:'一周忌は、死亡した翌年の同月同日（祥月命日）、すなわち満1年目に営む年忌法要である。故人にとって重要な節目と され、親族や故人と縁の深い人を招いて読経・焼香・会食を行うのが一般的である。死後49日目は四十九日（忌明 け）、100日目は百箇日であり、いずれも一周忌とは異なる。実際の日程は参列者の都合に合わせて命日の前の土日など に調整することが多い。葬祭ディレクターは忌明け後の年忌法要の時期について遺族に案内できるとよい。'},
