{ chapter:8, type:'ox', text:'神道の「八百万（やおよろず）の神」とは、自然・万物すべてに神が宿るという考え方を表す。', answer:true, explanation:'「八百万の神」は日本神道の多神教的・アニミズム的な世界観を象徴する表現で、山・川・海・木・動物・人間など自然界のすべてに神が宿ると考えます。「八百万」は無数に多いという意味の表現です。' },
{ chapter:8, type:'ox', text:'神式葬儀では「御神酒（おみき）」を供えるのが一般的であるが、火葬後は供えない。', answer:false, explanation:'神式葬儀では故人への供え物（神饌・しんせん）として御神酒・米・塩・水・野菜・魚などを供えます。火葬後（火葬祭・帰家祭）でも御神酒を含む供え物を捧げます。供え物を控える特定の場面はありますが「火葬後は供えない」というルールはありません。' },
{ chapter:8, type:'ox', text:'「伊勢神宮（内宮）」の御祭神は、天照大御神（あまてらすおおみかみ）である。', answer:true, explanation:'伊勢神宮の内宮（皇大神宮）の御祭神は天照大御神で、太陽の神・皇室の祖先神として日本神道の最高位に位置づけられます。外宮（豊受大神宮）の御祭神は豊受大御神（食物・農業の神）です。' },
{ chapter:8, type:'ox', text:'神葬祭における「斎主（さいしゅ）」は仏式の「導師（僧侶）」に相当する役割を担う。', answer:true, explanation:'斎主は神葬祭を主宰する神職のことで、仏式の導師（葬儀を主宰する僧侶）に相当します。祝詞（のりと）の奏上・各種の儀礼の執行など、式全体を取り仕切ります。' },
{ chapter:8, type:'ox', text:'神道では「穢れ（けがれ）」を払うために「禊（みそぎ）」を行う。', answer:true, explanation:'禊（みそぎ）は水で身体を洗い清めることで穢れを祓う神道の浄化儀礼です。伊邪那岐命が黄泉の国から戻った際に禊を行ったという神話が起源とされます。現代の神式葬儀後の「清祓」も穢れを払う儀礼のひとつです。' },

// --- キリスト教深掘り ---
{ chapter:8, type:'ox', text:'「カトリック」とはギリシャ語で「普遍的な」という意味である。', answer:true, explanation:'「カトリック（Catholic）」はギリシャ語「カトリコス（katholikos）」に由来し、「普遍的な・全体にわたる」という意味です。「普遍教会（普遍的なキリストの教会）」という意味でカトリックと呼ばれます。' },
{ chapter:8, type:'ox', text:'「プロテスタント」という名称は、16世紀の宗教改革において改革派が旧体制に「抗議（プロテスト）」したことに由来する。', answer:true, explanation:'「プロテスタント」は1529年のシュパイヤー帝国議会でカトリック側の決定に対してルター派諸侯が「抗議（Protestatio）」したことに由来します。現在は「プロテスト（抗議）」という意味よりも、宗教改革から生まれたキリスト教各派の総称として使われています。' },
{ chapter:8, type:'ox', text:'日本のキリスト教人口は総人口の約30%を占める。', answer:false, explanation:'日本のキリスト教人口は総人口の約1〜2%程度とされており、非常に少数派です（カトリック・プロテスタント・正教会などを合わせて）。仏教徒（約67〜70%）・神道（約70〜80%、重複含む）と比べて大幅に少ない数字です。' },
{ chapter:8, type:'ox', text:'「正教会（せいきょうかい）」は東方キリスト教の一派で、ロシア正教・ギリシャ正教などがある。', answer:true, explanation:'正教会（Eastern Orthodox Church）は1054年のキリスト教大分裂でカトリックと分かれた東方キリスト教の流れで、ロシア正教会・ギリシャ正教会・日本正教会（ハリストス正教会）などがあります。日本では幕末に伝来しました。' },
{ chapter:8, type:'ox', text:'キリスト教の「臨終の秘跡（病者の塗油）」は、死が迫った時に司祭が行う儀礼でカトリックのみの慣行である。', answer:true, explanation:'病者の塗油（かつての「終油の秘跡」）はカトリックの七つの秘跡（サクラメント）のひとつで、重篤な患者や臨終の際に司祭が聖油を塗り祈る儀礼です。プロテスタントは一般的にこのような秘跡の制度を持ちません。' },

// --- 新宗教・諸派深掘り ---
{ chapter:8, type:'ox', text:'「天理教」では死を「出直し（でなおし）」と表現し、現世での修行を終えて神のもとへ帰ると考える。', answer:true, explanation:'天理教では人の死を否定的に捉えず、「神から借りていた体を返し、魂が生まれ直す（出直す）」という積極的な意味を持たせています。このため葬儀の場でも「死」「亡くなる」などの言葉を使わず「出直す」と言います。' },
{ chapter:8, type:'ox', text:'「霊友会（れいゆうかい）」は仏教系の新宗教で、現在も多くの派生宗教を生み出している。', answer:true, explanation:'霊友会（1919年創設）は法華経と先祖供養を基本とする新宗教で、立正佼成会・仏所護念会・妙智会など多くの派生宗教（分派）を生み出しました。これらをまとめて「霊友会系」と呼ぶこともあります。' },
{ chapter:8, type:'ox', text:'「世界救世教（せかいきゅうせいきょう）」は岡田茂吉が開いた新宗教で、「浄霊（じょうれい）」と呼ばれる手かざし療法が特徴である。', answer:true, explanation:'世界救世教は1935年に岡田茂吉（もきち）が開いた新宗教で、「光」を手から放射して病気を治す「浄霊」が特徴的な実践です。MOA美術館（静岡・東京）の運営でも知られます。' },
{ chapter:8, type:'ox', text:'「生長の家（せいちょうのいえ）」は谷口雅春が開いた新宗教で、「神の子」として人間の完全性を説く。', answer:true, explanation:'生長の家は1930年に谷口雅春が開いた新宗教で、「人間は神の子であり本来完全・善・美である」という「神人不二」の思想を説きます。雑誌「生長の家」の出版・「聖使命」誌などを通じて広まりました。' },
{ chapter:8, type:'ox', text:'「神社神道」と「教派神道」は同じものである。', answer:false, explanation:'神社神道は全国の神社・神宮で行われる伝統的な神道です。教派神道は明治時代に政府が公認した天理教・金光教・黒住教など13の宗教団体を指します。神社神道は国家管理下に置かれ（戦前）、教派神道は民間宗教として別扱いされました。' },
{ chapter:8, type:'ox', text:'「黒住教（くろずみきょう）」は江戸時代後期に岡山で成立した神道系の新宗教で、太陽神・天照大御神への信仰が中心である。', answer:true, explanation:'黒住教は1814年に岡山の神官・黒住宗忠が「天命直授（てんめいじきじゅ）」の神秘体験を経て開いた神道系新宗教です。太陽（天照大御神）への信仰と感謝を中心に、明るく積極的な生き方を説きます。教派神道の一つです。' },

// --- 法要・忌日深掘り ---
{ chapter:8, type:'ox', text:'「三十三回忌」は多くの宗派で「弔い上げ（とむらいあげ）」とされ、以後の個別の年忌法要を終了することが多い。', answer:true, explanation:'三十三回忌（満32年後）は多くの仏教宗派で年忌法要の締めくくり（弔い上げ）とされます。この後は個人として祀るのをやめ、先祖代々の霊として合祀する場合が多いです。地域・宗派によっては五十回忌を弔い上げとすることもあります。' },
{ chapter:8, type:'ox', text:'「月命日（つきめいにち）」とは、毎月その人が亡くなった日と同じ日付のことである。', answer:true, explanation:'月命日は毎月巡ってくる命日で、例えば3月15日に亡くなった場合、毎月15日が月命日です。年に一度の「命日（祥月命日・しょうつきめいにち）」と区別して「月命日」と呼びます。月命日に墓参りや仏前での手を合わせを行う習慣があります。' },
{ chapter:8, type:'ox', text:'「祥月命日（しょうつきめいにち）」とは、故人が亡くなった月日（月と日）が一致する、年に一度の命日のことである。', answer:true, explanation:'祥月命日（正忌・しょうき）は故人が亡くなった月と日が同じ、年に一度の本来の命日です。毎月の「月命日」と区別します。一周忌・三回忌などの年忌法要は原則としてこの祥月命日に行います。' },
{ chapter:8, type:'ox', text:'「涅槃会（ねはんえ）」は釈迦の誕生を祝う仏教行事である。', answer:false, explanation:'涅槃会は2月15日に釈迦の入滅（死去）を偲ぶ仏教行事です。釈迦の誕生を祝う行事は「花まつり（灌仏会・かんぶつえ）」で4月8日に行われます。「成道会（じょうどうえ）」は12月8日に釈迦の悟りを祝う行事です。' },
{ chapter:8, type:'ox', text:'「お盆（盂蘭盆会）」は仏教行事であり、先祖の霊が年に一度この世に戻ってくると信じられている。', answer:true, explanation:'お盆（盂蘭盆会・うらぼんえ）はインドの仏教行事が日本の祖先信仰・神道と融合した行事です。8月13日に迎え火で先祖の霊を迎え、16日に送り火で送り出す慣習があります（地域によっては7月）。精霊棚・盆踊りなど日本独自の文化も生まれました。' },

// --- 葬儀マナー・実務 ---
{ chapter:8, type:'ox', text:'葬儀に参列する際の数珠は、宗派の違う葬儀でも自分の宗派の数珠を使って構わない。', answer:true, explanation:'数珠は本来その宗派専用のものがありますが、葬儀に参列する際は自分の宗派の数珠（または「略式数珠」）を持参することが一般的で、他宗派の葬儀でも使用して問題ありません。数珠を持参すること自体が礼儀とされます。' },
{ chapter:8, type:'ox', text:'「喪中はがき」は一般的に故人が亡くなった翌年の年賀状シーズンに合わせて11〜12月に送る。', answer:true, explanation:'喪中はがき（年賀欠礼状）は、相手が年賀状を書く前に届くよう11月〜12月初旬に送るのが一般的なマナーです。年賀状が届いた後に喪中の事を知った場合は「寒中見舞い」で返答します。' },
{ chapter:8, type:'ox', text:'「香典（こうでん）」の語源は、線香・焼香など香を供えることへのお礼が金銭に変化したものとされる。', answer:true, explanation:'香典はもともと「香料（こうりょう）」とも呼ばれ、線香・香などを供えることへの代わりとして金銭を包むようになったものです。「典」は「典礼・儀式」という意味で、「香を供える儀礼への志」という意味合いがあります。' },
{ chapter:8, type:'ox', text:'「弔電（ちょうでん）」は葬儀に参列できない場合に喪家に送る電報で、現代でもNTTなどを通じて送ることができる。', answer:true, explanation:'弔電は葬儀に参列できない際に喪主宛てに送る電報形式のお悔やみで、現代でもNTT・KDDI・電報各社のサービスを通じて送ることができます。葬儀式場に届くよう、通夜・葬儀の前日までに手配するのが一般的です。' },
{ chapter:8, type:'ox', text:'葬儀の「受付」は遺族が担当するのが正式なマナーである。', answer:false, explanation:'葬儀の受付は故人の友人・知人・会社の同僚など「世話人（てつだい人）」が担当するのが一般的です。遺族は弔問客への挨拶・接待・式の進行に専念するため、受付は他の人に委ねるのが通例です。' },

// --- 葬儀形式・現代的変化 ---
{ chapter:8, type:'ox', text:'「音楽葬（おんがくそう）」とは、故人が好んだ音楽を式中に流したり演奏したりする葬儀形式で、無宗教葬の一種である。', answer:true, explanation:'音楽葬は宗教的な儀礼の代わりに、または組み合わせて、故人が愛した音楽を中心に構成する葬儀形式です。無宗教葬（自由葬）の中でも増加しており、生演奏・録音再生・合唱など様々な形があります。' },
{ chapter:8, type:'ox', text:'「グリーフケア」は遺族支援のためのケアであり、葬儀社が提供するアフターフォローとしても注目されている。', answer:true, explanation:'グリーフケアは死別などによる悲嘆（グリーフ）を抱えた遺族を心理的・社会的に支援するケアです。近年、葬儀社が葬儀後の遺族を訪問したり、グリーフケアの場を提供したりするアフターフォローの一環として提供するケースが増えています。' },
{ chapter:8, type:'ox', text:'「手元供養（てもとくよう）」とは、遺骨の一部を小さな骨壺や専用のアクセサリーに入れて手元に置いて供養する方法である。', answer:true, explanation:'手元供養は墓への納骨に加えて（または代わりに）遺骨の一部を手元に置いて供養する方法です。ミニ骨壺・メモリアルジュエリー（遺骨を入れたアクセサリー）・ぬいぐるみ型など様々な形があり、近年増加しています。' },

// ========================================
// 追加問題（4択 48問）
// ========================================

// --- 仏教宗派詳細 ---
{ chapter:8, type:'4', text:'「浄土真宗大谷派（東本願寺）」の焼香作法として正しいものはどれか。', choices:['額に押しいただいて1回','額に押しいただかずに1回','額に押しいただかずに2回','額に押しいただいて3回'], answer:2, explanation:'真宗大谷派（東本願寺）の焼香は「押しいただかず（額に当てず）に2回」が正式な作法です。浄土真宗本願寺派（西本願寺）は「押しいただかずに1回」です。この違いは覚えておく必要があります。' },
{ chapter:8, type:'4', text:'「一向宗（いっこうしゅう）」とは何の別称か。', choices:['曹洞宗','日蓮宗','浄土真宗','時宗'], answer:2, explanation:'一向宗は浄土真宗（本願寺）の俗称で、「ひたすら（一向に）阿弥陀仏を念じる」という意味から付いた呼び名です。戦国時代に各地で起きた「一向一揆」は浄土真宗（一向宗）の門徒が起こした武装蜂起でした。' },
{ chapter:8, type:'4', text:'「修験道（しゅげんどう）」の特徴として正しいものはどれか。', choices:['純粋な仏教の宗派','山岳での厳しい修行を通じて呪力を得ようとする、仏教・神道・道教などが融合した宗教実践','キリスト教の影響を受けた日本固有の宗教','武士道を宗教化した日本独自の精神形式'], answer:1, explanation:'修験道は山岳に神仏が宿るという信仰のもと、峰入り（山中での修行）を通じて霊力・呪力（験力）を得ようとする宗教実践で、仏教（特に密教）・神道・道教・山岳信仰などが融合しています。役小角（えんのおづぬ）を開祖とします。' },
{ chapter:8, type:'4', text:'「高野山（こうやさん）」について正しい説明はどれか。', choices:['天台宗の総本山がある山','真言宗の総本山・金剛峯寺がある霊場で、世界遺産にも登録されている','日蓮宗の創始者・日蓮が晩年を過ごした山','禅宗の修行道場が集まる山'], answer:1, explanation:'高野山（和歌山県伊都郡高野町）は真言宗の総本山・金剛峯寺がある霊場で、2004年に「紀伊山地の霊場と参詣道」としてユネスコ世界遺産に登録されました。奥之院には空海の御廟所があり、今も生きて定を続けていると信じられています。' },
{ chapter:8, type:'4', text:'「比叡山（ひえいざん）」延暦寺の説明として正しいものはどれか。', choices:['真言宗の総本山','浄土宗の開祖・法然が開いた寺','天台宗の総本山で、多くの鎌倉仏教の開祖を輩出した日本仏教の母山','日蓮宗の総本山'], answer:2, explanation:'比叡山延暦寺（滋賀県大津市）は天台宗の総本山で、最澄（伝教大師）が開きました。法然・親鸞・道元・日蓮・栄西など鎌倉時代の多くの宗祖が修行した場所であり「日本仏教の母山」と呼ばれます。2004年に世界遺産登録。' },
{ chapter:8, type:'4', text:'「永平寺（えいへいじ）」について正しい説明はどれか。', choices:['臨済宗の総本山','曹洞宗の大本山のひとつで、道元が開いた寺','浄土真宗の本山','真言宗の別院'], answer:1, explanation:'永平寺（福井県吉田郡永平寺町）は曹洞宗の大本山のひとつで、道元が1244年に開きました。現在も多くの雲水（修行僧）が修行する「参禅道場」として知られます。もう一つの大本山は横浜の總持寺です。' },
{ chapter:8, type:'4', text:'「知恩院（ちおんいん）」の説明として正しいものはどれか。', choices:['曹洞宗の総本山','浄土宗の総本山で、法然上人が念仏を広めた地に建てられた','日蓮宗の大本山','浄土真宗の別院'], answer:1, explanation:'知恩院（京都市東山区）は浄土宗の総本山で、法然上人が念仏の教えを広め、入定（死去）した地に建てられました。三門（国宝）は木造建築として日本最大級の規模を誇ります。除夜の鐘でも有名です。' },
{ chapter:8, type:'4', text:'「宗祖（しゅうそ）」と「中興の祖（ちゅうこうのそ）」の違いとして正しいものはどれか。', choices:['宗祖は現在の宗派のトップ、中興の祖は歴史上の人物','宗祖はその宗派を開いた人物、中興の祖は後に宗派を再興・発展させた人物','まったく同じ意味','宗祖は仏教用語、中興の祖は神道用語'], answer:1, explanation:'宗祖はその宗派の開祖を指します。中興の祖は宗派が衰えた時期にそれを再び盛んにした功績ある人物のことです。例えば曹洞宗では道元が宗祖、瑩山紹瑾が中興の祖とされます。' },

// --- 神式詳細 ---
{ chapter:8, type:'4', text:'神式葬儀の「発柩祭（はっきゅうさい）」とは何か。', choices:['火葬場で行う最後の儀式','棺を斎場・自宅から出棺する際の儀式','骨上げの際の儀式','帰宅後の清めの儀式'], answer:1, explanation:'発柩祭は棺を安置場所（自宅・斎場）から出棺する際に行う神式の儀式です。仏式の「出棺」に相当します。出棺の際に神職が祝詞を奏上し、一同が玉串を奉奠して故人の旅立ちを送ります。' },
{ chapter:8, type:'4', text:'神式葬儀における香典の正しい表書きはどれか。', choices:['御仏前','御花料','御玉串料または御榊料','御霊前のみ'], answer:2, explanation:'神式葬儀への香典は「御玉串料（おたまぐしりょう）」または「御榊料（おさかきりょう）」が最も適切です。「御神前（ごしんぜん）」「御霊前」も使えます。「御仏前」は仏式専用です。' },
{ chapter:8, type:'4', text:'神道における「祓詞（はらえことば）」とはどういうものか。', choices:['葬儀の際に奏上する弔いの言葉','穢れや罪を祓い清めるために唱える祝詞（のりと）','神社への参拝時に述べる感謝の言葉','神職の身分を証明する言葉'], answer:1, explanation:'祓詞は穢れ・罪・災いを祓い清めるために唱える祝詞で、「払へ給ひ清め給へと申す事を聞こし召せと白す」という内容が含まれます。神葬祭でも各種の儀礼で祓詞が奏上されます。' },

// --- 諸宗教・比較 ---
{ chapter:8, type:'4', text:'「イスラム教」の葬儀の特徴として正しいものはどれか。', choices:['火葬が原則で、できるだけ早く行う','土葬が原則で、死後できるだけ早く（24時間以内が理想）行う','散骨が推奨される','遺体は7日間安置してから埋葬する'], answer:1, explanation:'イスラム教では遺体を土に還すことが教義上の原則のため土葬です。また「早い埋葬が故人への敬意」とされ、死後できるだけ早く（24時間以内が理想）に行います。日本では土葬できる墓地が少なく課題となっています。' },
{ chapter:8, type:'4', text:'ユダヤ教の葬儀の特徴として正しいものはどれか。', choices:['豪華な棺を使い、長期間かけて行う','シンプルな木製の棺を使い、死後できるだけ早く土葬する','火葬を推奨する','僧侶が読経する'], answer:1, explanation:'ユダヤ教では「人間は土から生まれ土に返る」という考えから、土葬が原則です。棺はシンプルな木製（木釘使用・金具不使用）が伝統で、土に早く還るようにします。死後24時間以内の埋葬が理想とされます。' },
{ chapter:8, type:'4', text:'ヒンドゥー教の葬儀の特徴として正しいものはどれか。', choices:['土葬が原則','火葬が原則で、ガンジス川での水葬も行われる','遺体は保存処理して長期間安置する','読経を3日間続ける'], answer:1, explanation:'ヒンドゥー教では輪廻転生の思想から「肉体はただの入れ物」と考え、火葬（荼毘・だび）が一般的です。インドではガンジス川沿いの火葬場（ガート）で火葬し、遺灰を川に流す慣習があります。仏教の「荼毘に付す」という言葉もヒンドゥー教由来です。' },
{ chapter:8, type:'4', text:'「神道」「仏教」「キリスト教」「イスラム教」の中で、日本人の葬儀で最も多く行われているのはどれか。', choices:['神道（神葬祭）','仏教式（仏式）','キリスト教式','イスラム教式'], answer:1, explanation:'日本の葬儀は仏教式が最も多く、約90%前後とされています（調査機関・時期によって異なります）。神式は数%程度、キリスト教式は1〜2%程度です。ただし近年は無宗教・家族葬の増加により、宗教色のない葬儀も増えています。' },
{ chapter:8, type:'4', text:'次のうち「教派神道」として明治政府が公認した13派に含まれないものはどれか。', choices:['天理教','黒住教','金光教','創価学会'], answer:3, explanation:'教派神道（神道十三派）は明治政府が公認した神道系宗教で、黒住教・神道修成派・出雲大社教・扶桑教・実行教・大成教・神習教・御嶽教・神道大社教・禊教・金光教・天理教・神道本局の13派です。創価学会は日蓮宗系の新宗教であり含まれません。' },

// --- 法要・文化 ---
{ chapter:8, type:'4', text:'「お彼岸（おひがん）」に行う主な供養として一般的なものはどれか。', choices:['神社への参拝と玉串奉奠','墓参り・仏壇への供養・法要','教会での礼拝と献花','散骨と海洋供養'], answer:1, explanation:'お彼岸（春分・秋分の前後各3日間）には先祖の墓参り・仏壇への供物・法要などが行われます。「ぼたもち（牡丹餅）」「おはぎ（御萩）」を供える慣習も有名です（春はぼたもち、秋はおはぎ）。神式・キリスト教式では一般的な行事ではありません。' },
{ chapter:8, type:'4', text:'「四十九日」に行う一般的な作法として誤っているものはどれか。', choices:['仮の白木位牌から本位牌へ切り替える','香典の表書きを「御霊前」から「御仏前」に変更する','納骨を行う','喪中はがきを送る'], answer:3, explanation:'喪中はがき（年賀欠礼状）は11〜12月に送るもので、四十九日のタイミングで送るものではありません。四十九日では①白木位牌から本位牌への切り替え②納骨③忌明けのお礼④「御霊前」→「御仏前」への表書き変更、などが一般的に行われます。' },
{ chapter:8, type:'4', text:'「回向（えこう）」とはどういう意味か。', choices:['お墓の向きを変えること','自分の功徳（善行・読経など）を故人や他の人のために振り向けること','葬儀場の方向を確認すること','仏壇の向きを直すこと'], answer:1, explanation:'回向（廻向）とは自分が積んだ善根・功徳を他の者（故人や生きている人）のために振り向けることです。法要での読経・布施などが回向の代表的な実践で、「追善回向」は故人の冥福のために行う追善供養を指します。' },
{ chapter:8, type:'4', text:'「施餓鬼（せがき）」法要とは何か。', choices:['葬儀の費用を計算する儀礼','餓鬼道に苦しむ霊や無縁仏に食物を施す供養法要','お盆に行う盆踊りの起源となった儀式','彼岸に行う先祖供養の特別法要'], answer:1, explanation:'施餓鬼法要は、餓鬼道（飢えに苦しむ世界）に堕ちた霊や無縁仏（供養する人のない霊）に食物を施して供養する法要です。お盆の時期や彼岸に合わせて行われることが多く、お寺が主催する合同の施餓鬼法要も各地で行われます。' },
{ chapter:8, type:'4', text:'「位牌（いはい）」の説明として正しいものはどれか。', choices:['神式で使用する霊魂の依代','仏式で戒名・没年月日・俗名などを記した木製の牌で、故人の霊の依代とされる','キリスト教式で聖書を置く台','葬儀場の案内表示板'], answer:1, explanation:'位牌は仏式で使用する木製の牌で、戒名・没年月日・俗名・享年などが記されます。故人の霊の依代（よりしろ）として仏壇に安置し、日々の供養の対象となります。葬儀直後は白木の「仮位牌（白木位牌）」を使い、四十九日後に塗位牌・本位牌に変えます。' },
{ chapter:8, type:'4', text:'「通夜振舞い（つやぶるまい）」とは何か。', choices:['通夜の式次第の進行のこと','通夜終了後に参列者を接待する会食のこと','通夜の際に喪主が挨拶すること','通夜の翌朝に行う朝食のこと'], answer:1, explanation:'通夜振舞いは通夜の式が終わった後、参列者に飲食でもてなす会食のことです。故人との思い出を語り合い、遺族が参列へのお礼をする場でもあります。料理は寿司・オードブル・精進料理などが多く、地域によって内容が異なります。' },
{ chapter:8, type:'4', text:'「中陰（ちゅういん）」とは何を指すか。', choices:['仏壇のある部屋のこと','死後に次の生を受けるまでの49日間の状態','仏教の瞑想修行の一種','葬儀と告別式の間の休憩時間'], answer:1, explanation:'中陰（中有）とは仏教において、死後に次の生（転生）を受けるまでの過渡的な状態・期間を指します。この期間は49日間（七七日）とされ、7日ごとに裁きを受けると考えられています。これが四十九日法要を重視する根拠となっています。' },
{ chapter:8, type:'4', text:'「引導（いんどう）」を渡す主な目的として正しいものはどれか。', choices:['遺体を火葬場まで運ぶ','故人の霊を迷いから解放し、仏の世界へ導く','遺族に葬儀の費用を説明する','参列者に式の進行を案内する'], answer:1, explanation:'引導は導師（僧侶）が故人に向けて引導文（いんどうぶん）を読み上げ、この世への執着を断ち切って迷わず仏の世界へ向かうよう導く儀式です。仏式葬儀（特に禅宗）の中核をなす重要な儀礼のひとつです。' },
{ chapter:8, type:'4', text:'「導師（どうし）」が複数の僧侶で行う葬儀の場合、最も位の高い僧侶はどの役割を担うか。', choices:['受付・案内','導師（引導を渡す主役の僧侶）','斎主（神職の役割）','葬儀社の担当者'], answer:1, explanation:'複数の僧侶が参列する葬儀では、最も地位の高い（または住職・故人と最も縁の深い）僧侶が「導師」として引導・読経の中心的役割を務めます。他の僧侶は「伴僧（ばんそう）・脇僧（わきそう）」として導師を補佐します。' },
{ chapter:8, type:'4', text:'「焼香」の「抹香（まっこう）」とはどういうものか。', choices:['線香を細かく粉末にしたもの，または香木・香料を粉末にしたもの','ロウソクに火をつける道具','仏壇に供える果物や菓子','焼香台の炭火のこと'], answer:0, explanation:'抹香（まっこう）は香木・香料などを細かく粉末状にしたもので、焼香の際に指でつまんで炭火の上に落として焚きます。「沈香（じんこう）」「白檀（びゃくだん）」など香木が主原料です。' },
{ chapter:8, type:'4', text:'「般若心経（はんにゃしんぎょう）」はどの宗派でも広く読まれているか。', choices:['浄土真宗でも必ず読まれる','浄土真宗では読まれないが、他の多くの宗派で広く読まれている','日蓮宗でのみ読まれる','キリスト教でも取り入れている'], answer:1, explanation:'般若心経は真言宗・天台宗・禅宗（曹洞宗・臨済宗）・浄土宗など多くの宗派で読まれる経典です。しかし浄土真宗では「阿弥陀経・正信偈」など浄土三部経が中心で、般若心経は読みません。日蓮宗も法華経が中心です。' },
{ chapter:8, type:'4', text:'「過去帳（かこちょう）」を毎日めくる習慣について正しいものはどれか。', choices:['浄土真宗では毎日めくり、その日の命日の故人に手を合わせる習慣がある','すべての宗派で必ず毎日めくる','過去帳はめくらずに保管するだけのもの','過去帳は寺院だけが持つもの'], answer:0, explanation:'浄土真宗では過去帳を命日帳として毎日めくり（日付のある「日めくり型過去帳」）、その日に命日を迎える先祖に手を合わせる習慣があります。位牌を使わない浄土真宗において過去帳は重要な供養の道具です。' },
{ chapter:8, type:'4', text:'「檀家（だんか）」制度の説明として正しいものはどれか。', choices:['江戸幕府が設けた制度で、すべての人が特定の寺院に所属することを義務付けた','平安時代に始まった貴族と寺院の関係','神社と氏子の関係を指す','葬儀社が顧客を管理するシステム'], answer:0, explanation:'檀家制度は江戸幕府がキリシタン禁制のために設けた「寺請制度（てらうけせいど）」に基づくもので、すべての民衆が特定の寺院の檀家となり、宗教証明を受けることを義務付けました。これが現代の「菩提寺（ぼだいじ）」制度の起源です。' },

// --- 追加30問（○×15・4択15）---
{ chapter:8, type:'ox', text:'「お布施（おふせ）」は葬儀サービスへの対価（報酬）であり、消費税の課税対象となる。', answer:false, explanation:'お布施は僧侶・寺院への感謝として渡すものであり、法的には「寄付金（布施）」の性格を持ちます。対価性のない寄付のため消費税は不課税です。金額の明示義務もなく、「お気持ち」として遺族が決める形が多いです。' },
{ chapter:8, type:'ox', text:'「初七日法要」は現代では葬儀当日に「繰り込み初七日」として行われることが多い。', answer:true, explanation:'本来は死後7日目に行う初七日法要ですが、遠方からの参列者の都合・日程の効率化のため、現代では葬儀・告別式当日に続けて行う「繰り込み初七日（式中初七日）」が主流になっています。' },
{ chapter:8, type:'ox', text:'「精霊馬（しょうりょううま）」はお盆に作るきゅうりとなすの飾りで、きゅうりが馬、なすが牛を表す。', answer:true, explanation:'精霊馬（精霊牛）はお盆に先祖の霊を迎え送るための乗り物として作ります。きゅうりは足の速い「馬」（あの世から早く帰ってくるよう）、なすはゆっくりした「牛」（この世をゆっくり去っていくよう）を表します。' },
{ chapter:8, type:'ox', text:'「寺請制度（てらうけせいど）」は明治時代に廃止され、現代日本には存在しない。', answer:true, explanation:'寺請制度は明治政府の政教分離政策により1871年（明治4年）に廃止されました。しかし「菩提寺」への依存や仏教式葬儀の慣行は現在も続いており、制度としては廃止されても文化・慣習として根付いています。' },
{ chapter:8, type:'ox', text:'「禅語」で有名な「不立文字（ふりゅうもんじ）」とは「文字に頼らず直接体験で悟りを得る」という禅の立場を示す。', answer:true, explanation:'「不立文字」は禅の基本姿勢を示す言葉で、「経典の文字・言葉に頼らず、師から弟子への心から心への直接伝達（以心伝心）によって悟りを伝える」という意味です。「教外別伝（きょうげべつでん）」「直指人心（じきしにんしん）」「見性成仏（けんしょうじょうぶつ）」とともに禅の四句とされます。' },
{ chapter:8, type:'ox', text:'「念仏（ねんぶつ）」とは仏の名前を唱えることだけを指す。', answer:false, explanation:'念仏とは本来「仏を念じる（心に思い浮かべる）」という意味で、①口称念仏（くしょうねんぶつ：声に出して仏名を称える）②観想念仏（かんそうねんぶつ：仏の姿を心に観想する）③実相念仏などがあります。日本の浄土宗系では主に口称念仏（「南無阿弥陀仏」を称える）を指します。' },
{ chapter:8, type:'ox', text:'「神道」では「死穢（しえ）」を最大の穢れとするため、神社の境内に墓地を設けることは原則ない。', answer:true, explanation:'神道において死は最大の穢れ（死穢）とされるため、神社の境内に墓地を設けることは原則ありません。これは寺院が境内に墓地（寺院墓地）を持つ仏教の慣習と対照的です。神道系の墓地は神社とは別の場所に設けられます。' },
{ chapter:8, type:'ox', text:'「連名（れんめい）」の香典は、複数人が連名で一つの香典袋に入れて渡すことができる。', answer:true, explanation:'同僚・グループ・部署など複数人でまとめて香典を出す場合、連名で一つの香典袋に入れることができます。表書きには代表者名を書き「外一同」などと添えます。別紙に全員の名前と金額を書いて同封するのが丁寧な作法です。' },
{ chapter:8, type:'ox', text:'「浄土（じょうど）」とは仏が清らかにした世界のことで、「極楽浄土」は阿弥陀仏の浄土を指す。', answer:true, explanation:'浄土は仏・菩薩が衆生を救うために設けた清浄な世界のことです。阿弥陀仏の浄土は「極楽浄土（西方極楽世界）」、薬師仏の浄土は「東方浄瑠璃世界」などがあります。浄土宗・浄土真宗は阿弥陀仏の極楽浄土への往生を目指します。' },
{ chapter:8, type:'ox', text:'「密教（みっきょう）」は公開された教えであり、誰でも自由に学ぶことができる。', answer:false, explanation:'密教の「密」は「秘密」を意味し、師から弟子への秘密の伝授（口伝・灌頂）によって伝えられる教えです。「顕教（けんきょう）」が経典として公開された教えなのに対し、密教は師資相承（師弟間の秘密の伝達）を重視します。' },
{ chapter:8, type:'ox', text:'「真言宗」の「護摩（ごま）」とは、火を使った密教の儀式で、煩悩を焼き尽くす意味がある。', answer:true, explanation:'護摩（梵語：ホーマ）は密教の重要な修法で、炉に火を焚き、木・米・胡麻などの供物を投入して燃やすことで煩悩を焼き尽くし、願いを成就させるとされます。不動明王を本尊として行う「不動護摩」が代表的です。' },
{ chapter:8, type:'ox', text:'「日蓮正宗（にちれんしょうしゅう）」は日蓮宗から派生した宗派で、創価学会はかつてこの宗派の信徒団体だった。', answer:true, explanation:'日蓮正宗は1290年頃に日興（にっこう）が日蓮の本弟子として開いた宗派で、総本山は富士山麓の大石寺（静岡県富士宮市）です。創価学会は元々日蓮正宗の信徒団体でしたが、1991年に対立が深まり破門されて独立しました。' },
{ chapter:8, type:'ox', text:'「おくり火（送り火）」はお盆の最終日（8月16日）に先祖の霊を送り出すために焚く火である。', answer:true, explanation:'送り火はお盆の終わり（8月16日）に先祖の霊があの世へ帰るのを見送るために焚く火です。迎え火（8月13日）の対となる慣習です。京都の「大文字焼き（五山の送り火）」は全国的に有名な送り火の行事です。' },
{ chapter:8, type:'ox', text:'「施主（せしゅ）」は仏教用語で、もともとは「布施（ふせ）をする人＝僧侶・寺院に財物を施す人」を意味する。', answer:true, explanation:'施主は梵語「ダーパティ」の訳で、本来は「布施をする在家信者（お金・食物などを僧侶に施す人）」という意味です。現代では葬儀・法要の費用を負担し手配する人（多くの場合、喪主と同一人物）を指す意味でも使われています。' },
{ chapter:8, type:'ox', text:'「開眼供養（かいげんくよう）」とは、新しく作った仏像・位牌・墓石などに魂（霊）を入れる儀式である。', answer:true, explanation:'開眼供養（開眼法要・魂入れ）は新しく仏像・位牌・墓石などを作った際に、僧侶が読経して「目を開く（魂・霊を入れる）」儀式です。これにより単なる物体が礼拝の対象となります。墓石を建てた際にも行われます。' },
{ chapter:8, type:'4', text:'「両祖（りょうそ）」という言葉で知られる曹洞宗の二人の宗祖は誰か。', choices:['道元と栄西','道元と瑩山紹瑾','最澄と空海','法然と親鸞'], answer:1, explanation:'曹洞宗では「両祖（りょうそ）」として道元（承陽大師）と瑩山紹瑾（常済大師）を崇敬します。道元が宗祖として曹洞宗を開き、瑩山が総持寺を開いて宗勢を大きく拡大したことから「中興の祖」と呼ばれます。' },
{ chapter:8, type:'4', text:'「禅宗」の葬儀における焼香の回数として一般的なものはどれか。', choices:['1回','2回','3回','5回'], answer:2, explanation:'曹洞宗・臨済宗などの禅宗では焼香を3回行うのが一般的な作法です。ただし地域・寺院・状況によって異なる場合もあります。浄土真宗（1〜2回）や浄土宗（1〜3回）などと比較して覚えましょう。' },
{ chapter:8, type:'4', text:'「五山（ごさん）」制度とは何か。', choices:['天台宗の五つの本山','鎌倉・室町幕府が定めた禅宗寺院の格付け制度','真言宗の重要寺院五か所','浄土宗の五つの大本山'], answer:1, explanation:'五山制度は鎌倉・室町幕府が臨済宗の重要寺院を格付けした制度で、京都五山（天龍寺・相国寺・建仁寺・東福寺・万寿寺）と鎌倉五山（建長寺・円覚寺・寿福寺・浄智寺・浄妙寺）があります。幕府の保護下で禅文化が発展しました。' },
{ chapter:8, type:'4', text:'「本山（ほんざん）」と「末寺（まつじ）」の関係として正しいものはどれか。', choices:['本山は古い寺院、末寺は新しい寺院','本山は宗派の中心となる寺院、末寺はその宗派に属する一般の寺院','本山は大きな寺院、末寺は小さな寺院','本山は東京の寺院、末寺は地方の寺院'], answer:1, explanation:'本山は宗派の中心・統括機関となる寺院（総本山・大本山など）で、宗祖ゆかりの地に建てられることが多いです。末寺はその宗派に属する一般の寺院で、本山の管轄下にあります。「本末関係（ほんまつかんけい）」と呼ばれます。' },
{ chapter:8, type:'4', text:'「無宗教葬（自由葬）」で避けるべき配慮として正しいものはどれか。', choices:['音楽を流すこと','特定の宗教の儀礼（読経・祝詞・讃美歌など）を押しつけないこと','献花を行うこと','司会者を設けること'], answer:1, explanation:'無宗教葬では参列者の宗教的背景が様々であることを考慮し、特定宗教の儀礼を強制しないことが重要です。音楽・献花・司会・映像などは宗教色のない演出として広く使われます。故人・遺族の意向を最大限尊重した式づくりが求められます。' },
{ chapter:8, type:'4', text:'「葬場祭（そうじょうさい）」とはどの宗教の葬儀用語か。', choices:['仏式','神式（神葬祭）','キリスト教式','無宗教葬'], answer:1, explanation:'葬場祭は神葬祭（神式葬儀）の中心的な儀式で、仏式の「葬儀・告別式」に相当します。斎主が祭詞を奏上し、参列者が玉串奉奠を行います。神葬祭の式次第は遷霊祭→発柩祭→葬場祭→火葬祭→帰家祭の順です。' },
{ chapter:8, type:'4', text:'「戒名料（かいみょうりょう）」についての正しい説明はどれか。', choices:['法律で定められた一定の金額がある','一般的に院号＞道号・戒名＞位号の順に高くなる傾向があり、金額は寺院・宗派によって大きく異なる','戒名料は仏教どの宗派でも同じ料金体系','戒名料は葬儀社が設定する'], answer:1, explanation:'戒名料は法律で定められた金額はなく、院号の有無・文字数・寺院との関係などによって大きく異なります。院号付きは数十万〜数百万円、一般的な戒名は数万〜数十万円程度が相場とされますが、寺院・地域・宗派によって様々です。' },
{ chapter:8, type:'4', text:'「神棚封じ（かみだなふうじ）」とはどういうものか。', choices:['神棚を撤去すること','死の穢れが神棚に及ばないよう、白い紙を貼って神棚を封じること','神棚に新しい神札を入れること','神棚の掃除をすること'], answer:1, explanation:'神棚封じは家人が亡くなった際に、死の穢れが神様に及ばないよう神棚の扉または正面に白紙（半紙）を貼って封じる慣習です。神道の「死穢（しえ）」の概念から来ており、忌明け（五十日祭後）に紙を取り外します。' },
{ chapter:8, type:'4', text:'「菩提寺（ぼだいじ）」の意味として正しいものはどれか。', choices:['悟りを開いた場所にある寺','その家の先祖代々の葬儀・法事を行い、遺骨・位牌を管理する縁の深い寺院','全国で最も格式の高い寺院','葬儀社が指定する提携寺院'], answer:1, explanation:'菩提寺とは、その家の先祖代々の葬儀・年忌法要を行い、墓地・位牌を管理する縁の深い寺院のことです。江戸時代の寺請制度に起源を持ち、現代でも「家の宗教」として続いています。菩提寺のある家では葬儀の際に菩提寺の住職に依頼するのが一般的です。' },
{ chapter:8, type:'4', text:'「三途の川（さんずのかわ）」について正しい説明はどれか。', choices:['神道の死後の世界に存在する川','仏教の死後の世界観で、死者がこの世からあの世へ渡る際に越えるとされる川','キリスト教の天国への道にある川','実在する河川の別名'], answer:1, explanation:'三途の川は仏教の死後の世界観で、死者が冥土へ向かう途中に渡るとされる川です。生前の行いによって渡り方が異なり（橋・浅瀬・深み）、川の番人「奪衣婆（だつえば）」と「懸衣翁（けんえおう）」が衣服を奪って罪の重さを量るとされます。' },
{ chapter:8, type:'4', text:'「冥土（めいど）」「黄泉（よみ）」「地獄（じごく）」の説明として正しいものはどれか。', choices:['すべて同じ場所を指す別の言葉','冥土は仏教の死後の世界、黄泉は日本神話の死者の国、地獄は冥土の中でも罪人が苦しむ場所','冥土はキリスト教用語、黄泉は仏教用語','地獄は現世の苦しい状態を表すだけで死後の世界ではない'], answer:1, explanation:'「冥土（冥途）」は仏教における死後の世界の総称、「黄泉（よもつひらさか）」は日本神話（古事記）に登場する死者が行く国、「地獄」は冥土の中で最も厳しい罰を受ける場所です。それぞれ由来する宗教・文化が異なります。' },
{ chapter:8, type:'4', text:'「仏壇（ぶつだん）」の本来の意味として正しいものはどれか。', choices:['先祖の位牌を飾る棚','家庭内に本尊（仏像）を安置し礼拝するための壇','葬儀場に設置する祭壇','お盆に精霊棚として使う棚'], answer:1, explanation:'仏壇は本来、家庭内に本尊（仏像・曼荼羅など）を安置して礼拝するための壇です。先祖の位牌を置く機能は後から加わったもので、「先祖を祀る場所」というイメージが強くなっていますが、本来は「本尊を礼拝する家庭の小さなお寺」です。' },
{ chapter:8, type:'4', text:'「宗派（しゅうは）」を確認することが葬儀準備で重要な理由として最も適切なものはどれか。', choices:['葬儀費用の計算のため','祭壇形式・焼香回数・経典・作法など式全体に関わるため','参列者へのご案内文作成のため','火葬場の予約のため'], answer:1, explanation:'宗旨宗派によって祭壇の形（白木/花）・焼香回数（1〜3回）・読む経典・引導の有無・数珠の形式・位牌の使用有無・戒名の呼称（戒名/法名）など、式全体に関わる多くの要素が異なります。葬儀施行の最重要確認事項のひとつです。' },
{ chapter:8, type:'4', text:'「檀那（だんな）」の語源として正しいものはどれか。', choices:['中国語で「主人」を意味する言葉','梵語（サンスクリット語）の「ダーナ（布施・施し）」に由来する','日本語の「旦那」から来た言葉','英語の「donor（寄付者）」から来た言葉'], answer:1, explanation:'「檀那（だんな）」は梵語のダーナ（dāna・布施・施し）が由来で、「寺院に布施をする在家信者（檀家）」を意味します。これが転じて「主人・旦那様」という意味でも使われるようになりました。「檀家（だんか）」も同じ語源です。' },
{ chapter:8, type:'4', text:'次の「宗派別・焼香回数」の組み合わせとして正しいものはどれか。', choices:['浄土真宗本願寺派：2回、真宗大谷派：1回','浄土真宗本願寺派：1回、真宗大谷派：2回','曹洞宗：1回、日蓮宗：3回','浄土宗：2回、天台宗：1回'], answer:1, explanation:'浄土真宗の焼香回数は本願寺派（西）が1回、大谷派（東）が2回です（いずれも額に押しいただかない）。曹洞宗・臨済宗は3回が一般的、浄土宗・天台宗・真言宗は1〜3回（宗派の指定あり）、日蓮宗は1回または3回が多いです。' },
{chapter:8, type:'4', source:'past', text:'葬祭ディレクター技能審査の制度に関する記述として、最も適切なものはどれか。', choices:['厚生労働省認定の技能審査であり、葬祭サービスに従事する者に必要な知識・技能の程度を審査する ものである。','経済産業省が認定する国家資格であり、合格しなければ葬祭業を営むことができない。','文部科学省認定の検定試験であり、主として学生の就職支援を目的としている。','各都道府県知事が認定する資格であり、都道府県ごとに審査の基準が異なる。'], answer:0, explanation:'葬祭ディレクター技能審査は、葬祭サービスに従事する者に必要な知識・技能の程度を審査する厚生労働省認定の技能 審査であり、葬祭ディレクター技能審査協会が実施している。業務独占資格ではないため、合格しなくても葬祭業に従事 することは可能であり、営業の許可要件でもない。経済産業省や文部科学省が認定するものではなく、都道府県ごとに 審査基準が異なる仕組みでもない。'},
{chapter:8, type:'4', source:'past', text:'葬祭ディレクター技能審査の等級区分に関する記述として、最も適切なものはどれか。', choices:['初級・中級・上級の3つの区分が設けられている。','1級と2級の2つの等級が設けられている。','等級の区分はなく、合格・不合格のみが判定される。','1級から5級までの5段階の等級が設けられている。'], answer:1, explanation:'葬祭ディレクター技能審査には1級と2級の2つの等級が設けられている。2級は個人葬を中心とする葬祭サービスの一般 的な知識・技能を、1級は社葬などを含む葬祭サービス全般についての詳細な知識・技能を審査の対象としており、等級 によって求められる水準と範囲が異なる。初級・中級・上級という3区分や5段階の等級制は採用されておらず、等級を 設けずに合否のみを判定する仕組みでもない。'},
{chapter:8, type:'4', source:'past', text:'葬祭ディレクター技能審査の試験の構成に関する記述として、最も適切なものはどれか。', choices:['学科試験のみで構成され、実技に関する審査は行われない。','実技試験のみで構成され、学科に関する審査は行われない。','学科試験と実技試験の両方によって構成されている。','面接試験と論文試験の2つによって構成されている。'], answer:2, explanation:'葬祭ディレクター技能審査は、葬祭に関する知識を問う学科試験と、実務の能力を確認する実技試験の両方で構成されて いる。知識だけでなく、現場で求められる技能や応対も審査の対象とすることで、葬祭サービスの担い手としての総合 的な能力を評価する仕組みとなっている。学科のみ、あるいは実技のみで合否を判定するものではなく、面接と論文に よって構成される審査でもない。'},
{chapter:8, type:'4', source:'past', text:'葬祭ディレクター技能審査における1級と2級の審査範囲に関する記述として、最も適切なものはどれか。', choices:['1級は火葬に関する業務を、2級は埋葬に関する業務を対象としている。','1級は仏式の葬儀のみを、2級はすべての宗教の葬儀を対象としている。','2級は社葬などの大規模な葬儀を含み、1級は個人葬のみを対象としている。','2級は個人葬を中心とする一般的な葬祭サービスを、1級は社葬などを含む葬祭サービス全般を対象と している。'], answer:3, explanation:'2級は個人葬における相談、会場設営、式典運営など、一般的な葬祭サービスに必要な知識・技能を審査の対象とし、1 級は個人葬に加えて社葬などの大規模な葬儀を含む、葬祭サービス全般についての詳細な知識・技能を審査の対象とし ている。上位の等級である1級のほうが対象範囲が広く、求められる水準も高い。火葬と埋葬で等級が分かれているので はなく、宗教の別によって等級が定められているのでもない。'},
{chapter:8, type:'4', source:'past', text:'葬祭ディレクターの職務に関する記述として、最も適切なものはどれか。', choices:['死亡診断書の作成も葬祭ディレクターの重要な職務に含まれる。','葬儀の相談・打合せ、見積りの作成、式典の設営・運営・進行管理などが主な職務である。','読経や授戒といった宗教儀礼を執り行うことが中心的な職務である。','遺産分割協議の代理人として相続の手続を行うことが主な職務である。'], answer:1, explanation:'葬祭ディレクターの主な職務は、遺族との葬儀の相談・打合せ、見積りの作成と提示、式場の設営、式典の運営と進行 管理、遺族への助言などである。死亡診断書は医師または歯科医師が作成・交付し、死体検案書は医師が作成するもの であり、読経や授戒などの宗教儀礼を執り行うことは僧侶をはじめとする宗教者の役割である。また、遺産分割協議の 代理は弁護士など法律専門職の業務であり、いずれも葬祭ディレクターの職務には含まれない。'},
{chapter:8, type:'4', source:'past', text:'葬儀の打合せにおける葬祭ディレクターの対応として、最も適切なものはどれか。', choices:['遺族の意向を丁寧に聞き取り、内容と費用を分かりやすく説明したうえで決めてもらう。','打合せの時間を短縮するため、遺族の希望は聞かずに標準的なプランで進める。','利益率の高いプランから順に勧め、断られた場合にのみ他のプランを提示する。','内容の判断はすべて喪主一人に委ね、説明や提案は行わないようにする。'], answer:0, explanation:'葬儀の打合せでは、遺族の意向や故人の遺志、予算などを丁寧に聞き取り、葬儀の内容と費用を分かりやすく説明して、 遺族が納得したうえで決定できるよう支援することが基本である。遺族は深い悲しみの中で短い時間に多くの判断を迫 られるため、専門家としての適切な情報提供と助言が欠かせない。希望を聞かずに進める、自社の利益を優先して勧め る、説明や提案を放棄するといった対応はいずれも不適切である。'},
{chapter:8, type:'4', source:'past', text:'葬儀の見積りに関する葬祭ディレクターの対応として、最も適切なものはどれか。', choices:['見積書は施行後に発行すれば足り、事前に提示する必要はない。','総額のみを口頭で伝え、内訳は質問された場合に限って説明する。','項目ごとの内訳を明示した見積書を事前に提示し、内容を説明して了解を得る。','追加費用が生じる可能性は、請求の段階まで伝えないでおく。'], answer:2, explanation:'葬儀は依頼から施行までが短期間に進むため、祭壇、棺、車両、料理、返礼品など項目ごとの内訳を明示した見積書を 事前に提示し、内容を十分に説明して遺族の了解を得ることが重要である。会葬者数の変動などによって追加費用が生 じる可能性がある場合には、その条件もあらかじめ説明しておく必要がある。総額だけを口頭で伝える、施行後に初め て書面を示すといった対応は、請求をめぐるトラブルの典型的な原因となる。'},
{chapter:8, type:'4', source:'past', text:'葬儀式典における葬祭ディレクターの進行管理に関する記述として、最も適切なものはどれか。', choices:['開式後の進行は宗教者に全面的に任せ、葬祭ディレクターは関与しない。','進行表は作成せず、当日のその場の判断だけで式を進める。','火葬の予約時刻は考慮せず、式が長引いても調整は行わない。','火葬の時刻などから逆算した進行計画を立て、宗教者や関係先と連携して式典全体を管理する。'], answer:3, explanation:'葬儀には火葬場の予約時刻という動かしにくい制約があるため、出棺の時刻から逆算して開式時刻や各次第の所要時間 を計画し、宗教者、火葬場、料理や車両の手配先などと連携しながら全体の進行を管理することが葬祭ディレクターの 重要な職務である。葬儀はやり直しのきかない一回限りの儀式であるだけに、事前の進行計画の作成と当日の的確な時 間管理が欠かせず、宗教者に任せきりにしたり無計画に進めたりすることは適切でない。'},
{chapter:8, type:'4', source:'past', text:'葬祭サービスの「無形性」に関する記述として、最も適切なものはどれか。', choices:['サービスには形がなく事前に品質を確かめられないため、説明や見積りで内容を具体的に示すことが 重要である。','無形性とは、祭壇や棺などの物品を一切使用しないことを意味する。','サービスには形がないので、品質の良し悪しという概念は存在しない。','無形性があるため、契約の内容を書面で示す意味はない。'], answer:0, explanation:'サービスの無形性とは、サービスそのものに形がなく、購入する前に見たり触れたりして品質を確かめられない性質を いう。葬儀は施行されて初めて内容が現れるため、利用者の不安を減らすには、見積書や写真、説明資料などを用いて 内容をできる限り具体的に示すことが重要となる。祭壇や棺といった物品は用いるものの、サービス全体としては無形 である。品質の概念は当然に存在し、形が見えないからこそ説明と書面による確認の意義が大きい。'},
{chapter:8, type:'4', source:'past', text:'葬祭サービスの「一回性」に関する記述として、最も適切なものはどれか。', choices:['一回性とは、一人の顧客とは生涯に一度しか取引しないという営業方針をいう。','葬儀はやり直しがきかないため、失敗が許されず、入念な準備と確認が求められる。','一回性があるため、事前の準備や確認を行う意味は乏しい。','一回性とは、葬儀を必ず1日で終えなければならない原則をいう。'], answer:1, explanation:'葬儀は故人のために一度しか行うことができず、不手際があっても後からやり直すことができない。この一回性のため に葬祭サービスでは失敗が許されず、打合せ内容の確認、進行計画の作成、設営や氏名の表記の点検など、入念な準備と 重ねての確認が求められる。やり直せない性質を持つからこそ、事前の準備と確認の重要性はむしろ高まる。営業上の 取引方針を指す言葉ではなく、葬儀を1日で終えるという原則を意味するものでもない。'},
{chapter:8, type:'4', source:'past', text:'葬祭サービスの「緊急性」に関する記述として、最も適切なものはどれか。', choices:['死亡の時期はあらかじめ分かるため、緊急の対応が求められることはほとんどない。','緊急性とは、依頼に応じて葬儀の規模を急いで拡大できる体制のことをいう。','遺体の搬送の依頼には、翌営業日の営業時間内に対応すれば足りる。','死亡の発生は予測が難しく、深夜や早朝であっても直ちに対応することが求められる。'], answer:3, explanation:'人の死がいつ発生するかは予測が難しく、死亡の直後には遺体の搬送や安置といった対応が直ちに必要となる。そのた め葬祭業には、深夜や早朝、休日であっても連絡を受けて速やかに動ける体制が求められ、これが葬祭サービスの緊急 性と呼ばれる特性である。依頼への対応を翌営業日に回すような姿勢では遺族の必要に応えることができない。緊急性 は規模を急いで拡大することではなく、需要の発生時期を予測できないことに由来する。'},
{chapter:8, type:'4', source:'past', text:'葬祭サービスにおいて遺族の心理状態への配慮が特に必要とされる理由として、最も適切なものはどれか。', choices:['遺族は常に冷静な判断力を保っており、専門用語を用いた効率的な説明を好むからである。','遺族の悲しみは葬儀の進行に影響しないため、形式的な応対で足りるからである。','遺族は死別による深い悲嘆の中で、短期間に多くの決定を迫られる状態にあるからである。','遺族は一般に葬儀の知識が豊富であり、説明を省略しても支障がないからである。'], answer:2, explanation:'遺族は近親者との死別による強い悲嘆や動揺の中にありながら、葬儀の日程や内容、費用など多くの事項を短い期間の うちに決めなければならない状況に置かれる。冷静な判断が難しい心理状態にあることを踏まえ、分かりやすい言葉で 丁寧に説明し、急がせず、気持ちに寄り添った応対をすることが葬祭ディレクターには求められる。多くの人にとって葬 儀は不慣れな経験であり、知識が豊富であることを前提に説明を省くことは適切でない。'},
{chapter:8, type:'4', source:'past', text:'葬祭サービスの構成に関する記述として、最も適切なものはどれか。', choices:['祭壇や棺などの物品の提供と、設営や進行などの人的役務が組み合わさった複合的なサービスであ る。','葬祭サービスは物品の販売のみで構成され、人的な役務は含まれない。','葬祭サービスは人的な役務のみで構成され、物品の提供は一切含まれない。','物品と役務は常に別々の事業者が提供しなければならないと定められている。'], answer:0, explanation:'葬祭サービスは、祭壇、棺、骨壺、返礼品といった物品の提供と、式場の設営、式典の運営・進行、接遇、各種の手配 といった人的な役務とが一体となって提供される複合的なサービスである。物品の販売だけでも、役務の提供だけでも 成り立たない点に特徴があり、見積書においても物品と役務の双方を分かりやすく示すことが求められる。物品と役務 を必ず別々の事業者が提供しなければならないという法律上の定めは存在しない。'},
{chapter:8, type:'4', source:'past', text:'葬祭業の業態に関する記述として、最も適切なものはどれか。', choices:['葬祭業を営むことができるのは冠婚葬祭互助会に限られている。','専門葬儀社、冠婚葬祭互助会、JAや生協による葬祭事業など、多様な業態が存在する。','JAや生協が葬祭事業を行うことは法律で禁止されている。','葬祭業はすべて国が直営しており、民間の事業者は存在しない。'], answer:1, explanation:'日本の葬祭業には、葬儀を専門に手がける専門葬儀社のほか、掛金の前払いによる会員制を基本とする冠婚葬祭互助 会、JA（農業協同組合）や生活協同組合が主に組合員向けに行う葬祭事業など、多様な業態が存在している。互助会だ けが葬祭業を営めるという制度はなく、JAや生協の葬祭事業を禁止する法律もない。また、葬祭業は主として民間の事 業者によって担われており、国がすべてを直営しているという事実もない。'},
{chapter:8, type:'4', source:'past', text:'冠婚葬祭互助会の事業に関する記述として、最も適切なものはどれか。', choices:['互助会の事業は、保険業法に基づく生命保険業として運営されている。','互助会への加入は地域住民の義務であり、途中で脱退することはできない。','互助会の事業は、割賦販売法に基づく前払式特定取引として経済産業大臣の許可を受けて営まれる。','互助会が会員から集めた掛金については、保全に関する規制が一切設けられていない。'], answer:2, explanation:'冠婚葬祭互助会は、将来の冠婚葬祭に備えて会員から掛金を前払いで受け取り、儀式に関する役務を提供する事業であ り、割賦販売法に定める前払式特定取引に該当する。この取引を業として営むには経済産業大臣の許可が必要とされ、 会員から受け取った前受金には保全措置が義務付けられている。保険業法に基づく生命保険業ではなく、加入はあくま で任意の契約であって解約も可能である。掛金の保全に関する規制が存在しないという理解も誤りである。'},
{chapter:8, type:'4', source:'past', text:'冠婚葬祭互助会の仕組みに関する記述として、最も適切なものはどれか。', choices:['掛金を完納すれば、葬儀に要する費用の全額が追加負担なしで必ずまかなわれる。','掛金は預金と同じ扱いであり、いつでも無条件で全額が払い戻される。','互助会のサービスは婚礼にのみ利用でき、葬儀に利用することはできない。','月々の掛金を一定期間払い込み、冠婚葬祭の際に所定の役務の提供を受ける仕組みである。'], answer:3, explanation:'互助会は、会員が月々一定額の掛金を一定の期間払い込み、婚礼や葬儀などの際に、あらかじめ契約で定められた内容 の役務提供を受けられる前払式の仕組みである。契約はコースごとに役務の内容が定められており、葬儀にかかる費用 の全額が追加負担なしで必ずまかなわれるとは限らない。掛金は預金とは性質が異なり、解約の際には所定の手数料が 差し引かれるのが一般的である。冠婚葬祭の双方を対象としており、婚礼にしか使えないという理解も誤りである。'},
{chapter:8, type:'4', source:'past', text:'冠婚葬祭互助会の解約に関する記述として、最も適切なものはどれか。', choices:['加入者は契約を解約することができるが、一般に払込済みの掛金から所定の解約手数料が差し引かれ る。','互助会の契約は、一度締結するといかなる理由があっても解約できない。','解約すると、払い込んだ掛金に高率の利息が上乗せされて返金される。','解約の申出をしなくても、掛金の払込みを止めれば自動的に解約となる。'], answer:0, explanation:'互助会の加入者には契約を解約する自由があり、解約時には払込済みの掛金から所定の解約手数料を差し引いた額が返 金される扱いが一般的である。解約手数料の水準をめぐっては消費者トラブルや裁判となった例もあり、契約の締結時 に解約の条件を分かりやすく説明しておくことが重要とされる。解約が一切できないという理解は誤りであり、預金の ように利息が付されて戻るものでもない。解約には所定の申出と手続が必要であり、払込みを止めるだけで自動的に解 約されるわけではない。'},
{chapter:8, type:'4', source:'past', text:'葬祭業の社会的役割に関する記述として、最も適切なものはどれか。', choices:['葬祭業の役割は祭壇など物品の販売に限られ、社会的な役割は特に担っていない。','葬祭業は営利事業であるから、公衆衛生上の役割とは無関係である。','死者の尊厳を守り、遺体を衛生的かつ適切に取り扱うという公益的な役割を担っている。','死者の尊厳への配慮は宗教者のみの役割であり、葬祭業者に求められるものではない。'], answer:2, explanation:'葬祭業は、死者の尊厳を守りながら遺体を衛生的かつ適切に取り扱い、社会から死者を送り出す儀礼を支えるという公 益的な役割を担っている。遺体の搬送、安置、保全を適切に行うことは公衆衛生の観点からも重要であり、単なる物品 の販売業とは性格が異なる。営利事業であることと公益的な役割を担うことは矛盾しない。死者の尊厳への配慮は宗教 者に限られるものではなく、遺体に直接接する葬祭従事者にこそ強く求められる責務である。'},
{chapter:8, type:'4', source:'past', text:'グリーフサポートに関する記述として、最も適切なものはどれか。', choices:['グリーフサポートとは、葬儀費用を割り引く会員制度のことである。','死別による悲嘆を抱える遺族に寄り添い、悲しみから回復していく過程を支える働きかけをいう。','グリーフサポートは医師の資格を持つ者だけに認められた医療行為である。','グリーフとは、葬儀に用いる祭壇の様式を指す言葉である。'], answer:1, explanation:'グリーフとは死別などによって生じる深い悲嘆を意味し、グリーフサポートは、悲嘆を抱える遺族に寄り添い、悲しみ と向き合いながら回復していく過程を支える働きかけをいう。遺族に最も近い立場で接する葬祭ディレクターは、傾聴や 丁寧な応対を通じてその一端を担うことができる。費用の割引制度や祭壇の様式を指す言葉ではなく、医療資格がなけ れば行えない行為でもないが、深刻な悲嘆で専門的な治療が必要と思われる場合には、医療機関など専門職へつなぐ配 慮が求められる。'},
{chapter:8, type:'4', source:'past', text:'葬祭ディレクターの守秘義務に関する記述として、最も適切なものはどれか。', choices:['故人や遺族に関する情報は、葬儀が終了した後であれば自由に第三者へ話してよい。','死因や家庭の事情は、他の顧客との雑談の話題として積極的に活用してよい。','守秘の責務は正社員にのみ課され、パートやアルバイトの従業員には及ばない。','業務上知り得た故人や遺族の情報を、みだりに他へ漏らしてはならない。'], answer:3, explanation:'葬祭の業務では、死因、家族関係、宗教、経済状況といった故人や遺族のきわめて私的な情報に接する。業務上知り得 たこれらの情報をみだりに第三者へ漏らさないことは、葬祭に携わる者の基本的な職業倫理であり、個人情報保護の観 点からも当然の責務である。守秘の責務は葬儀の終了後も継続し、雇用形態の違いにかかわらず業務に携わるすべての 従事者に求められる。私的な情報を雑談の話題にする行為は、遺族の信頼を根本から損なうものであり許されない。'},
{chapter:8, type:'4', source:'past', text:'葬祭ディレクターと宗教・宗派との関わりに関する記述として、最も適切なものはどれか。', choices:['自らが信仰する宗派の葬儀だけを引き受け、他の宗派の依頼は断るのが原則である。','遺族の宗旨にかかわらず、自社が運営しやすい形式に統一して施行するのがよい。','特定の宗教に偏らない中立の立場を保ち、遺族の宗旨・宗派を尊重して対応することが求められる。','宗教の知識は宗教者に任せておけばよく、葬祭ディレクターが学ぶ必要はない。'], answer:2, explanation:'葬儀は宗教儀礼として営まれることが多く、宗旨・宗派によって式次第や作法、用いる物品が異なる。葬祭ディレクター には、特定の宗教に偏らない中立の立場を保ちつつ、遺族の信仰と意向を尊重し、その宗旨・宗派にふさわしい葬儀を 支えることが求められる。そのためには各宗教・宗派の儀礼に関する幅広い知識が必要であり、宗教者に任せきりにし てよいものではない。自社の都合で形式を統一したり、特定の宗派以外の依頼を断ったりする姿勢は適切でない。'},
{chapter:8, type:'4', source:'past', text:'葬祭業における価格の表示や説明に関する記述として、最も適切なものはどれか。', choices:['料金体系を明確にし、サービスの内容と価格を事前に分かりやすく示すことが求められる。','葬儀の価格は施行後に決めるものであり、事前の提示はかえって失礼にあたる。','実際より大幅に安く見せる広告でも、集客のためであれば問題はない。','追加料金が発生する条件は複雑なので、あえて説明しないほうが親切である。'], answer:0, explanation:'葬儀は緊急の状況で契約されることが多く、利用者が複数の事業者を比較検討する余裕に乏しい。だからこそ事業者に は、料金体系を明確にし、プランに含まれるものと含まれないもの、追加料金が発生する条件などを事前に分かりやす く示す責任がある。実際の取引条件より著しく有利であるかのように見せる表示は、不当表示として法律上も問題とな る。価格を施行後に決める、追加料金の条件を意図的に伏せるといった対応は、消費者トラブルを招く典型例である。'},
{chapter:8, type:'4', source:'past', text:'葬儀の事前相談に関する記述として、最も適切なものはどれか。', choices:['生前に葬儀の相談をすることは避けるべきこととされ、現在ではほとんど行われていない。','生前から葬儀の内容や費用を相談しておく事前相談は、近年広がりを見せている。','事前相談を受けた事業者と必ず契約しなければならないと法律で定められている。','事前相談は、本人の死亡後でなければ申し込むことができない。'], answer:1, explanation:'かつては生前に葬儀の準備をすることを忌避する意識も見られたが、終活への関心の高まりなどを背景に、本人や家族 が生前から葬儀の内容や費用について相談しておく事前相談は近年広がりを見せている。事前に希望や費用の見通しを 把握しておくことで、死亡後の限られた時間の中で判断する遺族の負担を軽くできる利点がある。事前相談はあくまで 相談であり、その事業者との契約を義務付ける法律はない。生前に行うからこそ意味があるものであり、死亡後でなけれ ば申し込めないものでもない。'},
{chapter:8, type:'4', source:'past', text:'葬祭サービスに関する苦情への対応として、最も適切なものはどれか。', choices:['苦情を申し出た遺族には、まず自社に落ち度がないことを強く主張する。','苦情は時間の経過が解決するものなので、連絡を受けても対応しないでおく。','事実関係を確認しないまま、担当者個人の判断でその場で全額返金を約束する。','まず相手の話を丁寧に聴いて心情を受け止め、事実関係を確認したうえで誠実に対応する。'], answer:3, explanation:'苦情対応の基本は、まず相手の話を遮らずに丁寧に聴き、その心情を受け止めたうえで事実関係を正確に確認し、組織 として誠実に対応することである。葬儀はやり直しのきかない一回限りの儀式であるだけに、遺族の不満には深い悲し みや無念さが伴っていることを理解する必要がある。最初から自社の正当性を主張したり、対応せずに放置したりすれ ば不信感を増幅させる。事実確認を経ないまま担当者個人の判断で安易に返金を約束することも、適切な解決を妨げる ため避けるべきである。'},
{chapter:8, type:'4', source:'past', text:'葬儀が持つ機能に関する記述として、最も適切なものはどれか。', choices:['葬儀には、死の社会的処理、遺体の物理的処理、悲嘆の心理的処理、宗教的処理といった複数の側面 がある。','葬儀の機能は遺体の処理という物理的な側面に限られ、心理的な機能は持たない。','葬儀は宗教的な行為であるため、社会的な機能は一切持たない。','葬儀の機能は、遺産相続の手続を完了させることにある。'], answer:0, explanation:'葬儀には、死を周囲に知らせて故人を社会から送り出す社会的処理、遺体を火葬や埋葬へとつなぐ物理的処理、遺族が 死を受け止めて悲嘆と向き合うことを支える心理的処理、死生観や霊魂観に基づいて死者を弔う宗教的処理という複数 の側面があるとされる。葬儀はこれらの機能が一体となった営みであり、遺体の処理だけ、宗教だけといった単一の機能 に還元することはできない。遺産相続の手続は法律上の問題であり、葬儀そのものの機能ではない。'},
{chapter:8, type:'4', source:'past', text:'葬儀の「社会的処理」の側面の説明として、最も適切なものはどれか。', choices:['遺体を衛生的に保全し、火葬までの状態を適切に管理すること。','死亡の事実を周囲に知らせ、故人を社会の一員として送り出し、関係者が別れを告げる場を設けるこ と。','遺族が悲しみを表に出し、死別の事実を受け入れていくこと。','故人の冥福を祈り、宗教的な儀礼によって死者を弔うこと。'], answer:1, explanation:'葬儀の社会的処理とは、死亡の事実を親族、地域、知人など周囲の人々に知らせ、故人が社会の一員としての生を終え たことを確認し、関係のあった人々が別れを告げる場を設けるという機能を指す。死亡の通知や会葬は、故人と社会との 関係に区切りをつける役割を果たしている。遺体の衛生的な保全は物理的処理に、悲しみの表出と死の受容は心理的処 理に、宗教儀礼による弔いは宗教的処理にあたり、いずれも葬儀の別の側面を説明するものである。'},
{chapter:8, type:'4', source:'past', text:'葬儀の「心理的処理」の側面の説明として、最も適切なものはどれか。', choices:['死亡届を提出し、法律上必要な手続を完了させること。','遺体を速やかに搬送し、適切な場所に安置すること。','儀礼の過程を通じて、遺族が死別の現実を受け止め、悲嘆を和らげていくことを支えること。','香典の収支を記録し、葬儀の会計を明確にすること。'], answer:2, explanation:'葬儀の心理的処理とは、通夜や葬儀・告別式といった儀礼の過程を通じて、遺族が大切な人の死という現実を少しずつ 受け止め、悲しみを表出し、悲嘆を和らげていくことを支える機能をいう。儀式の中で故人と向き合い、別れを告げる 体験は、悲嘆と向き合う心の作業を進めるうえで重要な意味を持つとされる。死亡届などの法律上の手続、遺体の搬送 や安置、会計の記録は、いずれも葬儀に伴う実務ではあるが、心理的処理の説明にはあたらない。'},
{chapter:8, type:'4', source:'past', text:'葬儀における遺体の取扱いに関する記述として、最も適切なものはどれか。', choices:['遺体の取扱いは遺族の心情と切り離してよく、作業の効率だけを優先すべきである。','遺体には尊厳への配慮は不要であり、単なる作業の対象として扱えばよい。','遺体の取扱いは医療機関のみが担うものであり、葬祭業者は関与しない。','衛生面に配慮しながら、死者の尊厳を保って火葬・埋葬へと適切につなぐことが求められる。'], answer:3, explanation:'葬儀には、遺体を安置・保全し、火葬や埋葬へと適切につなぐという側面がある。遺体は時間の経過とともに変化する ため衛生面への配慮が不可欠だが、同時に遺体は遺族にとって故人そのものであり、深い愛惜の対象である。したがっ て、衛生管理と死者の尊厳の保持を両立させた丁寧な取扱いが葬祭従事者には求められる。効率だけを優先した扱いは 許されず、死亡後の遺体の安置や保全、葬送は医療機関のみが担うものではなく、葬祭業者が重要な役割を果たす領域 である。'},
{chapter:8, type:'4', source:'past', text:'「家族葬」と呼ばれる葬儀の形式に関する記述として、最も適切なものはどれか。', choices:['家族葬とは、通夜や葬儀式を行わず火葬のみを行う形式のことである。','家族や親族など故人と近しい人を中心に、少人数で行う葬儀の形式である。','家族葬は、参列者を10人以下とすることが法律で定められている。','家族葬では、宗教儀礼を行うことが認められていない。'], answer:1, explanation:'家族葬とは、一般の会葬者を広く招かず、家族や親族など故人と近しい人を中心とした少人数で行う葬儀の形式をいう。 近年の葬儀の小規模化を象徴する形式であるが、法律上の定義や参列人数の上限が定められているわけではなく、どこ までの範囲を招くかは遺族の考え方によって幅がある。宗教儀礼を行うかどうかも自由であり、僧侶などの宗教者を招 いて営まれることも多い。通夜や葬儀式を行わず火葬のみで送る形式は直葬（火葬式）と呼ばれ、家族葬とは区別され る。'},
{chapter:8, type:'4', source:'past', text:'「直葬（火葬式）」と呼ばれる形式に関する記述として、最も適切なものはどれか。', choices:['通夜や葬儀式といった儀式を行わず、火葬のみで故人を送る形式である。','通夜を2日間かけて行う、従来よりも手厚い形式である。','火葬を行わず、自宅から直接墓地へ土葬する形式である。','死亡後ただちに火葬することができ、時間に関する法律上の制約はない。'], answer:0, explanation:'直葬（火葬式）とは、通夜や葬儀・告別式といった儀式を行わず、火葬のみで故人を送る形式をいい、葬儀の簡素化・ 小規模化の流れの中で選ばれる例が見られるようになった。ただし直葬であっても、墓地、埋葬等に関する法律により 死後24時間を経過した後でなければ原則として火葬できないため、死亡後ただちに火葬できるわけではなく、それまで の間の安置が必要となる。通夜を長く行う手厚い形式ではなく、土葬を意味する言葉でもない。'},
{chapter:8, type:'4', source:'past', text:'「一日葬」と呼ばれる形式に関する記述として、最も適切なものはどれか。', choices:['通夜と葬儀・告別式を、同じ日の午前と午後に分けて行う形式である。','火葬を済ませた後に、改めて通夜を行う形式である。','死亡したその日のうちに火葬まで済ませる形式である。','通夜を行わず、葬儀・告別式から火葬までを1日で行う形式である。'], answer:3, explanation:'一日葬とは、通夜を省略し、葬儀・告別式から火葬までを1日で行う形式をいう。遺族の体力的・経済的な負担の軽減 や、高齢の参列者への配慮などから選ばれることがあり、葬儀の簡素化傾向を示す形式の一つとされる。通夜と告別式 を同じ日に分けて行うものではなく、通夜そのものを行わない点に特徴がある。なお、死亡したその日のうちの火葬 は、死後24時間を経過した後でなければ火葬できないとする法律の原則があるため、通常は行うことができない。'},
{chapter:8, type:'4', source:'past', text:'現代日本の葬儀を取り巻く社会状況に関する記述として、最も適切なものはどれか。', choices:['少子化の影響により、年間の死亡数は近年大きく減少し続けている。','死亡者のうち大半を若年層が占めるようになっている。','高齢化の進行に伴い死亡数の多い多死社会を迎え、葬儀の在り方にも変化が生じている。','平均寿命が延びたことで、死亡という出来事そのものがまれになっている。'], answer:2, explanation:'日本では高齢化の進行に伴って年間の死亡数が増加傾向で推移しており、いわゆる多死社会を迎えている。死亡者に占 める高齢者の割合が高く、長寿化によって故人の友人・知人も高齢化していることなどから、会葬者数の減少や葬儀の 小規模化といった変化が生じている。少子化は出生数の減少に関わる現象であり、死亡数が大きく減り続けているとい う理解は誤りである。死亡の大半を占めるのは高齢者であり、死亡がまれになっているという事実もない。'},
{chapter:8, type:'4', source:'past', text:'現代の葬儀の多様化に関する記述として、最も適切なものはどれか。', choices:['葬儀の形式は法律で全国一律に定められており、多様化する余地はない。','故人らしさを重視した演出や無宗教形式の式など、葬儀の個人化・多様化が進んでいる。','多様化が進んだ結果、宗教儀礼による葬儀は現在ではほとんど行われていない。','葬儀の多様化とは、葬儀の規模が一律に大きくなっていくことを指す。'], answer:1, explanation:'現代の葬儀では、慣習に沿った画一的な形式だけでなく、故人の趣味や人柄を反映した演出、思い出の品や音楽を取り 入れた式、宗教儀礼によらない無宗教形式の式など、故人らしさを重視した個人化・多様化が進んでいる。一方で、宗教 者を招いて営む葬儀も引き続き広く行われており、宗教儀礼がほとんど行われなくなったという理解は誤りである。葬 儀の形式を全国一律に定める法律は存在せず、近年の傾向はむしろ小規模化であって、一律の大規模化を意味するもので もない。'},
{chapter:8, type:'4', source:'past', text:'遺族への助言における葬祭ディレクターの姿勢として、最も適切なものはどれか。', choices:['専門知識に基づいて複数の案と必要な情報を分かりやすく示し、遺族自身が納得して判断できるよう 支援する。','遺族の判断には誤りが多いため、葬儀の内容はすべて葬祭ディレクターが代わって決定する。','助言は後の責任問題につながるため、質問を受けても答えないことを原則とする。','遺族の希望よりも地域の慣習を常に優先するよう強く指導する。'], answer:0, explanation:'葬祭ディレクターは、葬儀に不慣れな遺族に対して、手続や儀礼、費用などに関する情報と複数の案を専門知識に基づい て分かりやすく示し、遺族自身が納得して判断できるよう支援する役割を担う。決定の主体はあくまで遺族であり、葬祭 ディレクターが代わって決めるものではない。質問に答えない姿勢は専門家としての責任の放棄にあたる。地域の慣習 は重要な参考情報ではあるが、それを常に優先するよう強いることは遺族の意向の尊重に反する。'},
{chapter:8, type:'4', source:'past', text:'日本における葬祭業の開業に関する記述として、最も適切なものはどれか。', choices:['葬祭業を開業するには、厚生労働大臣の免許を受けなければならない。','葬祭業の開業には、都道府県知事の認可が必要とされている。','葬祭業自体の開業に特別な許認可は不要だが、霊柩運送など関連する業務には許可が必要なものがあ る。','葬祭ディレクター技能審査の合格者を雇用しなければ、開業は認められない。'], answer:2, explanation:'日本には葬祭業そのものを直接規制する業法がなく、開業にあたって免許や認可を受けることは求められていない。た だし関連する業務には法規制があり、霊柩自動車によって遺体を運送する事業には貨物自動車運送事業の許可が、互助会 方式の前払式特定取引を営むには経済産業大臣の許可が必要となる。葬祭ディレクター技能審査は従事者の知識・技能 の程度を審査する制度であり、その合格者の雇用が開業の法律上の要件とされているわけではない。'},
{chapter:8, type:'4', source:'past', text:'葬祭業と公衆衛生との関わりに関する記述として、最も適切なものはどれか。', choices:['遺体は死亡後も変化しないため、衛生上の特別な配慮は必要ない。','公衆衛生への配慮は行政機関だけの責務であり、葬祭業者には関係がない。','衛生上の配慮とは、遺族を遺体に近づけないようにすることを意味する。','遺体は時間とともに変化するため、保冷などによる適切な安置・保全と衛生面への配慮が必要であ る。'], answer:3, explanation:'遺体は死亡後、時間の経過とともに変化が進むため、ドライアイスや保冷設備の使用などによる適切な安置・保全が必 要であり、葬祭業は公衆衛生の面でも重要な役割を担っている。遺体に直接接する事業者自身が衛生管理に責任を持つ べきであり、行政機関だけの問題とすることはできない。また、衛生管理の目的は遺族を故人から遠ざけることではな く、安全と衛生に配慮しながら、遺族が故人と落ち着いてお別れできる環境を整えることにある。'},
{chapter:8, type:'4', source:'past', text:'葬儀の費用に関する説明責任についての記述として、最も適切なものはどれか。', choices:['会葬者数の変動などで費用が変わりうることは、説明しないでおくほうがよい。','見積額と実際の請求額に差が生じた場合には、その理由を遺族に分かりやすく説明する必要がある。','請求書には総額のみを記載し、内訳は示さないことが慣行とされている。','葬儀後の精算では、遺族からの質問に回答する義務はない。'], answer:1, explanation:'葬儀の費用は、会葬者数の変動に伴う料理や返礼品の数量の増減などにより、見積りの段階から変わることがある。そ のため、変動しうる項目とその条件をあらかじめ説明しておくとともに、見積額と実際の請求額に差が生じた場合に は、その理由を遺族に分かりやすく説明する責任がある。請求書にも項目ごとの内訳を示し、精算時の質問には誠実に 答えることが信頼につながる。費用の変動の可能性を意図的に伏せたり、総額しか示さなかったりする対応は適切でな い。'},
{chapter:8, type:'4', source:'past', text:'サービスとしての葬祭業の提供上の特性に関する記述として、最も適切なものはどれか。', choices:['サービスの提供と利用が同時に進むため、提供するその場での品質の確保が重要となる。','サービスは事前に大量に生産して在庫しておき、必要なときに出荷することができる。','提供したサービスに不備があっても、後日その部分だけを交換すれば問題は解消する。','サービスの品質は誰が担当しても変わらないため、従事者の教育は必要ない。'], answer:0, explanation:'サービスには生産と消費が同時に行われるという特性があり、葬祭サービスでも式典の進行や接遇は、提供されるその 場で同時に利用される。形のある商品のように事前に作って在庫しておくことも、不備のあった部分だけを後日交換す ることもできないため、提供の場における品質の確保が決定的に重要となる。また、サービスの品質は担当する人の知 識や技能、応対の力に左右されやすいため、従事者の教育と訓練の積み重ねが品質を支える基盤となる。'},
{chapter:8, type:'4', source:'past', text:'葬儀の内容を決定する際の基本的な考え方として、最も適切なものはどれか。', choices:['葬儀社の物品の在庫状況を最優先し、遺族の希望はその次に考える。','近隣住民による多数決によって葬儀の内容を決定する。','喪主をはじめとする遺族の意向と、故人の生前の遺志を尊重して決定する。','宗教者がすべての項目を単独で決定し、遺族は決定に関与しない。'], answer:2, explanation:'葬儀の内容は、喪主をはじめとする遺族の意向と、生前に示されていた故人の遺志を尊重して決めることが基本であ る。葬祭ディレクターは専門家として情報の提供や提案を行うが、最終的に決めるのは遺族の側である。宗教儀礼の次第 については宗教者と相談しながら整えていくものの、葬儀全体の内容を宗教者が単独で決定するわけではない。自社の 在庫の都合を優先したり、近隣の多数決に委ねたりする考え方は、遺族の意向の尊重という基本に反する。'},
{chapter:8, type:'4', source:'past', text:'専門葬儀社と冠婚葬祭互助会の違いに関する記述として、最も適切なものはどれか。', choices:['専門葬儀社は、掛金を前払いで集めなければ営業することができない。','互助会は掛金の前払いによる会員制を基本とし、専門葬儀社は依頼の都度契約して対価を受け取るこ とを基本とする。','互助会は葬儀のみを扱い、婚礼を取り扱うことは認められていない。','専門葬儀社と互助会は、法律上同一の許可を受けた事業者を指す呼び方である。'], answer:1, explanation:'冠婚葬祭互助会は、会員から掛金を前払いで集め、将来の婚礼や葬儀の際に役務を提供する会員制の事業であり、割賦 販売法に基づく許可を受けて営まれる。これに対して専門葬儀社は、前受金による会員制を前提とせず、葬儀の依頼を 受けるたびに契約を結んで施行し、対価を受け取る形態を基本とする。互助会は冠婚葬祭の双方を対象とするため婚礼 も扱う。両者は事業の仕組みが異なっており、法律上同一の許可を指す呼び方というわけでもない。'},
{chapter:8, type:'4', source:'past', text:'いわゆる「終活」に関する記述として、最も適切なものはどれか。', choices:['終活とは、死亡した後に遺族が行う相続税の申告手続のことをいう。','終活は法律で義務付けられており、行わない場合には罰則がある。','終活とは、葬儀社が年度末に行う設備の点検作業のことをいう。','人生の終わりに向けて、葬儀や墓、財産などについて生前から考え準備しておく活動をいう。'], answer:3, explanation:'終活とは、人生の最終段階を自分らしく迎えるために、葬儀の希望、墓や納骨の方法、財産の整理、医療や介護につい ての意向などを生前から考え、準備しておく活動を指す言葉である。エンディングノートの作成や葬儀の事前相談、生 前契約などもその一環として広がっており、葬祭業においても事前相談への対応の重要性が増している。法律上の義務 ではなく罰則もない。死亡後に遺族が行う相続の手続や、事業者の設備点検を指す言葉ではない。'},
{chapter:8, type:'4', source:'past', text:'葬儀の「宗教的処理」の側面の説明として、最も適切なものはどれか。', choices:['死生観や霊魂観に基づく儀礼を通じて死者を弔い、冥福や安息を祈ること。','死亡診断書を受け取り、死亡届を市町村に提出すること。','葬儀費用の見積りと請求の手続を適正に行うこと。','会葬者の受付や駐車場の案内を滞りなく行うこと。'], answer:0, explanation:'葬儀の宗教的処理とは、それぞれの宗教が持つ死生観や霊魂観に基づく儀礼を通じて死者を弔い、冥福や永遠の安息な どを祈るという側面をいう。仏式の読経、神式の儀礼、キリスト教式の祈りなど、宗旨によって形式は異なるが、死とい う出来事に宗教的な意味を与える機能を持つ点で共通している。死亡届の提出は法律上の手続であり、見積りや請求は 取引上の実務、受付や駐車場の案内は式の運営上の実務であって、宗教的処理の説明にはあたらない。'},
{chapter:8, type:'4', source:'past', text:'「葬祭ディレクター」の称号に関する記述として、最も適切なものはどれか。', choices:['技能審査に合格していなくても、誰でも「1級葬祭ディレクター」と名乗ってよい。','「葬祭ディレクター」と称する者には、医師と同様の業務独占が認められる。','「1級葬祭ディレクター」「2級葬祭ディレクター」と称することができるのは、技能審査の各等級の 合格者である。','葬祭ディレクターの称号は、葬儀社の経営者だけが用いることができる。'], answer:2, explanation:'葬祭ディレクター技能審査に合格した者は、その等級に応じて「1級葬祭ディレクター」「2級葬祭ディレクター」と称す ることができる。これは知識・技能の水準を示す称号であり、合格していない者がこれらの称号をかたることは適切で ない。一方で業務独占の資格ではないため、合格者でなければ葬祭の業務に従事できないという制度ではない。称号は 審査に合格した個人に与えられるものであり、経営者であるかどうかという立場とは関係がない。'},
{chapter:8, type:'4', source:'past', text:'死亡直後の遺族からの搬送依頼に対する葬祭業者の対応として、最も適切なものはどれか。', choices:['深夜の依頼には、割増料金の交渉がまとまるまで出動を保留する。','搬送先の安置場所を遺族と確認し、寝台車を手配して速やかに迎えに向かう。','搬送の依頼はすべて警察へ回し、葬祭業者としては関与しない。','病院の霊安室には長期間安置できるため、急いで対応する必要はない。'], answer:1, explanation:'死亡の直後には、病院などから速やかな遺体の搬送を求められることが多い。葬祭業者は、自宅にするか斎場の安置施 設にするかといった搬送先・安置場所を遺族と確認したうえで寝台車を手配し、速やかに迎えに向かう必要がある。病 院の霊安室に長く安置し続けることは通常できず、対応が遅れれば遺族や病院に支障が生じる。料金交渉がまとまるま で出動を保留する姿勢は遺族の切迫した状況に反し、事件性のない通常の搬送依頼を警察に回すものでもない。'},
{chapter:8, type:'4', source:'past', text:'葬祭業務における個人情報の取扱いに関する記述として、最も適切なものはどれか。', choices:['故人に関する情報は死亡と同時に公開情報となるため、自由に利用してよい。','葬儀の受注情報は、関連業者への営業目的での提供が法律で推奨されている。','個人情報の適切な管理は大企業だけに求められ、小規模な葬儀社には求められない。','遺族等の個人情報を安全に管理し、利用目的の範囲を超えてみだりに第三者へ提供しない。'], answer:3, explanation:'葬祭業務では、喪主や遺族の氏名、住所、連絡先、家族構成など多くの個人情報を取り扱うため、情報を安全に管理 し、利用目的の範囲を超えてみだりに第三者へ提供しないことが求められる。個人情報を適切に扱う責務は事業の規模 を問わず求められ、小規模な事業者であっても変わらない。生存する遺族の情報は個人情報保護の対象であり、営業目 的での無断提供が推奨されることはない。故人に関する情報も、遺族の心情に配慮した慎重な取扱いが職業倫理上求め られる。'},
{chapter:8, type:'4', source:'past', text:'葬祭ディレクター技能審査制度の目的に関する記述として、最も適切なものはどれか。', choices:['葬祭サービス従事者の知識・技能の水準を審査・証明し、従事者の専門性とサービスの質の向上を図 ること。','全国の葬儀の価格を一律に統制すること。','葬祭業への新規参入を制限し、既存の事業者の権益を保護すること。','宗教法人の活動を監督し、布教活動を支援すること。'], answer:0, explanation:'葬祭ディレクター技能審査は、葬祭サービスの担い手に必要な知識と技能の程度を客観的に審査し証明することを通じ て、従事者の専門性を高め、業界全体のサービスの質の向上を図るとともに、利用者が安心して葬祭サービスを利用でき る環境づくりに資することを目的とした制度である。葬儀の価格を統制したり、新規参入を制限して既存の事業者を保 護したりする機能は持たない。宗教法人の監督や布教の支援を目的とする制度でもない。'},
{chapter:8, type:'4', source:'past', text:'葬儀の打合せにおいて確認すべき基本的事項に関する記述として、最も適切なものはどれか。', choices:['宗旨・宗派は葬儀の内容に影響しないため、確認しなくてよい。','喪主、宗旨・宗派、日程、会場、規模、予算などを確認し、遺族と合意しながら進める。','日程は、火葬場や宗教者の都合を確認せずに決定してよい。','費用の話題は失礼にあたるため、打合せでは一切触れないようにする。'], answer:1, explanation:'葬儀の打合せでは、誰が喪主を務めるか、宗旨・宗派、葬儀の日程と会場、想定される会葬者の人数などの規模、予算 といった基本的な事項を確認し、遺族との合意を重ねながら内容を具体化していく。宗旨・宗派は式次第や祭壇、用い る物品に直結する重要な確認事項であり、日程は火葬場の空き状況や宗教者の都合と調整したうえで決める必要があ る。費用についても見積りを示しながら率直に確認しておくことが、後の行き違いやトラブルを防ぐうえで欠かせな い。'},
{chapter:8, type:'4', source:'past', text:'近年の葬儀の小規模化の背景に関する記述として、最も適切なものはどれか。', choices:['法律によって葬儀の参列者数に上限が設けられたためである。','葬儀の費用が公費で全額負担されるようになり、規模を大きくする必要がなくなったためである。','故人の高齢化や地域・職場とのつながりの変化などにより、会葬者数が減少する傾向にあるためであ る。','火葬場の数が増えすぎたことで、大規模な葬儀が物理的にできなくなったためである。'], answer:2, explanation:'葬儀の小規模化の背景には、故人の高齢化により現役時代の交友関係者がすでに亡くなっていたり高齢で参列が難し かったりすること、地域社会や職場との結び付きの希薄化、家族や親族の少人数化など、会葬者数の減少につながる社会 の変化がある。こうした中で、家族葬のように近親者を中心とした葬儀を選ぶ人が増えてきた。参列者数を法律で制限 する制度や、葬儀費用が公費で全額負担される仕組みはなく、火葬場の増加が原因という事実もない。'},
{chapter:8, type:'4', source:'past', text:'葬祭ディレクターの接遇と身だしなみに関する記述として、最も適切なものはどれか。', choices:['遺族の気分を明るくするため、華やかな服装と冗談を交えた会話を心がける。','言葉遣いは業界の専門用語をそのまま用い、遺族の理解に合わせる必要はない。','身だしなみは個人の自由であり、業務にあたって特に配慮する必要はない。','厳粛な場にふさわしい清潔で控えめな身だしなみと、丁寧で節度ある言葉遣いを心がける。'], answer:3, explanation:'葬儀は故人を見送る厳粛な場であり、深い悲しみの中にある遺族や会葬者に接する仕事であるため、葬祭ディレクターに は清潔で控えめな身だしなみと、丁寧で節度のある言葉遣い、落ち着いた立ち居振る舞いが求められる。場にふさわし くない言葉を避けるなど、言葉そのものへの細やかな配慮も必要である。華美な装いや冗談まじりの応対は場の品位を 損ない、遺族の心情を傷つけるおそれがある。専門用語は分かりやすい言葉に言い換えて伝えることが望ましい。'},
{chapter:8, type:'4', source:'past', text:'大規模災害時における葬祭業の役割に関する記述として、最も適切なものはどれか。', choices:['棺や安置用資材の供給、遺体の搬送・安置への協力など、社会的基盤としての役割が期待される。','災害時の遺体への対応はすべて自衛隊が行うため、葬祭業者の出番はない。','災害時には葬祭業者は営業を停止することが法律で義務付けられている。','災害時の犠牲者には葬儀を行ってはならないとされている。 葬祭ディレクター技能審査 完全対策問題集 第2 章：死生観と葬送の歴史・文化 （50問）'], answer:0, explanation:'大規模な災害で多数の犠牲者が生じた場合、棺や安置用資材の供給、遺体の搬送や安置への協力、火葬までの対応な ど、葬祭業には社会的基盤としての役割が期待される。自治体と葬祭関係の団体が災害時の協力協定を結ぶ例もあり、死 者の尊厳を守りながら混乱の中で遺体を適切に取り扱う専門性は、平時だけでなく非常時にも欠かせない。災害時の遺 体対応が特定の機関だけで完結するものではなく、葬祭業者の営業停止や犠牲者の葬儀を禁じる法律も存在しない。 葬祭ディレクター技能審査 完全対策問題集 第2章：死生観と葬送の歴 史・文化'},
{chapter:1, type:'4', source:'past', text:'縄文時代の埋葬に多くみられたとされる、手足を折り曲げて遺体を埋葬する方法を何というか。', choices:['屈葬','伸展葬','風葬','洗骨葬'], answer:0, explanation:'縄文時代の墓では、膝や腕を折り曲げた姿勢で遺体を埋葬した例が多く確認されており、これを屈葬と呼ぶ。死者の霊 が再び動き出すのを防ぐためや、母胎内の胎児の姿勢を模したためなど諸説が唱えられている。手足を伸ばして葬る方 法は伸展葬であり、遺体を埋めずに自然にさらす風葬や、いったん葬った骨を後で洗い清める洗骨葬とは区別される。'},
{chapter:1, type:'4', source:'past', text:'古墳時代に有力者が葬られた、墳丘をもつ大規模な墓を一般に何というか。', choices:['横穴墓','甕棺','古墳','方形周溝墓'], answer:2, explanation:'三世紀後半から各地で築かれた、土を盛り上げた墳丘をもつ大規模な墓を古墳と呼ぶ。前方後円墳をはじめ円墳・方墳 など多様な形があり、豪族や首長などの有力者が葬られ、その権力の大きさを示すものと考えられている。甕棺は弥生 時代に九州北部などでみられた大型土器の棺、方形周溝墓は周囲に溝をめぐらせた弥生の墓制であり、いずれも大規模 な墳丘を主たる特徴とするものではない。'},
{chapter:1, type:'4', source:'past', text:'日本において、天皇として初めて火葬されたとされる人物は誰か。', choices:['推古天皇','持統天皇','聖武天皇','天武天皇'], answer:1, explanation:'仏教の伝来とともに火葬の習俗が伝わり、文献の上では持統天皇が天皇として初めて火葬されたと伝えられている。こ れは飛鳥から奈良時代へ向かう時期にあたり、以後、火葬は皇族や貴族、僧侶などを中心に徐々に広まっていった。当時 はまだ一般庶民にまで普及したものではなく、土葬も長く併存していた点に注意が必要である。'},
{chapter:1, type:'4', source:'past', text:'古墳時代などにみられた、本葬の前に遺体を一定期間安置し、別れを惜しんだとされる儀礼を何というか。', choices:['野辺送り','洗骨','荼毘（だび）','殯（もがり）'], answer:3, explanation:'殯（もがり）は、埋葬の前に遺体を仮の建物などに安置し、一定の期間にわたって別れを惜しみ、死を確認し悼んだ古 代の儀礼である。死者の蘇りを願う意味や、地位の高い者ほど長く行われたともいわれ、後の通夜の源流の一つとも考 えられている。荼毘は火葬を指す語、野辺送りは遺体を埋葬地まで送る行列を指し、いずれも本葬前の安置儀礼そのも のとは異なる。'},
{chapter:1, type:'4', source:'past', text:'フランスの民俗学者ファン・ヘネップが提唱した、人生の節目に行われる儀礼を総称する概念は何か。', choices:['予型論','供犠論','通過儀礼','交換理論'], answer:2, explanation:'ファン・ヘネップは、誕生・成人・結婚・死などの人生の節目に行われる儀礼を通過儀礼と名づけ、人がある状態から 次の状態へと移っていく過程に着目した。葬儀もこの通過儀礼の一つとして位置づけられ、社会的な立場の変化を区切 る働きをもつと理解されている。供犠や交換に関する理論はそれぞれ別の研究領域の概念であり、人生儀礼の総称では ない。'},
{chapter:1, type:'4', source:'past', text:'ファン・ヘネップによる通過儀礼の三段階の構造として、最も適切なものはどれか。', choices:['分離・過渡（境界）・統合の三段階','過去・現在・未来の三段階','誕生・成熟・死滅の三段階','発生・展開・収束の三段階'], answer:0, explanation:'ファン・ヘネップは通過儀礼が、それまでの状態から切り離される分離、どちらにも属さない不安定な過渡（境界）、 新たな状態へ組み込まれる統合という三つの段階を経て進むと説いた。葬送儀礼では、死による分離、喪に服する過 渡、忌明けによる日常への統合といった流れに重ね合わせて理解できる。誕生から死滅までの生物的過程や時間区分そ のものを指す概念ではない。'},
{chapter:1, type:'4', source:'past', text:'日本の伝統的な死生観における「他界観」の説明として、最も適切なものはどれか。', choices:['死者の魂はこの世から完全に消滅し、どこにも行かないとする考え方である。','死者の魂は遺体とともに墓の中だけにとどまり続けるとする考え方である。','死者は必ず生前と同じ姿でこの世に生まれ変わるとする考え方である。','死者の魂は山や海のかなた、地下などの別の世界へ赴くとする考え方である。'], answer:3, explanation:'他界観とは、死者の魂が赴く先である「あの世」をどのようにとらえるかという観念であり、日本では山の上、海のか なた、あるいは地下など、この世とは異なる世界に死者の世界があると考えられてきた。地域や信仰によって山中他界・ 海上他界などさまざまな形をとる。魂の完全な消滅や、必ず同じ姿で生まれ変わるといった単一の考え方に限られるも のではない。'},
{chapter:1, type:'4', source:'past', text:'日本の民俗信仰において、亡くなった先祖の霊を指し、子孫を見守る存在と考えられてきたものを何という か。', choices:['付喪神','祖霊','荒魂','御霊（ごりょう）'], answer:1, explanation:'祖霊とは、亡くなった先祖の霊のことで、年月を経て個別の死者の性格が薄れ、家や子孫を守る存在へと昇華していく と考えられてきた。盆や彼岸などに迎えられ、祀られる対象となるのもこの祖霊である。付喪神は古い道具に宿るとさ れる霊、御霊は非業の死をとげた者の祟りをなす霊を鎮める信仰に関わる語であり、いずれも先祖一般の霊を指す概念 とは異なる。'},
{chapter:1, type:'4', source:'past', text:'日本の伝統的な死生観における「穢れ（けがれ）」と「忌み」に関する記述として、最も適切なものはどれ か。', choices:['死を穢れととらえ、一定期間を慎んで過ごす忌みの観念が広くみられた。','死は最も縁起のよいものとされ、祝い事として盛大に祝われた。','穢れの観念は外国にのみみられ、日本には全く存在しなかった。','忌みとは、喪に服さず通常どおり社会活動を続けることを指す。'], answer:0, explanation:'日本では古くから死を穢れととらえ、それに触れた者は一定の期間、社会的な活動を慎み身を清めるという忌みの観念 が広くみられた。これが忌中・忌明けといった慣習の背景となっている。死を祝い事とするものではなく、穢れの観念 は日本にも確かに存在した。また忌みは平常どおり過ごすことではなく、むしろ慎みのために行動を控える点に本質が ある。'},
{chapter:1, type:'4', source:'past', text:'江戸時代に、すべての人がいずれかの寺院に所属することを義務づけ、寺院がその身分を証明した制度を何と いうか。', choices:['班田収授制','座の制度','寺請制度','楽市楽座'], answer:2, explanation:'寺請制度は、江戸時代にすべての人をいずれかの寺院の檀家として所属させ、その寺院が檀家であることを証明する仕 組みである。もとはキリスト教禁止のための取り締まりとして整えられ、寺院が戸籍に近い役割を担い、葬儀や法要も 所属寺院が行うことが一般化した。これが檀家制度の定着につながった。班田収授は古代の土地制度、座や楽市楽座は 商工業に関わる制度であり、寺院への所属を義務づけるものではない。'},
{chapter:1, type:'4', source:'past', text:'江戸時代に定着した、特定の家が代々一つの寺院に所属し、葬儀や供養を任せる関係を何というか。', choices:['本末制度','名主制度','惣村制度','檀家制度'], answer:3, explanation:'檀家制度は、特定の家が代々一つの寺院（菩提寺）に所属し、葬儀や年忌法要などの供養を任せ、その経済的な支えと もなる関係を指す。寺請制度を背景として江戸時代に広く定着し、家と寺院の結びつきは現在の葬送習慣にも影響を残し ている。本末制度は寺院相互の上下関係、名主や惣村は村落運営に関わる仕組みであり、家と菩提寺との供養関係を指 すものではない。'},
{chapter:1, type:'4', source:'past', text:'明治初期に出された、神道と仏教を区別し切り離そうとした政策を何というか。', choices:['廃刀令','神仏分離','地租改正','版籍奉還'], answer:1, explanation:'神仏分離は、明治初期に神道と仏教を明確に区別し切り離そうとした政策で、それまで長く続いてきた神仏習合の状態 を改めるものであった。これをきっかけに各地で仏教施設や仏像が壊される廃仏毀釈の動きも起こった。廃刀令は帯刀の 禁止、地租改正は税制の改革、版籍奉還は土地と人民を朝廷に返上させた措置であり、いずれも神道と仏教の分離を目 的とするものではない。'},
{chapter:1, type:'4', source:'past', text:'現代の日本における火葬の普及状況に関する記述として、最も適切なものはどれか。', choices:['火葬はほとんど行われず、土葬が大多数を占めている。','火葬率と土葬の割合がおおむね半々で拮抗している。','火葬率はほぼ一〇〇パーセントに達している。','火葬はほぼ行われておらず、風葬が主流となっている。'], answer:2, explanation:'現代の日本では火葬が圧倒的に一般的であり、火葬率はほぼ一〇〇パーセントに達している。これは衛生上の理由や墓 地・埋葬に関する法令、都市化など複数の要因が重なって進んだものである。かつては土葬も広く行われていたが、現 在では地域や宗教上の事情による例外を除いてほとんどみられず、火葬と土葬が半々で拮抗している、あるいは風葬が 主流であるといった状況にはない。'},
{chapter:1, type:'4', source:'past', text:'仏教において、人が亡くなってから次の生を受けるまでの期間とされ、四十九日間にあたるものを何という か。', choices:['中陰','彼岸','結界','荼毘'], answer:0, explanation:'仏教では、人が亡くなってから次の生を受けるまでの期間を中陰（中有）と呼び、これがおおむね四十九日間にあたる とされる。この間、七日ごとに追善供養（裁き）が営まれ、一般に四十九日（七七日）に死者の行き先が定まると考え られて、初七日や四十九日（満中陰）などの法要が営まれてきた。彼岸は春分・秋分を中日とする仏教行事の期間、結 界は聖域を区切ること、荼毘は火葬を指す語であり、いずれも死後から次の生までの期間そのものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'亡くなった日を一日目として数えて七日目に営まれる、最初の忌日法要を何というか。', choices:['百か日','初七日','一周忌','新盆'], answer:1, explanation:'初七日は、亡くなった日を一日目として数えて七日目に営まれる最初の忌日法要である。中陰の期間中、七日ごとに行 われる追善供養の最初にあたる。近年では遠方の参列者の負担などを考え、葬儀の日に併せて繰り上げて営むことも多 い。百か日は百日目、一周忌は満一年の法要、新盆は故人を亡くしてから初めて迎える盆を指し、いずれも七日目の法 要そのものではない。'},
{chapter:1, type:'4', source:'past', text:'中陰の期間が満ちる、亡くなってから四十九日目に営まれる法要を何というか。', choices:['盂蘭盆会','三回忌','彼岸会','四十九日'], answer:3, explanation:'四十九日は中陰の期間が満ちる日に営まれる法要で、満中陰とも呼ばれ、死者の行き先が定まる重要な区切りとされ る。この日をもって忌明けとし、本位牌へ魂を移したり、納骨を行ったりすることも多い。三回忌は数え年で三年目、 彼岸会と盂蘭盆会はそれぞれ彼岸と盆に営まれる仏事であり、いずれも中陰が満ちる四十九日目の法要とは異なる。'},
{chapter:1, type:'4', source:'past', text:'年忌法要のうち「三回忌」が営まれる時期に関する記述として、最も適切なものはどれか。', choices:['死後満二年に営まれる。','死後満一年に営まれる。','死後満三年に営まれる。','死後満五年に営まれる。'], answer:0, explanation:'三回忌は数え方の慣習により、亡くなった年を一回目と数えるため、死後満二年に営まれる。一周忌の翌年にあたる点 をおさえておくとよい。これに対し一周忌は死後満一年に営まれる。同様に七回忌は満六年というように、三回忌以降 は実際に経過した年数より一年多い数で呼ばれる点が特徴であり、三回忌を満三年や満五年に営むわけではない。'},
{chapter:1, type:'4', source:'past', text:'一般に「弔い上げ」として、年忌法要を区切りとすることが多い時期はいつか。', choices:['一周忌','初七日','三十三回忌','四十九日'], answer:2, explanation:'弔い上げは、それ以降は個別の年忌法要を営まないとする最後の区切りで、三十三回忌をもって行うことが多い。これ は死者の霊が長い年月を経て個性を失い、先祖の霊である祖霊に融合していくという考え方を背景としている。地域や 家、宗派によっては五十回忌を区切りとする場合もある。初七日や四十九日は中陰の期間に営む中陰法要であって年忌 法要ではなく、年忌法要は一周忌や三回忌から三十三回忌などを指すため、一周忌も最後の区切りとされるものではな い。'},
{chapter:1, type:'4', source:'past', text:'仏教行事としての「お盆」の正式な名称のもととなった語として、最も適切なものはどれか。', choices:['灌仏会','盂蘭盆会','成道会','涅槃会'], answer:1, explanation:'お盆は、盂蘭盆会（うらぼんえ）を略した呼び方が広まったものとされ、祖先の霊を家に迎えて供養する行事である。 逆さ吊りの苦しみから亡き母を救うという経典の説話に由来するともいわれ、祖先供養と結びついて日本に定着した。 灌仏会は釈迦の誕生を祝う行事、成道会は悟りを開いた日、涅槃会は入滅の日を記念する行事であり、いずれも盆の由 来とは異なる。'},
{chapter:1, type:'4', source:'past', text:'お盆において、迎え火と送り火が果たす役割の説明として、最も適切なものはどれか。', choices:['新しい家族の誕生を祝うために焚かれる火である。','収穫の豊作を願って田畑で焚かれる火である。','悪霊を追い払うためだけに一年中焚かれる火である。','先祖の霊を迎え入れ、また送り出すために焚かれる火である。'], answer:3, explanation:'お盆の迎え火は、帰ってくる先祖の霊が道に迷わないように迎え入れるために焚き、送り火は供養を終えた霊を再びあ の世へ送り出すために焚くものである。一般に盆の入りに迎え火を、盆明けに送り火を焚き、家の門口などで行うこと が多い。誕生の祝いや豊作祈願のためのものではなく、一年中焚き続けて悪霊を払うといった性格のものでもない。'},
{chapter:1, type:'4', source:'past', text:'故人を亡くしてから初めて迎えるお盆を一般に何と呼ぶか。', choices:['旧盆','初盆（新盆）','盆礼','施餓鬼'], answer:1, explanation:'故人を亡くしてから初めて迎えるお盆を初盆（新盆）と呼び、通常の盆よりも丁寧に供養を営むことが多い。一般には 忌明け後に迎える盆を指し、親族や縁者を招いて法要を行う地域もある。旧盆は旧暦に基づく盆の時期を指す語、盆礼 は盆のあいさつ回り、施餓鬼は餓鬼に施しをする法会であり、いずれも初めて迎える盆そのものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'春と秋の彼岸の時期に関する記述として、最も適切なものはどれか。', choices:['春は春分、秋は秋分をそれぞれ中日とする前後各七日間である。','春は立春、秋は立秋をそれぞれ中日とする期間である。','春も秋も夏至の日のみを指す一日だけの行事である。','春は冬至、秋は夏至をそれぞれ中日とする期間である。'], answer:0, explanation:'彼岸は、春分の日と秋分の日をそれぞれ中日とし、その前後を合わせた各七日間の期間を指す。中日には昼と夜の長さが ほぼ等しくなり、太陽が真西に沈むことから、西方にあるとされる極楽浄土を願う仏教行事と結びついて先祖供養が営 まれてきた。立春や立秋、夏至・冬至を中日とするものではなく、一日だけで終わる行事でもない。'},
{chapter:1, type:'4', source:'past', text:'墓制のうち、遺体を埋める墓と、お参りをするための墓を別々に設ける形式を何というか。', choices:['単墓制','合葬墓','両墓制','納骨堂'], answer:2, explanation:'両墓制は、遺体を実際に埋葬する埋め墓と、お参りや供養のための詣り墓とを別々に設ける墓制で、かつて近畿地方など でみられた。死の穢れを意識した習俗とも関わるとされる。これに対し、埋葬と参拝を一つの墓で兼ねる形式が単墓制 である。合葬墓は複数の遺骨をまとめて納める墓、納骨堂は遺骨を屋内に収蔵する施設であり、いずれも墓を二つに分 ける形式そのものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'近年広がっている、墓石を建てずに樹木を墓標とする埋葬方法を何というか。', choices:['風葬','土葬','殯','樹木葬'], answer:3, explanation:'樹木葬は、一般的な墓石の代わりに樹木を墓標とし、その根元などに遺骨を埋葬する方法で、近年関心が高まっている。 継承を前提としにくい家族のあり方や、自然に還りたいという思いなどを背景に選ばれることが多い。風葬は遺体を埋 めずに自然へさらす葬法、土葬は遺体をそのまま土中に葬る方法、殯は本葬前の安置儀礼であり、いずれも樹木を墓標 とする埋葬方法とは異なる。'},
{chapter:1, type:'4', source:'past', text:'すでに納められている遺骨を、別の墓地や納骨施設へ移すことを何というか。', choices:['改葬','分骨','埋葬','火葬'], answer:0, explanation:'改葬は、すでに墓地などに納められている遺骨を、別の墓地や納骨施設へ移すことをいう。墓を継ぐ人がいなくなる、 遠方で参拝が難しいといった事情から行われることが多く、いわゆる墓じまいに伴って実施される場合もある。法令上 は所定の手続きが必要とされる。分骨は遺骨を分けて複数に納めること、埋葬や火葬はそれぞれ遺体を葬る行為を指 し、いずれも既存の遺骨を移すことそのものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'故人の冥福を祈り、戒名や没年月日などを記して仏壇などに安置する木製の札を何というか。', choices:['卒塔婆','位牌','数珠','御幣'], answer:1, explanation:'位牌は、故人の戒名や法名、没年月日などを記して仏壇などに安置する木製の札で、故人の霊を象徴し、供養の対象と されるものである。中国の儒教的な習俗が仏教とともに伝わり、日本で広く用いられるようになったとされる。卒塔婆 は供養のために墓などに立てる細長い板、数珠は読経や礼拝に用いる仏具、御幣は神道で用いる祭具であり、いずれも 戒名を記して祀る札そのものとは異なる。'},
{chapter:1, type:'4', source:'past', text:'遺体を寝かせる際、その頭を北に向ける作法を一般に何というか。', choices:['東枕','逆さ屏風','守り刀','北枕'], answer:3, explanation:'北枕は、遺体を安置する際にその頭を北に向ける作法で、釈迦が入滅したとき頭を北に向けて横たわっていたという伝 えにちなむとされる。日常では北枕を避ける習わしがあることもあり、死に際しての特別な作法として位置づけられて きた。東枕は頭を東に向けること、逆さ屏風は枕元に屏風を逆さに立てる習俗、守り刀は魔除けのために遺体のそばに 置く刀であり、いずれも頭を北に向ける作法そのものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'葬送に際して、日常とは逆のやり方をあえて行う一連の習俗を総称して何というか。', choices:['野辺送り','精進落とし','逆さごと','通夜振る舞い'], answer:2, explanation:'逆さごとは、死に際して日常とは逆のやり方をあえて行う一連の習俗の総称で、死の世界が現世とは逆になっていると いう観念や、死を日常から区別する意味があるとされる。湯を作る際に水に湯を足す逆さ水や、着物の合わせを左前に することなどが代表例である。精進落としや通夜振る舞いは葬送に伴う食事、野辺送りは埋葬地まで送る行列を指し、 いずれも逆の作法そのものを指す総称ではない。'},
{chapter:1, type:'4', source:'past', text:'逆さごとの一例である「逆さ水」の作り方として、最も適切なものはどれか。', choices:['水に湯を加えて温度を調整する。','湯に水を加えて温度を調整する。','湯だけを用い、水は一切加えない。','水だけを用い、湯は一切加えない。'], answer:0, explanation:'逆さ水は、遺体を清める湯灌などの際に、日常とは逆の手順で湯をつくる習俗で、ふつうは湯に水を足してぬるめると ころを、水に湯を足して整える。死に関わる場面で平常と逆のことを行う逆さごとの一つである。湯に水を足す方法は 日常の手順であり、湯だけ、あるいは水だけを用いるという説明も逆さ水の特徴を正しく表したものではない。'},
{chapter:1, type:'4', source:'past', text:'死者に着せる経帷子など、葬送のために整える衣装を一般に何と呼ぶか。', choices:['産着','死装束','裃','礼服'], answer:1, explanation:'死装束は、死者に着せるために整える衣装の総称で、白い経帷子などが代表的であり、白色が用いられることが多い。こ れは旅立ちの装いになぞらえる考え方とも結びついている。産着は生まれた子に着せる衣、裃は武家の礼装、礼服は冠 婚葬祭で生者が身につける衣服であり、いずれも死者に着せる装束そのものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'葬送の習俗において、死者に着せる着物の合わせ方として伝えられてきた作法はどれか。', choices:['生前と同じく右前に合わせる。','前を合わせず帯のみで留める。','日常とは逆に左前に合わせる。','上下を逆さにして着せる。'], answer:2, explanation:'死者に着せる着物は、日常とは逆に左前（自分から見て左の衿が下になる合わせ方）にする習俗が伝えられており、こ れも逆さごとの一例である。生きている者は右前に着るのが通常であるため、それと逆にすることで死を日常から区別 する意味があるとされる。前を合わせない、あるいは上下を逆に着せるといった作法が一般的に伝えられているわけで はない。'},
{chapter:1, type:'4', source:'past', text:'近親者を亡くした遺族が、一定期間にわたり身を慎んで過ごすことを総称して何というか。', choices:['精進','参籠','参拝','服喪（喪に服す）'], answer:3, explanation:'服喪（喪に服す）とは、近親者を亡くした遺族が一定の期間、身を慎んで過ごすことをいう。死を悼み、祝い事や華や かな行事への参加を控えるなど、生活の上で慎みを保つことが慣習とされてきた。精進は肉食などを避けて身を清める こと、参籠は社寺にこもって祈願すること、参拝は神仏を拝むことであり、いずれも近親者の死後に身を慎む期間そのも のを総称する語ではない。'},
{chapter:1, type:'4', source:'past', text:'喪に関わる慣習である「忌中」と「喪中」の一般的な関係として、最も適切なものはどれか。', choices:['忌中は喪中よりも長く、喪中は忌中の一部にあたる。','忌中は喪中の初めの、特に慎みの深い期間にあたる。','忌中と喪中は全く同じ意味であり、期間も完全に一致する。','忌中は喪が明けた後に新たに始まる期間を指す。'], answer:1, explanation:'一般に忌中は喪に服す期間のうち初めの、特に深く慎むべき期間を指し、喪中はそれを含むより長い期間をいう。仏式 では四十九日の忌明けまでを忌中とし、その後も一定期間を喪中とすることが多い。したがって忌中は喪中の一部で あって喪中より長いわけではなく、両者がまったく同じというわけでも、喪が明けた後に始まるものでもない。'},
{chapter:1, type:'4', source:'past', text:'喪の期間が終わり、遺族が日常の生活へ戻る区切りを一般に何というか。', choices:['忌明け','彼岸入り','精進入り','盆入り'], answer:0, explanation:'忌明けは、特に深く慎むべき忌中の期間が終わり、遺族が日常の生活へ戻る区切りをいう。仏式では四十九日の法要を もって忌明けとすることが多く、この時期に本位牌への移行や納骨を行うこともある。彼岸入りや盆入りはそれぞれ彼 岸・盆の始まりを指し、精進入りは精進の慣習に入ることを指す語であり、いずれも喪の慎みが明ける区切りそのもの を指すものではない。'},
{chapter:1, type:'4', source:'past', text:'鎌倉時代に広まった、阿弥陀仏の極楽浄土への往生を願う信仰を一般に何というか。', choices:['陰陽思想','儒教思想','浄土信仰','神仙思想'], answer:2, explanation:'浄土信仰は、阿弥陀仏の極楽浄土へ生まれ変わること（往生）を願う信仰で、平安時代後期から広まり、鎌倉時代には念 仏を中心とする教えとして庶民の間にも浸透した。死後の救いを説くこの信仰は、葬送や供養のあり方にも大きな影響 を与えた。陰陽思想や神仙思想、儒教思想はそれぞれ別の系譜の思想であり、阿弥陀仏の浄土への往生を願う信仰を指 すものではない。'},
{chapter:1, type:'4', source:'past', text:'故人の冥福を祈り、後から善行の功徳を故人に振り向ける供養を一般に何というか。', choices:['護摩','放生会','灌頂','追善供養'], answer:3, explanation:'追善供養は、残された者が読経や法要などの善行を積み、その功徳を故人に振り向けて冥福を祈る供養をいう。初七日 から年忌法要に至る一連の仏事は、この追善供養の考え方に基づいている。放生会は捕らえた生き物を放つ法会、灌頂 は頭に水を注ぐ密教の儀式、護摩は火をたいて祈る修法であり、いずれも故人へ功徳を振り向ける供養そのものを指す ものではない。'},
{chapter:1, type:'4', source:'past', text:'明治以降に都市部を中心として広まった、一つの家の代々の遺骨を一基の墓にまとめて納める墓のあり方を一 般に何というか。', choices:['無縁墓','両墓','家墓','集団墓'], answer:2, explanation:'家墓は、一つの家の代々の遺骨を一基の墓にまとめて納め、子孫が受け継いでいく墓のあり方で、明治以降に都市部を 中心として広まり、現在の一般的な墓の形として定着した。「〇〇家之墓」と刻む形が代表的である。両墓は埋め墓と 詣り墓を分ける墓制、無縁墓は継ぐ人がいなくなった墓を指す語であり、いずれも家ごとに代々受け継ぐ墓のあり方そ のものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'近年広がっている、遺骨を一つの区画に他の人とともにまとめて納める形式の墓を一般に何というか。', choices:['合葬墓（合祀墓）','家墓','詣り墓','古墳'], answer:0, explanation:'合葬墓（合祀墓）は、血縁の有無にかかわらず、多くの人の遺骨を一つの区画にまとめて納める形式の墓で、墓の継承者 がいない人や、継承の負担を避けたい人などに選ばれ、近年広がっている。家墓は一つの家が代々受け継ぐ墓、詣り墓 は両墓制において参拝に用いる墓、古墳は古代の有力者の墳墓であり、いずれも不特定多数の遺骨をまとめて納める現 代の墓を指すものではない。'},
{chapter:1, type:'4', source:'past', text:'屋内に設けた区画やロッカー式の棚などに遺骨を収蔵する施設を一般に何というか。', choices:['斎場','納骨堂','殯宮','祭壇'], answer:1, explanation:'納骨堂は、屋外に墓石を建てるのではなく、屋内の区画やロッカー式の棚、自動搬送式の設備などに遺骨を収蔵する施 設である。天候に左右されにくく、都市部でも利用しやすいことから関心が高まっている。斎場は葬儀や火葬を行う施 設、殯宮は古代に殯を行った建物、祭壇は供物や故人を祀るための壇であり、いずれも遺骨を屋内に収蔵する施設その ものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'遺骨を粉状にして海や山などにまく葬送の方法を一般に何というか。', choices:['埋葬','改葬','洗骨','散骨'], answer:3, explanation:'散骨は、火葬した遺骨を細かく砕いて粉状にし、海や山などの自然にまく葬送の方法で、自然に還りたいという思いや 墓を持たない選択などを背景に、近年関心が高まっている。実施にあたっては場所や方法への配慮が求められる。改葬 は既存の遺骨を別の場所へ移すこと、洗骨はいったん葬った骨を洗い清める習俗、埋葬は墓埋法上は死体を土中に葬る 土葬を指す語であり（焼骨を墳墓に納めることは埋蔵、納骨堂に納めることは収蔵という）、いずれも遺骨を粉にして まく方法そのものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'墓を継ぐ人がいないなどの理由で墓を撤去し、遺骨を別の場所へ移したり供養したりすることを表す近年の言 葉はどれか。', choices:['墓じまい','墓参り','墓開き','野辺送り'], answer:0, explanation:'墓じまいは、墓を継ぐ人がいないなどの事情から、現在の墓を撤去して整理し、遺骨を別の墓地や納骨施設へ移した り、合葬墓などで供養したりすることを表す近年の言葉である。多くの場合、遺骨を移す改葬の手続きを伴う。墓参りは 墓に参ること、野辺送りは埋葬地まで遺体を送る行列を指し、墓開きは新しい墓に対する儀式を指す語であり、いずれも 墓を撤去し整理することそのものを指すものではない。'},
{chapter:1, type:'4', source:'past', text:'通夜のもとになったと考えられている、夜を通して遺体に付き添う古くからの習わしを何というか。', choices:['精進落とし','通夜振る舞い','夜伽（よとぎ）','初七日'], answer:2, explanation:'夜伽（よとぎ）は、夜を通して遺体に付き添い、線香や灯明を絶やさずに見守る古くからの習わしで、死を確認し別れ を惜しむ意味があり、通夜のもとになったと考えられている。古代の殯の系譜を引くともいわれる。通夜振る舞いや精 進落としは葬送に伴う会食、初七日は亡くなって七日目の法要であり、いずれも夜通し遺体に付き添う習わしそのもの を指すものではない。'},
{chapter:1, type:'4', source:'past', text:'世界各地でみられる葬法に関する記述として、最も適切なものはどれか。', choices:['世界では火葬だけが行われ、土葬は全く存在しない。','世界では遺体を葬る習慣そのものがほとんど存在しない。','世界の葬法は地域を問わずすべて同一である。','世界では土葬・火葬・風葬など多様な葬法がみられる。'], answer:3, explanation:'世界各地では、遺体を土中に納める土葬、焼く火葬、自然にさらす風葬など、さまざまな葬法がみられ、宗教や風土、 価値観の違いを反映して多様である。日本では火葬がほぼすべてを占めるが、これは世界共通ではない。火葬だけしか 存在しない、世界中の葬法がすべて同一である、あるいは遺体を葬る習慣そのものがほとんどないといった説明は、い ずれも実態に合わない。'},
{chapter:1, type:'4', source:'past', text:'弥生時代の九州北部などでみられた、大型の土器を棺として遺体を納める埋葬方法を何というか。', choices:['横穴式石室','甕棺墓','樹木葬','納骨堂'], answer:1, explanation:'甕棺墓は、弥生時代に九州北部などでみられた、大型の土器（甕）を棺として遺体を納める埋葬方法である。二つの甕 を合わせ口にして用いる例などが知られ、当時の地域的な墓制を示すものとして重要である。横穴式石室は古墳の埋葬 施設の一形式、樹木葬や納骨堂は近年広がる現代の方法であり、いずれも弥生時代に土器を棺として用いた埋葬方法と は異なる。'},
{chapter:1, type:'4', source:'past', text:'祖先の霊を祀る盆や彼岸などの行事に共通する、根底にある考え方として最も適切なものはどれか。', choices:['特定の英雄の戦勝を記念し、その武功を称える考え方','自然災害の発生を予言し、それを防ごうとする考え方','先祖の霊を迎えて供養し、子孫との結びつきを確かめる祖先供養の考え方','収穫物を市場で売買する商取引を奨励する考え方'], answer:2, explanation:'盆や彼岸などの行事は、先祖の霊を迎えて供養し、子孫とのつながりを確かめるという祖先供養の考え方を根底にもっ ている。家や血縁を通じて受け継がれてきた死生観が背景にあり、季節の節目に営まれてきた。災害の予言や防止、特 定の英雄の戦勝の記念、商取引の奨励などは、これらの行事が本来もつ祖先供養の趣旨とは関わりがない。'},
{chapter:1, type:'4', source:'past', text:'神道において、死を穢れととらえ身を慎む「忌」の期間に関する記述として、最も適切なものはどれか。', choices:['死を穢れととらえ、一定の期間を忌として身を慎む考え方がある。','死は穢れではないとされるため、忌の期間は一切設けられない。','忌の期間は必ず一日だけと定められ、地域や立場で変わることはない。','忌の期間中は、むしろ祝い事に積極的に参加することが求められる。'], answer:0, explanation:'神道では死を穢れととらえる観念があり、近親者を亡くした者は一定の期間を忌として身を慎み、神事や祝い事を控え る考え方がある。この期間は故人との関係などによって異なるとされてきた。死を穢れと全くとらえないわけではな く、また期間が一律に一日と決まっているものでもない。忌の期間中はむしろ慎みを保つのであって、祝い事への積極的 な参加が求められるわけではない。'},
{chapter:1, type:'4', source:'past', text:'亡くなってから百日目に営まれる法要を一般に何というか。', choices:['初七日','百か日','四十九日','一周忌'], answer:1, explanation:'百か日は、亡くなった日から数えて百日目に営まれる法要で、四十九日の後、一周忌の前にあたる区切りである。深い 悲しみに一区切りをつけるという意味合いから「卒哭忌」と呼ばれることもある。初七日は七日目、四十九日は中陰の 満ちる日、一周忌は満一年の節目の法要であり、いずれも百日目に営まれる法要そのものとは異なる。'},
{chapter:1, type:'4', source:'past', text:'古墳時代から飛鳥・奈良時代にかけての火葬の広まり方に関する記述として、最も適切なものはどれか。', choices:['伝来とともに、ただちにすべての階層へ一斉に普及した。','伝来後すぐに法律で全国民に義務づけられた。','身分の低い者にのみ用いられ、上層では一切行われなかった。','皇族・貴族・僧侶などを中心に徐々に広まり、土葬と長く併存した。'], answer:3, explanation:'火葬は仏教の伝来とともに伝わり、まず皇族・貴族・僧侶など上層の人々を中心に徐々に広まっていった。庶民にまで一 般化するのはずっと後のことで、長い間、土葬と火葬が併存していた。伝来とともにただちに全階層へ一斉に普及した わけではなく、身分の低い者だけに用いられたものでもない。また、伝来後すぐに法律で全国民に義務づけられたとい う事実もない。'},
{chapter:1, type:'4', source:'past', text:'死者の枕元に屏風を上下逆さにして立てる、葬送に伴う習俗を何というか。', choices:['守り刀','結界','逆さ屏風','野辺送り'], answer:2, explanation:'逆さ屏風は、死者を安置する枕元に屏風を上下逆さにして立てる習俗で、日常とは逆のことを行う逆さごとの一つであ り、死を日常から区別する意味があるとされる。地域によって行われ方には差がある。結界は聖域を区切ること、守り刀 は魔除けのために遺体のそばに置く刀、野辺送りは埋葬地まで送る行列を指し、いずれも屏風を逆さに立てる習俗その ものとは異なる。'},
{chapter:1, type:'4', source:'past', text:'年忌法要をめぐる地域や宗派による違いに関する記述として、最も適切なものはどれか。', choices:['弔い上げの時期や法要の営み方には、地域や宗派による違いがみられる。','年忌法要の時期や作法は、全国・全宗派で完全に統一されている。','年忌法要は地域差が大きいため、いつ営んでもよく決まりは一切ない。','年忌法要は特定の一地域だけの習慣で、他の地域には存在しない。 葬祭ディレクター技能審査 完全対策問題集 第3 章：仏教の葬儀（宗派別） （50問）'], answer:0, explanation:'年忌法要は広く行われている一方で、弔い上げを三十三回忌とするか五十回忌とするか、どの年忌を重んじるかといっ た点には地域や宗派による違いがみられる。共通する大枠を理解しつつ、地域差にも配慮することが求められる。時期 や作法が全国・全宗派で完全に統一されているわけではなく、また何の決まりもないわけでも、特定の一地域だけの習 慣であるわけでもない。 葬祭ディレクター技能審査 完全対策問題集 第3章：仏教の葬儀（宗派 別）'},
{chapter:2, type:'4', source:'past', text:'「枕経（まくらぎょう）」の説明として最も適切なものはどれか。', choices:['出棺の直前に棺の前であげる読経のこと','四十九日の法要で営まれる読経のこと','臨終後、納棺までの間に故人の枕元であげる最初の読経のこと','納骨の際に墓前であげる読経のこと'], answer:2, explanation:'枕経は、本来は臨終に際して故人の枕元であげる読経であったが、現在では亡くなった後、納棺までの間に枕元で営む 最初の読経を指すのが一般的である。遺族が菩提寺に連絡し、僧侶に読経してもらう、死後最初の仏事といえる。なお 浄土真宗では臨終勤行と位置付けるなど、宗派により考え方に違いがある。出棺前の読経や法要時の読経と混同しない よう、葬送の流れの中での位置を理解しておきたい。'},
{chapter:2, type:'4', source:'past', text:'通夜の本来のあり方の説明として最も適切なものはどれか。', choices:['近親者らが夜を通して灯明と線香を絶やさず、故人に付き添い見守る','生前故人と関係のあった人々が故人に最後の別れを告げる社会的儀礼である','僧侶が故人に戒を授けて仏弟子とするための儀式である','七日ごとの審判に合わせて営まれる追善供養である'], answer:0, explanation:'通夜は本来、葬儀の前夜に近親者らが夜を通して故人のそばに付き添い、灯明と線香を絶やさずに見守る儀式である。 死者の蘇生を願う心や遺体を守る意味があったとされる。現在では弔問客を迎えて僧侶の読経と焼香を行い、夕刻から 数時間程度で終える半通夜の形式が広く行われている。最後の別れを告げる社会的儀礼は告別式の性格であり、通夜本 来の意味とは区別して理解する必要がある。'},
{chapter:2, type:'4', source:'past', text:'仏式における「葬儀式」の性格の説明として最も適切なものはどれか。', choices:['会葬者が故人に最後の別れを告げる社会的儀礼である','読経や引導などにより故人を仏の世界へ送る宗教的儀礼である','遺族が会葬者に会葬への謝意を表すための儀礼である','遺骨を墓所に納める際に行う儀礼である'], answer:1, explanation:'葬儀式は、僧侶の読経や授戒、引導などによって、故人をこの世から仏の世界へ送るための宗教的儀礼である。これに対 し告別式は、会葬者が故人に最後の別れを告げる社会的儀礼であり、両者は本来性格の異なる儀式である。現在では葬 儀式に続けて告別式を行うなど一体化した運営が多いが、葬祭ディレクターとしては両者の意味の違いを正しく理解し、 式次第の説明などに生かすことが求められる。'},
{chapter:2, type:'4', source:'past', text:'「告別式」の説明として最も適切なものはどれか。', choices:['僧侶が読経と引導により故人の成仏を祈る宗教的儀礼である','故人に戒名を授けるための儀式である','近親者が夜を通して故人に付き添い見守る儀式である','会葬者が故人に最後の別れを告げる社会的儀礼である'], answer:3, explanation:'告別式は、生前故人と関係のあった人々が集まり、故人に最後の別れを告げる社会的儀礼である。宗教的儀礼である葬 儀式とは本来性格が異なり、明治34年に営まれた中江兆民の葬送が、宗教儀礼によらない告別式の始まりとされる。現 在は葬儀式と告別式を続けて行う形式が一般的で、両者の区別が意識されにくくなっているが、それぞれの儀礼の意味 を理解しておくことは実務上も重要である。'},
{chapter:2, type:'4', source:'past', text:'葬儀における「引導（いんどう）」の説明として最も適切なものはどれか。', choices:['導師を務める僧侶が、故人を迷いの世界から仏の世界へ導くために行う作法','遺族代表が会葬者に対して謝辞を述べること','出棺の際に位牌を持って棺を先導すること','会葬者を焼香台へ順に案内すること'], answer:0, explanation:'引導とは、葬儀式において導師を務める僧侶が、故人が迷いを断ち切って仏の世界へ赴けるよう導く作法をいう。宗派に より形式は異なり、禅宗系では導師が引導法語を唱え、真言宗では印を結び真言を唱えるなど、それぞれに特色がある。 なお、阿弥陀如来の本願力によりただちに浄土へ往生すると説く浄土真宗では、引導の儀礼を行わないとされる。宗派 ごとの儀礼の違いを理解しておきたい。'},
{chapter:2, type:'4', source:'past', text:'仏式葬儀における「授戒（じゅかい）」の意味として最も適切なものはどれか。', choices:['故人の霊を慰めるために灯明をともし続けること','故人の生前の功績をたたえて弔辞を読むこと','故人に戒を授けて仏弟子とすること','遺体を湯で清めて死装束を整えること'], answer:2, explanation:'授戒とは、仏教徒として守るべき戒を授け、故人を仏弟子とする儀礼である。本来は生前に受けるものであるが、日本 では葬儀の中で死者に授戒し、その証として戒名を授ける形が広く行われてきた。剃刀を当てる剃髪の作法を伴う宗派 もある。なお、戒律を立てない浄土真宗では授戒を行わず、帰敬式によって法名を授けるという違いがあり、葬儀の式次 第にも宗派の教義が反映されている。'},
{chapter:2, type:'4', source:'past', text:'日本の天台宗を開いた僧は誰か。', choices:['空海','最澄','法然','道元'], answer:1, explanation:'日本の天台宗は、平安時代初期に最澄（伝教大師）が唐で天台の教えを学んで帰国し、比叡山に開いた宗派である。法 華経を根本経典とし、総本山は比叡山延暦寺である。比叡山は、後に法然、親鸞、栄西、道元、日蓮といった鎌倉新仏 教の祖師たちが学んだ地でもあり、日本仏教の母山とも呼ばれる。同時代に唐へ渡った空海は真言宗を開いており、両者 を混同しないよう注意したい。'},
{chapter:2, type:'4', source:'past', text:'天台宗の総本山はどれか。', choices:['高野山金剛峯寺','身延山久遠寺','知恩院','比叡山延暦寺'], answer:3, explanation:'天台宗の総本山は、滋賀県大津市の比叡山延暦寺である。開祖最澄が比叡山に草庵を結んだことに始まり、根本中堂に は「不滅の法灯」が今日まで守り伝えられている。高野山金剛峯寺は高野山真言宗、身延山久遠寺は日蓮宗、知恩院は 浄土宗のそれぞれ総本山であり、宗派と本山の組み合わせは葬祭ディレクターの学科試験でも問われやすい基礎知識とし て、確実に整理して覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'真言宗を開いた僧は誰か。', choices:['空海','日蓮','栄西','親鸞'], answer:0, explanation:'真言宗は、平安時代初期に空海（弘法大師）が唐で密教を学んで帰国し、開いた宗派である。高野山に金剛峯寺を開 き、大日如来を本尊として、大日経・金剛頂経を所依の経典とする。身・口・意の三密の行により、この身のままで仏と なる即身成仏を説く密教の宗派であり、葬儀にも印や真言など密教的な作法が用いられる。日蓮は日蓮宗、栄西は臨済 宗、親鸞は浄土真宗のそれぞれ祖師である。'},
{chapter:2, type:'4', source:'past', text:'高野山真言宗の総本山はどれか。', choices:['永平寺','延暦寺','金剛峯寺','久遠寺'], answer:2, explanation:'高野山真言宗の総本山は、和歌山県の高野山金剛峯寺である。空海（弘法大師）が嵯峨天皇から高野山を賜り、修禅の 道場として開いたことに始まる。奥之院には弘法大師が今も瞑想を続けているとする入定信仰が伝えられ、全国から参 詣者を集めている。永平寺は曹洞宗の大本山、延暦寺は天台宗の総本山、久遠寺は日蓮宗の総本山であり、宗派ごとの 本山を正確に区別して覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'真言宗の本尊とされる仏はどれか。', choices:['阿弥陀如来','薬師如来','釈迦如来','大日如来'], answer:3, explanation:'真言宗では、宇宙の真理そのものを仏格化した大日如来を本尊とする。密教では大日如来があらゆる仏の根源とされ、 空海は三密の行によってこの身のまま仏となる即身成仏を説いた。所依の経典は大日経と金剛頂経である。阿弥陀如来 は浄土宗・浄土真宗の本尊、釈迦如来は仏教の開祖である釈尊を表す仏であり、宗派と本尊の対応関係は葬祭実務の基 礎知識として確実に押さえておきたい。'},
{chapter:2, type:'4', source:'past', text:'浄土宗を開いた僧は誰か。', choices:['親鸞','法然','一遍','最澄'], answer:1, explanation:'浄土宗は、平安時代末期に法然（源空）が開いた宗派である。法然は比叡山で学んだ後、阿弥陀仏の本願を信じて「南 無阿弥陀仏」と称える称名念仏によって、誰もが等しく極楽浄土に往生できると説いた。総本山は京都の知恩院、本尊は 阿弥陀如来で、無量寿経・観無量寿経・阿弥陀経の浄土三部経を所依とする。親鸞は法然の弟子で浄土真宗の宗祖、一 遍は時宗の開祖であり、混同に注意したい。'},
{chapter:2, type:'4', source:'past', text:'浄土宗の総本山はどれか。', choices:['知恩院','西本願寺','増上寺','金剛峯寺'], answer:0, explanation:'浄土宗の総本山は、京都市東山区の知恩院である。開祖法然が晩年を過ごし、入寂した地に建てられた寺院で、壮大な 三門や除夜の鐘でも知られる。東京の増上寺は浄土宗の大本山であり、総本山ではない点に注意が必要である。西本願 寺は浄土真宗本願寺派の本山、金剛峯寺は高野山真言宗の総本山である。宗派と本山の対応は学科試験の頻出事項であ り、所在地とあわせて覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'浄土宗および浄土真宗の本尊とされる仏はどれか。', choices:['大日如来','釈迦如来','阿弥陀如来','観世音菩薩'], answer:2, explanation:'浄土宗と浄土真宗は、いずれも阿弥陀如来を本尊とする。阿弥陀如来は西方極楽浄土の教主で、すべての衆生を救うと いう本願を立てた仏とされる。両宗派は「南無阿弥陀仏」と称えて阿弥陀仏に帰依する念仏の教えを基本とし、無量寿 経・観無量寿経・阿弥陀経のいわゆる浄土三部経を所依の経典とする。大日如来は真言宗の本尊であり、宗派ごとの本 尊を混同しないよう整理しておきたい。'},
{chapter:2, type:'4', source:'past', text:'「南無阿弥陀仏」と称えることを一般に何と呼ぶか。', choices:['唱題','念仏','読経','回向'], answer:1, explanation:'「南無阿弥陀仏」と阿弥陀仏の名号を口に称えることを念仏（称名念仏）という。浄土宗や浄土真宗など浄土系宗派の 中心的な行であり、阿弥陀仏に帰依するという意味を持つ。これに対し、日蓮宗で「南無妙法蓮華経」と唱えることは唱 題と呼ばれ、念仏とは区別される。読経は経典を声に出して読むこと、回向は読経や念仏の功徳を故人などに振り向け ることをいい、用語の違いを正しく理解したい。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗の宗祖とされる僧は誰か。', choices:['法然','道元','日蓮','親鸞'], answer:3, explanation:'浄土真宗の宗祖は、鎌倉時代の僧である親鸞である。親鸞は法然の弟子として念仏の教えを受け継ぎ、阿弥陀仏の本願 力による救い（他力）を徹底して説いた。主著に「教行信証」がある。親鸞自身に新しい宗派を立てる意図はなかった とされるが、その教えは没後に教団として発展し、本願寺派や大谷派などの各派に分かれた。師の法然は浄土宗の開祖 であり、師弟の関係とともに区別して覚えたい。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗本願寺派の本山はどれか。', choices:['西本願寺（龍谷山本願寺）','東本願寺（真宗本廟）','知恩院','比叡山延暦寺'], answer:0, explanation:'浄土真宗本願寺派の本山は、京都市下京区の西本願寺（龍谷山本願寺）で、通称「お西さん」と呼ばれる。東本願寺 （真宗本廟）は真宗大谷派の本山で、「お東さん」と呼ばれる。両派は同じく親鸞を宗祖と仰ぐが、江戸時代初期に本 願寺が東西に分立した経緯から別の教団となっており、焼香の回数や仏壇・仏具の様式などに違いがある。葬儀実務で は喪家がどちらの派かの確認が重要である。'},
{chapter:2, type:'4', source:'past', text:'真宗大谷派の本山はどれか。', choices:['西本願寺','東本願寺（真宗本廟）','高野山金剛峯寺','永平寺'], answer:1, explanation:'真宗大谷派の本山は、京都市下京区の東本願寺で、正式には真宗本廟という。浄土真宗本願寺派の本山である西本願寺と 並び、いずれも親鸞を宗祖と仰ぐが、教団としては別である。焼香の回数や仏壇・仏具の様式など、実務に関わる作法 に違いがあるため、葬祭ディレクターは喪家が本願寺派か大谷派かを必ず確認して施行に当たる必要がある。金剛峯寺 は真言宗、永平寺は曹洞宗の本山である。'},
{chapter:2, type:'4', source:'past', text:'臨済宗を日本に伝えたとされる僧は誰か。', choices:['道元','隠元','栄西','空海'], answer:2, explanation:'臨済宗は、鎌倉時代初期に栄西が宋から日本に伝えた禅宗の一派である。師から与えられる公案に取り組みながら坐禅 する看話禅を特色とし、鎌倉・室町期には武家社会に広く受け入れられた。臨済宗は妙心寺派や建長寺派など多くの派 に分かれ、それぞれが本山を持つ。道元は曹洞宗の開祖、隠元は江戸時代に黄檗宗を伝えた僧であり、禅宗系の宗派と 祖師の対応を正確に覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'曹洞宗を開いた僧は誰か。', choices:['栄西','日蓮','親鸞','道元'], answer:3, explanation:'曹洞宗は、鎌倉時代に道元が宋から伝えた禅宗の一派である。道元は、ひたすら坐禅に打ち込む只管打坐を説き、坐禅 の姿そのものが仏の姿であるとした。主著に「正法眼蔵」がある。大本山は福井県の永平寺と横浜市鶴見区の總持寺で ある。栄西は同じ禅宗系の臨済宗を日本に伝えた僧であり、公案を用いる臨済宗と只管打坐の曹洞宗という、禅風の違 いとあわせて整理しておきたい。'},
{chapter:2, type:'4', source:'past', text:'曹洞宗の両大本山の組み合わせとして正しいものはどれか。', choices:['建仁寺と建長寺','永平寺と總持寺','延暦寺と園城寺','金剛峯寺と東寺'], answer:1, explanation:'曹洞宗には大本山が二つあり、開祖道元が開いた福井県の永平寺と、瑩山紹瑾ゆかりの總持寺である。總持寺はもと能登 にあったが、明治期の火災を経て横浜市鶴見区の現在地に移転した。曹洞宗では道元を高祖、瑩山を太祖と仰ぎ、両者 を両祖と呼ぶ。建仁寺や建長寺は臨済宗の寺院であり、同じ禅宗系で混同しやすいため、曹洞宗の両大本山の名称と所 在地を確実に覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'一般に「禅宗」と総称される宗派の組み合わせとして最も適切なものはどれか。', choices:['臨済宗と曹洞宗','浄土宗と浄土真宗','天台宗と真言宗','日蓮宗と時宗'], answer:0, explanation:'坐禅を修行の中心に置く宗派は禅宗と総称され、日本では臨済宗と曹洞宗が代表的である。江戸時代に伝わった黄檗宗 を含めて数えることもある。臨済宗は公案に取り組む看話禅、曹洞宗は只管打坐をそれぞれ特色とする。浄土宗・浄土 真宗は念仏系、日蓮宗は題目を唱える法華系、時宗は一遍が開いた念仏系の宗派、天台宗・真言宗は平安期に開かれた 宗派であり、系統ごとに分類して整理すると理解しやすい。'},
{chapter:2, type:'4', source:'past', text:'日蓮宗の開祖は誰か。', choices:['最澄','法然','日蓮','空海'], answer:2, explanation:'日蓮宗は、鎌倉時代に日蓮が開いた宗派である。日蓮は、法華経こそ釈尊の教えの真髄であるとして、「南無妙法蓮華 経」の題目を唱える唱題によって救われると説いた。総本山は山梨県の身延山久遠寺である。伊豆や佐渡への流罪など、 度重なる法難に遭いながら布教を続けたことでも知られる。最澄は天台宗、法然は浄土宗、空海は真言宗のそれぞれ開 祖であり、混同しないようにしたい。'},
{chapter:2, type:'4', source:'past', text:'日蓮宗の総本山はどれか。', choices:['池上本門寺','比叡山延暦寺','知恩院','身延山久遠寺'], answer:3, explanation:'日蓮宗の総本山は、山梨県身延町の身延山久遠寺である。日蓮が晩年の約9年間を過ごして弟子の育成に努めた地であ り、遺言により遺骨も身延山に納められたと伝えられる。東京の池上本門寺は日蓮入滅の地に建つ日蓮宗の大本山であ り、総本山と混同しないよう注意したい。延暦寺は天台宗、知恩院は浄土宗の総本山である。宗派と本山の対応関係 は、学科試験で繰り返し問われる基礎知識である。'},
{chapter:2, type:'4', source:'past', text:'日蓮宗で唱えられる「南無妙法蓮華経」の七字を一般に何と呼ぶか。', choices:['題目','念仏','真言','名号'], answer:0, explanation:'「南無妙法蓮華経」は、法華経の教えに帰依することを表す七字で、題目と呼ばれる。これを唱えることを唱題とい い、日蓮は唱題によって誰もが成仏できると説いた。これに対し「南無阿弥陀仏」は阿弥陀仏の名を称える名号であ り、これを称えることを念仏という。真言は密教で唱える仏の真実の言葉を指す。葬儀の場で唱えられる文言は宗派によ り異なるため、正確に区別して覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'天台宗と日蓮宗がともに最も重んじる経典はどれか。', choices:['大日経','法華経','阿弥陀経','般若心経'], answer:1, explanation:'法華経（妙法蓮華経）は、天台宗と日蓮宗がともに根本経典として最も重んじる経典である。天台宗の開祖最澄は法華 経を中心として諸教を統合する教学を打ち立て、日蓮は法華経への帰依を表す「南無妙法蓮華経」の題目を唱えること を説いた。大日経は真言宗の所依の経典、阿弥陀経は浄土系宗派が重んじる浄土三部経の一つである。宗派と経典の対 応関係は基礎知識として整理しておきたい。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗の弔意の表現で「ご冥福をお祈りします」を用いないのが望ましいとされる理由として最も適切なも のはどれか。', choices:['冥福という言葉が神道に由来する表現であるため','声に出して祈ること自体を禁じているため','故人は阿弥陀仏の働きでただちに浄土に往生し、仏になると説くため','冥福を祈ることは僧侶だけに許された行為とされるため'], answer:2, explanation:'浄土真宗では、亡くなった人は阿弥陀如来の本願力によってただちに極楽浄土に往生し、仏になると説く。これを往生 即成仏といい、死後に冥土をさまよう存在を前提としてその幸福を祈る「冥福」という言葉は、教義の上でふさわしく ないとされる。同様に「草葉の陰」「安らかにお眠りください」などの表現も避けるのが望ましいとされる。弔意を伝 える言葉にも、宗派の教義への配慮が求められる。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗の通夜・葬儀に持参する不祝儀袋の表書きとして、教義の上で最もふさわしいとされるものはどれ か。', choices:['御仏前','御霊前','御神前','志'], answer:0, explanation:'浄土真宗では往生即成仏の教えにより、故人は霊としてとどまるのではなく、すでに仏になっていると考える。このた め「御霊前」という表書きは教義に合わず、通夜・葬儀の段階から「御仏前」や「御香典」とするのがふさわしいとさ れる。多くの宗派で四十九日の忌明けまでは「御霊前」を用いるのとは対照的である。「御神前」は神式で用いる表書 き、「志」は香典返しなどに用いる表書きである。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗において、他宗派の戒名に相当するものを何と呼ぶか。', choices:['戒名','法号','道号','法名'], answer:3, explanation:'浄土真宗では、戒律を授かる授戒を行わないため、戒名とはいわず法名（ほうみょう）と呼ぶ。法名は仏弟子としての 名で、釋（釈）の字を冠して「釋○○」のように付けられるのが一般的である。本来は生前に帰敬式を受けて授かるも のとされる。また、居士や大姉などの位号は原則として用いない。法号は日蓮宗での呼び方であり、道号は戒名の上に 添えられる構成要素の一つである。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗において、位牌の代わりに故人の法名などを記すために用いられるものはどれか。', choices:['守り刀','過去帳や法名軸','盆提灯','経帷子'], answer:1, explanation:'浄土真宗では、故人の霊魂が位牌に宿るという考え方をとらないため、原則として位牌を用いない。代わりに、法名や 俗名、命日などを記す過去帳や、法名を記して仏壇の内側面に掛ける法名軸が用いられる。葬儀に際して白木の位牌を 便宜的に用いる地域もあるが、教義の上では位牌を祀らないのが本来の姿とされる。他宗派との違いが大きい点であ り、実務上特に重要な知識である。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗で、会葬御礼に清め塩を添えないのが本来とされる理由として最も適切なものはどれか。', choices:['塩は仏前に供える供物として用いるべきものとされるため','身を清める作法は水で行うのが正式とされるため','死を穢れとみなす考え方をとらないため','塩を用いる清めは僧侶のみが行う作法とされるため'], answer:2, explanation:'葬儀の後に塩で身を清める習俗は、死を穢れとする神道的な観念に由来するとされる。浄土真宗では、死は阿弥陀仏の 浄土への往生であって穢れではないと考えるため、清め塩を用いないのが本来とされ、会葬御礼に塩を入れない旨を明 記する例も多い。一方で清め塩を慣習として重んじる地域も残っており、葬祭ディレクターには宗派の教義と地域の慣習 の双方に配慮した対応が求められる。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗の納棺において、本来行わないのが原則とされるものはどれか。', choices:['棺に故人の愛用品のうち燃えやすいものを納めること','故人の手を合掌の形に整えること','顔に白布を掛けること','手甲・脚絆・六文銭などの旅支度を整えること'], answer:3, explanation:'経帷子を着せ、手甲・脚絆・草鞋・六文銭などを添える死装束は、死者が冥土へ旅立つという死出の旅の観念に基づく 習俗である。浄土真宗では、故人は阿弥陀仏の働きでただちに浄土に往生すると説くため、旅支度を整えないのが原則 とされ、白服を着せるなどの形をとることが多い。ただし実際には地域の慣習の影響もあるため、寺院や遺族の意向を 確認しながら対応することが望ましい。'},
{chapter:2, type:'4', source:'past', text:'戒名（位牌などに記される名）の一般的な構成要素の組み合わせとして最も適切なものはどれか。', choices:['院号・道号・戒名・位号','山号・寺号・坊号・庵号','俗名・雅号・諡号・幼名','名号・題目・真言・回向'], answer:0, explanation:'位牌などに記される名は、上から院号（院殿号）、道号、戒名、位号の順に構成されるのが一般的である。本来の戒名 はこのうちの二字の部分を指す。院号は寺院や社会への貢献などに応じて付され、道号は戒名の上に添えられる名、位号 は信士・居士などの尊称である。なお浄土真宗では道号や位号を原則用いず、釋の字を冠した法名を用いるなど、宗派に より構成が異なる点に注意したい。'},
{chapter:2, type:'4', source:'past', text:'位号のうち、成人女性に用いられるものの組み合わせとして最も適切なものはどれか。', choices:['信士・居士','信女・大姉','童子・童女','院号・道号'], answer:1, explanation:'位号は戒名の末尾に付される尊称で、性別や年齢などに応じて使い分けられる。成人女性には信女や大姉が用いられ、 一般に大姉は信女より上位のものとされる。成人男性には信士や居士が用いられ、居士が上位とされる。童子・童女は 子供に用いられる位号である。院号や道号は位号ではなく、戒名の上に付される構成要素である。なお浄土真宗では位 号を原則用いないことも覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'日蓮宗において、戒名に相当するものの呼び方として最も適切なものはどれか。', choices:['法名','諡号','法号','名号'], answer:2, explanation:'日蓮宗では、戒名に相当するものを法号と呼ぶ。法号には日蓮の「日」の字を入れた日号が授けられることがあるのも 特徴とされる。一方、浄土真宗では法名と呼び、釋の字を冠する。戒名は授戒により仏弟子となった証として授かる名 で、多くの宗派で用いられる呼び方である。名号は「南無阿弥陀仏」など仏の名を指し、諡号は生前の徳をたたえて死 後に贈られる称号であり、それぞれ意味が異なる。'},
{chapter:2, type:'4', source:'past', text:'「戒名」の本来の意味として最も適切なものはどれか。', choices:['戒を受けて仏弟子となった証として授かる名','死後の世界で名乗るために必ず授けられる名','寺院の住職が代々受け継ぐ名','墓石に刻むためだけに作られる名'], answer:0, explanation:'戒名は本来、受戒して仏弟子となった証として授かる名であり、生前に授かるのが本来の姿である。日本では、葬儀の 中で死者に授戒して仏弟子として送る形が広まったため、死後に菩提寺から授かることが一般化した。戒名は位牌や墓 石に記されるが、そのためだけに作られる名ではない。葬祭ディレクターは、戒名の宗教的な意味を理解した上で、遺族 からの相談に適切に対応することが望まれる。'},
{chapter:2, type:'4', source:'past', text:'立礼での抹香による焼香の一般的な作法として最も適切なものはどれか。', choices:['左手の指先で抹香をつまみ、香炉の縁に沿って置く','抹香をひとつかみすくい取り、一度に炭火へかぶせる','抹香には手を触れず、合掌のみで済ませるのが正式である','右手の親指・人差し指・中指で抹香をつまみ、香炉にくべる'], answer:3, explanation:'抹香による焼香では、右手の親指・人差し指・中指の三指で抹香をつまみ、宗派の作法に応じて額の高さに押しいただ くなどしてから、香炉の炭火の上に静かにくべるのが一般的である。焼香の前後には遺影や本尊に向かって合掌礼拝す る。回数や押しいただくか否かは宗派によって異なり、会葬者は自身の宗派または喪家の宗派の作法に従うのが一般的 とされる。基本動作を確実に身につけたい。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗本願寺派の焼香の代表的な作法はどれか。', choices:['3回、いずれも額に押しいただいてからくべる','1回、押しいただかずにくべる','2回、いずれも額に押しいただいてからくべる','回数の定めはなく、必ず線香で行う'], answer:1, explanation:'浄土真宗本願寺派の焼香は、抹香を額に押しいただかずに1回くべるのが代表的な作法とされる。同じ真宗でも真宗大谷 派では押しいただかずに2回とされ、東西で回数が異なる点が実務上重要である。押しいただかないのは、香は仏前に供 えるものであり、自らの願いのために用いるものではないという考え方によると説明される。なお、作法の細部は寺院 や地域により異なる場合がある。'},
{chapter:2, type:'4', source:'past', text:'真宗大谷派の焼香の代表的な作法はどれか。', choices:['1回、額に押しいただいてからくべる','3回、押しいただかずにくべる','2回、押しいただかずにくべる','4回、いずれも額に押しいただいてからくべる'], answer:2, explanation:'真宗大谷派の焼香は、抹香を押しいただかずに2回くべるのが代表的な作法とされる。浄土真宗本願寺派では同じく押し いただかずに1回とされ、東西両派で回数が異なることは、葬祭実務で特に注意すべき点である。焼香の回数や作法には 宗派ごとの定めや慣行があり、地域や寺院によって違いが見られることもあるため、施行に当たっては導師を務める寺 院に確認するのが確実な対応といえる。'},
{chapter:2, type:'4', source:'past', text:'真言宗の焼香の回数として代表的とされるものはどれか。', choices:['3回','1回','5回','7回'], answer:0, explanation:'真言宗の焼香は3回が代表的とされ、仏・法・僧の三宝に供養する、身・口・意の三密にちなむ、などの意味付けが説明 される。焼香の回数は宗派により異なり、浄土真宗本願寺派は1回、真宗大谷派は2回などとされる。一方、会葬者が多 い場合には、宗派を問わず1回で済ませるよう案内されることもある。回数そのものよりも、心を込めて香を手向けるこ とが大切であるとされている。'},
{chapter:2, type:'4', source:'past', text:'浄土真宗における線香のあげ方として代表的とされるものはどれか。', choices:['1本を香炉の中央に立てる','3本を手前に1本、奥に2本となるように立てる','束のまま火をつけて立てる','適当な長さに折り、火をつけて横に寝かせる'], answer:3, explanation:'浄土真宗では線香を立てず、香炉の大きさに合わせて適当な長さに折り、火をつけて横に寝かせるのが代表的な作法とさ れる。これは、香盤の上で香を絶やさずにたき続けた常香盤の伝統に由来すると説明される。線香を1本または複数本立 てる宗派が多い中で、寝かせて供える点は浄土真宗の大きな特徴である。本数や作法の細部は寺院により異なる場合が あるため、確認するのが望ましい。'},
{chapter:2, type:'4', source:'past', text:'本式数珠の主珠の数として基本とされるものはどれか。', choices:['66個','88個','108個','120個'], answer:2, explanation:'本式数珠の主珠は108個が基本とされ、人間の煩悩の数を表すと説明されるのが一般的である。108を基準として、その 半分の54個や4分の1の27個など、珠数を減らした数珠も作られている。日常的には、珠数を簡略化した一連の略式数珠 （片手数珠）が広く用いられている。数珠は宗派により形状や房の仕立てが異なり、本式数珠はそれぞれの宗派の様式 に従って作られている点も覚えておきたい。'},
{chapter:2, type:'4', source:'past', text:'略式数珠（片手数珠）の説明として最も適切なものはどれか。', choices:['本式数珠を簡略化した一連の数珠で、宗派を問わず広く用いられる','108珠を二連にした、特定宗派専用の数珠である','僧侶だけが持つことを許された数珠である','通夜では使用できず、葬儀式のみで用いる数珠である'], answer:0, explanation:'略式数珠は、108珠の本式数珠を簡略化した一連の数珠で、片手数珠とも呼ばれる。珠の数や素材にはさまざまなものが あり、宗派を問わず用いることができるとされるため、一般の会葬者が持つ数珠として最も普及している。これに対し 本式数珠は、宗派ごとに形状や仕立てが定められている。数珠は合掌の際に手に掛けて用いる大切な法具であり、床に 直接置かないなど丁寧に扱いたい。'},
{chapter:2, type:'4', source:'past', text:'数珠に関する説明として最も適切なものはどれか。', choices:['数珠の形は、すべての宗派で完全に統一されている','本式数珠は、宗派により形状や房の仕立てなどが異なる','数珠は神式の儀礼でも必ず用いられる','数珠は必ず左右の手に一連ずつ持って用いる'], answer:1, explanation:'本式数珠は宗派ごとに珠の構成や房の形、持ち方などが異なり、それぞれの宗派の様式に従って仕立てられている。例 えば浄土真宗の門徒数珠の房には蓮如結びが用いられるなど、特色がある。このため本式数珠を求める際には、自身の 宗派の様式を確認する必要がある。略式数珠は宗派を問わず使えるとされる。なお数珠は仏式で用いる法具であり、神 式やキリスト教式の儀礼では用いない。'},
{chapter:2, type:'4', source:'past', text:'仏式葬儀で伝統的に用いられてきた「白木祭壇」の説明として最も適切なものはどれか。', choices:['十字架を中心に飾る、キリスト教式の祭壇','八足案を並べて神饌を供える、神式の祭壇','生花のみで構成された装飾祭壇','白木造りで、棺や遺影・位牌などを安置する仏式の祭壇'], answer:3, explanation:'白木祭壇は、塗りを施さない白木で作られた仏式葬儀の伝統的な祭壇で、遺影や位牌、燭台・香炉・花立などを配し、 棺を安置して葬儀式・告別式の中心となる。輿をかたどった部分を持つ形式が伝統的で、段数や装飾によって規模や格 式が表されてきた。近年は生花で構成する生花祭壇が広く普及し、白木と生花を組み合わせた祭壇も多い。神式やキリ スト教式の祭壇とは様式が異なる。'},
{chapter:2, type:'4', source:'past', text:'仏式の枕飾りで供えられるものの組み合わせとして最も適切なものはどれか。', choices:['鏡・勾玉・剣','パン・ぶどう酒・燭台','枕飯・枕団子・一本花','門松・鏡餅・注連縄'], answer:2, explanation:'仏式の枕飾りは、遺体の枕元に小机を置いて白布を掛け、香炉・燭台・花立の三具足を整え、枕飯や枕団子、一本花、 水などを供えるのが一般的である。枕飯は故人が生前使っていた茶碗に飯を山盛りにし、箸を立てる形が広く知られ る。一本花には樒などが用いられる。供える内容は地域や宗派によって異なり、浄土真宗では枕飯や枕団子を供えない のが本来とされる点にも留意したい。'},
{chapter:2, type:'4', source:'past', text:'枕飾りの一本花に用いられる植物として代表的なものはどれか。', choices:['榊','樒','桜','菖蒲'], answer:1, explanation:'一本花は、枕飾りの花立に一本だけ挿して供える花で、樒（しきみ）を用いるのが代表的とされる。樒は強い香気を持 つ常緑樹で、古くから仏事に広く用いられ、邪気を払うものとされてきた。地域によっては他の花を用いる場合もあ る。なお榊は神式の儀礼で神前に供える木であり、仏式の樒と混同しないよう注意したい。枕飾りは死後最初に整えら れる供養の場として大切に扱われる。'},
{chapter:2, type:'4', source:'past', text:'遺体の掛け布団の上などに「守り刀」を置く習俗の意味として、一般的に説明されるものはどれか。', choices:['魔物などから遺体を守る魔除けのため','故人の生前の職業を表すため','棺に納める副葬品の数を整えるため','祭壇の格式を高めることが義務付けられているため'], answer:0, explanation:'守り刀は、遺体の胸元や掛け布団の上に小刀などを置く習俗で、魔物から遺体を守る魔除けの意味があると一般に説明 される。武士が刀を魔除けとした風習に由来するなど、由来には諸説あり、猫などの動物を近づけないためという俗信も 伝えられている。なお、死後ただちに浄土へ往生すると説く浄土真宗では守り刀を用いないのが本来とされるなど、宗 派や地域による違いがある。'},
{chapter:2, type:'4', source:'past', text:'僧侶へお布施を渡す方法として最も適切とされるものはどれか。', choices:['現金をそのまま手渡しする','祭壇の上に置いておき、僧侶に持ち帰ってもらう','読経の最中に経机の上へ直接置く','切手盆に載せる、または袱紗に包んで持参して差し出す'], answer:3, explanation:'お布施は、白封筒や奉書紙に包み、切手盆と呼ばれる小さな盆に載せて差し出すか、袱紗に包んで持参し、取り出して 袱紗の上に重ねて渡すのが丁寧な作法とされる。現金をそのまま手渡しするのは避けるのが望ましい。お布施は読経や 戒名授与への対価ではなく、寺院への感謝の気持ちを表す寄進と位置付けられる。渡す時機は葬儀の前後の挨拶時な ど、地域や寺院の慣行に従うとよい。'},
