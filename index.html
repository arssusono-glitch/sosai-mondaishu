{chapter:3, type:'4', source:'past', text:'三回忌を営む時期として、最も適切なものはどれか。', choices:['死亡から満3年目','死亡から満1年目','死亡から満5年目','死亡から満2年目'], answer:3, explanation:'三回忌は、死亡から満2年目に営む年忌法要である。年忌法要の数え方では、死亡した年を一回目（一周忌は満1年目で 例外的に周忌という）と数え、以後は満年数に1を加えた回忌で呼ぶ。そのため三回忌は満2年、七回忌は満6年、十三回 忌は満12年というように、回忌の数より1年早い時点で営むことになる。数え方を取り違えると日程を誤りやすいため注 意が必要である。葬祭ディレクターは年忌の数え方を正しく理解し、遺族の法要計画を支援する。'},
{chapter:3, type:'4', source:'past', text:'年忌法要を最後に営み、これをもって区切りとする「弔い上げ（問い切り）」について、一般的に行われる時 期として最も適切なものはどれか。', choices:['三十三回忌や五十回忌をもって弔い上げとすることが多い。','一周忌をもって弔い上げとするのが一般的である。','三回忌をもって弔い上げとするのが一般的である。','百回忌をもって弔い上げとするのが一般的である。'], answer:0, explanation:'弔い上げは、個別の故人を対象とする年忌法要を最後に営み、以後は先祖代々としてまとめて供養する区切りである。 一般には三十三回忌、または五十回忌をもって弔い上げとすることが多い。これより前の一周忌や三回忌は弔い上げの 時期としては早すぎる。三十三回忌の頃には故人を直接知る人が少なくなることなどから、この節目が選ばれてきたと される。弔い上げの時期は地域や宗派、家ごとの考え方によっても異なる。葬祭ディレクターは目安として理解しておき たい。'},
{chapter:3, type:'4', source:'past', text:'新たに仏壇を購入し、本尊を迎えて礼拝の対象とする際に営む儀式として、最も適切なものはどれか。', choices:['閉眼供養（魂抜き）','開眼供養（魂入れ）','撥遣供養','お焚き上げ'], answer:1, explanation:'新たに仏壇を購入して安置する際は、僧侶を招いて本尊などに魂を入れ、礼拝・供養の対象とする開眼供養（魂入れ） を営むのが一般的である。これにより仏壇は単なる家具ではなく信仰の場となる。これに対し、古い仏壇や位牌を処分 する際に魂を抜く儀式は閉眼供養（魂抜き、撥遣供養）と呼ばれ、目的が逆である。お焚き上げは魂を抜いた後の品を 供養して焼却する行為を指す。葬祭ディレクターは仏壇・仏具の手配に際し、こうした供養の案内を行えるとよい。'},
{chapter:3, type:'4', source:'past', text:'宗派と本尊の組み合わせに関する記述として、一般的に最も適切なものはどれか。', choices:['すべての仏教宗派が共通して大日如来のみを本尊とする。','真言宗では本尊を定めず、位牌のみを安置する。','浄土真宗では阿弥陀如来を本尊とすることが一般的である。','本尊は宗派にかかわらず信者が自由に選び、決まりはない。'], answer:2, explanation:'本尊は宗派によって異なり、浄土真宗や浄土宗では阿弥陀如来を本尊とすることが一般的である。真言宗では大日如 来、天台宗では釈迦如来や阿弥陀如来など、日蓮宗では曼荼羅（大曼荼羅）を中心に祀るなど、宗派ごとに定まった本尊 がある。すべての宗派が大日如来のみを祀るわけでも、真言宗が本尊を定めないわけでもない。本尊は各宗派の教義に 基づくものであり、信者が任意に選ぶものではない。葬祭ディレクターは仏壇手配の際、宗派ごとの本尊の違いを基礎知 識として押さえる。'},
{chapter:3, type:'4', source:'past', text:'後飾り祭壇（中陰壇）の取り扱いについて、最も適切なものはどれか。', choices:['忌明けを過ぎても永続的に設置し続けるのが正式である。','火葬の前日までに設置し、出棺とともに撤去する。','後飾り祭壇は神式のみで用い、仏式では用いない。','四十九日の忌明けまで遺骨や白木位牌などを安置し、忌明け後に片づけるのが一般的である。'], answer:3, explanation:'後飾り祭壇（中陰壇）は、火葬を終えた遺骨や白木の位牌、遺影などを四十九日の忌明けまで安置するための祭壇であ る。忌明けの法要を終えると役目を終えるため、その後に片づけるのが一般的である。永続的に設置し続けるものでは なく、出棺とともに撤去するものでもない。後飾り祭壇は仏式・神式いずれでも用いられ、仏式に限ったものでも神式 に限ったものでもない。葬祭ディレクターは祭壇の設置場所や、忌明け後の処理方法について遺族に案内する。'},
{chapter:3, type:'4', source:'past', text:'百箇日（ひゃっかにち）法要の時期として、最も適切なものはどれか。', choices:['死後100日目','死後7日目','死後49日目','死後1年目'], answer:0, explanation:'百箇日法要は、命日を含めて数えて死後100日目に営む追善供養である。卒哭忌とも呼ばれ、遺族が悲しみに区切りをつ ける節目とされてきた。死後7日目は初七日、49日目は四十九日（忌明け）、1年目は一周忌であり、いずれも百箇日と は異なる。近年は四十九日と一周忌の間にあたるこの法要を省略したり、近親者のみで簡略に営んだりすることも多 い。葬祭ディレクターは忌明け後の追善法要の体系を理解し、遺族の供養計画に助言できるとよい。'},
{chapter:3, type:'4', source:'past', text:'火葬場で同行した僧侶が炉前で読経した後の、火葬中の僧侶への一般的な対応として、最も適切なものはどれ か。', choices:['火葬が終わるまで僧侶を必ず炉前に立たせておく。','控室へ案内して茶菓などでもてなし、必要に応じて精進落としの席に着いてもらう。','読経後はただちに僧侶に帰ってもらい、収骨には立ち会わせない決まりである。','火葬中は僧侶と遺族が会話してはならない。'], answer:1, explanation:'火葬場で納めの式の読経をつとめた僧侶に対しては、火葬中は遺族と同様に控室へ案内し、茶菓などでもてなすのが一 般的である。日程によっては、待ち時間や火葬後に営む精進落としの席に僧侶を上座として迎え、感謝の意を表すこと もある。火葬が終わるまで炉前に立たせ続ける決まりや、読経後ただちに帰すという決まり、火葬中の会話を禁じる決 まりはない。葬祭ディレクターは僧侶への配慮ある接遇と、布施を渡す機会への目配りを行う。'},
{chapter:3, type:'4', source:'past', text:'火葬後に遺族へ返却される火葬許可証（火葬執行済の証明印が押されたもの）の保管に関する案内として、最 も適切なものはどれか。', choices:['火葬が済めば不要な書類なので、当日中に処分してよいと案内する。','火葬場が保管するため、遺族は受け取らなくてよいと案内する。','納骨の際に墓地の管理者へ提出する重要な書類なので、紛失しないよう保管するよう案内する。','香典返しに同封して会葬者へ配るよう案内する。'], answer:2, explanation:'火葬後に証明印が押されて返却される火葬許可証は、後日の納骨（埋蔵）の際に墓地の管理者へ提出する必要がある重 要な書類である。そのため葬祭ディレクターは、紛失しないよう骨壺の箱に納めるなどして大切に保管するよう遺族へ 案内する。火葬後に不要となる書類ではなく、火葬場が保管するものでもない。まして香典返しに同封して配るような 性質のものではない。納骨までの保管の必要性を遺族にしっかり伝えることが、後のトラブル防止につながる。'},
{chapter:3, type:'4', source:'past', text:'四十九日法要に合わせて納骨を行うことが多い理由として、最も適切なものはどれか。', choices:['法律で四十九日までに必ず納骨しなければならないと定められているため。','四十九日を過ぎると火葬許可証が失効してしまうため。','四十九日より後の納骨は宗教上禁止されているため。','忌明けの法要に親族が集まる機会を生かし、本位牌の用意や墓所の準備も整いやすいため。'], answer:3, explanation:'四十九日法要に合わせて納骨を行うことが多いのは、忌明けの法要に親族が集まる機会を生かせるうえ、この時期まで に本位牌の用意や墓所・カロートの準備も整いやすいためである。あわせて開眼供養を営むこともある。ただし納骨の 時期に法的な決まりはなく、四十九日までに必ず納骨しなければならないわけではない。火葬許可証が四十九日で失効 することもなく、それ以降の納骨が宗教上禁じられているわけでもない。事情により一周忌や三回忌に納骨する場合も ある。'},
{chapter:3, type:'4', source:'past', text:'通夜・葬儀でいただいた香典への会葬御礼と香典返しの違いについて、最も適切なものはどれか。', choices:['会葬御礼は香典の有無にかかわらず参列者へ当日渡す礼の品・挨拶状であり、香典返しは香典をいた だいた相手への返礼である。','会葬御礼と香典返しは同じもので、呼び方が違うだけである。','会葬御礼は香典をいただいた相手にだけ渡すものである。','香典返しは参列の有無にかかわらず全員に当日渡すものである。'], answer:0, explanation:'会葬御礼は、通夜・葬儀に参列してくれたことへの感謝として、香典の有無にかかわらず参列者へ当日渡す礼の品や挨 拶状である。一方、香典返しは香典をいただいた相手に対する返礼で、本来は忌明け後に贈るものである。両者は目的 も対象も異なり、同じものではない。会葬御礼を香典をいただいた相手にだけ渡すものでも、香典返しを参列者全員へ 当日渡すものでもない。即日返しを行う場合は会葬御礼と当日の香典返しを併せて渡すため、葬祭ディレクターは両者 を区別して手配する。'},
{chapter:3, type:'4', source:'past', text:'死亡後に必要となる各種名義変更などの手続きに関する記述として、最も適切なものはどれか。', choices:['公共料金の契約は契約者が死亡すると自動的に新たな居住者へ引き継がれる。','電気・ガス・水道などの公共料金の契約者が死亡した場合、引き続き使用するには契約名義の変更な どの手続きが必要となる。','生命保険金は手続きをしなくても保険会社から自動的に支払われる。','預貯金口座は名義人の死亡後も従来どおり自由に引き出せる。 葬祭ディレクター技能審査 完全対策問題集 第8 章：関連法規 （50問）'], answer:1, explanation:'電気・ガス・水道などの公共料金は、契約者が死亡しても自動的に名義が変わるわけではなく、引き続き使用するには 契約名義や支払口座の変更などの手続きが必要となる。同様に、生命保険金は受取人が保険会社へ請求して初めて支払 われ、自動的に支払われるものではない。預貯金口座は名義人の死亡が金融機関に知られると相続手続きが済むまで凍 結され、自由に引き出すことはできない。葬祭ディレクターは、遺族がこうした諸手続きを把握できるよう基礎的な情 報提供を行う。 葬祭ディレクター技能審査 完全対策問題集 第8章：関連法規'},
{chapter:5, type:'4', source:'past', text:'「墓地、埋葬等に関する法律」（墓埋法）における埋葬・火葬を行うことができる時期について、正しいもの はどれか。', choices:['埋葬又は火葬は、他の法令に別段の定めがある場合を除き、死亡又は死産後24時間を経過した後でな ければ行ってはならない。','埋葬又は火葬は、死亡又は死産後48時間を経過した後でなければ行ってはならない。','死亡診断書の交付を受ければ、死亡後直ちに火葬を行うことができる。','24時間の制限は埋葬（土葬）のみに適用され、火葬には適用されない。'], answer:0, explanation:'墓埋法第3条は、他の法令に別段の定めがあるものを除き、死亡又は死産後24時間を経過した後でなければ埋葬又は火葬 を行ってはならないと定めている。これは死亡判定の確実を期し、蘇生の可能性に配慮した規定である。死亡診断書が 交付されても時間制限は解除されず、制限は埋葬と火葬の双方に及ぶ。例外として、妊娠7か月に満たない死産や、感染 症法に定める一類感染症等により死亡した場合などがある。'},
{chapter:5, type:'4', source:'past', text:'墓埋法第3条の「死亡又は死産後24時間を経過した後でなければ埋葬・火葬を行ってはならない」とする規定 の例外として、正しいものはどれか。', choices:['妊娠9か月以後の死産の場合は、24時間以内でも埋葬・火葬を行うことができる。','妊娠7か月に満たない死産の場合は、24時間を経過しなくても埋葬・火葬を行うことができる。','死亡者が高齢である場合は、24時間以内でも火葬を行うことができる。','遺族全員の同意があれば、24時間以内でも火葬を行うことができる。'], answer:1, explanation:'墓埋法第3条ただし書により、妊娠7か月に満たない死産については、24時間の経過を待たずに埋葬又は火葬を行うこと ができる。また、他の法令に別段の定めがある場合の例外として、感染症法に定める一類感染症等の病原体に汚染さ れ、又は汚染された疑いがある遺体は24時間以内に火葬し、又は埋葬することができるとされている。死亡者の年齢や 遺族の同意は、24時間の制限を解除する理由とはならない。'},
{chapter:5, type:'4', source:'past', text:'火葬許可証を交付する者として、正しいものはどれか。', choices:['死亡地を管轄する保健所長','死亡者の住所地を管轄する都道府県知事','死亡若しくは死産の届出を受理した市町村長','火葬を行う火葬場の所在地の市町村長'], answer:2, explanation:'墓埋法第5条第2項により、埋葬及び火葬に係る許可は、死亡若しくは死産の届出を受理した市町村長が行い、許可を与 えるときは埋葬許可証又は火葬許可証を交付しなければならない（同法第8条）。保健所長や都道府県知事、火葬場所在 地の市町村長が交付するものではない。実務では、死亡届の提出と同時に火葬許可申請を行い、その場で火葬許可証の 交付を受けるのが一般的な流れである。'},
{chapter:5, type:'4', source:'past', text:'墓埋法における「埋葬」の意味として、正しいものはどれか。', choices:['焼骨を墳墓に納めること','焼骨を納骨堂に納めること','死体を葬るために焼くこと','死体を土中に葬ること'], answer:3, explanation:'墓埋法第2条第1項において「埋葬」とは、死体（妊娠4か月以上の死胎を含む）を土中に葬ること、すなわち土葬を指 す。焼骨を墳墓に納めることは「埋蔵」、納骨堂に納めることは「収蔵」、死体を葬るために焼くことは「火葬」と定義 されており、法律上それぞれ明確に区別されている。日常用語では納骨も含めて「埋葬」と呼ばれることが多いが、法 令上の意味は異なるため注意が必要である。'},
{chapter:5, type:'4', source:'past', text:'火葬後の焼骨の取り扱いに関する墓埋法上の用語について、正しいものはどれか。', choices:['焼骨を墳墓に納めることを「埋蔵」といい、納骨堂に納めることを「収蔵」という。','焼骨を墳墓に納めることを「収蔵」といい、納骨堂に納めることを「埋蔵」という。','焼骨を墳墓に納めることも納骨堂に納めることも、いずれも法律上は「埋葬」という。','焼骨の取り扱いについて、墓埋法には用語の定義が置かれていない。'], answer:0, explanation:'墓埋法では、焼骨を墳墓に納めることを「埋蔵」、他人の委託を受けて焼骨を納骨堂に納めることを「収蔵」と呼び分 けている。「埋葬」は死体を土中に葬る土葬のみを指すため、焼骨を墓に納める行為は法律上の「埋葬」には当たらな い。墳墓は死体を埋葬し又は焼骨を埋蔵する施設、納骨堂は焼骨を収蔵する施設と定義されており、これらの用語の区 別は許可証の取り扱いなど実務にも関わる重要な知識である。'},
{chapter:5, type:'4', source:'past', text:'墓埋法における「改葬」の説明として、正しいものはどれか。', choices:['古くなった墓石を新しく建て替えること','同一墓地内で自己の使用区画を清掃・整理すること','埋葬した死体を他の墳墓に移し、又は埋蔵・収蔵した焼骨を他の墳墓・納骨堂に移すこと','自宅に安置していた焼骨を初めて墳墓に埋蔵すること'], answer:2, explanation:'墓埋法第2条第3項は「改葬」を、埋葬した死体を他の墳墓に移し、又は埋蔵し若しくは収蔵した焼骨を他の墳墓又は納 骨堂に移すことと定義している。すでに埋葬・埋蔵・収蔵されている死体や焼骨を移転する行為が改葬であり、市町村 長の改葬許可を受ける必要がある。墓石の建替えや区画内の整理、自宅に保管していた焼骨を初めて墳墓に納める行為 は、法律上の改葬には該当しない。'},
{chapter:5, type:'4', source:'past', text:'墓地、納骨堂又は火葬場の経営の許可について、正しいものはどれか。', choices:['経営の許可は厚生労働大臣が行う。','経営しようとする者は、都道府県知事（市又は特別区にあっては市長又は区長）の許可を受けなけれ ばならない。','宗教法人が経営する場合は、許可を受ける必要がない。','許可が必要なのは墓地のみであり、納骨堂と火葬場は届出で足りる。'], answer:1, explanation:'墓埋法第10条により、墓地、納骨堂又は火葬場を経営しようとする者は、都道府県知事（市又は特別区にあっては市長 又は区長）の許可を受けなければならない。施設の区域や施設を変更し、又は廃止する場合も同様に許可が必要であ る。許可権者は厚生労働大臣ではなく、宗教法人であっても許可が免除されることはない。墓地・納骨堂・火葬場のい ずれも許可制であり、届出だけで経営できるものではない。'},
{chapter:5, type:'4', source:'past', text:'埋葬や火葬を行う場所に関する墓埋法の規定として、正しいものはどれか。', choices:['土地所有者の承諾があれば、墓地以外の自己の所有地にも死体を埋葬できる。','焼骨であれば、墓地以外の私有地に自由に埋蔵することができる。','過疎地域においては、火葬場以外の施設でも火葬を行うことができる。','埋葬又は焼骨の埋蔵は墓地以外の区域に、火葬は火葬場以外の施設で行ってはならない。'], answer:3, explanation:'墓埋法第4条は、埋葬又は焼骨の埋蔵は墓地以外の区域に行ってはならず、火葬は火葬場以外の施設で行ってはならない と定めている。自己の所有地であっても、墓地として許可を受けていない土地に死体を埋葬したり焼骨を埋蔵したりす ることは認められない。これは公衆衛生その他公共の福祉と国民の宗教的感情に配慮した規定であり、地域を問わず適 用され、違反には刑罰が科され得る。'},
{chapter:5, type:'4', source:'past', text:'埋葬、火葬又は改葬を行おうとする者が受けなければならない許可について、正しいものはどれか。', choices:['許可は不要であり、死亡届の提出のみで足りる。','保健所長の許可を受けなければならない。','市町村長の許可を受けなければならない。','警察署長の許可を受けなければならない。'], answer:2, explanation:'墓埋法第5条第1項により、埋葬、火葬又は改葬を行おうとする者は、市町村長（特別区の区長を含む）の許可を受けな ければならない。死亡届の提出はあくまで戸籍法上の手続であり、届出だけで埋葬や火葬ができるわけではない。許可 権者は保健所長や警察署長ではなく市町村長である。実務上は、死亡届の提出と併せて火葬許可申請書を提出し、火葬 許可証の交付を受ける流れが一般的である。'},
{chapter:5, type:'4', source:'past', text:'火葬場の管理者に関する墓埋法の規定として、正しいものはどれか。', choices:['火葬場の管理者は、火葬許可証または改葬許可証を受理した後でなければ火葬を行ってはならない。','火葬場の管理者は、死亡診断書の写しを受け取れば火葬を行うことができる。','火葬場の管理者は、遺族の身分証明書を確認すれば火葬を行うことができる。','火葬場の管理者は、葬儀社が作成した依頼書があれば火葬を行うことができる。'], answer:0, explanation:'墓埋法第14条第3項により、火葬場の管理者は、市町村長が交付した火葬許可証又は改葬許可証を受理した後でなければ 火葬を行ってはならない。死亡診断書の写し、遺族の身分証明書、葬儀社の依頼書などは許可証の代わりにはならな い。同様に、墓地の管理者は埋葬許可証・改葬許可証又は火葬許可証を、納骨堂の管理者は火葬許可証又は改葬許可証 を受理した後でなければ、埋葬や焼骨の埋蔵・収蔵をさせてはならないとされている。'},
{chapter:5, type:'4', source:'past', text:'火葬後の焼骨を墓地に埋蔵する際に、墓地の管理者へ提出する書類として正しいものはどれか。', choices:['死亡診断書の原本','死亡届の受理証明書','火葬場が独自に発行する火葬料金の領収書','火葬を行った旨が記載された火葬許可証'], answer:3, explanation:'墓埋法第16条により、火葬場の管理者は、火葬を終えたときは火葬許可証に火葬を行った旨を記載し、火葬を求めた者 に返還する。この火葬済みの証明が記載された火葬許可証が、焼骨を墓地に埋蔵し、又は納骨堂に収蔵する際に管理者 へ提出すべき書類となり、実務上「埋葬許可証」とも呼ばれる。納骨まで長期間保管される書類であるため、骨壺の箱 に納めるなどして紛失しないよう遺族に案内することが大切である。'},
{chapter:5, type:'4', source:'past', text:'改葬の許可を行う者として、正しいものはどれか。', choices:['移転先の墓地の所在地の市町村長','死体又は焼骨が現に存する地の市町村長','死亡者の本籍地の市町村長','移転先の墓地を管轄する都道府県知事'], answer:1, explanation:'墓埋法第5条第2項により、改葬の許可は、死体又は焼骨が現に存する地の市町村長が行う。すなわち、現在埋葬・埋蔵 されている墓地等の所在地の市町村長に改葬許可申請を行い、改葬許可証の交付を受ける。移転先の所在地の市町村長 や死亡者の本籍地の市町村長ではない点に注意が必要である。交付された改葬許可証は、移転先の墓地又は納骨堂の管 理者に提出しなければ、焼骨等を受け入れてもらうことができない。'},
{chapter:5, type:'4', source:'past', text:'改葬許可申請の際に添付を求められる、現在の墓地の管理者が作成する書類として正しいものはどれか。', choices:['埋葬又は埋蔵・収蔵の事実を証する書面（埋蔵証明書等）','墓地の土地の登記事項証明書','死亡診断書の写し','祭祀承継者の戸籍謄本'], answer:0, explanation:'墓埋法施行規則第2条により、改葬許可申請書には、墓地又は納骨堂の管理者が作成した埋葬若しくは埋蔵又は収蔵の事 実を証する書面（いわゆる埋蔵証明書・収蔵証明書）を添付しなければならない。さらに多くの自治体では、移転先の 墓地等の管理者が発行する受入証明書や墓地使用許可証の写しの提出も求めている。墓地の登記事項証明書や死亡診断 書の写し、祭祀承継者の戸籍謄本は、法令上求められる添付書類ではない。'},
{chapter:5, type:'4', source:'past', text:'死亡者の縁故者がない墳墓（無縁墳墓）に埋蔵されている焼骨を改葬する場合の手続について、正しいものは どれか。', choices:['墓地の管理者の判断のみで、直ちに改葬することができる。','縁故者がいないことが明らかであれば、公告などの手続は一切不要である。','官報への掲載と墳墓の見やすい場所への立札の設置により1年間公告し、申出がない場合に改葬許可を 申請できる。','家庭裁判所の審判を経なければ改葬することができない。'], answer:2, explanation:'墓埋法施行規則第3条により、死亡者の縁故者がない無縁墳墓等に係る改葬許可の申請には、死亡者の縁故者及び無縁墳 墓等に関する権利を有する者に対し1年以内に申し出るべき旨を官報に掲載し、かつ、無縁墳墓等の見やすい場所に設置 した立札に1年間掲示して公告し、その期間中に申出がなかった旨を記載した書面などの添付が必要とされる。管理者の 判断のみで直ちに改葬することはできず、家庭裁判所の審判を要する制度でもない。'},
{chapter:5, type:'4', source:'past', text:'墓地、納骨堂又は火葬場の管理者の義務に関する墓埋法の規定として、正しいものはどれか。', choices:['管理者は、利用を希望する者を自由に選別して受け入れることができる。','管理者は、宗教・宗派が異なる者からの求めを無条件に拒否することができる。','管理者は、施設に余裕がある場合でも、経営上の判断により火葬の求めを拒否できる。','管理者は、埋葬、埋蔵、収蔵又は火葬の求めを受けたときは、正当の理由がなければ拒んではならな い。'], answer:3, explanation:'墓埋法第13条は、墓地、納骨堂又は火葬場の管理者は、埋葬、埋蔵、収蔵又は火葬の求めを受けたときは、正当の理由 がなければこれを拒んではならないと定めている。これは施設の公共性に基づく応諾義務の規定である。空き区画がな いなどの事情は正当の理由となり得るが、依頼者が他の宗教団体の信者であることのみを理由とする拒否は正当の理由 に当たらないと解されており、恣意的な利用者の選別は認められない。'},
{chapter:5, type:'4', source:'past', text:'戸籍法における死亡届の届出期間として、正しいものはどれか。', choices:['死亡の事実を知った日から3日以内','死亡の事実を知った日から7日以内','死亡した日から10日以内','死亡の事実を知った日から14日以内'], answer:1, explanation:'戸籍法第86条第1項により、死亡の届出は、届出義務者が死亡の事実を知った日から7日以内にしなければならない。起 算点は死亡した日そのものではなく、届出義務者が死亡の事実を知った日である点が重要である。なお、国外で死亡が あったときは、その事実を知った日から3か月以内とされている。正当な理由がなく期間内に届出をしない場合には、過 料に処されることがある。'},
{chapter:5, type:'4', source:'past', text:'国外で死亡があった場合の死亡届の届出期間として、正しいものはどれか。', choices:['死亡の事実を知った日から7日以内','死亡の事実を知った日から1か月以内','死亡の事実を知った日から3か月以内','遺族が帰国した日から7日以内'], answer:2, explanation:'戸籍法第86条第1項は、死亡の届出について、死亡の事実を知った日から7日以内を原則としつつ、国外で死亡があった ときは、その事実を知った日から3か月以内と定めている。国外では死亡の確認や必要書類の入手に時間を要することを 考慮した特例である。起算点はいずれも死亡の事実を知った日であり、死亡した日や帰国した日を基準とするものでは ない。外国に在る日本人は、その国に駐在する大使、公使又は領事に届け出ることもできる。'},
{chapter:5, type:'4', source:'past', text:'死亡届の届出先に関する記述として、正しいものはどれか。', choices:['死亡届は、死亡者の本籍地、届出人の所在地又は死亡地のいずれかの市町村に届け出ることができ る。','死亡届は、死亡者の本籍地の市町村にしか届け出ることができない。','死亡届は、死亡者の住民登録地の市町村にしか届け出ることができない。','死亡届は、全国どこの市町村にも自由に届け出ることができる。'], answer:0, explanation:'戸籍法第25条及び第88条により、死亡届は、死亡者の本籍地、届出人の所在地のほか、死亡地においても届け出ること ができる。本籍地に限定されるものではなく、また全国どこの市町村でも自由に届け出られるわけでもない。病院で死 亡した場合はその病院の所在地が死亡地となるため、本籍地から離れた地で死亡したときでも、死亡地の市町村に死亡 届を提出し、その場で火葬許可証の交付を受けて葬儀を進めることができる。'},
{chapter:5, type:'4', source:'past', text:'戸籍法第87条に定める死亡届の届出義務者のうち、第一順位とされている者はどれか。', choices:['家主、地主又は家屋若しくは土地の管理人','同居の親族','親族以外の同居者','死亡地の市町村長'], answer:1, explanation:'戸籍法第87条は、死亡届の届出義務者として、第一に同居の親族、第二にその他の同居者、第三に家主、地主又は家屋 若しくは土地の管理人という順序を定めている。ただし、この順序にかかわらず届出をすることができるとされ、後順 位の者が先に届け出ても差し支えない。また、同居の親族以外の親族、後見人、保佐人、補助人、任意後見人等も届出 をすることができる。市町村長は届出を受理する側であり、届出義務者ではない。'},
{chapter:5, type:'4', source:'past', text:'死亡届の提出における葬祭業者の関与について、正しいものはどれか。', choices:['葬祭業者は、遺族の依頼があれば届出人として届書に署名することができる。','葬祭業者は、戸籍法上の届出義務者の第二順位とされている。','葬祭業者は、死亡届の手続に一切関与することができない。','葬祭業者は届出人にはなれないが、届出人が署名した届書を役所に持参する使者となることができ る。'], answer:3, explanation:'戸籍法上、死亡届の届出人となることができるのは、同居の親族をはじめとする届出義務者や、同居の親族以外の親 族、後見人、保佐人、補助人、任意後見人等に限られており、葬祭業者がこれに含まれることはない。一方、届出人が 署名した死亡届の用紙を市町村役場の窓口へ持参して提出する行為は、使者による提出として認められている。実務で は葬祭業者が提出を代行し、併せて火葬許可証の交付を受けることが広く行われている。'},
{chapter:5, type:'4', source:'past', text:'死亡届に添付しなければならない書類として、正しいものはどれか。', choices:['死亡者の住民票の写し','死亡者の戸籍謄本','死亡診断書又は死体検案書','火葬許可証'], answer:2, explanation:'戸籍法第86条第2項により、死亡届の届書には死亡診断書又は死体検案書を添付しなければならない。死亡診断書は、診 療継続中の患者がその診療に係る傷病に関連して死亡した場合に医師が交付し、それ以外の場合には検案を行った医師 が死体検案書を交付する。用紙は死亡届と一体の様式で、右半分が死亡診断書（死体検案書）となっている。住民票の 写しや戸籍謄本の添付は不要であり、火葬許可証は届出の受理後に交付されるものである。'},
{chapter:5, type:'4', source:'past', text:'死産届の対象となる死産の範囲として、正しいものはどれか。', choices:['妊娠満22週以後の死児の出産','妊娠8週以後の死児の出産','妊娠16週以後の死児の出産','妊娠12週（第4月）以後の死児の出産'], answer:3, explanation:'死産の届出に関する規程により、死産とは妊娠第4月以後、すなわち妊娠12週以後における死児の出産をいう。これに該 当する死産があったときは届出が必要であり、妊娠12週未満の流産は届出の対象とならない。なお、妊娠4か月以上の死 胎は墓埋法上の「死体」に含まれるため、その埋葬や火葬には市町村長の許可証が必要となる。妊娠満22週は流産と早 産の区分などに関わる週数であり、死産届の対象範囲を画する基準ではない。'},
{chapter:5, type:'4', source:'past', text:'死産届の届出期間として、正しいものはどれか。', choices:['死産後7日以内','死産後14日以内','死産の事実を知った日から1か月以内','死産後3日以内'], answer:0, explanation:'死産の届出に関する規程第4条により、死産の届出は、死産後7日以内に、届出人の所在地又は死産があった地の市町村 長に届け出なければならない。届書には、医師又は助産師が作成した死産証書又は死胎検案書を添付する。届出義務者 は原則として父であり、やむを得ない事由により父が届出できないときは母が届け出る。期間の起算点が死産の日とさ れている点は、死亡届が「知った日」から起算されるのと異なっている。'},
{chapter:5, type:'4', source:'past', text:'死亡届を届け出ることができる者に関する記述として、正しいものはどれか。', choices:['届出をすることができるのは、同居の親族に限られる。','同居の親族以外の親族や後見人、保佐人、補助人、任意後見人も届出をすることができる。','故人の友人・知人であれば、誰でも届出人になることができる。','市町村長の許可を得れば、親族等でない第三者も届出人となることができる。'], answer:1, explanation:'戸籍法第87条は、死亡届の届出義務者として同居の親族、その他の同居者、家主・地主又は家屋若しくは土地の管理人 を順に定めるとともに、同居の親族以外の親族、後見人、保佐人、補助人、任意後見人及び任意後見受任者も届出をす ることができると規定している。届出人となれる者の範囲は法律で定められており、単なる友人・知人が届出人となる ことや、市町村長の許可によって第三者が届出人となるような制度は存在しない。'},
{chapter:5, type:'4', source:'past', text:'死亡届と火葬許可の関係について、正しいものはどれか。', choices:['火葬許可証は、死亡届の提出前であっても申請すれば交付される。','死亡届が受理されると、火葬許可証は申請をしなくても自動的に郵送されてくる。','火葬許可証の交付は死亡届の受理が前提であり、実務では死亡届の提出と同時に火葬許可を申請する のが一般的である。','火葬許可証は、葬儀を受託した葬儀社が発行することができる。'], answer:2, explanation:'墓埋法第5条第2項により、火葬の許可は死亡の届出を受理した市町村長が行うため、火葬許可証の交付は死亡届の受理 が前提となる。許可は火葬許可申請に基づいて行われ、自動的に郵送される仕組みではない。実務では、死亡届の提出 と同時に火葬許可申請書を提出し、その場で火葬許可証の交付を受ける取り扱いが一般的である。火葬許可証は市町村 長が交付する公文書であり、葬儀社や病院が発行できるものではない。'},
{chapter:5, type:'4', source:'past', text:'感染症法に基づく遺体の取り扱いについて、正しいものはどれか。', choices:['一類感染症等の病原体に汚染され、又は汚染された疑いがある遺体は、24時間以内に火葬し、又は埋 葬することができる。','一類感染症で死亡した遺体であっても、必ず死亡後24時間を経過した後でなければ火葬できない。','感染症で死亡した遺体は、すべて48時間以内に火葬しなければならない。','感染症による死亡の場合には、火葬許可証の交付を受ける必要がない。'], answer:0, explanation:'感染症法第30条第3項により、一類感染症、二類感染症、三類感染症又は新型インフルエンザ等感染症の病原体に汚染さ れ、又は汚染された疑いがある遺体は、24時間以内に火葬し、又は埋葬することができる。これは、死亡後24時間を経 過した後でなければ火葬できないとする墓埋法第3条の原則に対する特例であり、24時間以内の火葬を義務付けるもので はなく「できる」とする規定である。この場合でも火葬許可証は必要である。'},
{chapter:5, type:'4', source:'past', text:'一類感染症等の病原体に汚染され、又は汚染された疑いがある遺体の葬法について、感染症法の規定として正 しいものはどれか。', choices:['土葬を原則とし、火葬は認められない。','遺族が希望すれば、消毒を行わずに埋葬することができる。','火葬と埋葬のいずれを選択するかは、完全に遺族の自由である。','原則として火葬しなければならないが、十分な消毒を行い都道府県知事の許可を受けたときは埋葬す ることができる。'], answer:3, explanation:'感染症法第30条第2項は、一類感染症等の病原体に汚染され、又は汚染された疑いがある遺体について、火葬しなければ ならないと定め、原則として火葬を義務付けている。ただし、十分な消毒を行い、都道府県知事の許可を受けたとき は、埋葬することも認められる。感染拡大の防止を目的とした規定であるため、遺族の希望のみによって消毒を省略し たり、火葬と埋葬を自由に選択したりすることはできない。'},
{chapter:5, type:'4', source:'past', text:'感染症法に基づく遺体の移動の制限について、正しいものはどれか。', choices:['遺体の移動を制限し、又は禁止することができるのは警察署長である。','都道府県知事は、感染症のまん延防止のため必要があるときは、一類感染症等の病原体に汚染され、 又は汚染された疑いがある遺体の移動を制限し、又は禁止することができる。','感染症で死亡した遺体は、いかなる場合も一切移動させることができない。','遺体の移動の制限は、遺族の同意がなければ行うことができない。'], answer:1, explanation:'感染症法第30条第1項により、都道府県知事は、一類感染症等の発生を予防し、又はそのまん延を防止するため必要があ ると認めるときは、当該感染症の病原体に汚染され、又は汚染された疑いがある遺体の移動を制限し、又は禁止するこ とができる。移動の制限・禁止を行う主体は警察署長ではなく都道府県知事であり、遺族の同意は要件とされていな い。また、一律にすべての移動が禁止されるのではなく、必要に応じて制限される仕組みである。'},
{chapter:5, type:'4', source:'past', text:'刑法第190条の死体損壊等罪の対象（客体）として、正しいものはどれか。', choices:['死体、遺骨、遺髪及び棺に納めてある物','死体のみ','死体と遺骨のみであり、遺髪は含まれない','墓石及び墓地の区画'], answer:0, explanation:'刑法第190条は、死体、遺骨、遺髪又は棺に納めてある物を損壊し、遺棄し、又は領得した者を処罰すると定めている。 対象は死体そのものに限られず、遺骨や遺髪、棺に納められた副葬品等にも及ぶ点が特徴である。一方、墓石や墓地の 区画自体はこの罪の客体ではなく、墳墓を発掘した場合には墳墓発掘罪（第189条）等の別の規定が適用される。遺体・ 遺骨を日常的に取り扱う葬祭業務では、本条の正確な理解が欠かせない。'},
{chapter:5, type:'4', source:'past', text:'刑法第188条の礼拝所不敬罪に関する記述として、正しいものはどれか。', choices:['この罪は、神社・寺院の建物を損壊した場合にのみ成立する。','この罪の対象となる礼拝所に、墓所は含まれない。','神祠、仏堂、墓所その他の礼拝所に対し、公然と不敬な行為をした者が処罰の対象となる。','不敬な行為は、人目につかない場所で密かに行われた場合でも常に処罰される。'], answer:2, explanation:'刑法第188条第1項は、神祠、仏堂、墓所その他の礼拝所に対し、公然と不敬な行為をした者を処罰すると定めており、 墓所も条文に明記された対象である。この罪は公然と行われた不敬行為について成立するものであり、建物の損壊行為 に限定されるものではない。また、同条第2項は説教、礼拝又は葬式を妨害した者を処罰する旨を定めており、葬儀の平 穏な実施が刑法によって保護されていることも併せて理解しておきたい。'},
{chapter:5, type:'4', source:'past', text:'民法における祭祀財産の承継について、正しいものはどれか。', choices:['系譜、祭具及び墳墓は、相続財産として法定相続分に応じて分割される。','祭祀財産は、必ず長男が承継しなければならないと定められている。','祭祀財産を承継するには、相続の単純承認をしていることが必要である。','系譜、祭具及び墳墓の所有権は、相続の一般原則とは別に、祖先の祭祀を主宰すべき者が承継する。'], answer:3, explanation:'民法第897条により、系譜、祭具及び墳墓といった祭祀財産の所有権は、相続の一般的な規定にかかわらず、祖先の祭祀 を主宰すべき者が承継する。祭祀財産は相続財産とは区別されるため、遺産分割の対象とならず、法定相続分に応じて 分割されることもない。長男が当然に承継するという法律上の定めはなく、また祭祀財産の承継は相続の承認・放棄と は別の制度であるため、相続を放棄した者が祭祀承継者となることも可能である。'},
{chapter:5, type:'4', source:'past', text:'祖先の祭祀を主宰すべき者（祭祀承継者）の決定方法について、民法の定める優先順位として正しいものはど れか。', choices:['慣習、被相続人の指定、家庭裁判所の指定の順','被相続人の指定、慣習、家庭裁判所の指定の順','家庭裁判所の指定、慣習、被相続人の指定の順','相続人の多数決、慣習、家庭裁判所の指定の順'], answer:1, explanation:'民法第897条によれば、祭祀財産は、まず被相続人の指定に従って祖先の祭祀を主宰すべき者が承継し、指定がないとき は慣習に従い、慣習が明らかでないときは家庭裁判所が承継すべき者を定める。すなわち、被相続人の指定が最も優先 され、次いで慣習、最後に家庭裁判所の審判という順序になる。指定の方式に特段の制限はなく、遺言によらず生前に 行うこともできると解されている。相続人の多数決によって決定するという定めはない。'},
{chapter:5, type:'4', source:'past', text:'相続の放棄に関する民法の規定として、正しいものはどれか。', choices:['相続の放棄は、被相続人の生前であってもあらかじめ行うことができる。','相続の放棄は、他の相続人全員に口頭で伝えれば効力を生じる。','相続人は、自己のために相続の開始があったことを知った時から3か月以内に、家庭裁判所に申述して 相続を放棄することができる。','相続を放棄した者は、祭祀財産を承継することもできなくなる。'], answer:2, explanation:'民法第915条により、相続人は、自己のために相続の開始があったことを知った時から3か月以内に、相続について単純 承認、限定承認又は放棄をしなければならない。相続の放棄は家庭裁判所に申述して行う必要があり、他の相続人への 口頭の意思表示だけでは効力を生じない。また、相続開始前すなわち被相続人の生前に放棄することはできない。な お、祭祀財産は相続財産とは別に承継されるため、放棄をした者でも祭祀承継者となれる。'},
{chapter:5, type:'4', source:'past', text:'相続の限定承認に関する記述として、正しいものはどれか。', choices:['限定承認は、相続によって得た財産の限度で被相続人の債務を弁済することを留保して承認する制度 であり、共同相続人の全員が共同して行う必要がある。','限定承認は、共同相続人のうちの1人が単独で行うことができる。','限定承認をした相続人は、自己の固有財産からも被相続人の債務を弁済しなければならない。','限定承認は、相続の開始を知った時から1年以内であればいつでも行うことができる。'], answer:0, explanation:'民法第922条により、限定承認とは、相続によって得た財産の限度においてのみ被相続人の債務及び遺贈を弁済すべきこ とを留保して、相続を承認するものである。相続人が数人あるときは、共同相続人の全員が共同してのみ限定承認をす ることができる（第923条）。手続は、相続の開始があったことを知った時から3か月以内に、財産目録を作成して家庭 裁判所に申述して行う。相続人が自己の固有財産で債務を弁済する義務を負うものではない。'},
{chapter:5, type:'4', source:'past', text:'冠婚葬祭互助会の事業に対する法規制について、正しいものはどれか。', choices:['互助会事業は、特定商取引法に基づく登録制とされている。','互助会事業は、割賦販売法の前払式特定取引に該当し、経済産業大臣の許可を受けなければ営むこと ができない。','互助会事業を営むに当たって、特別な許認可は必要とされていない。','互助会事業は、厚生労働大臣の免許制とされている。'], answer:1, explanation:'冠婚葬祭互助会は、加入者から掛金を2か月以上の期間にわたり、かつ3回以上に分割して受領し、婚礼又は葬式のため の役務の提供等を行うものであり、割賦販売法に定める前払式特定取引に該当する。この前払式特定取引を業として営 むには、経済産業大臣の許可を受けなければならない。消費者から長期間にわたり前払金を預かる取引であるため、許 可制の下で事業者の財産的基礎や契約内容が審査され、消費者保護が図られている。'},
{chapter:5, type:'4', source:'past', text:'冠婚葬祭互助会が加入者から受け取った前受金の保全について、割賦販売法上の義務として正しいものはどれ か。', choices:['前受金の全額を、現金で社内に保管しなければならない。','前受金の保全措置を講ずるかどうかは、事業者の任意とされている。','前受金の80%に相当する額を、国に納付しなければならない。','前受金の2分の1に相当する額について、供託又は銀行等との前受金保全契約などの保全措置を講じな ければならない。'], answer:3, explanation:'割賦販売法により、前払式特定取引業者である冠婚葬祭互助会は、加入者から受領した前受金の2分の1に相当する額に ついて、供託又は銀行等との前受金保全契約の締結などの方法により保全する措置を講じなければならない。これは、 事業者が倒産した場合などに、加入者が支払った掛金の全額が失われる事態を防ぐための制度である。保全措置は法律 上の義務であって任意ではなく、国への納付や全額の現金保管を求めるものでもない。'},
{chapter:5, type:'4', source:'past', text:'冠婚葬祭互助会契約の中途解約について、正しいものはどれか。', choices:['加入者は契約を中途解約することができ、所定の手数料を差し引いた解約返戻金の返還を受けられ る。','互助会契約は、いったん締結すると中途解約することが一切できない。','中途解約した場合、払い込んだ掛金は全く返還されない。','解約手数料は、事業者が金額の上限なく自由に定めることができる。'], answer:0, explanation:'冠婚葬祭互助会の契約は中途解約をすることができ、加入者は、払込済みの掛金から所定の解約手数料を差し引いた解 約返戻金の返還を受けられる。解約を一切認めない取り扱いや、掛金を全く返還しない取り扱いは許されない。解約手 数料についても、解約に伴って事業者に生ずる平均的な損害の額を超える部分は消費者契約法により無効と判断され得 るため、無制限に定められるものではない。解約をめぐる苦情は多く、丁寧な説明が求められる。'},
{chapter:5, type:'4', source:'past', text:'特定商取引法における訪問販売のクーリング・オフについて、正しいものはどれか。', choices:['クーリング・オフができる期間は、契約締結日から3日以内である。','クーリング・オフをするには、事業者の承諾を得なければならない。','申込者等は、法定の書面を受領した日から起算して8日以内であれば、書面又は電磁的記録により無条 件で申込みの撤回・契約の解除ができる。','クーリング・オフをした場合、消費者は所定の違約金を支払わなければならない。'], answer:2, explanation:'特定商取引法により、訪問販売においては、申込者等は、法定事項が記載された申込書面又は契約書面のいずれか早い 方を受領した日から起算して8日以内であれば、書面又は電磁的記録により、無条件で申込みの撤回又は契約の解除を行 うことができる。クーリング・オフに事業者の承諾は不要であり、損害賠償や違約金を請求されることもない。事業者 の不実告知や威迫によって行使が妨げられた場合には、8日を経過していても行使できる。'},
{chapter:5, type:'4', source:'past', text:'特定商取引法における訪問販売の規制に関する記述として、正しいものはどれか。', choices:['訪問販売では、勧誘の目的を告げずに消費者に接触して勧誘を行ってもよい。','販売業者は、勧誘に先立って、事業者名、勧誘目的である旨、商品・役務の種類を相手方に明らかに しなければならない。','消費者が契約しない意思を示した後に勧誘を繰り返すことは、禁止されていない。','訪問販売の規制は商品の販売のみに適用され、役務の提供契約には適用されない。'], answer:1, explanation:'特定商取引法は、訪問販売をしようとするとき、販売業者又は役務提供事業者は、勧誘に先立って、相手方に対し、事業 者の氏名又は名称、契約の締結について勧誘をする目的である旨、販売する商品や提供する役務の種類を明らかにしな ければならないと定めている。また、契約を締結しない旨の意思を表示した者に対して勧誘を継続したり再勧誘したり することは禁止されている。規制は役務の提供契約にも適用されるため、葬祭サービスの訪問勧誘も対象となり得る。'},
{chapter:5, type:'4', source:'past', text:'消費者契約法に基づき消費者が契約を取り消すことができる場合として、正しいものはどれか。', choices:['契約後に、より安い他社のサービスを見つけた場合','自らの判断で契約したが、後になって気が変わった場合','契約書の文字が小さくて読みにくかった場合','事業者が重要事項について事実と異なることを告げ、消費者がそれを事実と誤認して契約した場合'], answer:3, explanation:'消費者契約法第4条により、事業者が契約の締結について勧誘をする際に、重要事項について事実と異なることを告げ （不実告知）、消費者がその告げられた内容を事実であると誤認して契約の申込み又は承諾の意思表示をしたときは、 消費者はその意思表示を取り消すことができる。単に後から安いサービスを見つけた、気が変わった、契約書の文字が 読みにくかったという事情だけでは取消事由とならない。葬儀の内容や価格に関する虚偽の説明は取消しの対象となり 得る。'},
{chapter:5, type:'4', source:'past', text:'消費者契約法において、消費者が困惑して行った契約の意思表示を取り消すことができる場合として、正しい ものはどれか。', choices:['事業者が時間をかけて丁寧に説明を行ったうえで契約した場合','消費者が自宅で家族と相談したうえで契約した場合','消費者が退去するよう求めたにもかかわらず、事業者が消費者の住居から退去せず、困惑して契約し た場合','事業者が商品のパンフレットを郵送してきた場合'], answer:2, explanation:'消費者契約法第4条第3項は、事業者が勧誘の際に、消費者が住居等から退去すべき旨の意思を示したにもかかわらず退 去しないこと（不退去）や、消費者が勧誘場所から退去する旨の意思を示したにもかかわらず退去させないこと（退去 妨害）により、消費者が困惑して契約の意思表示をした場合には、これを取り消すことができると定めている。丁寧な 説明やパンフレットの郵送、家族と相談したうえでの契約は、困惑による取消しの対象とはならない。'},
{chapter:5, type:'4', source:'past', text:'不当景品類及び不当表示防止法（景品表示法）が禁止する不当表示について、正しいものはどれか。', choices:['内容について実際より著しく優良と誤認させる表示（優良誤認表示）や、価格等の取引条件について 実際より著しく有利と誤認させる表示（有利誤認表示）は禁止されている。','禁止されるのは完全な虚偽の表示のみであり、誤認を招くにとどまる表示は規制されない。','景品表示法はサービス業には適用されないため、葬祭業は規制の対象外である。','表示の根拠資料を社内に保管してさえいれば、どのような表示をしても違反にはならない。'], answer:0, explanation:'景品表示法第5条は、商品又は役務の品質、規格その他の内容について、実際のものよりも著しく優良であると一般消費 者に誤認される優良誤認表示と、価格その他の取引条件について実際のものよりも著しく有利であると誤認される有利 誤認表示を禁止している。虚偽とまではいえなくても、誤認を招く表示であれば規制の対象となる。同法は役務の取引 にも適用されるため、葬祭業の広告や価格表示も対象であり、違反には措置命令等が行われ得る。'},
{chapter:5, type:'4', source:'past', text:'葬儀の価格表示に関する景品表示法上の留意点として、正しいものはどれか。', choices:['「葬儀一式◯円」と表示しておけば、実際に請求する総額がいくらになっても問題はない。','追加料金が生じる可能性は、契約を締結した後に説明すれば足りる。','価格表示は消費者の関心を引くことが目的であるから、最低価格のみを大きく表示しておけばよい。','「葬儀一式◯円」と表示しながら、実際にはそれだけでは葬儀を行えず多額の追加料金が必要となる 場合、有利誤認表示として問題となるおそれがある。'], answer:3, explanation:'「葬儀一式◯円」などと表示しながら、実際にはその金額だけでは葬儀を行うことができず、火葬料、式場使用料、搬 送費、返礼品等の多額の追加費用が必要になる場合、取引条件が実際よりも著しく有利であると誤認させる有利誤認表 示として、景品表示法違反となるおそれがある。表示価格に含まれる項目と含まれない項目を明確に区分し、追加費用 が発生する条件を契約前に分かりやすく示すことが必要である。最低価格のみを殊更に強調する表示も誤認を招きやす い。'},
{chapter:5, type:'4', source:'past', text:'個人情報保護法における「個人情報」と死者に関する情報の取り扱いについて、正しいものはどれか。', choices:['死者に関する情報は、すべて個人情報として同法の保護対象となる。','同法の「個人情報」は生存する個人に関する情報をいい、死者の情報は、遺族など生存する個人に関 する情報にも当たる場合に、その者の個人情報として保護される。','死者に関する情報は法的保護とは無関係であるため、自由に公開してよい。','故人の情報は、死後1年間に限り個人情報として扱われる。'], answer:1, explanation:'個人情報保護法における「個人情報」とは、生存する個人に関する情報であって、特定の個人を識別することができる ものなどをいう。したがって、死者に関する情報それ自体は原則として同法の個人情報には該当しないが、死因や病歴、 家族関係などの情報が同時に遺族等の生存する個人に関する情報でもある場合には、その遺族等の個人情報として同法 の保護を受ける。死後1年間に限り保護するという定めはなく、故人の情報も葬祭業者として慎重に取り扱うべきであ る。'},
{chapter:5, type:'4', source:'past', text:'個人情報取扱事業者である葬祭業者の義務について、個人情報保護法の規定として正しいものはどれか。', choices:['取得した個人情報は、事業に役立つ限り、どのような目的にも自由に利用できる。','利用目的は、個人情報を実際に利用した後に決めればよい。','個人情報の取り扱いに当たっては利用目的をできる限り特定し、あらかじめ公表している場合などを 除き、取得後速やかに本人に通知し又は公表しなければならない。','家族葬の参列者名簿は、個人情報には該当しない。'], answer:2, explanation:'個人情報保護法により、個人情報取扱事業者は、個人情報を取り扱うに当たり、その利用の目的をできる限り特定しなけ ればならず、個人情報を取得した場合は、あらかじめ利用目的を公表している場合を除き、速やかに利用目的を本人に通 知し、又は公表しなければならない。特定した利用目的の達成に必要な範囲を超えて取り扱うには、原則として本人の 同意が必要である。喪主や参列者の氏名・連絡先を記載した名簿も、特定の個人を識別できる以上、個人情報に該当す る。'},
{chapter:5, type:'4', source:'past', text:'遺体を取り扱う際の感染予防の基本的な考え方として、正しいものはどれか。', choices:['すべての遺体の血液・体液等に感染の可能性があるものとして、手袋やマスクの着用などの標準予防 策（スタンダード・プリコーション）を講じる。','生前に感染症の診断を受けていた遺体以外は、素手で取り扱っても差し支えない。','感染予防は医療機関で行うべきものであり、葬祭業者が対策を行う必要はない。','遺体から感染するおそれはないため、特段の対策は不要である。'], answer:0, explanation:'標準予防策（スタンダード・プリコーション）とは、感染症の診断の有無にかかわらず、すべての人の血液、体液、分 泌物、排泄物、傷のある皮膚及び粘膜には感染性があるものとみなして対応する感染予防の基本的な考え方である。生 前に感染症と診断されていなくても、遺体が病原体を保有している可能性は否定できないため、葬祭従事者も手袋やマ スクの着用、手指衛生などを日常的に実施する必要がある。これは従事者自身だけでなく遺族や関係者を守る措置でも ある。'},
{chapter:5, type:'4', source:'past', text:'生活保護法に基づく葬祭扶助について、正しいものはどれか。', choices:['葬祭扶助は、死亡した被保護者本人に対して支給される。','葬祭扶助は、香典の不足分を補うための制度である。','葬祭扶助は、市町村が葬儀を直接執り行う現物給付に限られる。','葬祭扶助は、困窮のため葬祭の費用を支弁できない場合などに、葬祭を行う者に対して行われる。'], answer:3, explanation:'生活保護法第18条に定める葬祭扶助は、困窮のため最低限度の生活を維持することのできない者が葬祭を行う場合など に、その葬祭を行う者に対して行われる。死亡した本人に支給されるものではなく、被保護者が死亡して葬祭を行う扶 養義務者がないときなどには、葬祭を行う家主や民生委員等に対して行うこともできる。給付は原則として金銭給付で あり、香典を補う制度ではない。実務上は、葬祭を行う前に福祉事務所へ申請することが必要とされる。'},
{chapter:5, type:'4', source:'past', text:'生活保護法第18条に定める葬祭扶助の範囲に含まれるものとして、正しいものはどれか。', choices:['墓石の建立に要する費用','検案、死体の運搬、火葬又は埋葬、納骨その他葬祭のために必要なもの','遺族の喪服の購入費用と会葬者への返礼品','初七日や四十九日などの法要に要する費用'], answer:1, explanation:'生活保護法第18条第1項は、葬祭扶助の範囲として、検案、死体の運搬、火葬又は埋葬、納骨その他葬祭のために必要な ものを掲げている。最低限度の葬祭を保障する制度であるため、基準額の範囲内で必要最小限の葬送に要する費用が対 象となり、墓石の建立費、喪服の購入費、会葬者への返礼品、法要の費用などは対象に含まれない。葬祭業者として は、福祉事務所への事前の相談・申請が必要であることも含め、制度を正しく理解しておくことが求められる。'},
{chapter:5, type:'4', source:'past', text:'墓地の経営主体に関する国の指針等の考え方として、正しいものはどれか。', choices:['墓地経営は、株式会社が行うことが原則とされている。','墓地の経営主体に関する制限や指針は存在せず、誰でも自由に経営できる。','墓地経営の主体は市町村等の地方公共団体が原則であり、これにより難い事情がある場合でも宗教法 人又は公益法人等に限るとされている。','墓地経営は、個人が営利目的で行うことが推奨されている。'], answer:2, explanation:'墓地の経営主体については、厚生省（現・厚生労働省）の「墓地経営・管理の指針」等において、市町村等の地方公共 団体が原則であり、これにより難い事情がある場合であっても宗教法人又は公益法人等に限る、とされている。墓地は 利用者の権利保護のため永続性と非営利性が確保されなければならない施設であり、株式会社や個人が営利目的で経営 することは原則として認められていない。実際の許可審査も、各自治体の条例等に基づき厳格に行われている。'},
{chapter:5, type:'4', source:'past', text:'わが国の火葬及び火葬場に関する記述として、正しいものはどれか。', choices:['わが国では、現在も土葬が葬法の大半を占めている。','火葬場は、すべて民間企業によって経営されている。','火葬場の経営を開始するに当たって、許可を受ける必要はない。','わが国の火葬率はほぼ100%に達しており、火葬場の多くは市町村等の地方公共団体により経営されて いる。 葬祭ディレクター技能審査 完全対策問題集 第9 章：接遇・グリーフケア （50問）'], answer:3, explanation:'わが国の火葬率はほぼ100%に達しており、世界でも最も火葬が普及した国の一つである。火葬場の多くは、市町村や一 部事務組合などの地方公共団体が経営する公営施設であり、民間経営の火葬場は東京都区部など一部の地域に限られ る。火葬場を経営するには、墓地や納骨堂と同様、墓埋法第10条に基づき都道府県知事（市又は特別区にあっては市長 又は区長）の許可を受けなければならず、許可なく経営することはできない。 葬祭ディレクター技能審査 完全対策問題集 第9章：接遇・グリーフケ ア'},
{chapter:7, type:'4', source:'past', text:'遺族と接する際の葬祭ディレクターの基本姿勢として、最も適切なものはどれか。', choices:['遺族の話を傾聴し、気持ちに共感しながら、遺族のペースに合わせて急かさずに対応する。','悲しみを長引かせないよう、努めて明るく振る舞い、遺族を笑わせることを最優先する。','決めるべき事項が多いため、効率を最優先し、遺族の発言を適宜打ち切って進める。','遺族の負担を減らすため、葬儀の内容はすべて担当者の判断で決めて事後に報告する。'], answer:0, explanation:'遺族応対の基本は、傾聴と共感の姿勢で気持ちに寄り添い、遺族のペースを尊重して急かさないことである。深い悲し みの中にある遺族に対し、無理に明るく振る舞ったり、効率を優先して話を打ち切ったりする対応はふさわしくない。 また、葬儀の内容を担当者の判断だけで決めることは遺族の意向の尊重に反する。常に遺族の意思を確認し、わかりや すく説明しながら進めることが信頼につながる。'},
{chapter:7, type:'4', source:'past', text:'遺族にかけるお悔やみの言葉として、最も適切なものはどれか。', choices:['「重ね重ねお悔やみ申し上げます」','「死亡されたと伺い、本当に驚きました」','「このたびはご愁傷様でございます。心からお悔やみ申し上げます」','「いつまでも悲しまずに、早く元気を出してください」'], answer:2, explanation:'お悔やみの言葉としては「このたびはご愁傷様でございます」「心からお悔やみ申し上げます」が代表的で適切な表現 である。「重ね重ね」は不幸が重なることを連想させる重ね言葉であり、弔事では避ける。「死亡」という直接的な表 現も遺族の感情を傷つけるおそれがあるため「ご逝去」などに言い換える。さらに、早く元気を出すよう求める言葉は 悲しむことを否定し、遺族を追い詰めかねないため不適切である。'},
{chapter:7, type:'4', source:'past', text:'弔事の場で避けるべきとされる「重ね言葉」に該当するものはどれか。', choices:['「心より」','「たびたび」','「謹んで」','「安らかに」'], answer:1, explanation:'重ね言葉とは「たびたび」「重ね重ね」「くれぐれも」「ますます」のように同じ語を重ねた言葉で、不幸が重なるこ とを連想させるため弔事では避けるべきとされている。挨拶状や弔辞、遺族との会話でも用いないよう注意が必要であ る。一方、「心より」「謹んで」「安らかに」はいずれも弔意を表す際に通常用いられる丁寧な表現であり、忌み言葉 には該当しない。場にふさわしい言葉遣いは葬祭接遇の基本である。'},
{chapter:7, type:'4', source:'past', text:'遺族との会話における「死亡する」の言い換えとして、最も適切なものはどれか。', choices:['「いなくなられる」','「だめになられる」','「終わられる」','「お亡くなりになる」'], answer:3, explanation:'「死ぬ」「死亡」といった直接的な表現は遺族の感情を傷つけるおそれがあるため、「お亡くなりになる」「ご逝去」 「ご永眠」などの婉曲で丁寧な表現に言い換えるのが葬祭接遇の基本である。「いなくなられる」「終わられる」と いった表現は意味が曖昧なうえ、かえって不謹慎な印象を与えることもあり、適切な言い換えとはいえない。同様に、 生きていた頃のことは「ご生前」「お元気な頃」と表現することが望ましい。'},
{chapter:7, type:'4', source:'past', text:'浄土真宗の門徒である遺族に対して、使用を避けるべき言葉はどれか。', choices:['「ご冥福をお祈りいたします」','「心からお悔やみ申し上げます」','「このたびはご愁傷様でございます」','「お参りさせていただきます」'], answer:0, explanation:'浄土真宗では、人は亡くなるとただちに阿弥陀仏の働きによって浄土に往生すると考えるため、死後に冥土をさまよう ことを前提として冥土での幸福を祈る「冥福」という言葉はふさわしくないとされる。同様の理由から香典の表書きも 「御霊前」ではなく「御仏前」を用いるのが一般的である。「お悔やみ申し上げます」「ご愁傷様でございます」と いった一般的な弔意の表現は、浄土真宗の遺族にも差し支えなく使用できる。'},
{chapter:7, type:'4', source:'past', text:'神式の葬儀（神葬祭）の場で、使用を避けるべき言葉はどれか。', choices:['「御霊のご平安をお祈りいたします」','「一日も早いご成仏をお祈りいたします」','「心からお悔やみ申し上げます」','「このたびはご愁傷様でございます」'], answer:1, explanation:'「成仏」「供養」「冥福」「往生」などは仏教に由来する言葉であり、神式の葬儀では用いない。神道では故人の御霊 は家にとどまり子孫を見守る存在になると考えられているため、「御霊のご平安をお祈りいたします」といった表現が ふさわしい。「お悔やみ申し上げます」「ご愁傷様でございます」は特定の宗教色が薄い弔意の言葉であり、神式でも 使用して差し支えない。宗教による言葉の使い分けは接遇上の重要な知識である。'},
{chapter:7, type:'4', source:'past', text:'キリスト教式の葬儀の場でかける言葉として、最も適切なものはどれか。', choices:['「ご成仏をお祈りいたします」','「ご冥福をお祈りいたします」','「安らかな眠りをお祈りいたします」','「ご供養を大切になさってください」'], answer:2, explanation:'キリスト教では、死は神のもとに召されることであり永遠の命の始まりと捉えられるため、悲しみを前提としたお悔や みよりも「安らかな眠りをお祈りいたします」「安らかにお眠りになりますように」といった表現がふさわしいとされ る。「成仏」「冥福」「供養」はいずれも仏教に由来する言葉であり、キリスト教式の場で用いるのは不適切である。 宗教ごとの死生観を理解し、言葉を適切に使い分けることが求められる。'},
{chapter:7, type:'4', source:'past', text:'弔電において、受取人の実の父親である故人を表す敬称として、最も適切なものはどれか。', choices:['ご母堂様','ご令息様','ご令室様','ご尊父様'], answer:3, explanation:'弔電では、故人を受取人との続柄に応じた敬称で表すのが慣例であり、受取人の父親は「ご尊父様」と表す。「お父上 様」が用いられることもある。母親は「ご母堂様」、妻は「ご令室様」、息子は「ご令息様」、娘は「ご令嬢様」とそ れぞれ表し方が決まっている。続柄に応じた敬称を正しく使い分けることは弔意を適切に伝えるために不可欠であり、誤 用は遺族に対して失礼にあたるため十分に注意する必要がある。'},
{chapter:7, type:'4', source:'past', text:'弔電において、受取人の実の母親である故人を表す敬称として、最も適切なものはどれか。', choices:['ご令室様','ご母堂様','ご令嬢様','ご尊父様'], answer:1, explanation:'受取人の母親に対する敬称は「ご母堂様」であり、「お母上様」が用いられることもある。これに対し、他人の妻を表 す敬称は「ご令室様」、娘を表す敬称は「ご令嬢様」、父親を表す敬称は「ご尊父様」であり、それぞれ対象となる続 柄が異なる。弔電の手配の相談を受ける際には、故人と受取人との続柄を正確に確認したうえで適切な敬称を案内する ことが、葬祭従事者に求められる大切な実務知識である。'},
{chapter:7, type:'4', source:'past', text:'弔電において、受取人の妻である故人を表す敬称として、最も適切なものはどれか。', choices:['ご令室様','ご母堂様','ご令嬢様','ご主人様'], answer:0, explanation:'受取人の妻に対する敬称は「ご令室様」であり、「奥様」が用いられることもある。母親を表す「ご母堂様」、娘を表 す「ご令嬢様」、夫を表す「ご主人様」は、いずれも妻の敬称としては誤りである。弔電や供花の名札などで続柄の敬 称を取り違えると遺族に大変失礼となるため、依頼を受ける際には故人と受取人との続柄を丁寧に確認し、正しい敬称 を用いるよう細心の注意を払わなければならない。'},
{chapter:7, type:'4', source:'past', text:'深夜に死亡の第一報の電話を受けた際に聞き取るべき事項の組み合わせとして、最も適切なものはどれか。', choices:['故人の趣味、勤務先の沿革、交友関係、遺産の内容','会葬者の予定人数、香典の予想額、料理の希望、返礼品の品目','故人の氏名、現在ご遺体のある場所、連絡者の氏名と連絡先、搬送先の希望','葬儀の規模、宗教者への謝礼額、遺影写真の有無、納骨の時期'], answer:2, explanation:'第一報の電話では、故人の氏名、亡くなった場所（病院名や所在地）、連絡をくださった方の氏名・続柄・連絡先、ご 遺体の搬送先の希望といった、お迎えに必要な事項を正確に聞き取り、復唱して確認することが基本である。相手は動 揺していることが多いため、落ち着いた口調で簡潔に確認する。葬儀の規模や料理、返礼品などの詳細は後日の打ち合 わせで決める事項であり、第一報の段階で尋ねるのは適切でない。'},
{chapter:7, type:'4', source:'past', text:'葬祭ディレクターの身だしなみとして、最も適切なものはどれか。', choices:['個性を演出するため、明るい色のネクタイや華やかなアクセサリーを身につける。','遺族に親しみを感じてもらえるよう、普段着に近いカジュアルな服装で接する。','好印象を与えるため、香りの強い香水をしっかりとつける。','黒を基調とした清潔感のある服装とし、過度な装飾や強い香りは避ける。'], answer:3, explanation:'葬祭の場における身だしなみは、黒を基調とした端正なスーツに、清潔感のある髪型や爪を保ち、華美なアクセサリー や明るい色の小物、強い香水を避けることが基本である。装いは遺族や会葬者への弔意と敬意の表れであり、厳粛な場 の雰囲気を損なわないことが何より重要となる。カジュアルな服装や華やかな装飾、強い香りは、悲しみの場にふさわ しくなく、遺族に不快感を与えるおそれがあるため慎まなければならない。'},
{chapter:7, type:'4', source:'past', text:'お辞儀のうち「最敬礼」に関する記述として、最も適切なものはどれか。', choices:['上体を約45度傾ける最も丁寧なお辞儀で、深い弔意や謝罪を表す場面で用いる。','上体を約15度傾ける軽いお辞儀で、廊下ですれ違う際に用いる。','上体を約30度傾けるお辞儀で、日常の挨拶で最も多く用いられる。','首だけを軽く下げる略式のお辞儀で、親しい間柄の挨拶に用いる。'], answer:0, explanation:'お辞儀には、上体を約15度傾ける会釈、約30度傾ける敬礼（普通礼）、約45度傾ける最敬礼があり、場面に応じて使い 分けるのが基本である。最敬礼はその中で最も丁寧なお辞儀であり、ご遺体やご遺族に深い弔意を表すとき、心からの感 謝や謝罪を伝えるときなど、特に改まった場面で用いられる。背筋を伸ばし、一度静止してからゆっくりと上体を起こす と丁寧な印象になる。首だけを動かす挨拶は接遇の場では丁寧さを欠く。'},
{chapter:7, type:'4', source:'past', text:'廊下で会葬者とすれ違う際などに行う「会釈」の動作として、最も適切なものはどれか。', choices:['上体を約45度深く傾ける。','上体を約15度軽く傾ける。','上体を約90度近くまで傾ける。','上体は動かさず、視線だけを下げる。'], answer:1, explanation:'会釈は上体を約15度傾ける軽いお辞儀で、廊下でのすれ違いや入退室の際などに用いられる。約30度傾けるお辞儀は敬 礼（普通礼）としてお迎えやお見送りに、約45度傾ける最敬礼は深い弔意や謝罪など特に改まった場面に用いられ、状 況に応じて使い分けることが接遇の基本である。約90度まで傾けるお辞儀は通常の接遇では用いられず、視線を下げる だけでは挨拶としての丁寧さに欠けるため、会釈の動作として適切でない。'},
{chapter:7, type:'4', source:'past', text:'遺族や会葬者を先導して案内する際の歩く位置として、最も適切なものはどれか。', choices:['相手の真後ろについて歩く。','相手と横一列に並んで歩く。','相手から10メートル以上離れた前方を歩く。','相手の斜め前、2〜3歩先を相手の歩調に合わせて歩く。'], answer:3, explanation:'案内の際は、相手の斜め前2〜3歩先を、相手の歩調に合わせて歩くのが基本である。斜め前に位置することで進行方向 を示しながら、時折振り返って相手の様子を確認することができる。真後ろを歩いたのでは道案内にならず、真横に並 んでは方向を示しにくい。また、大きく離れて先を歩くと相手を置き去りにし、急かしている印象も与えてしまう。曲 がり角では立ち止まり、手のひらで方向を示しながら声を添えるとより丁寧である。'},
{chapter:7, type:'4', source:'past', text:'エレベーターで遺族を案内する場合の席次として、上座にあたる位置はどれか。', choices:['操作盤のすぐ前の位置','出入口の扉に最も近い位置','入口から最も遠い奥の位置','かご内の中央に立つ位置'], answer:2, explanation:'エレベーター内の席次では、入口から最も遠い奥が上座であり、操作盤の前は扉の開閉や行き先の操作を担当する者が 立つ下座とされる。案内者は操作盤の前に立ち、遺族には奥の上座に乗っていただくよう案内する。乗るときは案内者 が先に乗り込んで開のボタンを押しながらお迎えし、降りるときは扉を押さえて遺族に先に降りていただくのが基本的 な作法である。扉付近や中央は乗り降りの妨げにもなりやすく、上座にはあたらない。'},
{chapter:7, type:'4', source:'past', text:'応接室に遺族を案内する際の席次に関する記述として、最も適切なものはどれか。', choices:['出入口から最も遠い席が上座であり、遺族には上座を勧める。','出入口に最も近い席が上座であり、遺族には扉の横の席を勧める。','上座は必ず窓から最も遠い席と決まっている。','席次に決まりはないため、どの席に案内しても差し支えない。'], answer:0, explanation:'席次の基本は、出入口から最も遠い落ち着ける席が上座であり、人の出入りがある出入口に近い席が下座である。応接 室では長椅子（ソファ）側を上座とすることも多い。来館された遺族や宗教者には上座を勧め、担当者は下座に座って 応対するのが礼儀である。窓からの距離によって一律に決まるものではなく、席次に決まりがないとする理解も誤りで ある。席次への配慮は、相手への敬意を形で示す接遇の基本といえる。'},
{chapter:7, type:'4', source:'past', text:'名刺の受け渡しのマナーとして、最も適切なものはどれか。', choices:['受け取った名刺は、その場ですぐに上着のポケットへしまう。','名刺は片手で受け取り、記載された文字の上に指をかけて持つ。','名刺を差し出されたときは、座ったまま受け取ってよい。','名刺は立って両手で丁寧に受け取り、氏名を確認して大切に扱う。'], answer:3, explanation:'名刺は相手の分身ともいわれ、原則として立ち上がり、両手で丁寧に受け取って氏名をその場で確認し、打ち合わせ中 は名刺入れの上などに置いて大切に扱うのが基本である。受け取ってすぐにポケットへしまったり、記載された文字に指 をかけたり、座ったまま受け取ったりする行為は、相手への敬意を欠くものとされる。名刺の扱い方ひとつが会社全体 の印象を左右することを意識し、丁寧な所作を心がける必要がある。'},
{chapter:7, type:'4', source:'past', text:'高齢の会葬者や障害のある会葬者への配慮として、最も適切なものはどれか。', choices:['特別扱いはかえって失礼にあたるため、特段の配慮は行わない。','段差の少ない動線の確保や車いす席の用意など、式場の環境を事前に整える。','車いすの方を見かけたら、本人の意向を確認せず直ちに車いすを押して移動させる。','介助はすべて同行の家族に任せ、スタッフは一切関わらない。'], answer:1, explanation:'高齢者や障害のある会葬者には、段差の少ないバリアフリーの動線の確保、車いすのまま参列できる席の用意、手すり やスロープの設置、わかりやすい案内表示など、式場環境を事前に整える配慮が求められる。車いすを押すなどの介助 は、必ず本人の意向を確認してから行うのが原則であり、善意であっても一方的な介助は望ましくない。配慮を行わな いことや、家族に任せきりにすることも、適切な接遇とはいえない。'},
{chapter:7, type:'4', source:'past', text:'葬儀に関するクレームを受けた際の初期対応として、最も適切なものはどれか。', choices:['会社側に非がないと思われる場合は、その場ですぐに反論して誤解を正す。','責任の所在がはっきりするまでは、お詫びの言葉を一切口にしない。','まず相手の話を最後まで傾聴し、不快な思いをさせたことについてお詫びする。','自分の担当外の内容であれば、対応せずそのままにしておく。'], answer:2, explanation:'クレーム対応の基本は、まず相手の話を遮らずに最後まで傾聴し、不快な思いをさせたことそのものについて率直にお 詫びすることである。そのうえで事実関係を正確に確認し、速やかに上司へ報告して組織として誠実に対応する。話の 途中で反論したり、お詫びの言葉を一切拒んだりすれば、相手の感情をさらに害してしまう。担当外の内容であっても放 置せず、責任をもって担当者や上司につなぐことが信頼の回復につながる。'},
{chapter:7, type:'4', source:'past', text:'遺族に葬儀の内容や費用を説明する際の話し方として、最も適切なものはどれか。', choices:['専門用語を避け、わかりやすい言葉で、遺族の理解を確かめながら説明する。','専門性の高さを示すため、業界用語を積極的に用いて説明する。','時間を節約するため、できるだけ早口で一気に説明を済ませる。','費用の詳細は混乱を招くため、契約を済ませた後に初めて提示する。'], answer:0, explanation:'遺族は深い悲しみと動揺の中にあり、葬儀を初めて経験する人も少なくないため、専門用語や業界用語を避け、平易な言 葉でゆっくりと、理解を確かめながら説明することが基本である。特に費用などの重要事項は、契約前に見積書などの 書面を用いて明確に説明し、十分に納得を得る必要がある。契約後に初めて費用を示すことは信頼を大きく損なう。早 口で一方的に話す説明も、遺族の理解と納得を妨げるため避けるべきである。'},
{chapter:7, type:'4', source:'past', text:'葬儀の打ち合わせにおける葬祭ディレクターの進め方として、最も適切なものはどれか。', choices:['利益率の高いプランを中心に強く勧め、その場での即決を求める。','遺族が迷っている品目は、担当者の好みで代わりに決めてしまう。','複数の選択肢を内容や費用とともに示し、遺族が納得して選べるよう支援する。','打ち合わせ時間を短くするため、遺族からの質問は最小限に抑えてもらう。'], answer:2, explanation:'打ち合わせでは、祭壇や棺、料理、返礼品などについて複数の候補を内容・費用とともにわかりやすく提示し、遺族自 身が比較検討のうえ納得して選べるよう支援することが基本である。特定のプランを押し付けたり即決を迫ったりする こと、担当者の判断で勝手に決めてしまうことは、遺族の意向の尊重に反する。遺族の質問には丁寧に答え、急かさず に意思決定を支える姿勢こそが、満足と信頼につながっていく。'},
{chapter:7, type:'4', source:'past', text:'弔事の挨拶や進行において、不幸が繰り返されることを連想させるため避けるべき言葉はどれか。', choices:['「安らかに」','「お世話になりました」','「感謝申し上げます」','「続いて」'], answer:3, explanation:'弔事では、「続いて」「再び」「また」「追って」など物事の繰り返しを連想させる言葉は、不幸が再び起こることを 想起させるため避けるべきとされ、司会進行では「次に」などへ言い換える。「重ね重ね」「たびたび」「くれぐれ も」といった重ね言葉が忌まれるのも同じ理由による。一方、「安らかに」や、お世話になったことへの感謝を述べる 表現は、弔事の挨拶で通常用いられるものであり、忌み言葉には該当しない。'},
{chapter:7, type:'4', source:'past', text:'遺族との会話で、故人が生きていた頃のことを表す言葉として最も適切なものはどれか。', choices:['「生きていらした頃」','「ご生前」','「死ぬ前」','「まだ無事だった頃」'], answer:1, explanation:'故人が生きていた頃のことは、「ご生前」や「お元気な頃」と表現するのが適切である。「生きていた頃」「死ぬ前」 のように生死を直接的に表す言い方は、遺族の感情を刺激するおそれがあるため避け、婉曲で丁寧な表現に言い換える のが葬祭接遇の基本となる。「まだ無事だった頃」といった表現も、事故や闘病の経緯を連想させかねず、配慮に欠け る。日常の何気ない言葉にまで気を配ることが、遺族への思いやりにつながる。'},
{chapter:7, type:'4', source:'past', text:'葬儀社における電話応対の基本として、最も適切なものはどれか。', choices:['深夜や早朝の電話にも丁寧に応対し、聞き取った重要事項は復唱して確認する。','深夜にかかってきた電話には、翌朝の営業時間にかけ直すよう伝える。','時間を節約するため、相手が話し終わる前に要点を先回りして話す。','悲しみに沈む相手に事務的な確認は失礼なので、聞き取りは行わない。'], answer:0, explanation:'葬儀の依頼や訃報の連絡は昼夜を問わず入るため、深夜や早朝であっても常に丁寧な応対を心がける必要がある。第一 報では相手が動揺していることが多いので、落ち着いた口調でゆっくりと話し、故人の氏名や場所、連絡先などの重要 事項は必ず復唱して確認する。翌朝のかけ直しを求めることや、相手の話を遮って先回りすること、必要な聞き取りを 省くことは、いずれも遺族の信頼を損なう不適切な対応である。'},
{chapter:7, type:'4', source:'past', text:'「グリーフ（悲嘆）」の説明として、最も適切なものはどれか。', choices:['死別の直後にだけ現れる、ごく一時的な気分の落ち込みのこと。','うつ病などの精神疾患を発症した状態のみを指す医学的な診断名のこと。','死別に直面しても何も感じない冷静な心理状態のこと。','死別などの喪失に伴って生じる身体的・心理的・社会的反応の総体のこと。'], answer:3, explanation:'グリーフ（悲嘆）とは、死別をはじめとする大切な対象の喪失に伴って生じる、身体的・心理的・社会的な反応の総体 をいう。悲しみや怒り、罪悪感といった感情面だけでなく、不眠や食欲不振などの身体面、人付き合いを避けるなどの行 動・社会面にも幅広く現れる。喪失に対する自然で正常な反応であり、特定の精神疾患の診断名でもなければ、直後だ けの一時的な落ち込みにとどまるものでもないことを理解しておく必要がある。'},
{chapter:7, type:'4', source:'past', text:'悲嘆のプロセス（段階モデル）の理解として、最も適切なものはどれか。', choices:['すべての遺族が同じ順序で各段階を一度ずつ通過して回復する。','いずれかの段階を飛ばした場合、回復は不可能になる。','段階はあくまで目安であり、行きつ戻りつしながら個人差をもって進む。','悲嘆のプロセスは葬儀が終わった時点で必ず完結する。'], answer:2, explanation:'悲嘆のプロセスは、ショック・否認、怒り、抑うつ、受容といった段階で説明されることが多いが、これは理解を助ける ための目安である。実際の悲嘆は段階の順序どおりに一直線に進むものではなく、行きつ戻りつを繰り返しながら、期 間や現れ方に大きな個人差をもって進んでいく。段階を飛ばすと回復できないというものでもなく、葬儀の終了で完結 するものでもない。この理解は、遺族に長期的に寄り添う支援の前提となる。'},
{chapter:7, type:'4', source:'past', text:'「予期悲嘆」の説明として、最も適切なものはどれか。', choices:['死別から長い年月が経過した後に、突然始まる悲嘆のこと。','死別が避けられないと予測される時期から、実際の死別の前に始まる悲嘆のこと。','悲しみを感じないように事前に心を訓練しておくこと。','他人の悲嘆を見聞きして自分も悲しくなる現象のみを指す言葉のこと。'], answer:1, explanation:'予期悲嘆とは、長期の闘病や老衰などで死別が避けられないと予測される状況において、実際の死別が訪れる前から家 族などに生じる悲嘆をいう。大切な人を失うことをあらかじめ悲しみ、心の準備や別れの過程が始まる自然な反応であ る。看取りの期間にこうした悲嘆を経験することは、死別後の適応にも影響するとされており、援助者は死別の前から 遺族の悲嘆が始まり得ることを理解して関わることが大切である。'},
{chapter:7, type:'4', source:'past', text:'悲嘆に伴って現れる代表的な身体的反応の組み合わせとして、最も適切なものはどれか。', choices:['不眠、食欲不振、強い疲労感','視力の恒久的な喪失、骨折、関節の脱臼','身長の急激な伸び、体毛の増加、声変わり','歯並びの変化、爪の硬化、利き手の交代'], answer:0, explanation:'悲嘆は心だけでなく身体にも現れ、不眠や食欲不振、強い疲労感のほか、頭痛、胸の締めつけ感、めまい、胃腸の不調 などが代表的な身体的反応とされる。これらは死別後の自然な反応であるが、長く続くと健康を大きく損なうおそれが あるため、遺族の体調にも気を配ることが大切である。骨折や脱臼のような外傷、身長の伸びや声変わりのような成長 に伴う変化は、悲嘆による身体反応には該当しない。'},
{chapter:7, type:'4', source:'past', text:'死別後の遺族に見られる心理的反応として、最も適切なものはどれか。', choices:['死別の直後から、一切の感情が永続的に失われる。','故人に関する記憶がすべて消えてしまう。','誰もが例外なく、直ちに前向きな気持ちに切り替わる。','「もっと何かできたのではないか」という罪悪感や、故人を探し求める気持ちを抱く。'], answer:3, explanation:'死別後の遺族には、「ああすればよかった」と自分を責める罪悪感や自責の念、亡くなったはずの故人の姿や声を思わ ず探し求める思慕・探索の反応、現実感のなさ、怒り、抑うつなど、さまざまな心理的反応が現れる。これらは悲嘆に伴 う自然な反応であり、異常なものではない。感情や記憶が完全に失われたり、誰もがすぐに前向きになれたりするもので はないことを理解し、ありのままを受け止める姿勢が援助者には求められる。'},
{chapter:7, type:'4', source:'past', text:'「命日反応（記念日反応）」の説明として、最も適切なものはどれか。', choices:['命日に必ず行わなければならない法律上の届出のこと。','命日や故人との思い出の日が巡ってくると、悲嘆が再び強まる反応のこと。','命日の日に限って故人の記憶がよみがえる記憶障害のこと。','命日には遺族が必ず発熱するという身体の法則のこと。'], answer:1, explanation:'命日反応（記念日反応）とは、故人の命日や誕生日、結婚記念日など、故人との思い出に結びついた特別な日が巡って くると、落ち着いていたはずの悲嘆が再び強まる反応をいう。回復が進んでいるように見える遺族にも起こり得る自然な 現象であり、異常なものではない。法律上の届出や記憶障害、必ず発熱するといった法則を指す言葉ではない。援助者 はこうした時期に悲しみが深まり得ることを理解し、温かく見守ることが大切である。'},
{chapter:7, type:'4', source:'past', text:'「複雑性悲嘆」の説明として、最も適切なものはどれか。', choices:['複数の人と同時期に死別した場合に限って生じる悲嘆のこと。','通夜と葬儀・告別式を同じ日に行った場合に生じる悲嘆のこと。','悲嘆が通常想定される範囲を超えて長期化・重症化し、生活に深刻な支障をきたしている状態のこ と。','死別後に悲しみをまったく感じない、ごく一般的で健康な状態のこと。'], answer:2, explanation:'複雑性悲嘆とは、悲嘆反応が通常想定される範囲を超えて長期化・重症化し、日常生活や社会生活に深刻な支障をきた している状態をいう。故人への激しい思慕や死を受け入れられない状態が長く続き、抑うつなどを伴うこともある。死別 した人数や葬儀の日程によって定義されるものではなく、悲しみを感じない健康な状態を指す言葉でもない。このよう な状態がうかがわれる場合には、専門的な支援への橋渡しが必要となる。'},
{chapter:7, type:'4', source:'past', text:'遺族に複雑性悲嘆が疑われる場合の葬祭ディレクターの対応として、最も適切なものはどれか。', choices:['自らの関わりの限界を認識し、医療機関や専門の相談機関への橋渡しを検討する。','時間がすべて解決するので、何もせず様子を見るだけでよいと伝える。','葬祭ディレクター自身が心理療法を行って治療する。','気の持ちようの問題であると指摘し、本人の努力を強く促す。'], answer:0, explanation:'悲嘆が著しく長期化・重症化して日常生活に支障をきたしている場合は、葬祭従事者の関わりだけで支えられる範囲を 超えており、精神科や心療内科などの医療機関、グリーフケアの専門家や相談機関への橋渡しを検討することが適切で ある。葬祭ディレクターは治療の専門家ではないため、自ら心理療法を行うことはできない。放置することや、気の持ち ようの問題と片付けて努力を迫ることは、遺族をさらに追い詰めるおそれがある。'},
{chapter:7, type:'4', source:'past', text:'「グリーフワーク（喪の作業）」の説明として、最も適切なものはどれか。', choices:['葬儀社が行う死亡届などの事務手続の総称のこと。','遺族が悲嘆と向き合い、悲しみを表出しながら喪失を受け入れていく心の過程のこと。','悲しみを忘れるために仕事へ没頭し続けること。','故人の遺品を死後直ちにすべて処分する作業のこと。'], answer:1, explanation:'グリーフワーク（喪の作業）とは、遺族が死別の悲しみと向き合い、泣くことや故人について語ることなどを通じて悲 嘆の感情を表出しながら、故人のいない現実を少しずつ受け入れていく心の過程・作業をいう。悲しみを無理に抑え込 んだり忘れようとしたりすることではなく、葬儀社の事務手続や遺品の処分そのものを指す言葉でもない。周囲の人々 や葬祭従事者には、この過程を妨げずに温かく支える姿勢が求められる。'},
{chapter:7, type:'4', source:'past', text:'死別後、喪の過程を経ながら故人のいない環境に適応し、新しい生活を築いていく営みを表す言葉として、最 も適切なものはどれか。', choices:['デスエデュケーション','インフォームドコンセント','モーニングワーク','ターミナルケア'], answer:2, explanation:'モーニングワーク（喪の仕事）とは、死別後に悲嘆と向き合いながら喪の過程を歩み、故人のいない環境に適応して新 しい生活を再建していく一連の心の営みをいい、グリーフワークとほぼ同義に用いられることも多い。デスエデュケー ションは死への準備教育、インフォームドコンセントは医療における十分な説明と同意、ターミナルケアは終末期の医 療・ケアを指す言葉であり、いずれも喪の過程そのものを表すものではない。'},
{chapter:7, type:'4', source:'past', text:'葬儀が持つグリーフケアの機能に関する記述として、最も適切なものはどれか。', choices:['葬儀は行政上の手続にすぎず、遺族の心理には何の影響も与えない。','葬儀は悲しみを増幅させるだけなので、行わないほうが望ましい。','葬儀の役割はご遺体の処置のみであり、心理的な意味は持たない。','葬儀は死の現実を受け止め、別れを実感する場として悲嘆の過程を支える機能を持つ。'], answer:3, explanation:'葬儀には、ご遺体との対面や一連の儀礼を通じて死の現実を受け止めることを助け、故人との最後の別れを行う場を提 供し、会葬者の弔意に接することで遺族が社会的な支えを実感できるようにするなど、悲嘆の過程を支えるグリーフケ アとしての機能がある。単なる行政手続やご遺体の処置にとどまるものではなく、遺族の心の回復に重要な役割を果た す儀礼であることを、葬祭従事者は深く理解しておく必要がある。'},
{chapter:7, type:'4', source:'past', text:'葬儀において多くの会葬者の弔意に接することが、遺族にもたらす意味として最も適切なものはどれか。', choices:['自分を支えてくれる人々の存在を確認でき、社会的なサポートの実感につながる。','会葬者は儀式の人数合わせにすぎず、遺族の悲嘆とは無関係である。','会葬者が多ければ多いほど、遺族の悲しみは必ず完全に消える。','会葬者の前では悲しみを隠し通すことが遺族の義務となる。'], answer:0, explanation:'葬儀で多くの会葬者の弔意に接することは、故人が多くの人々と関わって生きてきたことを確かめるとともに、遺族自 身を支えてくれる人々の存在を実感する機会となる。こうした社会的サポートの確認は、悲嘆の過程を支える葬儀の重 要な機能の一つである。会葬者の数によって悲しみが消えるわけではなく、遺族が悲しみを隠す義務もない。むしろ葬 儀は、悲しみを安心して表出できる場であることにも大きな意味がある。'},
{chapter:7, type:'4', source:'past', text:'死別直後の遺族にかける言葉として、避けるべきものはどれか。', choices:['「お辛いことと存じます。どうぞご無理をなさらないでください」','「お手伝いできることがありましたら、いつでもお申し付けください」','「いつまでも泣いていてはだめですよ。早く忘れて頑張ってください」','「心からお悔やみ申し上げます」'], answer:2, explanation:'早く忘れるよう求めたり、頑張るよう励ましたり、泣いてはいけないと諭したりする言葉は、悲しむこと自体を否定し、 十分に悲しめなくさせて遺族をかえって追い詰めるおそれがあるため避けるべきである。悲嘆は喪失に対する自然な反 応であり、悲しみを表出することは回復の過程に必要とされる。遺族の心情に寄り添って無理をしないよう気遣う言葉 や、支援の意思を伝える言葉、丁寧な弔意の表現が適切な声かけといえる。'},
{chapter:7, type:'4', source:'past', text:'悲嘆の中にある遺族への関わり方として、最も適切なものはどれか。', choices:['沈黙が生じたら、途切れないよう援助者が次々と話題を提供する。','そばに寄り添い、話を遮らずに聴き、沈黙も大切な時間として共に過ごす。','悲しい話題には触れず、常に明るい話だけをするよう徹底する。','同じ話が繰り返されたときは、すでに聞いたと伝えて話を切り上げる。'], answer:1, explanation:'遺族への関わりの基本は、そばに静かに寄り添い、助言や評価を急がず、語られる話を遮らずに傾聴することである。 沈黙は遺族が気持ちを整理するための大切な時間であり、無理に言葉で埋める必要はない。また、遺族が同じ話を繰り 返すのは悲しみを少しずつ消化していく自然な過程であり、何度でも受け止めて聴く姿勢が望まれる。悲しい話題を避 けて明るい話だけをすることは、かえって悲嘆の表出を妨げてしまう。'},
{chapter:7, type:'4', source:'past', text:'子どもの悲嘆の特徴に関する記述として、最も適切なものはどれか。', choices:['子どもは死を理解できないため、悲嘆を経験することはない。','子どもの悲嘆は、大人とまったく同じ形で現れる。','子どもには死別の事実を完全に隠し通すことが最善である。','死の理解は発達段階により異なり、悲嘆が遊びや身体症状、退行などの形で現れることがある。'], answer:3, explanation:'子どもも大人と同じように悲嘆を経験するが、死の理解の仕方は年齢や発達段階によって異なり、悲嘆の現れ方も大人と 同じとは限らない。悲しみが遊びの中で表現されたり、腹痛などの身体症状、赤ちゃん返り（退行）、落ち着きのなさ といった形で現れたりすることがある。子どもは死を理解できないと悲嘆の存在を否定したり、死別の事実を隠し通し たりすることは、子どもの不安や混乱をかえって深めるため適切でない。'},
{chapter:7, type:'4', source:'past', text:'死別を経験した子どもへの説明の仕方として、最も適切なものはどれか。', choices:['「死」に関することには一切触れず、何も説明しない。','「眠っているだけだよ」と説明して安心させる。','年齢や発達段階に応じたわかりやすい言葉で、誠実に事実を伝える。','大人向けの専門用語を用いて、詳細な医学的説明を行う。'], answer:2, explanation:'子どもに対しては、年齢や発達段階に応じたわかりやすい言葉を選び、死の事実を誠実に伝えることが基本である。 眠っているだけ、遠くへ旅に出たといったごまかしの説明は、眠ることへの恐怖を生んだり、帰りを待ち続けさせて混乱 を深めたりするおそれがあるため避ける。何も説明しなければ、子どもは不安の中で想像によって事実を補ってしまう。 子どもの問いには、繰り返しであっても丁寧に答え続ける姿勢が大切である。'},
{chapter:7, type:'4', source:'past', text:'高齢者の悲嘆の特徴に関する記述として、最も適切なものはどれか。', choices:['配偶者との死別などで孤立しやすく、心身の健康への影響が大きくなりやすい。','人生経験が豊富であるため、高齢者が悲嘆を感じることはない。','高齢者の悲嘆は、数日のうちに必ず消失する。','高齢者には、死別の事実を伝えないことが原則である。'], answer:0, explanation:'高齢者は、長年連れ添った配偶者との死別などによって生活が大きく変化し、社会的に孤立しやすいうえ、生きる意欲 の低下、食欲不振、持病の悪化など心身の健康への影響が大きくなりやすい。人生経験が豊富であっても悲嘆を感じな くなるわけではなく、短期間で必ず消えるものでもない。死別の事実を隠すことも適切ではない。周囲による継続的な 見守りや声かけ、地域や遺族会とのつながりの維持といった支援が重要となる。'},
{chapter:7, type:'4', source:'past', text:'葬儀後の遺族支援（アフターフォロー）のあり方として、最も適切なものはどれか。', choices:['葬儀が終了した後は、遺族との関わりを一切持たないようにする。','遺族の意向にかかわらず、高額な追加サービスを繰り返し勧誘する。','悲嘆が長引いている遺族とは、関わりを避けて連絡を絶つ。','法要の案内や遺族会・グリーフサポート団体の紹介など、状況に応じた支援を行う。'], answer:3, explanation:'遺族の悲嘆は葬儀の終了後も長く続くため、法要や諸手続に関する案内、遺族会やグリーフサポート団体の紹介、メモ リアルサービスなど、遺族の状況や意向に応じたアフターフォローを行うことが望ましい。葬儀が終わったからと関わ りを断つのではなく、継続的に遺族を支える姿勢が信頼につながる。ただし、支援はあくまで遺族の気持ちを尊重して 行うものであり、営業目的の過度な勧誘は厳に慎まなければならない。'},
{chapter:7, type:'4', source:'past', text:'死別を経験した人同士が集う「遺族会（サポートグループ）」の意義として、最も適切なものはどれか。', choices:['参加者同士で悲しみの深さを比べ、優劣を決め合う場である。','同じような死別体験を持つ人同士が思いを語り、分かち合って支え合える場である。','参加した遺族に葬祭関連商品を販売することを目的とする場である。','悲しみを口にすることを互いに禁止し、忘れることを促す場である。'], answer:1, explanation:'遺族会（サポートグループ）は、同じような死別体験を持つ人同士が安心して思いを語り、悲しみを分かち合うことで 互いに支え合える場である。つらいのは自分だけではないと感じられることや、体験した者同士ならではの深い共感を 得られることに意義があり、遺族の孤立を防ぐことにもつながる。商品の販売を目的とする場ではなく、悲しみを比較 したり表出を禁じたりする場でもない。こうした団体の情報提供も遺族支援の一つである。'},
{chapter:7, type:'4', source:'past', text:'援助者に生じる「共感疲労」の説明として、最も適切なものはどれか。', choices:['運動のしすぎによって生じる単純な肉体疲労のこと。','生まれつき共感する力が乏しい性格傾向のこと。','悲嘆を抱える人へ共感的に関わり続けることで、援助者自身が心身ともに疲弊すること。','遺族の側が援助者に気を遣いすぎて疲れてしまうこと。'], answer:2, explanation:'共感疲労とは、深い悲しみや苦しみを抱える人に共感的に関わり続けることによって、援助する側自身が精神的・身体的 に疲弊してしまう状態をいう。遺族の悲嘆に日常的に接する葬祭従事者にも起こり得るものであり、放置すると意欲の低 下やバーンアウト（燃え尽き症候群）につながるおそれがある。援助者が自分の心身の変化に早めに気づき、休息や周 囲との分かち合いによって自身をケアすることが、質の高い遺族支援を続ける土台となる。'},
{chapter:7, type:'4', source:'past', text:'葬祭従事者のバーンアウト（燃え尽き症候群）を予防する方法として、最も適切なものはどれか。', choices:['十分な休息をとり、悩みやつらさを一人で抱え込まず同僚や上司と共有する。','疲労を感じても休まず、限界まで働き続けることを習慣にする。','業務で感じたつらい気持ちは誰にも話さず、心の中に封じ込める。','遺族への共感を完全に捨て、すべての業務を機械的にこなす。'], answer:0, explanation:'バーンアウトの予防には、十分な休息と睡眠を確保すること、業務で感じたつらさや悩みを一人で抱え込まずに同僚や 上司と共有すること、仕事から離れて心身をリフレッシュする時間を持つことなどが有効である。疲労を無視して働き 続けたり、感情を心の中に封じ込めたりすることは、かえって消耗を深めてしまう。また、共感を完全に捨てることは遺 族対応の質を損なう。援助者自身のケアは、良質な支援を続けるための土台である。'},
{chapter:7, type:'4', source:'past', text:'死別直後の遺族に見られる「ショック・否認」の反応の説明として、最も適切なものはどれか。', choices:['死別の事実を冷静に分析し、各種手続を淡々と進められる安定した状態。','死の事実が信じられず、現実のこととして受け止められない状態。','故人のいない生活に完全に適応し終えた状態。','新しい人間関係づくりに意欲的に取り組み始めた状態。'], answer:1, explanation:'死別の直後には、強い衝撃のために頭が真っ白になり、何かの間違いではないか、とても信じられないなどと、死の事実 を現実のこととして受け止められないショック・否認と呼ばれる反応が現れることが多い。一見気丈に振る舞っていて も、感覚が麻痺しているだけのこともある。これは突然の喪失から心を守るための自然な反応であり、援助者は無理に 現実を突きつけず、静かに寄り添いながら必要な事柄を丁寧に支えることが求められる。'},
{chapter:7, type:'4', source:'past', text:'悲嘆の過程で遺族から「怒り」が表出された場合の援助者の対応として、最も適切なものはどれか。', choices:['怒りは異常な反応であると説明し、直ちにやめるよう求める。','礼を欠く態度に対しては、援助者も同じように怒りで言い返す。','怒りを向けられた時点で、その遺族への対応を打ち切る。','怒りは悲嘆の過程で生じ得る自然な感情と理解し、受け止めて傾聴する。'], answer:3, explanation:'悲嘆の過程では、なぜ助からなかったのかというやり場のない思いが、医療者や周囲の人、自分自身、ときには葬儀社 の担当者へ怒りとして向けられることがある。これは悲嘆に伴って生じ得る自然な感情の一つであり、援助者は人格へ の攻撃と受け取らず、怒りの背景にある深い悲しみを理解して受け止め、傾聴する姿勢が求められる。怒りを異常と決 めつけたり、言い返したり、対応を打ち切ったりすれば、遺族をさらに孤立させてしまう。'},
{chapter:7, type:'4', source:'past', text:'悲嘆の現れ方に関する記述として、最も適切なものはどれか。', choices:['悲嘆の強さと続く期間は、誰であっても完全に同一である。','涙を流さない遺族は、故人への愛情が薄かったと判断できる。','悲嘆の現れ方や期間には大きな個人差があり、型に当てはめて評価すべきではない。','悲嘆を感じてよい期間は、法令によって一律に定められている。'], answer:2, explanation:'悲嘆の現れ方や強さ、続く期間は、故人との関係性や死別の状況、本人の性格、周囲の支えの有無などによって大きく 異なり、個人差が非常に大きい。涙を流さないことが愛情の薄さを意味するわけではなく、感情を表に出しにくい人 や、衝撃で感覚が麻痺している人もいる。援助者は悲嘆を他の遺族と比較したり、一定の型や期間に当てはめて評価し たりせず、一人ひとりの悲しみ方をそのまま尊重する姿勢を持つことが大切である。'},
{chapter:7, type:'4', source:'past', text:'葬儀後の遺族の悲嘆に関する記述として、最も適切なものはどれか。', choices:['葬儀直後は気が張っていても、諸手続が一段落し弔問客が減る頃に悲嘆が深まることがある。','葬儀がすべて終了すれば、遺族の悲嘆は完全に消失する。','四十九日を過ぎた遺族に、悲しみが残ることはあり得ない。','悲嘆は通夜が始まる前の段階で、すでにすべて解消されている。 葬祭ディレクター技能審査 完全対策問題集 第10 章：見積り・契約・宗教用具・総合 （50問）'], answer:0, explanation:'葬儀の前後は対応すべきことが多く、遺族は気が張った状態で過ごしがちであるが、葬儀や諸手続が一段落し、弔問客 の訪れも減って静かな日常が戻る頃に、かえって喪失感や孤独感が深まることが少なくない。悲嘆は葬儀や四十九日を 区切りとして消えるものではなく、長い時間をかけて続いていく。だからこそ、葬儀後の声かけや法要の案内、遺族会 の紹介といったアフターフォローが、遺族支援として重要な意味を持つのである。 葬祭ディレクター技能審査 完全対策問題集 第10章：見積り・契約・ 宗教用具・総合'},
{chapter:8, type:'4', source:'past', text:'葬儀の打合せにおいて、葬儀の形式・内容や使用する用具を決定する前提として、最初に確認すべき事項はど れか。', choices:['故人・遺家の宗教・宗派と菩提寺の有無','会葬礼状の文面と印刷部数','精進落としの料理の品目','香典返しの品物の種類'], answer:0, explanation:'葬儀は宗教・宗派によって祭壇や用具、式次第、用いる言葉まで大きく異なるため、打合せでは故人や遺家の宗教・宗 派と菩提寺の有無を最初に確認することが基本である。菩提寺がある場合は必ず連絡し、導師の手配や日程の調整を行 わなければ、後の納骨をめぐるトラブルにもつながりかねない。会葬礼状の文面や料理の品目、返礼品の種類も打合せ で決める事項であるが、いずれも宗教形式と規模が定まった後に検討する細目である。'},
{chapter:8, type:'4', source:'past', text:'葬儀の見積書のうち「葬儀一式費用（葬儀本体費用）」に含まれる項目として、最も適切なものはどれか。', choices:['火葬料金と火葬場待合室の使用料','導師へのお布施と戒名の御礼','祭壇・棺・骨壺などの葬祭用品と施行人件費','通夜振る舞いの料理と飲み物'], answer:2, explanation:'葬儀費用は一般に、葬儀社が直接提供する祭壇・棺・骨壺・人件費などの葬儀一式費用、火葬料金や式場使用料など外 部へ支払う実費立替費用、会葬者数によって増減する料理・返礼品などの変動的な費用、そして宗教者への謝礼に大別 して考えられる。火葬料金や待合室使用料は実費立替費用に、通夜振る舞いの料理は変動費に当たり、お布施は遺族か ら宗教者へ直接渡すものとして見積りに含まれないのが一般的である。'},
{chapter:8, type:'4', source:'past', text:'葬儀の見積りにおける「実費立替費用（立替金）」の説明として、最も適切なものはどれか。', choices:['祭壇の設営や装飾にかかる費用','火葬料金や式場使用料など、葬儀社が遺族に代わって外部へ支払う費用','葬儀社スタッフの施行人件費','棺や仏衣など葬祭用品の費用'], answer:1, explanation:'実費立替費用とは、火葬料金、公営・民営式場の使用料、車両費など、本来は遺族が外部の施設や業者に支払うべき費 用を葬儀社がいったん立て替え、後で精算するものをいう。金額は利用する施設や数量によって決まる実費であり、葬儀 社が提供する物品・役務の対価ではない。祭壇の設営費や施行人件費、棺・仏衣などの用品費は、葬儀社自身が提供す るものとして葬儀一式費用に含まれる項目であり、性格が異なる。見積書では両者を区分して表示することが望まし い。'},
{chapter:8, type:'4', source:'past', text:'宗教者への謝礼（お布施・御礼）の見積り上の取り扱いとして、最も適切なものはどれか。', choices:['葬儀一式費用に含めて表示するのが一般的である','実費立替費用として葬儀社が必ず代行して支払う','返礼品費と合算して変動費として計上する','遺族から宗教者へ直接渡すものであり、葬儀社の見積りには含まれないのが一般的である'], answer:3, explanation:'お布施や御礼は宗教者に対する謝礼であり、遺族から宗教者へ直接手渡すのが本来の姿であるため、葬儀社の見積書に は含まれないのが一般的である。ただし遺族が負担する費用の全体像を把握できるよう、打合せでは見積額とは別に宗 教者への謝礼が必要となることを説明しておく配慮が求められる。葬儀一式費用への計上、葬儀社による代行支払い、 変動費としての計上は、いずれも謝礼という性格に照らして一般的な取り扱いとはいえない。'},
{chapter:8, type:'4', source:'past', text:'葬儀費用のうち「変動費」と呼ばれる費用の説明として、最も適切なものはどれか。', choices:['料理や返礼品のように会葬者数によって数量が増減し、葬儀後に実数で確定する費用','祭壇や棺のように契約時点で金額が確定している費用','火葬料金のように施設の管理者が定めている料金','物価に連動して毎年改定される基本施行料金'], answer:0, explanation:'通夜振る舞いや精進落としの料理、会葬返礼品や香典返しなどは、実際の会葬者数や使用数によって数量が増減するた め変動費と呼ばれる。見積り段階では会葬者数の見込みに基づく概算にとどまることを説明し、葬儀後に実数を確定さ せて精算するのが基本である。祭壇や棺のような契約時に金額が確定する費用や、施設管理者が定める火葬料金などの 実費とは性格が異なる。打合せでは見込み数の根拠を遺族と共有しておくことがトラブル防止につながる。'},
{chapter:8, type:'4', source:'past', text:'見積書の「祭壇一式」「葬儀一式」などの表示に関する葬祭ディレクターの対応として、最も適切なものはど れか。', choices:['「一式」と表示すれば内訳の説明は不要である','「一式」に含まれる品目や数量の内訳を明示し、含まれないものについても説明する','内訳は契約後に求められた場合に限り口頭で伝える','内訳は社外秘であるため開示しない'], answer:1, explanation:'「一式」という表示は範囲が曖昧で、含まれていると思っていたものが別料金だったという誤解や、後日の追加請求を めぐる苦情の原因になりやすい。見積書では一式に含まれる品目・数量・仕様をできる限り具体的に明示し、実費立替 費用や変動費、宗教者への謝礼など見積りに含まれない費用についても事前に説明することが求められる。内訳の説明 を省いたり、契約後まで開示しなかったりする姿勢は、消費者の信頼を損なう不適切な対応である。'},
{chapter:8, type:'4', source:'past', text:'葬儀の見積りに関連する追加費用についての対応として、最も適切なものはどれか。', choices:['追加費用は精算時に判明すれば足りるので事前の説明は不要である','追加費用はいかなる場合も遺族に請求してはならない','どのような場合に追加費用が発生するのか、その条件をあらかじめ説明しておく','追加費用の説明は口頭のみで行い、書面には記載しない'], answer:2, explanation:'葬儀費用をめぐる苦情で目立つのは、事前に説明のなかった追加請求である。安置日数の延長に伴うドライアイスの追 加、会葬者数の増加による料理・返礼品の追加など、どのような場合に費用が加算されるのかという条件を、見積りの 段階で具体的に説明し、書面でも確認できるようにしておくことが信頼確保の基本となる。説明を省略したり口頭だけ で済ませたりする対応は誤解を招きやすく、一方で正当な追加実費の請求自体が禁じられるわけではない。'},
{chapter:8, type:'4', source:'past', text:'打合せで会葬者数の見込みを確認することが重要である理由として、最も適切なものはどれか。', choices:['火葬料金が会葬者数に応じて変動するため','死亡届に会葬者数を記載する欄があるため','お布施の金額が会葬者数によって定まるため','料理や返礼品の数量、式場の規模など、葬儀の準備内容と費用に直結するため'], answer:3, explanation:'会葬者数の見込みは、通夜振る舞い・精進落としの料理の数量、会葬返礼品の用意数、式場の広さや席の配置、受付の 人員、駐車場の確保といった準備内容と費用の算定に直結する基本情報である。故人や遺族の交際範囲、勤務先や町内 会との関係、訃報の知らせ方などを手がかりに見込みを立てる。火葬料金は会葬者数によって変動するものではなく、 死亡届に会葬者数を記載する欄はなく、お布施の額が会葬者数で定まるという考え方も誤りである。'},
{chapter:8, type:'4', source:'past', text:'冠婚葬祭互助会の契約に関する説明として、最も適切なものはどれか。', choices:['互助会に加入していれば、葬儀にかかる費用の全額が掛金で賄われる','掛金で受けられる役務の内容と範囲を契約書や約款で確認しておく必要がある','互助会の掛金は預金と同様に利息が付いて全額払い戻される','契約者本人が死亡すると互助会契約の権利は消滅する'], answer:1, explanation:'互助会は掛金を前払いすることにより、契約に定められた役務の提供を受ける仕組みであり、掛金で賄われるのはあくま で契約に定める範囲に限られる。実際の葬儀では追加の物品・サービスや火葬料などの実費が必要になることが多く、 費用の全額が賄われるとは限らないため、役務内容の確認が重要である。掛金は利息の付く預金とは性格が異なり、契 約者が死亡しても権利が当然に消滅するわけではなく、家族の葬儀への利用や承継が可能とされるのが一般的である。'},
{chapter:8, type:'4', source:'past', text:'互助会契約を中途解約する場合の一般的な取り扱いとして、最も適切なものはどれか。', choices:['解約は可能であるが、約款に定める解約手数料が差し引かれて返金されるのが一般的である','契約後はいかなる理由があっても解約できない','解約した場合、払込済みの掛金は一切返金されない','解約手数料は法令により全国一律で無料と定められている'], answer:0, explanation:'互助会契約は中途解約することができ、その場合は払込済みの掛金から約款に定める所定の解約手数料を差し引いた額 が返金されるのが一般的な取り扱いである。解約手数料の水準をめぐっては消費者トラブルや訴訟となった例もあり、 加入の際に解約条件をよく確認しておくよう案内することが大切である。解約そのものができないという説明や、掛金 が全く返金されないという説明、手数料が法令で一律無料と定められているという説明は、いずれも事実に反する。'},
{chapter:8, type:'4', source:'past', text:'葬儀の事前相談・事前見積りや生前契約に関する説明として、最も適切なものはどれか。', choices:['死亡前に葬儀の相談に応じることは法律で禁止されている','事前見積りを取ると、死亡後にその内容を変更することはできない','本人の意思を葬儀に反映でき、遺族の負担軽減にもつながるため利用が広がっている','事前相談は縁起が悪いため葬儀社から断るべきである'], answer:2, explanation:'高齢化や家族形態の変化を背景に、本人や家族が元気なうちに葬儀の内容・費用を相談して見積りを取る事前相談や、 生前に葬儀の施行を約しておく生前契約の利用は広がっている。本人の希望を葬儀に反映できること、死亡直後の限ら れた時間で多くの事項を決めなければならない遺族の負担と不安を軽減できることが利点である。事前の相談や契約を 禁じる法律はなく、事前見積りの内容も死亡時の状況や希望の変化に応じて見直すことができる。'},
{chapter:8, type:'4', source:'past', text:'葬儀後の精算に関する対応として、最も適切なものはどれか。', choices:['精算は見積り時の概算のまま行い、明細書は交付しない','変動費の増減があっても見積額どおりに請求する','請求は口頭で行い、領収書は求められたときだけ発行する','料理や返礼品などの実数を確定させ、明細を付した請求書を交付して精算する'], answer:3, explanation:'葬儀後の精算では、会葬者数によって増減した料理・返礼品などの変動費や、追加となった実費を実際の数量で確定さ せ、見積りとの違いが分かる明細を付した請求書を交付し、内容を説明したうえで精算するのが基本である。支払いを 受けた際には領収書を発行する。概算のままの請求や明細の省略、増減を反映しない請求、口頭のみのやり取りは、い ずれも金銭をめぐる不信や苦情の典型的な原因となるため、誠実な書面対応が欠かせない。'},
{chapter:8, type:'4', source:'past', text:'葬儀サービスについて消費生活センター等に寄せられる相談・苦情の典型的な内容として、最も適切なものは どれか。', choices:['葬儀が予定より早く終了したことへの不満','見積りにない費用の追加請求や、費用に関する事前説明の不足','祭壇に飾られた花の本数が多すぎたことへの不満','会葬者が見込みより少なかったことへの不満'], answer:1, explanation:'葬儀に関する消費者相談で典型的なのは、見積りに含まれていなかった費用を後から請求された、「一式」の範囲など 費用の説明が不十分だった、解約料が高額だったといった、金銭と説明に関する苦情である。葬儀は短時間のうちに多 くの事項を決めなければならず、書面による説明や確認が不足すると誤解が生じやすい。式の進行が早く済んだことや 祭壇の花の本数、会葬者の多寡そのものは、消費生活センターに寄せられる苦情の典型例とはいえない。'},
{chapter:8, type:'4', source:'past', text:'公営斎場（自治体等が運営する式場・火葬場）の一般的な特徴として、最も適切なものはどれか。', choices:['地域住民は比較的低廉な使用料で利用でき、火葬場が併設されている施設も多い','特定の葬儀社に依頼した場合に限って利用できる','宗教施設であるため仏式以外の葬儀には使用できない','営利を目的とするため民営式場より使用料が高く設定されている'], answer:0, explanation:'公営斎場は地方自治体や一部事務組合が住民サービスとして設置・運営する施設で、当該地域の住民は比較的低廉な使 用料で利用できるのが一般的である。火葬場に式場が併設された施設も多く、葬儀から火葬までの移動の負担が小さい という利点がある。どの葬儀社に施行を依頼していても施設の利用申込みは可能であり、特定宗教のための施設ではな いため宗教形式を問わず使用できる。営利目的で民営より高額という説明は公営施設の性格に反する。'},
{chapter:8, type:'4', source:'past', text:'喪主に関する説明として、最も適切なものはどれか。', choices:['遺族を代表して葬儀を主宰する者で、配偶者や子など故人と縁の深い者が務めることが多い','法律により故人の長男が務めることが義務付けられている','葬儀社の責任者が務めるのが原則とされている','慣習上、男性以外は務めることができない'], answer:0, explanation:'喪主は遺族を代表して葬儀を主宰し、弔問・会葬を受ける中心となる立場の者で、一般に配偶者や子など故人と縁の深 い者が務めることが多いが、最終的には遺族の話し合いによって決められる。喪主の資格や順位を定めた法律はなく、 長男でなければならないという法的義務も、男性に限るという決まりも存在しない。葬儀社の責任者は施行と進行を支 える立場であり喪主にはならない。打合せでは早い段階で喪主を確認し、以後の意思決定の窓口とする。'},
{chapter:8, type:'4', source:'past', text:'遺影写真の原板（元になる写真）の選定について、最も適切なものはどれか。', choices:['白黒写真でなければ遺影にできない','礼服を着て写った写真しか使用できない','集合写真は理由のいかんを問わず使用できない','ピントが合い表情のよい写真を選べば、背景や服装は加工・修整で対応できる'], answer:3, explanation:'遺影の製作では写真の加工技術が進んでおり、背景の差し替えや服装の着せ替え修整が広く行われているため、原板は ピントが合っていて故人らしい良い表情のものを選ぶことが最も重要である。現在はカラーの遺影が一般的で白黒に限 る決まりはなく、礼服姿である必要もない。集合写真やスナップ写真でも、顔の部分が鮮明であれば引き伸ばして使用 できる。打合せでは早めに原板を預かり、サイズや額、仕上がりの確認方法を遺族と決めておく。'},
{chapter:8, type:'4', source:'past', text:'打合せで決定した葬儀の内容と費用の確認方法として、最も適切なものはどれか。', choices:['信頼関係を重視し、すべて口頭の約束のみで進める','費用の総額は葬儀が終わってから初めて提示する','決定内容に基づく見積書を作成・交付し、遺族の確認を得る','見積書は遺族から特に請求があった場合に限って作成する'], answer:2, explanation:'葬儀の打合せは短時間で多くの事項を決めるため、決定内容や費用について双方の認識に食い違いが生じやすい。決 まった内容を見積書などの書面にして交付し、品目・数量・金額、追加費用が発生する条件までを遺族に確認してもら うことが、後日の紛争を防ぐ基本である。口頭の約束だけで進める方法や、葬儀後に初めて総額を示すやり方、請求さ れなければ見積書を作らないという姿勢は、説明不足による苦情や不信を招く不適切な対応である。'},
{chapter:8, type:'4', source:'past', text:'葬儀の日程を決定する際に確認・調整すべき事項の組み合わせとして、最も適切なものはどれか。', choices:['大安の日を選ぶことと、証券市場の休場日','火葬場の空き状況、菩提寺など宗教者の都合、式場の予約状況','喪服の仕立ての納期と、香典袋の在庫数','遺影の枚数と、会葬礼状の文字数'], answer:1, explanation:'葬儀日程は、火葬場の予約・空き状況、菩提寺など宗教者の都合、式場の予約状況という要素を軸に、遺族・近親者が 参集できる日や地域の慣習を考慮して調整する。友引の日に火葬場が休場する地域があることにも注意が必要で、これ らのいずれかが欠けても日程は確定できないため、打合せでは並行して照会と調整を進める。大安を選ぶという決まり や証券市場の休場日は葬儀と無関係であり、喪服の納期や礼状の文字数は日程決定の要素ではない。'},
{chapter:8, type:'4', source:'past', text:'互助会の加入者が遠方に転居する場合の取り扱いとして、最も適切なものはどれか。', choices:['転居と同時に契約は自動的に失効する','転居後も元の地域でしか役務を受けられず、それ以外の方法はない','新規に契約し直す以外に手段はなく、既払掛金は引き継げない','転居先の互助会へ移籍できる制度があるが、条件や手続を事前に確認する必要がある'], answer:3, explanation:'互助会には、加入者が転居した場合に転居先の地域の互助会へ契約を移す移籍の仕組みが業界団体を通じて設けられて いる。ただし、移籍先となる互助会の有無、引き継がれる契約内容や掛金の取り扱い、必要な手続は契約や事業者に よって異なるため、転居が決まった時点で事前に確認することが大切である。転居によって契約が自動的に失効すること はなく、元の地域でしか一切役務を受けられないという説明や、新規契約しか方法がないという説明は適切でない。'},
{chapter:8, type:'4', source:'past', text:'葬儀の施行を依頼する契約の法的性格として、最も適切なものはどれか。', choices:['土地建物の売買契約と同一の性格である','遺族が葬儀社の従業員を直接雇い入れる雇用契約である','祭壇設営など仕事の完成と、運営・進行など事務の処理を内容とする、請負と準委任の性格を併せ持 つ','対価の支払いを伴わない贈与契約である'], answer:2, explanation:'葬儀の契約は、祭壇の設営や棺・物品の提供のように一定の仕事の完成を目的とする請負としての性格と、式の運営・ 進行や諸手続の代行のように事務の処理を委ねる準委任としての性格を併せ持つ複合的な契約と解されており、物品の 提供部分には売買の性格も含まれる。遺族が葬儀社の従業員と雇用関係に立つものではなく、当然に対価の支払い義務 が生じる有償の契約であって贈与ではない。内容が多岐にわたるだけに、書面による明確化が重要となる。'},
{chapter:8, type:'4', source:'past', text:'白木祭壇に関する説明として、最も適切なものはどれか。', choices:['仏式で用いられてきた伝統的な祭壇で、葬儀社が保有して繰り返し使用するレンタル形式が一般的で ある','一回ごとに新材で製作し、葬儀後に焼却処分することが法律で義務付けられている','キリスト教式の葬儀のための専用祭壇である','遺族が購入して葬儀後も自宅に保管するのが通例である'], answer:0, explanation:'白木祭壇は白木を組み上げて飾る仏式の伝統的な祭壇で、葬儀社が自社の備品として保有し、式場ごとに組み立てて装 飾を施し、繰り返し使用するレンタル（使用料）形式が一般的である。費用は見積書に祭壇使用料などとして計上され る。一回ごとに新材で製作して焼却するという法的義務はなく、遺族が買い取って自宅に保管する性質のものでもな い。キリスト教式では十字架や燭台、生花を中心とした飾り付けが用いられ、白木祭壇は仏式のものである。'},
{chapter:8, type:'4', source:'past', text:'生花祭壇に関する説明として、最も適切なものはどれか。', choices:['仏式の葬儀では使用してはならないとされている','生花を主体に飾る祭壇で、宗教形式を問わず利用でき、デザインの自由度が高い','すべて造花で製作するため季節の影響を受けない','神式の葬儀に限って用いられる祭壇である'], answer:1, explanation:'生花祭壇は生花を主体として飾り付ける祭壇で、色彩や造形の自由度が高く、故人の好みや人柄、遺族の想いを表現し やすいことから広く普及している。仏式・神式・キリスト教式・無宗教式のいずれの形式にも対応でき、白木祭壇と組 み合わせて飾る場合もある。生花を用いる以上、花材は季節や仕入れの状況に左右されるため、打合せでは使用する花 の種類や色調を確認しておく。仏式で使えないという説明や神式専用という説明、造花のみという説明は誤りである。'},
{chapter:8, type:'4', source:'past', text:'神式（神葬祭）の祭壇・飾り付けの特徴として、最も適切なものはどれか。', choices:['中央に本尊の仏像を安置する','りんや木魚を祭壇の左右に配置する','供物は一切供えないこととされている','白木の案や三方を用い、米・酒・塩・水などの神饌を供える'], answer:3, explanation:'神葬祭の祭壇は、白木の八足案などの台や三方を用いて、米・酒・塩・水をはじめ海の幸・山の幸などの神饌を供え、 榊や灯明を立てるのが特徴で、遺影とともに故人の御霊を遷した霊璽が安置される。儀礼では参列者による玉串奉奠が 行われる。仏像を安置することや、りん・木魚といった仏具を配置することは仏式の作法であって神式では行わない。 供物を一切供えないという説明は、神饌を丁重に供える神式の祭式のあり方に明らかに反している。'},
{chapter:8, type:'4', source:'past', text:'棺の構造・種類に関する説明として、最も適切なものはどれか。', choices:['布張棺は金属板の表面に布を張った不燃性の棺である','フラッシュ構造の棺は天然木の無垢材だけで作られている','フラッシュ構造の棺は芯組みの両面に板を張ったパネルで作られ、その表面に布を張ったものが布張 棺である','段ボール等を活用したエコ棺は火葬に使用することができない'], answer:2, explanation:'現在広く流通している棺の多くはフラッシュ構造と呼ばれ、木の芯組みの両面に薄い合板などを張ったパネルで箱体を 構成している。その表面に布を張って仕上げたものが布張棺で、銘木の突板や無垢材を使ったものは天然木棺などと呼 ばれる。布張棺の下地はあくまで可燃性の木質材であり、金属板を用いた不燃性の棺ではない。強化段ボールなどを 使ったエコ棺も火葬されることを前提に開発された棺であり、火葬に使用できないという説明は誤りである。'},
{chapter:8, type:'4', source:'past', text:'棺のサイズを選定する際の考え方として、最も適切なものはどれか。', choices:['故人の身長・体格に合わせるとともに、使用する火葬場の火葬炉に収まる寸法かを確認する','祭壇の間口の寸法だけを基準に選定する','大きいものほど丁重とされるため、常に最大の棺を勧める','棺の寸法は一種類しかないため選定は不要である'], answer:0, explanation:'棺は故人の身長や体格に対して内寸に適度なゆとりのあるものを選ぶと同時に、使用する火葬場の火葬炉が受け入れら れる外寸の範囲内であることを必ず確認する。火葬炉には構造上の制約があり、特に大型の棺は受け入れができない場 合や特定の炉に限られる場合があるため、必要なときは事前に火葬場へ照会する。祭壇の間口だけを基準にしたり、常 に最大の棺を勧めたりする選び方は適切でなく、棺には複数の寸法規格が用意されている。'},
{chapter:8, type:'4', source:'past', text:'骨壺の大きさにみられる地域的な傾向として、最も適切なものはどれか。', choices:['骨壺の寸法は法令によって全国一律に定められている','焼骨の全部を収める関東地方では大きめ、一部を収める関西地方では小さめの骨壺が用いられる傾向 がある','関西地方では関東地方よりも大きな骨壺を用いるのが一般的である','骨壺の大きさは故人の年齢に応じて法令で定められている'], answer:1, explanation:'収骨の習俗には地域差があり、焼骨の全部を骨壺に収める全部収骨が主流の関東地方などでは大きめの骨壺が、焼骨の 一部を収める部分収骨が主流の関西地方などでは小さめの骨壺が用いられる傾向がある。これはあくまで慣習に基づく ものであり、骨壺の寸法を全国一律に定めた法令は存在せず、故人の年齢によって大きさが定まるものでもない。葬祭 ディレクターは施行地域や納骨先の事情、分骨の希望の有無に応じて適切な骨壺を準備する必要がある。'},
{chapter:8, type:'4', source:'past', text:'白木位牌に関する説明として、最も適切なものはどれか。', choices:['仏壇に末永く安置するための正式な位牌である','葬儀で用いる仮の位牌であり、一般に四十九日の忌明けまでに本位牌を準備する','神式の霊璽の別名である','位牌に仮のものと正式なものという区別は存在しない'], answer:1, explanation:'白木位牌は葬儀のために用意される仮の位牌で、戒名（法名・法号）や俗名などが記され、葬儀では祭壇に安置し、出 棺後は遺骨・遺影とともに後飾り祭壇に祀られる。一般には四十九日の忌明けまでに漆塗りなどの本位牌を仏壇用に作 り、白木位牌は菩提寺へ納めるなどして取り扱う。仏壇に末永く安置するのは本位牌のほうである。霊璽は神式で御霊を 遷す依り代であって白木位牌の別名ではなく、仮位牌と本位牌の区別は実際に存在している。'},
{chapter:8, type:'4', source:'past', text:'浄土真宗における位牌の取り扱いの原則として、最も適切なものはどれか。', choices:['他の宗派よりも大型の位牌を用いる','夫婦は必ず一つの位牌に連名で祀る','位牌は原則として用いず、法名は法名軸や過去帳に記して伝える','位牌には必ず金箔仕上げのものを用いる'], answer:2, explanation:'浄土真宗では、亡くなった人は阿弥陀如来の本願力によってただちに浄土へ往生するという教えから、霊魂のよりどこ ろとしての位牌は原則として用いない。法名は掛軸仕立ての法名軸にして仏壇の内側に掛けるか、過去帳に記して伝え るのが基本の作法とされる。葬儀の現場では白木位牌が便宜上使われることはあるが、忌明け後に本位牌を作らないの が原則である。大型の位牌や夫婦連名の義務、金箔仕上げの指定といった決まりは浄土真宗のものではない。'},
{chapter:8, type:'4', source:'past', text:'仏具の「三具足」を構成する組み合わせとして、正しいものはどれか。', choices:['木魚・りん・経机','位牌・遺影・骨箱','数珠・経本・打敷','香炉・燭台・花立'], answer:3, explanation:'三具足とは、香を焚く香炉、灯明をともす燭台（火立）、花を供える花立（花瓶）という三つの仏具の組み合わせをい い、仏前を荘厳する基本の具足である。配置は香炉を中央に置き、向かって右に燭台、左に花立を据えるのが基本形と される。燭台と花立をそれぞれ一対にして五点とした飾り方は五具足と呼ばれ、より丁重な荘厳とされる。木魚やりん は読経に用いる鳴り物、数珠や経本、打敷はそれぞれ別の用途の仏具であり、三具足には含まれない。'},
{chapter:8, type:'4', source:'past', text:'浄土真宗の勤行において、原則として用いられない仏具はどれか。', choices:['木魚','香炉','燭台','花立'], answer:0, explanation:'木魚は読経の拍子を取るために打ち鳴らす鳴り物の仏具で、禅宗や浄土宗など多くの宗派で用いられるが、浄土真宗の 勤行では原則として用いられない。浄土真宗では鏧（きん）などの鳴り物が作法に従って用いられる。一方、香炉・燭 台・花立は三具足と呼ばれる仏前荘厳の基本の具足であり、浄土真宗を含む各宗派に共通して用いられる。宗派ごとの 用具の違いを正しく理解しておくことは、祭壇設営や法要準備での誤りを防ぐうえで重要である。'},
{chapter:8, type:'4', source:'past', text:'神葬祭で用いられる「霊璽（れいじ）」の説明として、最も適切なものはどれか。', choices:['神前に捧げる榊の枝に紙垂を付けたものである','神饌を載せるための白木の台である','遷霊の儀により故人の御霊を遷し祀る依り代で、仏式の位牌に相当するとされる','祭壇に供える米・酒・塩・水などの供物の総称である'], answer:2, explanation:'霊璽は神葬祭において、遷霊祭（御霊遷しの儀）によって故人の御霊を遷し祀る白木の依り代であり、その役割から仏式 の位牌に相当するものと説明される。忌中は仮御霊舎（仮霊舎）に安置し、五十日祭後の合祀祭などを経て祖霊舎（御 霊舎）へ遷して祖霊として祀る。榊の枝に紙垂を付けて神前に捧げるものは玉串、神饌などを載せる白木の台は三方や 案、米・酒・塩・水などの供物は神饌であって、いずれも霊璽とは別のものである。神式特有の用語は仏式との対応で 整理して覚えるとよい。'},
{chapter:8, type:'4', source:'past', text:'神式の儀礼で用いられる「玉串」の説明として、最も適切なものはどれか。', choices:['焼香の際に用いる粉末状の香である','故人に着せる経帷子のことである','柩の上に掛ける布のことである','榊の枝に紙垂を付けたもので、祭典の際に神前に捧げる'], answer:3, explanation:'玉串は榊などの常緑樹の枝に紙垂と呼ばれる紙片を付けたもので、通夜祭や葬場祭などの祭典において、参列者が神前に 捧げて拝礼するために用いられる。玉串奉奠では作法に従って玉串の向きを変えて案の上に供え、音を立てないしのび 手で拝礼するのが一般的であり、仏式の焼香に相当する位置づけの儀礼とされる。粉末状の香は仏式の焼香に用いる抹 香、経帷子は仏式で故人に着せる装束であり、柩に掛ける布も玉串とはまったく別のものである。'},
{chapter:8, type:'4', source:'past', text:'神式の祭儀で用いられる「案（あん）」の説明として、最も適切なものはどれか。', choices:['玉串や神饌、祭具などを載せる白木の台である','神職が祭儀で着用する装束である','祭儀の進行次第を記した目録である','故人の御霊を遷す白木の依り代である'], answer:0, explanation:'案は神式の祭儀で用いられる白木の台で、脚が八本のものは八足案（八足台）と呼ばれ、玉串奉奠の際に玉串を載せる 台として、また神饌や祭具を置く台として用いられる。神葬祭の式場設営では、祭壇まわりに案を適切に配置すること が基本となる。神職が祭儀で着用する装束は斎服などと呼ばれ、進行の次第を記したものは式次第であり、故人の御霊 を遷す白木の依り代は霊璽である。名称と用途を取り違えないよう正確な理解が求められる。'},
{chapter:8, type:'4', source:'past', text:'不祝儀袋の表書きの使い分けとして、最も適切なものはどれか。', choices:['「御仏前」は宗教や時期を問わず使用できる','仏式の四十九日以後の法要には「御仏前」、神式には「御玉串料」、キリスト教式には「御花料」が 用いられる','「御玉串料」はキリスト教式の葬儀で用いる表書きである','「御花料」は神式の葬儀専用の表書きである'], answer:1, explanation:'不祝儀袋の表書きは宗教と時期によって使い分ける。仏式では四十九日の忌明け以後の法要に「御仏前」を用い、通 夜・葬儀では「御霊前」が広く使われるが、浄土真宗では葬儀の際にも「御仏前」とするのが教義にかなうとされる。 神式では「御玉串料」や「御榊料」、キリスト教式では「御花料」などが用いられる。「御仏前」が宗教・時期を問わ ず使えるという理解は誤りであり、「御玉串料」は神式、「御花料」はキリスト教式の表書きである。'},
{chapter:8, type:'4', source:'past', text:'弔事に用いる不祝儀袋の水引として、最も適切なものはどれか。', choices:['紅白の蝶結びの水引','金銀の蝶結びの水引','黒白や双銀などの結び切りの水引','色や結び方に決まりはなく何でもよい'], answer:2, explanation:'弔事の不祝儀袋には、黒白や双銀などの水引を結び切り（あわじ結びを含む）にしたものを用いるのが一般的である。 結び切りには、ほどけない結び方に「二度と繰り返さないように」という意味が込められている。地域によっては法要 などに黄白の水引を用いる慣習もみられる。紅白や金銀の水引は祝い事に用いるものであり、蝶結びは何度繰り返して もよい慶事に使う結び方であるため弔事には用いない。色や結び方が自由という理解は礼法上誤りである。'},
{chapter:8, type:'4', source:'past', text:'浄土真宗の葬儀を担当する際の葬祭ディレクターの配慮として、最も適切なものはどれか。', choices:['「冥福を祈る」などの表現を避け、清め塩や位牌を原則用いないという教義上の特徴を踏まえて対応 する','宗派による違いはないため、他宗派と同じ用語と用具で進行する','会葬者全員に清め塩を必ず配布する','柩の上に守り刀を必ず載せる'], answer:0, explanation:'浄土真宗では、亡くなった人は阿弥陀如来の本願によりただちに浄土に往生するとされるため、死後の冥土での幸福を 祈る「冥福を祈る」などの表現は教義になじまず、司会や挨拶の言葉遣いに配慮が必要である。また死を穢れとみなさ ないことから清め塩は用いず、位牌や守り刀も原則として用いないなど、用具にも特徴がある。宗派による違いがないと する進行や、清め塩の一律配布、守り刀の使用は、いずれも浄土真宗の教義への理解を欠く対応である。'},
{chapter:8, type:'4', source:'past', text:'神式の通夜祭・葬場祭の司会進行において、使用を避けるべき言葉はどれか。', choices:['「玉串奉奠」','「斎主」','「祭詞」','「供養」「成仏」「冥福」などの仏教に由来する言葉'], answer:3, explanation:'通夜祭や葬場祭は神道の祭儀であるから、司会や弔辞・挨拶では仏教に由来する言葉を避けるのが原則である。供養、 成仏、冥福、往生、戒名、焼香などはいずれも仏教用語であり、神式では御霊、帰幽、玉串奉奠といった神道の用語に 置き換えて表現する。玉串奉奠は神前に玉串を捧げる儀礼の名称、斎主は祭儀を主宰する神職の呼称、祭詞は神職が奏 上する言葉であり、いずれも神式で正しく用いられる用語である。司会者には宗教用語の的確な使い分けが求められ る。'},
{chapter:8, type:'4', source:'past', text:'出棺の直前、火葬許可証を式場に持参していないことが判明した。葬祭ディレクターの対応として最も適切な ものはどれか。', choices:['許可証がないまま予定どおり火葬を実施してもらう','火葬には火葬許可証の提出が必要であるため、直ちに所在を確認して届ける手配をし、必要に応じて 火葬場と時間を調整する','許可証は火葬後に郵送すれば足りるため、そのまま進める','その日の火葬を取りやめ、葬儀全体を後日やり直す'], answer:1, explanation:'墓地、埋葬等に関する法律により、火葬は市町村長の許可を受けて行うものとされ、火葬場の管理者は火葬許可証の提 出を受けなければ火葬を行うことができない。許可証の持参忘れが判明したら、直ちに保管場所を確認して取りに戻る 者を手配し、到着が遅れる場合は火葬場に連絡して受け入れ時刻を調整するのが適切である。許可証なしの火葬や事後 の郵送という取り扱いは法令上認められず、一方で葬儀全体を後日やり直す必要まではない。'},
{chapter:8, type:'4', source:'past', text:'菩提寺のある家の遺族が、菩提寺に連絡しないまま直葬（火葬のみの葬送）を済ませた場合に起こりやすい問 題として、最も適切なものはどれか。', choices:['火葬許可証が無効となり再発行が必要になる','死亡診断書の効力が失われる','菩提寺の墓地への納骨を断られるなど、その後の供養をめぐるトラブルが生じることがある','遺族の相続権が失われる'], answer:2, explanation:'菩提寺は先祖代々の供養を担う檀那寺であり、連絡のないまま葬儀や火葬を済ませると、宗教儀礼を経ていないことや戒 名がないことを理由に、菩提寺の墓地への納骨を認めてもらえないなどのトラブルに発展することがある。このため打 合せでは菩提寺の有無を必ず確認し、直葬を希望する遺族に対しても、事前に菩提寺へ相談しておくよう助言すること が重要である。菩提寺への連絡の有無によって、火葬許可証や死亡診断書の効力、相続権が左右されることはない。'},
{chapter:8, type:'4', source:'past', text:'遺族が故人の宗旨・宗派を正確に把握していない場合の確認方法として、最も適切なものはどれか。', choices:['本家や年長の親族に尋ねるほか、仏壇の本尊や位牌・過去帳、墓のある寺院などを手がかりに確認す る','宗派が不明でも葬儀の準備に支障はないため、確認せずに進める','通夜に集まった会葬者の多数決で宗派を決める','葬儀社が施行しやすい宗派を任意に指定する'], answer:0, explanation:'宗旨・宗派が定まらなければ、導師の手配、祭壇・用具の準備、式次第や司会の言葉遣いを適切に決めることができな い。確認の手がかりとしては、本家筋や年長の親族に尋ねること、自宅の仏壇の本尊や脇掛、位牌・過去帳を確認する こと、墓のある寺院や出身地の菩提寺に問い合わせることなどがあり、これらを組み合わせて確かめるのが実務の基本で ある。確認せずに進めることや多数決、葬儀社による恣意的な指定は、宗教上の重大なトラブルを招く。'},
{chapter:8, type:'4', source:'past', text:'深夜、病院から遺体搬送の依頼の電話を受けた。葬祭ディレクターの対応の順序として最も適切なものはどれ か。', choices:['まず祭壇と棺の見積書を完成させてから病院へ向かう','営業時間外であるため翌朝から対応を開始する','先に新聞の死亡広告の手配を済ませてから迎えに行く','病院の場所と迎えの時刻を確認し、搬送先を遺族に確かめたうえで寝台車で迎えに行き、安置後に改 めて打合せの日時を約束する'], answer:3, explanation:'深夜の搬送依頼を受けたら、まず病院名と場所、故人の氏名、迎えの希望時刻を確認し、搬送先が自宅か斎場などの安 置施設かを遺族に確かめたうえで、速やかに寝台車で迎えに行くのが基本である。搬送・安置と枕飾りなど当面の処置 を終えたら、疲労している遺族に長時間の打合せを強いることはせず、改めて打合せの日時を約束して辞去する。見積 書の作成や死亡広告の手配は搬送に先立って行うものではなく、翌朝まで対応を遅らせれば遺族の信頼を大きく損な う。'},
{chapter:8, type:'4', source:'past', text:'「亡くなった当日のうちに火葬してほしい」と遺族から求められた場合の説明として、最も適切なものはどれ か。', choices:['遺族の希望が最優先されるため当日の火葬も可能と案内する','法律上、死後24時間を経過した後でなければ原則として火葬できないことを丁寧に説明する','火葬場に空きがあれば法律上の制限なく火葬できると案内する','医師が認めれば死亡直後でも火葬できると説明する'], answer:1, explanation:'墓地、埋葬等に関する法律では、埋葬または火葬は死後24時間を経過した後でなければ行ってはならないと定められて おり、感染症法の規定など法令上の例外に当たる場合を除き、遺族の希望や火葬場の空き状況、医師の判断によって短縮 することはできない。この定めには蘇生の可能性への配慮という趣旨があるとされる。葬祭ディレクターは遺族の心情 を受け止めつつ、法の定めを分かりやすく説明し、適法な範囲で最も早い日程を提案するのが適切である。'},
{chapter:8, type:'4', source:'past', text:'遺体の保全に用いるドライアイスの取り扱いとして、最も適切なものはどれか。', choices:['昇華した二酸化炭素が室内に滞留しないよう換気に注意し、素手で直接触れずに手袋等を用いて扱う','保冷効果を高めるため、安置する部屋を密閉して使用する','薄い氷と同程度の温度であるため素手で扱って差し支えない','一度設置すれば安置期間中の点検や追加は不要である'], answer:0, explanation:'ドライアイスは二酸化炭素を固体にしたもので、昇華すると気体の二酸化炭素となり、空気より重いため室内の低い場所 に滞留しやすい。安置する部屋では換気に注意し、酸欠や中毒の危険を避けなければならない。温度は氷点下約79度と 極めて低く、素手で触れると凍傷のおそれがあるため必ず手袋等を用いて扱う。また時間の経過とともに昇華して減っ ていくため、安置日数に応じた点検と追加が必要であり、密閉した部屋での使用や設置後の放置は危険である。'},
{chapter:8, type:'4', source:'past', text:'葬祭に用いる車両の使い分けとして、最も適切なものはどれか。', choices:['寝台車と霊柩車は名称が異なるだけで用途は全く同じである','マイクロバスは主に遺体の搬送に使用される','病院等から安置場所への遺体搬送には主に寝台車を、葬儀後の火葬場への柩の搬送には霊柩車を用い る','遺体の搬送は一般の自家用貨物車で行うのが通例である'], answer:2, explanation:'寝台車は病院や施設から自宅・安置施設などへ遺体を搬送する際に用いられ、霊柩車は葬儀のあと柩を火葬場へ運ぶ際 に用いられる車両で、宮型・洋型・バン型などの形式がある。遺体を有償で運送するには貨物自動車運送事業の許可を 受けた事業用車両によることが必要であり、一般の自家用貨物車で行うものではない。マイクロバスは僧侶や遺族・会 葬者を火葬場などへ送迎するための車両である。寝台車と霊柩車は用途が異なり、名称だけの違いではない。'},
{chapter:8, type:'4', source:'past', text:'弔事の際の袱紗（ふくさ）の用い方として、最も適切なものはどれか。', choices:['赤やオレンジなど明るい暖色のものを用いる','袱紗は慶事専用の道具であり、弔事には用いない','不祝儀袋は袱紗に包まず、むき出しのまま持参するのが正式である','紫や紺、グレーなど地味な色のものを用い、不祝儀袋を包んで持参する'], answer:3, explanation:'袱紗は金封を汚れや型崩れから守り、相手への敬意を表して持参するための布で、慶弔の双方に用いられる。弔事には 紫、紺、グレー、緑などの寒色系で地味な色のものを用い、紫は慶弔兼用できる色とされている。包み方にも作法があ り、弔事では左開きになるように包むのが一般的である。赤やオレンジといった暖色は慶事用であるため弔事にはふさ わしくなく、袱紗を慶事専用とする理解や、金封をむき出しで持参する方法は礼を欠くものとされる。'},
{chapter:8, type:'4', source:'past', text:'数珠（念珠）に関する説明として、最も適切なものはどれか。', choices:['神式の通夜祭で玉串とともに必ず用いる','キリスト教式の献花の際に必ず用いる','仏式の儀礼で合掌の際に用いる法具で、宗派により正式な仕立てに違いがある','司会者が式の開始を知らせるために鳴らす道具である'], answer:2, explanation:'数珠（念珠）は仏式の儀礼で合掌・礼拝の際に手に掛けて用いる法具であり、本式の数珠は宗派によって珠の数や仕立 て、持ち方の作法に違いがある。宗派を問わず用いることのできる略式の片手数珠も広く使われており、仏式の葬儀に参 列する際の基本的な持ち物とされる。仏教の法具であるため、神式の玉串奉奠やキリスト教式の献花で用いるものでは なく、式の開始を知らせる鳴り物でもない。葬祭従事者には宗派ごとの違いへの理解が求められる。'},
{chapter:8, type:'4', source:'past', text:'日本で行われるキリスト教式の葬儀に関する説明として、最も適切なものはどれか。', choices:['焼香と読経が式の中心に置かれる','十字架や燭台が用いられ、会葬者は焼香に代えて献花を行うのが一般的である','玉串奉奠としのび手の拍手が行われる','祭壇には米・酒・塩などの神饌を供える'], answer:1, explanation:'日本のキリスト教式の葬儀では、十字架や燭台、生花で飾られた祭壇のもとで、聖書の朗読、祈り、賛美歌や聖歌の斉唱 などが行われ、会葬者は焼香に代えて白い花を一輪ずつ捧げる献花を行うのが一般的である。香典の表書きには御花料 などが用いられる。カトリックとプロテスタントでは用語や式次第に違いがある点にも注意が必要である。焼香と読経 は仏式の、玉串奉奠やしのび手、神饌の献供は神式の儀礼であり、キリスト教式の説明としては誤りである。'},
{chapter:8, type:'4', source:'past', text:'遺族から「お布施にいくら包めばよいか」と相談を受けた場合の対応として、最も適切なものはどれか。', choices:['お布施は宗教者への謝礼であることを説明したうえで、菩提寺に直接尋ねてみることなどを助言する','葬儀社が金額を決定し、葬儀費用の請求書に含めて請求する','「お布施は支払う必要のないものである」と断言する','根拠を示さずに具体的な金額を断定して伝える'], answer:0, explanation:'お布施は読経や戒名に対する代金ではなく、宗教者への謝礼・喜捨としての性格を持つため、葬儀社が金額を決めたり 請求書に含めたりする性質のものではない。相談を受けたときは、その趣旨を説明したうえで、菩提寺にどの程度の額 を包む例が多いかを直接尋ねてみるよう勧めたり、地域の一般的な考え方を参考情報として伝えたりするのが適切であ る。支払い不要と断言することや、根拠のない金額を断定して伝えることは、遺族と寺院双方との信頼を損なう。'},
{chapter:8, type:'4', source:'past', text:'通夜の当日、会葬者数が見積り時の見込みを大幅に上回ることが確実になった。葬祭ディレクターの対応とし て最も適切なものはどれか。', choices:['見積りどおりの数量を変えず、不足はやむを得ないものとして放置する','遺族に知らせずに大量に追加手配し、費用も事後に説明なく請求する','見込み数に達した時点で会葬者の受け入れを打ち切る','速やかに遺族に状況を報告し、料理や返礼品の追加の可否と費用を確認したうえで手配する'], answer:3, explanation:'料理や返礼品は会葬者数に応じて増減する変動費であり、見込みを上回ることが分かった時点で速やかに遺族に状況を 報告し、追加する数量とそれに伴う費用を説明して了解を得てから手配するのが適切である。追加分が葬儀後の精算に 反映されることも併せて伝えておく。不足を放置すれば会葬者への礼を失し、無断の追加手配と説明のない事後請求は 費用トラブルの典型的な原因となる。弔意を持って訪れた会葬者の受け入れを打ち切るような対応は論外である。'},
{chapter:8, type:'4', source:'past', text:'喪主から「形式にとらわれない無宗教の葬儀にしたいが、先祖代々の菩提寺との付き合いもある」と相談され た。葬祭ディレクターの対応として最も適切なものはどれか。', choices:['菩提寺には知らせないまま無宗教葬を行うよう勧める','無宗教の葬儀は実施できないと答え、仏式で行うよう説得する','無宗教葬の進め方を説明するとともに、菩提寺との関係や納骨の予定を確認し、事前に菩提寺へ相談 するよう助言する','どちらにするかの判断をすべて葬儀社に一任するよう求める'], answer:2, explanation:'無宗教葬（自由葬）は実施可能であり、献花や黙祷、故人の経歴紹介、思い出の音楽などで自由に構成される。しかし 菩提寺の墓地へ納骨する予定がある場合、菩提寺に無断で宗教儀礼を省くと、納骨を認められないなどのトラブルにつ ながるおそれがある。したがって無宗教葬の内容と進め方を説明すると同時に、菩提寺との関係や納骨の予定を確認 し、事前に菩提寺へ相談するよう助言するのが適切である。無断での実施を勧めることや仏式の強要、判断の丸投げの 要求は、遺族の意思決定を支援する立場に反する。'},
// ===== Ch4: 遺体取り扱い・衛生保全 (30問) =====
{chapter:4, type:'4', text:'エンバーミングの主な目的として最も適切なものはどれか。', choices:['遺体の美容・化粧を施すこと','遺体の防腐・消毒処置を行い保存性を高めること','遺体を法的に火葬許可が下りるまで保管すること','遺体から感染性病原体を除去すること'], answer:1, explanation:'エンバーミング（Embalming）は遺体に防腐処置・消毒処置・修復処置を施す技術で、遺体の保存性を高め遺族が故人とゆっくり別れを告げられるようにすることが主目的。日本ではエンバーマーが施術する。'},
{chapter:4, type:'4', text:'遺体の死後硬直（死後強直）が始まる一般的な時間として正しいものはどれか。', choices:['死後10〜30分','死後2〜4時間','死後8〜12時間','死後24〜36時間'], answer:1, explanation:'死後硬直（死後強直）は死後約2〜4時間で顎や首周辺から始まり、12〜24時間で全身に及ぶ。その後24〜48時間程度で弛緩し始める。温度・年齢・体格などにより個人差がある。'},
{chapter:4, type:'4', text:'湯灌（ゆかん）について正しい説明はどれか。', choices:['遺体を塩水に浸けて防腐処置を行う儀式','故人の体を清め温かいお湯で洗い清める儀式','遺族が故人の衣服を着替えさせる儀式','遺体の血液を薬液で置換する処置'], answer:1, explanation:'湯灌とは、故人の身体を温かいお湯で洗い清める沐浴の儀式。仏教的には「この世の穢れを落として清らかに送り出す」という意味を持つ。専門業者が行う場合と、家族が行う場合がある。'},
{chapter:4, type:'4', text:'死後変化の「腐敗」が最も進みやすい条件はどれか。', choices:['低温・低湿度・無酸素','高温・高湿度・酸素あり','低温・高湿度・酸素あり','高温・低湿度・無酸素'], answer:1, explanation:'腐敗は細菌の活動によって起こるため、細菌が活動しやすい「高温・高湿度・酸素が豊富」な環境で最も進みやすい。これが夏季に遺体の腐敗が早まる理由。逆に低温・乾燥環境では腐敗が遅れる。'},
{chapter:4, type:'4', text:'遺体を保全するためのドライアイス使用に関して正しいものはどれか。', choices:['ドライアイスは遺体の腹部上に直接乗せるのが最も効果的','ドライアイスはタオルなどに包み遺体の腹部や頭部周辺に置く','ドライアイスは直接皮膚に触れさせることで効果が最大化する','ドライアイスは冷却後に水になるので衛生的に優れている'], answer:1, explanation:'ドライアイスは二酸化炭素（CO₂）が昇華する際の冷却効果を利用するが、直接皮膚に接触すると凍傷を引き起こすため、タオルや布で包んで使用する。腹部・胸部・頭部周辺に置くのが一般的。'},
{chapter:4, type:'4', text:'末期の水（まつごのみず）について正しいものはどれか。', choices:['死亡確認後に医師が行う処置','臨終に際して遺族が故人の唇を水で濡らす儀式','葬儀社が行う遺体の口腔内ケア','湯灌の際に行われる清拭の一部'], answer:1, explanation:'末期の水は「死に水」とも呼ばれ、臨終の際（または直後）に遺族が脱脂綿や小さな筆に水を含ませて故人の唇を濡らす儀式。仏教の習俗で「あの世への旅立ちに際し、喉が渇かないように」という意味を持つ。'},
{chapter:4, type:'4', text:'エンバーマーの資格を認定している団体として正しいものはどれか。', choices:['厚生労働省','日本エンバーマー協会（IFSA）','全日本冠婚葬祭互助協会','日本葬祭アカデミー教務センター'], answer:1, explanation:'日本ではIFSA（公益社団法人日本エンバーマー協会）がエンバーマーの認定を行っている。厚生労働省の国家資格ではなく民間資格。アメリカではState Boardの国家資格が必要。'},
{chapter:4, type:'4', text:'遺体の搬送に際して「死体運送業」の許可が必要な法律はどれか。', choices:['墓地、埋葬等に関する法律（墓地埋葬法）','道路運送法','医師法','感染症の予防及び感染症の患者に対する医療に関する法律'], answer:1, explanation:'「死体運送業」は道路運送法上の一般貨物自動車運送事業の許可が必要で、遺体を棺に収め搬送するには適切な車両・資格が必要。墓地埋葬法は埋葬・火葬を規定するが遺体搬送自体は道路運送法が関係する。'},
{chapter:4, type:'4', text:'納棺の際に「北枕（きたまくら）」にする習慣の由来として正しいものはどれか。', choices:['北に向いて眠ることで仏の国（北方浄土）に向かうとされるため','釈迦が入滅した際に頭を北に向けていたという故事から','北は鬼門の方向であり邪気を寄せ付けないため','古来より日本人が北を向いて就寝する習慣があったため'], answer:1, explanation:'北枕の由来は、釈迦（仏陀）が涅槃に入った（入滅した）際に頭を北に向け、顔を西（西方浄土）に向けていたという「涅槃経」の記述から。仏教の影響を受けた日本の習俗として定着した。'},
{chapter:4, type:'4', text:'「エンゼルケア（死後処置）」に含まれない処置はどれか。', choices:['口腔内ケア（口の中の清拭）','体の清拭','着替え（死に装束の着用）','死亡診断書の作成'], answer:3, explanation:'エンゼルケアは亡くなった後に行うケア（死後処置）で、口腔内ケア・全身の清拭・着替え・整容（髪・顔の整え）などが含まれる。死亡診断書の作成は医師が行う医療行為で、エンゼルケアには含まれない。'},
{chapter:4, type:'4', text:'遺体の腐敗が進むことで発生するガスとして正しいものはどれか。', choices:['一酸化炭素（CO）と塩素（Cl₂）','硫化水素（H₂S）とメタン（CH₄）などの腐敗ガス','二酸化炭素（CO₂）と酸素（O₂）','窒素（N₂）とアンモニア（NH₃）のみ'], answer:1, explanation:'遺体の腐敗（嫌気性細菌による分解）では硫化水素・メタン・アンモニア・二酸化炭素などのガスが発生する。特に硫化水素は腐卵臭の原因であり、腐敗が進んだ遺体の取り扱いには換気が重要。'},
{chapter:4, type:'4', text:'「死後硬直（死後強直）」が解け始める時間の目安として正しいものはどれか。', choices:['死後2〜4時間','死後6〜8時間','死後24〜48時間','死後72時間以降'], answer:2, explanation:'死後硬直は死後2〜4時間から始まり12〜24時間で最大となり、その後24〜48時間程度から解け始める。硬直の進行速度は周囲温度・体格・死因によって異なる。'},
{chapter:4, type:'4', text:'遺体の「血液沈下斑（死斑）」が現れる部位として正しいものはどれか。', choices:['心臓付近の皮膚','遺体の最も高い位置の皮膚','遺体の最も低い位置（下側）の皮膚','全身に均一に現れる'], answer:2, explanation:'死斑（血液沈下斑）は死後、血液が重力によって体の下側に沈降することで生じる皮膚の変色。仰向けの場合は背中・臀部に、うつ伏せの場合は腹部・顔面に現れる。死後1〜2時間で出現し始める。'},
{chapter:4, type:'4', text:'感染症で死亡した遺体を扱う際に特に注意が必要な点として最も重要なものはどれか。', choices:['火葬を通常より高温で行うこと','適切なPPE（個人防護具）を着用し標準予防策を徹底すること','湯灌は必ず行わなければならないこと','死亡診断書に感染症名を記載しないこと'], answer:1, explanation:'感染症で亡くなった場合は、遺体からの感染リスクがあるため、グローブ・マスク・ゴーグル・ガウンなどの適切なPPE（個人防護具）を着用し、標準予防策（スタンダードプリコーション）を徹底することが最重要。'},
{chapter:4, type:'4', text:'「死に装束（しにしょうぞく）」として仏式で一般的に使用される衣装はどれか。', choices:['白の振袖','白の経帷子（きょうかたびら）','黒の喪服','紋付き羽織袴'], answer:1, explanation:'仏式の死に装束は白い経帷子（白い浴衣状の衣）で、右前（左襟が上）に着せるのが特徴（生前と逆の「逆さごと」）。白は清浄・純潔の色で、あの世への旅支度の意味を持つ。'},
{chapter:4, type:'4', text:'「湯灌」を行う際に最も注意すべき衛生上の配慮として正しいものはどれか。', choices:['湯の温度を必ず100℃以上に保つこと','作業者はゴム手袋・マスクを着用し、使用後の器具は適切に消毒すること','遺族は湯灌に立ち会うことを禁止されていること','湯灌後は必ずエンバーミングを行うこと'], answer:1, explanation:'湯灌作業においては、遺体から感染するリスクを防ぐため作業者はゴム手袋・マスク等の防護具を着用し、使用した湯や器具は適切に処分・消毒する。遺族の立ち会いは禁止されておらず、家族も参加できる。'},
{chapter:4, type:'4', text:'「腐敗」と「白骨化」の関係として正しいものはどれか。', choices:['腐敗は起こらず白骨化は直接起こる','腐敗によって軟部組織が分解され、最終的に白骨化する','白骨化の後に腐敗が始まる','腐敗と白骨化は全く別のプロセスで関連性はない'], answer:1, explanation:'遺体はまず腐敗（細菌・虫などによる軟部組織の分解）が進み、皮膚・筋肉・臓器などが消失した後、骨だけが残る「白骨化」となる。白骨化が完了するまでの年数は環境によって大きく異なる。'},
{chapter:4, type:'4', text:'日本でエンバーミングが普及し始めた主な背景として正しいものはどれか。', choices:['戦時中に戦死者を保存するために軍が普及させた','グリーフケアの重要性が認識され、安置期間を延ばすニーズが高まったため','法律でエンバーミングが義務化されたため','海外からの遺体輸入が増加したため'], answer:1, explanation:'日本でエンバーミングが広まった主な理由は、グリーフケアの観点から遺族がゆっくりお別れできる時間を確保するため、および夏季の遺体保存目的。また海外への遺体輸送の際に国際規定上エンバーミングが必要なケースもある。'},
{chapter:4, type:'ox', text:'死後硬直は、死後数時間以内に顎・首から始まり全身に及ぶ。', answer:1, explanation:'正しい。死後硬直（死後強直）は死後2〜4時間で顎・首周辺から始まり、12〜24時間程度で全身に広がる。その後24〜48時間程度で解け始める。'},
{chapter:4, type:'ox', text:'エンバーミングは日本では法律で義務付けられた処置である。', answer:0, explanation:'誤り。エンバーミングは日本では任意の処置であり、法律で義務付けられていない。海外（特にアメリカの一部州）では義務化されている場合がある。日本では遺族の希望や葬儀社の提案で行われる選択的サービス。'},
{chapter:4, type:'ox', text:'死斑（血液沈下斑）は遺体の姿勢を変えても、固定した後は移動しない。', answer:1, explanation:'正しい。死斑は死後6〜12時間程度で固定（圧力や姿勢変化によって移動しなくなる）する。固定前なら体位変換で移動するが、固定後は同じ場所にとどまる。これが法医学で死後経過時間推定に使われる。'},
{chapter:4, type:'ox', text:'感染症（一類感染症など）で亡くなった場合、法律により直ちに火葬しなければならない場合がある。', answer:1, explanation:'正しい。感染症の予防及び感染症の患者に対する医療に関する法律（感染症法）により、エボラ出血熱などの一類感染症で死亡した場合は、公衆衛生上の観点から直ちに火葬等を行う措置を求められることがある。'},
{chapter:4, type:'4', text:'「納棺」の際に一般的に棺の中に入れてはいけないものはどれか。', choices:['生花（造花でない本物の花）','故人が生前愛用した眼鏡（金属フレーム）','故人が好きだった食べ物（可燃物）','故人の写真（紙製）'], answer:1, explanation:'金属フレームの眼鏡や金属製の副葬品は火葬炉を傷め、また収骨時の骨と混ざる問題があるため棺に入れることを禁じている火葬場が多い。眼鏡は遺骨収集後に火葬場職員に相談するか、写真を代わりに入れる場合が多い。'},
{chapter:4, type:'4', text:'「清拭（せいしき）」について正しいものはどれか。', choices:['臨終前に看護師が行うリハビリテーション','死後に体の表面を拭いて清めること（遺体ケア）','葬儀後に祭壇を片付けること','火葬後に骨壺を清めること'], answer:1, explanation:'清拭（せいしき）は死後ケア（エンゼルケア）の一つで、遺体の体表面をお湯や清潔なタオルで拭いて清める処置。湯灌と異なりお湯に浸けるのではなく拭き取る方法。'},
{chapter:4, type:'4', text:'死亡後に医師が発行する「死亡診断書」に関して正しいものはどれか。', choices:['死亡診断書は葬儀社が遺族の代わりに作成できる','死亡診断書は主治医または死亡確認した医師が作成する義務がある','死亡診断書と死体検案書は全く同じ書類である','死亡診断書は死亡後1ヶ月以内に提出すれば良い'], answer:1, explanation:'死亡診断書は死亡を確認した医師（主治医等）が作成する義務があり、葬儀社等が代わりに作成することはできない。死体検案書は医師が診察していない患者の死亡を確認した場合に発行される別の書類。'},
{chapter:4, type:'4', text:'「修復処置（リコンストラクション）」エンバーミングにおける意味として正しいものはどれか。', choices:['遺体のメイクアップ（化粧）を施すこと','事故や病気により損傷した遺体を可能な限り元の状態に修復すること','遺体の衣服を整えること','遺体の防腐処置を施すこと'], answer:1, explanation:'エンバーミングにおける修復処置（リコンストラクション）は、事故・病気・外傷などで損傷した遺体の顔面や身体を可能な限り生前の姿に近づける技術的処置。遺族が安心してお別れできるよう見た目を整える。'},
{chapter:4, type:'4', text:'遺体を搬送する際に使用する「ストレッチャー」の取り扱いで最も重要なことはどれか。', choices:['できる限り速く搬送するために走ること','遺体の尊厳を保ち、揺れや振動を最小限にして丁寧に搬送すること','搬送中は必ず遺族を同乗させること','搬送前に必ず警察の許可を得ること'], answer:1, explanation:'遺体の搬送においては故人への尊厳を保ち、急がず丁寧に揺れや衝撃を最小限にして搬送することが最も重要。遺族への配慮も含め、静かに落ち着いた雰囲気で行う。'},
{chapter:4, type:'ox', text:'「左前」（右前の逆、左襟が前に来る着方）は死に装束の着方であり、生者が誤って行うことは縁起が悪いとされる。', answer:1, explanation:'正しい。通常の着物は「右前」（右襟が体の内側）だが、死に装束は「左前」（左襟が体の内側）に着せる「逆さごと」の慣習がある。そのため生者が「左前」に着物を着ることは縁起が悪いとされる。'},
{chapter:4, type:'ox', text:'湯灌は必ず専門業者でなければ行ってはならない。', answer:0, explanation:'誤り。湯灌は専門業者（湯灌師）が行うサービスが増えているが、家族が行うことも伝統的に認められている。法律で専門業者のみに限定されているわけではない。'},
{chapter:4, type:'ox', text:'遺体にドライアイスを直接皮膚に当てると凍傷を引き起こす危険がある。', answer:1, explanation:'正しい。ドライアイス（固体二酸化炭素、温度約−78.5℃）は直接皮膚に触れると凍傷を引き起こすため、必ずタオルや布に包んで使用する。'},

// ===== Ch6: 祭壇・葬具・花祭壇 (25問) =====
{chapter:6, type:'4', text:'「枕飾り（まくらかざり）」に置かれる一般的なものとして正しいものはどれか。', choices:['故人の遺影・遺骨・位牌','香炉・燭台・花立て（三具足）・枕団子・枕飯','棺・副葬品・死亡診断書','祭壇幕・生花アレンジ・弔電'], answer:1, explanation:'枕飾りは臨終直後に設ける仮の祭壇で、三具足（香炉・燭台・花立て）・枕団子・枕飯（一膳飯）・水・線香などを供える。式場の本祭壇とは別に、故人の枕元（または安置場所）に設置する。'},
{chapter:6, type:'4', text:'「本位牌」と「白木位牌（仮位牌）」の違いとして正しいものはどれか。', choices:['白木位牌は葬儀後49日まで使用し、その後本位牌に移す','白木位牌は四十九日法要後も永続的に使用する','本位牌は葬儀当日のみ使用する','両者は全く同じもので呼び方が異なるだけ'], answer:0, explanation:'白木位牌（仮位牌）は葬儀から四十九日法要まで使用する仮のもの。四十九日法要の際に本位牌（塗位牌・唐木位牌など）に「魂入れ（開眼供養）」を行い移す。白木位牌はその後お寺で処分するのが一般的。'},
{chapter:6, type:'4', text:'「供花（くげ・きょうか）」として葬儀でよく使われる花として最も不適切なものはどれか。', choices:['菊（白・黄）','カーネーション（白）','百合（白）','バラ（赤）'], answer:3, explanation:'葬儀の供花は白・黄・淡い紫などの控えめな色が一般的。赤いバラは情熱・ロマンスのイメージが強く、日本の伝統的な葬儀では不適切とされる場合が多い。ただし現代では個性的な花祭壇で使われるケースも増えている。'},
{chapter:6, type:'4', text:'「骨壺（こつつぼ）」のサイズが東日本と西日本で異なる主な理由はどれか。', choices:['東日本の遺骨は西日本より量が多いため','東日本では全骨収集、西日本では部分収集の慣習があるため','東日本と西日本では火葬温度が異なるため','地域によって骨壺の素材が異なるため'], answer:1, explanation:'東日本では全骨収集（全ての骨を集める）が一般的なため骨壺が大きい（6〜7寸が標準）。西日本では部分収集（一部の骨のみ集める）が慣習のため骨壺が小さい（3〜4寸が標準）。これが同じ日本でもサイズが大きく異なる理由。'},
